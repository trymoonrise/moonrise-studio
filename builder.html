<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/auth-gate-head.js?v=20260719-auth-gate"></script>
  <title>Builder · Moonrise Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/studio.css?v=20260718-projects-page">
  <link rel="stylesheet" href="css/studio-motion.css?v=20260719-perf">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="builder" class="ms-lb-setup">
  <div id="shell"></div>

  <div id="builder-setup" class="ms-builder-setup-page">
    <div class="ms-bs-layout">
      <header class="ms-page-head ms-bs-hero">
        <div class="ms-page-head-copy">
          <h1>Builder</h1>
          <p class="lead">Gather business details, then generate a website in the Editor.</p>
        </div>
      </header>

      <section class="ms-bs-card" id="builder-setup-card">
      <div class="ms-lb-onboard-step is-active" data-step="1" id="onboard-step-1">
        <div class="ms-lb-onboard-body">
          <div class="ms-bs-paths">
            <section class="ms-bs-path ms-bs-path--google" aria-labelledby="bs-path-google-title">
              <header class="ms-bs-path-head">
                <span class="ms-bs-path-icon ms-bs-path-icon--google" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </span>
                <div class="ms-bs-path-copy">
                  <h3 id="bs-path-google-title">Google link</h3>
                  <p>Paste a Maps or g.page URL - we'll pull the details.</p>
                </div>
              </header>
              <div class="ms-lb-onboard-maps">
                <label class="ms-lb-onboard-label" for="onb-maps">Link</label>
                <div class="ms-lb-onboard-maps-shell">
                  <svg class="ms-lb-onboard-maps-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                  <input class="ms-lb-onboard-input" id="onb-maps" type="url" placeholder="https://maps.google.com/... or g.page/..." autocomplete="off">
                </div>
                <p class="ms-lb-onboard-scrape" id="onboard-scrape-status" hidden></p>
              </div>
            </section>

            <div class="ms-bs-path-split" aria-hidden="true">
              <span>or</span>
            </div>

            <section class="ms-bs-path ms-bs-path--manual" aria-labelledby="bs-path-manual-title">
              <header class="ms-bs-path-head">
                <span class="ms-bs-path-icon ms-bs-path-icon--manual" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </span>
                <div class="ms-bs-path-copy">
                  <h3 id="bs-path-manual-title">Manual input</h3>
                  <p>Fill every field below if you don't have a link.</p>
                </div>
              </header>
              <div class="ms-lb-onboard-fields ms-lb-onboard-fields--manual">
                <div class="ms-lb-onboard-field">
                  <label class="ms-lb-onboard-label" for="onb-name">Business name</label>
                  <input class="ms-lb-onboard-input" id="onb-name" placeholder="Acme Plumbing" autocomplete="off" data-1p-ignore data-lpignore="true">
                </div>
                <div class="ms-lb-onboard-field">
                  <label class="ms-lb-onboard-label" for="onb-phone">Phone</label>
                  <input class="ms-lb-onboard-input" id="onb-phone" placeholder="(555) 123-4567" autocomplete="off" data-1p-ignore data-lpignore="true">
                </div>
                <div class="ms-lb-onboard-fields-extra" id="onb-manual-extra">
                  <div class="ms-lb-onboard-field">
                    <label class="ms-lb-onboard-label" for="onb-category">Category</label>
                    <input class="ms-lb-onboard-input" id="onb-category" placeholder="Plumbing" autocomplete="off" data-1p-ignore data-lpignore="true">
                  </div>
                  <div class="ms-lb-onboard-field">
                    <label class="ms-lb-onboard-label" for="onb-address">Address</label>
                    <input class="ms-lb-onboard-input" id="onb-address" placeholder="123 Main St, City" autocomplete="off" data-1p-ignore data-lpignore="true">
                  </div>
                  <div class="ms-lb-onboard-field ms-lb-onboard-field--full">
                    <label class="ms-lb-onboard-label" for="onb-description">Brief description <span class="ms-lb-onboard-optional">(optional)</span></label>
                    <input class="ms-lb-onboard-input" id="onb-description" placeholder="Family-owned plumber serving the area for 20 years…" autocomplete="off" data-1p-ignore data-lpignore="true">
                  </div>
                </div>
              </div>
            </section>
          </div>
          <p class="ms-error" id="onboard-error" hidden></p>
        </div>
        <footer class="ms-lb-onboard-foot">
          <button type="button" class="ms-lb-onboard-back" id="onboard-cancel">Back</button>
          <button type="button" class="ms-btn ms-lb-onboard-next" id="onboard-generate" disabled>Generate site</button>
        </footer>
      </div>
      </section>

      <aside class="ms-bs-recent" aria-label="Recent projects">
        <header class="ms-bs-recent-head">
          <div>
            <h2>Recent projects</h2>
            <p class="ms-muted">Your past builds</p>
          </div>
          <span class="ms-bs-recent-count" id="builder-recent-count" hidden aria-hidden="true"></span>
        </header>
        <div
          class="ms-dash-projects-filters ms-bs-recent-filters seg-switch"
          role="group"
          aria-label="Filter by live status"
          data-seg-tone="surface"
        >
          <button type="button" class="ms-dash-projects-filter is-active" data-live-filter="all" aria-pressed="true">All</button>
          <button type="button" class="ms-dash-projects-filter" data-live-filter="live" aria-pressed="false">Live</button>
          <button type="button" class="ms-dash-projects-filter" data-live-filter="not-live" aria-pressed="false">Not live</button>
        </div>
        <div class="ms-bs-recent-list" id="builder-recent-list">
          <p class="ms-muted ms-bs-recent-loading">Loading…</p>
        </div>
        <footer class="ms-bs-recent-foot">
          <a class="ms-bs-recent-view-all" href="projects.html">View all</a>
        </footer>
      </aside>

      <p class="ms-muted ms-bs-status" id="builder-setup-status" hidden></p>
    </div>
  </div>

  <script defer src="js/config.js?v=20260719-same-origin-api"></script>
  <script defer src="js/site-branding.js"></script>
  <script defer src="js/supabase-client.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/segment-switch.js"></script>
  <script defer src="js/ui-motion.js?v=20260719-onb-motion"></script>
  <script defer src="js/toast.js"></script>
  <script defer src="js/income.js?v=20260718-income"></script>
  <script defer src="js/app.js?v=20260720-global-fix"></script>
  <script defer src="js/builder-recent.js?v=20260719-builder-recent"></script>
  <script defer src="js/builder.js?v=20260719-same-origin-api"></script>
</body>
</html>
