<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply · Moonrise Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/studio.css">
  <meta name="color-scheme" content="light">
  <link rel="preconnect" href="https://erfaxgmnzdropviormpj.supabase.co" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="apply">
  <div class="ms-auth-card">
    <div class="ms-auth-brand">
      <img src="doc/MoonriseLogo.png" alt="" width="36" height="36">
      <div>
        <strong>Moonrise Studio</strong>
        <div class="ms-muted" style="font-size:0.85rem">AI web production for freelancers</div>
      </div>
    </div>

    <div class="ms-auth-tabs" role="tablist">
      <button type="button" class="ms-auth-tab is-active" data-mode="signin">Sign in</button>
      <button type="button" class="ms-auth-tab" data-mode="signup">Sign up</button>
    </div>

    <form id="auth-form">
      <div class="ms-field" id="handle-field" hidden>
        <label class="ms-label" for="handle">Handle</label>
        <input class="ms-input" id="handle" name="handle" placeholder="yourname" autocomplete="username">
      </div>
      <div class="ms-field">
        <label class="ms-label" for="email">Email</label>
        <input class="ms-input" id="email" name="email" type="email" required autocomplete="email">
      </div>
      <div class="ms-field">
        <label class="ms-label" for="password">Password</label>
        <input class="ms-input" id="password" name="password" type="password" required minlength="8" autocomplete="current-password" aria-describedby="pw-strength-label pw-hint">
        <div class="ms-pw-meter" id="pw-meter" hidden>
          <div class="ms-pw-track" aria-hidden="true">
            <div class="ms-pw-fill" id="pw-fill"></div>
          </div>
          <div class="ms-pw-meta">
            <span class="ms-pw-label" id="pw-strength-label">Too weak</span>
            <span class="ms-pw-score" id="pw-score" aria-hidden="true"></span>
          </div>
          <ul class="ms-pw-rules" id="pw-rules">
            <li data-rule="length">At least 8 characters</li>
            <li data-rule="case">Upper &amp; lowercase letters</li>
            <li data-rule="number">At least one number</li>
            <li data-rule="symbol">At least one symbol (!@#$…)</li>
          </ul>
          <p class="ms-pw-hint" id="pw-hint">Use a unique password — avoid names, dates, or common words.</p>
        </div>
      </div>
      <button class="ms-btn" type="submit" id="auth-submit" style="width:100%">Sign in</button>
      <p class="ms-error" id="auth-error" hidden></p>
      <p class="ms-muted" id="auth-hint" style="margin-top:0.75rem;font-size:0.85rem"></p>
    </form>
  </div>

  <script src="js/segment-switch.js"></script>
  <script src="js/ui-motion.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/handles.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      const session = await StudioAuth.getSession();
      if (session) {
        const params = new URLSearchParams(location.search);
        location.replace(params.get("next") || "dashboard.html");
        return;
      }

      let mode = new URLSearchParams(location.search).get("mode") === "signup" ? "signup" : "signin";
      const form = document.getElementById("auth-form");
      const err = document.getElementById("auth-error");
      const hint = document.getElementById("auth-hint");
      const submit = document.getElementById("auth-submit");
      const handleField = document.getElementById("handle-field");
      const passwordInput = document.getElementById("password");
      const pwMeter = document.getElementById("pw-meter");
      const pwFill = document.getElementById("pw-fill");
      const pwLabel = document.getElementById("pw-strength-label");
      const COMMON = new Set([
        "password", "password1", "12345678", "qwerty123", "moonrise", "admin123",
        "letmein1", "welcome1", "iloveyou", "abc12345", "passw0rd",
      ]);

      function scorePassword(pw) {
        const value = String(pw || "");
        const rules = {
          length: value.length >= 8,
          case: /[a-z]/.test(value) && /[A-Z]/.test(value),
          number: /\d/.test(value),
          symbol: /[^A-Za-z0-9]/.test(value),
        };
        let score = 0;
        if (rules.length) score += 1;
        if (value.length >= 12) score += 1;
        if (rules.case) score += 1;
        if (rules.number) score += 1;
        if (rules.symbol) score += 1;
        if (COMMON.has(value.toLowerCase()) || /(.)\1{3,}/.test(value) || /0123|1234|2345|abcd|qwer/i.test(value)) {
          score = Math.min(score, 1);
        }
        const level =
          score <= 1 ? "weak" :
          score === 2 ? "fair" :
          score === 3 ? "good" :
          score >= 4 ? "strong" : "weak";
        const ok = score >= 3 && rules.length && rules.case && rules.number;
        return { score, level, rules, ok, percent: Math.min(100, (score / 5) * 100) };
      }

      function updatePasswordMeter() {
        if (mode !== "signup") return;
        const result = scorePassword(passwordInput.value);
        pwFill.style.width = (passwordInput.value ? Math.max(12, result.percent) : 0) + "%";
        pwMeter.dataset.level = passwordInput.value ? result.level : "empty";
        const labels = {
          empty: "Enter a password",
          weak: "Too weak",
          fair: "Fair — add more variety",
          good: "Good",
          strong: "Strong",
        };
        pwLabel.textContent = labels[passwordInput.value ? result.level : "empty"];
        document.querySelectorAll("#pw-rules [data-rule]").forEach((li) => {
          li.classList.toggle("is-met", !!result.rules[li.dataset.rule]);
        });
        return result;
      }

      function setMode(next, instant) {
        mode = next;
        document.querySelectorAll(".ms-auth-tab").forEach((b) =>
          b.classList.toggle("is-active", b.dataset.mode === mode)
        );
        const showSignup = mode === "signup";
        if (window.StudioMotion?.setOpen) {
          window.StudioMotion.setOpen(handleField, showSignup, { instant: !!instant });
          window.StudioMotion.setOpen(pwMeter, showSignup, { instant: !!instant });
        } else {
          handleField.hidden = !showSignup;
          pwMeter.hidden = !showSignup;
        }
        passwordInput.minLength = showSignup ? 8 : 6;
        passwordInput.autocomplete = showSignup ? "new-password" : "current-password";
        submit.textContent = showSignup ? "Create account" : "Sign in";
        err.hidden = true;
        hint.textContent = "";
        if (showSignup) updatePasswordMeter();
        else {
          pwFill.style.width = "0%";
          pwMeter.dataset.level = "empty";
        }
      }

      document.querySelectorAll(".ms-auth-tab").forEach((btn) => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      passwordInput.addEventListener("input", updatePasswordMeter);
      setMode(mode, true);

      function showAuthError(msg) {
        err.hidden = true;
        err.textContent = "";
        if (msg) window.StudioToast?.error?.(msg);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        showAuthError("");
        hint.textContent = "";
        if (mode === "signup") {
          const strength = updatePasswordMeter();
          if (!strength.ok) {
            showAuthError(
              "Choose a stronger password: 8+ characters with upper & lowercase letters and a number."
            );
            passwordInput.focus();
            return;
          }
        }
        submit.disabled = true;
        try {
          if (mode === "signup") {
            const data = await StudioAuth.signUp(
              form.email.value,
              form.password.value,
              form.handle.value
            );
            if (data?.session) {
              const params = new URLSearchParams(location.search);
              location.replace(params.get("next") || "dashboard.html");
              return;
            }
            hint.textContent = "Check your email to confirm, then sign in.";
            setMode("signin");
          } else {
            await StudioAuth.signIn(form.email.value, form.password.value);
            const params = new URLSearchParams(location.search);
            location.replace(params.get("next") || "dashboard.html");
          }
        } catch (ex) {
          showAuthError(ex.message || "Auth failed");
        } finally {
          submit.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
