<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BUSINESS_NAME}}</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; background: #ecfeff; color: #083344; }
    .card { width: min(520px, calc(100vw - 2rem)); background: #fff; border-radius: 18px; padding: 2rem; border: 1px solid #a5f3fc; text-align: center; }
    h1 { margin: 0 0 .5rem; }
    a { display: inline-block; margin-top: 1rem; background: #0891b2; color: #fff; text-decoration: none; padding: .7rem 1.1rem; border-radius: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <p style="margin:0;color:#0e7490">{{CATEGORY}}</p>
    <h1>{{BUSINESS_NAME}}</h1>
    <p>{{ADDRESS}}</p>
    <a href="tel:{{PHONE_TEL}}">Call {{PHONE}}</a>
  </div>
</body>
</html>
