<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Moonrise Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://erfaxgmnzdropviormpj.supabase.co" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/studio.css?v=20260718-live-filter">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="dashboard">
  <div id="shell"></div>
  <div id="page-body" class="ms-dash-page ms-settings-page">
    <header class="ms-page-head">
      <div class="ms-page-head-copy">
        <h1>Dashboard</h1>
      </div>
    </header>

    <div class="ms-settings-stack ms-dash-stack">
      <section class="ms-card ms-settings-card ms-dash-card ms-dash-progress-card" aria-label="Overview">
        <div class="ms-dash-progress-layout">
          <div class="ms-dash-ring-wrap">
            <div class="ms-dash-ring" role="img" aria-label="0 percent of income goal">
              <svg class="ms-dash-ring-svg" viewBox="0 0 280 280" aria-hidden="true">
                <circle class="ms-dash-ring-track" cx="140" cy="140" r="118" fill="none" />
                <circle class="ms-dash-ring-prog" id="stat-goal-ring" cx="140" cy="140" r="118" fill="none" pathLength="100" />
              </svg>
              <div class="ms-dash-ring-center">
                <p class="ms-dash-ring-progress">
                  <span class="ms-dash-ring-value" id="stat-goal-pct">0%</span>
                </p>
              </div>
            </div>
          </div>

          <div class="ms-dash-overview-grid" aria-label="Key metrics and quick actions">
            <div class="ms-dash-metric ms-dash-metric--goal" id="stat-goal-wrap">
              <span class="ms-dash-metric-label">Goal</span>
              <button type="button" class="ms-dash-metric-value ms-dash-goal-display" id="stat-goal" title="Click to edit income goal" aria-label="Income goal $1,000, click to edit">$1,000</button>
              <input class="ms-dash-goal-input" id="stat-goal-input" type="number" inputmode="numeric" min="1" max="1000000" step="1" value="1000" aria-label="Edit income goal" hidden>
            </div>
            <div class="ms-dash-metric ms-dash-metric--earned">
              <span class="ms-dash-metric-label">Income <span class="ms-muted" style="font-weight:500">(your 80%)</span></span>
              <strong class="ms-dash-metric-value" id="stat-commission">$0</strong>
            </div>
            <div class="ms-dash-metric ms-dash-metric--sales">
              <span class="ms-dash-metric-label">Sales</span>
              <strong class="ms-dash-metric-value" id="dash-sales-progress">0</strong>
            </div>
            <a class="ms-btn ms-btn-secondary ms-dash-tool" href="leads.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
              <span>Find a lead</span>
            </a>
          </div>
        </div>
      </section>

      <section class="ms-card ms-settings-card ms-dash-card ms-dash-island ms-dash-projects-card" aria-label="Recent projects">
        <button type="button" class="ms-dash-island-toggle" id="dash-projects-toggle" aria-expanded="false" aria-controls="dash-projects-panel">
          <span class="ms-settings-card-title ms-dash-island-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/></svg>
            Recent projects
          </span>
          <span class="ms-dash-count-badge" id="dash-projects-count">0 projects</span>
        </button>
        <div class="ms-dash-island-panel" id="dash-projects-panel" hidden>
          <div class="ms-dash-projects-search" id="dash-projects-search-wrap">
            <label class="ms-sr-only" for="dash-projects-search">Search projects</label>
            <div class="ms-dash-projects-search-field">
              <input
                type="search"
                id="dash-projects-search"
                class="ms-dash-projects-search-input"
                placeholder="Search name, location, category, phone, domain…"
                autocomplete="off"
                spellcheck="false"
                aria-autocomplete="list"
                aria-controls="dash-projects-suggest"
                aria-expanded="false"
              >
              <button type="button" class="ms-dash-projects-search-clear" id="dash-projects-search-clear" hidden aria-label="Clear search">×</button>
            </div>
            <ul class="ms-dash-projects-suggest" id="dash-projects-suggest" role="listbox" hidden></ul>
            <p class="ms-dash-projects-search-hint" id="dash-projects-search-hint" hidden></p>
          </div>
          <div class="ms-dash-projects-filters" role="group" aria-label="Filter by live status">
            <button type="button" class="ms-dash-projects-filter is-active" data-live-filter="all" aria-pressed="true">All</button>
            <button type="button" class="ms-dash-projects-filter" data-live-filter="live" aria-pressed="false">Live</button>
            <button type="button" class="ms-dash-projects-filter" data-live-filter="not-live" aria-pressed="false">Not live</button>
          </div>
          <div class="ms-dash-previews" id="dash-projects-list"></div>
        </div>
      </section>
    </div>
  </div>

  <dialog class="ms-clients-dialog" id="dash-project-delete-dialog" aria-labelledby="dash-project-delete-title">
    <div class="ms-clients-dialog-panel ms-clients-dialog-panel--compact">
      <header class="ms-clients-dialog-head">
        <h2 class="ms-clients-dialog-title" id="dash-project-delete-title">Delete project</h2>
      </header>
      <p class="ms-clients-dialog-warning" id="dash-project-delete-message" aria-live="polite"></p>
      <p class="ms-clients-dialog-error" id="dash-project-delete-error" hidden role="alert"></p>
      <div class="ms-clients-dialog-actions">
        <button type="button" class="ms-clients-dialog-back" id="dash-project-delete-cancel">Cancel</button>
        <button type="button" class="ms-btn ms-btn-danger ms-clients-dialog-next" id="dash-project-delete-submit">Delete</button>
      </div>
    </div>
  </dialog>

  <script src="js/config.js"></script>
  <script src="js/site-branding.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/segment-switch.js"></script>
  <script src="js/ui-motion.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/income.js?v=20260718-income"></script>
  <script src="js/project-lifecycle.js?v=20260718-delete-fix"></script>
  <script src="js/app.js?v=20260718-shell-fix"></script>
  <script src="js/install-hint.js"></script>
  <script src="js/dashboard.js?v=20260718-delete-fix"></script>
</body>
</html>
