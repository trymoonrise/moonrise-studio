<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0233
    slug: tags-input-tags
    title: Tag Input
    category: tags
    tags: tags, input
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0233 - Tag Input</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f5f5;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .kicker{text-align:center;margin:0 0 1.25rem;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888}
    .box{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:10px;border:1.5px solid #111;background:#fff;min-width:min(100%,320px);max-width:420px}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:5px 8px 5px 10px;background:#111;color:#fff;font-size:.78rem;font-weight:600}
    .tag button{border:none;background:transparent;color:#fff;cursor:pointer;font-size:.8rem;opacity:.6;padding:0;line-height:1}
    .tag button:hover{opacity:1}
    input{border:none;outline:none;flex:1;min-width:100px;font:inherit;font-size:.88rem;background:transparent}
  </style>
</head>
<body>
<div><p class="kicker">Tag input · Enter to add</p><div class="box" id="b"><span class="tag">motion <button type="button" data-r aria-label="Remove">×</button></span><input placeholder="Add tag…" id="i" autocomplete="off"></div></div>
<script>const box=document.getElementById('b'),inp=document.getElementById('i');
function bind(b){b.addEventListener('click',()=>b.closest('.tag').remove());}
document.querySelectorAll('[data-r]').forEach(bind);
inp.addEventListener('keydown',e=>{if(e.key!=='Enter'||!inp.value.trim())return;e.preventDefault();const s=document.createElement('span');s.className='tag';s.innerHTML=inp.value.trim()+' <button type="button" data-r aria-label="Remove">×</button>';box.insertBefore(s,inp);bind(s.querySelector('[data-r]'));inp.value='';});</script>
</body>
</html>
