<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0234
    slug: pagination-numbered-pages
    title: Numbered Pages
    category: pagination
    tags: pagination, numbered
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0234 — Numbered Pages</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa}.pag{display:flex;gap:4px}.pag button{width:36px;height:36px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:.85rem}.pag button.on{background:#6c8cff;color:#fff;border-color:#6c8cff}
  </style>
</head>
<body>
<div class="pag"><button>‹</button><button class="on">1</button><button>2</button><button>3</button><button>›</button></div>
<script>document.querySelectorAll('.pag button').forEach(b=>b.onclick=()=>{if(!isNaN(b.textContent))document.querySelectorAll('.pag button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});</script>
</body>
</html>
