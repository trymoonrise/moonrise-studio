<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0227
    slug: avatars-image-avatar
    title: Image Avatar
    category: avatars
    tags: avatars, image, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0227 - Image Avatar</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0c0c0c;color:#eee;overflow:hidden;font-family:'DM Mono',monospace}
    .rail{position:fixed;top:50%;left:0;right:0;transform:translateY(-50%);overflow:hidden;opacity:.22;pointer-events:none}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 55s linear infinite;font-family:Syne,sans-serif;font-size:clamp(3rem,10vw,7rem);font-weight:600;letter-spacing:-.04em;text-transform:uppercase}
    .stage{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center}
    .av{width:96px;height:96px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.35)}
    .av img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.05)}
    .meta{margin-top:1.1rem;text-align:center;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.4)}
    @keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.track{animation:none}}
  </style>
</head>
<body>
  <div class="rail" aria-hidden="true"><div class="track"><span>Portrait · Portrait · Portrait · Portrait · </span><span>Portrait · Portrait · Portrait · Portrait · </span></div></div>
  <div class="stage">
    <div>
      <div class="av"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
      <p class="meta">Image</p>
    </div>
  </div>
</body>
</html>
