<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0357
    slug: backgrounds-grid-lines
    title: Grid Lines
    category: backgrounds
    tags: backgrounds, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0357 - Grid Lines</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#0b0b0b;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:56px 56px}
    .scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:scan 5s ease-in-out infinite;top:0}
    @keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
    .cross{position:absolute;width:56px;height:56px;border:1px solid rgba(255,255,255,.2);animation:pulse 3s ease-in-out infinite;left:calc(50% - 28px);top:calc(50% - 28px)}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.8);opacity:.8}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="grid" aria-hidden="true"></div><div class="scan" aria-hidden="true"></div><div class="cross" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Grid lines</h1><p class="sub">Precision under a scan.</p></div>

</body>
</html>
