<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0200 - Menu Popover</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff}.btn{padding:8px 16px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fafafa}.pop{position:absolute;margin-top:8px;background:#fff;border:1px solid #eee;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none;min-width:140px}.pop.show{display:block}.pop div{padding:8px 14px;font-size:.85rem;cursor:pointer}.pop div:hover{background:#f5f5f5}
  </style>
</head>
<body>
<div style="position:relative"><button class="btn" id="b">Actions ▾</button><div class="pop" id="p"><div>Edit</div><div>Share</div><div>Delete</div></div></div>
<script>document.getElementById('b').onclick=e=>{e.stopPropagation();document.getElementById('p').classList.toggle('show');};document.onclick=()=>document.getElementById('p').classList.remove('show');</script>
</body>
</html>
