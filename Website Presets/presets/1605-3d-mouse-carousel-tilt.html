<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1605
    slug: 3d-mouse-carousel-tilt
    title: 3D Carousel Mouse Tilt
    category: 3d-mouse
    tags: 3d, mouse, carousel
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1605 - 3D Carousel Mouse Tilt</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090a10;perspective:1100px;overflow:hidden;font-family:Outfit,sans-serif}
    .stage{width:280px;height:200px;position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx,-12deg)) rotateY(var(--ry,0deg))}
    .ring{position:absolute;inset:0;transform-style:preserve-3d}
    .card{position:absolute;left:50%;top:50%;width:130px;height:170px;margin:-85px -65px;border-radius:16px;padding:1rem;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(255,255,255,.18);box-shadow:0 20px 40px rgba(0,0,0,.35)}
    .card h3{margin:0;font-family:Syne,sans-serif;font-size:1.1rem}
    .card p{margin:.2rem 0 0;font-size:.72rem;opacity:.8}
    .c0{background:linear-gradient(160deg,#6c8cff,#3147c8)}.c1{background:linear-gradient(160deg,#ff6bcb,#a31f6e)}
    .c2{background:linear-gradient(160deg,#7ee0c3,#1f8a6e)}.c3{background:linear-gradient(160deg,#ffd16c,#b07a12)}
    .c4{background:linear-gradient(160deg,#b06cff,#5520b8)}.c5{background:linear-gradient(160deg,#5eead4,#0f766e)}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);font-family:Syne,sans-serif}
  </style>
</head>
<body>
  <div class="stage" id="stage"><div class="ring" id="ring"></div></div>
  <div class="hint">Drag orbit with mouse X</div>
  <script>
    const items=[{c:'c0',t:'North',s:'Cold'},{c:'c1',t:'Rose',s:'Warm'},{c:'c2',t:'Mint',s:'Soft'},{c:'c3',t:'Gold',s:'Hard'},{c:'c4',t:'Violet',s:'Night'},{c:'c5',t:'Tide',s:'Deep'}];
    const ring=document.getElementById('ring'),stage=document.getElementById('stage'),R=210;
    items.forEach((it,i)=>{const el=document.createElement('div');el.className='card '+it.c;el.innerHTML=`<h3>${it.t}</h3><p>${it.s}</p>`;el.dataset.base=(i/items.length)*360;ring.appendChild(el)});
    let ry=0,rx=-12,try_=0,trx=-12,spin=0,tspin=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;tspin=x*80;try_=x*18;trx=-12+y*-8});
    (function loop(){spin+=(tspin-spin)*.08;ry+=(try_-ry)*.1;rx+=(trx-rx)*.1;
      [...ring.children].forEach(el=>{const a=+el.dataset.base+spin;el.style.transform=`rotateY(${a}deg) translateZ(${R}px)`});
      stage.style.setProperty('--rx',rx+'deg');stage.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
