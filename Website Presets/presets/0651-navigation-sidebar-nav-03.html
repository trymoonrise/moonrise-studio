<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0651
    slug: navigation-sidebar-nav-03
    title: Sidebar Nav 03
    category: navigation
    tags: navigation, sidebar
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0651 — Sidebar Nav 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#111;color:#fff;font-family:Outfit,sans-serif;display:flex}
    .rail{width:72px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;padding:2rem 0;gap:2rem;position:fixed;inset:0 auto 0 0;z-index:10;background:#111}
    .mark{width:10px;height:10px;border:1px solid #fff;border-radius:50%}
    .rail nav{display:flex;flex-direction:column;gap:1.75rem;margin-top:auto;margin-bottom:auto}
    .rail a{writing-mode:vertical-rl;transform:rotate(180deg);text-decoration:none;color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:300;transition:color .3s}
    .rail a:hover,.rail a.active{color:#fff}
    main{margin-left:72px;flex:1;min-height:100vh;padding:4rem clamp(2rem,5vw,4rem);display:grid;align-content:center}
    h1{margin:0;font-family:Syne,sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:-.05em;line-height:.92;font-weight:800}
    p{margin:1.5rem 0 0;max-width:30ch;color:rgba(255,255,255,.35);font-weight:300;line-height:1.7}
  </style>
</head>
<body>
  <aside class="rail">
    <div class="mark" aria-hidden="true"></div>
    <nav>
      <a class="active" href="#">Home</a>
      <a href="#">Work</a>
      <a href="#">Info</a>
    </nav>
  </aside>
  <main>
    <h1>Thin<br>edge</h1>
    <p>A 72px rail. Vertical labels. One hollow circle for a logo.</p>
  </main>
</body>
</html>
