<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0900
    slug: avatars-initials-avatar-05
    title: Scanline Initials Badge
    category: avatars
    tags: avatars, initials, scan, badge
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0900 — Scanline Initials Badge</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#080808;color:#f0f0f0;font-family:Outfit,sans-serif}
    .card{position:relative;width:min(320px,90vw);padding:2.5rem;text-align:center}
    .badge{position:relative;width:120px;height:120px;margin:0 auto 1.5rem;border-radius:24px;background:#111;border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;overflow:hidden;transition:transform .4s cubic-bezier(.16,1,.3,1),border-color .3s}
    .badge::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,170,.03) 2px,rgba(0,255,170,.03) 4px);animation:scan 3s linear infinite;pointer-events:none}
    .badge::after{content:'';position:absolute;top:-100%;left:0;width:100%;height:40%;background:linear-gradient(transparent,rgba(0,255,170,.15),transparent);animation:sweep 2.5s ease-in-out infinite}
    .initials{font-family:Syne,sans-serif;font-weight:800;font-size:2.8rem;letter-spacing:-.06em;position:relative;z-index:1;background:linear-gradient(180deg,#fff 30%,#00ffaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .card:hover .badge{transform:rotate(-3deg) scale(1.05);border-color:rgba(0,255,170,.4)}
    .name{font-family:Syne,sans-serif;font-size:1.4rem;letter-spacing:-.03em;margin-bottom:.25rem}
    .role{font-size:.8rem;color:rgba(240,240,240,.45);letter-spacing:.12em;text-transform:uppercase}
    .status{display:inline-flex;align-items:center;gap:.5rem;margin-top:1.5rem;padding:.4rem .9rem;border-radius:999px;border:1px solid rgba(0,255,170,.25);font-size:.75rem;color:#00ffaa;animation:pulse-ring 2s ease infinite}
    .status i{width:6px;height:6px;border-radius:50%;background:#00ffaa;animation:blink 1.2s step-end infinite}
    @keyframes scan{to{background-position:0 8px}}
    @keyframes sweep{0%,100%{top:-100%}50%{top:100%}}
    @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(0,255,170,.2)}50%{box-shadow:0 0 0 6px rgba(0,255,170,0)}}
    @keyframes blink{50%{opacity:0}}
    @media(prefers-reduced-motion:reduce){.badge::before,.badge::after,.status,.status i{animation:none}}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="initials">NX</span></div>
    <h1 class="name">Nadia Xu</h1>
    <p class="role">Systems Architect</p>
    <div class="status"><i></i>Available now</div>
  </div>
</body>
</html>
