<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0085
    slug: ease-in-slide-in-cards
    title: Slide In Cards
    category: ease-in
    tags: ease-in, slide
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0085 - Slide In Cards</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#eee;gap:16px;flex-direction:row;flex-wrap:wrap;padding:2rem} .card{width:140px;padding:1.5rem;background:#fff;border-radius:12px;opacity:0;transform:translateX(-40px);animation:sl .6s forwards} .card:nth-child(2){animation-delay:.15s}.card:nth-child(3){animation-delay:.3s} @keyframes sl{to{opacity:1;transform:translateX(0)}}
  </style>
</head>
<body>
<div class="card">Card 1</div><div class="card">Card 2</div><div class="card">Card 3</div>

</body>
</html>
