<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1619
    slug: 3d-mouse-icon-cloud
    title: 3D Icon Cloud Mouse
    category: 3d-mouse
    tags: 3d, mouse, icons
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1619 — 3D Icon Cloud Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07080e;perspective:900px;overflow:hidden;font-family:Syne,sans-serif}
    .cloud{position:relative;width:320px;height:280px;transform-style:preserve-3d;transform:rotateX(var(--rx,8deg)) rotateY(var(--ry,0deg))}
    .icon{position:absolute;width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:1.1rem;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.2);left:50%;top:50%;margin:-24px;box-shadow:0 12px 24px rgba(0,0,0,.3)}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="cloud" id="cloud"></div>
  <div class="hint">Scatter the icon cloud</div>
  <script>
    const icons=['◆','▲','●','■','★','✦','◉','◈','◇','○','▽','▣'];
    const colors=['#6c8cff','#ff6bcb','#7ee0c3','#ffd16c','#b06cff','#5eead4','#ff8a6c','#8aa4ff','#c084fc','#67e8f9','#fbbf24','#f472b6'];
    const cloud=document.getElementById('cloud');
    const nodes=icons.map((ic,i)=>{
      const el=document.createElement('div');el.className='icon';el.textContent=ic;el.style.background=colors[i];cloud.appendChild(el);
      const a=(i/icons.length)*Math.PI*2;
      return {el,bx:Math.cos(a)*90,by:Math.sin(a*1.3)*70,bz:(i%3-1)*50,x:0,y:0,z:0};
    });
    let mx=0,my=0;
    addEventListener('pointermove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=(e.clientY/innerHeight-.5)*2});
    (function loop(){
      cloud.style.setProperty('--rx',(8+my*-12)+'deg');cloud.style.setProperty('--ry',(mx*24)+'deg');
      nodes.forEach((n,i)=>{
        const pull=40+Math.sin(Date.now()/800+i)*.1;
        n.x=n.bx+mx*pull;n.y=n.by+my*pull;n.z=n.bz+Math.abs(mx)*30;
        n.el.style.transform=`translate3d(${n.x}px,${n.y}px,${n.z}px)`;
      });
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
