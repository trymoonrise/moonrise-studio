<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0533
    slug: features-alternating-02
    title: Alternating 02
    category: features
    tags: features, alternating
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0533 — Alternating 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0a0a0a;color:#fff;font-family:Outfit,sans-serif;padding:3rem 1.5rem}
    .band{display:grid;grid-template-columns:1fr 1fr;min-height:280px;border-top:1px solid rgba(255,255,255,.1);max-width:960px;margin:0 auto}
    .band:last-child{border-bottom:1px solid rgba(255,255,255,.1)}
    .side{padding:2.5rem 2rem;display:grid;align-content:center}
    .media{background:#151515;position:relative;overflow:hidden}
    .media::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.06));animation:sweep 4s ease-in-out infinite}
    .band:nth-child(even) .side{order:2}.band:nth-child(even) .media{order:1}
    .kicker{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;opacity:.35;margin:0 0 .8rem;font-weight:300}
    h2{margin:0;font-family:Syne,sans-serif;font-size:clamp(1.5rem,3.5vw,2.2rem);letter-spacing:-.04em;line-height:1;font-weight:800}
    p{margin:.8rem 0 0;opacity:.45;font-weight:300;line-height:1.6;max-width:32ch;font-size:.9rem}
    .slash{position:absolute;inset:20%;border-left:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,.2);transform:skewX(-12deg)}
    @keyframes sweep{50%{transform:translateX(8%)}}
    @media(max-width:700px){.band{grid-template-columns:1fr}.band:nth-child(even) .side,.band:nth-child(even) .media{order:unset}.media{min-height:160px}}
  </style>
</head>
<body>
  <section class="band">
    <div class="side"><p class="kicker">01 — Signal</p><h2>Dark bands.<br>Hard cuts.</h2><p>Alternating panels that feel like a reel of stills.</p></div>
    <div class="media"><div class="slash"></div></div>
  </section>
  <section class="band">
    <div class="side"><p class="kicker">02 — Shift</p><h2>Swap the<br>weight.</h2><p>Even rows flip the media to the left for rhythm.</p></div>
    <div class="media" style="background:#1a2420"><div class="slash"></div></div>
  </section>
  <section class="band">
    <div class="side"><p class="kicker">03 — Close</p><h2>End on a<br>quiet beat.</h2><p>No cards. Just sequence and a thin dividing line.</p></div>
    <div class="media" style="background:#241a20"><div class="slash"></div></div>
  </section>
</body>
</html>
