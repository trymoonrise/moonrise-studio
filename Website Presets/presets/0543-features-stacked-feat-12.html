<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0543
    slug: features-stacked-feat-12
    title: Stacked Feat 12
    category: features
    tags: features, stacked
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0543 - Stacked Feat 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0b10;color:#fff;font-family:Outfit,sans-serif;padding:2rem;perspective:1100px}
    .wrap{width:min(420px,100%)}
    h1{margin:0 0 1.5rem;font-family:Syne,sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-.04em;font-weight:800}
    .stack{position:relative;height:340px;transform-style:preserve-3d;transform:rotateX(14deg) rotateY(-12deg)}
    .layer{position:absolute;inset:0;border:1px solid rgba(255,255,255,.14);padding:1.5rem;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .55s cubic-bezier(.22,1,.36,1)}
    .l1{background:linear-gradient(160deg,#1a2240,#0d101c);z-index:3;transform:translateZ(0)}
    .l2{background:linear-gradient(160deg,#1f3a32,#0d101c);z-index:2;transform:translateZ(-40px) translateY(16px) translateX(12px)}
    .l3{background:linear-gradient(160deg,#3a1a28,#0d101c);z-index:1;transform:translateZ(-80px) translateY(32px) translateX(24px)}
    .stack:hover .l1{transform:translateZ(30px) translateY(-8px)}
    .stack:hover .l2{transform:translateZ(-20px) translateY(10px) translateX(36px) rotateZ(-3deg)}
    .stack:hover .l3{transform:translateZ(-90px) translateY(28px) translateX(60px) rotateZ(-6deg)}
    .tag{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;opacity:.4;margin:0 0 .35rem;font-weight:300}
    h3{margin:0;font-family:Syne,sans-serif;font-size:1.2rem;letter-spacing:-.02em}
    .hint{margin-top:1.5rem;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.3;font-weight:300}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Stacked depth</h1>
    <div class="stack">
      <div class="layer l3"><p class="tag">03</p><h3>Foundation</h3></div>
      <div class="layer l2"><p class="tag">02</p><h3>System</h3></div>
      <div class="layer l1"><p class="tag">01</p><h3>Surface</h3></div>
    </div>
    <p class="hint">Hover to fan</p>
  </div>
</body>
</html>
