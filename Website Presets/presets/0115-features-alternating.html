<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0115
    slug: features-alternating
    title: Alternating Features
    category: features
    tags: features, alternating
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0115 - Alternating Features</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f4f2ec;color:#111;font-family:Outfit,sans-serif;padding:clamp(2rem,5vw,4rem)}
    .wrap{width:min(900px,100%);margin:0 auto;display:flex;flex-direction:column;gap:4rem}
    .row{display:grid;grid-template-columns:1.1fr 1fr;gap:2.5rem;align-items:center}
    .row:nth-child(even){direction:rtl}.row:nth-child(even)>*{direction:ltr}
    .visual{aspect-ratio:4/3;background:#111;position:relative;overflow:hidden;transform:perspective(800px) rotateY(var(--ry,-8deg));transition:transform .5s cubic-bezier(.22,1,.36,1)}
    .row:hover .visual{transform:perspective(800px) rotateY(0)}
    .visual i{position:absolute;inset:18%;border:1px solid rgba(255,255,255,.25);animation:float 5s ease-in-out infinite}
    .visual .n{position:absolute;left:1rem;bottom:1rem;font-family:Syne,sans-serif;font-size:clamp(3rem,8vw,5rem);font-weight:800;color:#fff;letter-spacing:-.06em;line-height:1;opacity:.9}
    .copy .tag{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;opacity:.4;margin:0 0 .75rem;font-weight:300}
    h2{margin:0;font-family:Syne,sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.04em;line-height:1;font-weight:800}
    p{margin:.9rem 0 0;font-size:.95rem;line-height:1.65;opacity:.55;font-weight:300;max-width:34ch}
    @keyframes float{50%{transform:translate(6px,-8px) rotate(2deg)}}
    @media(max-width:700px){.row,.row:nth-child(even){grid-template-columns:1fr;direction:ltr}}
  </style>
</head>
<body>
  <div class="wrap">
    <article class="row">
      <div class="visual"><i></i><span class="n">01</span></div>
      <div class="copy"><p class="tag">Composition</p><h2>Left leads.<br>Right explains.</h2><p>Alternating rhythm that feels editorial, not templated.</p></div>
    </article>
    <article class="row">
      <div class="visual" style="background:#1a3a32"><i></i><span class="n">02</span></div>
      <div class="copy"><p class="tag">Depth</p><h2>Planes tilt<br>toward you.</h2><p>Hover unwinds the perspective so content sits flat and clear.</p></div>
    </article>
    <article class="row">
      <div class="visual" style="background:#2a1a24"><i></i><span class="n">03</span></div>
      <div class="copy"><p class="tag">Focus</p><h2>One idea<br>per band.</h2><p>No cards. No icons soup. Just sequence and space.</p></div>
    </article>
  </div>
</body>
</html>
