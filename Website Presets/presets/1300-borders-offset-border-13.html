<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1300
    slug: borders-offset-border-13
    title: Offset Border 13
    category: borders
    tags: borders, offset
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1300 - Offset Border 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;color:#111}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .offset{position:relative;width:min(100%,280px)}
    .ghost{position:absolute;inset:0;border:2px solid #111;transform:translate(10px,10px);animation:drift 5s ease-in-out infinite}
    @keyframes drift{0%,100%{transform:translate(10px,10px)}50%{transform:translate(14px,6px)}}
    .main{position:relative;padding:2rem 1.75rem;border:2px solid #111;background:#fff;z-index:1}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-.03em;margin:0 0 .35rem}
    p{margin:0;color:#666;font-size:.88rem}
  </style>
</head>
<body>
<div class="offset"><div class="ghost" aria-hidden="true"></div><div class="main"><h2>Offset</h2><p>Shadow frame in motion.</p></div></div>

</body>
</html>
