<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1572
    slug: 3d-flip-tile-grid
    title: 3D Flip Tile Grid
    category: 3d-effects
    tags: 3d, grid, flip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1572 - 3D Flip Tile Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090a10;perspective:1000px;font-family:Syne,sans-serif;padding:2rem}
    .grid{display:grid;grid-template-columns:repeat(4,70px);gap:10px;transform:rotateX(12deg)}
    .tile{width:70px;height:70px;position:relative;transform-style:preserve-3d;cursor:pointer;transition:transform .7s cubic-bezier(.16,1,.3,1)}
    .tile:hover,.tile.flip{transform:rotateY(180deg)}
    .a,.b{position:absolute;inset:0;border-radius:12px;display:grid;place-items:center;backface-visibility:hidden;font-weight:800;font-size:1rem;border:1px solid rgba(255,255,255,.15)}
    .a{background:linear-gradient(145deg,#1a1f35,#0d101c);color:#fff}
    .b{background:linear-gradient(145deg,#6c8cff,#ff6bcb);color:#fff;transform:rotateY(180deg)}
    .tile:nth-child(4n+2) .b{background:linear-gradient(145deg,#7ee0c3,#6c8cff)}
    .tile:nth-child(4n+3) .b{background:linear-gradient(145deg,#ffd16c,#ff6bcb)}
    .tile:nth-child(4n) .b{background:linear-gradient(145deg,#b06cff,#6c8cff)}
    @media(prefers-reduced-motion:reduce){.tile{transition:none}}
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <script>
    const grid=document.getElementById('grid');
    const labels='ABCDEFGHIJKLMNOP';
    for(let i=0;i<16;i++){
      const t=document.createElement('div');
      t.className='tile';
      t.style.transitionDelay=(i%4)*.04+(Math.floor(i/4)*.04)+'s';
      t.innerHTML=`<div class="a">${labels[i]}</div><div class="b">${String(i+1).padStart(2,'0')}</div>`;
      t.addEventListener('click',()=>t.classList.toggle('flip'));
      grid.appendChild(t);
    }
    // entrance wave
    setTimeout(()=>[...grid.children].forEach((t,i)=>setTimeout(()=>t.classList.add('flip'),i*60)),400);
    setTimeout(()=>[...grid.children].forEach((t)=>t.classList.remove('flip')),1800);
  </script>
</body>
</html>
