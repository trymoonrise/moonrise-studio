<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1141
    slug: ai-chat-gradient-chat-12
    title: Gradient Chat 12
    category: ai-chat
    tags: ai-chat, gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1141 — Gradient Chat 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0a12;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#fff}
    .stage{width:min(600px,100%);text-align:center}
    h1{margin:0 0 1.75rem;font-size:clamp(1.4rem,4vw,1.9rem);font-weight:600;letter-spacing:-.03em;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .ask-shell{position:relative;isolation:isolate;animation:up .7s cubic-bezier(.16,1,.3,1) .12s both}
    .ask-shell::before{content:"";position:absolute;inset:-2px;z-index:-2;border-radius:30px;background:conic-gradient(from var(--a,0deg),#10a37f,#6c8cff,#ff6bcb,#ffd16c,#10a37f);filter:blur(8px);opacity:.85;animation:spin 5s linear infinite}
    .ask-shell::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:28px;background:rgba(10,10,18,.82);backdrop-filter:blur(8px)}
    .ask{position:relative;display:flex;align-items:center;gap:.5rem;padding:.7rem .7rem .7rem 1.1rem;border-radius:28px}
    .ask input{flex:1;border:none;outline:none;background:transparent;color:#fff;font:inherit;font-size:1rem}
    .ask input::placeholder{color:rgba(255,255,255,.45)}
    .send{width:38px;height:38px;border:none;border-radius:50%;background:#fff;color:#111;cursor:pointer;display:grid;place-items:center;transition:transform .2s}
    .send:hover{transform:scale(1.06)}
    .send svg{width:16px;height:16px}
    @property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
    @keyframes spin{to{--a:360deg}}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){h1,.ask-shell,.ask-shell::before{animation:none}h1,.ask-shell{opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <h1>Ask in color</h1>
    <div class="ask-shell">
      <form class="ask">
        <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
        <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>
    </div>
  </div>
</body>
</html>
