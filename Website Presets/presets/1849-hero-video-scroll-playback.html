<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1849
    slug: hero-video-scroll-playback
    title: Scroll Playback Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1849 - Scroll Playback Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .pin{height:280vh}body{overflow:auto}
.stage{position:sticky;top:0;height:100vh;overflow:hidden;display:grid;place-items:end start;padding:clamp(2rem,5vw,4rem)}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.shade{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.copy{position:relative;z-index:2}
h1{font-size:clamp(2.5rem,7vw,5rem);font-weight:800;letter-spacing:-.06em;margin:0 0 .5rem}
.prog{width:min(280px,60vw);height:3px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:1rem}
.prog i{display:block;height:100%;width:0;background:#fff}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="pin"><div class="stage"><video id="v" src="../stock/media/16-9 Aspect Ratio(video).mp4" muted playsinline></video><div class="shade"></div><div class="copy"><h1>Scroll to play</h1><div class="prog"><i id="p"></i></div></div></div></div>
<script>const pin=document.querySelector('.pin'),v=document.getElementById('v'),p=document.getElementById('p');addEventListener('scroll',()=>{const r=pin.getBoundingClientRect();const pr=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));if(v.duration)v.currentTime=pr*v.duration;p.style.width=(pr*100)+'%'},{passive:true});</script>
</body>
</html>
