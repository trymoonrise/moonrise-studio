<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1472
    slug: scroll-section-reveal
    title: Section Reveal Scroll
    category: scroll-sections
    tags: scroll, reveal, sections
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1472 — Section Reveal Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#fafafa;color:#111}.sec{min-height:100vh;display:grid;place-items:center;padding:2rem}.block{max-width:500px;padding:2.5rem;border-radius:20px;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.06);opacity:0;transform:translateY(60px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}.block.vis{opacity:1;transform:none}.block h2{font-size:1.8rem;margin-bottom:.75rem}.block p{color:#666;line-height:1.7}
  </style>
</head>
<body>
<section class="sec"><div class="block"><h2>Vision</h2><p>Each section fades and rises into view as you scroll down the page.</p></div></section><section class="sec"><div class="block"><h2>Craft</h2><p>Each section fades and rises into view as you scroll down the page.</p></div></section><section class="sec"><div class="block"><h2>Impact</h2><p>Each section fades and rises into view as you scroll down the page.</p></div></section>
<script>const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.3});document.querySelectorAll('.block').forEach(b=>obs.observe(b));</script>
</body>
</html>
