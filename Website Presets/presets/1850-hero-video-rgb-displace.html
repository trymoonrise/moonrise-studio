<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1850
    slug: hero-video-rgb-displace
    title: RGB Displace Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1850 — RGB Displace Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
.base,.c,.m{position:absolute;inset:0}
video{width:100%;height:100%;object-fit:cover}
.c video{filter:url(#cyan);mix-blend-mode:screen;opacity:.45}
.m video{mix-blend-mode:screen;opacity:.4;filter:hue-rotate(280deg) saturate(2)}
.copy{position:relative;z-index:3;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem;pointer-events:none}
h1{font-size:clamp(2.8rem,10vw,6.5rem);font-weight:800;letter-spacing:-.08em;margin:0}
p{font:500 .65rem 'DM Mono',monospace;letter-spacing:.25em;text-transform:uppercase;opacity:.5;margin:1rem 0 0}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="base"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="c" id="c"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="m" id="m"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="copy"><h1>SPECTRAL</h1><p>Move to separate channels</p></div></div>
<script>const s=document.getElementById('s'),c=document.getElementById('c'),m=document.getElementById('m');s.onmousemove=e=>{const x=(e.clientX/innerWidth-.5)*24,y=(e.clientY/innerHeight-.5)*16;c.style.transform='translate('+(-x)+'px,'+(-y)+'px)';m.style.transform='translate('+x+'px,'+y+'px)'};s.onmouseleave=()=>{c.style.transform=m.style.transform=''};</script>
</body>
</html>
