<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0964
    slug: errors-form-error-04
    title: Form Error 04
    category: errors
    tags: errors, form
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0964 — Form Error 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#0f1115;font-family:Manrope,sans-serif;color:#e8eaef;overflow:hidden}
    form{width:min(400px,100%);position:relative}
    h1{font-family:Unbounded,sans-serif;font-size:1.4rem;margin:0 0 1.5rem;font-weight:800}
    .field{margin-bottom:1.25rem;transition:transform .6s cubic-bezier(.68,-.55,.27,1.55),opacity .4s}
    .field.eject{animation:eject .8s cubic-bezier(.68,-.55,.27,1.55) forwards}
    label{display:block;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;opacity:.5}
    input{width:100%;padding:.85rem 1rem;border:2px solid #2a2e38;border-radius:10px;background:#1a1d24;color:#fff;font:inherit;outline:none}
    input:focus{border-color:#6c8cff}
    input.bad{border-color:#ff3b5c;animation:reject .35s ease-in-out 3}
    .banner{
      margin-bottom:1.5rem;padding:1rem;border-radius:12px;background:#ff3b5c;color:#fff;
      font-family:Unbounded,sans-serif;font-size:.85rem;font-weight:700;text-align:center;
      animation:slam .5s cubic-bezier(.16,1,.3,1) both, throb 1.5s ease-in-out .5s infinite;
    }
    button{width:100%;padding:1rem;border:0;border-radius:10px;background:#6c8cff;color:#fff;font:700 .85rem Manrope,sans-serif;cursor:pointer}
    @keyframes eject{0%{transform:translate(0) rotate(0);opacity:1}100%{transform:translate(120vw,-40vh) rotate(720deg);opacity:0}}
    @keyframes reject{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
    @keyframes slam{from{transform:scale(2) rotate(-5deg);opacity:0}to{transform:none;opacity:1}}
    @keyframes throb{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
    @media (prefers-reduced-motion:reduce){.banner,input.bad,.field.eject{animation:none}}
  </style>
</head>
<body>
  <form id="f" onsubmit="return false">
    <div class="banner" role="alert">FORM REJECTED — FIELDS WILL BE EJECTED</div>
    <h1>Join the waitlist</h1>
    <div class="field" data-eject>
      <label>Full name</label>
      <input class="bad" value="x" aria-invalid="true">
    </div>
    <div class="field" data-eject>
      <label>Email</label>
      <input class="bad" value="nope" aria-invalid="true">
    </div>
    <div class="field" data-eject>
      <label>Company</label>
      <input class="bad" value="???">
    </div>
    <button type="button" id="go">Force submit</button>
  </form>
  <script>
    document.getElementById('go').addEventListener('click',()=>{
      [...document.querySelectorAll('[data-eject]')].forEach((el,i)=>{
        setTimeout(()=>el.classList.add('eject'),i*180);
      });
    });
  </script>
</body>
</html>
