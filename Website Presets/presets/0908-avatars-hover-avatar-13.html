<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0908
    slug: avatars-hover-avatar-13
    title: Hover Avatar 13
    category: avatars
    tags: avatars, hover, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0908 — Hover Avatar 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#121212;overflow:hidden;font-family:'DM Mono',monospace}
    .stage{min-height:100vh;display:grid;place-items:center}
    .unit{display:flex;flex-direction:column;align-items:center;gap:0;cursor:default}
    .av{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.4);overflow:hidden;transition:transform .45s cubic-bezier(.22,.61,.36,1);background:#1a1a1a}
    .av img{width:100%;height:100%;object-fit:cover;filter:grayscale(1);transition:filter .45s ease}
    .reveal{width:0;overflow:hidden;height:1.4rem;margin-top:0;opacity:0;transition:width .5s cubic-bezier(.22,.61,.36,1),opacity .35s ease,margin-top .4s ease;border-top:1px solid transparent}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 14s linear infinite;font-family:'Instrument Serif',serif;font-style:italic;font-size:1rem;color:#f0eee8}
    .unit:hover .av,.unit:focus-within .av{transform:scale(1.06)}
    .unit:hover .av img,.unit:focus-within .av img{filter:grayscale(0)}
    .unit:hover .reveal,.unit:focus-within .reveal{width:min(220px,70vw);opacity:1;margin-top:1rem;border-top-color:rgba(255,255,255,.15);padding-top:.75rem}
    @keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.track,.av,.reveal,.av img{animation:none;transition:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="unit" tabindex="0">
      <div class="av"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div>
      <div class="reveal" aria-hidden="true"><div class="track"><span>Hover to meet · Nora Vale · Hover to meet · Nora Vale · </span><span>Hover to meet · Nora Vale · Hover to meet · Nora Vale · </span></div></div>
    </div>
  </div>
</body>
</html>
