<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1458
    slug: scroll-deck-fan
    title: Deck Fan on Scroll
    category: scroll-stack
    tags: scroll, cards, fan
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1458 - Deck Fan on Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#1a1a2e;color:#fff}.scene{height:300vh;position:relative}.deck{position:sticky;top:0;height:100vh;display:grid;place-items:center}.card{position:absolute;width:200px;height:280px;border-radius:16px;display:grid;place-items:center;font-weight:800;font-size:1.2rem;color:#fff;box-shadow:0 20px 50px rgba(0,0,0,.4);transition:none;will-change:transform}.card:nth-child(1){background:#6c8cff}.card:nth-child(2){background:#ff6cb0}.card:nth-child(3){background:#6cffb8;color:#111}.card:nth-child(4){background:#f59e0b;color:#111}.card:nth-child(5){background:#764ba2}
  </style>
</head>
<body>
<div class="scene"><div class="deck"><div class="card">A</div><div class="card">B</div><div class="card">C</div><div class="card">D</div><div class="card">E</div></div></div>
<script>const cards=[...document.querySelectorAll('.card')];const scene=document.querySelector('.scene');function u(){const r=scene.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-window.innerHeight)));cards.forEach((c,i)=>{const spread=(i-(cards.length-1)/2)*28*p;const rot=(i-(cards.length-1)/2)*8*p;const y=i*4*(1-p);c.style.transform='translateX('+spread+'px) rotate('+rot+'deg) translateY('+y+'px)';});}addEventListener('scroll',u,{passive:true});u();</script>
</body>
</html>
