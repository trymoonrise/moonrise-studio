<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0073
    slug: animated-chevron-dropdown
    title: Animated Chevron Dropdown
    category: dropdowns
    tags: chevron
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0073 - Animated Chevron Dropdown</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa} .acc{max-width:360px;width:100%;border:1px solid #eee;border-radius:12px;overflow:hidden} .head{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fff;font-weight:600} .head .ch{transition:transform .3s} .head.open .ch{transform:rotate(180deg)} .body{max-height:0;overflow:hidden;transition:max-height .3s;background:#fafafa} .body.open{max-height:120px} .body p{padding:1rem 1.25rem;color:#666;font-size:.9rem}
  </style>
</head>
<body>
<div class="acc"><div class="head" id="h">Account Settings <span class="ch">▾</span></div><div class="body" id="b"><p>Manage your profile, password, and notifications.</p></div></div>
<script>const h=document.getElementById('h'),b=document.getElementById('b');h.onclick=()=>{h.classList.toggle('open');b.classList.toggle('open');};</script>
</body>
</html>
