<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1424 - Hover Lift Blur Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f0f4ff;padding:2rem}.card{width:280px;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:transform .3s,box-shadow .3s;cursor:pointer}.card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(108,140,255,.15)}img{width:100%;aspect-ratio:16/10;object-fit:cover;transition:filter .3s}.card:hover img{filter:blur(2px) brightness(.9)}.body{padding:1rem}h3{font-size:1rem}
  </style>
</head>
<body>
<div class="card"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><div class="body"><h3>Lift & Blur</h3></div></div>
