<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1796
    slug: staggered-grid-vortex-spiral
    title: Vortex Spiral Grid
    category: animation
    tags: grid, stagger, vortex, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1796 - Vortex Spiral Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#080808;color:#fff;font-family:"DM Sans",system-ui,sans-serif;display:grid;place-items:center;overflow:hidden;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tile,.cell,.brick,.module,.card,.panel{opacity:1!important;transform:none!important;clip-path:none!important;filter:none!important}}
    .wrap{width:min(880px,100%);text-align:center}
    h1{margin:0 0 .4rem;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2rem,6vw,4rem);font-weight:800;letter-spacing:-.06em}
    p{margin:0 0 2rem;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:#555}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;perspective:900px}
    .tile{aspect-ratio:1;background:#111;border:1px solid #1e1e1e;opacity:0;transform:rotate(var(--a)) translateY(var(--d)) scale(.2);animation:vortex .95s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*55ms)}
    .tile span{display:grid;place-items:center;height:100%;font-family:"Syne",system-ui,sans-serif;font-weight:700;font-size:.85rem;opacity:.4}
    @keyframes vortex{to{opacity:1;transform:none}}
    @media(max-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<main class="wrap"><h1>Vortex spiral</h1><p>From chaos orbit to grid lock</p><section class="grid" id="g"></section></main>
<script>const g=document.getElementById('g');for(let i=0;i<15;i++){const t=document.createElement('div');t.className='tile';t.innerHTML='<span>'+String(i+1).padStart(2,'0')+'</span>';
      t.style.setProperty('--i',i+1);t.style.setProperty('--a',(i*48-180)+'deg');t.style.setProperty('--d',(180+i*12)+'px');g.appendChild(t);}</script>
</body>
</html>
