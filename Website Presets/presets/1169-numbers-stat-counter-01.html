<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1169
    slug: numbers-stat-counter-01
    title: Odometer Stat Counter
    category: numbers
    tags: numbers, stat, odometer, counter
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1169 - Odometer Stat Counter</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d11;color:#e6e9ef;font-family:Outfit,sans-serif;padding:2rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;text-align:center;max-width:600px;width:100%}
    .stat{padding:1.5rem;border:1px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.02)}
    .odometer{display:flex;justify-content:center;gap:2px;margin-bottom:.5rem;overflow:hidden;height:3.2rem}
    .digit{width:28px;height:3.2rem;overflow:hidden;position:relative}
    .digit-inner{display:flex;flex-direction:column;transition:transform 1.2s cubic-bezier(.16,1,.3,1)}
    .digit-inner span{height:3.2rem;display:grid;place-items:center;font-family:Syne,sans-serif;font-size:2.8rem;font-weight:800;color:#38bdf8;letter-spacing:-.04em}
    .label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(230,233,239,.4)}
    .stat:nth-child(2) .digit-inner span{color:#22d3ee}
    .stat:nth-child(3) .digit-inner span{color:#94a3b8}
    @media(max-width:520px){.stats{grid-template-columns:1fr}}
    @media(prefers-reduced-motion:reduce){.digit-inner{transition:none}}
  </style>
</head>
<body>
  <div class="stats">
    <div class="stat"><div class="odometer" data-val="847"></div><div class="label">Active users</div></div>
    <div class="stat"><div class="odometer" data-val="99"></div><div class="label">Uptime %</div></div>
    <div class="stat"><div class="odometer" data-val="24"></div><div class="label">Regions</div></div>
  </div>
  <script>
    document.querySelectorAll('.odometer').forEach(el=>{
      const v=String(el.dataset.val).padStart(3,'0');
      el.innerHTML=[...v].map(d=>`<div class="digit"><div class="digit-inner">${[...Array(10).keys()].map(n=>`<span>${n}</span>`).join('')}</div></div>`).join('');
      requestAnimationFrame(()=>el.querySelectorAll('.digit-inner').forEach((inner,i)=>{inner.style.transform=`translateY(-${+v[i]*3.2}rem)`}));
    });
  </script>
</body>
</html>
