<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0277
    slug: clients-marquee-logos
    title: Marquee Client Logos
    category: clients
    tags: clients, marquee
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0277 - Marquee Client Logos</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: #06070c;
      font-family: Syne, sans-serif;
      perspective: 900px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(180, 80, 255, 0.18), transparent 45%),
        radial-gradient(circle at 20% 80%, rgba(0, 255, 200, 0.1), transparent 40%);
      pointer-events: none;
      animation: aura 7s ease-in-out infinite alternate;
    }

    .orbit {
      position: relative;
      width: min(85vw, 640px);
      height: min(85vw, 640px);
      transform-style: preserve-3d;
      transform: rotateX(62deg);
      animation: tilt-sway 10s ease-in-out infinite;
    }

    .ring {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      animation: spin 14s linear infinite;
    }

    .logo {
      --r: min(34vw, 250px);
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(96px, 16vw, 130px);
      height: clamp(96px, 16vw, 130px);
      margin: calc(clamp(96px, 16vw, 130px) / -2);
      display: grid;
      place-items: center;
      font-size: clamp(0.8rem, 2vw, 1.05rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0a0a0a;
      border-radius: 30% 70% 50% 50% / 50% 40% 60% 50%;
      transform-style: preserve-3d;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
      animation: morph 5s ease-in-out infinite;
    }

    .logo span {
      transform: rotateX(-62deg);
      position: relative;
      z-index: 1;
    }

    .logo:nth-child(1) { transform: rotate(0deg) translateY(calc(var(--r) * -1)) rotate(0deg); background: linear-gradient(135deg, #ff6b9d, #c44cff); }
    .logo:nth-child(2) { transform: rotate(60deg) translateY(calc(var(--r) * -1)) rotate(-60deg); background: linear-gradient(135deg, #6bffd3, #4ccfff); animation-delay: -0.8s; }
    .logo:nth-child(3) { transform: rotate(120deg) translateY(calc(var(--r) * -1)) rotate(-120deg); background: linear-gradient(135deg, #ffe66b, #ff9f4c); animation-delay: -1.6s; }
    .logo:nth-child(4) { transform: rotate(180deg) translateY(calc(var(--r) * -1)) rotate(-180deg); background: linear-gradient(135deg, #6b8cff, #b06bff); animation-delay: -2.4s; }
    .logo:nth-child(5) { transform: rotate(240deg) translateY(calc(var(--r) * -1)) rotate(-240deg); background: linear-gradient(135deg, #ff4c6b, #ff8c4c); animation-delay: -3.2s; }
    .logo:nth-child(6) { transform: rotate(300deg) translateY(calc(var(--r) * -1)) rotate(-300deg); background: linear-gradient(135deg, #4cffb0, #6bff6b); animation-delay: -4s; }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 110px;
      height: 110px;
      margin: -55px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #666 50%, #111);
      box-shadow: 0 0 60px rgba(196, 76, 255, 0.45);
      display: grid;
      place-items: center;
      transform: rotateX(-62deg);
      animation: pulse 3s ease-in-out infinite;
      z-index: 2;
    }

    .core strong {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: #111;
    }

    .disc {
      position: absolute;
      inset: 12%;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      transform: translateZ(-20px);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes tilt-sway {
      0%, 100% { transform: rotateX(62deg) rotateZ(-4deg); }
      50% { transform: rotateX(55deg) rotateZ(4deg); }
    }

    @keyframes morph {
      0%, 100% { border-radius: 30% 70% 50% 50% / 50% 40% 60% 50%; filter: brightness(1); }
      50% { border-radius: 60% 40% 30% 70% / 40% 70% 30% 60%; filter: brightness(1.2) saturate(1.3); }
    }

    @keyframes pulse {
      0%, 100% { transform: rotateX(-62deg) scale(1); }
      50% { transform: rotateX(-62deg) scale(1.12); }
    }

    @keyframes aura {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ring, .orbit, .logo, .core, body::before { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="orbit" aria-label="Orbiting client logos">
    <div class="disc" aria-hidden="true"></div>
    <div class="core"><strong>CLIENTS</strong></div>
    <div class="ring">
      <div class="logo"><span>Acme</span></div>
      <div class="logo"><span>Beta</span></div>
      <div class="logo"><span>Core</span></div>
      <div class="logo"><span>Delta</span></div>
      <div class="logo"><span>Echo</span></div>
      <div class="logo"><span>Foxtrot</span></div>
    </div>
  </div>
</body>
</html>
