<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#fafafa;padding:3rem 2rem 6rem}.grid{max-width:900px;margin:0 auto;columns:3;column-gap:16px}.item{break-inside:avoid;margin-bottom:16px;border-radius:12px;overflow:hidden;opacity:0;transform:translateY(30px);transition:opacity .7s cubic-bezier(.22,.61,.36,1),transform .7s cubic-bezier(.22,.61,.36,1)}.item.vis{opacity:1;transform:none}.item img{width:100%;display:block}.item:nth-child(3n+2){margin-top:24px}
  </style>

<body>
<div class="grid"><div class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="aspect-ratio:16/10;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="aspect-ratio:16/10;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="aspect-ratio:16/10;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div><div class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="aspect-ratio:4/5;object-fit:cover;width:100%"></div></div>
<script>const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.15});document.querySelectorAll('.item').forEach((el,i)=>{el.style.transitionDelay=i*.08+'s';obs.observe(el);});</script>
</body>
