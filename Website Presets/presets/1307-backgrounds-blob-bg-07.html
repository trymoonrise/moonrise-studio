<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1307 - Blob Bg 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#f6f6f6;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .blob{position:absolute;width:min(70vw,480px);height:min(70vw,480px);background:#111;opacity:.08;filter:blur(2px);animation:morph 10s ease-in-out infinite;left:50%;top:50%;translate:-50% -50%}
    .blob--2{width:min(50vw,340px);height:min(50vw,340px);opacity:.06;animation-duration:14s;animation-direction:reverse;background:#000}
    @keyframes morph{0%,100%{border-radius:42% 58% 60% 40%/45% 40% 60% 55%;transform:rotate(0deg)}50%{border-radius:60% 40% 35% 65%/55% 60% 40% 45%;transform:rotate(12deg)}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="blob" aria-hidden="true"></div><div class="blob blob--2" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Blob morph</h1><p class="sub">Ink shapes breathe.</p></div>

</body>
</html>
