<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1631
    slug: ease-in-hero-headline
    title: Hero Headline Ease
    category: ease-in
    tags: ease-in, hero, headline, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1631 — Hero Headline Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#fafafa;display:grid;place-items:center;padding:3rem 2rem;font-family:system-ui,sans-serif}.wrap{max-width:640px;text-align:center}.eyebrow{font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:#6c8cff;font-weight:600;margin-bottom:1.25rem;opacity:0;transform:translateY(16px);animation:up .7s cubic-bezier(.22,.61,.36,1) .1s forwards}h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;line-height:1.12;color:#111;margin-bottom:1rem}.line{display:block;overflow:hidden}.line span{display:block;transform:translateY(110%);animation:rise .9s cubic-bezier(.22,.61,.36,1) forwards}.line:nth-child(1) span{animation-delay:.2s}.line:nth-child(2) span{animation-delay:.35s}p{color:#666;font-size:1.05rem;line-height:1.6;max-width:42ch;margin:1.5rem auto 0;opacity:0;animation:fade .8s cubic-bezier(.22,.61,.36,1) .55s forwards}@keyframes rise{to{transform:none}}@keyframes up{to{opacity:1;transform:none}}@keyframes fade{to{opacity:1}}@media (prefers-reduced-motion:reduce){.eyebrow,h1 span,p{opacity:1;transform:none;animation:none}}
  </style>
</head>
<body>
<div class="wrap"><p class="eyebrow">Studio Arc</p><h1><span class="line"><span>Design with</span></span><span class="line"><span>intention</span></span></h1><p>Polished headline reveal with staggered line ease for landing pages.</p></div>

</body>
</html>
