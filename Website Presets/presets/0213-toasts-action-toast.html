<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0213
    slug: toasts-action-toast
    title: Action Toast
    category: toasts
    tags: toasts, action
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0213 - Action Toast</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa}.btn{padding:10px 24px;background:#6c8cff;color:#fff;border:none;border-radius:8px;cursor:pointer}.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 20px;border-radius:10px;display:flex;align-items:center;gap:16px;font-size:.85rem;opacity:0;transition:all .3s}.toast.show{transform:translateX(-50%);opacity:1}.toast button{background:none;border:none;color:#6c8cff;cursor:pointer;font-weight:600}
  </style>
</head>
<body>
<button class="btn" id="b">Undo Action</button><div class="toast" id="t">Item deleted <button id="u">Undo</button></div>
<script>document.getElementById('b').onclick=()=>{const t=document.getElementById('t');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);};document.getElementById('u').onclick=()=>document.getElementById('t').classList.remove('show');</script>
</body>
</html>
