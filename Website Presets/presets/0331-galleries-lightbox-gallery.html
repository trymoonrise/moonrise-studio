<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0331
    slug: galleries-lightbox-gallery
    title: Lightbox Gallery

    tags: galleries, lightbox
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0331 - Lightbox Gallery</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#111;padding:2rem}.grid{display:grid;grid-template-columns:repeat(3,100px);gap:8px}.thumb{border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:1}.thumb img{width:100%;height:100%;object-fit:cover;transition:opacity .2s}.thumb:hover img{opacity:.8}.lb{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;place-items:center;z-index:10;cursor:pointer}.lb.open{display:grid}.lb img{max-width:90vw;max-height:90vh;border-radius:8px}
  </style>
</head>
<body>
<div class="grid"><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="thumb" data-s="../stock/media/16-9 Aspect Ratio(image).png"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div><div class="lb" id="lb"><img src="" id="lbi" alt=""></div>
<script>const lb=document.getElementById('lb'),lbi=document.getElementById('lbi');document.querySelectorAll('.thumb').forEach(t=>t.onclick=()=>{lbi.src=t.dataset.s;lb.classList.add('open');});lb.onclick=()=>lb.classList.remove('open');</script>
</body>
</html>
