<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1594
    slug: 3d-layered-squares
    title: 3D Layered Squares
    category: 3d-effects
    tags: 3d, layered, squares
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1594 - 3D Layered Squares</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#05060a;color:#fff;font-family:Syne,sans-serif;perspective:1200px;overflow:hidden}
    .stack{position:relative;width:min(280px,60vw);aspect-ratio:1;transform-style:preserve-3d;animation:tumble 12s linear infinite;cursor:pointer}
    .layer{position:absolute;inset:0;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(145deg,var(--a),var(--b));box-shadow:0 20px 60px rgba(0,0,0,.35),inset 0 0 40px rgba(255,255,255,.04);transform:translateZ(calc(var(--i)*42px)) scale(calc(1 - var(--i)*.04));transition:transform .5s cubic-bezier(.16,1,.3,1)}
    .stack:hover .layer{transform:translateZ(calc(var(--i)*72px)) scale(calc(1 - var(--i)*.03)) rotateZ(calc(var(--i)*4deg))}
    .layer:nth-child(1){--i:0;--a:#111827;--b:#1f2937}
    .layer:nth-child(2){--i:1;--a:#1e3a5f;--b:#2563eb}
    .layer:nth-child(3){--i:2;--a:#4c1d4a;--b:#db2777}
    .layer:nth-child(4){--i:3;--a:#134e4a;--b:#14b8a6}
    .layer:nth-child(5){--i:4;--a:#713f12;--b:#f59e0b}
    .layer:nth-child(6){--i:5;--a:#ffffff;--b:#e2e8f0}
    .label{position:absolute;inset:0;display:grid;place-items:center;z-index:10;transform:translateZ(260px);pointer-events:none;text-align:center}
    .label h1{margin:0;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:-.04em}
    .label p{margin:.4rem 0 0;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;opacity:.5}
    .burst{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(108,140,255,.15),transparent 40%);opacity:0;transition:opacity .4s}
    .stack:hover ~ .burst{opacity:1}
    @keyframes tumble{to{transform:rotateX(360deg) rotateY(360deg)}}
    @media(prefers-reduced-motion:reduce){.stack{animation:none;transform:rotateX(18deg) rotateY(-18deg)}.layer{transition:none}}
  </style>
</head>
<body>
  <div class="stack" id="stack" aria-label="Layered squares - hover to explode depth">
    <div class="layer"></div><div class="layer"></div><div class="layer"></div>
    <div class="layer"></div><div class="layer"></div><div class="layer"></div>
  </div>
  <div class="burst" aria-hidden="true"></div>
  <div class="label"><div><h1>STRATA</h1><p>Hover to explode</p></div></div>
</body>
</html>
