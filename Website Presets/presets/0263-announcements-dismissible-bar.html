<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0263
    slug: announcements-dismissible-bar
    title: Dismissible Announcement
    category: announcements
    tags: announcements, dismiss
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0263 — Dismissible Announcement</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f3f1ec;font-family:Manrope,sans-serif;perspective:1100px}
    .page{padding:6rem 1.5rem;color:#888;text-align:center}
    .stack{position:fixed;top:1rem;left:50%;width:min(640px,calc(100% - 2rem));transform:translateX(-50%);transform-style:preserve-3d;z-index:20}
    .card{
      position:relative;display:flex;align-items:center;gap:1rem;padding:1rem 1.1rem;
      border-radius:18px;background:#fff;color:#161616;border:1px solid rgba(0,0,0,.06);
      box-shadow:0 18px 40px rgba(20,20,20,.12);transform-origin:top center;transform-style:preserve-3d;
      animation:enter 0.8s cubic-bezier(.16,1,.3,1) both;
    }
    .card.gone{animation:peel 0.7s cubic-bezier(.4,0,.2,1) forwards;pointer-events:none}
    .dot{width:10px;height:10px;border-radius:50%;background:#2f6bff;box-shadow:0 0 0 6px rgba(47,107,255,.12);flex-shrink:0}
    .copy{flex:1;font-size:.9rem;font-weight:600;line-height:1.35}
    .copy span{display:block;margin-top:.2rem;font-size:.75rem;font-weight:500;color:#777}
    .x{appearance:none;border:0;background:#f1f1f1;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;color:#444;transition:transform .2s ease,background .2s}
    .x:hover{background:#e6e6e6;transform:rotate(90deg)}
    @keyframes enter{from{opacity:0;transform:rotateX(-28deg) translateY(-30px)}to{opacity:1;transform:rotateX(0) translateY(0)}}
    @keyframes peel{to{opacity:0;transform:rotateX(-75deg) translateY(-40px) scale(.96)}}
    @media (prefers-reduced-motion:reduce){.card{animation:none}.card.gone{opacity:0}}
  </style>
</head>
<body>
  <div class="stack">
    <div class="card" id="card" role="status">
      <span class="dot" aria-hidden="true"></span>
      <div class="copy">Workspace sync is ready<span>Your team can join the shared board now.</span></div>
      <button class="x" id="close" type="button" aria-label="Dismiss">×</button>
    </div>
  </div>
  <p class="page">Dismiss peels the notice away in 3D.</p>
  <script>
    const card=document.getElementById('card');
    document.getElementById('close').addEventListener('click',()=>{
      card.classList.add('gone');
      card.addEventListener('animationend',()=>card.remove(),{once:true});
    });
  </script>
</body>
</html>
