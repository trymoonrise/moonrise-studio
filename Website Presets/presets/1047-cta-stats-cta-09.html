<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1047 — Stats Cta 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .wrap{width:min(100%,520px);text-align:center}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;margin:0 0 1.75rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;border-top:1px solid #eee;border-bottom:1px solid #eee;padding:1.25rem 0}
    .stat strong{display:block;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.6rem,4vw,2rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
    .stat span{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#888}
    .btn{padding:12px 28px;border:none;background:#111;color:#fff;font:inherit;font-weight:600;font-size:.88rem;cursor:pointer;transition:letter-spacing .3s}
    .btn:hover{letter-spacing:.04em}
  </style>
</head>
<body>
<div class="wrap"><h2>Trusted by teams who ship</h2><div class="stats"><div class="stat"><strong id="a">0</strong><span>Presets</span></div><div class="stat"><strong id="b">0</strong><span>Teams</span></div><div class="stat"><strong id="c">0</strong><span>Countries</span></div></div><button class="btn" type="button">Start free</button></div>
<script>function count(el,to,ms){const t0=performance.now();function tick(now){const p=Math.min(1,(now-t0)/ms);el.textContent=Math.floor(to*(1-Math.pow(1-p,3))).toLocaleString();if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}count(document.getElementById('a'),1600,1400);count(document.getElementById('b'),420,1600);count(document.getElementById('c'),38,1200);</script>
</body>
</html>
