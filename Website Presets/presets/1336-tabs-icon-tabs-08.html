<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1336 - Icon Tabs 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#ffff00}.tabs{display:flex;gap:4px;background:#ffffff;padding:4px;border-radius:12px}.tab{padding:10px 20px;border:none;background:transparent;color:#333333;border-radius:8px;cursor:pointer;font-size:.9rem}.tab.on{background:#ff0000;color:#ffff00;font-weight:600}.panel{margin-top:1rem;color:#000000}
  </style>
</head>
<body>
<div><div class="tabs"><button class="tab on">A</button><button class="tab">B</button><button class="tab">C</button></div><div class="panel" id="p">Tab A - Icon Tabs 948</div></div>
<script>document.querySelectorAll('.tab').forEach((t,i)=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('p').textContent='Tab '+t.textContent+' - Icon Tabs 948';});</script>
</body>
</html>
