<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0514
    slug: brutalist-tape-label-11
    title: Tape Label 11
    category: brutalist
    tags: brutalist, tape
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0514 — Tape Label 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1a1a1a;overflow:hidden;font-family:'IBM Plex Mono',monospace;padding:2rem}
    .box{position:relative;width:min(420px,90vw);aspect-ratio:1;background:#f2efe6;border:6px solid #000;display:grid;place-items:center;overflow:hidden}
    .box::before{content:"FRAGILE";position:absolute;inset:0;display:grid;place-items:center;font-family:'Archivo Black',sans-serif;font-size:clamp(3rem,14vw,5.5rem);letter-spacing:-.04em;color:rgba(0,0,0,.06);transform:rotate(-24deg);pointer-events:none}
    .tape{position:absolute;left:-20%;right:-20%;height:64px;background:repeating-linear-gradient(90deg,#111 0 18px,#ffee00 18px 36px);border-top:4px solid #000;border-bottom:4px solid #000;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:clamp(1rem,4vw,1.4rem);letter-spacing:.2em;text-transform:uppercase;color:#000;transform:rotate(-18deg);box-shadow:0 8px 0 rgba(0,0,0,.35);animation:peel 4s ease-in-out infinite}
    .tape.b{top:auto;bottom:28%;transform:rotate(12deg);background:repeating-linear-gradient(90deg,#ff0033 0 18px,#111 18px 36px);color:#fff;animation-delay:-2s}
    .label{position:relative;z-index:2;background:#fff;border:4px solid #000;padding:1rem 1.25rem;max-width:70%;transform:rotate(3deg);box-shadow:8px 8px 0 #000}
    .label h1{margin:0;font-family:'Archivo Black',sans-serif;font-size:1.6rem;text-transform:uppercase;letter-spacing:-.02em;line-height:.95}
    .label p{margin:.5rem 0 0;font-size:.7rem;line-height:1.4}
    @keyframes peel{0%,100%{translate:0 0}50%{translate:8px -4px}}
    @media(prefers-reduced-motion:reduce){.tape{animation:none}}
  </style>
</head>
<body>
  <div class="box">
    <div class="tape">// CAUTION // CAUTION //</div>
    <div class="tape b">// HANDLE RAW //</div>
    <div class="label">
      <h1>Tape<br>Label</h1>
      <p>Contents: one idea, poorly packed, perfectly brutal.</p>
    </div>
  </div>
</body>
</html>
