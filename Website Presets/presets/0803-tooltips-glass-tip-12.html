<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0803
    slug: tooltips-glass-tip-12
    title: Glass Tip 12
    category: tooltips
    tags: tooltips, glass
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0803 - Glass Tip 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#121212;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;position:relative;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .blob{position:absolute;width:40vmax;height:40vmax;border-radius:50%;filter:blur(70px);pointer-events:none}
    .blob--a{background:#333;top:-15%;left:-10%}.blob--b{background:#1a1a1a;bottom:-20%;right:-10%}
    .wrap{position:relative;z-index:1}
    .btn{padding:12px 28px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);backdrop-filter:blur(12px);color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer}
    .tip{position:absolute;bottom:calc(100% + 12px);left:50%;translate:-50% 6px;padding:10px 16px;background:rgba(255,255,255,.1);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.8rem;font-weight:500;white-space:nowrap;opacity:0;visibility:hidden;transition:opacity .3s,translate .3s cubic-bezier(.22,1,.36,1),visibility .3s}
    .wrap:hover .tip{opacity:1;visibility:visible;translate:-50% 0}
  </style>
</head>
<body>
<div class="blob blob--a" aria-hidden="true"></div><div class="blob blob--b" aria-hidden="true"></div><div class="wrap"><button class="btn" type="button">Frosted</button><div class="tip" role="tooltip">Glass over soft motion</div></div>

</body>
</html>
