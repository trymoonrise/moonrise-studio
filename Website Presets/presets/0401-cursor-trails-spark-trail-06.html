<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0401
    slug: cursor-trails-spark-trail-06
    title: Spark Trail 06
    category: cursor-trails
    tags: cursor-trails, spark
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0401 - Spark Trail 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{
      margin:0;
      min-height:100vh;
      background:#0b1210;
      color:#e0f0e8;
      cursor:crosshair;
      overflow:hidden;
    }
    canvas{position:fixed;inset:0;pointer-events:none}
    .hint{position:fixed;inset:0;display:grid;place-items:center;color:#6cffb8;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.38;pointer-events:none;user-select:none}
  </style>
</head>
<body>
  <p class="hint" id="hint">Move your cursor</p>
  <canvas id="c" aria-hidden="true"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    const sparks = [];
    let mx = innerWidth / 2;
    let my = innerHeight / 2;
    let pmx = mx;
    let pmy = my;
    let moved = false;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }

    resize();
    addEventListener('resize', resize);

    function spawn(x, y, vx, vy) {
      const speed = Math.hypot(vx, vy);
      const count = Math.min(18, Math.max(4, Math.floor(speed / 4)));
      for (let i = 0; i < count; i += 1) {
        const a = Math.random() * Math.PI * 2;
        const s = (0.6 + Math.random() * 1.4) * (speed * 0.08 + 1.2);
        sparks.push({
          x,
          y,
          vx: vx * 0.12 + Math.cos(a) * s,
          vy: vy * 0.12 + Math.sin(a) * s,
          life: 1,
          r: 1.2 + Math.random() * 1.6,
        });
      }
      if (sparks.length > 420) sparks.splice(0, sparks.length - 420);
    }

    if (!reduced) {
      addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        if (!moved) {
          moved = true;
          hint.style.opacity = '0';
        }
        const vx = mx - pmx;
        const vy = my - pmy;
        pmx = mx;
        pmy = my;
        spawn(mx, my, vx, vy);
      }, { passive: true });

      function frame() {
        ctx.fillStyle = 'rgba(11, 18, 16, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        for (let i = sparks.length - 1; i >= 0; i -= 1) {
          const s = sparks[i];
          s.x += s.vx;
          s.y += s.vy;
          s.vx *= 0.92;
          s.vy *= 0.92;
          s.life -= 0.028 + (1 - s.life) * 0.008;

          if (s.life <= 0.02) {
            sparks.splice(i, 1);
            continue;
          }

          const a = Math.max(0, Math.min(1, s.life));
          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 18);
          g.addColorStop(0, `rgba(108, 255, 184, ${0.55 * a})`);
          g.addColorStop(0.25, `rgba(108, 255, 184, ${0.18 * a})`);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.fillRect(s.x - 18, s.y - 18, 36, 36);

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(224, 255, 244, ${0.65 * a})`;
          ctx.fill();
        }

        ctx.restore();
        requestAnimationFrame(frame);
      }

      frame();
    }
  </script>
</body>
</html>
