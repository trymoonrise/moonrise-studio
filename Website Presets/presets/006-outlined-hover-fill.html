<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 006
    slug: outlined-hover-fill
    title: Outlined Hover Fill
    category: text
    tags: hover, outline
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>006 — Outlined Hover Fill</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Outfit:wght@500&display=swap');

    :root {
      --bg: #0a0c0f;
      --stroke: #e4eaee;
      --fill-a: #ff6b3d;
      --fill-b: #ffc14a;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Outfit, sans-serif;
      background:
        radial-gradient(70% 50% at 50% 40%, #182028 0%, transparent 60%),
        radial-gradient(40% 35% at 80% 70%, rgba(255, 107, 61, 0.14), transparent 55%),
        radial-gradient(35% 30% at 15% 75%, rgba(255, 193, 74, 0.1), transparent 50%),
        var(--bg);
      overflow: hidden;
    }

    .stage {
      text-align: center;
      padding: 2rem;
    }

    .hint {
      margin: 0 0 1.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(216, 224, 228, 0.4);
      transition: color 0.4s ease, letter-spacing 0.5s var(--ease);
    }

    .stage:has(.word:hover) .hint,
    .stage:has(.word:focus-visible) .hint {
      color: rgba(255, 193, 74, 0.8);
      letter-spacing: 0.28em;
    }

    .word {
      position: relative;
      display: inline-block;
      margin: 0;
      padding: 0.1em 0.08em;
      border: 0;
      background: none;
      cursor: pointer;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(3.5rem, 16vw, 9rem);
      font-weight: 800;
      font-variation-settings: 'opsz' 96;
      letter-spacing: -0.05em;
      line-height: 0.9;
      color: transparent;
      -webkit-text-stroke: 2px var(--stroke);
      paint-order: stroke fill;
      transition:
        -webkit-text-stroke-color 0.45s ease,
        transform 0.5s var(--ease),
        filter 0.5s ease;
    }

    .word:hover,
    .word:focus-visible {
      -webkit-text-stroke-color: rgba(228, 234, 238, 0.28);
      transform: translateY(-3px);
      filter: drop-shadow(0 16px 36px rgba(255, 107, 61, 0.3));
      outline: none;
    }

    /* Solid fill layer — rises as a clean mask from the bottom */
    .word__fill {
      position: absolute;
      inset: 0;
      display: block;
      color: transparent;
      -webkit-text-stroke: 0;
      background: linear-gradient(180deg, var(--fill-b) 0%, var(--fill-a) 55%, #e84a2f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-mask-image: linear-gradient(#000 0 0);
      mask-image: linear-gradient(#000 0 0);
      -webkit-mask-size: 100% 0%;
      mask-size: 100% 0%;
      -webkit-mask-position: bottom;
      mask-position: bottom;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      transition:
        -webkit-mask-size 0.75s var(--ease),
        mask-size 0.75s var(--ease);
      pointer-events: none;
      will-change: mask-size, -webkit-mask-size;
    }

    .word:hover .word__fill,
    .word:focus-visible .word__fill {
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }

    /* Soft liquid lip riding the rising fill edge */
    .word__lip {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      filter: blur(5px);
      opacity: 0;
      pointer-events: none;
      transition:
        height 0.75s var(--ease),
        bottom 0.75s var(--ease),
        opacity 0.35s ease;
    }

    .word:hover .word__lip,
    .word:focus-visible .word__lip {
      height: 12px;
      bottom: calc(100% - 8px);
      opacity: 0.7;
      animation: lip-fade 0.75s var(--ease) forwards;
    }

    .ripple {
      position: absolute;
      left: 50%;
      bottom: -0.3em;
      width: 0;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--fill-a), var(--fill-b), transparent);
      transform: translateX(-50%);
      opacity: 0;
      transition: width 0.7s var(--ease), opacity 0.4s ease;
      pointer-events: none;
    }

    .word:hover .ripple,
    .word:focus-visible .ripple {
      width: 105%;
      opacity: 0.85;
    }

    @keyframes lip-fade {
      0%, 70% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .word,
      .word__fill,
      .word__lip,
      .ripple,
      .hint {
        transition: none !important;
        animation: none !important;
      }

      .word:hover,
      .word:focus-visible {
        transform: none;
        -webkit-text-stroke-color: transparent;
        color: var(--fill-a);
      }

      .word__fill {
        -webkit-mask-size: 0% 0%;
        mask-size: 0% 0%;
        opacity: 0;
      }

      .word:hover .word__fill,
      .word:focus-visible .word__fill {
        -webkit-mask-size: 100% 100%;
        mask-size: 100% 100%;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <p class="hint">Hover to fill</p>
    <button class="word" type="button" aria-label="Flood — hover to fill" data-text="FLOOD">
      FLOOD
      <span class="word__fill" aria-hidden="true">FLOOD</span>
      <span class="word__lip" aria-hidden="true"></span>
      <span class="ripple" aria-hidden="true"></span>
    </button>
  </div>
</body>
</html>
