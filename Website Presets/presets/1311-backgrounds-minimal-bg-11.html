<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1311
    slug: backgrounds-minimal-bg-11
    title: Minimal Bg 11
    category: backgrounds
    tags: backgrounds, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1311 - Minimal Bg 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#fafafa;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .hline{position:absolute;left:0;right:0;height:1px;background:#e5e5e5;top:33%}
    .hline--2{top:66%}
    .vline{position:absolute;top:0;bottom:0;width:1px;background:#e5e5e5;left:50%;animation:breathe 5s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
    .mark{position:absolute;width:12px;height:12px;border:1px solid #111;left:calc(50% - 6px);top:calc(33% - 6px);animation:blink 4s steps(1) infinite}
    @keyframes blink{0%,90%{opacity:1}95%{opacity:0}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="hline" aria-hidden="true"></div><div class="hline hline--2" aria-hidden="true"></div><div class="vline" aria-hidden="true"></div><div class="mark" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Minimal</h1><p class="sub">Almost nothing. Almost.</p></div>

</body>
</html>
