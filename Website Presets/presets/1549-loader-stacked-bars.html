<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1549
    slug: loader-stacked-bars
    title: Stacked Bars Loader
    category: loading
    tags: loading, stack, bars
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1549 - Stacked Bars Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa}.stack{display:flex;flex-direction:column-reverse;gap:4px;align-items:center}.bar{width:48px;height:6px;border-radius:3px;background:#ddd;animation:stack .9s ease-in-out infinite}.bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.12s}.bar:nth-child(3){animation-delay:.24s}.bar:nth-child(4){animation-delay:.36s}@keyframes stack{0%,100%{background:#ddd;transform:scaleX(.6)}50%{background:#6c8cff;transform:scaleX(1)}}
  </style>
</head>
<body>
<div class="stack"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>

</body>
</html>
