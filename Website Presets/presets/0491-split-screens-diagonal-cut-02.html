<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0491
    slug: split-screens-diagonal-cut-02
    title: Diagonal Cut 02
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0491 - Diagonal Cut 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#0b0b0f;color:#fff}
    .stage{position:relative;min-height:100vh}
.slice{position:absolute;inset:0;display:grid;place-items:center;overflow:hidden}
.slice.one{background:#7c3aed;clip-path:polygon(0 0,55% 0,35% 100%,0 100%);animation:s1 1.2s cubic-bezier(.22,1,.36,1) both}
.slice.two{background:#111;clip-path:polygon(52% 0,100% 0,100% 100%,32% 100%);animation:s2 1.2s .1s cubic-bezier(.22,1,.36,1) both}
.slice h1{font-size:clamp(2.5rem,9vw,6rem);font-weight:800;letter-spacing:-.07em;margin:0;writing-mode:vertical-rl;transform:rotate(180deg)}
.slice.two h1{writing-mode:horizontal-tb;transform:none}
.blade{position:absolute;width:6px;height:140%;background:#fff;left:42%;top:-20%;transform:rotate(14deg);z-index:3;box-shadow:0 0 30px rgba(255,255,255,.5);animation:blade 1s .2s both}
@keyframes s1{from{clip-path:polygon(0 0,0 0,0 100%,0 100%)}}
@keyframes s2{from{clip-path:polygon(100% 0,100% 0,100% 100%,100% 100%)}}
@keyframes blade{from{transform:rotate(14deg) translateY(-40%);opacity:0}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><div class="slice one"><h1>CUT</h1></div><div class="blade" aria-hidden="true"></div><div class="slice two"><h1>DIAGONAL</h1></div></div>

</body>
</html>
