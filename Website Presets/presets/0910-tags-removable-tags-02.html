<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0910
    slug: tags-removable-tags-02
    title: Chip Dissolve Tags
    category: tags
    tags: tags, removable, dissolve
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0910 - Chip Dissolve Tags</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f1116;font-family:Outfit,sans-serif}.row{display:flex;flex-wrap:wrap;gap:.5rem;max-width:360px;justify-content:center}.tag{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .7rem .4rem .85rem;border-radius:999px;background:#1c2030;color:#c8d0e0;font-size:.85rem;border:1px solid #2a3050;transition:opacity .35s,transform .4s cubic-bezier(.22,1,.36,1),filter .35s}.tag.out{opacity:0;transform:scale(.8);filter:blur(4px)}.x{border:none;background:rgba(255,255,255,.08);color:#889;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:.7rem;line-height:1}
  </style>
</head>
<body>
<div class="row" id="row"><span class="tag">Design <button class="x" aria-label="Remove">×</button></span><span class="tag">Motion <button class="x" aria-label="Remove">×</button></span><span class="tag">Brand <button class="x" aria-label="Remove">×</button></span><span class="tag">Systems <button class="x" aria-label="Remove">×</button></span></div>
<script>document.querySelectorAll('.x').forEach(x=>x.onclick=()=>{const t=x.parentElement;t.classList.add('out');setTimeout(()=>t.remove(),400)});</script>
</body>
</html>
