<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0248
    slug: errors-error-card
    title: Error Card
    category: errors
    tags: errors, card
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0248 — Error Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono:wght@500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1a0a0c;perspective:1200px;font-family:Bricolage Grotesque,sans-serif}
    .card{
      width:min(380px,90vw);padding:2rem;border-radius:20px;position:relative;
      background:linear-gradient(145deg,#2a1014,#1a080a);color:#fff;
      border:1px solid rgba(255,80,80,.3);transform-style:preserve-3d;
      animation:melt 3s ease-in-out infinite;box-shadow:0 40px 80px rgba(255,0,40,.25),0 0 60px rgba(255,40,40,.15);
    }
    .card::before{
      content:'';position:absolute;inset:-2px;border-radius:22px;z-index:-1;
      background:conic-gradient(from var(--a,0deg),#ff2040,#ff8800,#ff2040,#ff0040,#ff2040);
      animation:spin 2s linear infinite;opacity:.6;filter:blur(8px);
    }
    .flame{position:absolute;top:-40px;left:50%;transform:translateX(-50%);font-size:3rem;animation:flame 0.4s ease-in-out infinite alternate;filter:drop-shadow(0 0 20px #ff4400)}
    .badge{display:inline-block;padding:.3rem .7rem;background:#ff2040;color:#fff;font-size:.65rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;border-radius:6px;animation:pulse-badge .6s ease-in-out infinite}
    h2{margin:1rem 0 .5rem;font-size:1.8rem;font-weight:800;letter-spacing:-.03em;animation:wobble 2s ease-in-out infinite}
    p{margin:0;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:rgba(255,200,200,.65);line-height:1.6}
    .stack{margin-top:1.25rem;padding:1rem;background:rgba(0,0,0,.4);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#ff6b6b;line-height:1.7;overflow:hidden;max-height:5.5em;animation:scroll-err 4s linear infinite}
    .btns{display:flex;gap:.6rem;margin-top:1.5rem}
    button{flex:1;padding:.75rem;border:0;border-radius:10px;font:700 .75rem Bricolage Grotesque,sans-serif;cursor:pointer}
    .p{background:#ff2040;color:#fff;animation:shake-btn 2s ease-in-out infinite}
    .g{background:rgba(255,255,255,.08);color:#fff}
    @property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
    @keyframes melt{0%,100%{transform:rotateX(8deg) rotateY(-6deg) rotateZ(-1deg) scale(1)}50%{transform:rotateX(-4deg) rotateY(10deg) rotateZ(2deg) scale(1.04) skewY(1deg)}}
    @keyframes spin{to{--a:360deg}}
    @keyframes flame{from{transform:translateX(-50%) scale(1) rotate(-5deg)}to{transform:translateX(-50%) scale(1.2) rotate(8deg)}}
    @keyframes pulse-badge{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes wobble{0%,100%{transform:skewX(0)}50%{transform:skewX(-3deg)}}
    @keyframes scroll-err{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
    @keyframes shake-btn{0%,90%,100%{transform:translateX(0)}92%{transform:translateX(-4px)}94%{transform:translateX(4px)}96%{transform:translateX(-3px)}98%{transform:translateX(2px)}}
    @media (prefers-reduced-motion:reduce){.card,.flame,.badge,h2,.stack,.p,.card::before{animation:none}}
  </style>
</head>
<body>
  <div class="card" role="alert">
    <div class="flame" aria-hidden="true">🔥</div>
    <span class="badge">Critical failure</span>
    <h2>Something exploded</h2>
    <p>The request caught fire mid-flight. Nothing survived. Absolutely nothing.</p>
    <div class="stack" aria-hidden="true">
      Error: RealityException at core.js:404<br>
      &nbsp;&nbsp;at melt(universe.js:12)<br>
      &nbsp;&nbsp;at explode(chaos.js:99)<br>
      &nbsp;&nbsp;at scream(void.js:1)<br>
      Error: RealityException at core.js:404<br>
      &nbsp;&nbsp;at melt(universe.js:12)<br>
    </div>
    <div class="btns">
      <button class="p" type="button">Panic</button>
      <button class="g" type="button">Ignore</button>
    </div>
  </div>
</body>
</html>
