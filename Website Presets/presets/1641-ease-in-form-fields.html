<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1641
    slug: ease-in-form-fields
    title: Form Fields Stagger Ease
    category: ease-in
    tags: ease-in, form, stagger, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1641 — Form Fields Stagger Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem;font-family:system-ui,sans-serif}.form{width:min(360px,100%)}.field{margin-bottom:14px;opacity:0;transform:translateX(-16px);animation:slide .65s cubic-bezier(.22,.61,.36,1) forwards}.field:nth-child(1){animation-delay:.08s}.field:nth-child(2){animation-delay:.16s}.field:nth-child(3){animation-delay:.24s}.field:nth-child(4){animation-delay:.32s}label{display:block;font-size:.78rem;font-weight:600;color:#555;margin-bottom:6px}input,textarea{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font:inherit;font-size:.9rem;background:#fff}textarea{min-height:80px;resize:vertical}.btn{width:100%;padding:12px;border:none;border-radius:10px;background:#111;color:#fff;font-weight:600;font-size:.9rem;margin-top:6px;opacity:0;animation:slide .65s cubic-bezier(.22,.61,.36,1) .4s forwards}@keyframes slide{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<form class="form"><div class="field"><label>Name</label><input type="text" placeholder="Your name"></div><div class="field"><label>Email</label><input type="email" placeholder="you@company.com"></div><div class="field"><label>Message</label><textarea placeholder="How can we help?"></textarea></div><button class="btn" type="button">Send message</button></form>

</body>
</html>
