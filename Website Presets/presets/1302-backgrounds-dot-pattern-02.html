<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1302
    slug: backgrounds-dot-pattern-02
    title: Halftone Pulse Field
    category: backgrounds
    tags: backgrounds, dot
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1302 — Halftone Pulse Field</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0c10;color:#ececf0;font-family:Outfit,sans-serif;overflow:hidden}
    .field{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:24px 24px;animation:pulse 4s ease-in-out infinite}
    .field::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,transparent 20%,#0c0c10 70%)}
    .card{position:relative;z-index:1;padding:36px 32px;border:1px solid rgba(255,255,255,.1);background:rgba(12,12,16,.85);backdrop-filter:blur(8px);max-width:400px;text-align:center}
    .card h2{font-family:Syne,sans-serif;font-size:1.5rem;margin:0 0 10px;letter-spacing:-.03em}
    .card p{margin:0;font-size:.88rem;color:rgba(236,236,240,.45);line-height:1.5}
    .ripple{position:absolute;width:200px;height:200px;border:1px solid rgba(255,255,255,.08);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:ripple 3s ease-out infinite}
    .ripple:nth-child(2){animation-delay:-1s}.ripple:nth-child(3){animation-delay:-2s}
    @keyframes pulse{0%,100%{background-size:24px 24px;opacity:1}50%{background-size:26px 26px;opacity:.7}}
    @keyframes ripple{0%{transform:translate(-50%,-50%) scale(.5);opacity:.6}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
    @media(prefers-reduced-motion:reduce){.field,.ripple{animation:none}}
  </style>
</head>
<body>
<div class="field"><div class="ripple"></div><div class="ripple"></div><div class="ripple"></div></div>
<article class="card">
  <h2>Halftone pulse</h2>
  <p>Dot grid breathes with radial ripples on a dark field.</p>
</article>
</body>
</html>
