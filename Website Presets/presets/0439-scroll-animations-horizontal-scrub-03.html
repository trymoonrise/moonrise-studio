<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0439
    slug: scroll-animations-horizontal-scrub-03
    title: Horizontal Scrub 03
    category: scroll-animations
    tags: scroll-animations, horizontal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0439 - Horizontal Scrub 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#05070b;color:#e6f3ff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;overflow:hidden}.rail{display:flex;gap:18px;padding:0 10vw;transform:translateX(var(--x,0px));will-change:transform}.tile{width:min(70vw,460px);aspect-ratio:16/10;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:#0b1220;box-shadow:0 16px 60px rgba(0,0,0,.45)}.tile img{width:100%;height:100%;object-fit:cover;filter:saturate(1.15) contrast(1.05)}.cap{position:fixed;left:24px;top:20px;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(230,243,255,.62)}
  </style>
</head>
<body>
<div class="cap">Horizontal scrub</div><div class="track" id="t"><div class="sticky"><div class="rail" id="rail"><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure><figure class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const rail=document.getElementById('rail');addEventListener('scroll',()=>{const p=prog();const max=rail.scrollWidth-innerWidth+innerWidth*.1;rail.style.setProperty('--x',-p*max+'px');},{passive:true});</script>
</body>
</html>
