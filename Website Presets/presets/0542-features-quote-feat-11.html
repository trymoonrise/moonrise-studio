<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0542
    slug: features-quote-feat-11
    title: Quote Feat 11
    category: features
    tags: features, quote
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0542 — Quote Feat 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0e0e0e;color:#fff;font-family:Outfit,sans-serif;padding:2rem}
    .wrap{width:min(640px,100%);position:relative;padding:2rem 0}
    .mark{position:absolute;top:-1.5rem;left:-.5rem;font-family:Syne,sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:800;line-height:.7;opacity:.08;letter-spacing:-.08em;pointer-events:none;animation:sway 8s ease-in-out infinite}
    blockquote{position:relative;margin:0;font-family:Syne,sans-serif;font-size:clamp(1.6rem,4.5vw,2.6rem);font-weight:700;letter-spacing:-.04em;line-height:1.15}
    .who{margin-top:2rem;display:flex;align-items:center;gap:1rem}
    .av{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.25);display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:800;font-size:.75rem}
    .name{font-size:.9rem;font-weight:500}.role{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;opacity:.4;font-weight:300;margin-top:.15rem}
    .line{margin-top:2rem;height:1px;background:linear-gradient(90deg,#fff,transparent);transform:scaleX(0);transform-origin:left;animation:draw 1s cubic-bezier(.22,1,.36,1) .3s forwards}
    @keyframes sway{50%{transform:rotate(4deg)}}
    @keyframes draw{to{transform:scaleX(1)}}
    @media(prefers-reduced-motion:reduce){.mark,.line{animation:none}.line{transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true">&ldquo;</div>
    <blockquote>The feature that wins is the one you barely notice — until it's gone.</blockquote>
    <div class="who">
      <div class="av">IK</div>
      <div><div class="name">Ira Kane</div><div class="role">Product Lead</div></div>
    </div>
    <div class="line" aria-hidden="true"></div>
  </div>
</body>
</html>
