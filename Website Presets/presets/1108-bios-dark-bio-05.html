<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1108
    slug: bios-dark-bio-05
    title: Dark Bio 05
    category: bios
    tags: bios, dark, experimental, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1108 - Dark Bio 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07080a;font-family:'DM Sans',sans-serif;overflow:hidden;padding:2rem}
    .panel{position:relative;width:min(380px,92vw);padding:2rem 1.75rem;animation:in .9s cubic-bezier(.22,1,.36,1) both}
    .cut{position:absolute;inset:0;background:#12151c;clip-path:polygon(0 0,100% 0,100% 78%,88% 100%,0 100%);border:1px solid rgba(255,255,255,.08)}
    .slash{position:absolute;right:-8px;top:20%;width:3px;height:40%;background:#ff6b4a;transform:skewY(-18deg);animation:slash 3.5s ease-in-out infinite}
    .tri{position:absolute;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid #ff6b4a;right:1.5rem;bottom:1.4rem;opacity:.85;animation:spin-tri 8s linear infinite}
    .content{position:relative;z-index:1}
    .badge{display:inline-grid;place-items:center;width:44px;height:44px;background:#ff6b4a;color:#07080a;font-family:Syne,sans-serif;font-weight:800;font-size:.85rem;clip-path:polygon(0 20%,20% 0,100% 0,100% 80%,80% 100%,0 100%);margin-bottom:1.1rem;animation:nudge 4s ease-in-out infinite}
    h1{margin:0;font-family:Syne,sans-serif;font-weight:800;font-size:1.55rem;color:#f5f5f5;letter-spacing:-.03em}
    .role{margin:.35rem 0 0;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,107,74,.75)}
    p{margin:1rem 0 0;font-size:.9rem;line-height:1.5;color:rgba(245,245,245,.55);max-width:32ch}
    @keyframes slash{50%{transform:skewY(-18deg) translateY(8px);opacity:.6}}
    @keyframes spin-tri{to{transform:rotate(360deg)}}
    @keyframes nudge{50%{transform:translate(3px,-2px)}}
    @keyframes in{from{opacity:0;transform:translateX(-16px)}}
    @media (prefers-reduced-motion:reduce){.slash,.tri,.badge,.panel{animation:none}}
  </style>
</head>
<body>
  <div class="panel">
    <div class="cut" aria-hidden="true"></div>
    <span class="slash" aria-hidden="true"></span>
    <span class="tri" aria-hidden="true"></span>
    <div class="content">
      <div class="badge">RX</div>
      <h1>Rex Holt</h1>
      <p class="role">Sound designer</p>
      <p>Cuts silence into rhythm. Builds audio worlds for brands that refuse flat.</p>
    </div>
  </div>
</body>
</html>
