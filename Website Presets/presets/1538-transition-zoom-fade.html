<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1538
    slug: transition-zoom-fade
    title: Zoom Fade Transition
    category: transitions
    tags: transition, zoom, fade
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1538 — Zoom Fade Transition</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;overflow:hidden;position:relative}.layer{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:3rem;font-weight:900;opacity:0;transform:scale(1.15);transition:opacity .6s,transform .6s cubic-bezier(.22,.61,.36,1)}.layer.on{opacity:1;transform:scale(1);z-index:1}.layer:nth-child(1){background:#111}.layer:nth-child(2){background:#6c8cff}.layer:nth-child(3){background:#ff6cb0}.tap{position:fixed;inset:0;z-index:10;cursor:pointer}
  </style>
</head>
<body>
<div class="layer on">01</div><div class="layer">02</div><div class="layer">03</div><div class="tap" id="tap"></div>
<script>const layers=[...document.querySelectorAll('.layer')];let i=0;document.getElementById('tap').onclick=()=>{layers[i].classList.remove('on');i=(i+1)%layers.length;layers[i].classList.add('on');};</script>
</body>
</html>
