<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1720
    slug: staggered-grid-monochrome-gallery
    title: Monochrome Gallery Grid
    category: animation
    tags: grid, stagger, gallery, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1720 - Monochrome Gallery Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:clamp(1rem,4vw,3rem);background:#f8f8f5;color:#090909;font-family:Inter,system-ui,sans-serif}.wrap{width:min(1120px,100%);margin:auto}.title{display:flex;justify-content:space-between;align-items:end;margin-bottom:1.2rem;border-bottom:2px solid #111;padding-bottom:1rem}.title h1{margin:0;font-size:clamp(2.5rem,7vw,6rem);letter-spacing:-.08em;line-height:.8}.title span{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:90px;gap:.65rem}.frame{grid-column:span var(--c);grid-row:span var(--r);background:linear-gradient(135deg,#111,#777);position:relative;overflow:hidden;filter:grayscale(1);opacity:0;clip-path:inset(48% 0 48% 0);animation:reveal .9s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*70ms)}.frame:before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent 0 12px,rgba(255,255,255,.08) 12px 24px),radial-gradient(circle at var(--x) var(--y),#eee,transparent 45%)}.frame:after{content:attr(data-no);position:absolute;left:.75rem;bottom:.6rem;color:#fff;font-size:.7rem;letter-spacing:.12em}.frame:hover{filter:none;transition:filter .25s ease}@keyframes reveal{to{opacity:1;clip-path:inset(0)}}@media(max-width:720px){.title{display:block}.grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:130px}.frame{grid-column:span 1!important;grid-row:span 1!important}}@media(prefers-reduced-motion:reduce){.frame{opacity:1;clip-path:none;animation:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title"><h1>Mono Study</h1><span>hover for color intent</span></div>
    <section class="grid">
      <div class="frame" data-no="001" style="--i:1;--c:5;--r:3;--x:20%;--y:30%"></div>
      <div class="frame" data-no="002" style="--i:2;--c:3;--r:2;--x:70%;--y:20%"></div>
      <div class="frame" data-no="003" style="--i:3;--c:4;--r:3;--x:50%;--y:80%"></div>
      <div class="frame" data-no="004" style="--i:4;--c:4;--r:2;--x:30%;--y:50%"></div>
      <div class="frame" data-no="005" style="--i:5;--c:4;--r:2;--x:80%;--y:60%"></div>
      <div class="frame" data-no="006" style="--i:6;--c:4;--r:2;--x:40%;--y:40%"></div>
    </section>
  </main>
</body>
</html>
