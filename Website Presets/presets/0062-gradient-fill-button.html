<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0062
    slug: gradient-fill-button
    title: Gradient Fill Button
    category: buttons
    tags: gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0062 - Gradient Fill Button</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap');

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, #1a1b22, #0a0a0c 70%);
      font-family: Manrope, sans-serif;
    }

    .btn {
      position: relative;
      isolation: isolate;
      padding: 18px 46px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6c8cff, #b06cff 45%, #ff6cb0);
      background-size: 200% 200%;
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      overflow: hidden;
      animation: drift 6s ease infinite;
      box-shadow:
        0 8px 24px rgba(108, 140, 255, 0.35),
        0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s ease;
    }

    /* Rotating conic glow ring */
    .btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      z-index: -2;
      border-radius: inherit;
      background: conic-gradient(
        from var(--angle),
        #6c8cff, #ff6cb0, #ffd16c, #6cffb8, #6c8cff
      );
      filter: blur(7px);
      opacity: 0;
      transition: opacity 0.35s ease;
      animation: spin 4s linear infinite;
    }

    /* Shimmer sweep */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(
        115deg,
        transparent 20%,
        rgba(255, 255, 255, 0.45) 48%,
        transparent 60%
      );
      background-size: 250% 100%;
      background-position: 150% 0;
      transition: background-position 0.7s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 14px 40px rgba(176, 108, 255, 0.5),
        0 4px 10px rgba(0, 0, 0, 0.35);
    }

    .btn:hover::before { opacity: 1; }

    .btn:hover::after { background-position: -80% 0; }

    .btn:active {
      transform: translateY(-1px) scale(0.99);
      box-shadow:
        0 6px 18px rgba(176, 108, 255, 0.4),
        0 2px 5px rgba(0, 0, 0, 0.35);
    }

    .btn__label {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }

    .btn__arrow {
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn:hover .btn__arrow {
      transform: translateX(4px);
    }

    @keyframes drift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes spin {
      to { --angle: 360deg; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .btn::before { animation: none; }
    }
  </style>
</head>
<body>
  <button class="btn" type="button">
    <span class="btn__label">
      Explore
      <svg class="btn__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </span>
  </button>
</body>
</html>
