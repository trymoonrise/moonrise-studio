<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1523
    slug: experimental-mouse-text-scatter
    title: Scatter Text on Mouse
    category: experimental
    tags: experimental, mouse, text, scatter
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1523 - Scatter Text on Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#111;color:#fff;display:grid;place-items:center}h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;display:flex;flex-wrap:wrap;justify-content:center;gap:.1em;max-width:90vw}.w{display:inline-block;transition:transform .35s cubic-bezier(.22,.61,.36,1)}
  </style>
</head>
<body>
<h1 id="h"><span class="w">MOVE</span> <span class="w">YOUR</span> <span class="w">MOUSE</span></h1>
<script>const words=[...document.querySelectorAll('.w')];addEventListener('mousemove',e=>{words.forEach(w=>{const r=w.getBoundingClientRect();const dx=e.clientX-(r.left+r.width/2);const dy=e.clientY-(r.top+r.height/2);const d=Math.hypot(dx,dy);const push=Math.max(0,150-d)/150;w.style.transform='translate('+(dx/d*push*30||0)+'px,'+(dy/d*push*30||0)+'px)';});});</script>
</body>
</html>
