<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1259
    slug: carousels-infinite-carousel-12
    title: Infinite Carousel 12
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1259 - Infinite Carousel 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0c0c;font-family:'DM Sans',system-ui,sans-serif;color:#fff;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:100vw;overflow:hidden}.label{text-align:center;font-family:Syne,sans-serif;font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:24px}.rail{display:flex;gap:18px;width:max-content;animation:run 28s linear infinite}.rail:hover{animation-play-state:paused}.card{width:220px;height:280px;border-radius:22px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.1);position:relative;transition:transform .4s}.card:hover{transform:translateY(-10px) scale(1.03)}.card img{width:100%;height:100%;object-fit:cover}.card span{position:absolute;left:12px;bottom:12px;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);font-size:.75rem;font-family:Syne,sans-serif;font-weight:700}@keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><p class="label">Infinite drift - hover to pause</p><div class="rail" id="rail">
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>01</span></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(40deg)"><span>02</span></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(90deg)"><span>03</span></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(150deg)"><span>04</span></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(210deg)"><span>05</span></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(270deg)"><span>06</span></div>
</div></div>
<script>
const rail=document.getElementById('rail');rail.innerHTML+=rail.innerHTML;
</script>
</body>
</html>
