<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1545
    slug: loader-pulse-rings
    title: Pulse Rings Loader
    category: loading
    tags: loading, circle, pulse
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1545 - Pulse Rings Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.rings{position:relative;width:64px;height:64px}.ring{position:absolute;inset:0;border-radius:50%;border:2px solid #6c8cff;animation:pulse 1.8s ease-out infinite}.ring:nth-child(2){animation-delay:.4s}.ring:nth-child(3){animation-delay:.8s}@keyframes pulse{0%{transform:scale(.3);opacity:1}100%{transform:scale(1.2);opacity:0}}
  </style>
</head>
<body>
<div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>

</body>
</html>
