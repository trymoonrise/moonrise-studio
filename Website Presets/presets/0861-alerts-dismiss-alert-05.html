<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0861
    slug: alerts-dismiss-alert-05
    title: Dismiss Alert 05
    category: alerts
    tags: alerts, dismiss
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0861 — Dismiss Alert 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background: #101216;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .stack { width: min(100%, 420px); }

    .hint {
      text-align: center;
      margin-bottom: 1.2rem;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    .hint span { color: #ff6b6b; }

    .alert {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.3rem;
      border-radius: 16px;
      background: linear-gradient(135deg, #1c2029, #14161c);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f0f2f6;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      cursor: grab;
      touch-action: pan-y;
      user-select: none;
      overflow: hidden;
      transition: transform 0.05s linear;
    }

    .alert::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #ff6b6b, #ff8e53);
      opacity: 0;
      z-index: -1;
    }

    .alert.dragging { cursor: grabbing; transition: none; }

    .alert.gone {
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
      opacity: 0;
    }

    .icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 12px;
      display: grid; place-items: center;
      background: rgba(255, 107, 107, 0.15);
      font-size: 1.2rem;
    }

    .title { display: block; font-weight: 700; font-size: 0.95rem; }
    .msg { margin: 0.1rem 0 0; font-size: 0.85rem; color: rgba(240, 242, 246, 0.55); }

    .grip { margin-left: auto; display: flex; gap: 3px; opacity: 0.4; }
    .grip i { width: 3px; height: 18px; border-radius: 3px; background: currentColor; }

    .reset {
      display: block;
      margin: 1.4rem auto 0;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .reset.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div class="stack">
    <p class="hint">Swipe the card <span>← →</span> to dismiss</p>
    <div class="alert" id="alert" role="alert">
      <div class="icon" aria-hidden="true">🔔</div>
      <div>
        <strong class="title">Storage almost full</strong>
        <p class="msg">You've used 92% of your plan. Swipe to dismiss.</p>
      </div>
      <div class="grip" aria-hidden="true"><i></i><i></i></div>
    </div>
    <button class="reset" id="reset" type="button">↺ Bring it back</button>
  </div>

  <script>
    const alert = document.getElementById('alert');
    const reset = document.getElementById('reset');
    let startX = 0, dx = 0, dragging = false;

    function down(x) { dragging = true; startX = x; alert.classList.add('dragging'); }
    function move(x) {
      if (!dragging) return;
      dx = x - startX;
      const rot = dx / 20;
      alert.style.transform = 'translateX(' + dx + 'px) rotate(' + rot + 'deg)';
      alert.style.opacity = 1 - Math.min(Math.abs(dx) / 300, 0.8);
    }
    function up() {
      if (!dragging) return;
      dragging = false;
      alert.classList.remove('dragging');
      if (Math.abs(dx) > 120) {
        const dir = dx > 0 ? 1 : -1;
        alert.classList.add('gone');
        alert.style.transform = 'translateX(' + (dir * 600) + 'px) rotate(' + (dir * 30) + 'deg)';
        reset.classList.add('show');
      } else {
        alert.style.transform = '';
        alert.style.opacity = '';
      }
      dx = 0;
    }

    alert.addEventListener('pointerdown', (e) => { down(e.clientX); alert.setPointerCapture(e.pointerId); });
    alert.addEventListener('pointermove', (e) => move(e.clientX));
    alert.addEventListener('pointerup', up);

    reset.addEventListener('click', () => {
      alert.classList.remove('gone');
      alert.style.transform = '';
      alert.style.opacity = '';
      reset.classList.remove('show');
    });
  </script>
</body>
</html>
