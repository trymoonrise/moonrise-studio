<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 047
    slug: moving-grid-lines
    title: Moving Grid Lines
    category: backgrounds
    tags: grid, lines
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>047 - Moving Grid Lines</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#090909;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .grid{position:absolute;inset:-20%;background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);background-size:48px 48px;animation:pan 22s linear infinite;transform:perspective(600px) rotateX(48deg) scale(1.6);transform-origin:center 40%;mask-image:linear-gradient(to bottom,transparent,#000 30%,#000 70%,transparent)}
    @keyframes pan{to{background-position:48px 48px}}
    .fade{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%,transparent 20%,#090909 72%);pointer-events:none}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="grid" aria-hidden="true"></div><div class="fade" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Moving grid</h1><p class="sub">Perspective lines in motion.</p></div>

</body>
</html>
