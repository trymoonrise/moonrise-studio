  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07070a;overflow:hidden;font-family:system-ui;color:#fff}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}.orb{position:fixed;inset:auto;filter:blur(40px);opacity:.75;mix-blend-mode:screen;animation:drift 12s ease-in-out infinite alternate}.o1{width:420px;height:420px;left:-140px;top:10vh;background:radial-gradient(circle,#ff6cb0,transparent 60%)}.o2{width:520px;height:520px;right:-180px;bottom:6vh;background:radial-gradient(circle,#6c8cff,transparent 60%);animation-duration:14s}@keyframes drift{to{transform:translate(80px,-60px) scale(1.05)}}.card{position:relative;width:min(92vw,520px);padding:30px 26px;border-radius:24px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);backdrop-filter:blur(14px);box-shadow:0 24px 80px rgba(0,0,0,.55)}.card::before{content:'';position:absolute;inset:1px;border-radius:23px;background:linear-gradient(135deg,rgba(255,108,176,.28),rgba(108,140,255,.22));opacity:.55;pointer-events:none;mix-blend-mode:screen}h1{font-size:2rem;letter-spacing:-.03em;font-weight:900;position:relative}p{margin-top:.75rem;color:rgba(255,255,255,.72);line-height:1.5;position:relative}.btn{margin-top:1.25rem;display:inline-flex;gap:10px;align-items:center;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.25);color:#fff;font-weight:650;position:relative;cursor:pointer}
  </style>

<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="card"><h1>Glass Card</h1><p>True glass: blur, soft gradients, and a bright edge.</p><span class="btn">Premium feel <span style="opacity:.65">→</span></span></div>

</body>
