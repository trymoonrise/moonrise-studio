<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1857
    slug: hero-video-dual-crossfade
    title: Dual Crossfade Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1857 — Dual Crossfade Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
.layer{position:absolute;inset:0;transition:opacity .8s ease}
.layer video{width:100%;height:100%;object-fit:cover}
.a{opacity:1;z-index:1}.b{opacity:0;z-index:1;filter:hue-rotate(140deg) saturate(1.2)}
.stage.show-b .a{opacity:0}.stage.show-b .b{opacity:1}
.ui{position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(2rem,5vw,4rem)}
h1{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:800;letter-spacing:-.06em;margin:0 0 1rem}
.toggle{display:flex;gap:8px}
.toggle button{padding:.7rem 1.1rem;border-radius:999px;border:1px solid rgba(255,255,255,.3);font-weight:700;transition:.25s}
.toggle button.on,.toggle button:hover{background:#fff;color:#111}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="layer a"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="layer b"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div>
<div class="ui"><h1>Two worlds</h1><div class="toggle"><button class="on" data-side="a">World A</button><button data-side="b">World B</button></div></div></div>
<script>const s=document.getElementById('s');document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');s.classList.toggle('show-b',b.dataset.side==='b')});</script>
</body>
</html>
