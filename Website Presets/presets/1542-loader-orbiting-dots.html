<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1542

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1542 — Orbiting Dots Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.orbit{width:48px;height:48px;position:relative;animation:spin 1.2s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#6c8cff;top:0;left:50%;margin-left:-4px}.dot:nth-child(2){top:auto;bottom:0;background:#ff6cb0}.dot:nth-child(3){top:50%;left:0;margin:0;margin-top:-4px;background:#6cffb8}
  </style>
</head>
<body>
<div class="orbit"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

</body>
</html>
