<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1479
    slug: scroll-counter-reveal
    title: Counter on Scroll
    category: scroll-effects
    tags: scroll, counter, reveal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1479 - Counter on Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0d0d0f;color:#fff;min-height:200vh;display:grid;place-items:center}.stat{text-align:center;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s}.stat.vis{opacity:1;transform:none}.num{font-size:clamp(4rem,15vw,7rem);font-weight:900;color:#6cffb8;font-variant-numeric:tabular-nums;line-height:1}.label{font-size:.85rem;color:#666;margin-top:.5rem;letter-spacing:.15em;text-transform:uppercase}
  </style>
</head>
<body>
<div class="stat" id="s"><div class="num" id="n">0</div><div class="label">Projects shipped</div></div>
<script>const s=document.getElementById('s'),n=document.getElementById('n');const target=250;const obs=new IntersectionObserver(es=>es.forEach(e=>{if(!e.isIntersecting)return;s.classList.add('vis');const t0=performance.now();const dur=2000;(function tick(now){const p=Math.min((now-t0)/dur,1);const ease=1-Math.pow(1-p,3);n.textContent=Math.round(ease*target);if(p<1)requestAnimationFrame(tick);else n.textContent=target;})(t0);}),{threshold:.5});obs.observe(s);</script>
</body>
</html>
