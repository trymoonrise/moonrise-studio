<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0462
    slug: image-scroll-diagonal-drift-12
    title: Diagonal Drift 12
    category: image-scroll
    tags: image-scroll, diagonal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0462 - Diagonal Drift 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#fef3c7;color:#78350f;font-family:ui-serif,Georgia,serif;overflow-x:hidden}.wrap{padding:15vh 0 50vh}.row{display:flex;gap:20px;margin-bottom:24vh;will-change:transform}.row:nth-child(even){flex-direction:row-reverse}.tile{flex:0 0 min(55vw,380px);aspect-ratio:4/3;border-radius:14px;overflow:hidden;box-shadow:0 16px 50px rgba(120,53,15,.15)}.tile img{width:100%;height:100%;object-fit:cover}.head{text-align:center;padding:0 2rem 8vh}.head h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:400;letter-spacing:-.02em}
  </style>
</head>
<body>
<div class="head"><h1>Diagonal drift</h1></div><div class="wrap"><div class="row" data-r="0"><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div><div class="row" data-r="1"><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div><div class="row" data-r="2"><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div><div class="row" data-r="3"><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="tile"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div>
<script>const rows=[...document.querySelectorAll('.row')];function tick(){rows.forEach((row,i)=>{const r=row.getBoundingClientRect();const p=1-Math.min(1,Math.max(0,(r.top+r.height*.5)/innerHeight));const dir=i%2?1:-1;row.style.transform='translateX('+dir*p*80+'px) translateY('+(1-p)*30+'px)';});requestAnimationFrame(tick);}tick();</script>
</body>
</html>
