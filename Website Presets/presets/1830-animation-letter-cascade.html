<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1830
    slug: animation-letter-cascade
    title: Letter Cascade Storm
    category: animation
    tags: animation, type, cascade, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1830 — Letter Cascade Storm</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;overflow:hidden;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
      .stage{text-align:center}
      .kicker{margin:0 0 1.5rem;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#555}
      .word{display:flex;justify-content:center;gap:.08em;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2.8rem,10vw,6rem);font-weight:800;letter-spacing:-.06em}
      .ch{display:inline-block;opacity:0;transform:translateY(-120vh) rotate(var(--r));animation:fall .9s cubic-bezier(.22,1,.36,1) forwards;animation-delay:calc(var(--i)*70ms)}
      @keyframes fall{to{opacity:1;transform:none}}
      .hint{margin-top:2rem;font-size:.7rem;color:#444;letter-spacing:.12em;text-transform:uppercase}
  </style>
</head>
<body>
<div class="stage"><p class="kicker">Type cascade</p><div class="word" id="w"></div><p class="hint">Letters fall into lock</p></div>
<script>const word='INSANE';const w=document.getElementById('w');[...word].forEach((ch,i)=>{const s=document.createElement('span');s.className='ch';s.textContent=ch;s.style.setProperty('--i',i);s.style.setProperty('--r',((Math.random()-.5)*40)+'deg');w.appendChild(s);});</script>
</body>
</html>
