<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1491 — Arc Image Gallery Spread</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0a0a0c;padding:2rem;overflow:hidden}.gallery{position:relative;width:100%;max-width:700px;height:min(420px,70vh)}.card{position:absolute;left:50%;top:50%;width:min(180px,28vw);aspect-ratio:4/5;border-radius:14px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.45);transform:translate(-50%,-50%);transition:transform .6s cubic-bezier(.22,.61,.36,1)}.card img{width:100%;height:100%;object-fit:cover}.gallery:hover .card{transform:translate(-50%,-50%) rotate(var(--a)) translateY(var(--y))}
  </style>
</head>
<body>
<div class="gallery"><div class="card" style="--a:-24deg;--y:-128px;z-index:-19"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div><div class="card" style="--a:-12deg;--y:-104px;z-index:-7"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div><div class="card" style="--a:0deg;--y:-80px;z-index:5"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div><div class="card" style="--a:12deg;--y:-104px;z-index:-7"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div><div class="card" style="--a:24deg;--y:-128px;z-index:-19"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div></div>

</body>
</html>
