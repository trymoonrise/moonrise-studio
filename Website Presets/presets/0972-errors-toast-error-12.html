<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0972
    slug: errors-toast-error-12
    title: Toast Error 12
    category: errors
    tags: errors, toast
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0972 - Toast Error 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef0f5;font-family:Manrope,sans-serif;overflow:hidden}
    .demo{text-align:center}
    .demo h1{margin:0 0 .5rem;font-size:1.5rem;font-weight:800;color:#12141a}
    .demo p{margin:0 0 1.5rem;opacity:.5;font-size:.9rem}
    .trigger{appearance:none;border:0;background:#12141a;color:#fff;padding:.9rem 1.6rem;border-radius:12px;font:700 .85rem Manrope,sans-serif;cursor:pointer}
    .trigger:hover{background:#ff3b5c}
    .stack{position:fixed;top:1rem;right:1rem;display:flex;flex-direction:column;gap:.6rem;z-index:50;max-height:90vh;overflow:hidden;pointer-events:none}
    .toast{
      width:min(320px,85vw);padding:1rem 1.15rem;border-radius:14px;
      background:#1a1d27;color:#fff;box-shadow:0 16px 40px rgba(0,0,0,.2);
      border-left:4px solid #ff3b5c;pointer-events:auto;
      animation:slam-in .4s cubic-bezier(.16,1,.3,1) both, shake-toast .5s ease-in-out .4s;
      display:flex;gap:.75rem;align-items:flex-start;
    }
    .toast .icon{font-size:1.2rem;flex-shrink:0;animation:spin-icon 2s linear infinite}
    .toast strong{display:block;font-size:.85rem;font-weight:800;margin-bottom:.2rem}
    .toast span{font-size:.75rem;opacity:.55;line-height:1.4}
    .toast.rage{border-left-color:#ff0040;background:#2a1018;animation:slam-in .3s both, rage-shake .15s ease-in-out infinite}
    @keyframes slam-in{from{opacity:0;transform:translateX(80px) scale(.9)}to{opacity:1;transform:none}}
    @keyframes shake-toast{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    @keyframes rage-shake{0%,100%{transform:translate(0)}50%{transform:translate(-3px,1px)}}
    @keyframes spin-icon{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){.toast,.toast .icon{animation:none}}
  </style>
</head>
<body>
  <div class="demo">
    <h1>Toast notification demo</h1>
    <p>Click once. Or don't. They'll come anyway.</p>
    <button class="trigger" type="button" id="go">Show error toast</button>
  </div>
  <div class="stack" id="stack" aria-live="assertive"></div>
  <script>
    const msgs=[
      ['Upload failed','Your file has achieved sentience and refused.'],
      ['Sync error','Cloud said no. Loudly.'],
      ['Auth expired','You are nobody now.'],
      ['Rate limited','Slow down, speed demon.'],
      ['Disk full','Delete your hopes and try again.'],
      ['Unknown error','Even we don\'t know. Terrifying.'],
      ['TOAST OVERLOAD','THEY MULTIPLIED. RUN.']
    ];
    let n=0;
    const stack=document.getElementById('stack');
    function spawn(){
      const t=document.createElement('div');
      t.className='toast'+(n>4?' rage':'');
      t.setAttribute('role','alert');
      const m=msgs[Math.min(n,msgs.length-1)];
      t.innerHTML=`<div class="icon">⚠</div><div><strong>${m[0]}</strong><span>${m[1]}</span></div>`;
      stack.prepend(t);
      n++;
      if(n<12)setTimeout(spawn,n>5?200:500);
    }
    document.getElementById('go').onclick=()=>{n=0;stack.innerHTML='';spawn();};
    setTimeout(()=>document.getElementById('go').click(),600);
  </script>
</body>
</html>
