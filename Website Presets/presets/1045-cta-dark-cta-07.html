<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1045
    slug: cta-dark-cta-07
    title: Dark Cta 07
    category: cta
    tags: cta, dark
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1045 - Dark Cta 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 70%);animation:drift 20s linear infinite;pointer-events:none}
    @keyframes drift{to{background-position:48px 48px}}
    .wrap{position:relative;text-align:center;max-width:460px}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:clamp(2rem,5.5vw,2.8rem);font-weight:800;letter-spacing:-.04em;margin:0 0 .85rem;line-height:1.08}
    p{color:#888;margin:0 0 1.75rem;line-height:1.55}
    .row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
    .btn{padding:12px 24px;border:1px solid #fff;background:#fff;color:#050505;font:inherit;font-size:.86rem;font-weight:700;cursor:pointer;transition:transform .25s}
    .btn:hover{transform:scale(1.03)}
    .ghost{background:transparent;color:#fff}
    .ghost:hover{background:rgba(255,255,255,.08);transform:none}
  </style>
</head>
<body>
<div class="grid" aria-hidden="true"></div><div class="wrap"><h2>Build in the dark</h2><p>Monochrome focus. Motion that stays out of the way.</p><div class="row"><button class="btn" type="button">Begin</button><button class="btn ghost" type="button">Docs</button></div></div>

</body>
</html>
