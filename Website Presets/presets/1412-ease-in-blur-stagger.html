<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1412 — Blur Stagger Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#000;color:#fff}.words{display:flex;gap:1rem;font-size:2rem;font-weight:800}.w{opacity:0;filter:blur(12px);animation:bf .7s ease forwards}.w:nth-child(1){animation-delay:.1s}.w:nth-child(2){animation-delay:.25s}.w:nth-child(3){animation-delay:.4s}@keyframes bf{to{opacity:1;filter:blur(0)}}
  </style>
</head>
<body>
<div class="words"><span class="w">Blur</span><span class="w">In</span><span class="w">Words</span></div>

</body>
