<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1753
    slug: experimental-blackout-manifesto
    title: Blackout Manifesto
    category: experimental
    tags: experimental, blackout, strobe, manifesto
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1753 - Blackout Manifesto</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#000;color:#fff;overflow:hidden;font-family:Anton,sans-serif;cursor:pointer}
    .stage{position:fixed;inset:0;display:grid;place-items:center;padding:2rem;text-align:center}
    .line{margin:0;font-size:clamp(2.8rem,12vw,8rem);line-height:.85;letter-spacing:-.04em;text-transform:uppercase;opacity:0;position:absolute}
    .line.on{opacity:1;animation:blast .55s steps(2)}
    .strobe{position:fixed;inset:0;pointer-events:none;background:#fff;opacity:0;mix-blend-mode:difference}
    .strobe.flash{animation:flash .2s steps(1)}
    .meta{position:fixed;bottom:1.2rem;left:0;right:0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35)}
    @keyframes blast{0%{transform:scale(1.4);filter:blur(8px)}100%{transform:none;filter:none}}
    @keyframes flash{0%,100%{opacity:0}30%{opacity:1}60%{opacity:.4}}
    @media (prefers-reduced-motion:reduce){.line.on{animation:none;opacity:1}.strobe{display:none}}
  </style>
</head>
<body>
  <div class="strobe" id="strobe" aria-hidden="true"></div>
  <div class="stage">
    <h1 class="line on" id="line">BURN</h1>
  </div>
  <p class="meta">Click · 1753 · Manifesto</p>
  <script>
    const words=['BURN','BUILD','BREAK','BEGIN','AGAIN','NOW'];
    const line=document.getElementById('line');
    const strobe=document.getElementById('strobe');
    let i=0;
    function next(){
      i=(i+1)%words.length;
      line.classList.remove('on');
      strobe.classList.remove('flash');
      void line.offsetWidth;
      line.textContent=words[i];
      line.classList.add('on');
      strobe.classList.add('flash');
    }
    addEventListener('click',next);
    setInterval(next,2200);
  </script>
</body>
</html>
