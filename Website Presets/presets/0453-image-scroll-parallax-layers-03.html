<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0453
    slug: image-scroll-parallax-layers-03
    title: Parallax Layers 03
    category: image-scroll
    tags: image-scroll, parallax
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0453 - Parallax Layers 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0a0a0c;color:#fff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;overflow:hidden}.l{position:absolute;inset:-12vh;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;filter:brightness(.7) saturate(1.2);transform:translateY(calc(var(--p,0)*-60px)) scale(1.12)}.l2{mix-blend-mode:screen;opacity:.8;filter:hue-rotate(30deg);transform:translateY(calc(var(--p,0)*-120px)) scale(1.16)}.l3{opacity:.5;filter:hue-rotate(210deg) blur(1px);transform:translateY(calc(var(--p,0)*-200px)) scale(1.2)}.copy{position:relative;z-index:1;height:100%;display:grid;place-items:center;text-align:center;padding:2rem}h1{font-size:clamp(2.2rem,7vw,4.8rem);letter-spacing:-.05em;text-shadow:0 18px 60px rgba(0,0,0,.65)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="l"></div><div class="l l2"></div><div class="l l3"></div><div class="copy"><h1>Parallax layers</h1></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}addEventListener('scroll',()=>document.documentElement.style.setProperty('--p',String(prog())),{passive:true});</script>
</body>
</html>
