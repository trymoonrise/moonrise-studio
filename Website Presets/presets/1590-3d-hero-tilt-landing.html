<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1590
    slug: 3d-hero-tilt-landing
    title: 3D Tilt Hero Landing
    category: 3d-effects
    tags: 3d, hero, tilt, landing
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1590 — 3D Tilt Hero Landing</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#05060a;color:#fff;font-family:Outfit,sans-serif;perspective:1200px}
    .hero{position:relative;height:100vh;display:grid;place-items:center;transform-style:preserve-3d}
    .field{position:absolute;inset:-10%;transform-style:preserve-3d;pointer-events:none}
    .slab{position:absolute;border-radius:20px;background:linear-gradient(145deg,var(--a),var(--b));opacity:.85;box-shadow:0 30px 80px rgba(0,0,0,.4);transform:translate3d(var(--x),var(--y),var(--z)) rotateX(var(--rx)) rotateY(var(--ry));transition:transform .15s ease-out}
    .slab:nth-child(1){--a:#ff4d6d;--b:#7a1030;width:42%;height:28%;left:8%;top:12%;--x:0;--y:0;--z:-180px;--rx:18deg;--ry:-22deg}
    .slab:nth-child(2){--a:#6c8cff;--b:#1a2a6e;width:36%;height:34%;right:6%;top:18%;--x:0;--y:0;--z:-80px;--rx:-12deg;--ry:28deg}
    .slab:nth-child(3){--a:#7ee0c3;--b:#14503f;width:48%;height:22%;left:18%;bottom:14%;--x:0;--y:0;--z:-240px;--rx:24deg;--ry:10deg}
    .slab:nth-child(4){--a:#ffd16c;--b:#7a4a10;width:24%;height:26%;right:18%;bottom:22%;--x:0;--y:0;--z:40px;--rx:-20deg;--ry:-16deg}
    .core{position:relative;z-index:5;text-align:center;transform-style:preserve-3d;transform:translateZ(120px);transition:transform .12s ease-out;padding:2rem}
    .brand{margin:0;font-family:Syne,sans-serif;font-size:clamp(4rem,16vw,9rem);font-weight:800;letter-spacing:-.08em;line-height:.8;
      background:linear-gradient(120deg,#fff 20%,#a8c0ff 50%,#ff8ec8 80%);-webkit-background-clip:text;background-clip:text;color:transparent;
      filter:drop-shadow(0 20px 50px rgba(0,0,0,.5))}
    .sub{margin:1.25rem auto 0;max-width:34ch;font-size:1rem;line-height:1.55;color:rgba(255,255,255,.55)}
    .cta{margin-top:1.75rem;appearance:none;border:0;border-radius:999px;padding:.9rem 1.6rem;background:#fff;color:#08090f;font:700 .82rem Syne,sans-serif;cursor:pointer;box-shadow:0 16px 40px rgba(255,255,255,.12)}
    .glow{position:absolute;width:50vmax;height:50vmax;border-radius:50%;background:radial-gradient(circle,rgba(108,140,255,.25),transparent 60%);filter:blur(40px);transform:translateZ(-300px);pointer-events:none}
    @media(prefers-reduced-motion:reduce){.slab,.core{transition:none}}
  </style>
</head>
<body>
  <section class="hero" id="hero">
    <div class="glow" aria-hidden="true"></div>
    <div class="field" id="field" aria-hidden="true">
      <div class="slab"></div><div class="slab"></div><div class="slab"></div><div class="slab"></div>
    </div>
    <div class="core" id="core">
      <h1 class="brand">VECTOR</h1>
      <p class="sub">Pointer-driven depth field — slabs orbit while the brand holds the vanishing point.</p>
      <button class="cta" type="button">Enter the plane</button>
    </div>
  </section>
  <script>
    const hero=document.getElementById('hero');
    const core=document.getElementById('core');
    const slabs=[...document.querySelectorAll('.slab')];
    const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    let mx=0,my=0,tx=0,ty=0;
    hero.addEventListener('pointermove',e=>{
      const r=hero.getBoundingClientRect();
      tx=((e.clientX-r.left)/r.width-.5)*2;
      ty=((e.clientY-r.top)/r.height-.5)*2;
    });
    hero.addEventListener('pointerleave',()=>{tx=0;ty=0});
    function tick(){
      if(!reduced){
        mx+=(tx-mx)*.08;my+=(ty-my)*.08;
        core.style.transform=`translateZ(120px) rotateY(${mx*12}deg) rotateX(${-my*10}deg)`;
        slabs.forEach((s,i)=>{
          const d=1+(i*.35);
          s.style.transform=`translate3d(${mx*40*d}px,${my*30*d}px,var(--z)) rotateX(calc(var(--rx) + ${-my*8}deg)) rotateY(calc(var(--ry) + ${mx*10}deg))`;
        });
      }
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
