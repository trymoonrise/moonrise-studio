<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1842
    slug: hero-video-magnetic-play
    title: Magnetic Play Orb Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1842 - Magnetic Play Orb Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.55)}
.ui{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:clamp(2.8rem,9vw,6rem);margin:0 0 2rem;letter-spacing:-.03em}
.orb{width:88px;height:88px;border-radius:50%;border:1px solid rgba(255,255,255,.5);display:grid;place-items:center;background:rgba(0,0,0,.25);backdrop-filter:blur(10px);transition:transform .15s ease-out,background .3s;font-size:1.4rem}
.orb:hover{background:rgba(255,255,255,.15)}
.paused video{filter:brightness(.35) grayscale(.4)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><video id="v" src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="ui"><h1>Press play</h1><button class="orb" id="orb" aria-label="Toggle">▶</button></div></div>
<script>const orb=document.getElementById('orb'),v=document.getElementById('v'),s=document.getElementById('s');let ox=0,oy=0,tx=0,ty=0;s.onmousemove=e=>{const r=orb.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const dx=e.clientX-cx,dy=e.clientY-cy;const d=Math.hypot(dx,dy);if(d<160){tx=dx*.35;ty=dy*.35}else{tx=0;ty=0}};function tick(){ox+=(tx-ox)*.12;oy+=(ty-oy)*.12;orb.style.transform='translate('+ox+'px,'+oy+'px)';requestAnimationFrame(tick)}tick();orb.onclick=()=>{if(v.paused){v.play();orb.textContent='❚❚';s.classList.remove('paused')}else{v.pause();orb.textContent='▶';s.classList.add('paused')}};</script>
</body>
</html>
