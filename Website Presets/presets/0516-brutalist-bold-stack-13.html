<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0516
    slug: brutalist-bold-stack-13
    title: Bold Stack 13
    category: brutalist
    tags: brutalist, stack
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0516 — Bold Stack 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d0d0d;overflow:hidden;font-family:'Archivo Black',sans-serif;padding:2rem}
    .stack{position:relative;width:min(480px,92vw);height:min(420px,80vw)}
    .layer{position:absolute;left:50%;top:50%;translate:-50% -50%;width:88%;padding:1.2rem 1rem;border:5px solid #000;font-size:clamp(2rem,9vw,4rem);line-height:.85;text-transform:uppercase;letter-spacing:-.05em;text-align:center;animation:float 5s ease-in-out infinite}
    .l1{background:#ffee00;color:#000;z-index:4;rotate:-4deg;animation-delay:0s;box-shadow:10px 10px 0 #000}
    .l2{background:#ff0033;color:#fff;z-index:3;rotate:3deg;animation-delay:-1.2s;box-shadow:10px 10px 0 #000;width:92%}
    .l3{background:#00e5ff;color:#000;z-index:2;rotate:-7deg;animation-delay:-2.4s;box-shadow:10px 10px 0 #000;width:96%}
    .l4{background:#fff;color:#000;z-index:1;rotate:6deg;animation-delay:-3.6s;box-shadow:10px 10px 0 #000;width:100%}
    .stack:hover .l1{rotate:-10deg;translate:-50% calc(-50% - 20px)}
    .stack:hover .l2{rotate:8deg;translate:calc(-50% + 16px) calc(-50% - 4px)}
    .stack:hover .l3{rotate:-12deg;translate:calc(-50% - 18px) calc(-50% + 10px)}
    .stack:hover .l4{rotate:10deg;translate:calc(-50% + 8px) calc(-50% + 22px)}
    .layer{transition:translate .45s cubic-bezier(.2,1.2,.3,1),rotate .45s cubic-bezier(.2,1.2,.3,1)}
    .meta{position:fixed;bottom:1.5rem;font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#888}
    @keyframes float{0%,100%{translate:-50% -50%}50%{translate:-50% calc(-50% - 8px)}}
    @media(prefers-reduced-motion:reduce){.layer{animation:none}}
  </style>
</head>
<body>
  <div class="stack">
    <div class="layer l4">MORE</div>
    <div class="layer l3">TYPE</div>
    <div class="layer l2">BOLD</div>
    <div class="layer l1">STACK</div>
  </div>
  <div class="meta">Hover to unstack · 0516</div>
</body>
</html>
