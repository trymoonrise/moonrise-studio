<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0907
    slug: avatars-compact-avatar-12
    title: Compact Avatar 12
    category: avatars
    tags: avatars, compact, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0907 - Compact Avatar 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#efeee9;overflow:hidden;font-family:'DM Mono',monospace}
    .stage{min-height:100vh;display:grid;place-items:center}
    .chip{display:inline-flex;align-items:center;gap:.65rem;padding:.45rem .9rem .45rem .45rem;border:1px solid rgba(0,0,0,.2);border-radius:999px;background:#efeee9;max-width:min(340px,90vw)}
    .av{width:28px;height:28px;border-radius:50%;border:1px solid #111;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:600;font-size:.65rem;flex-shrink:0;background:#fff}
    .scroll{overflow:hidden;min-width:0;flex:1}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 16s linear infinite;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5)}
    @keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.track{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="chip">
      <div class="av">K</div>
      <div class="scroll"><div class="track"><span>Kai Okada · Designer · Kai Okada · Designer · </span><span>Kai Okada · Designer · Kai Okada · Designer · </span></div></div>
    </div>
  </div>
</body>
</html>
