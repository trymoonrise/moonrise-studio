<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0344
    slug: card-shuffles-flip-shuffle
    title: Flip Shuffle
    category: card-shuffles
    tags: card-shuffles, flip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0344 - Flip Shuffle</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem}.card{width:220px;aspect-ratio:3/4;border-radius:12px;overflow:hidden;cursor:pointer;perspective:600px}.inner{width:100%;height:100%;position:relative;transition:transform .6s;transform-style:preserve-3d}.card.flipped .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;display:grid;place-items:center}.back{transform:rotateY(180deg);background:#6c8cff;color:#fff;font-size:1.5rem;font-weight:700}img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>
<div class="card" id="c"><div class="inner"><div class="face"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="face back">?</div></div></div>
<script>document.getElementById('c').onclick=()=>document.getElementById('c').classList.toggle('flipped');</script>
</body>
</html>
