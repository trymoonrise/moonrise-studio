<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1487
    slug: stack-image-hover-spread
    title: Image Stack Hover Spread
    category: stack-gallery
    tags: stack, images, hover, spread
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1487 - Image Stack Hover Spread</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.stack{position:relative;width:min(280px,80vw);aspect-ratio:4/5;cursor:pointer}.card{position:absolute;inset:0;border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.4);transition:transform .55s cubic-bezier(.22,.61,.36,1)}.card img{width:100%;height:100%;object-fit:cover}.card:nth-child(1){z-index:5;transform:rotate(-2deg)}.card:nth-child(2){z-index:4;transform:translateY(10px) scale(.97) rotate(1deg)}.card:nth-child(3){z-index:3;transform:translateY(20px) scale(.94)}.card:nth-child(4){z-index:2;transform:translateY(30px) scale(.91)}.card:nth-child(5){z-index:1;transform:translateY(40px) scale(.88)}.stack:hover .card:nth-child(1){transform:translateX(-90px) rotate(-12deg)}.stack:hover .card:nth-child(2){transform:translateX(-45px) rotate(-5deg)}.stack:hover .card:nth-child(3){transform:translateY(-15px) scale(1.02)}.stack:hover .card:nth-child(4){transform:translateX(45px) rotate(5deg)}.stack:hover .card:nth-child(5){transform:translateX(90px) rotate(12deg)}
  </style>
</head>
<body>
<div class="stack"><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 1"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 2"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 3"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 4"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 5"></div></div>

</body>
</html>
