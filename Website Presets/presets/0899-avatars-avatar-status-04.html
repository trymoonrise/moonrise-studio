<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0899
    slug: avatars-avatar-status-04
    title: Avatar Status 04
    category: avatars
    tags: avatars, status, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0899 - Avatar Status 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f3f1eb;color:#111;overflow:hidden;font-family:'DM Mono',monospace}
    .stage{min-height:100vh;display:grid;place-items:center}
    .row{display:flex;align-items:center;gap:1.25rem}
    .wrap{position:relative}
    .av{width:56px;height:56px;border-radius:50%;border:1px solid #111;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:600;font-size:.95rem;background:#f3f1eb}
    .pulse{position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(0,0,0,.2);animation:out 2.8s ease-out infinite}
    .strip{width:min(200px,50vw);overflow:hidden;border-left:1px solid rgba(0,0,0,.2);padding-left:1rem}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 16s linear infinite;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(0,0,0,.45)}
    @keyframes run{to{transform:translateX(-50%)}}
    @keyframes out{to{transform:scale(1.35);opacity:0}}
    @media (prefers-reduced-motion:reduce){.track,.pulse{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <div class="wrap">
        <span class="pulse" aria-hidden="true"></span>
        <div class="av">JR</div>
      </div>
      <div class="strip"><div class="track"><span>Away · Back soon · Away · Back soon · </span><span>Away · Back soon · Away · Back soon · </span></div></div>
    </div>
  </div>
</body>
</html>
