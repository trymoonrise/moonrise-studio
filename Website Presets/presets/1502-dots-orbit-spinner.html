<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1502
    slug: dots-orbit-spinner
    title: Orbit Dot Spinner

    tags: dots, orbit, spinner
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1502 — Orbit Dot Spinner</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa}.orbit{width:64px;height:64px;position:relative;animation:spin 1.4s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#6c8cff;top:0;left:50%;margin-left:-5px;box-shadow:0 0 12px rgba(108,140,255,.6)}.dot:nth-child(2){top:auto;bottom:0;background:#ff6cb0;box-shadow:0 0 12px rgba(255,108,176,.6)}.dot:nth-child(3){top:50%;left:0;margin:0;margin-top:-5px;background:#6cffb8}
  </style>
</head>
<body>
<div class="orbit"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

</body>
</html>
