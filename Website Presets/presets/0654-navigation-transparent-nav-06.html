<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0654
    slug: navigation-transparent-nav-06
    title: Transparent Nav 06
    category: navigation
    tags: navigation, transparent
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0654 - Transparent Nav 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#1a1814;color:#f5f0e8;font-family:Outfit,sans-serif}
    .bg{position:fixed;inset:0;background:
      radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.08),transparent 50%),
      linear-gradient(180deg,#2a261f,#12100c);z-index:0}
    nav{position:fixed;inset:0 0 auto;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:1.6rem clamp(1.25rem,4vw,3rem)}
    .logo{font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .links{display:flex;gap:2rem}
    .links a{color:inherit;text-decoration:none;font-size:.75rem;font-weight:300;letter-spacing:.14em;text-transform:uppercase;opacity:.5;transition:opacity .3s}
    .links a:hover{opacity:1}
    .hero{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:2rem;text-align:center}
    .hero h1{margin:0;font-family:Syne,sans-serif;font-size:clamp(3rem,12vw,7rem);letter-spacing:-.06em;line-height:.9;font-weight:800}
    .hero p{margin:1.25rem 0 0;font-weight:300;opacity:.4;letter-spacing:.12em;text-transform:uppercase;font-size:.75rem}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <nav>
    <div class="logo">AIR</div>
    <div class="links"><a href="#">Look</a><a href="#">Feel</a><a href="#">Be</a></div>
  </nav>
  <section class="hero">
    <div>
      <h1>No<br>chrome</h1>
      <p>Nav as air</p>
    </div>
  </section>
</body>
</html>
