<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1660

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1660 - Mask Up Reveal Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#000;padding:2rem}.frame{width:min(400px,90vw);border-radius:16px;overflow:hidden;position:relative}.frame img{width:100%;display:block;transform:translateY(20px) scale(1.05);animation:img 1s cubic-bezier(.22,.61,.36,1) .2s forwards}.mask{position:absolute;inset:0;background:#6c8cff;transform-origin:bottom;animation:mask .9s cubic-bezier(.22,.61,.36,1) forwards}@keyframes mask{to{transform:scaleY(0)}}@keyframes img{to{transform:none}}
  </style>
</head>
<body>
<div class="frame"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><div class="mask"></div></div>

</body>
