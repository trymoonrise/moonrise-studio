<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1581
    slug: 3d-image-tilt-frame
    title: 3D Image Tilt Frame
    category: 3d-effects
    tags: 3d, image, tilt
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1581 — 3D Image Tilt Frame</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0d14;perspective:1000px;font-family:Outfit,sans-serif;padding:2rem}
    .frame{position:relative;width:min(340px,90vw);height:420px;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));transition:transform .12s ease-out;border-radius:20px}
    .frame::before{content:"";position:absolute;inset:-14px;border-radius:28px;border:1px solid rgba(255,255,255,.12);transform:translateZ(-30px);box-shadow:0 40px 80px rgba(0,0,0,.5)}
    .img{position:absolute;inset:0;border-radius:20px;overflow:hidden;transform:translateZ(20px);border:1px solid rgba(255,255,255,.15)}
    .img i{position:absolute;inset:0;background:linear-gradient(145deg,#6c8cff 0%,#ff6bcb 45%,#ffd16c 100%);transform:scale(1.08) translate(var(--px,0),var(--py,0));transition:transform .12s ease-out}
    .img::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,40%),rgba(255,255,255,.35),transparent 50%);mix-blend-mode:soft-light}
    .caption{position:absolute;left:1.2rem;right:1.2rem;bottom:1.2rem;color:#fff;transform:translateZ(50px);z-index:2}
    .caption h3{margin:0;font-family:Syne,sans-serif;font-size:1.5rem;letter-spacing:-.02em}
    .caption p{margin:.3rem 0 0;font-size:.85rem;opacity:.85}
    @media(prefers-reduced-motion:reduce){.frame,.img i{transition:none}}
  </style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="img"><i></i></div>
    <div class="caption">
      <h3>Framed light</h3>
      <p>Tilt the frame — the image parallax slides underneath.</p>
    </div>
  </div>
  <script>
    const frame=document.getElementById('frame');
    frame.addEventListener('pointermove',(e)=>{
      const r=frame.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width;
      const y=(e.clientY-r.top)/r.height;
      frame.style.setProperty('--ry',((x-.5)*24)+'deg');
      frame.style.setProperty('--rx',((.5-y)*18)+'deg');
      frame.style.setProperty('--mx',(x*100)+'%');
      frame.style.setProperty('--my',(y*100)+'%');
      frame.style.setProperty('--px',((x-.5)*-8)+'%');
      frame.style.setProperty('--py',((y-.5)*-6)+'%');
    });
    frame.addEventListener('pointerleave',()=>{
      frame.style.setProperty('--rx','0deg');
      frame.style.setProperty('--ry','0deg');
      frame.style.setProperty('--px','0');
      frame.style.setProperty('--py','0');
    });
  </script>
</body>
</html>
