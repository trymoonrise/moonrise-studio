<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1135
    slug: ai-chat-dark-chat-06
    title: Dark Chat 06
    category: ai-chat
    tags: ai-chat, dark
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1135 - Dark Chat 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050506;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#ececec}
    .stage{width:min(640px,100%);display:flex;flex-direction:column;align-items:center;gap:1.75rem}
    .title{font-size:1.4rem;font-weight:500;letter-spacing:-.03em;opacity:.85;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .ask-shell{position:relative;width:100%;animation:up .7s cubic-bezier(.16,1,.3,1) .12s both}
    .scan{position:absolute;inset:0;border-radius:28px;overflow:hidden;pointer-events:none}
    .scan::before{content:"";position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(16,163,127,.25),transparent);animation:scan 3.5s ease-in-out infinite}
    .ask{position:relative;display:flex;align-items:center;gap:.5rem;padding:.65rem .65rem .65rem 1.05rem;background:#121214;border:1px solid #2a2a2e;border-radius:28px;box-shadow:0 0 40px rgba(16,163,127,.08),inset 0 1px 0 rgba(255,255,255,.04)}
    .ask:focus-within{border-color:#3a3a40;box-shadow:0 0 50px rgba(16,163,127,.18)}
    .ask input{flex:1;border:none;outline:none;background:transparent;color:#ececec;font:inherit;font-size:.95rem}
    .ask input::placeholder{color:#6a6a70}
    .mic,.send{width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;display:grid;place-items:center}
    .mic{background:transparent;color:#9a9aa0}
    .mic:hover{color:#fff}
    .send{background:#10a37f;color:#fff;transition:transform .2s}
    .send:hover{transform:scale(1.06)}
    .mic svg,.send svg{width:16px;height:16px}
    .chips{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;animation:up .7s cubic-bezier(.16,1,.3,1) .25s both}
    .chips button{border:1px solid #2a2a2e;background:#121214;color:#b4b4b8;padding:.45rem .85rem;border-radius:999px;font:inherit;font-size:.78rem;cursor:pointer;transition:border-color .2s,color .2s,transform .2s}
    .chips button:hover{border-color:#10a37f;color:#fff;transform:translateY(-2px)}
    @keyframes scan{0%{left:-30%}60%,100%{left:110%}}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.scan::before,.title,.ask-shell,.chips{animation:none}.title,.ask-shell,.chips{opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="title">Ask in the dark</div>
    <div class="ask-shell">
      <div class="scan" aria-hidden="true"></div>
      <form class="ask">
        <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
        <button class="mic" type="button" aria-label="Voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
        <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>
    </div>
    <div class="chips">
      <button type="button">Summarize this</button>
      <button type="button">Write code</button>
      <button type="button">Brainstorm</button>
    </div>
  </div>
</body>
</html>
