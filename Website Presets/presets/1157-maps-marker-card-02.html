<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1157
    slug: maps-marker-card-02
    title: Pulse Pin Map
    category: maps
    tags: maps, marker, pulse
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1157 - Pulse Pin Map</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c1218;font-family:Outfit,sans-serif}.map{width:min(360px,90vw);height:260px;border-radius:16px;background:linear-gradient(160deg,#1a2838,#0e1620);position:relative;overflow:hidden;border:1px solid #1e2a38}.pin{position:absolute;left:58%;top:42%;width:14px;height:14px;margin:-7px;border-radius:50%;background:#7ee0c3;box-shadow:0 0 0 0 rgba(126,224,195,.5);animation:pulse 2s ease-out infinite;cursor:pointer;border:0}.card{position:absolute;left:58%;top:42%;translate:-50% calc(-100% - 18px);padding:.75rem 1rem;background:#fff;color:#111;border-radius:10px;font-size:.8rem;width:160px;opacity:0;transform:translate(-50%,calc(-100% - 8px)) scale(.95);transition:opacity .3s,transform .35s;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.35)}.card strong{display:block;font-family:Syne,sans-serif;margin-bottom:.2rem}.map:has(.pin:hover) .card,.map.show .card{opacity:1;transform:translate(-50%,calc(-100% - 18px)) scale(1)}@keyframes pulse{70%{box-shadow:0 0 0 18px transparent}}
  </style>
</head>
<body>
<div class="map" id="map"><button class="pin" aria-label="Location"></button><div class="card"><strong>Studio North</strong>Open until 6pm</div></div>
<script>document.getElementById('map').onclick=()=>document.getElementById('map').classList.toggle('show');</script>
</body>
</html>
