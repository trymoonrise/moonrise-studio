<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0179
    slug: sliders-dual-thumb
    title: Dual Value Display
    category: sliders
    tags: sliders, dual
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0179 - Dual Value Display</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.wrap{width:300px;color:#fff}.labels{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.85rem;opacity:.7}input[type=range]{width:100%;accent-color:#ff6cb0}
  </style>
</head>
<body>
<div class="wrap"><div class="labels"><span>Min: <b id="a">20</b></span><span>Max: <b id="b">80</b></span></div><input type="range" min="0" max="100" value="50" id="r"></div>
<script>document.getElementById('r').oninput=function(){const v=+this.value;document.getElementById('a').textContent=Math.max(0,v-30);document.getElementById('b').textContent=Math.min(100,v+30);};</script>
</body>
</html>
