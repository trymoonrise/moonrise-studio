<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0544
    slug: features-mosaic-feat-13
    title: Mosaic Feat 13
    category: features
    tags: features, mosaic
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0544 — Mosaic Feat 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#fff;font-family:Outfit,sans-serif;padding:2rem}
    .wrap{width:min(820px,100%)}
    h1{margin:0 0 1.5rem;font-family:Syne,sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.04em;font-weight:800}
    .mosaic{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:72px;gap:8px}
    .tile{border:1px solid rgba(255,255,255,.1);padding:.85rem;display:flex;align-items:flex-end;font-family:Syne,sans-serif;font-size:.85rem;letter-spacing:-.02em;font-weight:700;opacity:0;transform:scale(.92);animation:pop .55s cubic-bezier(.22,1,.36,1) forwards;transition:transform .35s,border-color .3s,background .3s;background:rgba(255,255,255,.03)}
    .tile:hover{transform:scale(1.03);border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);z-index:2}
    .t1{grid-column:span 3;grid-row:span 2;font-size:1.3rem;background:#1a2240;animation-delay:.05s}
    .t2{grid-column:span 2;grid-row:span 2;animation-delay:.1s;background:#1f3a32}
    .t3{grid-column:span 1;grid-row:span 1;animation-delay:.15s}
    .t4{grid-column:span 1;grid-row:span 1;animation-delay:.2s}
    .t5{grid-column:span 2;animation-delay:.25s;background:#3a1a28}
    .t6{grid-column:span 2;animation-delay:.3s}
    .t7{grid-column:span 2;grid-row:span 2;animation-delay:.35s;background:#2a2418;font-size:1.1rem}
    .t8{grid-column:span 2;animation-delay:.4s}
    .t9{grid-column:span 2;animation-delay:.45s}
    @keyframes pop{to{opacity:1;transform:none}}
    @media(max-width:640px){.mosaic{grid-template-columns:repeat(2,1fr)}.tile{grid-column:span 1!important;grid-row:span 1!important}}
    @media(prefers-reduced-motion:reduce){.tile{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Mosaic</h1>
    <div class="mosaic">
      <div class="tile t1">Lead</div>
      <div class="tile t2">Live</div>
      <div class="tile t3">A</div>
      <div class="tile t4">B</div>
      <div class="tile t5">Pulse</div>
      <div class="tile t6">Soft</div>
      <div class="tile t7">Depth<br>field</div>
      <div class="tile t8">Cut</div>
      <div class="tile t9">End</div>
    </div>
  </div>
</body>
</html>
