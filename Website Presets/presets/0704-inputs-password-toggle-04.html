<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0704
    slug: inputs-password-toggle-04
    title: Reveal Mask Password Field
    category: inputs
    tags: inputs, password
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0704 — Reveal Mask Password Field</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #080a0e;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    .field-wrap { width: min(380px, 92vw); }

    label {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.6rem;
    }

    .field {
      display: flex;
      align-items: center;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .field:focus-within { border-color: #fbbf24; }

    .field input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      color: #e2e8f0;
      letter-spacing: 0.15em;
    }

    .field input[type="text"] { letter-spacing: normal; }

    .toggle {
      width: 48px;
      height: 48px;
      border: none;
      border-left: 1px solid #1e293b;
      background: #0f1419;
      color: #64748b;
      display: grid;
      place-items: center;
      transition: color 0.25s, background 0.25s;
    }

    .toggle:hover { color: #fbbf24; background: #1e293b; }

    .toggle.revealed { color: #fbbf24; animation: revealFlash 0.4s ease; }

    @keyframes revealFlash {
      0% { background: #fbbf2433; }
      100% { background: #0f1419; }
    }

    .eye-closed, .eye-open { transition: opacity 0.2s, transform 0.2s; }
    .toggle .eye-open { display: none; }
    .toggle.revealed .eye-closed { display: none; }
    .toggle.revealed .eye-open { display: block; animation: eyeBlink 0.5s ease; }

    @keyframes eyeBlink {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.3); }
    }

    .strength {
      margin-top: 0.75rem;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0;
      background: #f87171;
      border-radius: 2px;
      transition: width 0.4s, background 0.4s;
    }

    @media (prefers-reduced-motion: reduce) {
      .toggle.revealed { animation: none; }
      .toggle.revealed .eye-open { animation: none; }
    }
  </style>
</head>
<body>
  <div class="field-wrap">
    <label for="pw">Password</label>
    <div class="field">
      <input type="password" id="pw" value="securePass123" autocomplete="current-password">
      <button type="button" class="toggle" id="toggle" aria-label="Show password">
        <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="strength"><div class="strength-bar" id="bar"></div></div>
  </div>

  <script>
    const pw = document.getElementById('pw');
    const toggle = document.getElementById('toggle');
    const bar = document.getElementById('bar');

    toggle.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      toggle.classList.toggle('revealed', show);
      toggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    function strength(v) {
      let s = 0;
      if (v.length >= 8) s += 33;
      if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s += 33;
      if (/[^A-Za-z0-9]/.test(v)) s += 34;
      bar.style.width = s + '%';
      bar.style.background = s < 34 ? '#f87171' : s < 67 ? '#fbbf24' : '#00d4aa';
    }

    pw.addEventListener('input', () => strength(pw.value));
    strength(pw.value);
  </script>
</body>
</html>
