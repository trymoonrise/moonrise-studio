<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0265
    slug: announcements-countdown-banner
    title: Countdown Announcement
    category: announcements
    tags: announcements, countdown
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0265 — Countdown Announcement</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#111;font-family:Manrope,sans-serif;perspective:1000px}
    .banner{
      position:fixed;inset:0 auto auto 0;width:100%;z-index:20;display:flex;align-items:center;justify-content:center;gap:1.25rem;flex-wrap:wrap;
      padding:1rem 1.25rem;color:#fff;background:linear-gradient(90deg,#1a1024,#241836 50%,#1a1024);
      border-bottom:1px solid rgba(255,255,255,.08);transform-origin:top;animation:hinge 1s cubic-bezier(.16,1,.3,1) both;
    }
    .label{font-size:.78rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55)}
    .clock{display:flex;gap:.45rem;transform-style:preserve-3d}
    .unit{
      position:relative;width:3rem;height:3.4rem;border-radius:10px;background:#0d0a14;border:1px solid rgba(255,255,255,.1);
      box-shadow:0 10px 24px rgba(0,0,0,.35);overflow:hidden;transform-style:preserve-3d;
    }
    .unit::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.08);z-index:2}
    .digit{
      position:absolute;inset:0;display:grid;place-items:center;font-family:Syne,sans-serif;font-size:1.45rem;font-weight:800;
      background:linear-gradient(#221a30,#120e1c);
    }
    .digit.flip{animation:flip .45s cubic-bezier(.4,0,.2,1)}
    .meta{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);text-align:center;margin-top:.25rem}
    .wrap{display:grid;gap:.25rem;justify-items:center}
    .page{padding:6rem 1.5rem;color:#666;text-align:center}
    @keyframes hinge{from{transform:rotateX(-90deg);opacity:0}to{transform:rotateX(0);opacity:1}}
    @keyframes flip{from{transform:rotateX(-70deg);opacity:.5}to{transform:rotateX(0);opacity:1}}
    @media (prefers-reduced-motion:reduce){.banner,.digit.flip{animation:none}}
  </style>
</head>
<body>
  <div class="banner" role="timer" aria-live="polite">
    <span class="label">Launch in</span>
    <div class="clock" id="clock"></div>
  </div>
  <p class="page">3D flip-clock countdown across the top edge.</p>
  <script>
    const end=Date.now()+1000*60*60*26+1000*60*42+1000*18;
    const clock=document.getElementById('clock');
    const parts=[['h','Hrs'],['m','Min'],['s','Sec']];
    parts.forEach(([k,label])=>{
      const wrap=document.createElement('div');wrap.className='wrap';
      wrap.innerHTML='<div class="unit" data-k="'+k+'"><div class="digit">00</div></div><div class="meta">'+label+'</div>';
      clock.appendChild(wrap);
    });
    function pad(n){return String(n).padStart(2,'0')}
    function tick(){
      let left=Math.max(0,end-Date.now());
      const h=Math.floor(left/3600000);left-=h*3600000;
      const m=Math.floor(left/60000);left-=m*60000;
      const s=Math.floor(left/1000);
      const map={h,m,s};
      document.querySelectorAll('.unit').forEach(u=>{
        const next=pad(map[u.dataset.k]);
        const d=u.querySelector('.digit');
        if(d.textContent!==next){
          d.textContent=next;
          d.classList.remove('flip');
          void d.offsetWidth;
          d.classList.add('flip');
        }
      });
    }
    tick();setInterval(tick,1000);
  </script>
</body>
</html>
