<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1819
    slug: maps-vertical-story-scroll
    title: Vertical Story Map
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1819 - Vertical Story Map</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#faf8f4;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(420px,92vw);height:min(560px,85vh);display:grid;grid-template-rows:1fr auto;gap:12px}
.stage{border-radius:28px;overflow:hidden;border:1px solid rgba(0,0,0,.1);position:relative;min-height:0}
.story{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory}
.story::-webkit-scrollbar{height:0}
.card{flex:0 0 140px;scroll-snap-align:start;padding:.9rem;border-radius:16px;background:#fff;border:1px solid rgba(0,0,0,.08);cursor:pointer;transition:.25s}
.card.on,.card:hover{background:#111;color:#fff;transform:translateY(-3px)}
.card b{display:block;font-size:.95rem;letter-spacing:-.02em}
.card span{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;opacity:.55}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe id="map" src="https://www.google.com/maps?q=Rome%2C%20Italy&hl=en&z=13&output=embed" title="Story map" loading="lazy"></iframe></div>
<div class="story" id="story">
<button class="card on" data-q="Colosseum, Rome"><b>Colosseum</b><span>Stop 01</span></button>
<button class="card" data-q="Vatican City"><b>Vatican</b><span>Stop 02</span></button>
<button class="card" data-q="Trevi Fountain, Rome"><b>Trevi</b><span>Stop 03</span></button>
<button class="card" data-q="Pantheon, Rome"><b>Pantheon</b><span>Stop 04</span></button>
</div></div>
<script>const map=document.getElementById('map');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>{document.querySelectorAll('.card').forEach(x=>x.classList.remove('on'));c.classList.add('on');map.src='https://www.google.com/maps?q='+encodeURIComponent(c.dataset.q)+'&hl=en&z=15&output=embed';});</script>
</body>
</html>
