<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0224
    slug: badges-dot-badge
    title: Dot Badge
    category: badges
    tags: badges, dot
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0224 - Dot Badge</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&display=swap');

    * { box-sizing: border-box; }
    body {
      display: grid; place-items: center; min-height: 100vh;
      background: #111; font-family: Outfit, sans-serif; color: #eee;
      gap: 2.5rem;
    }

    .avatar {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(145deg, #6c8cff, #a78bfa);
      display: grid; place-items: center;
      font-size: 2rem; font-weight: 600;
    }

    .dot {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #22c55e;
      border: 3px solid #111;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
      animation: ping 1.6s ease-out infinite;
    }

    .row { display: flex; gap: 2rem; }

    .item { text-align: center; }
    .item p {
      margin: 0.7rem 0 0;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .avatar--busy .dot { background: #f59e0b; box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); animation-name: ping-amber; }
    .avatar--off .dot { background: #64748b; animation: none; }

    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
      70%, 100% { box-shadow: 0 0 0 14px rgba(34, 197, 94, 0); }
    }
    @keyframes ping-amber {
      0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.55); }
      70%, 100% { box-shadow: 0 0 0 14px rgba(245, 158, 11, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
    }
  </style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="avatar">A<span class="dot" aria-label="online"></span></div>
      <p>Online</p>
    </div>
    <div class="item">
      <div class="avatar avatar--busy">B<span class="dot" aria-label="busy"></span></div>
      <p>Busy</p>
    </div>
    <div class="item">
      <div class="avatar avatar--off">C<span class="dot" aria-label="offline"></span></div>
      <p>Away</p>
    </div>
  </div>
</body>
</html>
