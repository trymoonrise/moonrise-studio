<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1793
    slug: minimal-3d-ripple-floor
    title: Ripple Floor Grid
    category: 3d-effects
    tags: 3d, minimal, ripple, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1793 — Ripple Floor Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0c0c;perspective:900px;overflow:hidden;font-family:Outfit,sans-serif;color:#fff}
    .floor{display:grid;grid-template-columns:repeat(8,28px);gap:6px;transform:rotateX(62deg);transform-style:preserve-3d}
    .cell{width:28px;height:28px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.02);transform:translateZ(0)}
    .title{position:fixed;top:1.5rem;font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .label{position:fixed;bottom:1.5rem;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;opacity:.35;font-weight:300}
    @media(max-width:480px){.floor{grid-template-columns:repeat(6,22px)}.cell{width:22px;height:22px}}
  </style>
</head>
<body>
  <div class="title">Ripple floor</div>
  <div class="floor" id="floor"></div>
  <div class="label">Disturb the surface</div>
  <script>
    const floor=document.getElementById('floor');
    const cols=matchMedia('(max-width:480px)').matches?6:8,rows=8;
    const cells=[];
    for(let i=0;i<cols*rows;i++){const c=document.createElement('div');c.className='cell';floor.appendChild(c);cells.push({el:c,x:i%cols,y:Math.floor(i/cols),z:0})}
    let mx=cols/2,my=rows/2;
    floor.addEventListener('pointermove',e=>{const r=floor.getBoundingClientRect();mx=((e.clientX-r.left)/r.width)*cols;my=((e.clientY-r.top)/r.height)*rows});
    (function loop(){
      cells.forEach(c=>{
        const d=Math.hypot(c.x+.5-mx,c.y+.5-my);
        const wave=Math.cos(d*1.1)*Math.max(0,1-d/4.5);
        c.z+=(wave*48-c.z)*.2;
        c.el.style.transform=`translateZ(${c.z}px)`;
        c.el.style.borderColor=`rgba(255,255,255,${.15+Math.abs(c.z)*.01})`;
      });
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
