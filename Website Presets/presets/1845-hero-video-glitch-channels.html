<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1845
    slug: hero-video-glitch-channels
    title: Glitch Channel Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1845 - Glitch Channel Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
.stack{position:absolute;inset:0}
.stack video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.r{filter:url(#none);mix-blend-mode:screen;opacity:0;transform:translateX(-6px);animation:none}
.g{opacity:0;transform:translateX(6px);filter:hue-rotate(90deg);mix-blend-mode:screen}
.b{opacity:1}
.stage:hover .r,.stage:hover .g{opacity:.55;animation:jitter .12s steps(2) infinite}
.copy{position:relative;z-index:2;min-height:100vh;display:grid;place-content:center;text-align:center;padding:2rem}
h1{font-size:clamp(3rem,11vw,7rem);font-weight:800;letter-spacing:-.08em;margin:0;text-shadow:3px 0 #f00,-3px 0 #0ff}
p{font:500 .7rem 'DM Mono',monospace;letter-spacing:.28em;text-transform:uppercase;opacity:.5;margin:1rem 0 0}
@keyframes jitter{50%{transform:translateX(8px)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><div class="stack"><video class="r" src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><video class="g" src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><video class="b" src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="copy"><h1>GLITCH</h1><p>Hover to fracture</p></div></div>

</body>
</html>
