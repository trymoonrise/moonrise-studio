<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0064
    slug: loading-button
    title: Loading Button
    category: buttons
    tags: loading
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0064 — Loading Button</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f} .btn{padding:14px 32px;border:none;border-radius:8px;background:#6c8cff;color:#fff;font-weight:600;cursor:pointer;min-width:140px} .btn.loading{opacity:.8;pointer-events:none} .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle} @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<button class="btn" id="b">Submit</button>
<script>document.getElementById('b').onclick=function(){this.classList.add('loading');this.innerHTML='<span class="spin"></span>';setTimeout(()=>{this.classList.remove('loading');this.textContent='Done!'},2000)};</script>
</body>
</html>
