<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1853
    slug: hero-video-drag-curtain
    title: Drag Curtain Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1853 - Drag Curtain Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden;user-select:none}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.curtain{position:absolute;inset:0;background:#111;z-index:2;clip-path:inset(0 0 0 0);cursor:ew-resize;display:grid;place-items:center;transition:none}
.curtain span{font:500 .7rem 'DM Mono',monospace;letter-spacing:.3em;text-transform:uppercase;opacity:.5;pointer-events:none}
.handle{position:absolute;left:var(--x,8%);top:0;bottom:0;width:3px;background:#fff;z-index:3;box-shadow:0 0 20px rgba(255,255,255,.5);pointer-events:none}
.copy{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
h1{font-size:clamp(2.8rem,9vw,6rem);font-weight:800;letter-spacing:-.07em;margin:0}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="copy"><h1>Reveal</h1></div><div class="curtain" id="curtain"><span>Drag to open →</span></div><div class="handle" id="h"></div></div>
<script>const s=document.getElementById('s'),curtain=document.getElementById('curtain'),h=document.getElementById('h');let drag=false,x=8;function apply(){curtain.style.clipPath='inset(0 0 0 '+x+'%)';h.style.setProperty('--x',x+'%');h.style.left=x+'%'}
s.onpointerdown=e=>{drag=true;s.setPointerCapture(e.pointerId)};s.onpointermove=e=>{if(!drag)return;x=Math.min(92,Math.max(4,(e.clientX/innerWidth)*100));apply()};s.onpointerup=()=>{drag=false};apply();</script>
</body>
</html>
