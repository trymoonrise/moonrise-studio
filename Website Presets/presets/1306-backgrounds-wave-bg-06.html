<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1306

    tags: backgrounds, wave
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1306 - Wave Bg 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#0e0e0e;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .waves{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end}
    .w{width:200%;height:120px;margin-left:-50%;background:transparent;border-radius:40%;border:1px solid rgba(255,255,255,.12);animation:wave 8s ease-in-out infinite}
    .w:nth-child(1){animation-duration:7s;opacity:.9}.w:nth-child(2){animation-duration:9s;animation-delay:-2s;opacity:.55}.w:nth-child(3){animation-duration:11s;animation-delay:-4s;opacity:.3}
    @keyframes wave{0%,100%{transform:translateX(0) translateY(0)}50%{transform:translateX(4%) translateY(-12px)}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="waves" aria-hidden="true"><div class="w"></div><div class="w"></div><div class="w"></div></div><div class="label"><p class="kicker">Background</p><h1>Wave field</h1><p class="sub">Stacked arcs in swell.</p></div>

</body>
</html>
