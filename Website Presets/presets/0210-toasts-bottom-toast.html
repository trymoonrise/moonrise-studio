<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0210
    slug: toasts-bottom-toast
    title: Bottom Toast
    category: toasts
    tags: toasts, bottom
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0210 - Bottom Toast</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5}.btn{padding:10px 24px;background:#6c8cff;color:#fff;border:none;border-radius:8px;cursor:pointer}.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:#111;color:#fff;padding:12px 24px;border-radius:99px;font-size:.9rem;opacity:0;transition:all .3s;z-index:10}.toast.show{transform:translateX(-50%);opacity:1}
  </style>
</head>
<body>
<button class="btn" id="b">Show Toast</button><div class="toast" id="t">Action completed!</div>
<script>document.getElementById('b').onclick=()=>{const t=document.getElementById('t');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};</script>
</body>
</html>
