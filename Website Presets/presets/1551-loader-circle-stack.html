<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1551
    slug: loader-circle-stack
    title: Circle Stack Loader
    category: loading
    tags: loading, stack, circles
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1551 - Circle Stack Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff}.stack{position:relative;width:56px;height:56px}.c{position:absolute;border-radius:50%;border:2px solid #6c8cff;animation:cs 1.6s ease-in-out infinite}.c:nth-child(1){inset:0}.c:nth-child(2){inset:8px;animation-delay:.2s;border-color:#ff6cb0}.c:nth-child(3){inset:16px;animation-delay:.4s;border-color:#6cffb8}@keyframes cs{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.85);opacity:.4}}
  </style>
</head>
<body>
<div class="stack"><div class="c"></div><div class="c"></div><div class="c"></div></div>

</body>
</html>
