<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1208
    slug: images-rounded-image-01
    title: Orbital Rounded Portrait
    category: images
    tags: images, rounded, orbital, portrait
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1208 - Orbital Rounded Portrait</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#e6e9ef;font-family:Outfit,sans-serif;padding:2rem}
    .frame{position:relative;width:280px;height:280px}
    .orbit{position:absolute;inset:-20px;border:1px solid rgba(56,189,248,.15);border-radius:50%;animation:spin 24s linear infinite}
    .orbit:nth-child(2){inset:-40px;border-color:rgba(56,189,248,.08);animation-duration:36s;animation-direction:reverse}
    .dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#38bdf8;top:-4px;left:50%;transform:translateX(-50%);box-shadow:0 0 12px rgba(56,189,248,.5)}
    .img-wrap{width:100%;height:100%;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.08);position:relative;z-index:1;transition:transform .5s cubic-bezier(.16,1,.3,1),border-color .3s}
    .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1),filter .4s}
    .frame:hover .img-wrap{transform:scale(1.04);border-color:rgba(56,189,248,.3)}
    .frame:hover .img-wrap img{transform:scale(1.08);filter:brightness(1.1)}
    .caption{margin-top:2rem;text-align:center}
    .caption h2{font-family:Syne,sans-serif;font-size:1.2rem;letter-spacing:-.03em;margin:0}
    .caption p{font-size:.75rem;color:rgba(230,233,239,.4);margin-top:.25rem;letter-spacing:.1em;text-transform:uppercase}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.orbit{animation:none}}
  </style>
</head>
<body>
  <div>
    <div class="frame">
      <div class="orbit"><span class="dot"></span></div>
      <div class="orbit"></div>
      <div class="img-wrap"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Portrait"></div>
    </div>
    <div class="caption"><h2>Studio Session</h2><p>Editorial · 2026</p></div>
  </div>
</body>
</html>
