<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0440
    slug: scroll-animations-stacked-cards-unroll-04
    title: Deck Unroll Sequence
    category: scroll-animations
    tags: scroll-animations, stacked
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0440 — Deck Unroll Sequence</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#070709;color:#eee;font-family:Outfit,sans-serif}
    .lead,.tail{height:35vh;display:grid;place-items:center;color:rgba(255,255,255,.2);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase}
    .scene{height:280vh;position:relative}
    .sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;perspective:900px}
    .deck{position:relative;width:min(340px,80vw);height:420px;transform-style:preserve-3d}
    .card{position:absolute;inset:0;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:#111118;padding:28px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .05s linear,opacity .05s linear}
    .card:nth-child(1){--hue:170}.card:nth-child(2){--hue:200}.card:nth-child(3){--hue:230}.card:nth-child(4){--hue:260}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:hsl(var(--hue),80%,55%)}
    .card b{font-family:Syne,sans-serif;font-size:1.6rem;letter-spacing:-.03em}
    .card span{font-size:.8rem;color:rgba(255,255,255,.45);margin-top:6px}
    @media(prefers-reduced-motion:reduce){.card{position:relative;inset:auto;margin-bottom:12px;opacity:1!important;transform:none!important}}
  </style>
</head>
<body>
<div class="lead">Scroll to unroll</div>
<div class="scene" id="scene">
  <div class="sticky">
    <div class="deck" id="deck">
      <div class="card"><b>Research</b><span>Phase one discovery</span></div>
      <div class="card"><b>Design</b><span>Phase two systems</span></div>
      <div class="card"><b>Build</b><span>Phase three deploy</span></div>
      <div class="card"><b>Launch</b><span>Phase four release</span></div>
    </div>
  </div>
</div>
<div class="tail">Complete</div>
<script>
const scene=document.getElementById('scene'),cards=[...document.querySelectorAll('.card')];
function tick(){const r=scene.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-window.innerHeight)));cards.forEach((c,i)=>{const spread=p*(i+1)*90;const rot=(i-cards.length/2)*8*(1-p);c.style.transform=`translateY(${-spread}px) rotateX(${rot}deg) translateZ(${i*8}px)`;c.style.opacity=String(Math.min(1,.4+p*1.2));c.style.zIndex=String(cards.length-i);});}
window.addEventListener('scroll',tick,{passive:true});tick();
</script>
</body>
</html>
