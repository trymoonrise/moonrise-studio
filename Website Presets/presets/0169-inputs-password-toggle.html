<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0169
    slug: inputs-password-toggle
    title: Password Toggle
    category: inputs
    tags: inputs, password
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0169 - Password Toggle</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:2rem}.wrap{position:relative;display:flex;align-items:center}.wrap input{width:260px;padding:12px 40px 12px 12px;border:1px solid #ddd;border-radius:8px;font-size:.95rem}.toggle{position:absolute;right:12px;cursor:pointer;opacity:.5;font-size:.8rem;border:none;background:none}
  </style>
</head>
<body>
<div class="wrap"><input type="password" id="p" placeholder="Password"><button class="toggle" id="t">Show</button></div>
<script>document.getElementById('t').onclick=()=>{const p=document.getElementById('p');const show=p.type==='password';p.type=show?'text':'password';document.getElementById('t').textContent=show?'Hide':'Show';};</script>
</body>
</html>
