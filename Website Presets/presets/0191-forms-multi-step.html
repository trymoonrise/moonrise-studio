--><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0191 — Multi Step Form</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#101010;color:#fff;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(520px,94vw)}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;font:500 10px 'DM Mono';letter-spacing:.2em;text-transform:uppercase;color:#777}.progress{display:flex;gap:6px}.progress i{width:28px;height:2px;background:#333;transition:.45s}.progress i.on{background:#fff}.viewport{position:relative;height:230px;overflow:hidden}.step{position:absolute;inset:0;opacity:0;transform:translateX(50px) rotate(2deg);pointer-events:none;transition:.6s cubic-bezier(.22,1,.36,1)}.step.on{opacity:1;transform:none;pointer-events:auto}.step h2{font:400 clamp(35px,8vw,60px)/1 'Instrument Serif';margin:0 0 28px}.step input,.step select{width:100%;border:0;border-bottom:1px solid #555;background:transparent;padding:14px 0;outline:0;font-size:18px}.step input:focus,.step select:focus{border-color:#fff}.nav{display:flex;justify-content:space-between;border-top:1px solid #292929;padding-top:18px}.nav button{border:0;background:transparent;color:#fff;font:500 11px 'DM Mono';letter-spacing:.18em;text-transform:uppercase;padding:10px}.nav button:disabled{opacity:.2}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><div class="top"><span id="count">01 / 03</span><div class="progress"><i class="on"></i><i></i><i></i></div></div><form><div class="viewport"><section class="step on"><h2>What should we<br><i>call you?</i></h2><input placeholder="Your name" required></section><section class="step"><h2>What are you<br><i>making?</i></h2><select><option>Digital product</option><option>Brand identity</option><option>Something strange</option></select></section><section class="step"><h2>Where can we<br><i>reply?</i></h2><input type="email" placeholder="you@studio.com" required></section></div><div class="nav"><button type="button" id="back">← Back</button><button type="button" id="next">Next →</button></div></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));const steps=[...document.querySelectorAll('.step')],bars=[...document.querySelectorAll('.progress i')],count=document.getElementById('count'),back=document.getElementById('back'),next=document.getElementById('next');let i=0;function draw(){steps.forEach((s,n)=>s.classList.toggle('on',n===i));bars.forEach((b,n)=>b.classList.toggle('on',n<=i));count.textContent=String(i+1).padStart(2,'0')+' / 03';back.disabled=i===0;next.textContent=i===2?'Finish ✓':'Next →';}back.onclick=()=>{i=Math.max(0,i-1);draw()};next.onclick=()=>{if(i<2)i++;else next.textContent='Sent ✓';draw()};draw();</script></body></html>
