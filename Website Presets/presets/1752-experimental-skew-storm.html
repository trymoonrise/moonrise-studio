<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1752
    slug: experimental-skew-storm
    title: Skew Storm Anti-Design
    category: experimental
    tags: experimental, skew, anti-design, storm
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1752 — Skew Storm Anti-Design</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Anton&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f5f0e8;overflow:hidden;font-family:'Space Grotesk',sans-serif}
    .storm{position:fixed;inset:0;display:grid;place-items:center}
    .line{position:absolute;left:50%;top:50%;white-space:nowrap;font-size:clamp(2.5rem,9vw,6rem);font-weight:700;text-transform:uppercase;letter-spacing:-.04em;transform:translate(-50%,-50%) skewX(var(--sk)) rotate(var(--r)) translateY(var(--y));color:var(--c);mix-blend-mode:multiply;animation:shake 1.8s ease-in-out infinite;animation-delay:var(--d);border:3px solid #111;padding:.1em .35em;background:var(--bg);box-shadow:5px 5px 0 #111}
    .line:nth-child(odd){font-family:Anton,sans-serif}
    .foot{position:fixed;bottom:1rem;left:1rem;right:1rem;display:flex;justify-content:space-between;font-family:monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;z-index:5}
    @keyframes shake{0%,100%{transform:translate(-50%,-50%) skewX(var(--sk)) rotate(var(--r)) translateY(var(--y))}50%{transform:translate(-50%,-50%) skewX(calc(var(--sk) * -1)) rotate(calc(var(--r) * -1)) translateY(calc(var(--y) * -1))}}
    @media (prefers-reduced-motion:reduce){.line{animation:none}}
  </style>
</head>
<body>
  <div class="storm" aria-hidden="true">
    <div class="line" style="--sk:-18deg;--r:-6deg;--y:-120px;--c:#111;--bg:#ff0033;--d:0s;color:#fff">WRONG</div>
    <div class="line" style="--sk:22deg;--r:4deg;--y:-40px;--c:#111;--bg:#f2e100;--d:.2s">FASTER</div>
    <div class="line" style="--sk:-12deg;--r:-2deg;--y:40px;--c:#fff;--bg:#0044ff;--d:.4s;color:#fff">UGLIER</div>
    <div class="line" style="--sk:16deg;--r:7deg;--y:120px;--c:#111;--bg:#fff;--d:.6s">BETTER</div>
  </div>
  <div class="foot"><span>ANTI-DESIGN</span><span>1752</span><span>NO RULES</span></div>
</body>
</html>
