<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1540
    slug: transition-stack-peel
    title: Stack Peel Transition
    category: transitions
    tags: transition, stack, peel
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1540 — Stack Peel Transition</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#f5f5f5;display:grid;place-items:center}.stack{position:relative;width:min(300px,85vw);height:200px;cursor:pointer}.sheet{position:absolute;inset:0;border-radius:14px;display:grid;place-items:center;font-size:1.5rem;font-weight:800;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.12);transition:transform .55s cubic-bezier(.22,.61,.36,1),opacity .4s}.sheet:nth-child(1){background:#6c8cff;z-index:3}.sheet:nth-child(2){background:#ff6cb0;z-index:2;transform:translateY(6px) scale(.97)}.sheet:nth-child(3){background:#6cffb8;color:#111;z-index:1;transform:translateY(12px) scale(.94)}.stack.peel .sheet:nth-child(1){transform:translateX(120px) rotate(12deg);opacity:0}
  </style>
</head>
<body>
<div class="stack" id="s"><div class="sheet">A</div><div class="sheet">B</div><div class="sheet">C</div></div><p style="margin-top:1.5rem;color:#888;font-size:.85rem">Click to peel</p>
<script>const s=document.getElementById('s');s.onclick=()=>{s.classList.add('peel');setTimeout(()=>s.classList.remove('peel'),600);};</script>
</body>
</html>
