<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0270
    slug: cta-centered-cta
    title: Centered CTA
    category: cta
    tags: cta, centered
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0270 — Centered CTA</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fafafa;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .stage{position:relative;text-align:center;max-width:520px}
    .ring{position:absolute;left:50%;top:50%;width:280px;height:280px;margin:-140px 0 0 -140px;border:1px solid #e5e5e5;border-radius:50%;animation:spin 18s linear infinite;pointer-events:none}
    .ring::after{content:'';position:absolute;inset:18px;border:1px dashed #ddd;border-radius:50%;animation:spin 28s linear infinite reverse}
    @keyframes spin{to{transform:rotate(360deg)}}
    .kicker{position:relative;font-size:.68rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#888;margin-bottom:1.1rem;opacity:0;animation:up .7s .1s cubic-bezier(.22,1,.36,1) forwards}
    h2{position:relative;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2.4rem,7vw,3.6rem);font-weight:800;letter-spacing:-.045em;line-height:1.02;margin:0 0 1rem;opacity:0;animation:up .8s .2s cubic-bezier(.22,1,.36,1) forwards}
    p{position:relative;color:#666;font-size:1rem;line-height:1.55;margin:0 0 1.75rem;opacity:0;animation:up .8s .35s cubic-bezier(.22,1,.36,1) forwards}
    .btn{position:relative;padding:14px 32px;border:1.5px solid #111;background:#111;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;overflow:hidden;opacity:0;animation:up .8s .5s cubic-bezier(.22,1,.36,1) forwards}
    .btn span{position:relative;z-index:1;display:inline-block;transition:transform .35s cubic-bezier(.22,1,.36,1)}
    .btn::before{content:'';position:absolute;inset:0;background:#fff;transform:translateY(101%);transition:transform .4s cubic-bezier(.22,1,.36,1)}
    .btn:hover::before{transform:none}.btn:hover{color:#111}.btn:hover span{transform:translateX(2px)}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="stage"><div class="ring" aria-hidden="true"></div><div class="kicker">Start here</div><h2>Ready when<br>you are</h2><p>One quiet move. Ship something sharp today.</p><button class="btn" type="button"><span>Get started →</span></button></div>

</body>
</html>
