<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1805
    slug: maps-floating-hud-widgets
    title: Floating HUD Widgets
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1805 - Floating HUD Widgets</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#0b1020;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(640px,95vw);position:relative}
.stage{position:relative;aspect-ratio:16/10;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.stage iframe{filter:saturate(1.1) contrast(1.05)}
.widget{position:absolute;backdrop-filter:blur(14px);background:rgba(10,16,32,.72);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:.85rem 1rem;font-family:'DM Mono',monospace;font-size:.7rem;animation:float 5s ease-in-out infinite}
.w1{top:14px;left:14px;animation-delay:0s}.w2{top:14px;right:14px;text-align:right;animation-delay:.4s}.w3{bottom:14px;left:14px;animation-delay:.8s}.w4{bottom:14px;right:14px;animation-delay:1.2s}
.widget b{display:block;font-family:Syne,sans-serif;font-size:1.1rem;margin-top:.2rem;letter-spacing:-.03em}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#38bdf8;margin-right:6px;box-shadow:0 0 10px #38bdf8;animation:blink 1.2s infinite}
@keyframes float{50%{transform:translateY(-6px)}}@keyframes blink{50%{opacity:.35}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe src="https://www.google.com/maps?q=Lisbon%2C%20Portugal&hl=en&z=13&output=embed" title="HUD map" loading="lazy"></iframe>
<div class="widget w1"><span class="pulse"></span>LIVE<small></small><b>12.4k</b>visitors</div>
<div class="widget w2">ETA<b>8 min</b>via Avenida</div>
<div class="widget w3">Weather<b>18°C</b>clear</div>
<div class="widget w4">Pins<b>7</b>nearby</div>
</div></div>

</body>
</html>
