<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1439
    slug: images-glitch-slice
    title: Glitch Slice Image
    category: images
    tags: images, glitch, slice
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1439 — Glitch Slice Image</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 70% 55% at 50% 45%, #1a1c24, #07080a 70%);
      font-family: Manrope, sans-serif;
      perspective: 1100px;
    }

    .stage {
      position: relative;
      width: min(520px, 88vw);
      aspect-ratio: 16 / 10;
      transform-style: preserve-3d;
      animation: orbit 10s ease-in-out infinite;
    }

    .slice {
      position: absolute;
      inset: 0;
      background-image: url('../stock/media/16-9 Aspect Ratio(image).png');
      background-size: cover;
      background-position: center;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    /* Each strip revealed via clip-path, pushed in Z (glow is child 1) */
    .slice:nth-child(2) {
      clip-path: inset(0 0 87.5% 0);
      transform: translateZ(90px);
      animation: wave-1 5s ease-in-out infinite;
    }
    .slice:nth-child(3) {
      clip-path: inset(12.5% 0 75% 0);
      transform: translateZ(65px);
      animation: wave-2 5s ease-in-out infinite;
    }
    .slice:nth-child(4) {
      clip-path: inset(25% 0 62.5% 0);
      transform: translateZ(40px);
      animation: wave-3 5s ease-in-out infinite;
    }
    .slice:nth-child(5) {
      clip-path: inset(37.5% 0 50% 0);
      transform: translateZ(15px);
      animation: wave-4 5s ease-in-out infinite;
    }
    .slice:nth-child(6) {
      clip-path: inset(50% 0 37.5% 0);
      transform: translateZ(-10px);
      animation: wave-5 5s ease-in-out infinite;
    }
    .slice:nth-child(7) {
      clip-path: inset(62.5% 0 25% 0);
      transform: translateZ(-35px);
      animation: wave-6 5s ease-in-out infinite;
    }
    .slice:nth-child(8) {
      clip-path: inset(75% 0 12.5% 0);
      transform: translateZ(-60px);
      animation: wave-7 5s ease-in-out infinite;
    }
    .slice:nth-child(9) {
      clip-path: inset(87.5% 0 0 0);
      transform: translateZ(-85px);
      animation: wave-8 5s ease-in-out infinite;
    }

    .glow {
      position: absolute;
      inset: 10% 5% -5%;
      background: radial-gradient(ellipse at 50% 100%, rgba(108, 140, 255, 0.22), transparent 65%);
      transform: rotateX(78deg) translateZ(-120px);
      filter: blur(28px);
      pointer-events: none;
      animation: glow-pulse 5s ease-in-out infinite;
    }

    .label {
      position: absolute;
      bottom: -3.25rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      transform: translateZ(40px);
    }

    @keyframes orbit {
      0%, 100% { transform: rotateY(-22deg) rotateX(12deg); }
      50% { transform: rotateY(22deg) rotateX(8deg); }
    }

    @keyframes wave-1 {
      0%, 100% { transform: translateZ(90px) translateX(0); }
      50% { transform: translateZ(130px) translateX(14px); }
    }
    @keyframes wave-2 {
      0%, 100% { transform: translateZ(65px) translateX(0); }
      50% { transform: translateZ(100px) translateX(-10px); }
    }
    @keyframes wave-3 {
      0%, 100% { transform: translateZ(40px) translateX(0); }
      50% { transform: translateZ(75px) translateX(12px); }
    }
    @keyframes wave-4 {
      0%, 100% { transform: translateZ(15px) translateX(0); }
      50% { transform: translateZ(45px) translateX(-8px); }
    }
    @keyframes wave-5 {
      0%, 100% { transform: translateZ(-10px) translateX(0); }
      50% { transform: translateZ(20px) translateX(10px); }
    }
    @keyframes wave-6 {
      0%, 100% { transform: translateZ(-35px) translateX(0); }
      50% { transform: translateZ(-5px) translateX(-12px); }
    }
    @keyframes wave-7 {
      0%, 100% { transform: translateZ(-60px) translateX(0); }
      50% { transform: translateZ(-30px) translateX(8px); }
    }
    @keyframes wave-8 {
      0%, 100% { transform: translateZ(-85px) translateX(0); }
      50% { transform: translateZ(-50px) translateX(-14px); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.9; }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage,
      .slice,
      .glow { animation: none !important; }
      .stage { transform: rotateY(-12deg) rotateX(10deg); }
    }
  </style>
</head>
<body>
  <div class="stage" aria-label="3D sliced image">
    <div class="glow" aria-hidden="true"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <div class="slice"></div>
    <p class="label">3D Slice</p>
  </div>
</body>
</html>
