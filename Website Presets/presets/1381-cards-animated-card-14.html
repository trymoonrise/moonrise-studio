    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0c12;font-family:Outfit,sans-serif;color:#fff}.shell{padding:2px;border-radius:20px;background:conic-gradient(from var(--a,0deg),#7ee0c3,#6c8cff,#f472b6,#7ee0c3);animation:spin 4s linear infinite}.card{padding:1.5rem;border-radius:18px;background:#0b0c12}.card h3{font-family:Syne,sans-serif;margin:0 0 .4rem}.card p{margin:0;color:#8a90a0;font-size:.9rem;line-height:1.5}@property --a{syntax:'<angle>';inherits:false;initial-value:0deg}@keyframes spin{to{--a:360deg}}@media(prefers-reduced-motion:reduce){.shell{animation:none}}
