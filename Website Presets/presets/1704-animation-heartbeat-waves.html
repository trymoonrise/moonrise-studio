<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1704
    slug: animation-heartbeat-waves
    title: Heartbeat Pulse Waves
    category: animation
    tags: animation, pulse, heartbeat, waves
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1694 — Heartbeat Pulse Waves</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0608;
      overflow: hidden;
      font-family: Outfit, sans-serif;
      color: #ffe4ea;
    }

    .pulse {
      position: relative;
      width: min(70vmin, 360px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .wave {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 61, 110, 0.55);
      opacity: 0;
      animation: wave 2.2s cubic-bezier(0.15, 0.7, 0.25, 1) infinite;
    }

    .wave:nth-child(2) { animation-delay: 0.55s; }
    .wave:nth-child(3) { animation-delay: 1.1s; }
    .wave:nth-child(4) { animation-delay: 1.65s; }

    .heart {
      position: relative;
      z-index: 2;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ff8aa8, #ff3d6e 60%, #9b1035);
      box-shadow: 0 0 50px rgba(255, 61, 110, 0.55);
      animation: beat 2.2s ease-in-out infinite;
      font-size: 2rem;
    }

    .meta {
      position: absolute;
      bottom: -4.2rem;
      text-align: center;
    }

    .meta h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .meta p {
      margin: 0.35rem 0 0;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 228, 234, 0.4);
    }

    .bpm {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff3d6e;
    }

    @keyframes wave {
      0% { transform: scale(0.35); opacity: 0.8; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      12% { transform: scale(1.18); }
      24% { transform: scale(0.94); }
      36% { transform: scale(1.12); }
      50% { transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .wave, .heart { animation: none; }
    }
  </style>
</head>
<body>
  <p class="bpm" aria-hidden="true">BPM 72</p>
  <div class="pulse">
    <div class="wave" aria-hidden="true"></div>
    <div class="wave" aria-hidden="true"></div>
    <div class="wave" aria-hidden="true"></div>
    <div class="wave" aria-hidden="true"></div>
    <div class="heart" aria-hidden="true">♥</div>
    <div class="meta">
      <h1>Alive</h1>
      <p>Pulse in motion</p>
    </div>
  </div>
</body>
</html>
