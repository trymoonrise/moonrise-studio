<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0691
    slug: radio-groups-custom-dot-radio-04
    title: Orbital Ring Radio
    category: radio-groups
    tags: radio-groups, custom
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0691 — Orbital Ring Radio</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    .panel {
      width: min(320px, 92vw);
      padding: 1.75rem;
      background: #0f1419;
      border: 1px solid #1e293b;
      border-radius: 12px;
    }

    .panel h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fbbf24;
      margin-bottom: 1.25rem;
    }

    .radio {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      cursor: pointer;
    }

    .radio input { position: absolute; opacity: 0; }

    .dot-wrap {
      width: 24px;
      height: 24px;
      position: relative;
      flex-shrink: 0;
    }

    .ring {
      position: absolute;
      inset: 0;
      border: 2px solid #334155;
      border-radius: 50%;
      transition: border-color 0.3s;
    }

    .orbit {
      position: absolute;
      inset: -4px;
      border: 1px dashed #334155;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .radio input:checked ~ .dot-wrap .ring {
      border-color: #fbbf24;
      animation: ringPulse 2s ease-in-out infinite;
    }

    .radio input:checked ~ .dot-wrap .orbit {
      opacity: 1;
      animation: orbitSpin 4s linear infinite;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 #fbbf2444; }
      50% { box-shadow: 0 0 0 6px #fbbf2400; }
    }

    @keyframes orbitSpin {
      to { transform: rotate(360deg); }
    }

    .core {
      position: absolute;
      inset: 6px;
      background: transparent;
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
    }

    .radio input:checked ~ .dot-wrap .core {
      background: #fbbf24;
      transform: scale(1);
    }

    .text { font-size: 0.95rem; color: #cbd5e1; }
    .sub { display: block; font-size: 0.75rem; color: #64748b; margin-top: 0.15rem; }

    @media (prefers-reduced-motion: reduce) {
      .radio input:checked ~ .dot-wrap .ring,
      .radio input:checked ~ .dot-wrap .orbit { animation: none; }
    }
  </style>
</head>
<body>
  <fieldset class="panel">
    <legend><h2>Priority level</h2></legend>
    <label class="radio">
      <input type="radio" name="prio" value="low">
      <span class="dot-wrap"><span class="orbit"></span><span class="ring"></span><span class="core"></span></span>
      <span class="text">Low<span class="sub">Standard queue</span></span>
    </label>
    <label class="radio">
      <input type="radio" name="prio" value="normal" checked>
      <span class="dot-wrap"><span class="orbit"></span><span class="ring"></span><span class="core"></span></span>
      <span class="text">Normal<span class="sub">Next business day</span></span>
    </label>
    <label class="radio">
      <input type="radio" name="prio" value="urgent">
      <span class="dot-wrap"><span class="orbit"></span><span class="ring"></span><span class="core"></span></span>
      <span class="text">Urgent<span class="sub">Within 2 hours</span></span>
    </label>
  </fieldset>
</body>
</html>
