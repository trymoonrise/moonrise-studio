<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0456
    slug: image-scroll-sticky-gallery-06
    title: Sticky Gallery 06
    category: image-scroll
    tags: image-scroll, sticky
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0456 — Sticky Gallery 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#f8f6f3;color:#1c1917;font-family:system-ui}.track{height:320vh}.sticky{position:sticky;top:0;height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:0}.visual{position:relative;overflow:hidden;background:#111}.visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s}.visual img.on{opacity:1}.meta{display:flex;flex-direction:column;justify-content:center;padding:clamp(2rem,6vw,4rem)}.meta h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.03em;margin-bottom:1rem}.meta p{color:#57534e;line-height:1.7;max-width:36ch}.idx{font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:#a8a29e;margin-bottom:1.5rem}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="visual"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" data-i="0" class="on"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" data-i="1"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" data-i="2"></div><div class="meta"><div class="idx" id="idx">01 — Coast</div><h2 id="title">Golden hour</h2><p id="desc">Light spills across the frame as you scroll through curated scenes.</p></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const data=[{t:'Golden hour',d:'Light spills across the frame.',l:'01 — Coast'},{t:'Deep canopy',d:'Shadow and mist in layered greens.',l:'02 — Forest'},{t:'Heat shimmer',d:'Warm tones and vast horizons.',l:'03 — Desert'}];const imgs=[...document.querySelectorAll('.visual img')];addEventListener('scroll',()=>{const p=prog();const i=Math.min(2,Math.floor(p*3));imgs.forEach((im,j)=>im.classList.toggle('on',j===i));document.getElementById('title').textContent=data[i].t;document.getElementById('desc').textContent=data[i].d;document.getElementById('idx').textContent=data[i].l;},{passive:true});</script>
</body>
</html>
