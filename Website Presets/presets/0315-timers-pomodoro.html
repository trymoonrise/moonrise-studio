<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0315
    slug: timers-pomodoro
    title: Pomodoro Timer
    category: timers
    tags: timers, pomodoro
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0315 — Pomodoro Timer</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background:
        radial-gradient(circle at 20% 18%, rgba(229, 85, 85, 0.14), transparent 34%),
        radial-gradient(circle at 82% 82%, rgba(255, 180, 120, 0.12), transparent 36%),
        #faf7f5;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #1f2937;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: min(100%, 320px);
      padding: 2rem 1.5rem 1.5rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 24px 60px rgba(229, 85, 85, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .label {
      margin-bottom: 1.25rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e55;
    }

    .timer {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 1.5rem;
    }

    .ring {
      transform: rotate(-90deg);
      display: block;
    }

    .ring__bg {
      fill: none;
      stroke: #f0e8e6;
      stroke-width: 10;
    }

    .ring__fg {
      fill: none;
      stroke: #e55;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: var(--o, 0);
      transition: stroke-dashoffset 0.35s linear;
    }

    .time {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: #111827;
    }

    .btn {
      min-width: 148px;
      padding: 0.85rem 1.4rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #e55, #d94444);
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(229, 85, 85, 0.28);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label">Focus session</div>

    <div class="timer">
      <svg class="ring" width="220" height="220" viewBox="0 0 160 160" aria-hidden="true">
        <circle class="ring__bg" cx="80" cy="80" r="70"></circle>
        <circle class="ring__fg" cx="80" cy="80" r="70" id="ring"></circle>
      </svg>
      <div class="time" id="t" aria-live="polite">25:00</div>
    </div>

    <button class="btn" id="b" type="button">Start Focus</button>
  </div>

  <script>
    const TOTAL = 25 * 60;
    const CIRC = 440;

    let sec = TOTAL;
    let iv = null;

    const timeEl = document.getElementById('t');
    const ringEl = document.getElementById('ring');
    const btn = document.getElementById('b');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function render() {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      timeEl.textContent = `${pad(m)}:${pad(s)}`;
      ringEl.style.setProperty('--o', CIRC * (1 - sec / TOTAL));
    }

    function stop() {
      clearInterval(iv);
      iv = null;
      btn.textContent = 'Start Focus';
    }

    function reset() {
      sec = TOTAL;
      render();
    }

    btn.addEventListener('click', () => {
      if (iv) {
        stop();
        return;
      }

      btn.textContent = 'Pause';

      iv = setInterval(() => {
        if (sec <= 0) {
          stop();
          reset();
          return;
        }

        sec -= 1;
        render();

        if (sec <= 0) {
          stop();
          reset();
        }
      }, 1000);
    });

    render();
  </script>
</body>
</html>
