<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1569
    slug: 3d-card-stack-float
    title: 3D Floating Card Stack
    category: 3d-effects
    tags: 3d, card, stack
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1569 — 3D Floating Card Stack</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0b12;perspective:1100px;font-family:Outfit,sans-serif;overflow:hidden}
    .stack{position:relative;width:260px;height:340px;transform-style:preserve-3d;transform:rotateX(18deg) rotateY(-18deg)}
    .card{position:absolute;inset:0;border-radius:20px;border:1px solid rgba(255,255,255,.15);padding:1.5rem;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;transform-style:preserve-3d;animation:float 6s ease-in-out infinite}
    .card h3{margin:0;font-family:Syne,sans-serif;font-size:1.5rem}
    .card p{margin:.4rem 0 0;font-size:.85rem;opacity:.8}
    .c1{background:linear-gradient(160deg,#6c8cff,#3147c8);transform:translateZ(0);animation-delay:0s;z-index:3}
    .c2{background:linear-gradient(160deg,#ff6bcb,#a31f6e);transform:translateZ(-40px) translateY(18px) translateX(14px) rotateZ(-4deg);animation-delay:-2s;z-index:2;opacity:.92}
    .c3{background:linear-gradient(160deg,#7ee0c3,#1f8a6e);transform:translateZ(-80px) translateY(36px) translateX(28px) rotateZ(-8deg);animation-delay:-4s;z-index:1;opacity:.85}
    .stack:hover .c1{transform:translateZ(40px) translateY(-10px)}
    .stack:hover .c2{transform:translateZ(-20px) translateY(8px) translateX(40px) rotateZ(-8deg)}
    .stack:hover .c3{transform:translateZ(-90px) translateY(28px) translateX(70px) rotateZ(-14deg)}
    .card{transition:transform .7s cubic-bezier(.16,1,.3,1)}
    @keyframes float{0%,100%{translate:0 0}50%{translate:0 -12px}}
    @media(prefers-reduced-motion:reduce){.card{animation:none}}
  </style>
</head>
<body>
  <div class="stack">
    <div class="card c3"><h3>Layer 03</h3><p>Deepest plane</p></div>
    <div class="card c2"><h3>Layer 02</h3><p>Mid depth</p></div>
    <div class="card c1"><h3>Layer 01</h3><p>Hover to fan the stack</p></div>
  </div>
</body>
</html>
