<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 041
    slug: fullscreen-hamburger-menu
    title: Fullscreen Hamburger Menu
    category: navigation
    tags: hamburger, menu
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>041 — Fullscreen Hamburger Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f7f7f5;color:#111;font-family:Outfit,sans-serif;overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1.25rem,4vw,3rem);position:relative;z-index:30}
    .logo{font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.03em}
    .burger{width:28px;height:14px;border:0;background:transparent;cursor:pointer;padding:0;display:flex;flex-direction:column;justify-content:space-between;z-index:40}
    .burger i{display:block;height:1px;background:#111;transition:transform .5s cubic-bezier(.22,1,.36,1),opacity .3s}
    .burger.open i:first-child{transform:translateY(6.5px) rotate(45deg)}
    .burger.open i:last-child{transform:translateY(-6.5px) rotate(-45deg)}
    .menu{position:fixed;inset:0;background:#111;color:#fff;display:grid;place-items:center;clip-path:circle(0% at calc(100% - 2.5rem) 2.2rem);transition:clip-path .7s cubic-bezier(.22,1,.36,1);z-index:20;pointer-events:none}
    .menu.open{clip-path:circle(150% at calc(100% - 2.5rem) 2.2rem);pointer-events:auto}
    .menu nav{display:flex;flex-direction:column;gap:.2rem;text-align:center}
    .menu a{font-family:Syne,sans-serif;font-size:clamp(2.5rem,10vw,6rem);font-weight:800;letter-spacing:-.05em;color:#fff;text-decoration:none;line-height:1;opacity:0;transform:translateY(24px);transition:opacity .5s,transform .5s cubic-bezier(.22,1,.36,1)}
    .menu.open a{opacity:1;transform:none}
    .menu.open a:nth-child(1){transition-delay:.15s}.menu.open a:nth-child(2){transition-delay:.22s}
    .menu.open a:nth-child(3){transition-delay:.29s}.menu.open a:nth-child(4){transition-delay:.36s}
    .menu a:hover{opacity:.4}
    .page{height:70vh;display:grid;place-items:center;font-weight:300;letter-spacing:.2em;text-transform:uppercase;font-size:.75rem;color:#999}
    @media(prefers-reduced-motion:reduce){.menu,.burger i,.menu a{transition:none}.menu{clip-path:none;opacity:0}.menu.open{opacity:1}}
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">MIN</div>
    <button class="burger" id="burger" aria-label="Menu" aria-expanded="false"><i></i><i></i></button>
  </div>
  <div class="menu" id="menu">
    <nav><a href="#">Index</a><a href="#">Archive</a><a href="#">Process</a><a href="#">Contact</a></nav>
  </div>
  <div class="page">Open the void</div>
  <script>
    const b=document.getElementById('burger'),m=document.getElementById('menu');
    b.addEventListener('click',()=>{
      const on=m.classList.toggle('open');
      b.classList.toggle('open',on);
      b.setAttribute('aria-expanded',String(on));
    });
  </script>
</body>
</html>
