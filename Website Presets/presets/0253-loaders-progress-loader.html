<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0253 — Progress Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:2rem}.wrap{width:280px;text-align:center}.bar{height:6px;background:#eee;border-radius:99px;overflow:hidden;margin-bottom:8px}.fill{height:100%;background:#6c8cff;width:0%;transition:width .1s}.pct{font-size:.85rem;color:#666}
  </style>
</head>
<body>
<div class="wrap"><div class="bar"><div class="fill" id="f"></div></div><div class="pct" id="p">0%</div></div>
<script>let v=0;const iv=setInterval(()=>{v+=2;document.getElementById('f').style.width=v+'%';document.getElementById('p').textContent=v+'%';if(v>=100)clearInterval(iv);},50);</script>
</body>
</html>
