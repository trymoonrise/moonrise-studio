<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1427
    slug: cards-rgb-glitch-image
    title: RGB Glitch Image Card
    category: cards
    tags: cards, glitch, image
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1427 — RGB Glitch Image Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.card{width:min(300px,90vw);border-radius:12px;overflow:hidden;background:#1a1a2e;cursor:pointer}.thumb{position:relative;aspect-ratio:16/10;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}.card:hover .thumb img{animation:rgb .4s steps(2)}.card:hover .thumb::before,.card:hover .thumb::after{content:'';position:absolute;inset:0;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;mix-blend-mode:screen;opacity:.6}.card:hover .thumb::before{transform:translateX(-4px);filter:hue-rotate(90deg)}.card:hover .thumb::after{transform:translateX(4px);filter:hue-rotate(-90deg)}@keyframes rgb{50%{transform:translateX(2px)}}.cap{padding:12px;color:#fff;font-size:.9rem;font-weight:600}
  </style>
</head>
<body>
<div class="card"><div class="thumb"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cap">RGB Glitch Hover</div></div>

</body>
</html>
