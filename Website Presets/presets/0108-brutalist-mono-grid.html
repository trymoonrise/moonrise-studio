<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0108 - Mono Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#000;color:#fff;font-family:monospace} .grid{display:grid;grid-template-columns:repeat(4,60px);gap:0;border:2px solid #fff}.cell{aspect-ratio:1;border:1px solid #fff;display:grid;place-items:center;font-size:.7rem}
  </style>
</head>
<body>
<div class="grid"><div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div><div class="cell">5</div><div class="cell">6</div><div class="cell">7</div><div class="cell">8</div><div class="cell">9</div><div class="cell">A</div><div class="cell">B</div><div class="cell">C</div><div class="cell">D</div><div class="cell">E</div><div class="cell">F</div><div class="cell">10</div></div>

</body>
</html>
