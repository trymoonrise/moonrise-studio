<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0962
    slug: errors-500-page-02
    title: 500 Page 02
    category: errors
    tags: errors, 500
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0962 - 500 Page 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Share+Tech+Mono&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1a0000;overflow:hidden;color:#fff;font-family:'Share Tech Mono',monospace;text-align:center}
    .alert-bar{position:fixed;top:0;left:0;right:0;padding:.6rem;background:#ff0000;color:#fff;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;animation:strobe .4s step-end infinite;z-index:10}
    .smoke{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 100%,rgba(80,20,0,.6),transparent 60%);animation:smoke-rise 4s ease-in-out infinite}
    .code{font-family:Anton,sans-serif;font-size:clamp(8rem,30vw,18rem);line-height:.85;color:#ff2200;text-shadow:0 0 60px #ff0000,0 0 120px #ff4400;animation:explode 1.5s ease-in-out infinite;letter-spacing:-.02em}
    h1{margin:1rem 0;font-size:clamp(1.2rem,3vw,1.8rem);letter-spacing:.15em;text-transform:uppercase;animation:warn 1s ease-in-out infinite}
    .status{opacity:.6;margin-bottom:2rem;font-size:.85rem}
    .status span{color:#ff6600;animation:blink .5s step-end infinite}
    button{appearance:none;border:2px solid #ff2200;background:transparent;color:#ff2200;padding:1rem 2rem;font:inherit;font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
    button:hover{background:#ff2200;color:#1a0000}
    .spark{position:fixed;width:4px;height:4px;background:#ffaa00;border-radius:50%;pointer-events:none;animation:spark 1.2s ease-out forwards}
    @keyframes strobe{0%,100%{background:#ff0000;color:#fff}50%{background:#fff;color:#ff0000}}
    @keyframes explode{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.08) rotate(-2deg)}60%{transform:scale(.95) rotate(2deg)}}
    @keyframes warn{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes blink{50%{opacity:0}}
    @keyframes smoke-rise{0%,100%{opacity:.7;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.15)}}
    @keyframes spark{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(0)}}
    @media (prefers-reduced-motion:reduce){.alert-bar,.code,h1,.status span,.smoke{animation:none}}
  </style>
</head>
<body>
  <div class="alert-bar">⚠ SERVER MELTDOWN IN PROGRESS ⚠ DO NOT APPROACH ⚠</div>
  <div class="smoke" aria-hidden="true"></div>
  <div>
    <div class="code">500</div>
    <h1>Internal server inferno</h1>
    <p class="status">Rack 7B status: <span>ON FIRE</span> · Engineers: <span>SCREAMING</span></p>
    <button type="button" id="panic">Attempt restart</button>
  </div>
  <script>
    const b=document.getElementById('panic');
    b.addEventListener('click',()=>{
      for(let i=0;i<20;i++){
        const s=document.createElement('div');
        s.className='spark';
        const r=b.getBoundingClientRect();
        s.style.left=(r.left+r.width/2)+'px';
        s.style.top=(r.top+r.height/2)+'px';
        s.style.setProperty('--x',(Math.random()-0.5)*200+'px');
        s.style.setProperty('--y',(Math.random()-0.5)*200+'px');
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1200);
      }
    });
  </script>
</body>
</html>
