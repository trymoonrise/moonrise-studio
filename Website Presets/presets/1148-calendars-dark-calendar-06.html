<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1148
    slug: calendars-dark-calendar-06
    title: Noir Minimal Month Grid
    category: calendars
    tags: calendars, dark, noir, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1148 - Noir Minimal Month Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#060608;color:#d8dce4;font-family:Outfit,sans-serif;padding:2rem}
    .cal{width:min(360px,100%);background:#0c0c0f;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:1.5rem}
    .head{text-align:center;margin-bottom:1.5rem}
    .head h2{font-family:Syne,sans-serif;font-size:1.4rem;letter-spacing:-.04em;margin:0}
    .head p{font-size:.7rem;color:rgba(216,220,228,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:.25rem}
    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
    .wd{font-size:.6rem;color:rgba(216,220,228,.25);padding:.4rem;letter-spacing:.05em}
    .cell{aspect-ratio:1;display:grid;place-items:center;font-size:.85rem;border-radius:6px;transition:background .3s,color .3s;cursor:default}
    .cell.off{color:rgba(216,220,228,.15)}
    .cell:hover:not(.off):not(.sel){background:rgba(255,255,255,.04)}
    .cell.sel{background:#38bdf8;color:#060608;font-family:Syne,sans-serif;font-weight:700;animation:sel-pulse 2s ease infinite}
    .cell.dot{position:relative}
    .cell.dot::after{content:'';position:absolute;bottom:4px;width:3px;height:3px;border-radius:50%;background:#38bdf8}
    @keyframes sel-pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.3)}50%{box-shadow:0 0 0 4px rgba(56,189,248,0)}}
    @media(prefers-reduced-motion:reduce){.cell.sel{animation:none}}
  </style>
</head>
<body>
  <div class="cal">
    <div class="head"><h2>July 2026</h2><p>Noir edition</p></div>
    <div class="grid">
      <span class="wd">Su</span><span class="wd">Mo</span><span class="wd">Tu</span><span class="wd">We</span><span class="wd">Th</span><span class="wd">Fr</span><span class="wd">Sa</span>
      <span class="cell off">28</span><span class="cell off">29</span><span class="cell off">30</span><span class="cell">1</span><span class="cell">2</span><span class="cell dot">3</span><span class="cell">4</span>
      <span class="cell">5</span><span class="cell">6</span><span class="cell">7</span><span class="cell">8</span><span class="cell">9</span><span class="cell">10</span><span class="cell">11</span>
      <span class="cell">12</span><span class="cell">13</span><span class="cell dot">14</span><span class="cell">15</span><span class="cell sel">16</span><span class="cell">17</span><span class="cell">18</span>
      <span class="cell">19</span><span class="cell">20</span><span class="cell">21</span><span class="cell">22</span><span class="cell">23</span><span class="cell">24</span><span class="cell">25</span>
      <span class="cell">26</span><span class="cell">27</span><span class="cell">28</span><span class="cell">29</span><span class="cell">30</span><span class="cell">31</span><span class="cell off">1</span>
    </div>
  </div>
</body>
</html>
