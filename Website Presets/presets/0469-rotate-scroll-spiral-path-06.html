<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0469

    tags: rotate-scroll, spiral

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0469 — Spiral Path 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#1c1917;color:#fcd34d;font-family:system-ui}.track{height:280vh}.sticky{position:sticky;top:0;height:100vh;overflow:hidden}.path{position:absolute;inset:0}.node{position:absolute;width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid #fcd34d;box-shadow:0 0 20px rgba(252,211,77,.3);transform:translate(-50%,-50%)}.node img{width:100%;height:100%;object-fit:cover}svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}path{fill:none;stroke:rgba(252,211,77,.2);stroke-width:2;stroke-dasharray:8 8}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><svg viewBox="0 0 400 400"><path d="M200 200 m-20 0 a 20 20 0 1 0 40 0 a 30 30 0 1 1 -60 0 a 50 50 0 1 0 100 0 a 80 80 0 1 1 -160 0"></path></svg><div class="path" id="path"><div class="node" data-i="0"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="1"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="2"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="3"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="4"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="5"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="6"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="node" data-i="7"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const nodes=[...document.querySelectorAll('.node')];const cx=innerWidth/2,cy=innerHeight/2;addEventListener('scroll',()=>{const p=prog();nodes.forEach((n,i)=>{const t=p*8+i*.4;const r=40+t*35;const a=t*1.2;const x=cx+Math.cos(a)*r;const y=cy+Math.sin(a)*r;n.style.left=x+'px';n.style.top=y+'px';n.style.opacity=String(Math.min(1,Math.max(0,p*1.5-i*.1)));});},{passive:true});</script>
</body>
</html>
