<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1701
    slug: animation-spring-stack
    title: Spring Stack Bounce
    category: animation
    tags: animation, spring, bounce, stack
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1691 - Spring Stack Bounce</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f2efe8;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .stack {
      position: relative;
      width: min(72vw, 280px);
      height: 320px;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 10px;
    }

    .block {
      width: 100%;
      height: 58px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.12);
      transform: translateY(-140vh);
      opacity: 0;
    }

    .block:nth-child(1) { background: #ff5c2e; width: 100%; }
    .block:nth-child(2) { background: #ffc53d; width: 88%; }
    .block:nth-child(3) { background: #4de1ff; width: 76%; }
    .block:nth-child(4) { background: #d6ff3f; width: 64%; }
    .block:nth-child(5) { background: #a78bfa; width: 52%; }

    .block.drop {
      animation: drop 0.85s cubic-bezier(0.2, 1.4, 0.3, 1) forwards;
    }

    .floor {
      position: absolute;
      left: 50%;
      bottom: -18px;
      width: 120%;
      height: 4px;
      transform: translateX(-50%);
      background: #111;
      border-radius: 4px;
    }

    .hint {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.35);
      cursor: pointer;
    }

    @keyframes drop {
      0% { transform: translateY(-140vh) scaleY(1.2); opacity: 0; }
      60% { transform: translateY(10px) scaleY(0.85) scaleX(1.08); opacity: 1; }
      75% { transform: translateY(-8px) scaleY(1.08) scaleX(0.96); }
      88% { transform: translateY(3px) scaleY(0.96) scaleX(1.02); }
      100% { transform: none; opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .block { transform: none; opacity: 1; animation: none; }
    }
  </style>
</head>
<body>
  <div class="stack" id="stack">
    <div class="block">Base</div>
    <div class="block">Spring</div>
    <div class="block">Force</div>
    <div class="block">Rise</div>
    <div class="block">Peak</div>
    <div class="floor" aria-hidden="true"></div>
  </div>
  <p class="hint" id="hint">Click to restack</p>

  <script>
    const blocks = [...document.querySelectorAll('.block')];
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    function play() {
      blocks.forEach((b) => {
        b.classList.remove('drop');
        b.style.opacity = reduced ? '1' : '0';
        b.style.transform = reduced ? 'none' : '';
      });
      if (reduced) return;
      blocks.forEach((b, i) => {
        setTimeout(() => {
          void b.offsetWidth;
          b.classList.add('drop');
        }, i * 140);
      });
    }

    play();
    addEventListener('click', play);
  </script>
</body>
</html>
