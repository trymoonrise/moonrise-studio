<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0466
    slug: rotate-scroll-orbit-gallery-03
    title: Satellite Frame Orbit
    category: rotate-scroll
    tags: rotate-scroll, orbit
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0466 - Satellite Frame Orbit</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#050508;color:#f0f0f4;font-family:Outfit,sans-serif}
    .pad{height:30vh}.run{height:320vh;position:relative}
    .pin{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}
    .orbit{position:relative;width:min(520px,90vw);height:min(520px,90vw);transform-style:preserve-3d}
    .hub{position:absolute;inset:35%;border-radius:50%;border:1px dashed rgba(0,200,150,.3);animation:spin 20s linear infinite}
    .hub b{position:absolute;inset:0;display:grid;place-items:center;font-family:Syne,sans-serif;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,200,150,.7)}
    .sat{position:absolute;top:50%;left:50%;width:140px;height:100px;margin:-50px -70px;border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.15);transform-style:preserve-3d;transition:box-shadow .3s}
    .sat img{width:100%;height:100%;object-fit:cover;display:block}
    .sat.on{box-shadow:0 0 30px rgba(0,200,150,.35)}
    .caption{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);text-align:center;font-family:Syne,sans-serif;font-size:clamp(1.2rem,3vw,1.8rem);letter-spacing:-.02em;opacity:.7}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.hub{animation:none}}
  </style>
</head>
<body>
<div class="pad"></div>
<div class="run" id="run">
  <div class="pin">
    <div class="orbit" id="orbit">
      <div class="hub"><b>Orbit</b></div>
    </div>
    <p class="caption" id="cap">Frame 01</p>
  </div>
</div>
<div class="pad"></div>
<script>
const orbit=document.getElementById('orbit'),cap=document.getElementById('cap'),labels=['Frame 01','Frame 02','Frame 03','Frame 04','Frame 05','Frame 06'];
const n=6,r=180;
for(let i=0;i<n;i++){const el=document.createElement('div');el.className='sat'+(i===0?' on':'');el.innerHTML='<img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate('+(i*40)+'deg)">';el.dataset.i=i;orbit.appendChild(el);}
const sats=[...orbit.querySelectorAll('.sat')];
function go(){const rect=document.getElementById('run').getBoundingClientRect();const p=Math.min(1,Math.max(0,-rect.top/(rect.height-window.innerHeight)));const ang=p*360;sats.forEach((s,i)=>{const a=((i/n)*360+ang)*Math.PI/180;s.style.transform=`rotateY(${ang}deg) rotateY(${-i/n*360}deg) translateZ(${r}px)`;s.classList.toggle('on',Math.abs(((i/n*360+ang)%360+540)%360-180)<30);});const idx=Math.round(p*(n-1));cap.textContent=labels[idx];}
window.addEventListener('scroll',go,{passive:true});go();
</script>
</body>
</html>
