<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1743
    slug: experimental-hazard-tape-spin
    title: Hazard Tape Spin
    category: experimental
    tags: experimental, hazard, tape, spin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1743 - Hazard Tape Spin</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#111;overflow:hidden;display:grid;place-items:center;font-family:'Archivo Black',sans-serif}
    .ring{position:relative;width:min(80vmin,480px);aspect-ratio:1}
    .tape{position:absolute;inset:0;border-radius:50%;animation:spin 12s linear infinite}
    .tape svg{width:100%;height:100%;overflow:visible}
    .tape text{fill:#111;font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:4px;text-transform:uppercase}
    .core{position:absolute;inset:22%;border-radius:50%;background:#ffcc00;border:8px solid #111;display:grid;place-items:center;text-align:center;box-shadow:0 0 0 8px #ffcc00,0 0 60px rgba(255,204,0,.4);animation:pulse 1.2s ease-in-out infinite}
    .core strong{font-size:clamp(1.4rem,5vw,2.4rem);line-height:.9;letter-spacing:-.02em}
    .core span{display:block;margin-top:.4rem;font-family:monospace;font-size:.6rem;letter-spacing:.2em}
    .stripes{position:fixed;inset:0;background:repeating-linear-gradient(45deg,#ffcc00 0 28px,#111 28px 56px);opacity:.08;pointer-events:none;animation:crawl 3s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{50%{transform:scale(1.04)}}
    @keyframes crawl{to{background-position:80px 0}}
    @media (prefers-reduced-motion:reduce){.tape,.core,.stripes{animation:none}}
  </style>
</head>
<body>
  <div class="stripes" aria-hidden="true"></div>
  <div class="ring">
    <div class="tape" aria-hidden="true">
      <svg viewBox="0 0 200 200">
        <defs><path id="c" d="M100,100 m-78,0 a78,78 0 1,1 156,0 a78,78 0 1,1 -156,0"/></defs>
        <text><textPath href="#c">WARNING · DO NOT CROSS · KEEP OUT · DANGER · </textPath></text>
      </svg>
    </div>
    <div class="core"><div><strong>KEEP<br>OUT</strong><span>ZONE 1743</span></div></div>
  </div>
</body>
</html>
