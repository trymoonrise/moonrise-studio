<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1513
    slug: hero-mouse-gradient-follow
    title: Mouse Gradient Hero

    tags: heroes, mouse, gradient, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1513 — Mouse Gradient Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#0a0a0c;color:#fff;overflow:hidden;position:relative}.glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(108,140,255,.35),transparent 70%);pointer-events:none;transform:translate(-50%,-50%);transition:opacity .3s}main{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:800}p{color:#666;margin-top:1rem}
  </style>
</head>
<body>
<div class="glow" id="g"></div><main><h1>Light follows you</h1><p>Cursor-driven ambient gradient</p></main>
<script>const g=document.getElementById('g');addEventListener('mousemove',e=>{g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});</script>
</body>
</html>
