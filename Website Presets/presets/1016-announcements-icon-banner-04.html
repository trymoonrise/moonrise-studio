<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1016
    slug: announcements-icon-banner-04
    title: Icon Banner 04
    category: announcements
    tags: announcements, icon
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1016 — Icon Banner 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:start center;padding-top:2rem;background:#f7f7f5;font-family:Manrope,sans-serif;perspective:900px}
    .banner{
      display:flex;align-items:center;gap:1rem;width:min(620px,calc(100% - 2rem));padding:1rem 1.2rem;
      border-radius:20px;background:#fff;border:1px solid #e8e8e4;box-shadow:0 18px 40px rgba(0,0,0,.08);
      transform-style:preserve-3d;animation:settle 1.1s cubic-bezier(.16,1,.3,1) both;
    }
    .icon-wrap{
      width:48px;height:48px;flex-shrink:0;transform-style:preserve-3d;
    }
    .icon{
      width:100%;height:100%;border-radius:14px;display:grid;place-items:center;
      background:linear-gradient(145deg,#2f6bff,#6c8cff);color:#fff;
      box-shadow:0 12px 24px rgba(47,107,255,.35);
      animation:tumble 1s cubic-bezier(.16,1,.3,1) both;
    }
    .copy{flex:1}
    .title{font-size:.95rem;font-weight:700;color:#151515}
    .sub{margin-top:.2rem;font-size:.8rem;color:#777}
    @keyframes settle{from{opacity:0;transform:rotateX(-18deg) translateY(-20px)}to{opacity:1;transform:none}}
    @keyframes tumble{0%{transform:rotateY(-90deg) scale(.85);opacity:0}100%{transform:none;opacity:1}}
    @media (prefers-reduced-motion:reduce){.banner,.icon{animation:none}}
  </style>
</head>
<body>
  <div class="banner" role="status">
    <div class="icon-wrap" aria-hidden="true">
      <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M13 2L3 14h8l-1 8 11-14h-8l1-6z"/></svg>
      </div>
    </div>
    <div class="copy">
      <div class="title">Performance mode enabled</div>
      <div class="sub">Assets are served from the nearest edge region.</div>
    </div>
  </div>
</body>
</html>
