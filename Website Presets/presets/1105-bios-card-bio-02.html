<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1105
    slug: bios-card-bio-02
    title: Card Bio 02
    category: bios
    tags: bios, card, experimental, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1105 - Card Bio 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f0ebe3;font-family:'DM Sans',sans-serif;overflow:hidden}
    .wrap{position:relative;width:min(300px,88vw);animation:in .9s cubic-bezier(.22,1,.36,1) both}
    .blob{position:absolute;inset:-18px;background:linear-gradient(140deg,#d4a373,#e9c46a 50%,#a3b18a);border-radius:40% 60% 55% 45% / 55% 40% 60% 45%;opacity:.55;animation:morph 8s ease-in-out infinite;filter:blur(2px)}
    .card{position:relative;background:rgba(255,252,247,.88);backdrop-filter:blur(8px);border-radius:28px 48px 32px 52px;padding:1.8rem 1.5rem;border:1px solid rgba(0,0,0,.06)}
    .avatar{width:56px;height:56px;background:#2d2a26;color:#f7f3ec;display:grid;place-items:center;font-family:Fraunces,serif;font-size:1.2rem;border-radius:40% 60% 50% 50% / 50% 40% 60% 50%;animation:morph 7s ease-in-out infinite reverse;margin-bottom:1rem}
    h2{margin:0;font-family:Fraunces,serif;font-weight:600;font-size:1.4rem;color:#2d2a26;letter-spacing:-.02em}
    .role{margin:.3rem 0 0;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(45,42,38,.45)}
    p{margin:1rem 0 0;font-size:.88rem;line-height:1.5;color:rgba(45,42,38,.7)}
    @keyframes morph{0%,100%{border-radius:40% 60% 55% 45% / 55% 40% 60% 45%}50%{border-radius:55% 45% 40% 60% / 45% 55% 45% 55%}}
    @keyframes in{from{opacity:0;transform:translateY(18px) scale(.96)}}
    @media (prefers-reduced-motion:reduce){.blob,.avatar,.wrap{animation:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="blob" aria-hidden="true"></div>
    <div class="card">
      <div class="avatar">SC</div>
      <h2>Sana Cho</h2>
      <p class="role">Illustrator</p>
      <p>Soft forms, sharp ideas - drawing systems that breathe.</p>
    </div>
  </div>
</body>
</html>
