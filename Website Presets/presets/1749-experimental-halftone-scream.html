<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1749
    slug: experimental-halftone-scream
    title: Halftone Scream
    category: experimental
    tags: experimental, halftone, print, type
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1749 - Halftone Scream</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#e8e0d4;display:grid;place-items:center;overflow:hidden;font-family:Anton,sans-serif}
    .poster{position:relative;text-align:center;padding:2rem}
    .word{margin:0;font-size:clamp(4.5rem,20vw,13rem);line-height:.8;letter-spacing:-.04em;text-transform:uppercase;color:transparent;
      background-image:radial-gradient(circle,#000 1.1px,transparent 1.2px);
      background-size:6px 6px;
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-stroke:1px rgba(0,0,0,.25);
      filter:contrast(1.2);
      animation:zoom-dots 3.5s ease-in-out infinite}
    .word::before{content:'LOUD';position:absolute;inset:0;display:grid;place-items:center;color:#ff0033;mix-blend-mode:multiply;opacity:.55;transform:translate(6px,4px);animation:offset 3.5s ease-in-out infinite}
    .meta{margin-top:1.5rem;font-family:monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:#444}
    @keyframes zoom-dots{0%,100%{background-size:5px 5px;transform:scale(1)}50%{background-size:10px 10px;transform:scale(1.04)}}
    @keyframes offset{0%,100%{transform:translate(6px,4px)}50%{transform:translate(-8px,-3px)}}
    @media (prefers-reduced-motion:reduce){.word,.word::before{animation:none}}
  </style>
</head>
<body>
  <div class="poster">
    <h1 class="word">LOUD</h1>
    <p class="meta">1749 · Halftone print fail</p>
  </div>
</body>
</html>
