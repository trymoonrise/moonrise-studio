<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1657
    slug: ease-in-icon-pop
    title: Icon Pop Ease
    category: ease-in
    tags: ease-in, icon, pop, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1657 — Icon Pop Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.icons{display:flex;gap:20px}.icon{width:52px;height:52px;border-radius:14px;background:#1a1a2e;border:1px solid #2a2a40;display:grid;place-items:center;color:#6c8cff;font-size:1.2rem;opacity:0;transform:scale(.5) rotate(-10deg);animation:pop .6s cubic-bezier(.22,.61,.36,1) forwards}.icon:nth-child(1){animation-delay:.05s}.icon:nth-child(2){animation-delay:.12s}.icon:nth-child(3){animation-delay:.19s}.icon:nth-child(4){animation-delay:.26s}@keyframes pop{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="icons"><div class="icon">✦</div><div class="icon">◆</div><div class="icon">●</div><div class="icon">▲</div></div>

</body>
</html>
