<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0450
    slug: scroll-animations-clip-path-scroll-14
    title: Clip Path Scroll 14
    category: scroll-animations
    tags: scroll-animations, clip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0450 — Clip Path Scroll 14</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0a0a0c;color:#fff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;overflow:hidden}.img{position:absolute;inset:0;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;filter:saturate(1.15)}.mask{position:absolute;inset:0;background:#0a0a0c;clip-path:circle(calc(var(--r,0)*1%) at 50% 50%)}.copy{position:relative;z-index:1;height:100%;display:grid;place-items:center;text-align:center;padding:2rem}h1{font-size:clamp(2.2rem,7vw,4.8rem);letter-spacing:-.05em}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="img"></div><div class="mask" id="m"></div><div class="copy"><h1>Clip Reveal</h1></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const m=document.getElementById('m');addEventListener('scroll',()=>{const p=prog();m.style.setProperty('--r',String(10+p*90));},{passive:true});</script>
</body>
</html>
