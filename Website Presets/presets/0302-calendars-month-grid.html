<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0302
    slug: calendars-month-grid
    title: Month Grid Calendar
    category: calendars
    tags: calendars, month
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0302 - Month Grid Calendar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem}.cal{width:300px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}.head{padding:12px;text-align:center;font-weight:600;background:#6c8cff;color:#fff}.grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.8rem}.dow{padding:8px 4px;color:#999;font-weight:600;font-size:.7rem}.day{padding:8px 4px;cursor:pointer;border-radius:6px;margin:2px}.day:hover{background:#f0f4ff}.day.today{background:#6c8cff;color:#fff}
  </style>
</head>
<body>
<div class="cal"><div class="head">July 2026</div><div class="grid"><div class="dow">S</div><div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div><div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day today">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day">13</div><div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div><div class="day">30</div><div class="day">31</div></div></div>
<script>document.querySelectorAll('.day').forEach(d=>d.onclick=()=>{document.querySelectorAll('.day').forEach(x=>x.classList.remove('today'));d.classList.add('today');});</script>
</body>
</html>
