<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0724
    slug: textareas-emoji-area-11
    title: Emoji Area 11
    category: textareas
    tags: textareas, modern, experimental, exaggerated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0724 — Emoji Area 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fffbeb;font-family:Inter,system-ui,sans-serif;overflow:hidden;padding:24px;color:#111}
    textarea{font:inherit;border:0;outline:0;resize:none;background:transparent;color:inherit;width:100%}
    button{font:inherit;border:0;cursor:pointer}
    .scene{position:relative;width:min(520px,92vw)}
    .composer{border-radius:36px;background:#fff;border:1px solid rgba(146,64,14,.14);padding:20px;box-shadow:0 26px 70px rgba(146,64,14,.14)}.emojis{display:flex;gap:8px;margin-bottom:16px}.emojis button{width:38px;height:38px;border-radius:15px;background:#fffbeb;font-size:18px;transition:transform .2s,background .2s}.emojis button:hover{transform:translateY(-4px) rotate(-8deg);background:#fde68a}.area{min-height:170px;font-size:24px;line-height:1.3;font-weight:700;color:#3b2507}.area::placeholder{color:#d6b76b}.bubble{height:8px;width:80px;border-radius:99px;background:linear-gradient(90deg,#f59e0b,#facc15);margin-top:16px;animation:wobble 3s ease-in-out infinite}@keyframes wobble{50%{width:140px;border-radius:20px}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="scene"><section class="composer"><div class="emojis"><button>✨</button><button>🔥</button><button>🌀</button><button>💬</button></div><textarea id="ta" class="area">Add emotion without making the UI childish.</textarea><div class="bubble"></div></section></div>
  <script>const ta=document.getElementById('ta');document.querySelectorAll('button').forEach(b=>b.onclick=()=>{const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+b.textContent+' '+ta.value.slice(s);ta.focus();ta.setSelectionRange(s+3,s+3);});</script>
</body>
</html>
