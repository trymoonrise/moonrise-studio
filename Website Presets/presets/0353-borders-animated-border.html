<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0353
    slug: borders-animated-border
    title: Animated Border
    category: borders
    tags: borders, animated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0353 — Animated Border</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;color:#fff}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .card{position:relative;width:min(100%,300px);padding:2.5rem 2rem;text-align:center;border-radius:2px;background:#141414;overflow:hidden}
    .card::before{content:'';position:absolute;inset:0;padding:2px;background:conic-gradient(from var(--a,0deg),#fff,#555,#fff,#222,#fff);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:spin 4s linear infinite;border-radius:2px}
    @property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
    @keyframes spin{to{--a:360deg}}
    .num{font-family:"Syne",system-ui,sans-serif;font-size:3rem;font-weight:800;letter-spacing:-.06em;line-height:1;margin-bottom:.5rem}
    p{margin:0;color:#888;font-size:.88rem}
  </style>
</head>
<body>
<div class="card"><div class="num">04</div><p>Spinning conic edge.</p></div>

</body>
</html>
