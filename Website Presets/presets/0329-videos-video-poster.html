<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0329 - Video with Poster</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem}.wrap{position:relative;width:min(90vw,440px);aspect-ratio:16/9;border-radius:12px;overflow:hidden;cursor:pointer}img,video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}video{display:none}.play{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.3);z-index:1;font-size:2.5rem;color:#fff}
  </style>
</head>
<body>
<div class="wrap" id="w"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><video src="../stock/media/16-9 Aspect Ratio(video).mp4" id="v" muted playsinline></video><div class="play" id="p">▶</div></div>
<script>document.getElementById('w').onclick=()=>{const v=document.getElementById('v');v.style.display='block';document.getElementById('p').style.display='none';document.querySelector('img').style.display='none';v.play();};</script>
</body>
</html>
