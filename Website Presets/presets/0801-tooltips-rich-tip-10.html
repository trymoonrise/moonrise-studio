<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0801
    slug: tooltips-rich-tip-10
    title: Rich Tip 10
    category: tooltips
    tags: tooltips, rich
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0801 - Rich Tip 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .wrap{position:relative;display:inline-block}
    .btn{padding:12px 26px;border:1px solid #333;background:#1a1a1a;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:border-color .25s}
    .btn:hover{border-color:#888}
    .tip{position:absolute;bottom:calc(100% + 14px);left:50%;translate:-50% 8px;width:260px;background:#fff;color:#111;opacity:0;visibility:hidden;pointer-events:none;overflow:hidden;transition:opacity .35s,translate .35s cubic-bezier(.22,1,.36,1),visibility .35s;text-align:left}
    .tip img{display:block;width:100%;height:100px;object-fit:cover;filter:grayscale(1);transition:filter .4s}
    .tip .body{padding:1rem}
    .tip h4{margin:0 0 .3rem;font-family:"Syne",system-ui,sans-serif;font-size:.95rem;font-weight:800;letter-spacing:-.03em}
    .tip p{margin:0;font-size:.78rem;line-height:1.45;color:#555}
    .tip .meta{margin-top:.65rem;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:#999}
    .wrap:hover .tip{opacity:1;visibility:visible;translate:-50% 0}
    .wrap:hover .tip img{filter:grayscale(0)}
  </style>
</head>
<body>
<div class="wrap"><button class="btn" type="button">Preview asset</button><div class="tip" role="tooltip"><img src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=600&q=70" alt=""><div class="body"><h4>Structure study</h4><p>Concrete geometry from the form archive.</p><div class="meta">Image · 16:9</div></div></div></div>

</body>
</html>
