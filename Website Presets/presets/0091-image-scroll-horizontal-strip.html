<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0091
    slug: image-scroll-horizontal-strip
    title: Horizontal Image Strip
    category: image-scroll
    tags: image-scroll, horizontal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0091 — Horizontal Image Strip</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#111;overflow-x:hidden} .wrap{height:400vh}.bar{position:sticky;top:0;height:100vh;display:flex;align-items:center}.strip{display:flex;gap:1.5rem;transform:translateX(var(--x,0))}img{height:60vh;border-radius:8px;flex-shrink:0}
  </style>
</head>
<body>
<div class="wrap"><div class="bar"><div class="strip"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div>
<script>const w=document.querySelector('.wrap');addEventListener('scroll',()=>{const r=w.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));document.querySelector('.strip').style.setProperty('--x',-p*600+'px');});</script>
</body>
</html>
