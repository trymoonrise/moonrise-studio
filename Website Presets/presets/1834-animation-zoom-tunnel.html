<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1834
    slug: animation-zoom-tunnel
    title: Infinite Zoom Tunnel
    category: animation
    tags: animation, zoom, tunnel, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1834 — Infinite Zoom Tunnel</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
      .tunnel{position:relative;width:min(80vw,360px);aspect-ratio:1}
      .ring{position:absolute;inset:0;border:1px solid rgba(255,255,255,.25);animation:zoom 4s linear infinite}
      .ring:nth-child(2){animation-delay:-1s}.ring:nth-child(3){animation-delay:-2s}.ring:nth-child(4){animation-delay:-3s}
      @keyframes zoom{0%{transform:scale(.15);opacity:0}15%{opacity:1}100%{transform:scale(2.4);opacity:0}}
      .core{position:absolute;inset:0;display:grid;place-items:center;font-family:"Syne",system-ui,sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;z-index:2}
  </style>
</head>
<body>
<div class="tunnel"><div class="ring" aria-hidden="true"></div><div class="ring" aria-hidden="true"></div><div class="ring" aria-hidden="true"></div><div class="ring" aria-hidden="true"></div><div class="core">Tunnel</div></div>

</body>
</html>
