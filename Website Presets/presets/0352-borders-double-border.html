<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0352
    slug: borders-double-border
    title: Double Border
    category: borders
    tags: borders, double
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0352 — Double Border</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;color:#111}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .stack{position:relative;width:min(100%,280px)}
    .outer{padding:1.75rem;border:2px solid #111;position:relative;animation:settle .9s cubic-bezier(.22,1,.36,1) both}
    .outer::before{content:'';position:absolute;inset:-10px;border:1px solid #111;pointer-events:none;animation:breath 4s ease-in-out infinite}
    @keyframes breath{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.01)}}
    @keyframes settle{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .inner{border-top:1px solid #ddd;padding-top:1.25rem;margin-top:.25rem}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-.03em;margin:0 0 .4rem}
    p{margin:0;color:#666;font-size:.88rem;line-height:1.5}
  </style>
</head>
<body>
<div class="stack"><div class="outer"><h2>Double frame</h2><div class="inner"><p>Nested outlines. Quiet depth.</p></div></div></div>

</body>
</html>
