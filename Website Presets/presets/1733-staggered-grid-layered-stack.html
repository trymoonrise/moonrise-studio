<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1763
    slug: staggered-grid-layered-stack
    title: Layered Stack Grid
    category: animation
    tags: grid, stagger, stack, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1763 - Layered Stack Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#ece8df;color:#151515;font-family:Inter,system-ui,sans-serif;padding:2rem;display:grid;place-items:center}.wrap{width:min(1020px,100%)}h1{margin:0 0 1.5rem;font-size:clamp(2.3rem,7vw,5.4rem);line-height:.86;letter-spacing:-.08em}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem}.stack{height:260px;position:relative;opacity:0;transform:translateY(30px);animation:appear .7s ease forwards;animation-delay:calc(var(--i)*90ms)}.sheet{position:absolute;inset:0;border-radius:22px;background:var(--c);box-shadow:0 18px 45px rgba(0,0,0,.14);display:flex;align-items:end;padding:1rem;color:#fff;font-weight:800;font-size:1.5rem;letter-spacing:-.05em;transition:transform .35s ease}.sheet:nth-child(1){transform:rotate(-4deg) translate(-8px,8px);opacity:.45}.sheet:nth-child(2){transform:rotate(3deg) translate(8px,2px);opacity:.7}.sheet:nth-child(3){background:#111;transform:rotate(0)}.stack:hover .sheet:nth-child(1){transform:rotate(-10deg) translate(-24px,18px)}.stack:hover .sheet:nth-child(2){transform:rotate(8deg) translate(22px,8px)}.stack:hover .sheet:nth-child(3){transform:translateY(-8px)}@keyframes appear{to{opacity:1;transform:none}}@media(max-width:720px){.grid{grid-template-columns:1fr}.stack{height:220px}}@media(prefers-reduced-motion:reduce){.stack{opacity:1;transform:none;animation:none}.sheet{transition:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Layer stacks</h1>
    <section class="grid">
      <div class="stack" style="--i:1;--c:#6c8cff"><div class="sheet"></div><div class="sheet"></div><div class="sheet">Brand</div></div>
      <div class="stack" style="--i:2;--c:#ff6b3d"><div class="sheet"></div><div class="sheet"></div><div class="sheet">Product</div></div>
      <div class="stack" style="--i:3;--c:#7ee0c3"><div class="sheet"></div><div class="sheet"></div><div class="sheet">Motion</div></div>
    </section>
  </main>
</body>
</html>
