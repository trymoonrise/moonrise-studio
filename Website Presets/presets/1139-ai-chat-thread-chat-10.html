<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1139
    slug: ai-chat-thread-chat-10
    title: Thread Chat 10
    category: ai-chat
    tags: ai-chat, thread
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1139 - Thread Chat 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#212121;font-family:Inter,system-ui,sans-serif;padding:1.5rem;color:#ececec}
    .shell{width:min(640px,100%);height:min(520px,80vh);display:flex;flex-direction:column;background:#171717;border:1px solid #2f2f2f;border-radius:20px;overflow:hidden;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .feed{flex:1;padding:1.5rem;overflow:auto;display:flex;flex-direction:column;gap:1.15rem}
    .row{display:flex;gap:.75rem;opacity:0;animation:fade .55s cubic-bezier(.16,1,.3,1) forwards}
    .row:nth-child(1){animation-delay:.1s}.row:nth-child(2){animation-delay:.3s}.row:nth-child(3){animation-delay:.5s}
    .avatar{width:28px;height:28px;border-radius:50%;flex:none;background:#2f2f2f;display:grid;place-items:center;font-size:.65rem;font-weight:600}
    .row.bot .avatar{background:#10a37f}
    .content{flex:1;min-width:0}
    .name{font-size:.72rem;color:#9a9aa0;margin-bottom:.25rem}
    .text{font-size:.9rem;line-height:1.55;color:#d8d8d8}
    .composer{padding:0 1rem 1rem}
    .ask{display:flex;align-items:flex-end;gap:.5rem;padding:.55rem .55rem .55rem 1rem;background:#303030;border:1px solid #444;border-radius:24px;transition:border-color .25s,box-shadow .25s}
    .ask:focus-within{border-color:#666;box-shadow:0 0 0 3px rgba(16,163,127,.12)}
    .ask textarea{flex:1;border:none;outline:none;background:transparent;color:#ececec;font:inherit;font-size:.9rem;resize:none;max-height:100px;padding:.35rem 0;line-height:1.4}
    .ask textarea::placeholder{color:#8f8f8f}
    .send{width:34px;height:34px;border:none;border-radius:50%;background:#fff;color:#111;cursor:pointer;display:grid;place-items:center;flex:none}
    .send svg{width:15px;height:15px}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.shell,.row{animation:none;opacity:1}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="feed">
      <div class="row user"><div class="avatar">You</div><div class="content"><div class="name">You</div><div class="text">Outline a 3-step onboarding flow.</div></div></div>
      <div class="row bot"><div class="avatar">AI</div><div class="content"><div class="name">Assistant</div><div class="text">1. Welcome + value promise. 2. One key action. 3. Celebrate completion with a next hint.</div></div></div>
      <div class="row user"><div class="avatar">You</div><div class="content"><div class="name">You</div><div class="text">Make step 2 feel lighter.</div></div></div>
    </div>
    <div class="composer">
      <form class="ask">
        <textarea rows="1" placeholder="Ask anything…" aria-label="Ask anything"></textarea>
        <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>
    </div>
  </div>
</body>
</html>
