<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1640
    slug: ease-in-logo-mark
    title: Logo Mark Ease
    category: ease-in
    tags: ease-in, logo, brand, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1640 — Logo Mark Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0a0a0c;font-family:system-ui,sans-serif}.brand{text-align:center}.mark{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#6c8cff,#764ba2);margin:0 auto 1rem;opacity:0;transform:scale(.6) rotate(-8deg);animation:mark .8s cubic-bezier(.22,.61,.36,1) forwards}.name{font-size:1.25rem;font-weight:700;color:#fff;opacity:0;letter-spacing:.02em;animation:fade .6s cubic-bezier(.22,.61,.36,1) .35s forwards}.tag{font-size:.8rem;color:#666;margin-top:.35rem;opacity:0;animation:fade .6s cubic-bezier(.22,.61,.36,1) .5s forwards}@keyframes mark{to{opacity:1;transform:none}}@keyframes fade{to{opacity:1}}
  </style>
</head>
<body>
<div class="brand"><div class="mark"></div><div class="name">Arc Studio</div><p class="tag">Brand identity</p></div>

</body>
</html>
