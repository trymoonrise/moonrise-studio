<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0316
    slug: timers-circular-timer
    title: Circular Progress Timer
    category: timers
    tags: timers, circular
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0316 - Circular Progress Timer</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#111}.wrap{position:relative;width:160px;height:160px}.ring{transform:rotate(-90deg)}.bg{fill:none;stroke:#333;stroke-width:8}.fg{fill:none;stroke:#6c8cff;stroke-width:8;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:var(--o,110);transition:stroke-dashoffset .5s}.label{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:1.8rem;font-weight:700}
  </style>
</head>
<body>
<div class="wrap"><svg class="ring" width="160" height="160" viewBox="0 0 160 160"><circle class="bg" cx="80" cy="80" r="70"/><circle class="fg" cx="80" cy="80" r="70" id="fg"/></svg><div class="label" id="l">45s</div></div>
<script>let t=45;setInterval(()=>{t=t>0?t-1:45;document.getElementById('l').textContent=t+'s';document.getElementById('fg').style.setProperty('--o',440*(1-t/60));},1000);</script>
</body>
</html>
