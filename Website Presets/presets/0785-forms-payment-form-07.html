--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0785 — Payment Form 07</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#111;color:#fff;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(440px,92vw)}.card{height:210px;border-radius:24px;padding:24px;background:linear-gradient(135deg,#292929,#121212);border:1px solid #444;box-shadow:0 30px 70px #0008;transform:rotate(-2deg);transition:.5s;margin-bottom:25px}.shell:focus-within .card{transform:rotate(1deg) translateY(-7px)}.chip{width:40px;height:30px;border-radius:7px;background:#d9ff57;margin-bottom:42px}.number{font:500 18px 'DM Mono';letter-spacing:.12em}.bottom{display:flex;justify-content:space-between;margin-top:18px;font:500 10px 'DM Mono';color:#aaa}.form{display:grid;grid-template-columns:1fr 100px;gap:12px}.form input{border:1px solid #333;border-radius:12px;background:#181818;padding:13px;outline:0}.form input:focus{border-color:#d9ff57}.wide{grid-column:1/-1}.pay{grid-column:1/-1;border:0;border-radius:12px;background:#d9ff57;color:#111;padding:15px;font-weight:700}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><div class="card"><div class="chip"></div><div class="number" id="mirror">•••• •••• •••• ••••</div><div class="bottom"><span>YOUR NAME</span><span>12 / 30</span></div></div><form class="form"><input class="wide" id="number" maxlength="19" placeholder="Card number"><input placeholder="Name"><input maxlength="5" placeholder="MM/YY"><button class="pay">Pay $48 →</button></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));const num=document.getElementById('number'),mirror=document.getElementById('mirror');num.oninput=()=>{let v=num.value.replace(/D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();num.value=v;mirror.textContent=(v+' •••• •••• •••• ••••').slice(0,19);};</script></body></html>
