<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1800
    slug: staggered-grid-ink-flood
    title: Ink Flood Grid
    category: animation
    tags: grid, stagger, ink, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1800 — Ink Flood Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f7f7f7;color:#111;font-family:"DM Sans",system-ui,sans-serif;padding:2rem;display:grid;place-items:center}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tile,.cell,.brick,.module,.card,.panel{opacity:1!important;transform:none!important;clip-path:none!important;filter:none!important}}
    .wrap{width:min(940px,100%)}
    h1{margin:0 0 1.5rem;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2.4rem,7vw,5rem);font-weight:800;letter-spacing:-.08em}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .cell{min-height:180px;position:relative;overflow:hidden;border:1px solid #ddd;background:#fff}
    .fill{position:absolute;inset:0;background:#111;transform:scaleY(0);transform-origin:bottom;animation:flood .7s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*85ms)}
    .cell:nth-child(even) .fill{transform-origin:top;background:#222}
    .copy{position:relative;z-index:1;padding:1.25rem;height:100%;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;opacity:0;animation:fade .5s ease forwards;animation-delay:calc(var(--i)*85ms + .45s)}
    .copy b{font-family:"Syne",system-ui,sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.04em}
    .copy span{font-size:.7rem;opacity:.55;margin-top:.3rem}
    @keyframes flood{to{transform:scaleY(1)}}
    @keyframes fade{to{opacity:1}}
    @media(max-width:560px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap"><h1>Ink flood</h1>
    <section class="grid">
      <article class="cell" style="--i:1"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Bleed</b><span>From the edge</span></div></article><article class="cell" style="--i:2"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Pool</b><span>Collects</span></div></article><article class="cell" style="--i:3"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Dry</b><span>Settles</span></div></article><article class="cell" style="--i:4"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Mark</b><span>Permanent</span></div></article><article class="cell" style="--i:5"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Spill</b><span>Overflow</span></div></article><article class="cell" style="--i:6"><div class="fill" aria-hidden="true"></div><div class="copy"><b>Stain</b><span>Archive</span></div></article>
    </section></main>

</body>
</html>
