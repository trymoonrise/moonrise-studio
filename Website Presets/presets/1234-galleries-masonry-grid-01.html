<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1234
    slug: galleries-masonry-grid-01
    title: Asymmetric Masonry Grid
    category: galleries
    tags: galleries, masonry, asymmetric, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1234 — Asymmetric Masonry Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0c0e12;color:#e4e7ed;font-family:Outfit,sans-serif;padding:2rem}
    h1{font-family:Syne,sans-serif;font-size:1.4rem;letter-spacing:-.04em;margin-bottom:1.5rem;text-align:center}
    .grid{columns:3;column-gap:12px;max-width:900px;margin:0 auto}
    .item{break-inside:avoid;margin-bottom:12px;border-radius:8px;overflow:hidden;position:relative;cursor:pointer;animation:reveal .6s ease backwards}
    .item:nth-child(1){animation-delay:.05s}.item:nth-child(2){animation-delay:.1s}.item:nth-child(3){animation-delay:.15s}.item:nth-child(4){animation-delay:.2s}.item:nth-child(5){animation-delay:.25s}.item:nth-child(6){animation-delay:.3s}
    .item img{width:100%;display:block;transition:transform .5s cubic-bezier(.16,1,.3,1),filter .4s}
    .item.tall img{aspect-ratio:3/4;object-fit:cover}
    .item.wide img{aspect-ratio:16/9;object-fit:cover}
    .item.sq img{aspect-ratio:1;object-fit:cover}
    .item::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.5));opacity:0;transition:opacity .3s}
    .item:hover img{transform:scale(1.04);filter:brightness(1.1)}
    .item:hover::after{opacity:1}
    @keyframes reveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @media(max-width:700px){.grid{columns:2}}
    @media(max-width:420px){.grid{columns:1}}
    @media(prefers-reduced-motion:reduce){.item{animation:none}}
  </style>
</head>
<body>
  <h1>Selected works</h1>
  <div class="grid">
    <div class="item tall"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="item sq"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="item wide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="item sq"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="item tall"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="item wide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
  </div>
</body>
</html>
