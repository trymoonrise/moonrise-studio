<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1142
    slug: ai-chat-compact-chat-13
    title: Compact Chat 13
    category: ai-chat
    tags: ai-chat, compact
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1142 — Compact Chat 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef1f6;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#111}
    .pill{position:relative;display:flex;align-items:center;gap:.55rem;width:min(420px,100%);padding:.45rem .45rem .45rem .85rem;background:#fff;border:1px solid #e2e5ea;border-radius:999px;box-shadow:0 12px 36px rgba(20,30,50,.1);animation:up .7s cubic-bezier(.16,1,.3,1) both;overflow:hidden}
    .pill::before{content:"";position:absolute;left:-40%;top:0;width:35%;height:100%;background:linear-gradient(90deg,transparent,rgba(16,163,127,.12),transparent);animation:sheen 3.5s ease-in-out infinite}
    .spark{width:22px;height:22px;flex:none;border-radius:50%;background:conic-gradient(from 0deg,#10a37f,#6c8cff,#10a37f);animation:spin 2s linear infinite;position:relative}
    .spark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:#fff}
    input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.9rem;min-width:0;position:relative}
    input::placeholder{color:#9aa0aa}
    .send{width:34px;height:34px;border:none;border-radius:50%;background:#111;color:#fff;cursor:pointer;display:grid;place-items:center;flex:none;position:relative;transition:transform .2s,background .2s}
    .send:hover{transform:scale(1.06);background:#10a37f}
    .send svg{width:15px;height:15px}
    @keyframes up{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:none}}
    @keyframes sheen{0%{left:-40%}60%,100%{left:120%}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.pill,.pill::before,.spark{animation:none}.pill{opacity:1}}
  </style>
</head>
<body>
  <form class="pill">
    <div class="spark" aria-hidden="true"></div>
    <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
    <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  </form>
</body>
</html>
