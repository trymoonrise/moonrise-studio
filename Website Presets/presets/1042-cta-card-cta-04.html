<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1042 — Card Cta 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0a0a;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .card{width:min(100%,340px);padding:2rem 1.75rem;border:1px solid #2a2a2a;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;inset:-40% -20%;background:conic-gradient(from var(--a,0deg),transparent 60%,#fff 70%,transparent 80%);opacity:.12;animation:spin 6s linear infinite}
    @property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
    @keyframes spin{to{--a:360deg}}
    .inner{position:relative}
    .kicker{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#777;margin-bottom:1rem}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:1.65rem;font-weight:800;letter-spacing:-.03em;margin:0 0 .65rem;line-height:1.15}
    p{margin:0 0 1.5rem;color:#999;font-size:.9rem;line-height:1.5}
    .btn{width:100%;padding:12px;border:none;background:#fff;color:#111;font:inherit;font-size:.86rem;font-weight:700;cursor:pointer;transition:transform .25s cubic-bezier(.22,1,.36,1)}
    .btn:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
<div class="card"><div class="inner"><div class="kicker">Limited</div><h2>Claim your seat</h2><p>A small room for focused builders.</p><button class="btn" type="button">Join waitlist</button></div></div>

</body>
</html>
