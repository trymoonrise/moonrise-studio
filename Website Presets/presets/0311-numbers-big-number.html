<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0311
    slug: numbers-big-number
    title: Big Number Display
    category: numbers
    tags: numbers, big
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0311 — Big Number Display</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background: linear-gradient(135deg, #6c8cff, #764ba2);
      color: #fff;
      text-align: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .wrap {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeIn 0.8s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .num {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0;
      margin-top: 0.5rem;
      animation: fadeIn 0.6s cubic-bezier(.22, .61, .36, 1) 1.1s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num" id="num">0.0%</div>
    <div class="sub">Uptime guaranteed</div>
  </div>

  <script>
    const num = document.getElementById('num');
    const target = 99.9;
    const duration = 1800;
    const start = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function tick(now) {
      const p = Math.min(1, (now - start) / duration);
      const value = easeOut(p) * target;
      num.textContent = value.toFixed(1) + '%';
      if (p < 1) requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
