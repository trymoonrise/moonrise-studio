<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1001
    slug: links-arrow-link-02
    title: Magnetic Arrow Link
    category: links
    tags: links, arrow, magnetic, hover
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1001 - Magnetic Arrow Link</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#eef1f6;font-family:Outfit,sans-serif;padding:2rem}
    .link{display:inline-flex;align-items:center;gap:1rem;text-decoration:none;color:inherit;font-family:Syne,sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;letter-spacing:-.03em;position:relative;padding:1rem 0}
    .text{position:relative}
    .text::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:#38bdf8;transition:width .4s cubic-bezier(.16,1,.3,1)}
    .link:hover .text::after{width:100%}
    .arrow-wrap{width:48px;height:48px;border:1px solid rgba(255,255,255,.12);border-radius:50%;display:grid;place-items:center;transition:border-color .3s,background .3s,transform .4s cubic-bezier(.16,1,.3,1)}
    .arrow{width:20px;height:20px;stroke:#38bdf8;fill:none;stroke-width:2;transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .link:hover .arrow-wrap{border-color:#38bdf8;background:rgba(56,189,248,.08);transform:scale(1.08)}
    .link:hover .arrow{transform:translateX(4px);animation:nudge 1s ease infinite}
    .trail{position:absolute;right:-20px;top:50%;width:40px;height:1px;background:linear-gradient(90deg,rgba(56,189,248,.4),transparent);opacity:0;transition:opacity .3s,transform .3s}
    .link:hover .trail{opacity:1;transform:translateX(8px);animation:trail-pulse 1.2s ease infinite}
    @keyframes nudge{0%,100%{transform:translateX(4px)}50%{transform:translateX(8px)}}
    @keyframes trail-pulse{0%,100%{opacity:.4}50%{opacity:1}}
    @media(prefers-reduced-motion:reduce){.link:hover .arrow,.link:hover .trail{animation:none}}
  </style>
</head>
<body>
  <a href="#" class="link">
    <span class="text">Explore the archive</span>
    <span class="arrow-wrap">
      <svg class="arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </span>
    <span class="trail"></span>
  </a>
</body>
</html>
