<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0298
    slug: ai-chat-chat-bubbles
    title: Chat Bubbles
    category: ai-chat
    tags: ai-chat, bubbles
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0298 - Chat Bubbles</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Söhne:wght@400;500&family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f8;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#0d0d0d}
    .stage{width:min(640px,100%);display:flex;flex-direction:column;align-items:center;gap:1.75rem}
    .bubbles{display:flex;flex-direction:column;gap:.85rem;width:100%;min-height:140px}
    .bubble{max-width:78%;padding:.85rem 1.1rem;border-radius:22px;font-size:.92rem;line-height:1.45;opacity:0;transform:translateY(14px) scale(.96);animation:pop .7s cubic-bezier(.16,1,.3,1) forwards}
    .bubble.user{align-self:flex-end;background:#0d0d0d;color:#fff;border-bottom-right-radius:6px;animation-delay:.15s}
    .bubble.bot{align-self:flex-start;background:#fff;border:1px solid #e5e5e5;border-bottom-left-radius:6px;animation-delay:.55s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .ask{position:relative;width:100%;display:flex;align-items:center;gap:.65rem;padding:.7rem .75rem .7rem 1.1rem;background:#fff;border:1px solid #e5e5e5;border-radius:28px;box-shadow:0 8px 30px rgba(0,0,0,.06);transition:border-color .25s,box-shadow .25s}
    .ask:focus-within{border-color:#cfcfcf;box-shadow:0 10px 36px rgba(0,0,0,.1)}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.95rem;color:#0d0d0d}
    .ask input::placeholder{color:#8e8e8e}
    .send{width:36px;height:36px;border:none;border-radius:50%;background:#0d0d0d;color:#fff;cursor:pointer;display:grid;place-items:center;transition:transform .2s,background .2s}
    .send:hover{transform:scale(1.06)}
    .send svg{width:16px;height:16px}
    .glow{position:absolute;inset:-1px;border-radius:28px;pointer-events:none;background:conic-gradient(from var(--a,0deg),#10a37f,#6c8cff,#ff6bcb,#10a37f);opacity:0;z-index:-1;filter:blur(10px);transition:opacity .35s;animation:spin 4s linear infinite}
    .ask:focus-within .glow{opacity:.35}
    @property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
    @keyframes spin{to{--a:360deg}}
    @keyframes pop{to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.bubble,.glow{animation:none}.bubble{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="bubbles">
      <div class="bubble user">Rewrite this landing page hero.</div>
      <div class="bubble bot">Sure - what tone do you want: calm, bold, or playful?</div>
    </div>
    <form class="ask" id="ask">
      <div class="glow" aria-hidden="true"></div>
      <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
      <button class="send" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </form>
  </div>
  <script>
    const ask=document.getElementById('ask');
    const input=ask.querySelector('input');
    const bubbles=document.querySelector('.bubbles');
    ask.addEventListener('submit',(e)=>{
      e.preventDefault();
      const v=input.value.trim();
      if(!v)return;
      const b=document.createElement('div');
      b.className='bubble user';
      b.textContent=v;
      bubbles.appendChild(b);
      input.value='';
    });
  </script>
</body>
</html>
