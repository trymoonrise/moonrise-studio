<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1253
    slug: carousels-dark-carousel-06
    title: Dark Carousel 06
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1253 - Dark Carousel 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;font-family:'DM Sans',system-ui,sans-serif;color:#fff;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(560px,92vw)}.stage{position:relative;aspect-ratio:16/9;border-radius:28px;overflow:hidden;background:#111;border:1px solid rgba(255,255,255,.08)}.slide{position:absolute;inset:0;opacity:0;transform:translateX(40px);transition:opacity .7s,transform .8s cubic-bezier(.22,1,.36,1)}.slide.on{opacity:1;transform:none;z-index:1}.slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.7)}.glow{position:absolute;inset:auto 0 0 0;height:50%;background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:2;pointer-events:none}.info{position:absolute;left:22px;bottom:22px;z-index:3;font-family:Syne,sans-serif}.info small{display:block;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}.info b{font-size:1.4rem;letter-spacing:-.04em}.progress{display:flex;gap:6px;margin-top:16px}.seg{flex:1;height:3px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}.seg span{display:block;height:100%;width:0;background:#fff;border-radius:inherit}.seg.on span{width:100%;animation:fill 4s linear}.nav{position:absolute;right:16px;top:16px;z-index:3;display:flex;gap:8px}.nav button{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#fff;transition:background .25s}.nav button:hover{background:rgba(255,255,255,.2)}@keyframes fill{from{width:0}to{width:100%}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage">
<div class="slide on"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(80deg) brightness(.7)"></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(180deg) brightness(.7)"></div>
<div class="glow"></div>
<div class="info"><small id="num">01</small><b id="title">Cinematic</b></div>
<div class="nav"><button id="prev">←</button><button id="next">→</button></div>
</div><div class="progress" id="prog"></div></div>
<script>
const slides=[...document.querySelectorAll('.slide')],titles=['Cinematic','Noir Drift','Night Form'],num=document.getElementById('num'),title=document.getElementById('title'),prog=document.getElementById('prog');let i=0,timer;slides.forEach(()=>{const s=document.createElement('div');s.className='seg';s.innerHTML='<span></span>';prog.appendChild(s);});function go(n){i=(n+slides.length)%slides.length;slides.forEach((s,k)=>s.classList.toggle('on',k===i));[...prog.children].forEach((s,k)=>{s.classList.toggle('on',k===i);const span=s.querySelector('span');span.style.animation='none';void span.offsetWidth;if(k===i)span.style.animation='';});num.textContent=String(i+1).padStart(2,'0');title.textContent=titles[i];clearTimeout(timer);timer=setTimeout(()=>go(i+1),4000);}document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('next').onclick=()=>go(i+1);go(0);
</script>
</body>
</html>
