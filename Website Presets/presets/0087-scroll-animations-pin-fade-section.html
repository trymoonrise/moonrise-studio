<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0087
    slug: scroll-animations-pin-fade-section
    title: Pin Fade Section
    category: scroll-animations
    tags: scroll-animations, pin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0087 - Pin Fade Section</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#0d0d0f;color:#fff} .pin{height:200vh;position:relative} .sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center} h1{font-size:3rem;opacity:var(--o,1);transition:opacity .1s}
  </style>
</head>
<body>
<section class="pin"><div class="sticky"><h1 id="h">Pinned</h1></div></section>
<script>const h=document.getElementById('h');addEventListener('scroll',()=>{const r=document.querySelector('.pin').getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));h.style.setProperty('--o',1-p);});</script>
</body>
</html>
