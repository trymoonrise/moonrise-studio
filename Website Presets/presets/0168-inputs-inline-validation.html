<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0168
    slug: inputs-inline-validation
    title: Inline Validation
    category: inputs
    tags: inputs, validation
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0168 — Inline Validation</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff;padding:2rem}.field input{width:260px;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:.95rem;outline:none}.field input.err{border-color:#e55}.msg{font-size:.8rem;margin-top:6px;color:#e55;display:none}.msg.show{display:block}
  </style>
</head>
<body>
<div class="field"><input id="i" placeholder="Username"><div class="msg" id="m">Must be 3+ characters</div></div>
<script>document.getElementById('i').oninput=function(){const ok=this.value.length>=3;this.classList.toggle('err',!ok);document.getElementById('m').classList.toggle('show',!ok);};</script>
</body>
</html>
