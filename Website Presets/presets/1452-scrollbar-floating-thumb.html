<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#111;color:#ccc;display:grid;place-items:center;min-height:100vh;padding:2rem}.scroll{width:min(400px,90vw);max-height:60vh;overflow-y:auto;padding:1rem 1.5rem 1rem 1rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.5) transparent}.scroll::-webkit-scrollbar{width:6px}.scroll::-webkit-scrollbar-track{background:transparent}.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.45);border-radius:99px;min-height:40px}.scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.7)}.line{padding:1rem 0;border-bottom:1px solid #222;font-size:.9rem}
  </style>
</head>
