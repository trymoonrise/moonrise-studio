<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0177
    slug: selects-searchable-select
    title: Searchable Select
    category: selects
    tags: selects, search
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0177 - Searchable Select</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f4f5f8;
      padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(340px, 100%);
      display: grid;
      gap: 0.45rem;
    }

    .wrap label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #3d4255;
    }

    .dd {
      position: relative;
    }

    .search {
      width: 100%;
      padding: 0.85rem 2.5rem 0.85rem 0.95rem;
      border: 1px solid #d4d8e0;
      border-radius: 12px;
      background: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #111318;
      outline: none;
      transition:
        border-color 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        box-shadow 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .search:focus,
    .dd.is-open .search {
      border-color: #4f6ef7;
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.14);
    }

    .chev {
      position: absolute;
      right: 0.95rem;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      stroke: #6b7085;
      stroke-width: 2;
      fill: none;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .dd.is-open .chev {
      transform: translateY(-50%) rotate(180deg);
    }

    .list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #e4e6ec;
      border-radius: 12px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition:
        opacity 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        visibility 0.25s;
      z-index: 10;
    }

    .dd.is-open .list {
      opacity: 1;
      visibility: visible;
      transform: none;
    }

    .item {
      padding: 0.7rem 0.95rem;
      cursor: pointer;
      font-size: 0.92rem;
      color: #2a2f3d;
      transition: background 0.15s, color 0.15s;
    }

    .item:hover,
    .item.is-active {
      background: #f0f4ff;
      color: #1e2f8a;
    }

    .item.is-selected {
      font-weight: 600;
      color: #4f6ef7;
    }

    .item.is-selected::after {
      content: '✓';
      float: right;
      font-size: 0.85rem;
    }

    .item.hide {
      display: none;
    }

    .empty {
      padding: 0.85rem 0.95rem;
      font-size: 0.86rem;
      color: #8b8fa3;
      display: none;
    }

    .empty.show {
      display: block;
    }

    .hint {
      font-size: 0.78rem;
      color: #8b8fa3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <label for="search">Country</label>
    <div class="dd" id="dd">
      <input class="search" id="search" type="text" placeholder="Search countries…" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="list" aria-autocomplete="list">
      <svg class="chev" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      <div class="list" id="list" role="listbox">
        <div class="item" role="option" data-value="USA">USA</div>
        <div class="item" role="option" data-value="UK">United Kingdom</div>
        <div class="item" role="option" data-value="Canada">Canada</div>
        <div class="item" role="option" data-value="Germany">Germany</div>
        <div class="item" role="option" data-value="Japan">Japan</div>
        <div class="item" role="option" data-value="France">France</div>
        <div class="item" role="option" data-value="Australia">Australia</div>
        <p class="empty" id="empty">No matches found</p>
      </div>
    </div>
    <span class="hint" id="hint">Click an option or press Enter to select</span>
  </div>

  <script>
    const dd = document.getElementById('dd');
    const search = document.getElementById('search');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const hint = document.getElementById('hint');
    const items = [...list.querySelectorAll('.item')];
    let activeIndex = -1;

    function visibleItems() {
      return items.filter((i) => !i.classList.contains('hide'));
    }

    function open() {
      dd.classList.add('is-open');
      search.setAttribute('aria-expanded', 'true');
    }

    function close() {
      dd.classList.remove('is-open');
      search.setAttribute('aria-expanded', 'false');
      activeIndex = -1;
      items.forEach((i) => i.classList.remove('is-active'));
    }

    function filter() {
      const q = search.value.trim().toLowerCase();
      let shown = 0;
      items.forEach((item) => {
        const match = item.textContent.toLowerCase().includes(q);
        item.classList.toggle('hide', !match);
        if (match) shown++;
      });
      empty.classList.toggle('show', shown === 0);
      activeIndex = -1;
      items.forEach((i) => i.classList.remove('is-active'));
    }

    function select(item) {
      items.forEach((i) => i.classList.remove('is-selected'));
      item.classList.add('is-selected');
      search.value = item.textContent.trim();
      hint.textContent = 'Selected: ' + item.dataset.value;
      close();
    }

    function setActive(index) {
      const vis = visibleItems();
      if (!vis.length) return;
      activeIndex = Math.max(0, Math.min(index, vis.length - 1));
      items.forEach((i) => i.classList.remove('is-active'));
      vis[activeIndex].classList.add('is-active');
      vis[activeIndex].scrollIntoView({ block: 'nearest' });
    }

    search.addEventListener('focus', () => {
      open();
      filter();
    });

    search.addEventListener('input', () => {
      open();
      filter();
    });

    search.addEventListener('keydown', (e) => {
      const vis = visibleItems();
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        open();
        setActive(activeIndex + 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(activeIndex <= 0 ? vis.length - 1 : activeIndex - 1);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0 && vis[activeIndex]) {
          select(vis[activeIndex]);
        } else if (vis[0]) {
          select(vis[0]);
        }
      } else if (e.key === 'Escape') {
        close();
        search.blur();
      }
    });

    items.forEach((item) => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        select(item);
      });
    });

    document.addEventListener('click', (e) => {
      if (!dd.contains(e.target)) close();
    });
  </script>
</body>
</html>
