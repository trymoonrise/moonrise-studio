<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1798
    slug: staggered-grid-elastic-rubber
    title: Elastic Rubber Grid
    category: animation
    tags: grid, stagger, elastic, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1798 — Elastic Rubber Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f2f2f2;color:#111;font-family:"DM Sans",system-ui,sans-serif;padding:2rem;display:grid;place-items:center}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tile,.cell,.brick,.module,.card,.panel{opacity:1!important;transform:none!important;clip-path:none!important;filter:none!important}}
    .wrap{width:min(900px,100%)}
    h1{margin:0 0 1.5rem;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2.4rem,7vw,5rem);font-weight:800;letter-spacing:-.08em;line-height:.9}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .cell{aspect-ratio:1.1;background:#111;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;padding:1rem;opacity:0;transform:scale(0);animation:rubber .9s cubic-bezier(.34,1.56,.64,1) forwards;animation-delay:calc(var(--i)*70ms)}
    .cell:nth-child(3n){background:#fff;color:#111;border:2px solid #111}
    .cell b{font-family:"Syne",system-ui,sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-.04em}
    .cell span{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;opacity:.5;margin-top:.25rem}
    @keyframes rubber{0%{opacity:0;transform:scale(0)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<main class="wrap"><h1>Elastic<br>rubber</h1>
    <section class="grid">
      <div class="cell" style="--i:1"><b>Snap</b><span>01</span></div><div class="cell" style="--i:2"><b>Stretch</b><span>02</span></div><div class="cell" style="--i:3"><b>Bounce</b><span>03</span></div><div class="cell" style="--i:4"><b>Spring</b><span>04</span></div><div class="cell" style="--i:5"><b>Pull</b><span>05</span></div><div class="cell" style="--i:6"><b>Release</b><span>06</span></div><div class="cell" style="--i:7"><b>Tension</b><span>07</span></div><div class="cell" style="--i:8"><b>Kick</b><span>08</span></div>
    </section></main>

</body>
</html>
