<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1447

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1447 - Gradient Glow Scrollbar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0a0a0c;color:#e8e8ec;font-family:system-ui,sans-serif}.wrap{max-width:520px;margin:0 auto;padding:3rem 2rem 4rem}h1{font-size:1.4rem;margin-bottom:.5rem}p{color:#888;line-height:1.7;margin-bottom:1rem}.panel{max-height:70vh;overflow-y:auto;padding-right:1rem;scrollbar-width:thin;scrollbar-color:#6c8cff #1a1a22}.panel::-webkit-scrollbar{width:10px}.panel::-webkit-scrollbar-track{background:#1a1a22;border-radius:99px}.panel::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#6c8cff,#ff6cb0);border-radius:99px;box-shadow:0 0 12px rgba(108,140,255,.6)}.block{height:120px;margin-bottom:12px;border-radius:12px;background:linear-gradient(135deg,#1a1a2e,#252538);display:grid;place-items:center;font-weight:600}
  </style>
</head>
<body>
<div class="wrap"><h1>Gradient Glow</h1><p>Scroll inside the panel - custom thumb with neon glow.</p><div class="panel"><div class="block">Block 1</div><div class="block">Block 2</div><div class="block">Block 3</div><div class="block">Block 4</div><div class="block">Block 5</div><div class="block">Block 6</div><div class="block">Block 7</div><div class="block">Block 8</div><div class="block">Block 9</div><div class="block">Block 10</div><div class="block">Block 11</div><div class="block">Block 12</div></div></div>

</body>
</html>
