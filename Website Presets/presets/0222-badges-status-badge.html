<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0222
    slug: badges-status-badge
    title: Status Badge
    category: badges
    tags: badges, status
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0222 - Status Badge</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');

    * { box-sizing: border-box; }
    body {
      display: grid; place-items: center; min-height: 100vh;
      background: #0a0c10; font-family: 'Space Grotesk', sans-serif; gap: 1.2rem;
    }
    .row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; padding: 2rem; }

    .badge {
      position: relative;
      display: inline-flex; align-items: center; gap: 0.55rem;
      padding: 0.55rem 1.1rem 0.55rem 0.75rem;
      border-radius: 999px;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase;
      overflow: hidden;
    }

    .live {
      color: #b8ffd4;
      background: linear-gradient(135deg, #0d3b28, #145c3c);
      border: 1px solid #2dff9a;
      box-shadow: 0 0 24px rgba(45, 255, 154, 0.35);
    }
    .live .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #2dff9a; box-shadow: 0 0 12px #2dff9a;
      animation: blink 1.1s ease-in-out infinite;
    }
    .live .dot::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 1px solid #2dff9a; animation: ring 1.1s ease-out infinite;
    }
    .live .dot { position: relative; }

    .wait {
      color: #ffe7a8;
      background: linear-gradient(135deg, #3a2a08, #5a4210);
      border: 1px solid #ffc53d;
      animation: wobble 2.4s ease-in-out infinite;
    }
    .wait .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ffc53d;
      animation: spin-dot 1.2s linear infinite;
      box-shadow: 0 0 10px #ffc53d;
    }

    .off {
      color: #9aa3b5;
      background: #161a22;
      border: 1px solid #2a3140;
      filter: grayscale(0.4);
    }
    .off .dot { width: 10px; height: 10px; border-radius: 50%; background: #4a5568; }

    @keyframes blink { 50% { opacity: 0.35; transform: scale(0.85); } }
    @keyframes ring { to { transform: scale(2); opacity: 0; } }
    @keyframes wobble { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1.5deg); } }
    @keyframes spin-dot { to { transform: rotate(360deg) scale(1.1); } }

    @media (prefers-reduced-motion: reduce) {
      .live .dot, .live .dot::after, .wait, .wait .dot { animation: none; }
    }
  </style>
</head>
<body>
  <div class="row">
    <span class="badge live"><i class="dot" aria-hidden="true"></i>Live</span>
    <span class="badge wait"><i class="dot" aria-hidden="true"></i>Pending</span>
    <span class="badge off"><i class="dot" aria-hidden="true"></i>Offline</span>
  </div>
</body>
</html>
