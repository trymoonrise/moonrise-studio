<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0936
    slug: tables-striped-table-02
    title: Terminal Ledger Table
    category: tables
    tags: tables, striped, terminal, data
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0936 — Terminal Ledger Table</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0e12;color:#d4d8e0;font-family:Outfit,sans-serif;padding:2rem}
    .panel{width:min(640px,100%);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;background:#12151c}
    .bar{display:flex;gap:6px;padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);background:#0a0c10}
    .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.12)}
    .dot:nth-child(1){background:#ef4444}.dot:nth-child(2){background:#eab308}.dot:nth-child(3){background:#22c55e}
    .title{padding:.75rem 1rem;font-family:Syne,sans-serif;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(212,216,224,.5);border-bottom:1px solid rgba(255,255,255,.06)}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{padding:12px 16px;text-align:left;font-family:Syne,sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(212,216,224,.45);border-bottom:1px solid rgba(255,255,255,.08)}
    td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
    tr:nth-child(even){background:rgba(255,255,255,.02)}
    tr{position:relative;transition:background .3s}
    tr:hover{background:rgba(56,189,248,.06)}
    tr:hover td:first-child::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#38bdf8;animation:slide-in .3s ease}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:500}
    .tag.ok{background:rgba(34,197,94,.15);color:#4ade80}
    .tag.wait{background:rgba(234,179,8,.15);color:#facc15}
    .tag.fail{background:rgba(239,68,68,.15);color:#f87171}
    @keyframes slide-in{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    @media(prefers-reduced-motion:reduce){tr:hover td:first-child::before{animation:none}}
  </style>
</head>
<body>
  <div class="panel">
    <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="title">Transaction Ledger</div>
    <table>
      <thead><tr><th>ID</th><th>Entity</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>TX-4821</td><td>Meridian Labs</td><td>$12,400</td><td><span class="tag ok">Settled</span></td></tr>
        <tr><td>TX-4822</td><td>Northwind Co</td><td>$8,920</td><td><span class="tag wait">Pending</span></td></tr>
        <tr><td>TX-4823</td><td>Axis Media</td><td>$24,100</td><td><span class="tag ok">Settled</span></td></tr>
        <tr><td>TX-4824</td><td>Helix Systems</td><td>$3,750</td><td><span class="tag fail">Failed</span></td></tr>
        <tr><td>TX-4825</td><td>Orbital Inc</td><td>$16,800</td><td><span class="tag ok">Settled</span></td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
