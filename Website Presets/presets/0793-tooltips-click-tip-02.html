<!DOCTYPE html>
<html lang="en">
<head>
  <!--

    id: 0793

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0793 - Pin Click Tip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f2ec;font-family:Outfit,sans-serif}.wrap{position:relative}.btn{padding:.7rem 1.2rem;border:1px solid #111;background:#111;color:#fff;font:600 .9rem Outfit,sans-serif;cursor:pointer;border-radius:4px}.tip{position:absolute;left:calc(100% + 12px);top:50%;translate:0 -50%;padding:.5rem .8rem;background:#fff;border:1px solid #111;font-size:.8rem;max-width:180px;opacity:0;pointer-events:none;transition:opacity .25s;box-shadow:4px 4px 0 #111}.tip.on{opacity:1}
  </style>
</head>
<body>
<div class="wrap"><button class="btn" id="b">Click</button><div class="tip" id="t">Pinned - click again to dismiss.</div></div>
<script>const t=document.getElementById('t');document.getElementById('b').onclick=()=>t.classList.toggle('on');</script>
</body>
</html>
