<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1509
    slug: menu-fullscreen-stagger-lines
    title: Stagger Lines Menu
    category: navigation
    tags: menu, hamburger, fullscreen, stagger
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1509 - Stagger Lines Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f4f2ec;color:#111;font-family:Outfit,sans-serif;overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1.25rem,4vw,3rem);position:relative;z-index:40}
    .logo{font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .burger{width:28px;height:12px;border:0;background:transparent;cursor:pointer;padding:0;display:flex;flex-direction:column;justify-content:space-between;z-index:50}
    .burger i{display:block;height:1px;background:#111;transition:transform .5s cubic-bezier(.22,1,.36,1)}
    .burger.open i:first-child{transform:translateY(5.5px) rotate(45deg)}
    .burger.open i:last-child{transform:translateY(-5.5px) rotate(-45deg)}
    .menu{position:fixed;inset:0;z-index:30;background:#f4f2ec;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(1.5rem,6vw,5rem);pointer-events:none;opacity:0;transition:opacity .3s}
    .menu.open{pointer-events:auto;opacity:1}
    .menu a{display:block;font-family:Syne,sans-serif;font-size:clamp(2.4rem,9vw,5.5rem);font-weight:800;letter-spacing:-.05em;color:#111;text-decoration:none;line-height:1.05;border-top:1px solid rgba(0,0,0,.1);padding:.35rem 0;clip-path:inset(0 100% 0 0);transition:clip-path .7s cubic-bezier(.22,1,.36,1),opacity .3s}
    .menu a:last-child{border-bottom:1px solid rgba(0,0,0,.1)}
    .menu.open a{clip-path:inset(0 0 0 0)}
    .menu.open a:nth-child(1){transition-delay:.05s}.menu.open a:nth-child(2){transition-delay:.12s}
    .menu.open a:nth-child(3){transition-delay:.19s}.menu.open a:nth-child(4){transition-delay:.26s}
    .menu a:hover{opacity:.35}
    .page{height:70vh;display:grid;place-items:center;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:300;color:#999}
    @media(prefers-reduced-motion:reduce){.menu a,.burger i{transition:none}.menu.open a{clip-path:none}}
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">LINE</div>
    <button class="burger" id="burger" aria-label="Menu" aria-expanded="false"><i></i><i></i></button>
  </div>
  <div class="menu" id="menu">
    <a href="#">One</a><a href="#">Two</a><a href="#">Three</a><a href="#">Four</a>
  </div>
  <div class="page">Lines reveal</div>
  <script>
    const b=document.getElementById('burger'),m=document.getElementById('menu');
    b.addEventListener('click',()=>{const on=m.classList.toggle('open');b.classList.toggle('open',on);b.setAttribute('aria-expanded',String(on))});
  </script>
</body>
</html>
