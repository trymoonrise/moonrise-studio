<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1856
    slug: hero-video-wave-distort
    title: Wave Distort Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1856 — Wave Distort Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform-origin:center;transition:transform .2s ease-out}
.waves{position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 18px,rgba(255,255,255,.04) 18px 19px);mix-blend-mode:overlay;animation:drift 8s linear infinite}
.copy{position:relative;z-index:3;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem;pointer-events:none}
h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:clamp(3rem,10vw,6rem);margin:0}
@keyframes drift{to{background-position:0 38px}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><video id="v" src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="waves"></div><div class="copy"><h1>Wavefield</h1></div></div>
<script>const s=document.getElementById('s'),v=document.getElementById('v');s.onmousemove=e=>{const x=(e.clientX/innerWidth-.5)*8,y=(e.clientY/innerHeight-.5)*6;v.style.transform='scale(1.08) skew('+(-x*.15)+'deg,'+(y*.1)+'deg) translate('+x+'px,'+y+'px)'};s.onmouseleave=()=>v.style.transform='scale(1.08)';</script>
</body>
</html>
