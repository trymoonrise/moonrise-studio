<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0361
    slug: navigation-breadcrumb-nav
    title: Breadcrumb Navigation
    category: navigation
    tags: navigation, breadcrumb
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0361 — Breadcrumb Navigation</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#fff;font-family:Outfit,sans-serif;padding:2rem}
    .crumb{display:flex;align-items:center;gap:0;font-size:.85rem;font-weight:300;letter-spacing:.08em}
    .crumb a,.crumb span{color:inherit;text-decoration:none;padding:.4rem .2rem;opacity:.35;transition:opacity .3s}
    .crumb a:hover{opacity:.8}
    .crumb .here{opacity:1;font-family:Syne,sans-serif;font-weight:700;letter-spacing:-.02em}
    .sep{width:24px;height:1px;background:rgba(255,255,255,.25);margin:0 .55rem;position:relative;overflow:hidden}
    .sep::after{content:"";position:absolute;inset:0;background:#fff;transform:translateX(-100%);animation:draw 1.2s cubic-bezier(.22,1,.36,1) forwards}
    .crumb .sep:nth-of-type(1)::after{animation-delay:.15s}
    .crumb .sep:nth-of-type(2)::after{animation-delay:.3s}
    .crumb .sep:nth-of-type(3)::after{animation-delay:.45s}
    h1{margin:3rem 0 0;font-family:Syne,sans-serif;font-size:clamp(2rem,6vw,3.5rem);letter-spacing:-.05em;font-weight:800;text-align:center}
    @keyframes draw{to{transform:none}}
    @media(prefers-reduced-motion:reduce){.sep::after{animation:none;transform:none}}
  </style>
</head>
<body>
  <div>
    <nav class="crumb" aria-label="Breadcrumb">
      <a href="#">Home</a><i class="sep" aria-hidden="true"></i>
      <a href="#">Archive</a><i class="sep" aria-hidden="true"></i>
      <a href="#">2026</a><i class="sep" aria-hidden="true"></i>
      <span class="here" aria-current="page">Depth</span>
    </nav>
    <h1>Where you are</h1>
  </div>
</body>
</html>
