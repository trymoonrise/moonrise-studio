<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0541
    slug: features-metric-feat-10
    title: Metric Feat 10
    category: features
    tags: features, metric
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0541 - Metric Feat 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fafafa;color:#111;font-family:Outfit,sans-serif;padding:2rem}
    .wrap{width:min(800px,100%)}
    h1{margin:0 0 2rem;font-family:Syne,sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.04em;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e8e8;border:1px solid #e8e8e8}
    .stat{background:#fafafa;padding:2rem 1.5rem;transition:background .3s}
    .stat:hover{background:#fff}
    .num{font-family:Syne,sans-serif;font-size:clamp(2.4rem,6vw,3.6rem);font-weight:800;letter-spacing:-.06em;line-height:1;font-variant-numeric:tabular-nums}
    .unit{font-size:1rem;opacity:.35;margin-left:.15rem}
    .label{margin:.75rem 0 0;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;opacity:.4;font-weight:300}
    .bar{margin-top:1.25rem;height:2px;background:#e8e8e8;overflow:hidden}
    .bar i{display:block;height:100%;width:0;background:#111;animation:grow 1.2s cubic-bezier(.22,1,.36,1) forwards}
    .s1 i{--w:92%;animation-delay:.1s}.s2 i{--w:78%;animation-delay:.25s}.s3 i{--w:64%;animation-delay:.4s}
    @keyframes grow{to{width:var(--w)}}
    @media(max-width:600px){.grid{grid-template-columns:1fr}}
    @media(prefers-reduced-motion:reduce){.bar i{animation:none;width:var(--w)}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Proof</h1>
    <div class="grid">
      <div class="stat s1"><div class="num" data-count="98">0<span class="unit">%</span></div><div class="label">Retention</div><div class="bar"><i style="--w:92%"></i></div></div>
      <div class="stat s2"><div class="num" data-count="4">0<span class="unit">×</span></div><div class="label">Faster ship</div><div class="bar"><i style="--w:78%"></i></div></div>
      <div class="stat s3"><div class="num" data-count="12">0<span class="unit">ms</span></div><div class="label">Input lag</div><div class="bar"><i style="--w:64%"></i></div></div>
    </div>
  </div>
  <script>
    document.querySelectorAll('[data-count]').forEach(el=>{
      const target=+el.dataset.count;const unit=el.querySelector('.unit');
      let n=0;const step=()=>{n+=(target-n)*.12;if(Math.abs(target-n)<.5){el.innerHTML=target+(unit?unit.outerHTML:'');return}
        el.innerHTML=Math.round(n)+(unit?unit.outerHTML:'');requestAnimationFrame(step)};
      requestAnimationFrame(step);
    });
  </script>
</body>
</html>
