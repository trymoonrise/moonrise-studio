<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1642
    slug: ease-in-badge-row
    title: Badge Row Stagger Ease
    category: ease-in
    tags: ease-in, badges, stagger, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1642 - Badge Row Stagger Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff;padding:2rem;font-family:system-ui,sans-serif}.row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:480px}.badge{padding:8px 16px;border-radius:99px;font-size:.8rem;font-weight:600;background:#f1f5f9;color:#475569;opacity:0;transform:scale(.85);animation:pop .55s cubic-bezier(.22,.61,.36,1) forwards}.badge:nth-child(1){animation-delay:.04s}.badge:nth-child(2){animation-delay:.1s}.badge:nth-child(3){animation-delay:.16s}.badge:nth-child(4){animation-delay:.22s}.badge:nth-child(5){animation-delay:.28s}.badge:nth-child(6){animation-delay:.34s}@keyframes pop{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="row"><span class="badge">Design</span><span class="badge">Development</span><span class="badge">Strategy</span><span class="badge">Branding</span><span class="badge">Motion</span><span class="badge">UX Research</span></div>

</body>
</html>
