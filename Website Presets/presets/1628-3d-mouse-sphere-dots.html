<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1628
    slug: 3d-mouse-sphere-dots
    title: 3D Sphere Dots Mouse
    category: 3d-mouse
    tags: 3d, mouse, sphere
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1628 - 3D Sphere Dots Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#05060a;perspective:900px;overflow:hidden}
    .sphere{position:relative;width:220px;height:220px;transform-style:preserve-3d;transform:rotateX(var(--rx,-20deg)) rotateY(var(--ry,0deg))}
    .dot{position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px;border-radius:50%;background:#6c8cff;box-shadow:0 0 10px rgba(108,140,255,.6)}
    .hint{position:fixed;bottom:1.4rem;font:700 .7rem Syne,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="sphere" id="sphere"></div>
  <div class="hint">Spin the point cloud</div>
  <script>
    const sphere=document.getElementById('sphere'),R=100,dots=[];
    const N=80;
    for(let i=0;i<N;i++){
      const el=document.createElement('div');el.className='dot';
      const phi=Math.acos(1-2*(i+.5)/N);const theta=Math.PI*(1+Math.sqrt(5))*i;
      const x=R*Math.sin(phi)*Math.cos(theta),y=R*Math.sin(phi)*Math.sin(theta),z=R*Math.cos(phi);
      el.style.transform=`translate3d(${x}px,${y}px,${z}px)`;
      const hue=200+i;
      el.style.background=`hsl(${hue} 85% 65%)`;
      el.style.boxShadow=`0 0 10px hsl(${hue} 85% 65% / .6)`;
      sphere.appendChild(el);dots.push(el);
    }
    let rx=-20,ry=0,trx=-20,try_=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*80;trx=-20+y*-40});
    (function loop(){rx+=(trx-rx)*.08;ry+=(try_-ry)*.08;sphere.style.setProperty('--rx',rx+'deg');sphere.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
