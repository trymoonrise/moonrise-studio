<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0301
    slug: ai-chat-sidebar-chat
    title: Sidebar Chat Layout
    category: ai-chat
    tags: ai-chat, sidebar
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0301 - Sidebar Chat Layout</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#212121;font-family:Inter,system-ui,sans-serif;padding:1.5rem;color:#ececec}
    .shell{display:grid;grid-template-columns:220px 1fr;width:min(860px,100%);height:min(520px,80vh);background:#171717;border-radius:18px;overflow:hidden;border:1px solid #2f2f2f;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .side{background:#0d0d0d;padding:1rem .75rem;display:flex;flex-direction:column;gap:.5rem;border-right:1px solid #2a2a2a}
    .new{display:flex;align-items:center;gap:.5rem;padding:.65rem .8rem;border-radius:12px;border:1px solid #333;background:transparent;color:#ececec;font:inherit;font-size:.85rem;cursor:pointer;transition:background .2s}
    .new:hover{background:#1f1f1f}
    .hist{margin-top:.5rem;display:flex;flex-direction:column;gap:.2rem;overflow:auto}
    .hist button{text-align:left;border:none;background:transparent;color:#b4b4b4;padding:.55rem .7rem;border-radius:10px;font:inherit;font-size:.8rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hist button:hover,.hist button.active{background:#2a2a2a;color:#fff}
    .main{display:flex;flex-direction:column;min-width:0}
    .feed{flex:1;padding:1.5rem;overflow:auto;display:flex;flex-direction:column;gap:1rem}
    .msg{max-width:85%;font-size:.9rem;line-height:1.5}
    .msg.user{align-self:flex-end;background:#2f2f2f;padding:.75rem 1rem;border-radius:18px}
    .msg.bot{align-self:stretch;color:#d0d0d0}
    .composer{padding:0 1rem 1rem}
    .ask{display:flex;align-items:center;gap:.5rem;padding:.55rem .55rem .55rem 1rem;background:#303030;border:1px solid #444;border-radius:26px;transition:border-color .25s,box-shadow .25s}
    .ask:focus-within{border-color:#666;box-shadow:0 0 0 3px rgba(16,163,127,.12)}
    .ask input{flex:1;border:none;outline:none;background:transparent;color:#ececec;font:inherit;font-size:.9rem}
    .ask input::placeholder{color:#8f8f8f}
    .send{width:34px;height:34px;border:none;border-radius:50%;background:#fff;color:#111;cursor:pointer;display:grid;place-items:center}
    .send svg{width:15px;height:15px}
    @keyframes up{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
    @media(max-width:640px){.shell{grid-template-columns:1fr}.side{display:none}}
    @media(prefers-reduced-motion:reduce){.shell{animation:none}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <button class="new" type="button">＋ New chat</button>
      <div class="hist">
        <button class="active" type="button">Landing page rewrite</button>
        <button type="button">SQL join primer</button>
        <button type="button">Trip packing list</button>
      </div>
    </aside>
    <div class="main">
      <div class="feed">
        <div class="msg user">Draft a product launch email.</div>
        <div class="msg bot">Here’s a tight draft - subject line first, then a three-paragraph body with a clear CTA.</div>
      </div>
      <div class="composer">
        <form class="ask" id="ask">
          <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
          <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
