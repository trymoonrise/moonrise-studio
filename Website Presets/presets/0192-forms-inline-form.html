--><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0192 - Inline Subscribe</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#fff;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.wrap{width:min(760px,94vw);border-block:1px solid #111;padding:20px 0;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:22px}.mark{width:38px;height:38px;border-radius:50%;background:#111;color:#fff;display:grid;place-items:center;font:500 12px 'DM Mono';animation:spin 12s linear infinite}.copy b{font:400 24px 'Instrument Serif'}.copy span{display:block;font:500 9px 'DM Mono';letter-spacing:.18em;text-transform:uppercase;color:#888}.form{display:flex;border-bottom:1px solid #aaa}.form input{border:0;outline:0;padding:12px 0;background:transparent;min-width:0;width:100%}.form button{border:0;background:transparent;font-size:22px;transition:.25s}.form button:hover{transform:translateX(5px)}.note{grid-column:2/-1;margin:0;font:500 10px 'DM Mono';color:#777;min-height:14px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:620px){.wrap{grid-template-columns:auto 1fr}.form,.note{grid-column:1/-1}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><section class="wrap"><div class="mark">N</div><div class="copy"><b>One useful note, monthly.</b><span>No noise / unsubscribe anytime</span></div><form class="form" id="f"><input id="mail" type="email" placeholder="email@address.com" required><button aria-label="Subscribe">→</button></form><p class="note" id="note"></p></section><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));document.getElementById('f').onsubmit=e=>{e.preventDefault();document.getElementById('note').textContent=e.currentTarget.checkValidity()?'YOU ARE ON THE LIST.':'ENTER A VALID EMAIL.';};</script></body></html>
