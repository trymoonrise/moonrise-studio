<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0077
    slug: cursor-trails-gradient-comet
    title: Gradient Comet Trail
    category: cursor-trails
    tags: cursor-trails, gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0077 - Gradient Comet Trail</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#000} canvas{position:fixed;inset:0}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>const c=document.getElementById('c'),g=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let mx=0,my=0,tx=0,ty=0;addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});function l(){mx+=(tx-mx)*.15;my+=(ty-my)*.15;g.fillStyle='rgba(0,0,0,.15)';g.fillRect(0,0,c.width,c.height);const gr=g.createRadialGradient(mx,my,0,mx,my,60);gr.addColorStop(0,'#ff6cb0');gr.addColorStop(1,'transparent');g.fillStyle=gr;g.fillRect(mx-60,my-60,120,120);requestAnimationFrame(l);}l();</script>
</body>
</html>
