<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1131
    slug: ai-chat-chat-input-02
    title: Chat Input 02
    category: ai-chat
    tags: ai-chat, input
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1131 — Chat Input 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fafafa;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#111}
    .stage{width:min(640px,100%);text-align:center}
    h1{margin:0 0 1.75rem;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:600;letter-spacing:-.04em;opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .ask-wrap{position:relative;animation:up .7s cubic-bezier(.16,1,.3,1) .12s both}
    .ask{position:relative;z-index:1;display:flex;align-items:center;gap:.5rem;padding:.7rem .7rem .7rem 1.1rem;background:#fff;border:1px solid #e5e5e5;border-radius:28px;box-shadow:0 4px 20px rgba(0,0,0,.05)}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:1rem}
    .ask input::placeholder{color:#999}
    .send{width:38px;height:38px;border:none;border-radius:50%;background:#111;color:#fff;cursor:pointer;display:grid;place-items:center}
    .send svg{width:16px;height:16px}
    .ring{position:absolute;inset:-3px;border-radius:30px;pointer-events:none;background:conic-gradient(from var(--a,0deg),transparent 40%,#10a37f,transparent 70%);opacity:0;transition:opacity .3s;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;-webkit-mask-composite:xor;padding:2px;animation:spin 2.5s linear infinite}
    .ask-wrap:focus-within .ring{opacity:1}
    @property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
    @keyframes spin{to{--a:360deg}}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){h1,.ask-wrap,.ring{animation:none}h1,.ask-wrap{opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <h1>Ask anything</h1>
    <div class="ask-wrap">
      <div class="ring" aria-hidden="true"></div>
      <form class="ask">
        <input type="text" placeholder="Message…" autocomplete="off" aria-label="Ask anything">
        <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>
    </div>
  </div>
</body>
</html>
