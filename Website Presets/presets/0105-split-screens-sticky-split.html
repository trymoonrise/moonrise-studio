<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0105
    slug: split-screens-sticky-split
    title: Sticky Split Scroll
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0105 — Sticky Split Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#f4f1ea;color:#111}
    .pin{height:280vh}body{overflow:auto}
.stage{position:sticky;top:0;height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.left{background:#111;color:#fff;display:grid;place-items:center;padding:2rem}
.left h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;letter-spacing:-.05em;margin:0;max-width:8ch;line-height:.95}
.right{position:relative;overflow:hidden}
.panels{position:absolute;inset:0;transition:transform .1s linear}
.panel{height:100vh;display:grid;place-items:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(2.5rem,8vw,5rem)}
.panel:nth-child(1){background:#ff6b4a;color:#111}
.panel:nth-child(2){background:#6c8cff;color:#fff}
.panel:nth-child(3){background:#1a1a1a;color:#f4f1ea}
.mark{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.2);z-index:2}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="pin"><div class="stage"><div class="left"><h1>Sticky split keeps one side locked</h1></div><div class="mark"></div><div class="right"><div class="panels" id="p"><div class="panel">One</div><div class="panel">Two</div><div class="panel">Three</div></div></div></div></div>
<script>const pin=document.querySelector('.pin'),p=document.getElementById('p');addEventListener('scroll',()=>{const r=pin.getBoundingClientRect();const pr=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));p.style.transform='translateY('+(-pr*200)+'vh)'}, {passive:true});</script>
</body>
</html>
