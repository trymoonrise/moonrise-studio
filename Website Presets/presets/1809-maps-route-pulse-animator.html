<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1809
    slug: maps-route-pulse-animator
    title: Route Pulse Animator
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1809 - Route Pulse Animator</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#111827;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(600px,94vw)}.stage{position:relative;aspect-ratio:16/10;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.overlay{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(17,24,39,.55),transparent 30%,transparent 70%,rgba(17,24,39,.55))}
.path{position:absolute;left:18%;top:55%;width:64%;height:3px;background:rgba(56,189,248,.25);border-radius:99px;overflow:hidden}
.path i{display:block;height:100%;width:30%;background:linear-gradient(90deg,transparent,#38bdf8,#fff);border-radius:inherit;animation:run 2.2s ease-in-out infinite}
.a,.b{position:absolute;width:14px;height:14px;border-radius:50%;background:#38bdf8;border:2px solid #fff;box-shadow:0 0 16px #38bdf8}
.a{left:16%;top:52%}.b{right:16%;top:52%}
.bar{display:flex;gap:.75rem;margin-top:1rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:#93c5fd}
.bar button{padding:.55rem .9rem;border-radius:999px;border:1px solid rgba(147,197,253,.3);transition:.25s}
.bar button.on,.bar button:hover{background:#38bdf8;color:#0f172a;border-color:#38bdf8}
@keyframes run{from{transform:translateX(-120%)}to{transform:translateX(320%)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe id="map" src="https://www.google.com/maps?q=Chicago%2C%20IL&hl=en&z=12&output=embed" title="Route map" loading="lazy"></iframe><div class="overlay"></div><span class="a"></span><span class="b"></span><div class="path"><i></i></div></div>
<div class="bar"><button class="on" data-q="Chicago, IL">Loop</button><button data-q="Navy Pier, Chicago">Pier</button><button data-q="Millennium Park, Chicago">Park</button></div></div>
<script>const map=document.getElementById('map');document.querySelectorAll('.bar button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');map.src='https://www.google.com/maps?q='+encodeURIComponent(b.dataset.q)+'&hl=en&z=14&output=embed';});</script>
</body>
</html>
