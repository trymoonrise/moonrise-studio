<head>

  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;min-height:100vh;display:grid;grid-template-columns:55% 45%;background:#111;color:#fff}

<body>
<div class="left"><h1>Angles that stand out</h1><p>Diagonal splits add energy to standard two-column hero layouts.</p><button class="btn">Explore</button></div><div class="right"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div>
