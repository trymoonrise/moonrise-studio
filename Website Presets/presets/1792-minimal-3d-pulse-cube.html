<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1792
    slug: minimal-3d-pulse-cube
    title: Pulse Cube Wire
    category: 3d-effects
    tags: 3d, minimal, cube, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1792 — Pulse Cube Wire</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;perspective:1000px;overflow:hidden;font-family:Outfit,sans-serif;color:#fff}
    .cube{width:140px;height:140px;position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx,-18deg)) rotateY(var(--ry,32deg));animation:spin 18s linear infinite}
    .face{position:absolute;inset:0;border:1px solid rgba(255,255,255,.45);background:transparent}
    .f0{transform:translateZ(70px)}.f1{transform:rotateY(90deg) translateZ(70px)}
    .f2{transform:rotateY(180deg) translateZ(70px)}.f3{transform:rotateY(-90deg) translateZ(70px)}
    .f4{transform:rotateX(90deg) translateZ(70px)}.f5{transform:rotateX(-90deg) translateZ(70px)}
    .pulse{position:absolute;inset:20%;border:1px solid #fff;animation:pulse 2.4s ease-in-out infinite;pointer-events:none}
    .title{position:fixed;top:1.5rem;font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .label{position:fixed;bottom:1.5rem;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;opacity:.35;font-weight:300}
    @keyframes spin{to{transform:rotateX(-18deg) rotateY(392deg)}}
    @keyframes pulse{0%,100%{transform:scale(.6);opacity:.2}50%{transform:scale(1.15);opacity:.8}}
    @media(prefers-reduced-motion:reduce){.cube,.pulse{animation:none}}
  </style>
</head>
<body>
  <div class="title">Wire pulse</div>
  <div class="cube" id="cube">
    <div class="face f0"></div><div class="face f1"></div><div class="face f2"></div>
    <div class="face f3"></div><div class="face f4"></div><div class="face f5"></div>
    <div class="pulse"></div>
  </div>
  <div class="label">Empty volume</div>
</body>
</html>
