<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1408 - Slide Up Fade Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem}.item{opacity:0;transform:translateY(40px);animation:up .8s cubic-bezier(.16,1,.3,1) forwards;padding:1.5rem 2rem;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);font-size:1.2rem;font-weight:600}@keyframes up{to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="item">Eased entrance</div>

</body>
