<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0292
    slug: bios-card-bio
    title: Bio Card
    category: bios
    tags: bios, card, experimental, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0292 - Bio Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#e8ece8;font-family:'DM Sans',sans-serif;perspective:900px;overflow:hidden}
    .stage{position:relative;width:min(280px,85vw);height:340px;transform-style:preserve-3d;animation:enter 1s cubic-bezier(.22,1,.36,1) both}
    .diamond{position:absolute;inset:40px 20px;background:#1f2a24;transform:rotate(8deg) skewY(-2deg);border-radius:28px;animation:tilt 8s ease-in-out infinite;box-shadow:0 30px 60px rgba(31,42,36,.25)}
    .plate{position:absolute;inset:20px 30px 50px;background:#f7faf7;border-radius:24px;padding:1.6rem 1.3rem;display:flex;flex-direction:column;align-items:flex-start;gap:.6rem;animation:float 6s ease-in-out infinite;transform:translateZ(20px)}
    .chip{width:48px;height:48px;background:linear-gradient(160deg,#2a9d8f,#264653);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);display:grid;place-items:center;color:#fff;font-family:Syne,sans-serif;font-weight:700;font-size:.8rem;animation:spin-soft 10s linear infinite}
    h2{margin:.4rem 0 0;font-family:Syne,sans-serif;font-size:1.2rem;color:#1f2a24;letter-spacing:-.03em}
    .role{margin:0;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(31,42,36,.45)}
    p{margin:.4rem 0 0;font-size:.85rem;line-height:1.45;color:rgba(31,42,36,.7)}
    .dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#2a9d8f;bottom:28px;right:42px;animation:blink 2.4s ease-in-out infinite}
    @keyframes tilt{50%{transform:rotate(4deg) skewY(1deg)}}
    @keyframes float{50%{transform:translateY(-8px) translateZ(20px)}}
    @keyframes spin-soft{to{transform:rotate(360deg)}}
    @keyframes blink{50%{opacity:.35;transform:scale(.8)}}
    @keyframes enter{from{opacity:0;transform:rotateX(12deg) translateY(24px)}}
    @media (prefers-reduced-motion:reduce){.diamond,.plate,.chip,.dot,.stage{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="diamond" aria-hidden="true"></div>
    <div class="plate">
      <div class="chip">JK</div>
      <h2>Jules Kim</h2>
      <p class="role">Motion lead</p>
      <p>Shapes that move like they meant to.</p>
    </div>
    <span class="dot" aria-hidden="true"></span>
  </div>
</body>
</html>
