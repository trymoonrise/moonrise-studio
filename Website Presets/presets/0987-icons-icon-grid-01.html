<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0987
    slug: icons-icon-grid-01
    title: Magnetic Icon Matrix
    category: icons
    tags: icons, grid, magnetic, hover
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0987 — Magnetic Icon Matrix</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d11;color:#e4e7ed;font-family:Outfit,sans-serif;padding:2rem}
    .grid{display:grid;grid-template-columns:repeat(4,72px);gap:12px;perspective:600px}
    .cell{width:72px;height:72px;border:1px solid rgba(255,255,255,.08);border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.02);transition:transform .35s cubic-bezier(.16,1,.3,1),border-color .3s,background .3s;cursor:pointer}
    .cell svg{width:28px;height:28px;stroke:rgba(228,231,237,.6);fill:none;stroke-width:1.5;transition:stroke .3s,transform .35s}
    .cell:hover{transform:rotateX(8deg) rotateY(-8deg) translateZ(12px);border-color:rgba(56,189,248,.35);background:rgba(56,189,248,.06)}
    .cell:hover svg{stroke:#38bdf8;transform:scale(1.1)}
    .cell.active{border-color:#38bdf8;background:rgba(56,189,248,.1);animation:glow 2s ease infinite}
    .cell.active svg{stroke:#38bdf8}
    .label{margin-top:2rem;text-align:center;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(228,231,237,.35)}
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0)}50%{box-shadow:0 0 20px rgba(56,189,248,.15)}}
    @media(prefers-reduced-motion:reduce){.cell,.cell svg,.cell.active{animation:none;transition:none}}
  </style>
</head>
<body>
  <div>
    <div class="grid">
      <div class="cell active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
      <div class="cell"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    </div>
    <p class="label">Tool palette</p>
  </div>
</body>
</html>
