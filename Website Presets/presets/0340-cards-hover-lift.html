<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0340
    slug: cards-hover-lift
    title: Hover Lift Card
    category: cards
    tags: cards, hover
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0340 — Hover Lift Card</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background: #f4f5f8;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #111827;
    }

    .card {
      width: min(100%, 300px);
      padding: 1.35rem 1.4rem;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      cursor: pointer;
      transition:
        transform 0.35s cubic-bezier(.22, .61, .36, 1),
        box-shadow 0.35s cubic-bezier(.22, .61, .36, 1);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
    }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.88rem;
      line-height: 1.5;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <article class="card">
    <h3>Fast</h3>
    <p>Lightning performance with a subtle lift on hover.</p>
  </article>
</body>
</html>
