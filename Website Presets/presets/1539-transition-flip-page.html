<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1539
    slug: transition-flip-page
    title: Flip Page Transition
    category: transitions
    tags: transition, flip, 3d
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1539 — Flip Page Transition</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#0d0d0f;display:grid;place-items:center;perspective:1200px}.book{position:relative;width:min(320px,85vw);height:200px;transform-style:preserve-3d}.page{position:absolute;inset:0;border-radius:12px;display:grid;place-items:center;font-size:2rem;font-weight:800;color:#fff;backface-visibility:hidden}.page:nth-child(1){background:#6c8cff}.page:nth-child(2){background:#ff6cb0;transform:rotateY(180deg)}.book.flipped{transform:rotateY(180deg);transition:transform .8s cubic-bezier(.22,.61,.36,1)}.hint{position:fixed;bottom:2rem;color:#666;font-size:.85rem}
  </style>
</head>
<body>
<div class="book" id="b"><div class="page">Front</div><div class="page">Back</div></div><p class="hint">Click to flip</p>
<script>const b=document.getElementById('b');b.onclick=()=>b.classList.toggle('flipped');</script>
</body>
</html>
