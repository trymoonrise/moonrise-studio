<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1630
    slug: 3d-mouse-interactive-globe
    title: 3D Interactive Globe Mouse
    category: 3d-mouse
    tags: 3d, mouse, globe
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1630 - 3D Interactive Globe Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 40%,#0d1a2e,#020408);perspective:1000px;overflow:hidden;font-family:Syne,sans-serif}
    .globe{position:relative;width:220px;height:220px;transform-style:preserve-3d;transform:rotateX(var(--rx,-16deg)) rotateY(var(--ry,20deg))}
    .core{position:absolute;inset:18%;border-radius:50%;background:radial-gradient(circle at 32% 28%,#8aa4ff,#3147c8 40%,#0a1230);box-shadow:0 0 50px rgba(108,140,255,.45),inset -20px -10px 40px rgba(0,0,0,.4)}
    .meridian{position:absolute;inset:0;border:1.5px solid rgba(108,140,255,.28);border-radius:50%;box-shadow:0 0 12px rgba(108,140,255,.15)}
    .lat{position:absolute;left:0;right:0;height:0;border-top:1px solid rgba(126,224,195,.25);border-radius:50%;transform:rotateX(90deg)}
    .pin{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px;border-radius:50%;background:#ff6bcb;box-shadow:0 0 14px #ff6bcb;transform:translateZ(95px)}
    .pin2{background:#7ee0c3;box-shadow:0 0 14px #7ee0c3;transform:rotateY(120deg) rotateX(30deg) translateZ(95px)}
    .pin3{background:#ffd16c;box-shadow:0 0 14px #ffd16c;transform:rotateY(-80deg) rotateX(-40deg) translateZ(95px)}
    .ring{position:absolute;inset:-28px;border:1px dashed rgba(255,255,255,.15);border-radius:50%;transform:rotateX(75deg);animation:spin 14s linear infinite}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.4)}
    @keyframes spin{to{transform:rotateX(75deg) rotateZ(360deg)}}
    @media(prefers-reduced-motion:reduce){.ring{animation:none}}
  </style>
</head>
<body>
  <div class="globe" id="globe">
    <div class="ring" aria-hidden="true"></div>
    <div class="core"></div>
    <div class="meridian" style="transform:rotateY(0deg)"></div>
    <div class="meridian" style="transform:rotateY(60deg)"></div>
    <div class="meridian" style="transform:rotateY(120deg)"></div>
    <div class="lat" style="top:30%"></div>
    <div class="lat" style="top:50%"></div>
    <div class="lat" style="top:70%"></div>
    <div class="pin" aria-hidden="true"></div>
    <div class="pin pin2" aria-hidden="true"></div>
    <div class="pin pin3" aria-hidden="true"></div>
  </div>
  <div class="hint">Spin the globe</div>
  <script>
    const g=document.getElementById('globe');let rx=-16,ry=20,trx=-16,try_=20;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=20+x*70;trx=-16+y*-40});
    (function loop(){rx+=(trx-rx)*.08;ry+=(try_-ry)*.08;g.style.setProperty('--rx',rx+'deg');g.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
