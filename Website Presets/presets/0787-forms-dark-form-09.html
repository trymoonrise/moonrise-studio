--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0787 - Dark Form 09</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#050505;color:#fff;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(500px,94vw);border:1px solid #222;border-radius:32px;padding:28px;background:#0b0b0b;position:relative}.line{position:absolute;left:0;top:70px;width:3px;height:70px;background:#fff;animation:scan 4s ease-in-out infinite}.title{font:400 48px 'Instrument Serif';margin:0 0 24px}.field{position:relative;margin:12px 0}.field input,.field textarea{width:100%;border:1px solid #292929;border-radius:14px;background:#111;padding:15px;outline:0}.field textarea{min-height:100px;resize:none}.field input:focus,.field textarea:focus{border-color:#fff}.go{width:100%;border:0;border-radius:14px;padding:15px;background:#fff;color:#000;font-weight:700}@keyframes scan{50%{transform:translateY(150px)}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><form class="shell"><i class="line"></i><h1 class="title">Leave a <i>signal.</i></h1><div class="field"><input placeholder="Name"></div><div class="field"><input type="email" placeholder="Email"></div><div class="field"><textarea placeholder="Transmission"></textarea></div><button class="go">Transmit →</button></form><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
