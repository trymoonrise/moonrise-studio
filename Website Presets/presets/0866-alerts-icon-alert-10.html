<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0866
    slug: alerts-icon-alert-10
    title: Icon Alert 10
    category: alerts
    tags: alerts, icon
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0866 — Icon Alert 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background: #0d1117;
      font-family: 'Sora', sans-serif;
      overflow: hidden;
    }

    .alert {
      position: relative;
      width: min(100%, 440px);
      padding: 2.2rem 1.9rem 1.9rem;
      border-radius: 22px;
      background: #141a24;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e6ebf2;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .ring {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 1.3rem;
    }

    .ring svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    .ring .track { fill: none; stroke: rgba(56, 189, 248, 0.15); stroke-width: 4; }
    .ring .prog {
      fill: none; stroke: #38bdf8; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 283; stroke-dashoffset: 283;
      transform: rotate(-90deg); transform-origin: center;
      animation: fill 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.3s;
      filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.8));
    }

    .bell {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.6rem;
      transform-origin: 50% 20%;
      animation: swing 2.2s ease-in-out infinite 1.5s;
    }

    .waves i {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 96px; height: 96px;
      border: 2px solid rgba(56, 189, 248, 0.4);
      border-radius: 50%;
      opacity: 0;
      animation: wave 2.6s ease-out infinite;
    }
    .waves i:nth-child(2) { animation-delay: 0.8s; }
    .waves i:nth-child(3) { animation-delay: 1.6s; }

    .title { margin: 0; text-align: center; font-size: 1.4rem; font-weight: 800; }
    .msg { margin: 0.5rem 0 0; text-align: center; font-size: 0.9rem; line-height: 1.6; color: rgba(230, 235, 242, 0.6); }

    @keyframes fill { to { stroke-dashoffset: 42; } }
    @keyframes swing { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(14deg); } 40% { transform: rotate(-11deg); } 60% { transform: rotate(7deg); } 80% { transform: rotate(-4deg); } }
    @keyframes wave { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(1.6); opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .ring .prog { animation: none; stroke-dashoffset: 42; }
      .bell, .waves i { animation: none; }
    }
  </style>
</head>
<body>
  <div class="alert" role="status" aria-live="polite">
    <div class="ring" aria-hidden="true">
      <div class="waves"><i></i><i></i><i></i></div>
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="45"/>
        <circle class="prog" cx="50" cy="50" r="45"/>
      </svg>
      <div class="bell">🔔</div>
    </div>
    <h2 class="title">3 new notifications</h2>
    <p class="msg">Two mentions and a comment are waiting for your reply.</p>
  </div>
</body>
</html>
