<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1025
    slug: announcements-alert-banner-13
    title: Alert Banner 13
    category: announcements
    tags: announcements, alert
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1025 - Alert Banner 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#140e10;font-family:Manrope,sans-serif}
    .alert{
      position:relative;width:min(560px,calc(100% - 2rem));padding:1.15rem 1.25rem 1.15rem 4.2rem;
      border-radius:18px;background:#1c1216;color:#fff;border:1px solid rgba(255,90,90,.25);
      box-shadow:0 24px 50px rgba(0,0,0,.4);
      animation:enter .8s cubic-bezier(.16,1,.3,1) both;
    }
    .sonar{
      position:absolute;left:1.15rem;top:50%;width:28px;height:28px;margin-top:-14px;border-radius:50%;
      background:#ff4d4d;
    }
    .sonar::after{
      content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,77,77,.35);
    }
    .title{font-size:.95rem;font-weight:800}
    .sub{margin-top:.3rem;font-size:.8rem;color:rgba(255,255,255,.6);line-height:1.45}
    @keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.alert{animation:none}}
  </style>
</head>
<body>
  <div class="alert" role="alert">
    <span class="sonar" aria-hidden="true"></span>
    <div class="title">Incident detected in us-east</div>
    <div class="sub">Elevated error rates on checkout. Engineering is investigating - status page updated.</div>
  </div>
</body>
</html>
