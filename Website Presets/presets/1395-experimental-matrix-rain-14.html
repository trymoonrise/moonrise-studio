<canvas id="c"></canvas>
<script>const c=document.getElementById('c'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;const cols=Math.floor(c.width/14),y=Array(cols).fill(0);function d(){x.fillStyle='rgba(0,0,0,.05)';x.fillRect(0,0,c.width,c.height);x.fillStyle='#0f0';x.font='14px monospace';y.forEach((v,i)=>{x.fillText(String.fromCharCode(0x30A0+Math.random()*96),i*14,v);if(v>c.height&&Math.random()>.975)y[i]=0;y[i]+=14;});requestAnimationFrame(d);}d();</script>
