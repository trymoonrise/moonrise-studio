<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0317
    slug: timers-interval-timer
    title: Interval Timer
    category: timers
    tags: timers, interval
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0317 — Interval Timer</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background:
        radial-gradient(circle at 18% 20%, rgba(108, 140, 255, 0.18), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(108, 255, 184, 0.14), transparent 36%),
        #0d0d0f;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #fff;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: min(100%, 340px);
      padding: 2rem 1.5rem 1.5rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: box-shadow 0.4s cubic-bezier(.22, .61, .36, 1);
    }

    .wrap.is-rest {
      box-shadow: 0 28px 80px rgba(108, 255, 184, 0.12);
    }

    .round {
      margin-bottom: 0.85rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .phase {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 1.25rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: rgba(108, 140, 255, 0.14);
      color: #9eb4ff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.35s, color 0.35s;
    }

    .wrap.is-rest .phase {
      background: rgba(108, 255, 184, 0.14);
      color: #8dffd0;
    }

    .phase__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6c8cff;
      box-shadow: 0 0 0 4px rgba(108, 140, 255, 0.18);
      transition: background 0.35s, box-shadow 0.35s;
    }

    .wrap.is-rest .phase__dot {
      background: #6cffb8;
      box-shadow: 0 0 0 4px rgba(108, 255, 184, 0.18);
    }

    .timer {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 1.5rem;
    }

    .ring {
      transform: rotate(-90deg);
      display: block;
    }

    .ring__bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 10;
    }

    .ring__fg {
      fill: none;
      stroke: var(--accent, #6c8cff);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: var(--o, 0);
      transition: stroke 0.35s, stroke-dashoffset 0.35s linear;
    }

    .time {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .btns {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn {
      min-width: 100px;
      padding: 0.8rem 1.15rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn--primary {
      background: linear-gradient(135deg, #6c8cff, #5a74f0);
      color: #fff;
      box-shadow: 0 10px 28px rgba(108, 140, 255, 0.32);
    }

    .btn--ghost {
      background: transparent;
      color: #d1d5db;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn--ghost:hover {
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="round" id="round">Round 1</div>

    <div class="phase" id="phase">
      <span class="phase__dot" aria-hidden="true"></span>
      <span id="phaseLabel">Work</span>
    </div>

    <div class="timer">
      <svg class="ring" width="220" height="220" viewBox="0 0 160 160" aria-hidden="true">
        <circle class="ring__bg" cx="80" cy="80" r="70"></circle>
        <circle class="ring__fg" cx="80" cy="80" r="70" id="ring"></circle>
      </svg>
      <div class="time" id="t" aria-live="polite">00:30</div>
    </div>

    <div class="btns">
      <button class="btn btn--primary" id="toggle" type="button">Pause</button>
      <button class="btn btn--ghost" id="reset" type="button">Reset</button>
    </div>
  </div>

  <script>
    const phases = [
      { name: 'Work', duration: 30, color: '#6c8cff' },
      { name: 'Rest', duration: 15, color: '#6cffb8' },
    ];
    const CIRC = 440;

    let phaseIndex = 0;
    let round = 1;
    let sec = phases[0].duration;
    let iv = null;

    const wrap = document.getElementById('wrap');
    const roundEl = document.getElementById('round');
    const phaseLabel = document.getElementById('phaseLabel');
    const timeEl = document.getElementById('t');
    const ringEl = document.getElementById('ring');
    const toggleBtn = document.getElementById('toggle');
    const resetBtn = document.getElementById('reset');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function currentPhase() {
      return phases[phaseIndex];
    }

    function render() {
      const phase = currentPhase();
      timeEl.textContent = `00:${pad(sec)}`;
      phaseLabel.textContent = phase.name;
      roundEl.textContent = `Round ${round}`;
      ringEl.style.setProperty('--accent', phase.color);
      ringEl.style.setProperty('--o', CIRC * (1 - sec / phase.duration));
      wrap.classList.toggle('is-rest', phase.name === 'Rest');
    }

    function nextPhase() {
      phaseIndex = (phaseIndex + 1) % phases.length;
      if (phaseIndex === 0) round += 1;
      sec = currentPhase().duration;
      render();
    }

    function tick() {
      if (sec <= 0) {
        nextPhase();
        return;
      }
      sec -= 1;
      render();
      if (sec <= 0) nextPhase();
    }

    function start() {
      if (iv) return;
      iv = setInterval(tick, 1000);
      toggleBtn.textContent = 'Pause';
    }

    function pause() {
      clearInterval(iv);
      iv = null;
      toggleBtn.textContent = 'Resume';
    }

    function reset() {
      pause();
      phaseIndex = 0;
      round = 1;
      sec = phases[0].duration;
      toggleBtn.textContent = 'Start';
      render();
    }

    toggleBtn.addEventListener('click', () => {
      if (iv) pause();
      else start();
    });

    resetBtn.addEventListener('click', reset);

    render();
    start();
  </script>
</body>
</html>
