<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0296
    slug: profiles-tabbed-profile
    title: Tabbed Profile
    category: profiles
    tags: profiles, tabs
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0296 — Tabbed Profile</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:2rem;align-items:flex-start}.card{background:#fff;border-radius:12px;overflow:hidden;width:360px}.head{padding:1.5rem;display:flex;gap:1rem;align-items:center;border-bottom:1px solid #eee}.av{width:56px;height:56px;border-radius:50%;overflow:hidden}.av img{width:100%;height:100%;object-fit:cover}.tabs{display:flex;border-bottom:1px solid #eee}.tab{flex:1;padding:12px;text-align:center;font-size:.85rem;cursor:pointer;color:#999;border-bottom:2px solid transparent}.tab.on{color:#6c8cff;border-color:#6c8cff}.content{padding:1rem;font-size:.9rem;color:#666}
  </style>
</head>
<body>
<div class="card"><div class="head"><div class="av"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div><strong>Alex Kim</strong><p style="font-size:.8rem;color:#999">Developer</p></div></div><div class="tabs"><div class="tab on">Posts</div><div class="tab">About</div><div class="tab">Media</div></div><div class="content">Recent activity and posts appear here.</div></div>
<script>document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');});</script>
</body>
</html>
