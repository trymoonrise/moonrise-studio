<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0867
    slug: alerts-compact-alert-11
    title: Compact Alert 11
    category: alerts
    tags: alerts, compact
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0867 — Compact Alert 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background: #0e0e12;
      font-family: 'Inter', sans-serif;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0;
      height: 52px;
      padding: 0 6px 0 6px;
      border-radius: 999px;
      background: #17171f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f0f0f5;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }

    .dot {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #f97316, #fb923c);
      position: relative;
    }

    .dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(249, 115, 22, 0.5);
      animation: ripple 1.8s ease-out infinite;
    }

    .reveal {
      display: grid;
      grid-template-columns: 0fr;
      transition: grid-template-columns 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal > div { overflow: hidden; min-width: 0; }

    .pill:hover .reveal,
    .pill:focus-visible .reveal { grid-template-columns: 1fr; }
    .pill:hover, .pill:focus-visible { box-shadow: 0 16px 50px rgba(249, 115, 22, 0.3); }

    .text {
      white-space: nowrap;
      padding: 0 1rem 0 0.8rem;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .text b { color: #fb923c; }

    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot::after { animation: none; }
      .reveal { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="pill" tabindex="0" role="status" aria-live="polite">
    <div class="dot" aria-hidden="true">⚡</div>
    <div class="reveal">
      <div>
        <span class="text"><b>Synced</b> · 12 items updated just now</span>
      </div>
    </div>
  </div>
  <p class="hint">Hover to expand</p>
</body>
</html>
