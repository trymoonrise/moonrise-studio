<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1817
    slug: maps-live-eta-ticker
    title: Live ETA Ticker
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1817 — Live ETA Ticker</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#111;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(580px,94vw)}.stage{position:relative;aspect-ratio:16/10;border-radius:24px;overflow:hidden;border:1px solid #333}
.ticker{overflow:hidden;border-top:1px solid #333;background:#0a0a0a;padding:.85rem 0}
.track{display:flex;width:max-content;gap:2rem;animation:run 22s linear infinite;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#a3e635}
.track b{color:#fff}
.badge{position:absolute;left:16px;top:16px;padding:.5rem .8rem;border-radius:999px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;border:1px solid rgba(163,230,53,.35);color:#a3e635}
.badge i{display:inline-block;width:7px;height:7px;border-radius:50%;background:#a3e635;margin-right:6px;animation:blink 1s infinite}
@keyframes run{to{transform:translateX(-50%)}}@keyframes blink{50%{opacity:.3}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe src="https://www.google.com/maps?q=London%2C%20UK&hl=en&z=12&output=embed" title="ETA map" loading="lazy"></iframe><div class="badge"><i></i>Live transit</div></div>
<div class="ticker"><div class="track"><span>Bus 38 · <b>4 min</b></span><span>Tube · <b>2 min</b></span><span>Bike dock · <b>120m</b></span><span>Walk · <b>9 min</b></span><span>Bus 38 · <b>4 min</b></span><span>Tube · <b>2 min</b></span><span>Bike dock · <b>120m</b></span><span>Walk · <b>9 min</b></span></div></div></div>

</body>
</html>
