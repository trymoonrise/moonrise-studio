<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0396 - Paint Trail 01</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f4f4f5;cursor:crosshair}canvas{position:fixed;inset:0;pointer-events:none}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>const c=document.getElementById('c'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight;}r();addEventListener('resize',r);const pts=[];addEventListener('mousemove',e=>{pts.push({x:e.clientX,y:e.clientY});if(pts.length>40)pts.shift();});function d(){x.clearRect(0,0,c.width,c.height);pts.forEach((p,i)=>{x.beginPath();x.arc(p.x,p.y,8-i*.15,0,Math.PI*2);x.fillStyle='hsla('+(i*8+10)+',80%,60%,'+(i/pts.length)+')';x.fill();});requestAnimationFrame(d);}d();</script>
</body>
</html>
