<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1014
    slug: announcements-dismiss-banner-02
    title: Dismiss Banner 02
    category: announcements
    tags: announcements, dismiss
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1014 — Dismiss Banner 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#ebe8e2;font-family:Manrope,sans-serif;perspective:1200px}
    .wrap{position:fixed;top:1rem;left:50%;width:min(680px,calc(100% - 2rem));transform:translateX(-50%);transform-style:preserve-3d;z-index:20}
    .banner{
      display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;padding:1rem 1.1rem;
      border-radius:18px;background:#161616;color:#fff;border:1px solid rgba(255,255,255,.08);
      box-shadow:0 22px 50px rgba(0,0,0,.25);transform-style:preserve-3d;animation:rise .75s cubic-bezier(.16,1,.3,1) both;
    }
    .banner.fold .panel{animation:fold-away .65s cubic-bezier(.4,0,.2,1) forwards}
    .panel{transform-origin:left center}
    .title{font-size:.95rem;font-weight:700}
    .sub{margin-top:.25rem;font-size:.78rem;color:rgba(255,255,255,.55)}
    .x{appearance:none;border:0;width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:1.1rem}
    .x:hover{background:rgba(255,255,255,.14)}
    .page{padding:6rem 1.5rem;text-align:center;color:#888}
    @keyframes rise{from{opacity:0;transform:rotateX(-20deg) translateY(-24px)}to{opacity:1;transform:none}}
    @keyframes fold-away{to{opacity:0;transform:rotateY(-95deg) translateX(-40px)}}
    @media (prefers-reduced-motion:reduce){.banner,.panel{animation:none}.banner.fold{opacity:0}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner" id="b" role="status">
      <div class="panel">
        <div class="title">Migration complete</div>
        <div class="sub">All projects are live on the new infrastructure.</div>
      </div>
      <button class="x" id="x" type="button" aria-label="Dismiss">×</button>
    </div>
  </div>
  <p class="page">Dismiss folds the panel away on the Y axis.</p>
  <script>
    const b=document.getElementById('b');
    document.getElementById('x').onclick=()=>{
      b.classList.add('fold');
      setTimeout(()=>b.remove(),650);
    };
  </script>
</body>
</html>
