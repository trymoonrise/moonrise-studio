<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0503
    slug: split-screens-morph-split-14
    title: Morph Split 14
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0503 - Morph Split 14</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#0a0a0a;color:#fff}
    .stage{position:relative;min-height:100vh;overflow:hidden;display:grid;place-items:center}
.blob{
  position:absolute;inset:10% 15%;
  background:linear-gradient(135deg,#22d3ee,#a78bfa 50%,#fb7185);
  border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;
  animation:morph 8s ease-in-out infinite;
  filter:saturate(1.2);
}
.frame{
  position:relative;z-index:1;width:min(480px,88vw);aspect-ratio:4/5;
  border-radius:40% 60% 50% 50% / 50% 40% 60% 50%;
  overflow:hidden;animation:morph 8s ease-in-out infinite reverse;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 40px 100px rgba(0,0,0,.5);
}
.frame .inner{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr}
.frame .l{background:#111;display:grid;place-items:center}
.frame .r{background:#f5f1ea;color:#111;display:grid;place-items:center}
.frame h1{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:800;letter-spacing:-.05em;margin:0;writing-mode:vertical-rl;transform:rotate(180deg)}
.frame .r h1{transform:none;writing-mode:horizontal-tb}
.label{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);z-index:2;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;opacity:.45}
@keyframes morph{
  0%,100%{border-radius:60% 40% 55% 45% / 45% 55% 40% 60%}
  25%{border-radius:40% 60% 40% 60% / 60% 40% 60% 40%}
  50%{border-radius:55% 45% 60% 40% / 40% 60% 45% 55%}
  75%{border-radius:45% 55% 40% 60% / 55% 45% 55% 45%}
}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><div class="blob" aria-hidden="true"></div><div class="frame"><div class="inner"><div class="l"><h1>Morph</h1></div><div class="r"><h1>Split</h1></div></div></div><span class="label">Living mask</span></div>

</body>
</html>
