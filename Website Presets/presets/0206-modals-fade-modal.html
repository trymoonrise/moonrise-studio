<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0206
    slug: modals-fade-modal
    title: Fade Modal
    category: modals
    tags: modals, fade
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0206 — Fade Modal</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5}.btn{padding:10px 24px;background:#6c8cff;color:#fff;border:none;border-radius:8px;cursor:pointer}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;place-items:center;z-index:10}.overlay.open{display:grid}.modal{background:#fff;border-radius:16px;padding:2rem;width:360px;animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<button class="btn" id="o">Open Modal</button><div class="overlay" id="ov"><div class="modal"><h3>Modal Title</h3><p style="color:#666;margin:1rem 0;font-size:.9rem">Modal content here.</p><button class="btn" id="c">Close</button></div></div>
<script>document.getElementById('o').onclick=()=>document.getElementById('ov').classList.add('open');document.getElementById('c').onclick=()=>document.getElementById('ov').classList.remove('open');</script>
</body>
</html>
