<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0199
    slug: popovers-info-popover
    title: Info Icon Popover
    category: popovers
    tags: popovers, info
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0199 — Info Icon Popover</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f4f5f8;
      padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .demo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 1.25rem 1.5rem;
      border-radius: 14px;
      background: #fff;
      border: 1px solid #e4e6ec;
      box-shadow: 0 10px 32px rgba(15, 23, 42, 0.06);
      color: #2a2f3d;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .wrap {
      position: relative;
      display: inline-flex;
    }

    .trigger {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid #d4d8e0;
      border-radius: 50%;
      background: #fff;
      color: #4f6ef7;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .trigger:hover {
      background: #f0f4ff;
      border-color: #c8d2ff;
    }

    .trigger[aria-expanded="true"] {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #fff;
    }

    .trigger svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pop {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      width: max(240px, 18vw);
      padding: 0.95rem 1rem;
      background: #fff;
      border: 1px solid #e4e6ec;
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      font-size: 0.86rem;
      line-height: 1.55;
      color: #555;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.25s cubic-bezier(0.22, 0.61, 0.36, 1),
        visibility 0.25s;
      z-index: 10;
    }

    .pop::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #fff;
      border-left: 1px solid #e4e6ec;
      border-top: 1px solid #e4e6ec;
      transform: translateX(-50%) rotate(45deg);
    }

    .pop.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .pop h4 {
      font-size: 0.88rem;
      font-weight: 700;
      color: #111318;
      margin-bottom: 0.35rem;
    }
  </style>
</head>
<body>
  <div class="demo">
    <span>Auto-save enabled</span>
    <div class="wrap">
      <button class="trigger" id="trigger" type="button" aria-expanded="false" aria-controls="popover" aria-label="More information">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
      </button>
      <div class="pop" id="popover" role="tooltip">
        <h4>About auto-save</h4>
        <p>Changes are saved every few seconds. You can keep working without manually saving your progress.</p>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('trigger');
    const popover = document.getElementById('popover');

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = popover.classList.toggle('show');
      trigger.setAttribute('aria-expanded', String(open));
    });

    document.addEventListener('click', () => {
      popover.classList.remove('show');
      trigger.setAttribute('aria-expanded', 'false');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        popover.classList.remove('show');
        trigger.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
