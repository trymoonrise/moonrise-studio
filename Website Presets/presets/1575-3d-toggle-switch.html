<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1575
    slug: 3d-toggle-switch
    title: 3D Toggle Switch
    category: 3d-effects
    tags: 3d, toggle, switch
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1575 — 3D Toggle Switch</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0c12;perspective:800px;font-family:Syne,sans-serif;color:#fff}
    .wrap{display:flex;flex-direction:column;align-items:center;gap:1.25rem;transform:rotateX(18deg)}
    label{font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
    .sw{position:relative;width:120px;height:56px;border:none;border-radius:999px;background:#1a1f30;cursor:pointer;transform-style:preserve-3d;box-shadow:inset 0 4px 12px rgba(0,0,0,.5),0 10px 30px rgba(0,0,0,.35);padding:0;transition:background .4s}
    .sw[aria-checked="true"]{background:#1f4a3a}
    .knob{position:absolute;top:6px;left:6px;width:44px;height:44px;border-radius:50%;background:linear-gradient(160deg,#fff,#c8c8d0);transform:translateZ(20px);transition:transform .45s cubic-bezier(.16,1,.3,1),left .45s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 16px rgba(0,0,0,.35),inset 0 1px 0 #fff}
    .sw[aria-checked="true"] .knob{left:70px;background:linear-gradient(160deg,#7ee0c3,#2db89a);box-shadow:0 8px 20px rgba(46,184,154,.45),inset 0 1px 0 rgba(255,255,255,.5)}
    .rail{position:absolute;inset:0;border-radius:999px;overflow:hidden;pointer-events:none}
    .rail::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(126,224,195,.25),transparent);transform:translateX(-100%);transition:transform .5s}
    .sw[aria-checked="true"] .rail::after{transform:translateX(100%)}
    @media(prefers-reduced-motion:reduce){.knob,.rail::after,.sw{transition:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <label id="lbl">Power</label>
    <button class="sw" id="sw" type="button" role="switch" aria-checked="false" aria-labelledby="lbl">
      <span class="rail" aria-hidden="true"></span>
      <span class="knob" aria-hidden="true"></span>
    </button>
  </div>
  <script>
    const sw=document.getElementById('sw');
    sw.addEventListener('click',()=>{
      const on=sw.getAttribute('aria-checked')==='true';
      sw.setAttribute('aria-checked',String(!on));
    });
  </script>
</body>
</html>
