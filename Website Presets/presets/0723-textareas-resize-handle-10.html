<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0723
    slug: textareas-resize-handle-10
    title: Resize Handle 10
    category: textareas
    tags: textareas, modern, experimental, exaggerated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0723 - Resize Handle 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef2ff;font-family:Inter,system-ui,sans-serif;overflow:hidden;padding:24px;color:#111}
    textarea{font:inherit;border:0;outline:0;resize:none;background:transparent;color:inherit;width:100%}
    button{font:inherit;border:0;cursor:pointer}
    .scene{position:relative;width:min(520px,92vw)}
    .resizer{position:relative;border-radius:30px;background:#fff;border:1px solid rgba(67,56,202,.16);box-shadow:0 28px 80px rgba(67,56,202,.16);padding:22px}.area{min-height:170px;resize:both;max-width:100%;min-width:220px;min-height:120px;padding:0 0 28px;font-size:22px;line-height:1.35;font-weight:700;color:#1e1b4b}.handle{position:absolute;right:16px;bottom:16px;width:42px;height:42px;border-radius:14px;background:#4338ca;color:#fff;display:grid;place-items:center;font:800 18px 'JetBrains Mono';animation:pulse 2.8s ease-in-out infinite;pointer-events:none}.hint{font:700 11px 'JetBrains Mono';letter-spacing:.2em;text-transform:uppercase;color:#6366f1;margin-bottom:18px}@keyframes pulse{50%{transform:translate(-3px,-3px)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="scene"><section class="resizer"><p class="hint">Drag corner</p><textarea class="area">A resize handle that announces itself instead of hiding.</textarea><span class="handle">++</span></section></div>
</body>
</html>
