<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0980
    slug: loaders-progress-loader-07
    title: Data Stream Progress Bar
    category: loaders
    tags: loaders, progress, stream, data
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0980 - Data Stream Progress Bar</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0e1014;color:#d8dce4;font-family:Outfit,sans-serif;padding:2rem}
    .panel{width:min(440px,100%)}
    .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
    .head h2{font-family:Syne,sans-serif;font-size:1rem;letter-spacing:-.02em;margin:0}
    .pct{font-family:Syne,sans-serif;font-size:2rem;font-weight:800;color:#38bdf8;letter-spacing:-.04em}
    .track{position:relative;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
    .fill{height:100%;width:67%;background:linear-gradient(90deg,#0ea5e9,#38bdf8);border-radius:3px;position:relative;animation:grow 3s ease-in-out infinite alternate}
    .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.5s linear infinite}
    .segments{display:flex;gap:4px;margin-top:1rem}
    .seg{flex:1;height:32px;border:1px solid rgba(255,255,255,.06);border-radius:4px;position:relative;overflow:hidden}
    .seg.done{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.2)}
    .seg.active::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(56,189,248,.15),transparent);animation:scan-seg 1.2s ease infinite}
    .meta{display:flex;justify-content:space-between;margin-top:.75rem;font-size:.7rem;color:rgba(216,220,228,.4);letter-spacing:.08em;text-transform:uppercase}
    @keyframes grow{0%{width:55%}100%{width:72%}}
    @keyframes shimmer{to{transform:translateX(100%)}}
    @keyframes scan-seg{0%,100%{opacity:.5}50%{opacity:1}}
    @media(prefers-reduced-motion:reduce){.fill,.fill::after,.seg.active::before{animation:none}}
  </style>
</head>
<body>
  <div class="panel">
    <div class="head"><h2>Syncing dataset</h2><span class="pct">67%</span></div>
    <div class="track"><div class="fill"></div></div>
    <div class="segments">
      <div class="seg done"></div><div class="seg done"></div><div class="seg done"></div><div class="seg active"></div><div class="seg"></div><div class="seg"></div>
    </div>
    <div class="meta"><span>Block 3/6</span><span>2.4 GB remaining</span></div>
  </div>
</body>
</html>
