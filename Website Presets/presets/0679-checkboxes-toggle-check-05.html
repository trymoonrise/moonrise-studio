<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0679
    slug: checkboxes-toggle-check-05
    title: Toggle Check 05
    category: checkboxes
    tags: checkboxes, toggle
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0679 - Toggle Check 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.dd{position:relative}.btn{padding:10px 20px;border:1px solid #8888a0;border-radius:8px;background:#16161a;color:#e8e8ed;cursor:pointer}.menu{position:absolute;top:calc(100% + 4px);left:0;min-width:160px;background:#16161a;border:1px solid #8888a044;border-radius:8px;display:none;overflow:hidden;z-index:5}.menu.open{display:block}.opt{padding:10px 16px;color:#e8e8ed;cursor:pointer;font-size:.9rem}.opt:hover{background:#6c8cff22}
  </style>
</head>
<body>
<div class="dd"><button class="btn" id="b">Toggle Check 288 ▾</button><div class="menu" id="m"><div class="opt">One</div><div class="opt">Two</div><div class="opt">Three</div></div></div>
<script>const b=document.getElementById('b'),m=document.getElementById('m');b.onclick=e=>{e.stopPropagation();m.classList.toggle('open');};document.onclick=()=>m.classList.remove('open');</script>
</body>
</html>
