<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1411

    title: Circle Clip Reveal

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1411 — Circle Clip Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#eee}.reveal{width:280px;height:180px;border-radius:12px;background:linear-gradient(135deg,#6c8cff,#764ba2);display:grid;place-items:center;color:#fff;font-weight:700;font-size:1.2rem;clip-path:circle(0% at 50% 50%);animation:clip 1.2s cubic-bezier(.16,1,.3,1) forwards}@keyframes clip{to{clip-path:circle(75% at 50% 50%)}}
  </style>
</head>
<body>
<div class="reveal">Revealed</div>

</body>
