<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1457
    slug: scroll-bento-collapse
    title: Bento Collapse Stack
    category: scroll-stack
    tags: scroll, bento, stack
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1457 - Bento Collapse Stack</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0d0d0f;color:#fff;padding-bottom:40vh}.head{padding:3rem 2rem 2rem;max-width:900px;margin:0 auto}.head h1{font-size:2rem;margin-bottom:.5rem}.bento{max-width:900px;margin:0 auto;padding:0 2rem;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.tile{position:sticky;top:calc(80px + var(--n)*8px);aspect-ratio:1;border-radius:16px;display:grid;place-items:center;font-weight:800;font-size:1.2rem;background:var(--bg);box-shadow:0 8px 32px rgba(0,0,0,.3)}.tile:nth-child(1){--n:0;--bg:#6c8cff}.tile:nth-child(2){--n:1;--bg:#ff6cb0}.tile:nth-child(3){--n:2;--bg:#6cffb8;color:#111}.tile:nth-child(4){--n:3;--bg:#f59e0b;color:#111}.tile:nth-child(5){--n:4;--bg:#764ba2}.tile:nth-child(6){--n:5;--bg:#ec4899}
  </style>
</head>
<body>
<div class="head"><h1>Bento Stack</h1><p style="color:#888">Tiles pin and stack as you scroll</p></div><div class="bento"><div class="tile">UI</div><div class="tile">UX</div><div class="tile">Dev</div><div class="tile">Brand</div><div class="tile">Motion</div><div class="tile">Ship</div></div>

</body>
</html>
