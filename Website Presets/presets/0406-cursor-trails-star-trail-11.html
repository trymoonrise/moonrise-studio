<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0406
    slug: cursor-trails-star-trail-11
    title: Star Trail 11
    category: cursor-trails
    tags: cursor-trails, star
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0406 - Star Trail 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{
      margin:0;
      min-height:100vh;
      background:#1a0a12;
      color:#ffe8f0;
      cursor:crosshair;
      overflow:hidden;
    }

    canvas{position:fixed;inset:0;pointer-events:none}

    .hint{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      color:#ff8c42;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      opacity:.38;
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
  <p class="hint" id="hint">Move your cursor</p>
  <canvas id="c" aria-hidden="true"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    const stars = [];
    let mx = innerWidth / 2;
    let my = innerHeight / 2;
    let pmx = mx;
    let pmy = my;
    let moved = false;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    function spawn(x, y, vx, vy) {
      const speed = Math.min(80, Math.hypot(vx, vy));
      const count = Math.min(10, Math.max(2, Math.floor(speed / 10)));
      for (let i = 0; i < count; i += 1) {
        const ang = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.9;
        const s = (0.9 + Math.random() * 1.6) * (speed * 0.09 + 1.4);
        stars.push({
          x,
          y,
          vx: Math.cos(ang) * s * 0.55,
          vy: Math.sin(ang) * s * 0.55,
          r: 1.2 + Math.random() * 1.9,
          life: 1,
          spin: (Math.random() - 0.5) * 0.25,
          a: Math.random() * Math.PI * 2,
        });
      }
      if (stars.length > 420) stars.splice(0, stars.length - 420);
    }

    function starPath(x, y, r, rot) {
      const spikes = 5;
      const step = Math.PI / spikes;
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i += 1) {
        const rad = i % 2 === 0 ? r : r * 0.45;
        const a = rot + i * step;
        const px = x + Math.cos(a) * rad;
        const py = y + Math.sin(a) * rad;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    if (!reduced) {
      addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        if (!moved) {
          moved = true;
          hint.style.opacity = '0';
        }
        const vx = mx - pmx;
        const vy = my - pmy;
        pmx = mx;
        pmy = my;
        spawn(mx, my, vx, vy);
      }, { passive: true });

      function frame() {
        ctx.fillStyle = 'rgba(26, 10, 18, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        for (let i = stars.length - 1; i >= 0; i -= 1) {
          const s = stars[i];
          s.x += s.vx;
          s.y += s.vy;
          s.vx *= 0.92;
          s.vy *= 0.92;
          s.life -= 0.03 + (1 - s.life) * 0.01;
          s.a += s.spin;

          if (s.life <= 0.02) {
            stars.splice(i, 1);
            continue;
          }

          const a = Math.max(0, Math.min(1, s.life));

          // soft glow
          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 18);
          g.addColorStop(0, `rgba(255, 140, 66, ${0.28 * a})`);
          g.addColorStop(0.35, `rgba(255, 232, 240, ${0.10 * a})`);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.fillRect(s.x - 18, s.y - 18, 36, 36);

          // streak line
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x - s.vx * 2.2, s.y - s.vy * 2.2);
          ctx.strokeStyle = `rgba(255, 140, 66, ${0.26 * a})`;
          ctx.lineWidth = 2.2;
          ctx.lineCap = 'round';
          ctx.stroke();

          // star core
          starPath(s.x, s.y, 3.5 + s.r * 1.2, s.a);
          ctx.fillStyle = `rgba(255, 255, 255, ${0.55 * a})`;
          ctx.fill();
          starPath(s.x, s.y, 3.2 + s.r, s.a);
          ctx.strokeStyle = `rgba(255, 232, 240, ${0.45 * a})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.restore();
        requestAnimationFrame(frame);
      }

      frame();
    }
  </script>
</body>
</html>
