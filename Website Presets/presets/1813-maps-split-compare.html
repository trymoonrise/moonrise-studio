<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1813
    slug: maps-split-compare
    title: Split Compare Maps
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1813 - Split Compare Maps</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#f7f5f0;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(680px,96vw)}.stage{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:min(360px,55vh)}
.pane{position:relative;border-radius:22px;overflow:hidden;border:1px solid rgba(0,0,0,.1);box-shadow:0 20px 50px rgba(0,0,0,.08)}
.pane span{position:absolute;left:12px;top:12px;z-index:2;padding:.4rem .7rem;border-radius:999px;background:rgba(255,255,255,.9);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase}
.divider{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#111;transform:translateX(-50%);z-index:3;pointer-events:none;display:none}
.vs{text-align:center;margin-top:1rem;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.4rem}
@media(max-width:600px){.stage{grid-template-columns:1fr;height:auto}.pane{aspect-ratio:16/10}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage">
<div class="pane"><span>Day</span><iframe src="https://www.google.com/maps?q=Barcelona%2C%20Spain&hl=en&z=13&output=embed" title="Day map" loading="lazy"></iframe></div>
<div class="pane"><span>Night vibe</span><iframe src="https://www.google.com/maps?q=Tokyo%2C%20Japan&hl=en&z=13&output=embed" title="Night map" loading="lazy" style="filter:hue-rotate(200deg) saturate(1.3) brightness(.85)"></iframe></div>
</div><p class="vs">Barcelona × Tokyo</p></div>

</body>
</html>
