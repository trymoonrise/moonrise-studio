<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1585
    slug: 3d-tunnel-scroll
    title: 3D Tunnel Scroll
    category: 3d-effects
    tags: 3d, tunnel, scroll
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1585 - 3D Tunnel Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#000;color:#fff;perspective:400px}.tunnel{height:400vh;position:relative}.ring{position:sticky;top:0;height:100vh;display:grid;place-items:center;transform-style:preserve-3d}.frame{position:absolute;width:min(300px,80vw);aspect-ratio:16/10;border:2px solid rgba(108,140,255,.3);border-radius:12px;display:grid;place-items:center;font-size:2rem;font-weight:800}
  </style>
</head>
<body>
<div class="tunnel"><div class="ring" id="r"><div class="frame" data-i="0">1</div><div class="frame" data-i="1">2</div><div class="frame" data-i="2">3</div><div class="frame" data-i="3">4</div><div class="frame" data-i="4">5</div><div class="frame" data-i="5">6</div><div class="frame" data-i="6">7</div><div class="frame" data-i="7">8</div></div></div>
<script>const tunnel=document.querySelector('.tunnel'),frames=[...document.querySelectorAll('.frame')];addEventListener('scroll',()=>{const r=tunnel.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight));frames.forEach((f,i)=>{const d=i/frames.length;const z=-(d*400)+(p*400);const sc=1-d*.12+p*.12;f.style.transform='translateZ('+z+'px) scale('+sc+')';f.style.opacity=1-Math.abs(d-p)*1.5;});},{passive:true});</script>
</body>
</html>
