<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1048
    slug: cta-inline-cta-10
    title: Inline Cta 10
    category: cta
    tags: cta, inline
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1048 — Inline Cta 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f7;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .line{display:flex;align-items:baseline;flex-wrap:wrap;gap:.55rem .75rem;max-width:560px;justify-content:center;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.35rem,3.5vw,1.85rem);font-weight:700;letter-spacing:-.025em;color:#111;line-height:1.35}
    .line span{opacity:0;animation:pop .5s cubic-bezier(.22,1,.36,1) forwards}
    .line span:nth-child(1){animation-delay:.05s}.line span:nth-child(2){animation-delay:.15s}.line span:nth-child(3){animation-delay:.25s}
    @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    a{color:#111;text-decoration:none;border-bottom:2px solid #111;padding-bottom:1px;transition:background .25s,box-shadow .25s;box-shadow:inset 0 0 0 #111}
    a:hover{background:#111;color:#fff;box-shadow:inset 0 -2.2em 0 #111;border-color:transparent}
  </style>
</head>
<body>
<p class="line"><span>Ready to build?</span><span><a href="#">Get started</a></span><span>— it takes a minute.</span></p>

</body>
</html>
