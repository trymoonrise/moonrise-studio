<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1290
    slug: borders-double-border-03
    title: Nested Void Frame
    category: borders
    tags: borders, double
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1290 — Nested Void Frame</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0a0e;color:#f0f0f4;font-family:Outfit,sans-serif;padding:32px}
    .frame{position:relative;padding:20px;border:1px solid rgba(255,255,255,.2);transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .frame::before{content:'';position:absolute;inset:8px;border:1px solid rgba(255,255,255,.08);pointer-events:none;transition:inset .4s cubic-bezier(.16,1,.3,1)}
    .frame:hover{transform:translate(-4px,-4px)}.frame:hover::before{inset:14px}
    .content{padding:28px 24px;background:#111118;position:relative}
    .content h2{font-family:Syne,sans-serif;font-size:1.5rem;margin:0 0 8px;letter-spacing:-.03em}
    .content p{margin:0;font-size:.85rem;color:rgba(240,240,244,.45);line-height:1.5}
    .corner{position:absolute;width:12px;height:12px;border:2px solid rgba(255,255,255,.3)}
    .corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}
    .corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0;animation:nudge 3s ease-in-out infinite}
    @keyframes nudge{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,3px)}}
    @media(prefers-reduced-motion:reduce){.frame,.frame::before{transition:none}.corner.br{animation:none}}
  </style>
</head>
<body>
<article class="frame">
  <div class="corner tl"></div><div class="corner br"></div>
  <div class="content">
    <h2>Nested void</h2>
    <p>Double border with offset hover — outer rigid, inner ghost.</p>
  </div>
</article>
</body>
</html>
