<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1344
    slug: dropdowns-nested-submenu-03
    title: Branch Nested Submenu
    category: dropdowns
    tags: dropdowns, nested
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1344 — Branch Nested Submenu</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08080c;color:#ececf0;font-family:Outfit,sans-serif;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit;text-align:left}
    .menu{width:min(260px,90vw);border:1px solid rgba(255,255,255,.1);border-radius:4px;background:#0e0e14;overflow:visible;padding:6px 0}
    .item{position:relative}
    .item>button{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 16px;font-size:.82rem;color:rgba(236,236,240,.7);transition:background .2s,color .2s}
    .item>button:hover,.item.open>button{background:rgba(255,255,255,.04);color:#fff}
    .item>button::after{content:'→';font-size:.7rem;opacity:.4;transition:transform .25s}
    .item.open>button::after{transform:translateX(3px);opacity:.8}
    .sub{position:absolute;left:calc(100% + 4px);top:0;min-width:180px;background:#111118;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:6px 0;opacity:0;transform:translateX(-8px);pointer-events:none;transition:opacity .25s,transform .25s}
    .item.open .sub{opacity:1;transform:none;pointer-events:auto}
    .sub button{display:block;width:100%;padding:10px 16px;font-size:.78rem;color:rgba(236,236,240,.55);transition:background .2s,color .2s}
    .sub button:hover{background:rgba(0,200,150,.08);color:#00c896}
    .leaf button::after{display:none}
    @media(prefers-reduced-motion:reduce){.sub,.item>button::after{transition:none}}
  </style>
</head>
<body>
<ul class="menu">
  <li class="item" id="file">
    <button type="button">File</button>
    <ul class="sub">
      <li><button type="button">New project</button></li>
      <li><button type="button">Open recent</button></li>
      <li><button type="button">Export</button></li>
    </ul>
  </li>
  <li class="item" id="edit">
    <button type="button">Edit</button>
    <ul class="sub">
      <li><button type="button">Undo</button></li>
      <li><button type="button">Duplicate</button></li>
      <li><button type="button">Preferences</button></li>
    </ul>
  </li>
  <li class="item leaf"><button type="button">Help</button></li>
</ul>
<script>
document.querySelectorAll('.item:not(.leaf)').forEach(item=>{
  item.querySelector(':scope>button').onclick=e=>{
    e.stopPropagation();
    document.querySelectorAll('.item').forEach(i=>{if(i!==item)i.classList.remove('open');});
    item.classList.toggle('open');
  };
});
document.addEventListener('click',()=>document.querySelectorAll('.item').forEach(i=>i.classList.remove('open')));
</script>
</body>
</html>
