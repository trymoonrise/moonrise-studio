<body>
<aside class="sb"><a href="#" class="on">Dashboard</a><a href="#" class="">Projects</a><a href="#" class="">Settings</a><a href="#" class="">Help</a></aside><main class="main"><h2 style="color:#a78bfa">Collapsible 215</h2></main>
<script>document.querySelectorAll('.sb a').forEach(a=>a.onclick=e=>{e.preventDefault();document.querySelectorAll('.sb a').forEach(x=>x.classList.remove('on'));a.classList.add('on');});</script>
</body>
