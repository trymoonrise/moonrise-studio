<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1571
    slug: 3d-card-accordion-fold
    title: 3D Accordion Fold
    category: 3d-effects
    tags: 3d, accordion, fold
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1571 — 3D Accordion Fold</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0d14;perspective:1200px;font-family:Outfit,sans-serif;padding:2rem}
    .fold{width:min(420px,90vw);transform-style:preserve-3d;transform:rotateX(8deg)}
    details{margin:0;transform-style:preserve-3d}
    summary{list-style:none;cursor:pointer;padding:1.1rem 1.25rem;background:#161a2c;color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:14px;font-family:Syne,sans-serif;font-size:1.05rem;display:flex;justify-content:space-between;align-items:center;transition:transform .5s cubic-bezier(.16,1,.3,1),background .25s;transform-origin:top;margin-bottom:.5rem}
    summary::-webkit-details-marker{display:none}
    summary::after{content:"+";font-size:1.2rem;opacity:.6}
    details[open] summary{background:#6c8cff;transform:rotateX(-8deg)}
    details[open] summary::after{content:"–"}
    .panel{overflow:hidden;transform-origin:top;transform:rotateX(-90deg);opacity:0;max-height:0;transition:transform .55s cubic-bezier(.16,1,.3,1),opacity .4s,max-height .55s;padding:0 1.25rem;color:rgba(255,255,255,.75);font-size:.9rem;line-height:1.55}
    details[open] .panel{transform:rotateX(0);opacity:1;max-height:120px;padding:0 1.25rem 1.1rem;margin-top:-.35rem;margin-bottom:.5rem;background:#12162a;border-radius:0 0 14px 14px;border:1px solid rgba(255,255,255,.08);border-top:none}
    @media(prefers-reduced-motion:reduce){summary,.panel{transition:none}}
  </style>
</head>
<body>
  <div class="fold">
    <details open>
      <summary>Fold 01 — Origin</summary>
      <div class="panel">Panels hinge open on the X axis like paper accordion bellows.</div>
    </details>
    <details>
      <summary>Fold 02 — Motion</summary>
      <div class="panel">Each open state tips the summary forward while content swings up.</div>
    </details>
    <details>
      <summary>Fold 03 — Depth</summary>
      <div class="panel">Perspective on the stage makes the fold feel physical, not flat.</div>
    </details>
  </div>
</body>
</html>
