<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0299
    slug: ai-chat-chat-input
    title: Chat with Input
    category: ai-chat
    tags: ai-chat, input
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0299 — Chat with Input</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#212121;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#ececec}
    .stage{width:min(680px,100%);display:flex;flex-direction:column;align-items:center;gap:2rem}
    .hint{font-size:1.65rem;font-weight:600;letter-spacing:-.03em;opacity:0;animation:up .8s cubic-bezier(.16,1,.3,1) .1s forwards}
    .ask{width:100%;display:flex;align-items:center;gap:.5rem;padding:.55rem .55rem .55rem .95rem;background:#303030;border:1px solid #444;border-radius:28px;box-shadow:0 0 0 0 rgba(16,163,127,0);transition:box-shadow .35s,border-color .25s,transform .35s cubic-bezier(.16,1,.3,1);animation:up .8s cubic-bezier(.16,1,.3,1) .2s both}
    .ask:focus-within{border-color:#666;box-shadow:0 0 0 4px rgba(16,163,127,.15);transform:translateY(-2px)}
    .tools{display:flex;gap:.25rem}
    .icon{width:34px;height:34px;border:none;border-radius:50%;background:transparent;color:#b4b4b4;cursor:pointer;display:grid;place-items:center;transition:background .2s,color .2s}
    .icon:hover{background:#3f3f3f;color:#fff}
    .icon svg{width:18px;height:18px}
    input{flex:1;border:none;outline:none;background:transparent;color:#ececec;font:inherit;font-size:.95rem;min-width:0}
    input::placeholder{color:#8f8f8f}
    .send{width:36px;height:36px;border:none;border-radius:50%;background:#fff;color:#0d0d0d;cursor:pointer;display:grid;place-items:center;transition:transform .2s,opacity .2s}
    .send:disabled{opacity:.35;cursor:default}
    .send:not(:disabled):hover{transform:scale(1.06)}
    .send svg{width:16px;height:16px}
    .pulse{position:absolute;width:8px;height:8px;border-radius:50%;background:#10a37f;box-shadow:0 0 0 0 rgba(16,163,127,.5);animation:ping 2s ease-out infinite}
    .wrap{position:relative;width:100%}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
    @keyframes ping{0%{box-shadow:0 0 0 0 rgba(16,163,127,.45)}70%{box-shadow:0 0 0 14px transparent}100%{box-shadow:0 0 0 0 transparent}}
    @media(prefers-reduced-motion:reduce){.ask,.hint,.pulse{animation:none}.ask,.hint{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="hint">What can I help with?</div>
    <div class="wrap">
      <form class="ask" id="ask">
        <div class="tools">
          <button class="icon" type="button" aria-label="Attach"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
        </div>
        <input id="i" type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
        <button class="send" id="s" type="submit" disabled aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>
    </div>
  </div>
  <script>
    const i=document.getElementById('i'),s=document.getElementById('s');
    i.addEventListener('input',()=>{s.disabled=!i.value.trim()});
    document.getElementById('ask').addEventListener('submit',e=>{e.preventDefault();if(!i.value.trim())return;i.value='';s.disabled=true});
  </script>
</body>
</html>
