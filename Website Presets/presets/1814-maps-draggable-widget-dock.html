<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1814
    slug: maps-draggable-widget-dock
    title: Draggable Widget Dock
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1814 — Draggable Widget Dock</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#f0f4f8;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(620px,95vw)}.stage{position:relative;aspect-ratio:16/10;border-radius:26px;overflow:hidden;border:1px solid rgba(0,0,0,.1);box-shadow:0 24px 60px rgba(20,40,60,.12)}
.dock{position:absolute;left:16px;right:16px;bottom:16px;display:flex;gap:10px;padding:10px;border-radius:18px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border:1px solid rgba(0,0,0,.06);z-index:2}
.chip{flex:1;padding:.7rem .5rem;border-radius:12px;background:#eef2f7;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;text-align:center;transition:.25s;cursor:grab}
.chip:hover,.chip.on{background:#111;color:#fff;transform:translateY(-3px)}
.chip b{display:block;font-family:Syne,sans-serif;font-size:.95rem;letter-spacing:-.03em;margin-bottom:.2rem;text-transform:none}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe id="map" src="https://www.google.com/maps?q=Austin%2C%20TX&hl=en&z=12&output=embed" title="Dock map" loading="lazy"></iframe>
<div class="dock">
<button class="chip on" data-q="Austin, TX"><b>Austin</b>HQ</button>
<button class="chip" data-q="Dallas, TX"><b>Dallas</b>hub</button>
<button class="chip" data-q="Houston, TX"><b>Houston</b>port</button>
<button class="chip" data-q="San Antonio, TX"><b>SA</b>node</button>
</div></div></div>
<script>const map=document.getElementById('map');document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');map.src='https://www.google.com/maps?q='+encodeURIComponent(c.dataset.q)+'&hl=en&z=12&output=embed';});</script>
</body>
</html>
