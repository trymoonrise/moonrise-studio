<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0334
    slug: carousels-slide-carousel
    title: Slide Carousel
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0334 — Slide Carousel</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f1ea;font-family:'DM Sans',system-ui,sans-serif;color:#111;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(560px,92vw)}.stage{overflow:hidden;border-radius:28px;background:#fff;box-shadow:0 28px 70px rgba(40,30,20,.14);position:relative}.track{display:flex;transition:transform .7s cubic-bezier(.22,1,.36,1)}.slide{min-width:100%;aspect-ratio:16/10;position:relative;overflow:hidden}.slide img{width:100%;height:100%;object-fit:cover;transform:scale(1.08);transition:transform 1.1s cubic-bezier(.22,1,.36,1)}.slide.active img{transform:scale(1)}.cap{position:absolute;left:22px;bottom:22px;right:22px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);font-family:Syne,sans-serif;font-weight:700;letter-spacing:-.03em}.nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}.nav button{width:44px;height:44px;border-radius:50%;background:#111;color:#fff;font-size:18px;transition:transform .25s}.nav button:hover{transform:scale(1.08)}.dots{display:flex;gap:8px}.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.2);transition:width .35s,background .35s}.dot.on{width:28px;border-radius:99px;background:#111}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><div class="track" id="track">
<div class="slide active"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><div class="cap">North Studio</div></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(40deg)"><div class="cap">Soft Geometry</div></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(120deg) saturate(1.2)"><div class="cap">Quiet Motion</div></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(200deg)"><div class="cap">Launch Surface</div></div>
</div></div><div class="nav"><button id="prev" aria-label="Previous">←</button><div class="dots" id="dots"></div><button id="next" aria-label="Next">→</button></div></div>
<script>
const track=document.getElementById('track'),slides=[...track.children],dots=document.getElementById('dots');let i=0;slides.forEach((_,n)=>{const d=document.createElement('button');d.className='dot'+(n===0?' on':'');d.onclick=()=>go(n);dots.appendChild(d);});function go(n){i=(n+slides.length)%slides.length;track.style.transform='translateX('+(-i*100)+'%)';slides.forEach((s,k)=>s.classList.toggle('active',k===i));[...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i));}document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('next').onclick=()=>go(i+1);
</script>
</body>
</html>
