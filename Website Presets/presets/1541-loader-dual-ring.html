<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1541
    slug: loader-dual-ring
    title: Dual Ring Loader
    category: loading
    tags: loading, circle, ring
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1541 - Dual Ring Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0a0a0c}.loader{position:relative;width:56px;height:56px}.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}.ring--a{border-top-color:#6c8cff;animation:spin 1s linear infinite}.ring--b{inset:8px;border-bottom-color:#ff6cb0;animation:spin 1.4s linear infinite reverse}@keyframes spin{to{transform:rotate(360deg)}}p{color:#555;margin-top:1.5rem;font-size:.85rem;letter-spacing:.05em}
  </style>
</head>
<body>
<div style="text-align:center"><div class="loader"><div class="ring ring--a"></div><div class="ring ring--b"></div></div><p>Loading</p></div>

</body>
</html>
