<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0409
    slug: cursor-trails-fire-trail-14
    title: Fire Trail 14
    category: cursor-trails
    tags: cursor-trails, fire
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0409 — Fire Trail 14</title>
  <style>
    @import url('../shared/preset-reset.css');

    body{
      margin:0;
      min-height:100vh;
      background:#0b0605;
      color:#ffe0c8;
      cursor:crosshair;
      overflow:hidden;
    }

    canvas{position:fixed;inset:0;pointer-events:none}

    .hint{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      color:#ff9b42;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      opacity:.38;
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
  <p class="hint" id="hint">Move your cursor</p>
  <canvas id="c" aria-hidden="true"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    const embers = [];
    let mx = innerWidth / 2;
    let my = innerHeight / 2;
    let pmx = mx;
    let pmy = my;
    let moved = false;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    function spawn(x, y, vx, vy) {
      const speed = Math.min(60, Math.hypot(vx, vy));
      const count = Math.min(12, Math.max(4, Math.floor(speed / 5) + 4));
      for (let i = 0; i < count; i += 1) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 1.2;
        embers.push({
          x: x + (Math.random() - 0.5) * 8,
          y: y + (Math.random() - 0.5) * 8,
          vx: vx * 0.06 + Math.cos(a) * s,
          vy: vy * 0.06 + Math.sin(a) * s - (0.6 + Math.random() * 1.1),
          r: 3 + Math.random() * 7,
          life: 1,
          decay: 0.02 + Math.random() * 0.02,
        });
      }
      if (embers.length > 500) embers.splice(0, embers.length - 500);
    }

    function fireColor(t, a) {
      // t: 1 = hot (white/yellow), 0 = cool (deep red)
      if (t > 0.75) return `rgba(255, 246, 214, ${a})`;
      if (t > 0.5) return `rgba(255, 196, 84, ${a})`;
      if (t > 0.28) return `rgba(255, 120, 36, ${a})`;
      return `rgba(180, 40, 20, ${a})`;
    }

    if (!reduced) {
      addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        if (!moved) {
          moved = true;
          hint.style.opacity = '0';
        }
        const vx = mx - pmx;
        const vy = my - pmy;
        pmx = mx;
        pmy = my;
        spawn(mx, my, vx, vy);
      }, { passive: true });

      function frame() {
        ctx.fillStyle = 'rgba(11, 6, 5, 0.22)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        for (let i = embers.length - 1; i >= 0; i -= 1) {
          const p = embers[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy -= 0.03;
          p.vx *= 0.96;
          p.vy *= 0.98;
          p.life -= p.decay;

          if (p.life <= 0.02) {
            embers.splice(i, 1);
            continue;
          }

          const a = Math.max(0, Math.min(1, p.life));
          const r = p.r * (0.6 + p.life * 0.7);
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
          g.addColorStop(0, fireColor(p.life, 0.85 * a));
          g.addColorStop(0.5, fireColor(p.life * 0.7, 0.35 * a));
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
        requestAnimationFrame(frame);
      }

      frame();
    }
  </script>
</body>
</html>
