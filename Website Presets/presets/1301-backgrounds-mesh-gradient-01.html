<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1301
    slug: backgrounds-mesh-gradient-01
    title: Nocturnal Mesh Drift
    category: backgrounds
    tags: backgrounds, mesh
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1301 - Nocturnal Mesh Drift</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Outfit,sans-serif;color:#ececf2;overflow:hidden;background:#050508}
    .mesh{position:fixed;inset:0;z-index:0;background:#050508}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;animation:drift 14s ease-in-out infinite}
    .blob:nth-child(1){width:50vw;height:50vw;background:#0a3d35;top:-10%;left:-10%;animation-delay:0s}
    .blob:nth-child(2){width:40vw;height:40vw;background:#1a2040;bottom:-5%;right:-5%;animation-delay:-5s}
    .blob:nth-child(3){width:35vw;height:35vw;background:#2a1030;top:40%;left:50%;animation-delay:-9s}
    .content{position:relative;z-index:1;text-align:center;padding:32px;max-width:480px}
    .content h1{font-family:Syne,sans-serif;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.04em;margin:0 0 12px}
    .content p{margin:0;font-size:.95rem;color:rgba(236,236,242,.5);line-height:1.6}
    .grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain 8s steps(10) infinite}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,3%) scale(1.05)}66%{transform:translate(-3%,5%) scale(.95)}}
    @keyframes grain{0%,100%{transform:translate(0,0)}50%{transform:translate(-2%,-2%)}}
    @media(prefers-reduced-motion:reduce){.blob,.grain{animation:none}}
  </style>
</head>
<body>
<div class="mesh"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div class="grain" aria-hidden="true"></div>
<main class="content">
  <h1>Nocturnal mesh</h1>
  <p>Drifting gradient blobs create depth on a dark editorial canvas.</p>
</main>
</body>
</html>
