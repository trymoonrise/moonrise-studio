<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0886
    slug: badges-dot-badge-04
    title: Satellite Dot Badge
    category: badges
    tags: badges, dot
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0886 - Satellite Dot Badge</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 1rem 0.6rem 0.75rem;
      background: #12151c;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }

    .orbit {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .core {
      position: absolute;
      inset: 10px;
      background: #22d3ee;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
    }

    .ring {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(34, 211, 238, 0.25);
      border-radius: 50%;
    }

    .sat {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      margin: -2.5px;
      background: #67e8f9;
      border-radius: 50%;
      animation: orbit 2.4s linear infinite;
      transform-origin: 14px 0;
    }

    @keyframes orbit {
      from { transform: rotate(0deg) translateY(-14px); }
      to { transform: rotate(360deg) translateY(-14px); }
    }

    .text {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(232, 234, 239, 0.85);
    }

    @media (prefers-reduced-motion: reduce) {
      .sat { animation: none; transform: translateY(-14px); }
    }
  </style>
</head>
<body>
  <span class="badge" role="status">
    <span class="orbit" aria-hidden="true">
      <span class="ring"></span>
      <span class="core"></span>
      <span class="sat"></span>
    </span>
    <span class="text">Syncing</span>
  </span>
</body>
</html>
