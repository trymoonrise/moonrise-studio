<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1851
    slug: hero-video-grid-shatter
    title: Grid Shatter Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1851 - Grid Shatter Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:4px;padding:4px}
.cell{overflow:hidden;position:relative;transform:scale(.92);opacity:.7;transition:transform .6s cubic-bezier(.22,1,.36,1),opacity .6s}
.cell video{position:absolute;width:400%;height:300%;max-width:none;object-fit:cover}
.stage:hover .cell{transform:scale(1);opacity:1}
.stage:hover .cell:nth-child(odd){transform:translateY(-8px) scale(1)}
.stage:hover .cell:nth-child(even){transform:translateY(8px) scale(1)}
.copy{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;text-align:center;pointer-events:none}
h1{font-size:clamp(2.5rem,8vw,5rem);font-weight:800;letter-spacing:-.06em;margin:0;text-shadow:0 10px 40px rgba(0,0,0,.6)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="grid" id="g"></div><div class="copy"><h1>Shatter frame</h1></div></div>
<script>const g=document.getElementById('g');for(let i=0;i<12;i++){const cell=document.createElement('div');cell.className='cell';const v=document.createElement('video');v.src='../stock/media/16-9 Aspect Ratio(video).mp4';v.autoplay=v.muted=v.loop=true;v.playsInline=true;const col=i%4,row=Math.floor(i/4);v.style.left=(-col*100)+'%';v.style.top=(-row*100)+'%';cell.appendChild(v);g.appendChild(cell)}</script>
</body>
</html>
