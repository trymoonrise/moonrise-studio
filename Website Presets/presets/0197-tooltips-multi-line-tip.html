<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0197
    slug: tooltips-multi-line-tip
    title: Multi Line Tooltip
    category: tooltips
    tags: tooltips, multiline
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0197 — Multi Line Tooltip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fafafa;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .row{display:flex;align-items:center;gap:1rem}
    .label{font-family:"Syne",system-ui,sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:-.03em}
    .wrap{position:relative}
    .icon{width:32px;height:32px;border:1.5px solid #111;background:#fff;color:#111;display:grid;place-items:center;cursor:help;font-weight:700;font-size:.85rem;transition:background .25s,color .25s}
    .wrap:hover .icon,.wrap:focus-within .icon{background:#111;color:#fff}
    .tip{position:absolute;left:calc(100% + 14px);top:50%;translate:6px -50%;width:200px;padding:12px 14px;background:#111;color:#fff;font-size:.8rem;line-height:1.5;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .3s,translate .3s cubic-bezier(.22,1,.36,1),visibility .3s}
    .tip::before{content:'';position:absolute;right:100%;top:50%;translate:0 -50%;border:6px solid transparent;border-right-color:#111}
    .tip strong{display:block;font-family:"Syne",system-ui,sans-serif;font-size:.84rem;font-weight:700;margin-bottom:.35rem;letter-spacing:-.02em}
    .wrap:hover .tip,.wrap:focus-within .tip{opacity:1;visibility:visible;translate:0 -50%}
  </style>
</head>
<body>
<div class="row"><span class="label">API key</span><div class="wrap"><button class="icon" type="button" aria-label="More info">?</button><div class="tip" role="tooltip"><strong>Keep this secret</strong>Used to authenticate requests. Rotate every 90 days.</div></div></div>

</body>
</html>
