<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1438
    slug: images-tilt-depth
    title: Image Tilt Depth
    category: images
    tags: images, tilt, depth
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1438 - Image Tilt Depth</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #0c0d10;
      font-family: 'Instrument Sans', sans-serif;
    }

    .scene {
      position: relative;
      width: min(560px, 90vw);
      aspect-ratio: 16 / 10;
    }

    /* Soft blurred echo behind */
    .echo {
      position: absolute;
      inset: -8%;
      background: url('../stock/media/16-9 Aspect Ratio(image).png') center / cover;
      filter: blur(28px) saturate(1.2);
      opacity: 0.45;
      animation: echo-drift 14s ease-in-out infinite alternate;
      z-index: 0;
    }

    .window {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      isolation: isolate;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    .photo {
      position: absolute;
      inset: -18%;
      background: url('../stock/media/16-9 Aspect Ratio(image).png') center / cover;
      animation: ken 18s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* Moving focus aperture */
    .aperture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      animation: focus-wander 12s ease-in-out infinite;
    }

    /* Light sweep */
    .sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 30%,
        rgba(255, 255, 255, 0.14) 48%,
        transparent 62%
      );
      background-size: 220% 100%;
      animation: sweep 7s ease-in-out infinite;
      mix-blend-mode: soft-light;
      pointer-events: none;
      z-index: 3;
    }

    .meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2.75rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 0.15rem;
      color: rgba(255, 255, 255, 0.38);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @keyframes ken {
      from { transform: scale(1.05) translate(-2%, 1%); }
      to { transform: scale(1.18) translate(3%, -2%); }
    }

    @keyframes echo-drift {
      from { transform: scale(1.05) translate(-2%, 0); }
      to { transform: scale(1.12) translate(2%, 2%); }
    }

    @keyframes focus-wander {
      0%, 100% {
        background: radial-gradient(circle 42% at 32% 38%, transparent 0%, transparent 38%, rgba(8, 9, 12, 0.55) 68%, rgba(8, 9, 12, 0.82) 100%);
      }
      33% {
        background: radial-gradient(circle 42% at 68% 42%, transparent 0%, transparent 38%, rgba(8, 9, 12, 0.55) 68%, rgba(8, 9, 12, 0.82) 100%);
      }
      66% {
        background: radial-gradient(circle 42% at 48% 62%, transparent 0%, transparent 38%, rgba(8, 9, 12, 0.55) 68%, rgba(8, 9, 12, 0.82) 100%);
      }
    }

    @keyframes sweep {
      0%, 100% { background-position: 140% 0; opacity: 0.3; }
      50% { background-position: -40% 0; opacity: 0.7; }
    }

    @media (prefers-reduced-motion: reduce) {
      .photo, .echo, .aperture, .sweep { animation: none !important; }
      .photo { transform: scale(1.08); }
      .aperture {
        background: radial-gradient(circle 42% at 45% 42%, transparent 0%, transparent 38%, rgba(8, 9, 12, 0.55) 68%, rgba(8, 9, 12, 0.82) 100%);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="echo" aria-hidden="true"></div>
    <div class="window">
      <div class="photo" role="img" aria-label="Depth window image"></div>
      <div class="aperture" aria-hidden="true"></div>
      <div class="sweep" aria-hidden="true"></div>
    </div>
    <div class="meta">
      <span>Depth window</span>
      <span>01</span>
    </div>
  </div>
</body>
</html>
