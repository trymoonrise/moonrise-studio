<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0362
    slug: experimental-cursor-magnetic
    title: Magnetic Cursor
    category: experimental
    tags: experimental, magnetic
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0362 — Magnetic Cursor</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;cursor:none}.cursor{position:fixed;width:20px;height:20px;border:2px solid #6c8cff;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:99;transition:width .2s,height .2s}.btn{padding:16px 40px;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:12px;font-size:1rem;transition:transform .1s}
  </style>
</head>
<body>
<div class="cursor" id="c"></div><button class="btn" id="b">Magnetic</button>
<script>const c=document.getElementById('c');addEventListener('mousemove',e=>{c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';});const b=document.getElementById('b');b.onmouseenter=()=>{c.style.width='48px';c.style.height='48px';};b.onmouseleave=()=>{c.style.width='20px';c.style.height='20px';};</script>
</body>
</html>
