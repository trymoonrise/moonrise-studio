  <meta charset="UTF-8">

  <title>1177 — Gradient Stats 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#060d14;color:#d8eeff}.display{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;color:#38bdf8;font-variant-numeric:tabular-nums}.lbl{color:#6898b8;margin-top:.5rem;font-size:.9rem}.btn{margin-top:1.5rem;padding:10px 24px;border:none;border-radius:8px;background:#38bdf8;color:#060d14;cursor:pointer;font-weight:600}
  </style>
</head>
<body>
<div style="text-align:center"><div class="display" id="d">00:00</div><div class="lbl">Gradient Stats 790</div><button class="btn" id="b">Run</button></div>
<script>let t=0,iv;document.getElementById('b').onclick=()=>{if(iv){clearInterval(iv);iv=null;document.getElementById('b').textContent='Run';return;}document.getElementById('b').textContent='Stop';iv=setInterval(()=>{t++;const m=String(Math.floor(t/60)).padStart(2,'0'),s=String(t%60).padStart(2,'0');document.getElementById('d').textContent=m+':'+s;},1000);};</script>
</body>
