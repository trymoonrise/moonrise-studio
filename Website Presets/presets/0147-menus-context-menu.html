<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0147
    slug: menus-context-menu
    title: Context Menu
    category: menus
    tags: menus, context
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0147 - Context Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#eee}.area{width:300px;height:200px;background:#fff;border-radius:12px;display:grid;place-items:center;color:#888;border:2px dashed #ddd}.menu{position:fixed;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px 0;display:none;min-width:160px;z-index:10}.menu.show{display:block}.menu div{padding:8px 16px;font-size:.85rem;cursor:pointer}.menu div:hover{background:#f5f5f5}
  </style>
</head>
<body>
<div class="area" id="a">Right click here</div><div class="menu" id="m"><div>Copy</div><div>Paste</div><div>Delete</div></div>
<script>const a=document.getElementById('a'),m=document.getElementById('m');a.oncontextmenu=e=>{e.preventDefault();m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.classList.add('show');};document.onclick=()=>m.classList.remove('show');</script>
</body>
</html>
