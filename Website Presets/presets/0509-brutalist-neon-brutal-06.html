<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0509
    slug: brutalist-neon-brutal-06
    title: Neon Brutal 06
    category: brutalist
    tags: brutalist, neon
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0509 — Neon Brutal 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;overflow:hidden;font-family:'IBM Plex Mono',monospace;padding:2rem}
    .board{position:relative;width:min(520px,92vw);border:8px solid #fff;background:#111;padding:2rem 1.5rem;box-shadow:0 0 0 8px #000,0 0 60px #39ff14,0 0 120px #ff00ea}
    .board::before{content:"";position:absolute;inset:12px;border:3px dashed #39ff14;pointer-events:none;animation:dash 20s linear infinite}
    h1{position:relative;margin:0;font-family:'Archivo Black',sans-serif;font-size:clamp(2.6rem,11vw,5.2rem);line-height:.85;text-transform:uppercase;letter-spacing:-.04em;color:#39ff14;text-shadow:0 0 8px #39ff14,0 0 24px #39ff14,4px 4px 0 #ff00ea;animation:flicker 3.5s infinite}
    .row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.5rem}
    .chip{padding:.45rem .7rem;border:3px solid #ff00ea;color:#ff00ea;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;box-shadow:4px 4px 0 #39ff14;animation:pulse-chip 1.6s ease-in-out infinite}
    .chip:nth-child(2){animation-delay:.2s}.chip:nth-child(3){animation-delay:.4s}
    .scan{position:absolute;left:0;right:0;height:18%;background:linear-gradient(transparent,rgba(57,255,20,.15),transparent);animation:scan 2.8s linear infinite;pointer-events:none}
    @keyframes flicker{0%,19%,21%,23%,100%{opacity:1}20%,22%{opacity:.55}}
    @keyframes scan{from{top:-20%}to{top:110%}}
    @keyframes dash{to{stroke-dashoffset:200}}
    @keyframes pulse-chip{50%{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #39ff14}}
    @media(prefers-reduced-motion:reduce){h1,.chip,.scan,.board::before{animation:none}}
  </style>
</head>
<body>
  <div class="board">
    <div class="scan" aria-hidden="true"></div>
    <h1>NEON<br>BRUTAL</h1>
    <div class="row">
      <span class="chip">Toxic contrast</span>
      <span class="chip">Zero blur</span>
      <span class="chip">Max voltage</span>
    </div>
  </div>
</body>
</html>
