<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1680
    slug: scroll-video-ken-burns
    title: Scroll Ken Burns Video
    category: scroll-animations
    tags: scroll, video, ken-burns, zoom
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1680 - Scroll Ken Burns Video</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;min-height:300vh;background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    .stage{position:sticky;top:0;height:100vh;overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(var(--s,1)) translate(var(--x,0%),var(--y,0%))}
    .grain{position:absolute;inset:0;opacity:.06;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    .copy{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:2rem;opacity:var(--o,0)}
    h1{font-size:clamp(2.2rem,6vw,3.6rem);font-weight:900;letter-spacing:-.03em}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="stage"><video src="../stock/media/heroes/mountains-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video><div class="grain" aria-hidden="true"></div><div class="copy"><h1>Drift &amp; scale</h1></div></div>
<script>function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function lerp(a,b,t){return a+(b-a)*t}function prog(track){const r=track.getBoundingClientRect();const h=r.height-innerHeight;return h>0?ease(Math.min(1,Math.max(0,-r.top/h))):0}function pageProg(){const max=document.documentElement.scrollHeight-innerHeight;return max>0?ease(Math.min(1,scrollY/max)):0};const stage=document.getElementById('stage'),reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function tick(){const p=pageProg();if(reduced)return;stage.style.setProperty('--s',lerp(1,1.22,p).toFixed(3));stage.style.setProperty('--x',lerp(0,-4,p).toFixed(1)+'%');stage.style.setProperty('--y',lerp(0,-6,p).toFixed(1)+'%');stage.style.setProperty('--o',Math.max(0,(p-.35)/.65).toFixed(3))}let raf=false;addEventListener('scroll',()=>{if(raf)return;raf=true;requestAnimationFrame(()=>{raf=false;tick()})},{passive:true});addEventListener('resize',tick,{passive:true});tick();</script>
</body>
</html>
