<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0143
    slug: folder-dropdown-accordion-folders
    title: Accordion Folders
    category: folder-dropdown
    tags: folder-dropdown, accordion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0143 - Accordion Folders</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#1a1a2e 0%,#0d0d0f 62%);padding:2rem;color:#f4f6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.tree{width:min(360px,100%);display:grid;gap:10px}.folder{border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.035);box-shadow:0 18px 45px rgba(0,0,0,.28)}.head{width:100%;padding:14px 16px;border:0;background:rgba(26,26,46,.88);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:1rem;text-align:left;font:inherit}.label{display:flex;align-items:center;gap:.7rem;font-weight:700}.folder-icon{width:20px;height:20px;stroke:#8aa0ff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.chev{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;transition:transform .65s cubic-bezier(.22,.61,.36,1)}.folder.open .chev{transform:rotate(180deg)}.body{height:0;overflow:hidden;background:#0f1018;opacity:.72;transition:height .72s cubic-bezier(.22,.61,.36,1),opacity .72s cubic-bezier(.22,.61,.36,1)}.folder.open .body{opacity:1}.files{padding:8px}.file{display:flex;align-items:center;gap:.65rem;padding:10px 12px;border-radius:10px;color:rgba(244,246,255,.68);font-size:.86rem;transform:translateY(-6px);opacity:0;transition:transform .55s cubic-bezier(.22,.61,.36,1),opacity .55s cubic-bezier(.22,.61,.36,1)}.folder.open .file{transform:none;opacity:1}.folder.open .file:nth-child(1){transition-delay:.12s}.folder.open .file:nth-child(2){transition-delay:.2s}.folder.open .file:nth-child(3){transition-delay:.28s}.file::before{content:"";width:7px;height:7px;border-radius:2px;background:#6c8cff;box-shadow:0 0 12px rgba(108,140,255,.5)}@media(prefers-reduced-motion:reduce){.body,.file,.chev{transition:none}}
  </style>
</head>
<body>
<div class="tree"><div class="folder open"><button class="head" data-h type="button" aria-expanded="true"><span class="label"><svg class="folder-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/></svg>src</span><svg class="chev" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button><div class="body" data-b><div class="files"><div class="file">app.js</div><div class="file">utils.js</div><div class="file">routes.js</div></div></div></div></div>
<script>const folder=document.querySelector('.folder'),head=document.querySelector('[data-h]'),body=document.querySelector('[data-b]');function setHeight(){body.style.height=folder.classList.contains('open')?body.scrollHeight+'px':'0px';}head.addEventListener('click',()=>{const open=folder.classList.toggle('open');head.setAttribute('aria-expanded',String(open));setHeight();});addEventListener('resize',setHeight,{passive:true});setHeight();</script>
</body>
</html>
