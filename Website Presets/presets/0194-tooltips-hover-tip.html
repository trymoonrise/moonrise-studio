<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0194
    slug: tooltips-hover-tip
    title: Hover Tooltip
    category: tooltips
    tags: tooltips, hover
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0194 — Hover Tooltip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f7;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .stage{text-align:center}
    .kicker{margin:0 0 1.75rem;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888}
    .wrap{position:relative;display:inline-block}
    .btn{padding:12px 28px;border:1.5px solid #111;background:#111;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:background .25s,color .25s}
    .btn:hover{background:transparent;color:#111}
    .tip{position:absolute;bottom:calc(100% + 12px);left:50%;translate:-50% 6px;padding:8px 14px;background:#111;color:#fff;font-size:.78rem;font-weight:500;letter-spacing:.01em;white-space:nowrap;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .28s cubic-bezier(.22,1,.36,1),translate .28s cubic-bezier(.22,1,.36,1),visibility .28s}
    .wrap:hover .tip,.wrap:focus-within .tip{opacity:1;visibility:visible;translate:-50% 0}
  </style>
</head>
<body>
<div class="stage"><p class="kicker">Hover tooltip</p><div class="wrap"><button class="btn" type="button">Hover me</button><div class="tip" role="tooltip">Save to drafts</div></div></div>

</body>
</html>
