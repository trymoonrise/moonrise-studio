<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1519
    slug: hero-mouse-cta-glow
    title: Mouse Glow CTA Hero
    category: heroes
    tags: heroes, mouse, cta, glow
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1519 - Mouse Glow CTA Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#0a0a0c;color:#fff;display:grid;place-items:center;text-align:center;padding:2rem;position:relative;overflow:hidden}.bg{position:absolute;inset:0;background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(108,140,255,.2),transparent 50%)}main{position:relative;z-index:1}h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:800;margin-bottom:1rem}p{color:#888;margin-bottom:2rem}.btn{position:relative;padding:16px 40px;border:none;border-radius:99px;background:#6c8cff;color:#fff;font-weight:700;font-size:1rem;overflow:hidden}.btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--bx,50%) var(--by,50%),rgba(255,255,255,.3),transparent 60%);opacity:0;transition:opacity .2s}.btn:hover::before{opacity:1}
  </style>
</head>
<body>
<div class="bg" id="bg"></div><main><h1>Start building</h1><p>Interactive glow follows your cursor across the hero.</p><button class="btn" id="btn">Get started</button></main>
<script>const bg=document.getElementById('bg'),btn=document.getElementById('btn');addEventListener('mousemove',e=>{bg.style.setProperty('--x',e.clientX/innerWidth*100+'%');bg.style.setProperty('--y',e.clientY/innerHeight*100+'%');const r=btn.getBoundingClientRect();btn.style.setProperty('--bx',(e.clientX-r.left)/r.width*100+'%');btn.style.setProperty('--by',(e.clientY-r.top)/r.height*100+'%');});</script>
</body>
</html>
