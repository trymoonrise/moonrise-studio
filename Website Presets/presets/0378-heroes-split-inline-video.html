<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0378
    slug: heroes-split-inline-video
    title: Split Inline Video Hero
    category: heroes
    tags: heroes, landing, video, split
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0378 - Split Inline Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.25rem, 4vw, 2rem);
      background:
        radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.06), transparent 42%),
        #f8fafc;
      color: #111827;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1040px, 100%);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: clamp(2rem, 4vw, 3rem);
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 0.9rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4f46e5;
    }

    h1 {
      font-size: clamp(2rem, 3.8vw, 2.75rem);
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.04em;
      max-width: 11ch;
      margin-bottom: 0.85rem;
    }

    p {
      color: #6b7280;
      font-size: 0.98rem;
      line-height: 1.6;
      max-width: 34ch;
      margin-bottom: 1.5rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.15rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.15rem;
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.14);
      transition: transform 0.2s cubic-bezier(.22, .61, .36, 1);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .link {
      color: #374151;
      font-size: 0.84rem;
      font-weight: 600;
      text-decoration: none;
    }

    .link:hover {
      color: #111827;
    }

    .media video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(17, 24, 39, 0.08);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
      background: #fff;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="copy">
        <span class="eyebrow">Product demo</span>
        <h1>See the product in action</h1>
        <p>A looping demo beside your headline keeps visitors engaged without leaving the hero.</p>
        <div class="actions">
          <button class="btn" type="button">Start building</button>
          <a class="link" href="#">Watch full demo →</a>
        </div>
      </div>

      <div class="media">
        <video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline aria-label="Product demo video"></video>
      </div>
    </section>
  </div>
</body>
</html>
