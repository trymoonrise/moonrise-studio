<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0171
    slug: textareas-char-counter
    title: Character Counter
    category: textareas
    tags: textareas, modern, experimental, exaggerated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0171 — Character Counter</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d12;font-family:Inter,system-ui,sans-serif;overflow:hidden;padding:24px;color:#f7f8fb}
    textarea{font:inherit;border:0;outline:0;resize:none;background:transparent;color:inherit;width:100%}
    button{font:inherit;border:0;cursor:pointer}
    .scene{position:relative;width:min(520px,92vw)}
    .panel{position:relative;padding:26px;border-radius:28px;background:#11151f;border:1px solid rgba(255,255,255,.1);box-shadow:0 28px 80px rgba(0,0,0,.38)}.ring{position:absolute;right:22px;top:22px;width:62px;height:62px;border-radius:50%;background:conic-gradient(#7ee787 var(--p,20%),rgba(255,255,255,.09) 0);display:grid;place-items:center;font:700 13px 'JetBrains Mono';transition:background .2s}.ring::after{content:'';position:absolute;inset:7px;border-radius:inherit;background:#11151f}.ring span{position:relative;z-index:1}.label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#6b7280;margin-bottom:24px}.copy{padding-right:82px;min-height:150px;font-size:24px;line-height:1.2;font-weight:700;letter-spacing:-.045em}.copy::placeholder{color:#303846}.foot{display:flex;justify-content:space-between;gap:12px;margin-top:18px;font:500 12px 'JetBrains Mono';color:#6b7280}.warn{color:#ffb86b!important}.bad{color:#ff6b6b!important}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="scene"><section class="panel" id="panel"><div class="ring" id="ring"><span id="count">0</span></div><p class="label">140 characters</p><textarea class="copy" id="ta" maxlength="140" placeholder="Compress the thought until it punches.">Modern interfaces deserve textareas with pressure.</textarea><div class="foot"><span>Draft note</span><span id="left">140 left</span></div></section></div>
  <script>const ta=document.getElementById('ta'),count=document.getElementById('count'),left=document.getElementById('left'),ring=document.getElementById('ring');function sync(){const n=ta.value.length,p=Math.round(n/140*100);count.textContent=n;left.textContent=140-n+' left';ring.style.setProperty('--p',p+'%');left.className=p>88?'bad':p>70?'warn':'';}ta.addEventListener('input',sync);sync();</script>
</body>
</html>
