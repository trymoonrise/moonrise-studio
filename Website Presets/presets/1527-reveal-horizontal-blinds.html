<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1527 - Horizontal Blinds Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;overflow:hidden}.scene{position:relative;height:100vh;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;display:grid;place-items:center}.scene h1{color:#fff;font-size:3rem;font-weight:800;z-index:2;text-shadow:0 2px 20px rgba(0,0,0,.5)}.blinds{position:absolute;inset:0;display:flex;flex-direction:column;z-index:1}.blind{flex:1;background:#111;transform:scaleY(1);transform-origin:top;animation:blind .8s cubic-bezier(.22,.61,.36,1) forwards}.blind:nth-child(1){animation-delay:0s}.blind:nth-child(2){animation-delay:.08s}.blind:nth-child(3){animation-delay:.16s}.blind:nth-child(4){animation-delay:.24s}.blind:nth-child(5){animation-delay:.32s}.blind:nth-child(6){animation-delay:.4s}@keyframes blind{to{transform:scaleY(0)}}
  </style>
</head>
<body>
<div class="scene"><div class="blinds"><div class="blind"></div><div class="blind"></div><div class="blind"></div><div class="blind"></div><div class="blind"></div><div class="blind"></div></div><h1>Blinds</h1></div>

</body>
</html>
