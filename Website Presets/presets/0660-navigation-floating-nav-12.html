<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0660
    slug: navigation-floating-nav-12
    title: Floating Nav 12
    category: navigation
    tags: navigation, floating
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0660 — Floating Nav 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#e8e6e0,#f7f6f2);font-family:Outfit,sans-serif;display:grid;place-items:center;padding:2rem}
    .float{position:fixed;bottom:2rem;left:50%;translate:-50% 0;display:flex;gap:.15rem;padding:.4rem;background:rgba(255,255,255,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,.06);border-radius:999px;box-shadow:0 16px 40px rgba(0,0,0,.08);animation:rise .8s cubic-bezier(.22,1,.36,1) both}
    .float a{padding:.65rem 1.15rem;border-radius:999px;text-decoration:none;color:#111;font-size:.75rem;font-weight:300;letter-spacing:.1em;text-transform:uppercase;opacity:.4;transition:opacity .3s,background .3s,color .3s}
    .float a.active,.float a:hover{opacity:1}
    .float a.active{background:#111;color:#fff}
    .title{font-family:Syne,sans-serif;font-size:clamp(2.5rem,8vw,4.5rem);font-weight:800;letter-spacing:-.05em;text-align:center;color:#111;line-height:.95}
    @keyframes rise{from{opacity:0;translate:-50% 20px}to{opacity:1;translate:-50% 0}}
    @media(prefers-reduced-motion:reduce){.float{animation:none}}
  </style>
</head>
<body>
  <h1 class="title">Float<br>below</h1>
  <nav class="float" id="float">
    <a class="active" href="#">Home</a>
    <a href="#">Work</a>
    <a href="#">Info</a>
  </nav>
  <script>
    const links=[...document.querySelectorAll('#float a')];
    links.forEach(a=>a.addEventListener('click',e=>{e.preventDefault();links.forEach(l=>l.classList.remove('active'));a.classList.add('active')}));
  </script>
</body>
</html>
