<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0467
    slug: rotate-scroll-text-helix-04
    title: Text Helix 04
    category: rotate-scroll
    tags: rotate-scroll, text
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0467 — Text Helix 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0f172a;color:#38bdf8;font-family:monospace;perspective:800px}.track{height:300vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}.helix{position:relative;width:100%;height:400px;transform-style:preserve-3d}.ch{position:absolute;left:50%;font-size:clamp(2rem,6vw,4rem);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(56,189,248,.5);transform:translateX(-50%) translateY(var(--y,0)) rotateY(var(--ry,0deg)) translateZ(var(--z,0px));opacity:var(--o,.3)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="helix" id="h"><span class="ch" data-i="0">H</span><span class="ch" data-i="1">E</span><span class="ch" data-i="2">L</span><span class="ch" data-i="3">I</span><span class="ch" data-i="4">X</span></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const chs=[...document.querySelectorAll('.ch')];addEventListener('scroll',()=>{const p=prog();chs.forEach((el,i)=>{const ang=p*720+i*72;el.style.setProperty('--y',Math.sin(ang*Math.PI/180)*120+'px');el.style.setProperty('--ry',ang+'deg');el.style.setProperty('--z',Math.cos(ang*Math.PI/180)*80+'px');el.style.setProperty('--o',String(.3+Math.abs(Math.cos(ang*Math.PI/180))*.7));});},{passive:true});</script>
</body>
</html>
