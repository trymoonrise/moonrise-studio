<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1750
    slug: experimental-invert-stamp
    title: Invert Stamp Chaos
    category: experimental
    tags: experimental, invert, stamp, chaos
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1750 — Invert Stamp Chaos</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#fff;color:#000;overflow:hidden;font-family:'Archivo Black',sans-serif;cursor:none}
    body.flip{background:#000;color:#fff;filter:invert(0)}
    body.flip .stamp{border-color:#fff;color:#fff}
    .cursor{position:fixed;width:18px;height:18px;border:2px solid currentColor;border-radius:50%;pointer-events:none;z-index:20;transform:translate(-50%,-50%);mix-blend-mode:difference}
    .field{position:fixed;inset:0}
    .stamp{position:absolute;padding:.4rem .8rem;border:4px solid #000;font-size:clamp(1.2rem,4vw,2.4rem);text-transform:uppercase;letter-spacing:-.02em;transform:rotate(var(--r));opacity:0;animation:stamp-in .25s ease forwards;pointer-events:none}
    .hud{position:fixed;bottom:1rem;left:1rem;right:1rem;display:flex;justify-content:space-between;font-family:monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;z-index:5}
    @keyframes stamp-in{from{opacity:0;transform:rotate(var(--r)) scale(1.4)}to{opacity:1;transform:rotate(var(--r)) scale(1)}}
  </style>
</head>
<body>
  <div class="cursor" id="cur" aria-hidden="true"></div>
  <div class="field" id="field"></div>
  <div class="hud"><span>CLICK TO STAMP</span><span>1750</span><span id="mode">POSITIVE</span></div>
  <script>
    const field=document.getElementById('field');
    const cur=document.getElementById('cur');
    const mode=document.getElementById('mode');
    const words=['VOID','YES','RAW','NOW','MAX','BAD','OK','HIT'];
    let i=0,flipped=false;
    addEventListener('pointermove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
    addEventListener('click',e=>{
      const s=document.createElement('div');
      s.className='stamp';
      s.textContent=words[i++%words.length];
      s.style.left=e.clientX+'px';
      s.style.top=e.clientY+'px';
      s.style.setProperty('--r',((Math.random()-.5)*30).toFixed(1)+'deg');
      s.style.marginLeft='-2rem';
      s.style.marginTop='-1rem';
      field.appendChild(s);
      if(i%5===0){
        flipped=!flipped;
        document.body.classList.toggle('flip',flipped);
        mode.textContent=flipped?'NEGATIVE':'POSITIVE';
      }
    });
  </script>
</body>
</html>
