<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 040
    slug: transparent-scroll-nav
    title: Transparent Scroll Nav
    category: navigation
    tags: scroll, transparent
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>040 — Transparent Scroll Nav</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#0a0a0a;color:#fff;font-family:Outfit,sans-serif}
    nav{position:fixed;inset:0 0 auto;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1.25rem,4vw,3rem);mix-blend-mode:difference;transition:padding .5s cubic-bezier(.22,1,.36,1)}
    nav.scrolled{padding:.85rem clamp(1.25rem,4vw,3rem)}
    .logo{font-family:Syne,sans-serif;font-weight:800;font-size:1rem;letter-spacing:-.03em}
    .links{display:flex;gap:2rem}
    .links a{color:inherit;text-decoration:none;font-size:.8rem;font-weight:300;letter-spacing:.12em;text-transform:uppercase;opacity:.55;transition:opacity .3s}
    .links a:hover{opacity:1}
    .line{position:absolute;left:0;right:0;bottom:0;height:1px;background:#fff;transform:scaleX(0);transform-origin:left;transition:transform .6s cubic-bezier(.22,1,.36,1)}
    nav.scrolled .line{transform:scaleX(1)}
    .hero{height:100vh;display:grid;place-items:center;padding:2rem}
    .hero h1{margin:0;font-family:Syne,sans-serif;font-weight:800;font-size:clamp(3rem,12vw,8rem);letter-spacing:-.06em;line-height:.9;text-align:center}
    .content{min-height:120vh;padding:6rem 2rem;color:rgba(255,255,255,.35);text-align:center;font-weight:300;letter-spacing:.08em}
    @media(prefers-reduced-motion:reduce){nav,.line,.links a{transition:none}}
  </style>
</head>
<body>
  <nav id="nav">
    <div class="logo">VOID</div>
    <div class="links"><a href="#">Work</a><a href="#">Studio</a><a href="#">Contact</a></div>
    <div class="line" aria-hidden="true"></div>
  </nav>
  <section class="hero"><h1>Scroll<br>to solid</h1></section>
  <section class="content">The nav stays invisible until the page moves — then a single hairline appears.</section>
  <script>
    const nav=document.getElementById('nav');
    addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>40),{passive:true});
  </script>
</body>
</html>
