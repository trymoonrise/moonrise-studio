--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0784 — Contact Form 06</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#f8f7f3;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(720px,95vw);display:grid;grid-template-columns:180px 1fr;gap:50px}.aside h1{font:400 48px/1 'Instrument Serif';margin:0}.aside p{font:500 10px/1.6 'DM Mono';text-transform:uppercase;letter-spacing:.12em;color:#777}.form{display:grid;gap:18px}.form input,.form textarea{width:100%;border:0;border-bottom:1px solid #bbb;background:transparent;padding:13px 0;outline:0}.form textarea{min-height:110px;resize:none}.form input:focus,.form textarea:focus{border-color:#111}.form button{justify-self:start;border:1px solid #111;background:transparent;border-radius:999px;padding:12px 20px;transition:.3s}.form button:hover{background:#111;color:#fff}.cursor{width:8px;height:8px;background:#111;border-radius:50%;animation:blink 1.2s infinite}@keyframes blink{50%{opacity:.2}}@media(max-width:620px){.shell{grid-template-columns:1fr;gap:22px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><aside class="aside"><span class="cursor"></span><h1>Start a<br><i>dialogue.</i></h1><p>Projects / ideas / collaborations</p></aside><form class="form"><input placeholder="Name"><input type="email" placeholder="Email"><textarea placeholder="Tell us what is moving"></textarea><button>Send note →</button></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
