<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0906
    slug: avatars-large-avatar-11
    title: Large Avatar 11
    category: avatars
    tags: avatars, large, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0906 - Large Avatar 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0a0a0a;overflow:hidden;font-family:'DM Mono',monospace}
    .stage{min-height:100vh;display:grid;place-items:center;padding:2rem}
    .frame{display:flex;flex-direction:column;align-items:center;gap:1.5rem}
    .av{width:min(200px,48vw);height:min(200px,48vw);border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.3)}
    .av img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.08)}
    .tiny{width:min(320px,85vw);overflow:hidden}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 24s linear infinite;font-size:.55rem;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.35)}
    .cap{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.1rem;color:#f0eee8}
    @keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.track{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame">
      <div class="av"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
      <p class="cap">Large</p>
      <div class="tiny"><div class="track"><span>Scale · Presence · Scale · Presence · </span><span>Scale · Presence · Scale · Presence · </span></div></div>
    </div>
  </div>
</body>
</html>
