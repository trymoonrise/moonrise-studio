<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0407
    slug: cursor-trails-wave-trail-12
    title: Wave Trail 12
    category: cursor-trails
    tags: cursor-trails, wave
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0407 — Wave Trail 12</title>
  <style>
    @import url('../shared/preset-reset.css');

    body{
      margin:0;
      min-height:100vh;
      background:#100c18;
      color:#ede8ff;
      cursor:crosshair;
      overflow:hidden;
    }

    canvas{position:fixed;inset:0;pointer-events:none}

    .hint{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      color:#a78bfa;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      opacity:.38;
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
  <p class="hint" id="hint">Move your cursor</p>
  <canvas id="c" aria-hidden="true"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    const POINTS = 60;
    const pts = [];
    let mx = innerWidth / 2;
    let my = innerHeight / 2;
    let moved = false;
    let time = 0;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    for (let i = 0; i < POINTS; i += 1) pts.push({ x: mx, y: my });

    if (!reduced) {
      addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        if (!moved) {
          moved = true;
          hint.style.opacity = '0';
        }
      }, { passive: true });

      function frame() {
        time += 0.14;

        pts[0].x += (mx - pts[0].x) * 0.4;
        pts[0].y += (my - pts[0].y) * 0.4;
        for (let i = 1; i < pts.length; i += 1) {
          const prev = pts[i - 1];
          const curr = pts[i];
          curr.x += (prev.x - curr.x) * 0.34;
          curr.y += (prev.y - curr.y) * 0.34;
        }

        ctx.fillStyle = 'rgba(16, 12, 24, 0.20)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        for (let layer = 0; layer < 3; layer += 1) {
          ctx.beginPath();
          for (let i = 0; i < pts.length; i += 1) {
            const p = pts[i];
            const t = i / (pts.length - 1);
            const next = pts[Math.min(i + 1, pts.length - 1)];
            const ang = Math.atan2(next.y - p.y, next.x - p.x) + Math.PI / 2;
            const amp = Math.sin(time - i * 0.5 + layer * 1.7) * (14 - t * 12);
            const wx = p.x + Math.cos(ang) * amp;
            const wy = p.y + Math.sin(ang) * amp;
            if (i === 0) ctx.moveTo(wx, wy);
            else ctx.lineTo(wx, wy);
          }
          const alpha = 0.5 - layer * 0.14;
          ctx.strokeStyle = `rgba(167, 139, 250, ${alpha})`;
          ctx.lineWidth = 3 - layer * 0.7;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.shadowBlur = 16;
          ctx.shadowColor = 'rgba(167, 139, 250, 0.7)';
          ctx.stroke();
        }

        ctx.restore();
        requestAnimationFrame(frame);
      }

      frame();
    }
  </script>
</body>
</html>
