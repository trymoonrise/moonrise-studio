<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1205
    slug: countdown-hero-countdown-11
    title: Hero Countdown 11
    category: countdown
    tags: countdown, hero
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1205 - Hero Countdown 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:clamp(1.5rem,4vw,3rem);overflow:hidden;position:relative}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.marq-track{animation:none!important}}
    .brand{font-family:"Syne",system-ui,sans-serif;font-size:clamp(3rem,12vw,7rem);font-weight:800;letter-spacing:-.08em;line-height:.85;text-align:center;margin:0 0 1.5rem}
    .sub{text-align:center;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#555;margin:0 0 2.5rem}
    .nums{display:flex;justify-content:center;gap:clamp(.75rem,3vw,2rem)}
    .n{text-align:center}
    .n .v{display:block;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2rem,7vw,4rem);font-weight:800;letter-spacing:-.06em;font-variant-numeric:tabular-nums}
    .n .l{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#444}
    .marq{position:absolute;bottom:8%;left:0;right:0;overflow:hidden;opacity:.35}
    .marq-track{display:flex;gap:2.5rem;width:max-content;animation:scroll 32s linear infinite;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.2rem,4vw,2rem);font-weight:800;letter-spacing:-.04em;white-space:nowrap}
    @keyframes scroll{to{transform:translateX(-50%)}}
  </style>
</head>
<body>
<div><h1 class="brand">Drop</h1><p class="sub">Hero countdown</p>
    <div class="nums">
      <div class="n"><span class="v" id="d">12</span><span class="l">Days</span></div>
      <div class="n"><span class="v" id="h">08</span><span class="l">Hrs</span></div>
      <div class="n"><span class="v" id="m">45</span><span class="l">Min</span></div>
      <div class="n"><span class="v" id="s">20</span><span class="l">Sec</span></div>
    </div></div>
    <div class="marq" aria-hidden="true"><div class="marq-track"><span>COMING SOON · COMING SOON · COMING SOON · </span><span>COMING SOON · COMING SOON · COMING SOON · </span></div></div>
<script>const end=Date.now()+12*864e5+12*36e5+34*6e4+56e3;const $=id=>document.getElementById(id);function tick(){let t=Math.max(0,end-Date.now());const D=String(Math.floor(t/864e5)).padStart(2,'0'),H=String(Math.floor(t/36e5%24)).padStart(2,'0'),M=String(Math.floor(t/6e4%60)).padStart(2,'0'),S=String(Math.floor(t/1e3%60)).padStart(2,'0');$('d')&&($('d').textContent=D);$('h')&&($('h').textContent=H);$('m')&&($('m').textContent=M);$('s')&&($('s').textContent=S);}tick();setInterval(tick,1000);</script>
</body>
</html>
