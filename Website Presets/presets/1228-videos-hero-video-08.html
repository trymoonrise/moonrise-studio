<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1228
    slug: videos-hero-video-08
    title: Hero Video 08
    category: videos
    tags: videos, hero
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1228 - Hero Video 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Manrope, sans-serif;
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0.15) 40%, rgba(0, 0, 0, 0.72) 100%);
    }

    .copy {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 18ch;
    }

    .kicker {
      margin: 0 0 0.85rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }

    h1 {
      margin: 0;
      font-family: Syne, sans-serif;
      font-size: clamp(2.4rem, 8vw, 4.75rem);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.95;
    }

    .sub {
      margin: 1rem 0 0;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.62);
    }

    @media (prefers-reduced-motion: reduce) {
      .stage video { display: none; }
      .stage {
        background:
          url('../stock/media/16-9 Aspect Ratio(image).png') center / cover;
      }
    }
  </style>
</head>
<body>
  <section class="stage">
    <video
      src="../stock/media/16-9 Aspect Ratio(video).mp4"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    ></video>
    <div class="overlay" aria-hidden="true"></div>
    <div class="copy">
      <p class="kicker">Local hero</p>
      <h1>Full-bleed film</h1>
      <p class="sub">Stock video, no embed</p>
    </div>
  </section>
</body>
</html>
