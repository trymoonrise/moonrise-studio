<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0220
    slug: notifications-push-style
    title: Push Notification Style
    category: notifications
    tags: notifications, push
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0220 — Push Notification Style</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(79, 110, 247, 0.18), transparent 45%),
        radial-gradient(ellipse at 80% 70%, rgba(34, 197, 94, 0.12), transparent 40%),
        #0f1117;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e8eaf0;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-content: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }

    .hint {
      color: #8b93a7;
      font-size: 0.9rem;
    }

    .replay {
      justify-self: center;
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 0.86rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: background 0.2s, transform 0.2s;
    }

    .replay:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-1px);
    }

    .notif {
      position: fixed;
      top: 1.1rem;
      right: 1.1rem;
      width: min(calc(100vw - 2.2rem), 380px);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.75rem;
      align-items: start;
      padding: 0.9rem 0.85rem 0.9rem 0.95rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.8) inset,
        0 18px 50px rgba(0, 0, 0, 0.28);
      color: #111827;
      transform: translateX(calc(100% + 1.5rem)) scale(0.96);
      opacity: 0;
      animation: notif-in 0.58s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
      z-index: 30;
    }

    .notif.is-hidden {
      pointer-events: none;
      animation: notif-out 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes notif-in {
      to {
        transform: none;
        opacity: 1;
      }
    }

    @keyframes notif-out {
      to {
        transform: translateX(calc(100% + 1.5rem)) scale(0.96);
        opacity: 0;
      }
    }

    .app-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(145deg, #4f6ef7, #7c9bff);
      color: #fff;
      box-shadow: 0 8px 18px rgba(79, 110, 247, 0.35);
      flex-shrink: 0;
    }

    .app-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.25;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .copy {
      min-width: 0;
      padding-top: 0.05rem;
    }

    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.2rem;
    }

    .title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #111827;
    }

    .time {
      font-size: 0.72rem;
      font-weight: 600;
      color: #9ca3af;
      white-space: nowrap;
    }

    .msg {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.45;
      color: #4b5563;
    }

    .actions {
      display: flex;
      gap: 0.45rem;
      margin-top: 0.65rem;
    }

    .action {
      padding: 0.38rem 0.7rem;
      border: none;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .action--primary {
      background: #eef2ff;
      color: #4f6ef7;
    }

    .action--primary:hover {
      background: #e0e7ff;
    }

    .action--ghost {
      background: #f3f4f6;
      color: #6b7280;
    }

    .action--ghost:hover {
      background: #e5e7eb;
      color: #374151;
    }

    .close {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .close:hover {
      background: #f3f4f6;
      color: #4b5563;
    }

    .close svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.25;
      fill: none;
      stroke-linecap: round;
    }

    @media (prefers-reduced-motion: reduce) {
      .notif,
      .notif.is-hidden {
        animation: none;
        transform: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="notif" id="notif" role="status" aria-live="polite">
    <div class="app-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="m22 6-10 7L2 6"/></svg>
    </div>
    <div class="copy">
      <div class="meta">
        <strong class="title">Inbox</strong>
        <span class="time">now</span>
      </div>
      <p class="msg">Alex sent you a message: “Design review is ready — want to take a look?”</p>
      <div class="actions">
        <button class="action action--primary" type="button">Reply</button>
        <button class="action action--ghost" id="dismiss" type="button">Dismiss</button>
      </div>
    </div>
    <button class="close" id="close" type="button" aria-label="Close notification">
      <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>

  <div class="stage">
    <p class="hint">Push-style notification in the top-right corner.</p>
    <button class="replay" id="replay" type="button">Show notification</button>
  </div>

  <script>
    const notif = document.getElementById('notif');
    const close = document.getElementById('close');
    const dismiss = document.getElementById('dismiss');
    const replay = document.getElementById('replay');

    function hideNotif() {
      if (notif.classList.contains('is-hidden')) return;
      notif.classList.add('is-hidden');
      replay.textContent = 'Show notification';
    }

    function showNotif() {
      notif.classList.remove('is-hidden');
      notif.style.animation = 'none';
      notif.offsetHeight;
      notif.style.animation = '';
      replay.textContent = 'Show notification';
    }

    close.addEventListener('click', hideNotif);
    dismiss.addEventListener('click', hideNotif);

    replay.addEventListener('click', () => {
      if (notif.classList.contains('is-hidden')) {
        showNotif();
      } else {
        hideNotif();
      }
    });
  </script>
</body>
</html>
