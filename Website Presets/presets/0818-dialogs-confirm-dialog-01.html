<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0818
    slug: dialogs-confirm-dialog-01
    title: Destructive Confirm Dialog
    category: dialogs
    tags: dialogs, confirm
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0818 — Destructive Confirm Dialog</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    .open-btn {
      padding: 0.75rem 1.25rem;
      border: 1px solid #f87171;
      border-radius: 8px;
      background: #f8717112;
      color: #f87171;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s, transform 0.2s;
    }

    .open-btn:hover { background: #f8717122; transform: translateY(-2px); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
      padding: 1rem;
    }

    .overlay.open { opacity: 1; pointer-events: auto; }

    .dialog {
      width: min(380px, 94vw);
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1.5rem;
      transform: scale(0.9) translateY(12px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.open .dialog {
      transform: scale(1) translateY(0);
      animation: dialogShake 0.5s ease 0.1s;
    }

    @keyframes dialogShake {
      0%, 100% { transform: scale(1) translateY(0); }
      20% { transform: scale(1) translateX(-3px); }
      40% { transform: scale(1) translateX(3px); }
      60% { transform: scale(1) translateX(-2px); }
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f8717118;
      display: grid;
      place-items: center;
      margin-bottom: 1rem;
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 #f8717133; }
      50% { box-shadow: 0 0 0 8px #f8717100; }
    }

    .dialog h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .dialog p { font-size: 0.9rem; color: #94a3b8; line-height: 1.55; margin-bottom: 1.25rem; }

    .actions { display: flex; gap: 0.75rem; }

    .actions button {
      flex: 1;
      padding: 0.7rem;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      transition: transform 0.2s;
    }

    .actions button:hover { transform: translateY(-1px); }

    .cancel { background: #1e293b; color: #cbd5e1; }
    .confirm { background: #f87171; color: #080a0e; }

    @media (prefers-reduced-motion: reduce) {
      .overlay.open .dialog { animation: none; }
      .icon-wrap { animation: none; }
    }
  </style>
</head>
<body>
  <button type="button" class="open-btn" id="open">Delete project</button>

  <div class="overlay" id="overlay" hidden role="presentation">
    <div class="dialog" role="alertdialog" aria-labelledby="title" aria-describedby="desc">
      <div class="icon-wrap">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h2 id="title">Delete this project?</h2>
      <p id="desc">All deployments, environment variables, and logs will be permanently removed. This action cannot be undone.</p>
      <div class="actions">
        <button type="button" class="cancel" id="cancel">Cancel</button>
        <button type="button" class="confirm" id="confirm">Delete forever</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const open = () => { overlay.hidden = false; requestAnimationFrame(() => overlay.classList.add('open')); };
    const close = () => { overlay.classList.remove('open'); setTimeout(() => { overlay.hidden = true; }, 300); };

    document.getElementById('open').onclick = open;
    document.getElementById('cancel').onclick = close;
    document.getElementById('confirm').onclick = close;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  </script>
</body>
</html>
