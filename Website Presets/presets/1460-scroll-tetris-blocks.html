<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1460
    slug: scroll-tetris-blocks
    title: Tetris Block Stack
    category: scroll-stack
    tags: scroll, stack, blocks
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1460 — Tetris Block Stack</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0f0f1a;color:#fff}.wrap{padding:30vh 2rem 60vh;max-width:400px;margin:0 auto}.block{position:sticky;top:calc(15vh + var(--i)*14px);height:64px;margin-bottom:8px;border-radius:8px;background:var(--c);display:flex;align-items:center;padding:0 1.25rem;font-weight:700;font-family:monospace;box-shadow:0 4px 0 rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2)}.block:nth-child(1){--i:0;--c:#6c8cff}.block:nth-child(2){--i:1;--c:#ff6cb0;width:85%}.block:nth-child(3){--i:2;--c:#6cffb8;color:#111;width:70%}.block:nth-child(4){--i:3;--c:#f59e0b;color:#111}.block:nth-child(5){--i:4;--c:#764ba2;width:90%}.block:nth-child(6){--i:5;--c:#ec4899}
  </style>
</head>
<body>
<div class="wrap"><div class="block">LINE</div><div class="block">CLEAR</div><div class="block">STACK</div><div class="block">TETRIS</div><div class="block">SCROLL</div><div class="block">WIN</div></div>

</body>
</html>
