<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1260
    slug: carousels-peek-carousel-13
    title: Peek Carousel 13
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1260 — Peek Carousel 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#ecfdf5;font-family:'DM Sans',system-ui,sans-serif;color:#111;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(640px,96vw)}.stage{overflow:hidden;padding:20px 0}.track{display:flex;gap:16px;transition:transform .75s cubic-bezier(.22,1,.36,1);padding:0 calc(50% - 120px)}.card{flex:0 0 240px;height:300px;border-radius:26px;overflow:hidden;background:#fff;box-shadow:0 18px 40px rgba(16,100,70,.12);transform:scale(.88);opacity:.5;transition:transform .75s cubic-bezier(.22,1,.36,1),opacity .75s}.card.on{transform:scale(1);opacity:1}.card img{width:100%;height:100%;object-fit:cover}.nav{display:flex;justify-content:center;gap:12px;margin-top:8px}.nav button{width:48px;height:48px;border-radius:50%;background:#065f46;color:#fff;font-size:16px;transition:transform .25s}.nav button:hover{transform:scale(1.08)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><div class="track" id="track">
<div class="card on"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(50deg)"></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(120deg)"></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(200deg)"></div>
<div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(280deg)"></div>
</div></div><div class="nav"><button id="prev">←</button><button id="next">→</button></div></div>
<script>
const track=document.getElementById('track'),cards=[...track.children];let i=0;function go(n){i=Math.max(0,Math.min(cards.length-1,n));track.style.transform='translateX('+(-i*256)+'px)';cards.forEach((c,k)=>c.classList.toggle('on',k===i));}document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('next').onclick=()=>go(i+1);go(0);
</script>
</body>
</html>
