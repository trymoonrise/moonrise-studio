<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1840
    slug: hero-video-cursor-spotlight
    title: Cursor Spotlight Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1840 - Cursor Spotlight Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden;cursor:none}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.35)}
.reveal{position:absolute;inset:0;overflow:hidden;clip-path:circle(0 at 50% 50%);transition:clip-path .08s linear}
.reveal video{filter:none}
.copy{position:relative;z-index:3;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem;pointer-events:none}
h1{font-size:clamp(3rem,12vw,8rem);font-weight:800;letter-spacing:-.08em;margin:0;mix-blend-mode:difference}
.hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font:500 .65rem 'DM Mono',monospace;letter-spacing:.28em;text-transform:uppercase;opacity:.45;z-index:4}
.cursor{position:fixed;width:22px;height:22px;border:1.5px solid #fff;border-radius:50%;pointer-events:none;z-index:10;transform:translate(-50%,-50%)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="reveal" id="r"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="copy"><h1>LOOK</h1></div><p class="hint">Move to open the lens</p></div><div class="cursor" id="c"></div>
<script>const s=document.getElementById('s'),r=document.getElementById('r'),c=document.getElementById('c');s.onmousemove=e=>{const x=(e.clientX/innerWidth)*100,y=(e.clientY/innerHeight)*100;r.style.clipPath='circle(22vmax at '+x+'% '+y+'%)';c.style.left=e.clientX+'px';c.style.top=e.clientY+'px'};s.onmouseleave=()=>r.style.clipPath='circle(0 at 50% 50%)';</script>
</body>
</html>
