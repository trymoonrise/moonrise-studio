<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1760
    slug: staggered-grid-circular-crop
    title: Circular Crop Grid
    category: animation
    tags: grid, stagger, circles, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1760 — Circular Crop Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#101411;color:#edf7ee;font-family:Inter,system-ui,sans-serif;padding:2rem;display:grid;place-items:center}.wrap{width:min(980px,100%)}h1{margin:0 0 1.5rem;font-size:clamp(2.4rem,7vw,5rem);letter-spacing:-.08em}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;align-items:center}.dot{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 25%,#fff,var(--c) 35%,#172018 100%);position:relative;opacity:0;transform:scale(.2) translateY(40px);animation:bloom .75s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*80ms);box-shadow:0 18px 50px color-mix(in srgb,var(--c),transparent 75%)}.dot.big{grid-column:span 2;grid-row:span 2}.dot:after{content:attr(data-label);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-weight:800;letter-spacing:-.05em;font-size:clamp(1rem,3vw,2.2rem);color:#fff}.dot:hover{border-radius:26%;transition:border-radius .35s ease}@keyframes bloom{to{opacity:1;transform:none}}@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}.dot.big{grid-column:span 2;grid-row:span 1}}@media(prefers-reduced-motion:reduce){.dot{opacity:1;transform:none;animation:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Circular crops</h1>
    <section class="grid">
      <div class="dot big" data-label="01" style="--i:1;--c:#7ee0c3"></div>
      <div class="dot" data-label="02" style="--i:2;--c:#ffad4d"></div>
      <div class="dot" data-label="03" style="--i:3;--c:#6c8cff"></div>
      <div class="dot" data-label="04" style="--i:4;--c:#ff6bcb"></div>
      <div class="dot" data-label="05" style="--i:5;--c:#b4ff6b"></div>
      <div class="dot big" data-label="06" style="--i:6;--c:#e9e0ce"></div>
    </section>
  </main>
</body>
</html>
