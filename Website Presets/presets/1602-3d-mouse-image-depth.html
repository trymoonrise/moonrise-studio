<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1602
    slug: 3d-mouse-image-depth
    title: 3D Image Mouse Depth
    category: 3d-mouse
    tags: 3d, mouse, image, depth
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1602 - 3D Image Mouse Depth</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0d14;perspective:1100px;font-family:Outfit,sans-serif;padding:2rem}
    .frame{width:min(360px,90vw);height:440px;position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));border-radius:22px}
    .frame::before{content:"";position:absolute;inset:-16px;border-radius:30px;border:1px solid rgba(255,255,255,.1);transform:translateZ(-40px);box-shadow:0 40px 80px rgba(0,0,0,.5)}
    .img{position:absolute;inset:0;border-radius:20px;overflow:hidden;transform:translateZ(20px);border:1px solid rgba(255,255,255,.14)}
    .img i{position:absolute;inset:-8%;background:linear-gradient(145deg,#6c8cff,#ff6bcb 50%,#ffd16c);transform:translate(var(--px,0),var(--py,0));}
    .img::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,40%),rgba(255,255,255,.35),transparent 48%);mix-blend-mode:soft-light}
    .cap{position:absolute;left:1.2rem;right:1.2rem;bottom:1.2rem;color:#fff;transform:translateZ(60px);z-index:2}
    .cap h3{margin:0;font-family:Syne,sans-serif;font-size:1.5rem}
    .cap p{margin:.3rem 0 0;font-size:.85rem;opacity:.8}
  </style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="img"><i></i></div>
    <div class="cap"><h3>Depth field</h3><p>Parallax image slides under a tilting frame.</p></div>
  </div>
  <script>
    const f=document.getElementById('frame');
    let rx=0,ry=0,trx=0,try_=0,px=0,py=0,tpx=0,tpy=0,mx=50,my=40,cmx=50,cmy=40;
    f.addEventListener('pointermove',e=>{
      const r=f.getBoundingClientRect();const x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;
      try_=(x-.5)*24;trx=(.5-y)*18;tpx=(x-.5)*-10;tpy=(y-.5)*-8;mx=x*100;my=y*100;
    });
    f.addEventListener('pointerleave',()=>{trx=0;try_=0;tpx=0;tpy=0});
    (function loop(){rx+=(trx-rx)*.12;ry+=(try_-ry)*.12;px+=(tpx-px)*.1;py+=(tpy-py)*.1;cmx+=(mx-cmx)*.1;cmy+=(my-cmy)*.1;
      f.style.setProperty('--rx',rx+'deg');f.style.setProperty('--ry',ry+'deg');
      f.style.setProperty('--px',px+'%');f.style.setProperty('--py',py+'%');
      f.style.setProperty('--mx',cmx+'%');f.style.setProperty('--my',cmy+'%');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
