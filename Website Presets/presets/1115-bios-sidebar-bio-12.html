<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1115
    slug: bios-sidebar-bio-12
    title: Sidebar Bio 12
    category: bios
    tags: bios, sidebar, experimental, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1115 — Sidebar Bio 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:stretch;background:#ebe8e1;font-family:'DM Sans',sans-serif;overflow:hidden}
    .rail{position:relative;width:min(280px,78vw);margin:auto 0 auto 0;min-height:100vh;background:#16140f;color:#f5f2ea;padding:2.5rem 1.75rem;display:flex;flex-direction:column;justify-content:center;gap:1.25rem;animation:slide .8s cubic-bezier(.22,1,.36,1) both}
    .shapes{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .shapes span{position:absolute;background:rgba(245,242,234,.06);animation:drift 12s ease-in-out infinite}
    .shapes span:nth-child(1){width:80px;height:80px;border-radius:50%;top:8%;right:-20px}
    .shapes span:nth-child(2){width:40px;height:40px;top:35%;left:-10px;transform:rotate(45deg);animation-delay:1s}
    .shapes span:nth-child(3){width:60px;height:60px;bottom:12%;right:10%;clip-path:polygon(50% 0,100% 100%,0 100%);animation-delay:2s}
    .avatar{position:relative;z-index:1;width:64px;height:64px;background:#f5f2ea;color:#16140f;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:700;clip-path:polygon(20% 0,100% 0,80% 100%,0 100%);animation:nudge 5s ease-in-out infinite}
    h1{position:relative;z-index:1;margin:0;font-family:Syne,sans-serif;font-size:1.35rem;letter-spacing:-.02em}
    .role{position:relative;z-index:1;margin:0;font-size:.65rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(245,242,234,.45)}
    p{position:relative;z-index:1;margin:0;font-size:.88rem;line-height:1.5;color:rgba(245,242,234,.65)}
    .rule{position:relative;z-index:1;width:40px;height:2px;background:#f5f2ea;animation:grow 1s cubic-bezier(.22,1,.36,1) .3s both;transform-origin:left}
    @keyframes slide{from{opacity:0;transform:translateX(-40px)}}
    @keyframes drift{50%{transform:translate(8px,10px)}}
    @keyframes nudge{50%{transform:translateX(4px)}}
    @keyframes grow{from{transform:scaleX(0)}}
    @media (prefers-reduced-motion:reduce){.rail,.shapes span,.avatar,.rule{animation:none}}
  </style>
</head>
<body>
  <aside class="rail">
    <div class="shapes" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="avatar">DH</div>
    <div class="rule" aria-hidden="true"></div>
    <h1>Dana Holt</h1>
    <p class="role">Editor</p>
    <p>Cuts copy until only the necessary remains.</p>
  </aside>
</body>
</html>
