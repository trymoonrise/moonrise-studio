<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1021
    slug: announcements-countdown-banner-09
    title: Countdown Banner 09
    category: announcements
    tags: announcements, countdown
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1021 - Countdown Banner 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d14;font-family:Manrope,sans-serif;color:#fff}
    .wrap{
      position:relative;width:min(420px,90vw);padding:2.5rem 1.5rem;
      border-radius:24px;background:#12151f;border:1px solid rgba(255,255,255,.08);
      box-shadow:0 30px 70px rgba(0,0,0,.4);text-align:center;
      animation:enter .9s cubic-bezier(.16,1,.3,1) both;
    }
    .rings{position:absolute;inset:1.25rem;pointer-events:none}
    .ring{
      position:absolute;inset:0;border-radius:50%;border:1px solid rgba(126,224,195,.2);
    }
    .ring--b{inset:12%;border-color:rgba(108,140,255,.18);border-style:dashed}
    .ring--c{inset:24%;border-color:rgba(255,107,157,.15)}
    .core{position:relative;z-index:2}
    .core .label{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45)}
    .core .time{margin:.4rem 0 0;font-family:Syne,sans-serif;font-size:clamp(2.2rem,8vw,3.4rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
    @keyframes enter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.wrap{animation:none}}
  </style>
</head>
<body>
  <div class="wrap" role="timer" aria-live="polite">
    <div class="rings" aria-hidden="true">
      <div class="ring ring--a"></div>
      <div class="ring ring--b"></div>
      <div class="ring ring--c"></div>
    </div>
    <div class="core">
      <div class="label">Doors open in</div>
      <div class="time" id="t">00:00:00</div>
    </div>
  </div>
  <script>
    const end=Date.now()+1000*60*60*4+1000*60*18+45000;
    const el=document.getElementById('t');
    function pad(n){return String(n).padStart(2,'0')}
    function tick(){
      let left=Math.max(0,end-Date.now());
      const h=Math.floor(left/3600000);left-=h*3600000;
      const m=Math.floor(left/60000);left-=m*60000;
      const s=Math.floor(left/1000);
      el.textContent=pad(h)+':'+pad(m)+':'+pad(s);
    }
    tick();setInterval(tick,1000);
  </script>
</body>
</html>
