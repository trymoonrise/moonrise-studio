<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0909
    slug: tags-basic-tags-01
    title: Basic Tags 01
    category: tags
    tags: tags, basic
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0909 — Basic Tags 01</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f7;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .stage{text-align:center}
    .kicker{margin:0 0 1.5rem;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888}
    .tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .tag{padding:8px 14px;border:1.5px solid #111;background:#fff;font-size:.8rem;font-weight:600;letter-spacing:.02em;opacity:0;transform:translateY(10px);animation:up .5s cubic-bezier(.22,1,.36,1) forwards}
    .tag:nth-child(1){animation-delay:.05s}.tag:nth-child(2){animation-delay:.12s}.tag:nth-child(3){animation-delay:.19s}.tag:nth-child(4){animation-delay:.26s}
    .tag:hover{background:#111;color:#fff}
    @keyframes up{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="stage"><p class="kicker">Basic tags</p><div class="tags"><span class="tag">Design</span><span class="tag">Motion</span><span class="tag">Type</span><span class="tag">Grid</span></div></div>

</body>
</html>
