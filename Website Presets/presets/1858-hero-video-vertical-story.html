<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1858
    slug: hero-video-vertical-story
    title: Vertical Story Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1858 — Vertical Story Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#0a0a0a;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{min-height:100vh;display:grid;grid-template-columns:1fr 1.2fr;gap:0}
.panel{display:flex;flex-direction:column;justify-content:center;padding:clamp(1.5rem,4vw,3rem);gap:1rem}
.panel h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.05em;margin:0;line-height:.95}
.stops{display:flex;flex-direction:column;gap:8px}
.stop{text-align:left;padding:1rem 1.1rem;border-radius:16px;border:1px solid rgba(255,255,255,.12);transition:.3s}
.stop.on,.stop:hover{background:#fff;color:#111;transform:translateX(6px)}
.stop b{display:block;font-size:1rem}
.stop span{font:500 .6rem 'DM Mono',monospace;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
.media{position:relative;overflow:hidden;min-height:100vh}
.media video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .5s,filter .5s}
@media(max-width:700px){.stage{grid-template-columns:1fr}.media{min-height:45vh}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><div class="panel"><h1>Story frames</h1><div class="stops">
<button class="stop on" data-t="0"><b>Opening</b><span>00:00</span></button>
<button class="stop" data-t="2"><b>Tension</b><span>00:02</span></button>
<button class="stop" data-t="4"><b>Reveal</b><span>00:04</span></button>
<button class="stop" data-t="6"><b>Close</b><span>00:06</span></button>
</div></div><div class="media"><video id="v" src="../stock/media/9-16 Aspect Ratio(video).mp4" muted playsinline></video></div></div>
<script>const v=document.getElementById('v');document.querySelectorAll('.stop').forEach(s=>s.onclick=()=>{document.querySelectorAll('.stop').forEach(x=>x.classList.remove('on'));s.classList.add('on');v.currentTime=Number(s.dataset.t);v.play();setTimeout(()=>v.pause(),900)});</script>
</body>
</html>
