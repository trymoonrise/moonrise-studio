<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1576
    slug: 3d-text-extrude-layers
    title: 3D Extruded Text
    category: 3d-effects
    tags: 3d, text, extrude
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1576 - 3D Extruded Text</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08090e;perspective:900px;overflow:hidden;font-family:Syne,sans-serif}
    .word{position:relative;transform-style:preserve-3d;transform:rotateX(18deg) rotateY(-18deg);font-size:clamp(3rem,12vw,7rem);font-weight:800;letter-spacing:-.04em;line-height:1;color:#fff}
    .word span{position:absolute;inset:0;display:block;transform:translateZ(calc(var(--z)*1px));color:var(--c);-webkit-text-stroke:1px rgba(255,255,255,.08);user-select:none;pointer-events:none}
    .word .top{position:relative;color:#fff;transform:translateZ(28px);text-shadow:0 0 40px rgba(108,140,255,.45);animation:bob 4s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateZ(28px)}50%{transform:translateZ(40px)}}
    @media(prefers-reduced-motion:reduce){.word .top{animation:none}}
  </style>
</head>
<body>
  <div class="word" id="word" aria-label="DEPTH">
    <span class="top">DEPTH</span>
  </div>
  <script>
    const word=document.getElementById('word');
    const colors=['#1a2250','#24306e','#3147c8','#4a64e0','#6c8cff','#8aa4ff'];
    colors.forEach((c,i)=>{
      const s=document.createElement('span');
      s.textContent='DEPTH';
      s.style.setProperty('--z',i*4);
      s.style.setProperty('--c',c);
      word.insertBefore(s,word.firstChild);
    });
  </script>
</body>
</html>
