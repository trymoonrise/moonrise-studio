<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1110
    slug: bios-social-bio-07
    title: Social Bio 07
    category: bios
    tags: bios, social, experimental, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1110 - Social Bio 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#101218;font-family:'DM Sans',sans-serif;overflow:hidden}
    .constellation{position:relative;width:min(320px,90vw);text-align:center;padding:2rem 1rem;animation:in .8s cubic-bezier(.22,1,.36,1) both}
    .core{width:64px;height:64px;margin:0 auto 1rem;border-radius:50%;background:#f4f5f7;color:#101218;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:700;position:relative;z-index:1}
    h2{margin:0;font-family:Syne,sans-serif;font-size:1.15rem;color:#f4f5f7}
    .role{margin:.3rem 0 1.4rem;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,245,247,.4)}
    .links{display:flex;justify-content:center;gap:.75rem;position:relative}
    .links::before{content:'';position:absolute;top:50%;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(124,156,255,.5),transparent);animation:pulse 2.8s ease-in-out infinite}
    .link{position:relative;z-index:1;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);display:grid;place-items:center;color:#a8b4ff;font-size:.6rem;letter-spacing:.04em;text-decoration:none;background:#101218;transition:transform .35s cubic-bezier(.22,1,.36,1),border-color .3s;animation:float 4s ease-in-out infinite}
    .link:nth-child(2){animation-delay:.4s;border-radius:8px}
    .link:nth-child(3){animation-delay:.8s;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%)}
    .link:hover{transform:translateY(-4px) scale(1.08);border-color:#7c9cff;color:#fff}
    @keyframes float{50%{transform:translateY(-5px)}}
    @keyframes pulse{50%{opacity:.4}}
    @keyframes in{from{opacity:0;transform:scale(.94)}}
    @media (prefers-reduced-motion:reduce){.link,.links::before,.constellation{animation:none}}
  </style>
</head>
<body>
  <div class="constellation">
    <div class="core">QN</div>
    <h2>Quinn Ness</h2>
    <p class="role">Community</p>
    <div class="links">
      <a class="link" href="#" aria-label="Site">web</a>
      <a class="link" href="#" aria-label="Social">ig</a>
      <a class="link" href="#" aria-label="Mail">@</a>
    </div>
  </div>
</body>
</html>
