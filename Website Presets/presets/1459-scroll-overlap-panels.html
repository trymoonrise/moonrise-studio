  <meta charset="UTF-8">

  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#eee}.panel{min-height:100vh;display:grid;place-items:center;position:sticky;top:0;font-size:3rem;font-weight:900;color:#fff}.panel:nth-child(1){background:#6c8cff;z-index:1}.panel:nth-child(2){background:#ff6cb0;z-index:2;margin-top:-20vh;min-height:120vh;border-radius:32px 32px 0 0;box-shadow:0 -20px 60px rgba(0,0,0,.15)}.panel:nth-child(3){background:#111;z-index:3;margin-top:-20vh;min-height:120vh;border-radius:32px 32px 0 0}
  </style>
</head>

<div class="panel">Intro</div><div class="panel">Story</div><div class="panel">Finale</div>
