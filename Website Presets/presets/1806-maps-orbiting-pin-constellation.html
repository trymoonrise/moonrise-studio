<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1806
    slug: maps-orbiting-pin-constellation
    title: Orbiting Pin Constellation
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1806 — Orbiting Pin Constellation</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#f4f1ea;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(520px,92vw);text-align:center}
.stage{position:relative;aspect-ratio:1;border-radius:28px;overflow:hidden;border:1px solid rgba(0,0,0,.1);box-shadow:0 28px 70px rgba(40,30,20,.14)}
.orbit{position:absolute;inset:8%;border:1px dashed rgba(0,0,0,.15);border-radius:50%;animation:spin 22s linear infinite;pointer-events:none}
.orbit2{inset:20%;animation-duration:16s;animation-direction:reverse}
.pin{position:absolute;width:16px;height:16px;background:#111;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.orbit .pin:nth-child(1){top:0;left:50%;margin-left:-8px}.orbit .pin:nth-child(2){bottom:10%;right:8%}
.orbit2 .pin:nth-child(1){top:20%;left:4%}.orbit2 .pin:nth-child(2){bottom:0;left:45%}
h1{font-family:'Instrument Serif',serif;font-weight:400;font-style:italic;font-size:1.6rem;margin:1rem 0 .3rem}
p{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.4);margin:0}
@keyframes spin{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe src="https://www.google.com/maps?q=Paris%2C%20France&hl=en&z=12&output=embed" title="Constellation map" loading="lazy"></iframe>
<div class="orbit"><span class="pin"></span><span class="pin"></span></div>
<div class="orbit orbit2"><span class="pin"></span><span class="pin"></span></div>
</div><h1>Orbiting places</h1><p>Constellation overlay</p></div>

</body>
</html>
