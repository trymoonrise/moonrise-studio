<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1592
    slug: 3d-scroll-rotate-showcase
    title: 3D Scroll Rotate Showcase
    category: 3d-effects
    tags: 3d, scroll, rotate
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1592 - 3D Scroll Rotate Showcase</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#06070c;color:#fff;font-family:Outfit,sans-serif}
    .pin{height:420vh}
    .stage{position:sticky;top:0;height:100vh;display:grid;place-items:center;perspective:1400px;overflow:hidden}
    .orbit{position:relative;width:min(280px,55vw);height:min(360px,70vw);transform-style:preserve-3d;will-change:transform}
    .card{position:absolute;inset:0;border-radius:22px;background:linear-gradient(145deg,var(--a),var(--b));display:grid;place-items:end start;padding:1.4rem;box-shadow:0 30px 80px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.1);backface-visibility:hidden;transform:rotateY(calc(var(--i)*90deg)) translateZ(220px)}
    .card b{font-family:Syne,sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);letter-spacing:-.05em;line-height:.9}
    .card span{display:block;margin-top:.4rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;opacity:.65}
    .hud{position:absolute;left:1.5rem;bottom:1.5rem;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;opacity:.45;font-family:Syne,sans-serif}
    .ring{position:absolute;width:min(520px,90vw);aspect-ratio:1;border:1px dashed rgba(255,255,255,.08);border-radius:50%;transform:rotateX(70deg);pointer-events:none}
    @media(prefers-reduced-motion:reduce){.orbit{transform:none!important}}
  </style>
</head>
<body>
  <div class="pin">
    <div class="stage">
      <div class="ring" aria-hidden="true"></div>
      <div class="orbit" id="orbit">
        <div class="card" style="--i:0;--a:#ff4d6d;--b:#4a1020"><b>Pulse</b><span>01</span></div>
        <div class="card" style="--i:1;--a:#6c8cff;--b:#1a2a6e"><b>Vector</b><span>02</span></div>
        <div class="card" style="--i:2;--a:#7ee0c3;--b:#14503f"><b>Signal</b><span>03</span></div>
        <div class="card" style="--i:3;--a:#ffd16c;--b:#7a4a10"><b>Orbit</b><span>04</span></div>
      </div>
      <div class="hud" id="hud">Scroll to spin · 00%</div>
    </div>
  </div>
  <script>
    const orbit=document.getElementById('orbit');
    const hud=document.getElementById('hud');
    const pin=document.querySelector('.pin');
    const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    function tick(){
      const r=pin.getBoundingClientRect();
      const total=pin.offsetHeight-innerHeight;
      const p=Math.min(1,Math.max(0,-r.top/total));
      if(!reduced){
        orbit.style.transform=`rotateX(12deg) rotateY(${p*360}deg)`;
      }
      hud.textContent='Scroll to spin · '+Math.round(p*100)+'%';
    }
    tick();
    addEventListener('scroll',tick,{passive:true});
    addEventListener('resize',tick,{passive:true});
  </script>
</body>
</html>
