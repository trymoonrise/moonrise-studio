<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1595
    slug: 3d-hover-lift-grid
    title: 3D Hover Lift Grid
    category: 3d-effects
    tags: 3d, hover, lift, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1595 — 3D Hover Lift Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#07080d;color:#fff;font-family:Outfit,sans-serif;perspective:1100px}
    h1{margin:0 0 1.5rem;font-family:Syne,sans-serif;font-size:clamp(2rem,6vw,3.5rem);letter-spacing:-.06em;text-align:center}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;width:min(720px,100%);transform-style:preserve-3d}
    .cell{position:relative;aspect-ratio:1;border-radius:22px;background:linear-gradient(145deg,var(--a),var(--b));transform-style:preserve-3d;transform:rotateX(12deg) rotateY(-8deg);transition:transform .45s cubic-bezier(.16,1,.3,1),box-shadow .45s ease;box-shadow:0 20px 0 rgba(0,0,0,.35),0 30px 60px rgba(0,0,0,.3);cursor:pointer;overflow:hidden;display:grid;place-items:end start;padding:1rem}
    .cell::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-120%);transition:transform .6s ease}
    .cell::after{content:'';position:absolute;inset:auto 12% -18px 12%;height:18px;background:rgba(0,0,0,.45);filter:blur(10px);border-radius:50%;transform:translateZ(-20px);opacity:.6;transition:opacity .4s,transform .4s}
    .cell b{position:relative;z-index:1;font-family:Syne,sans-serif;font-size:1.3rem;letter-spacing:-.04em}
    .cell:hover{transform:rotateX(0) rotateY(0) translateZ(80px) scale(1.06);box-shadow:0 40px 0 rgba(0,0,0,.2),0 50px 80px rgba(0,0,0,.45);z-index:5}
    .cell:hover::before{transform:translateX(120%)}
    .cell:hover::after{opacity:.9;transform:translateZ(-40px) scale(1.2)}
    .cell:nth-child(1){--a:#ff4d6d;--b:#7a1030}
    .cell:nth-child(2){--a:#6c8cff;--b:#1a2a6e}
    .cell:nth-child(3){--a:#7ee0c3;--b:#14503f}
    .cell:nth-child(4){--a:#ffd16c;--b:#7a4a10}
    .cell:nth-child(5){--a:#c084fc;--b:#4c1d95}
    .cell:nth-child(6){--a:#38bdf8;--b:#0c4a6e}
    .cell:nth-child(7){--a:#f472b6;--b:#831843}
    .cell:nth-child(8){--a:#a3e635;--b:#3f6212}
    .cell:nth-child(9){--a:#fb923c;--b:#7c2d12}
    @media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.cell:nth-child(9){display:none}}
    @media(prefers-reduced-motion:reduce){.cell,.cell::before,.cell::after{transition:none}}
  </style>
</head>
<body>
  <div>
    <h1>Lift field</h1>
    <div class="grid">
      <div class="cell"><b>01</b></div><div class="cell"><b>02</b></div><div class="cell"><b>03</b></div>
      <div class="cell"><b>04</b></div><div class="cell"><b>05</b></div><div class="cell"><b>06</b></div>
      <div class="cell"><b>07</b></div><div class="cell"><b>08</b></div><div class="cell"><b>09</b></div>
    </div>
  </div>
</body>
</html>
