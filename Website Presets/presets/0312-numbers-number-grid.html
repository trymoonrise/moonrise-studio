<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0312
    slug: numbers-number-grid
    title: Number Stats Grid
    category: numbers
    tags: numbers, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0312 — Number Stats Grid</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background:
        radial-gradient(circle at 20% 15%, rgba(108, 140, 255, 0.18), transparent 32%),
        radial-gradient(circle at 85% 80%, rgba(108, 255, 184, 0.16), transparent 34%),
        #0f1117;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 170px));
      gap: 14px;
      width: min(100%, 360px);
      padding: 14px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .cell {
      position: relative;
      min-height: 128px;
      padding: 1.35rem;
      overflow: hidden;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      animation: statIn 0.75s cubic-bezier(.22,.61,.36,1) forwards;
      animation-delay: calc(var(--i) * 0.12s);
    }

    .cell::before {
      content: '';
      position: absolute;
      right: -28px;
      top: -28px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: rgba(108, 140, 255, 0.2);
      filter: blur(1px);
    }

    .cell:nth-child(2)::before,
    .cell:nth-child(3)::before {
      background: rgba(108, 255, 184, 0.18);
    }

    .num {
      position: relative;
      font-size: clamp(2rem, 8vw, 2.55rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .lbl {
      position: relative;
      margin-top: 0.55rem;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aeb7c8;
    }

    @keyframes statIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="grid">
  <div class="cell" style="--i:0"><div class="num">50+</div><div class="lbl">Countries</div></div>
  <div class="cell" style="--i:1"><div class="num">24/7</div><div class="lbl">Support</div></div>
  <div class="cell" style="--i:2"><div class="num">1M+</div><div class="lbl">Downloads</div></div>
  <div class="cell" style="--i:3"><div class="num">4.9</div><div class="lbl">Rating</div></div>
</div>

</body>
</html>
