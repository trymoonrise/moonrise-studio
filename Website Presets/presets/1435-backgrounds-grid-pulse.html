<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1435
    slug: backgrounds-grid-pulse
    title: Grid Pulse Background
    category: backgrounds
    tags: backgrounds, grid, pulse
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1435 — Grid Pulse Background</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#080808;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:40px 40px}
    .pulse{position:absolute;left:50%;top:50%;width:40px;height:40px;margin:-20px;background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%);animation:boom 3.5s ease-out infinite;border-radius:50%}
    .pulse:nth-child(2){animation-delay:1.1s}.pulse:nth-child(3){animation-delay:2.2s}
    @keyframes boom{0%{transform:scale(1);opacity:.8}100%{transform:scale(18);opacity:0}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="grid" aria-hidden="true"></div><div class="pulse" aria-hidden="true"></div><div class="pulse" aria-hidden="true"></div><div class="pulse" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Grid pulse</h1><p class="sub">Shockwaves on a lattice.</p></div>

</body>
</html>
