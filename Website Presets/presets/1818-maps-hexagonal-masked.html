<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1818
    slug: maps-hexagonal-masked
    title: Hexagonal Masked Map
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1818 - Hexagonal Masked Map</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#0f1419;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(460px,90vw);text-align:center}
.hex{aspect-ratio:1/1.1;overflow:hidden;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);border:1px solid rgba(255,255,255,.15);position:relative;box-shadow:0 30px 80px rgba(0,0,0,.45)}
.hex iframe{width:140%;height:140%;margin:-20%;filter:saturate(1.15)}
.outline{position:absolute;inset:-10px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);border:1px solid rgba(94,234,212,.35);pointer-events:none;animation:pulse 3s ease-in-out infinite}
h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:1.8rem;margin:1.1rem 0 .3rem}
p{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;opacity:.4;margin:0}
@keyframes pulse{50%{transform:scale(1.03);opacity:.5}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="hex"><iframe src="https://www.google.com/maps?q=Marrakech%2C%20Morocco&hl=en&z=12&output=embed" title="Hex map" loading="lazy"></iframe><div class="outline"></div></div><h1>Honeycomb city</h1><p>Hex mask</p></div>

</body>
</html>
