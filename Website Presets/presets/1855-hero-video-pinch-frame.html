<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1855
    slug: hero-video-pinch-frame
    title: Pinch Frame Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1855 - Pinch Frame Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;display:grid;place-items:center;overflow:hidden}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.35)}
.frame{position:relative;z-index:2;width:min(70vw,520px);aspect-ratio:16/10;overflow:hidden;border-radius:20px;border:1px solid rgba(255,255,255,.25);box-shadow:0 40px 100px rgba(0,0,0,.5);resize:both;min-width:200px;min-height:120px;max-width:90vw;max-height:70vh;background:#000}
.frame video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:none}
.label{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);z-index:3;font:500 .65rem 'DM Mono',monospace;letter-spacing:.25em;text-transform:uppercase;opacity:.5}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="frame"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><p class="label">Drag corner to resize frame</p></div>

</body>
</html>
