<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1488
    slug: stack-image-scroll-fan
    title: Scroll Image Fan Spread
    category: stack-gallery
    tags: stack, images, scroll, fan
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1488 — Scroll Image Fan Spread</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#111;color:#fff}.scene{height:300vh}.stage{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}.deck{position:relative;width:min(260px,70vw);aspect-ratio:4/5}.card{position:absolute;inset:0;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.5);will-change:transform}.card img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>
<div class="scene"><div class="stage"><div class="deck"><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 1"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 2"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 3"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 4"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 5"></div></div></div></div>
<script>const cards=[...document.querySelectorAll('.card')];const scene=document.querySelector('.scene');function u(){const r=scene.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));cards.forEach((c,i)=>{const o=i-(cards.length-1)/2;const spread=o*110*p;const rot=o*14*p;c.style.transform='translateX('+spread+'px) rotate('+rot+'deg) translateY('+(i*6*(1-p))+'px) scale('+(0.88+i*.03+p*.1)+')';c.style.zIndex=i+1;});}addEventListener('scroll',u,{passive:true});u();</script>
</body>
</html>
