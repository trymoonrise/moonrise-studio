<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1718
    slug: staggered-grid-product-orbit
    title: Product Orbit Grid
    category: animation
    tags: grid, stagger, product, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1718 — Product Orbit Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#f7f7f3;color:#111;padding:2rem;font-family:Inter,system-ui,sans-serif;display:grid;place-items:center}.wrap{width:min(1080px,100%)}h1{margin:0 0 1.5rem;font-size:clamp(2rem,5vw,4.4rem);letter-spacing:-.07em;line-height:.9}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}.product{min-height:220px;border-radius:28px;background:#fff;border:1px solid #e5e5df;padding:1rem;position:relative;overflow:hidden;opacity:0;transform:translateY(32px) scale(.94);animation:pop .7s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*90ms);box-shadow:0 18px 48px rgba(20,20,10,.08)}.product.big{grid-column:span 2;grid-row:span 2}.orb{position:absolute;right:1rem;top:1rem;width:clamp(90px,14vw,160px);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff,var(--c) 35%,#111 120%);box-shadow:inset -18px -24px 40px rgba(0,0,0,.18),0 18px 34px color-mix(in srgb,var(--c),transparent 70%);transform:translateY(20px) rotate(-12deg);animation:orb .9s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*90ms + .2s)}.product h2{position:absolute;left:1rem;bottom:2.6rem;margin:0;font-size:1.2rem;letter-spacing:-.04em}.product p{position:absolute;left:1rem;bottom:1rem;margin:0;color:#777;font-size:.82rem}.product:hover .orb{transform:translateY(-4px) scale(1.06);transition:transform .35s ease}@keyframes pop{to{opacity:1;transform:none}}@keyframes orb{to{transform:none}}@media(max-width:720px){.grid{grid-template-columns:1fr}.product.big{grid-column:auto;grid-row:auto}}@media(prefers-reduced-motion:reduce){.product,.orb{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Objects entering frame.</h1>
    <section class="grid">
      <article class="product big" style="--i:1;--c:#6c8cff"><div class="orb"></div><h2>Studio Light</h2><p>Premium surface animation</p></article>
      <article class="product" style="--i:2;--c:#7ee0c3"><div class="orb"></div><h2>Mint Core</h2><p>Soft arrival</p></article>
      <article class="product" style="--i:3;--c:#ffb86b"><div class="orb"></div><h2>Amber</h2><p>Warm depth</p></article>
      <article class="product" style="--i:4;--c:#ff6bcb"><div class="orb"></div><h2>Pulse</h2><p>Launch ready</p></article>
      <article class="product" style="--i:5;--c:#9d7bff"><div class="orb"></div><h2>Violet</h2><p>Hover lift</p></article>
    </section>
  </main>
</body>
</html>
