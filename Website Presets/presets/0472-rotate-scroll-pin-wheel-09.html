<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0472
    slug: rotate-scroll-pin-wheel-09
    title: Pin Wheel 09
    category: rotate-scroll
    tags: rotate-scroll, pin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0472 - Pin Wheel 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:radial-gradient(circle at 50% 0%,#1e293b,#0f172a);color:#fff;font-family:system-ui}.track{height:300vh}.pin{position:sticky;top:0;height:100vh;display:grid;place-items:center}.wheel{width:min(75vw,440px);aspect-ratio:1;border-radius:50%;position:relative;border:3px solid rgba(148,163,184,.2)}.seg{position:absolute;inset:8%;border-radius:50%;clip-path:polygon(50% 50%,50% 0%,100% 0%,100% 100%,0% 100%,0% 0%,50% 0%);background:conic-gradient(from var(--base,0deg),#6366f1,#ec4899,#f59e0b,#22d3ee,#6366f1);transform:rotate(var(--r,0deg));mask:radial-gradient(circle,transparent 42%,#000 43%)}.hub{position:absolute;inset:35%;border-radius:50%;background:#0f172a;display:grid;place-items:center;font-weight:800;font-size:.85rem;letter-spacing:.1em;border:2px solid rgba(255,255,255,.1)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="pin"><div class="wheel"><div class="seg" id="seg"></div><div class="hub">PIN</div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const seg=document.getElementById('seg');addEventListener('scroll',()=>seg.style.setProperty('--r',prog()*720+'deg'),{passive:true});</script>
</body>
</html>
