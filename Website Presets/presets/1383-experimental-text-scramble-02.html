    body{display:grid;place-items:center;min-height:100vh;background:#1a0a12;color:#ffe8f0}h1{font-size:3rem;font-weight:900;letter-spacing:.05em;color:#ff8c42

<body>
<h1 id="h">Text Scramble</h1>
<script>const h=document.getElementById('h'),orig='Text Scramble 989',chars='!@#$%^&*';let f=0;setInterval(()=>{h.textContent=orig.split('').map((c,i)=>i<f?c:chars[Math.floor(Math.random()*chars.length)]).join('');if(f++>orig.length)f=0;},80);</script>
</body>
