<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0272
    slug: cta-banner-cta
    title: Banner CTA
    category: cta
    tags: cta, banner
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0272 — Banner CTA</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:flex;align-items:center;background:#f5f5f5;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .banner{width:100%;background:#111;color:#fff;padding:1.35rem clamp(1.25rem,4vw,3rem);display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;position:relative;overflow:hidden}
    .line{position:absolute;left:0;top:0;height:2px;width:0;background:#fff;animation:grow 1.2s .2s cubic-bezier(.22,1,.36,1) forwards}
    @keyframes grow{to{width:100%}}
    .text{font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.05rem,2.5vw,1.35rem);font-weight:700;letter-spacing:-.02em;opacity:0;animation:slide .7s .35s cubic-bezier(.22,1,.36,1) forwards}
    @keyframes slide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
    .btn{padding:10px 22px;border:1px solid #fff;background:transparent;color:#fff;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;opacity:0;animation:slide .7s .5s cubic-bezier(.22,1,.36,1) forwards;transition:background .25s,color .25s}
    .btn:hover{background:#fff;color:#111}
  </style>
</head>
<body>
<div class="banner"><span class="line" aria-hidden="true"></span><p class="text">Start building today — free to try</p><button class="btn" type="button">Sign up</button></div>

</body>
</html>
