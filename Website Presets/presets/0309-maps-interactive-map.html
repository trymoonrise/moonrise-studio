<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0309
    slug: maps-interactive-map
    title: Interactive Map Dots
    category: maps
    tags: maps, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0309 - Interactive Map Dots</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;margin:0;padding:2rem;background:#0f1117;color:#f3f4f6;font-family:system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}.embed{position:relative;width:100%;overflow:hidden;background:#0a0a0c}.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block} .embed--16x9{aspect-ratio:16/9} .embed--9x16{aspect-ratio:9/16} .embed--4x5{aspect-ratio:4/5} .map-embed{position:absolute;inset:0;width:100%;height:100%;max-width:none;border:0;display:block}.wrap{width:min(100%,520px)}.head h2{font-size:1.2rem;font-weight:800;margin-bottom:.25rem}.head p{font-size:.82rem;color:#9ca3af;margin-bottom:1rem}.map-stage{position:relative;height:300px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.dot{position:absolute;width:14px;height:14px;background:#6cffb8;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);cursor:pointer;z-index:2}
  </style>
</head>
<body>
<div class="wrap"><header class="head"><h2>Interactive map</h2><p>Click a dot to refocus the embedded map.</p></header><div class="map-stage"><iframe class="map-embed" src="https://www.google.com/maps?q=United%20States&hl=en&z=4&output=embed" title="Interactive map" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe><button type="button" class="dot" style="top:42%;left:82%" data-q="New York, NY" data-z="10" aria-label="New York"></button><button type="button" class="dot" style="top:45%;left:18%" data-q="San Francisco, CA" data-z="10" aria-label="San Francisco"></button></div></div>
<script>function embedUrl(q,z){return 'https://www.google.com/maps?q='+encodeURIComponent(q)+'&hl=en&z='+z+'&output=embed';}function mapsUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}const map=document.querySelector('.map-embed');document.querySelectorAll('.dot').forEach(d=>d.onclick=()=>{map.src=embedUrl(d.dataset.q,Number(d.dataset.z));});</script>
</body>
</html>
