<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0188
    slug: file-uploads-preview-upload
    title: Preview Upload
    category: file-uploads
    tags: file-uploads, preview
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0188 - Preview Upload</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:2rem}.preview{width:200px;height:200px;border-radius:12px;background:#ddd;display:grid;place-items:center;overflow:hidden;margin-bottom:1rem}.preview img{width:100%;height:100%;object-fit:cover}input{display:none}.btn{padding:8px 20px;background:#111;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem}
  </style>
</head>
<body>
<div class="preview" id="p">No image</div><label><input type="file" accept="image/*" id="f"><button class="btn" onclick="document.getElementById('f').click()">Upload Image</button></label>
<script>document.getElementById('f').onchange=function(){const f=this.files[0];if(f){const r=new FileReader();r.onload=e=>{document.getElementById('p').innerHTML='<img src="'+e.target.result+'">';};r.readAsDataURL(f);}};</script>
</body>
</html>
