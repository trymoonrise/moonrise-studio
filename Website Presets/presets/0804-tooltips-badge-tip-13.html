<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0804
    slug: tooltips-badge-tip-13
    title: Badge Tip 13
    category: tooltips
    tags: tooltips, badge
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0804 - Badge Tip 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f5f5;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .item{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;background:#fff;border:1px solid #e5e5e5;min-width:260px}
    .item b{font-family:"Syne",system-ui,sans-serif;font-size:1rem;font-weight:700;letter-spacing:-.02em;flex:1}
    .wrap{position:relative}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border:1px solid #111;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:help;background:#fff;transition:background .2s,color .2s}
    .wrap:hover .badge{background:#111;color:#fff}
    .tip{position:absolute;bottom:calc(100% + 10px);right:0;translate:0 4px;padding:8px 12px;background:#111;color:#fff;font-size:.75rem;line-height:1.4;width:170px;opacity:0;visibility:hidden;transition:opacity .28s,translate .28s cubic-bezier(.22,1,.36,1),visibility .28s}
    .wrap:hover .tip{opacity:1;visibility:visible;translate:0 0}
  </style>
</head>
<body>
<div class="item"><b>Beta channel</b><div class="wrap"><span class="badge">New</span><div class="tip" role="tooltip">Ships weekly. Features may change without notice.</div></div></div>

</body>
</html>
