<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1719
    slug: staggered-grid-data-pulse
    title: Data Pulse Grid
    category: animation
    tags: grid, stagger, data, pulse, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1719 - Data Pulse Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Syne:wght@700;800&display=swap');
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;background:#030508;color:#d7ffe8;
      font-family:'JetBrains Mono',ui-monospace,monospace;
      padding:clamp(1.25rem,4vw,2.5rem);overflow:hidden;
    }
    .bg{
      position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(circle at 15% 20%,rgba(110,255,170,.08),transparent 40%),
        radial-gradient(circle at 85% 80%,rgba(56,189,248,.06),transparent 45%);
    }
    .scan{
      position:fixed;inset:0;pointer-events:none;opacity:.35;
      background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(110,255,170,.03) 2px 3px);
      animation:scan 8s linear infinite;
    }
    .shell{position:relative;width:min(1000px,100%);margin:0 auto;z-index:1}
    .head{
      display:flex;justify-content:space-between;align-items:flex-end;
      gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;
    }
    .head h1{
      margin:0;font-family:Syne,sans-serif;font-weight:800;
      font-size:clamp(2rem,5vw,3.5rem);letter-spacing:-.06em;color:#fff;
    }
    .meta{display:flex;align-items:center;gap:.75rem}
    .live{
      display:inline-flex;align-items:center;gap:.5rem;
      font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#6effaa;
    }
    .live i{
      width:8px;height:8px;border-radius:50%;background:#6effaa;
      box-shadow:0 0 12px #6effaa;animation:blink 1.4s ease-in-out infinite;
    }
    .clock{font-size:.7rem;color:rgba(215,255,232,.45);letter-spacing:.08em}
    .grid{
      display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:108px;gap:.65rem;
    }
    .cell{
      grid-column:span var(--c);grid-row:span var(--r);
      background:rgba(12,21,17,.85);border:1px solid rgba(110,255,170,.14);
      border-radius:14px;padding:.9rem 1rem;position:relative;overflow:hidden;
      opacity:0;transform:translateY(24px) scale(.97);
      animation:load .65s cubic-bezier(.22,1,.36,1) forwards;
      animation-delay:calc(var(--i) * 70ms);
      transition:border-color .35s,box-shadow .35s;
    }
    .cell:hover{
      border-color:rgba(110,255,170,.55);
      box-shadow:0 0 0 1px rgba(110,255,170,.35) inset,0 12px 40px rgba(110,255,170,.08);
    }
    .cell::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(110,255,170,.06),transparent 55%);
      opacity:0;transition:opacity .4s;
    }
    .cell:hover::before{opacity:1}
    .pulse-ring{
      position:absolute;right:12px;top:12px;width:28px;height:28px;
      border-radius:50%;border:1px solid rgba(110,255,170,.25);
    }
    .pulse-ring::after{
      content:'';position:absolute;inset:-4px;border-radius:50%;
      border:1px solid rgba(110,255,170,.35);
      animation:pulse var(--pd,2.4s) ease-out infinite;
      animation-delay:calc(var(--i) * 120ms);
    }
    .k{
      position:relative;z-index:1;font-size:.62rem;text-transform:uppercase;
      letter-spacing:.14em;color:#6effaa;
    }
    .v{
      position:relative;z-index:1;margin-top:.35rem;
      font-family:Syne,sans-serif;font-weight:800;
      font-size:clamp(1.35rem,3.5vw,2.4rem);letter-spacing:-.05em;color:#fff;
      transition:color .2s;
    }
    .v.tick{color:#a7ffcb}
    .bar-wrap{
      position:absolute;left:0;right:0;bottom:0;height:42%;
      display:flex;align-items:flex-end;gap:3px;padding:0 10px 8px;
      opacity:.55;pointer-events:none;
    }
    .bar{
      flex:1;background:linear-gradient(180deg,rgba(110,255,170,.5),rgba(110,255,170,.08));
      border-radius:2px 2px 0 0;transform-origin:bottom;
      animation:bar var(--bs,1.8s) ease-in-out infinite alternate;
      animation-delay:calc(var(--bi,0) * 90ms);
    }
    .spark{
      position:absolute;right:10px;bottom:10px;width:72px;height:28px;opacity:.7;
    }
    .spark path{
      fill:none;stroke:rgba(110,255,170,.65);stroke-width:1.5;stroke-linecap:round;
      stroke-dasharray:120;stroke-dashoffset:120;
      animation:draw 2.2s ease forwards,dash 3s linear infinite;
      animation-delay:calc(var(--i) * 100ms + .3s),calc(var(--i) * 100ms + 2.5s);
    }
    .wave{
      position:absolute;left:0;right:0;bottom:0;height:3px;
      background:linear-gradient(90deg,transparent,#6effaa,transparent);
      transform:translateX(-100%);
      animation:sweep 3.5s ease-in-out infinite;
      animation-delay:calc(var(--i) * 200ms);
    }
    .cell.hero .v{font-size:clamp(1.8rem,4vw,2.8rem)}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>
  <main class="shell">
    <header class="head">
      <h1>Data pulse</h1>
      <div class="meta">
        <span class="live"><i aria-hidden="true"></i>Live</span>
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </header>
    <section class="grid" id="grid">
      <article class="cell hero" style="--i:1;--c:2;--r:1;--pd:2.2s" data-key="req" data-base="42000" data-suffix="" data-format="k">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">Requests / sec</div>
        <div class="v" data-val>42k</div>
        <div class="bar-wrap" aria-hidden="true">
          <span class="bar" style="--bs:1.4s;--bi:0;height:55%"></span>
          <span class="bar" style="--bs:1.7s;--bi:1;height:78%"></span>
          <span class="bar" style="--bs:1.2s;--bi:2;height:42%"></span>
          <span class="bar" style="--bs:1.9s;--bi:3;height:88%"></span>
          <span class="bar" style="--bs:1.5s;--bi:4;height:61%"></span>
        </div>
        <span class="wave" aria-hidden="true"></span>
      </article>
      <article class="cell" style="--i:2;--c:2;--r:2;--pd:2.8s" data-key="lat" data-base="18" data-suffix="ms">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">Latency</div>
        <div class="v" data-val>18ms</div>
        <svg class="spark" viewBox="0 0 72 28" aria-hidden="true"><path d="M2 22 L14 16 L26 20 L38 8 L50 14 L62 6 L70 10"/></svg>
      </article>
      <article class="cell" style="--i:3;--c:2;--r:1;--pd:3.1s" data-key="err" data-base="0.02" data-suffix="%" data-decimals="2">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">Error rate</div>
        <div class="v" data-val>0.02%</div>
        <div class="bar-wrap" aria-hidden="true">
          <span class="bar" style="--bs:2.1s;--bi:0;height:18%"></span>
          <span class="bar" style="--bs:2.4s;--bi:1;height:12%"></span>
          <span class="bar" style="--bs:1.9s;--bi:2;height:22%"></span>
        </div>
      </article>
      <article class="cell" style="--i:4;--c:3;--r:1;--pd:2.5s" data-key="reg" data-base="19" data-suffix="">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">Active regions</div>
        <div class="v" data-val>19</div>
        <svg class="spark" viewBox="0 0 72 28" aria-hidden="true"><path d="M2 18 L12 14 L22 16 L32 10 L42 12 L52 8 L62 14 L70 6"/></svg>
        <span class="wave" aria-hidden="true"></span>
      </article>
      <article class="cell" style="--i:5;--c:1;--r:1;--pd:1.9s" data-key="cpu" data-base="41" data-suffix="">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">CPU</div>
        <div class="v" data-val>41</div>
      </article>
      <article class="cell hero" style="--i:6;--c:2;--r:1;--pd:2s" data-key="health" data-static="OK">
        <span class="pulse-ring" aria-hidden="true"></span>
        <div class="k">System health</div>
        <div class="v" data-val>OK</div>
        <div class="bar-wrap" aria-hidden="true">
          <span class="bar" style="--bs:1.3s;--bi:0;height:92%"></span>
          <span class="bar" style="--bs:1.6s;--bi:1;height:95%"></span>
          <span class="bar" style="--bs:1.4s;--bi:2;height:88%"></span>
          <span class="bar" style="--bs:1.8s;--bi:3;height:97%"></span>
        </div>
      </article>
    </section>
  </main>
  <style>
    @keyframes load{to{opacity:1;transform:none}}
    @keyframes bar{from{transform:scaleY(.35)}to{transform:scaleY(1)}}
    @keyframes pulse{0%{transform:scale(.85);opacity:.8}100%{transform:scale(1.6);opacity:0}}
    @keyframes blink{50%{opacity:.35;box-shadow:0 0 4px #6effaa}}
    @keyframes scan{to{background-position:0 48px}}
    @keyframes sweep{0%{transform:translateX(-100%)}45%,100%{transform:translateX(100%)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes dash{to{stroke-dashoffset:-120}}
    @media(max-width:700px){
      .grid{grid-template-columns:repeat(2,1fr)}
      .cell{grid-column:span 1!important;grid-row:span 1!important}
    }
    @media(prefers-reduced-motion:reduce){
      .cell,.bar,.pulse-ring::after,.scan,.wave,.spark path,.live i{animation:none!important}
      .cell{opacity:1;transform:none}
      .spark path{stroke-dashoffset:0}
    }
  </style>
  <script>
    const clock = document.getElementById('clock');
    const cells = [...document.querySelectorAll('.cell[data-base], .cell[data-static]')];

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatValue(cell, value) {
      if (cell.dataset.static) return cell.dataset.static;
      const suffix = cell.dataset.suffix || '';
      const decimals = Number(cell.dataset.decimals || 0);
      if (cell.dataset.format === 'k') {
        return Math.round(value / 1000) + 'k';
      }
      if (decimals) return value.toFixed(decimals) + suffix;
      return Math.round(value) + suffix;
    }

    function tickClock() {
      const now = new Date();
      clock.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    }

    function jitter(cell) {
      if (cell.dataset.static) return;
      const base = Number(cell.dataset.base);
      const spread = cell.dataset.format === 'k' ? 1800 : base * 0.08;
      const next = base + (Math.random() - 0.5) * spread * 2;
      const el = cell.querySelector('[data-val]');
      el.textContent = formatValue(cell, next);
      el.classList.add('tick');
      setTimeout(() => el.classList.remove('tick'), 180);
    }

    tickClock();
    setInterval(tickClock, 1000);
    setInterval(() => {
      cells.forEach((cell, index) => {
        setTimeout(() => jitter(cell), index * 90);
      });
    }, 2200);
  </script>
</body>
</html>
