<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1620
    slug: 3d-mouse-button-tilt
    title: 3D Button Mouse Tilt
    category: 3d-mouse
    tags: 3d, mouse, button
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1620 - 3D Button Mouse Tilt</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0c12;perspective:800px;font-family:Syne,sans-serif}
    .btn{position:relative;border:none;background:transparent;cursor:pointer;transform-style:preserve-3d;transform:rotateX(var(--rx,12deg)) rotateY(var(--ry,-8deg));padding:0}
    .face{display:grid;place-items:center;padding:1.15rem 2.6rem;font-size:1.2rem;font-weight:800;letter-spacing:.04em;color:#fff;background:linear-gradient(160deg,#6c8cff,#3d5cff);border-radius:16px;transform:translateZ(16px);box-shadow:0 0 0 1px rgba(255,255,255,.15);position:relative;overflow:hidden}
    .face::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,40%),rgba(255,255,255,.35),transparent 45%);mix-blend-mode:soft-light}
    .depth{position:absolute;inset:0;border-radius:16px;background:#1e2d8a;transform:translateZ(0);box-shadow:0 18px 36px rgba(60,80,200,.4)}
    .btn:active .face{transform:translateZ(6px)}
  </style>
</head>
<body>
  <button class="btn" id="btn" type="button">
    <span class="depth" aria-hidden="true"></span>
    <span class="face">ENGAGE</span>
  </button>
  <script>
    const btn=document.getElementById('btn');let rx=12,ry=-8,trx=12,try_=-8,mx=50,my=40,cmx=50,cmy=40;
    btn.addEventListener('pointermove',e=>{const r=btn.getBoundingClientRect();const x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;try_=(x-.5)*20;trx=12+(.5-y)*16;mx=x*100;my=y*100});
    btn.addEventListener('pointerleave',()=>{trx=12;try_=-8});
    (function loop(){rx+=(trx-rx)*.14;ry+=(try_-ry)*.14;cmx+=(mx-cmx)*.12;cmy+=(my-cmy)*.12;
      btn.style.setProperty('--rx',rx+'deg');btn.style.setProperty('--ry',ry+'deg');
      btn.style.setProperty('--mx',cmx+'%');btn.style.setProperty('--my',cmy+'%');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
