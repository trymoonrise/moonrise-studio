<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1506

    tags: dots, status, indicator
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1506 — Status Dot Indicator</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;gap:1rem}.row{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-width:240px}.status{width:10px;height:10px;border-radius:50%;flex-shrink:0}.status--live{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.25);animation:live 2s ease-in-out infinite}.status--busy{background:#f59e0b}.status--away{background:#94a3b8}.status--offline{background:#e2e8f0}@keyframes live{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.25)}50%{box-shadow:0 0 0 6px rgba(34,197,94,.1)}}.row span{font-size:.9rem;font-weight:500;color:#334155}
  </style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:10px"><div class="row"><div class="status status--live"></div><span>Online — Available</span></div><div class="row"><div class="status status--busy"></div><span>In a meeting</span></div><div class="row"><div class="status status--away"></div><span>Away</span></div><div class="row"><div class="status status--offline"></div><span>Offline</span></div></div>

</body>
</html>
