<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1722
    slug: staggered-grid-poster-wall
    title: Poster Wall Grid
    category: animation
    tags: grid, stagger, poster, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1722 — Poster Wall Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#d8d1c4;color:#14110d;padding:2rem;font-family:Inter,system-ui,sans-serif;overflow-x:hidden}.wall{width:min(1120px,100%);margin:auto}.mast{display:flex;justify-content:space-between;align-items:end;margin-bottom:1rem}.mast h1{font-size:clamp(3rem,8vw,7rem);line-height:.76;letter-spacing:-.08em;margin:0;text-transform:uppercase}.mast p{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;margin:0;opacity:.55}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;perspective:1200px}.poster{min-height:clamp(180px,28vw,360px);background:var(--bg);padding:1rem;display:flex;flex-direction:column;justify-content:space-between;transform-origin:top center;opacity:0;transform:translateY(40px) rotate(var(--rot)) rotateX(18deg);animation:paste .85s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*75ms);box-shadow:0 22px 44px rgba(0,0,0,.16)}.poster:nth-child(2n){margin-top:2rem}.poster b{font-size:clamp(1.6rem,4vw,3rem);line-height:.85;letter-spacing:-.08em;text-transform:uppercase}.poster span{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase}.poster:hover{transform:rotate(0) translateY(-8px);transition:transform .28s ease;z-index:3}@keyframes paste{to{opacity:1;transform:rotate(var(--rot)) rotateX(0)}}@media(max-width:800px){.mast{display:block}.grid{grid-template-columns:1fr 1fr}.poster:nth-child(2n){margin-top:0}}@media(prefers-reduced-motion:reduce){.poster{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <main class="wall">
    <header class="mast"><h1>Poster<br>Wall</h1><p>stagger pasted</p></header>
    <section class="grid">
      <article class="poster" style="--i:1;--rot:-3deg;--bg:#ff6b3d"><b>01</b><span>Release</span></article>
      <article class="poster" style="--i:2;--rot:2deg;--bg:#f7e6b8"><b>Design</b><span>Field note</span></article>
      <article class="poster" style="--i:3;--rot:-1deg;--bg:#7ee0c3"><b>Ship</b><span>Now live</span></article>
      <article class="poster" style="--i:4;--rot:3deg;--bg:#111;color:#fff"><b>Beta</b><span>Access</span></article>
      <article class="poster" style="--i:5;--rot:-2deg;--bg:#6c8cff;color:#fff"><b>Grid</b><span>Motion</span></article>
    </section>
  </main>
</body>
</html>
