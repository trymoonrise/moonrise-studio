<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0457
    slug: image-scroll-split-reveal-07
    title: Split Reveal 07
    category: image-scroll
    tags: image-scroll, split
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0457 - Split Reveal 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0f0f12;color:#fff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}.pane{position:relative;overflow:hidden}.pane img{width:120%;height:100%;object-fit:cover;will-change:transform}.left img{transform:translateX(calc(var(--p,0)*-30%))}.right img{transform:translateX(calc(var(--p,0)*30%))}.seam{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,#fff,transparent);transform:translateX(-50%);z-index:2;opacity:var(--o,.3)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="pane left"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="seam" id="seam"></div><div class="pane right"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(40deg)"></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const seam=document.getElementById('seam');addEventListener('scroll',()=>{const p=prog();document.documentElement.style.setProperty('--p',String(p));seam.style.setProperty('--o',String(.3+p*.7));},{passive:true});</script>
</body>
</html>
