<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0082
    slug: ease-in-fade-up-stagger
    title: Fade Up Stagger
    category: ease-in
    tags: ease-in, fade
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0082 - Fade Up Stagger</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;gap:12px} .item{opacity:0;transform:translateY(24px);animation:up .6s forwards;padding:12px 24px;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)} .item:nth-child(1){animation-delay:.1s}.item:nth-child(2){animation-delay:.2s}.item:nth-child(3){animation-delay:.3s}.item:nth-child(4){animation-delay:.4s} @keyframes up{to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:12px"><div class="item">Item 1</div><div class="item">Item 2</div><div class="item">Item 3</div><div class="item">Item 4</div></div>

</body>
</html>
