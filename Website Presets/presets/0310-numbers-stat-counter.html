<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0310
    slug: numbers-stat-counter
    title: Animated Stat Counter
    category: numbers
    tags: numbers, counter
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0310 - Animated Stat Counter</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;color:#fff}.stats{display:flex;gap:3rem;text-align:center}.num{font-size:3.5rem;font-weight:900;color:#6c8cff;font-variant-numeric:tabular-nums}.lbl{font-size:.85rem;opacity:.6;margin-top:.25rem}
  </style>
</head>
<body>
<div class="stats"><div><div class="num" id="n1">0</div><div class="lbl">Users</div></div><div><div class="num" id="n2">0</div><div class="lbl">Projects</div></div></div>
<script>function count(el,target){let c=0;const iv=setInterval(()=>{c+=Math.ceil(target/40);if(c>=target){c=target;clearInterval(iv);}el.textContent=c.toLocaleString();},30);}count(document.getElementById('n1'),10000);count(document.getElementById('n2'),2500);</script>
</body>
</html>
