<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0351
    slug: borders-dashed-border
    title: Dashed Border Box
    category: borders
    tags: borders, dashed
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0351 — Dashed Border Box</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f7;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;color:#111}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .wrap{position:relative;width:min(100%,300px);aspect-ratio:4/3;display:grid;place-items:center}
    svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
    .dash{fill:none;stroke:#111;stroke-width:2;stroke-dasharray:10 8;stroke-dashoffset:0;animation:march 12s linear infinite}
    @keyframes march{to{stroke-dashoffset:-180}}
    .box{position:relative;z-index:1;text-align:center;padding:1.5rem}
    h2{font-family:"Syne",system-ui,sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-.03em;margin:0 0 .35rem}
    p{margin:0;color:#666;font-size:.88rem}
  </style>
</head>
<body>
<div class="wrap"><svg viewBox="0 0 300 225" aria-hidden="true"><rect class="dash" x="4" y="4" width="292" height="217" rx="2"/></svg><div class="box"><h2>Drop zone</h2><p>Dashed perimeter in march.</p></div></div>

</body>
</html>
