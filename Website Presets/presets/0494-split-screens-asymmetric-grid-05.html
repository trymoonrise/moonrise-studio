<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0494
    slug: split-screens-asymmetric-grid-05
    title: Asymmetric Grid 05
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0494 - Asymmetric Grid 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#f2efe8;color:#111}
    .grid{min-height:100vh;display:grid;grid-template-columns:1.4fr 1fr .7fr;grid-template-rows:1.2fr .8fr;gap:8px;padding:8px}
.cell{position:relative;overflow:hidden;display:grid;place-items:end start;padding:1.25rem;opacity:0;animation:in .7s cubic-bezier(.22,1,.36,1) forwards}
.cell:nth-child(1){grid-column:1;grid-row:1/3;background:#111;color:#fff;clip-path:polygon(0 0,100% 0,100% 92%,88% 100%,0 100%);animation-delay:.05s}
.cell:nth-child(2){background:#ff6b4a;clip-path:polygon(0 12%,12% 0,100% 0,100% 100%,0 100%);animation-delay:.15s}
.cell:nth-child(3){background:#6c8cff;color:#fff;clip-path:polygon(0 0,100% 0,100% 100%,0 88%);animation-delay:.25s}
.cell:nth-child(4){grid-column:2/4;background:#1a1a1a;color:#f2efe8;clip-path:polygon(0 0,100% 0,100% 100%,8% 100%,0 80%);animation-delay:.35s}
.cell span{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;opacity:.6}
.cell h2{margin:.3rem 0 0;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:800;letter-spacing:-.04em}
@keyframes in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@media(max-width:700px){.grid{grid-template-columns:1fr;grid-template-rows:auto}.cell{clip-path:none!important;grid-column:auto!important;grid-row:auto!important;min-height:160px}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="grid"><div class="cell"><span>01</span><h2>Mass</h2></div><div class="cell"><span>02</span><h2>Cut</h2></div><div class="cell"><span>03</span><h2>Edge</h2></div><div class="cell"><span>04</span><h2>Asymmetric ground</h2></div></div>

</body>
</html>
