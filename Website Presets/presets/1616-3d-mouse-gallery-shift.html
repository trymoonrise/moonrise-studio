<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1616
    slug: 3d-mouse-gallery-shift
    title: 3D Gallery Mouse Shift
    category: 3d-mouse
    tags: 3d, mouse, gallery
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1616 — 3D Gallery Mouse Shift</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0b12;perspective:1000px;overflow:hidden;font-family:Syne,sans-serif}
    .wall{display:flex;gap:1rem;transform-style:preserve-3d;transform:rotateY(var(--ry,-18deg)) rotateX(var(--rx,8deg))}
    .panel{width:120px;height:200px;border-radius:14px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:flex-end;padding:.9rem;color:#fff;font-size:1rem;font-weight:800;transform:translateZ(var(--z,0px)) translateX(calc(var(--i)*var(--shift,0px)));box-shadow:0 20px 40px rgba(0,0,0,.35)}
    .panel:nth-child(1){background:linear-gradient(160deg,#6c8cff,#1a2a6c);--z:40px;--i:-2}
    .panel:nth-child(2){background:linear-gradient(160deg,#ff6bcb,#5a1038);--z:10px;--i:-1}
    .panel:nth-child(3){background:linear-gradient(160deg,#7ee0c3,#0e4a3a);--z:60px;--i:0}
    .panel:nth-child(4){background:linear-gradient(160deg,#ffd16c,#7a4a08);--z:0px;--i:1}
    .panel:nth-child(5){background:linear-gradient(160deg,#b06cff,#2a1060);--z:30px;--i:2}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="wall" id="wall">
    <div class="panel">01</div><div class="panel">02</div><div class="panel">03</div>
    <div class="panel">04</div><div class="panel">05</div>
  </div>
  <div class="hint">Shift the gallery wall</div>
  <script>
    const wall=document.getElementById('wall');let ry=-18,rx=8,shift=0,try_=-18,trx=8,tshift=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*-30;trx=8+y*-10;tshift=x*18});
    (function loop(){ry+=(try_-ry)*.1;rx+=(trx-rx)*.1;shift+=(tshift-shift)*.1;
      wall.style.setProperty('--ry',ry+'deg');wall.style.setProperty('--rx',rx+'deg');wall.style.setProperty('--shift',shift+'px');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
