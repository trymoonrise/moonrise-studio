<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0140
    slug: sidebars-overlay-drawer
    title: Overlay Drawer
    category: sidebars
    tags: sidebars, drawer
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0140 — Overlay Drawer</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa}.drawer{position:fixed;top:0;left:0;width:280px;height:100%;background:#fff;box-shadow:4px 0 24px rgba(0,0,0,.1);transform:translateX(-100%);transition:transform .3s;padding:2rem;z-index:10}.drawer.open{transform:translateX(0)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .3s}.overlay.open{opacity:1;pointer-events:auto}.btn{padding:10px 20px;border:none;border-radius:8px;background:#6c8cff;color:#fff;cursor:pointer}
  </style>
</head>
<body>
<button class="btn" id="open">Menu</button><div class="overlay" id="ov"></div><nav class="drawer" id="dr"><h3>Navigation</h3><p style="margin-top:1rem;color:#666">Drawer content</p></nav>
<script>const dr=document.getElementById('dr'),ov=document.getElementById('ov');document.getElementById('open').onclick=()=>{dr.classList.add('open');ov.classList.add('open');};ov.onclick=()=>{dr.classList.remove('open');ov.classList.remove('open');};</script>
</body>
</html>
