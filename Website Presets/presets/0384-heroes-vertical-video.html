<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0384
    slug: heroes-vertical-video
    title: Vertical Video Hero
    category: heroes
    tags: heroes, landing, video, split
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0384 - Vertical Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.25rem, 4vw, 2rem);
      background:
        radial-gradient(circle at 85% 20%, rgba(99, 102, 241, 0.14), transparent 42%),
        radial-gradient(circle at 10% 80%, rgba(236, 72, 153, 0.08), transparent 38%),
        #0a0e16;
      color: #f8fafc;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1040px, 100%);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(2rem, 4vw, 3.5rem);
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 0.9rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a5b4fc;
    }

    h1 {
      font-size: clamp(2rem, 3.8vw, 2.85rem);
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.04em;
      max-width: 11ch;
      margin-bottom: 0.9rem;
    }

    p {
      color: #94a3b8;
      font-size: 0.98rem;
      line-height: 1.65;
      max-width: 36ch;
      margin-bottom: 1.6rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.15rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.15rem;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      transition: transform 0.2s cubic-bezier(.22, .61, .36, 1);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .link {
      color: #cbd5e1;
      font-size: 0.84rem;
      font-weight: 600;
      text-decoration: none;
    }

    .link:hover {
      color: #fff;
    }

    .phone {
      position: relative;
      width: min(230px, 42vw);
      padding: 0.55rem;
      border-radius: 34px;
      background: linear-gradient(145deg, #2a2f3f, #141821);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 0.7rem;
      left: 50%;
      transform: translateX(-50%);
      width: 72px;
      height: 22px;
      border-radius: 999px;
      background: #0a0e16;
      z-index: 2;
    }

    .phone video {
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      border-radius: 28px;
      background: #000;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }

      h1 {
        max-width: none;
      }

      p {
        margin-left: auto;
        margin-right: auto;
      }

      .actions {
        justify-content: center;
      }

      .phone {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="copy">
        <span class="eyebrow">Mobile app</span>
        <h1>Mobile-first stories</h1>
        <p>Pair vertical video with bold copy for social-native product launches.</p>
        <div class="actions">
          <button class="btn" type="button">Download app</button>
          <a class="link" href="#">Watch demo →</a>
        </div>
      </div>

      <div class="phone" aria-label="App preview">
        <video src="../stock/media/9-16 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video>
      </div>
    </section>
  </div>
</body>
</html>
