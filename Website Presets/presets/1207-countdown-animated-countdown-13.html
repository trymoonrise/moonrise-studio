<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1207
    slug: countdown-animated-countdown-13
    title: Animated Countdown 13
    category: countdown
    tags: countdown, animated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1207 — Animated Countdown 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d0d0d;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.marq-track{animation:none!important}}
    .stage{text-align:center}
    .pulse{font-family:"Syne",system-ui,sans-serif;font-size:clamp(4rem,18vw,9rem);font-weight:800;letter-spacing:-.1em;font-variant-numeric:tabular-nums;line-height:1;animation:beat 1s cubic-bezier(.22,1,.36,1) infinite}
    @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    .meta{margin-top:1rem;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#555}
    .orbit{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .orbit span{position:absolute;white-space:nowrap;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#222;font-weight:700;animation:orbit 20s linear infinite}
    .orbit span:nth-child(1){top:18%;animation-duration:24s}
    .orbit span:nth-child(2){top:72%;animation-duration:30s;animation-direction:reverse}
    @keyframes orbit{from{transform:translateX(-20%)}to{transform:translateX(100%)}}
  </style>
</head>
<body>
<div class="orbit" aria-hidden="true"><span>Animated · Pulse · Tick · Animated · Pulse · Tick · Animated · Pulse · Tick · </span><span>Seconds collapse · Seconds collapse · Seconds collapse · </span></div>
    <div class="stage"><div class="pulse" id="n">60</div><p class="meta">Seconds remaining</p></div>
<script>let s=60;const el=document.getElementById('n');const iv=setInterval(()=>{s--;el.textContent=String(Math.max(0,s));if(s<=0)clearInterval(iv);},1000);</script>
</body>
</html>
