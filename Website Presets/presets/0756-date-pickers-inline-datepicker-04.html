<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0756
    slug: date-pickers-inline-datepicker-04
    title: Inline Date Strip
    category: date-pickers
    tags: date-pickers, inline
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0756 - Inline Date Strip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #080a0e;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    .strip-wrap { width: min(480px, 94vw); }

    label {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    .strip {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .date-chip {
      flex-shrink: 0;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
      padding: 0.75rem 0.5rem;
      border: 1px solid #1e293b;
      border-radius: 10px;
      background: #111827;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.25s;
    }

    .date-chip:hover {
      border-color: #334155;
      transform: translateY(-3px);
    }

    .date-chip.selected {
      border-color: #fbbf24;
      background: #fbbf2412;
      animation: chipSelect 0.4s ease;
    }

    @keyframes chipSelect {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .dow {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .num {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      margin: 0.2rem 0;
    }

    .date-chip.selected .num { color: #fbbf24; }

    .mon { font-size: 0.65rem; color: #475569; }

    .output {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #94a3b8;
      animation: outputSlide 0.3s ease;
    }

    @keyframes outputSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .date-chip.selected { animation: none; }
    }
  </style>
</head>
<body>
  <div class="strip-wrap">
    <label>Pick a date</label>
    <div class="strip" id="strip" role="listbox" aria-label="Date selection"></div>
    <div class="output" id="output">Thu, Jul 16, 2026</div>
  </div>

  <script>
    const strip = document.getElementById('strip');
    const output = document.getElementById('output');
    const start = new Date(2026, 6, 14);
    let selected = 2;

    for (let i = 0; i < 14; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'date-chip' + (i === selected ? ' selected' : '');
      chip.role = 'option';
      chip.innerHTML = `<span class="dow">${d.toLocaleDateString('en-US', { weekday: 'short' })}</span><span class="num">${d.getDate()}</span><span class="mon">${d.toLocaleDateString('en-US', { month: 'short' })}</span>`;
      chip.addEventListener('click', () => {
        strip.querySelectorAll('.date-chip').forEach((c) => c.classList.remove('selected'));
        chip.classList.add('selected');
        output.textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        chip.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      });
      strip.appendChild(chip);
    }
  </script>
</body>
</html>
