<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1291
    slug: borders-animated-border-04
    title: Circuit Trace Border
    category: borders
    tags: borders, animated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1291 — Circuit Trace Border</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#040406;color:#ececf0;font-family:Outfit,sans-serif;padding:32px}
    .panel{position:relative;width:min(400px,90vw);padding:2px;border-radius:6px;overflow:hidden;background:#111118}
    .trace{position:absolute;inset:0;background:conic-gradient(from 0deg,transparent 0%,#00c896 10%,transparent 20%);animation:rotate 3s linear infinite}
    .inner{position:relative;background:#0c0c10;border-radius:4px;padding:30px 26px;margin:1px}
    .inner h2{font-family:Syne,sans-serif;font-size:1.4rem;margin:0 0 8px;letter-spacing:-.02em}
    .inner p{margin:0;font-size:.85rem;color:rgba(236,236,240,.45);line-height:1.5}
    .dot{position:absolute;width:6px;height:6px;background:#00c896;border-radius:50%;box-shadow:0 0 10px #00c896;animation:orbit 3s linear infinite}
    .dot{top:0;left:50%;margin-left:-3px;transform-origin:3px 200px}
    @keyframes rotate{to{transform:rotate(360deg)}}
    @keyframes orbit{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.trace,.dot{animation:none}}
  </style>
</head>
<body>
<div class="panel">
  <div class="trace" aria-hidden="true"></div>
  <div class="dot" aria-hidden="true"></div>
  <div class="inner">
    <h2>Circuit trace</h2>
    <p>Rotating conic gradient traces the border like a live circuit path.</p>
  </div>
</div>
</body>
</html>
