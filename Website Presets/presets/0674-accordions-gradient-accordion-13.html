  <style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f4ef;padding:2rem;font-family:Inter,sans-serif}.acc{width:min(520px,100%);display:grid;gap:.8rem}.item{position:relative;border-radius:22px;overflow:hidden;background:#fff;border:1px solid #eae5db}.item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(108,140,255,.14),rgba(255,107,203,.12),rgba(126,224,195,.14));opacity:0;transition:opacity .35s ease}.trigger{position:relative;width:100%;padding:1rem 1.1rem;border:0;background:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font:600 .94rem Inter,sans-serif;text-align:left;color:#111}.pill{padding:.28rem .55rem;border-radius:999px;background:#f3f0e9;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:#7d7668}.panel{position:relative;display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s cubic-bezier(.22,1,.36,1)}.panel>div{overflow:hidden}.panel p{margin:0;padding:0 1.1rem 1rem;color:#685f55;font-size:.88rem;line-height:1.67}.item.open::before{opacity:1}.item.open .pill{background:#111;color:#fff}.item.open .panel{grid-template-rows:1fr}@media(prefers-reduced-motion:reduce){.item::before,.panel{transition:none}}</style>
</head><body><div class="acc"><div class="item open"><button class="trigger"><span>Soft gradient wash</span><span class="pill">Live</span></button><div class="panel"><div><p>The gradient appears only on open, so the resting state stays minimal and the interaction still feels special.</p></div></div></div><div class="item"><button class="trigger"><span>Color used sparingly</span><span class="pill">More</span></button><div class="panel"><div><p>This keeps the accordion professional: the color is an accent, not the whole system.</p></div></div></div><div class="item"><button class="trigger"><span>Experimental but practical</span><span class="pill">More</span></button><div class="panel"><div><p>It fits launch pages, product storytelling, and polished internal design systems alike.</p></div></div></div></div><script>document.querySelectorAll('.item .trigger').forEach((button)=>button.addEventListener('click',()=>button.parentElement.classList.toggle('open')));</script></body></html>
