<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0971
    slug: errors-boundary-error-11
    title: Boundary Error 11
    category: errors
    tags: errors, boundary
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0971 — Boundary Error 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#12141a;font-family:'JetBrains Mono',monospace;color:#c8cad0}
    .tree{width:min(480px,100%);position:relative}
    .node{
      padding:.75rem 1rem;margin:.35rem 0;border-radius:8px;border:1px solid #2a2e3a;
      background:#1a1d27;position:relative;transition:all .6s cubic-bezier(.68,-.55,.27,1.55);
    }
    .node[data-depth="0"]{margin-left:0}
    .node[data-depth="1"]{margin-left:1.5rem}
    .node[data-depth="2"]{margin-left:3rem}
    .node[data-depth="3"]{margin-left:4.5rem}
    .node .name{font-size:.8rem;font-weight:600}
    .node .type{font-size:.65rem;opacity:.4;margin-left:.5rem}
    .node.crashed{
      background:#2a1014;border-color:#ff3c50;color:#ff6b7a;
      animation:collapse .8s cubic-bezier(.68,-.55,.27,1.55) forwards;
    }
    .node.crashed::after{content:' ← BOOM';color:#ff3c50;font-weight:700;animation:flash .4s step-end infinite}
    .banner{margin-top:1.5rem;padding:1rem;border:2px solid #ff3c50;border-radius:10px;background:rgba(255,60,80,.08);text-align:center}
    .banner h2{margin:0 0 .4rem;font-size:1rem;color:#ff3c50}
    .banner p{margin:0;font-size:.7rem;opacity:.6}
    button{margin-top:1rem;appearance:none;border:0;background:#ff3c50;color:#fff;padding:.6rem 1.2rem;border-radius:6px;font:700 .7rem 'JetBrains Mono',monospace;cursor:pointer}
    @keyframes collapse{0%{transform:none;opacity:1}100%{transform:translateY(40px) rotate(8deg) scale(.9);opacity:.5}}
    @keyframes flash{50%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.node.crashed,.node.crashed::after{animation:none}}
  </style>
</head>
<body>
  <div class="tree">
    <div class="node" data-depth="0"><span class="name">App</span><span class="type">root</span></div>
    <div class="node" data-depth="1"><span class="name">Router</span><span class="type">provider</span></div>
    <div class="node" data-depth="2"><span class="name">DashboardPage</span><span class="type">route</span></div>
    <div class="node" data-depth="3" id="dead"><span class="name">EvilWidget</span><span class="type">chaos</span></div>
    <div class="node" data-depth="2"><span class="name">Sidebar</span><span class="type">layout</span></div>
    <div class="banner" role="alert" id="banner" hidden>
      <h2>Boundary caught a free-falling component</h2>
      <p>EvilWidget threw during render. The tree is unstable.</p>
      <button type="button" id="reset">Rebuild tree</button>
    </div>
  </div>
  <script>
    setTimeout(()=>{
      document.getElementById('dead').classList.add('crashed');
      document.getElementById('banner').hidden=false;
    },800);
    document.getElementById('reset').onclick=()=>{
      document.getElementById('dead').classList.remove('crashed');
      document.getElementById('banner').hidden=true;
      setTimeout(()=>{
        document.getElementById('dead').classList.add('crashed');
        document.getElementById('banner').hidden=false;
      },600);
    };
  </script>
</body>
</html>
