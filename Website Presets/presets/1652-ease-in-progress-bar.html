<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1652
    slug: ease-in-progress-bar
    title: Progress Bar Ease
    category: ease-in
    tags: ease-in, progress, bar, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1652 — Progress Bar Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem;font-family:system-ui,sans-serif}.wrap{width:min(360px,90vw)}.label{display:flex;justify-content:space-between;font-size:.8rem;color:#888;margin-bottom:8px}.track{height:6px;background:#222;border-radius:99px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#6c8cff,#6cffb8);border-radius:99px;animation:fill 1.8s cubic-bezier(.22,.61,.36,1) .3s forwards}@keyframes fill{to{width:78%}}
  </style>
</head>
<body>
<div class="wrap"><div class="label"><span>Uploading</span><span>78%</span></div><div class="track"><div class="fill"></div></div></div>

</body>
</html>
