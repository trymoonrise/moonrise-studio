--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0789 - Split Form 11</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#f2f2ef;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(780px,96vw);display:grid;grid-template-columns:1fr 1fr;border:1px solid #111;min-height:430px}.visual{background:#111;color:#fff;padding:28px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.visual h1{font:400 50px/1 'Instrument Serif';margin:0}.visual .shape{width:180px;height:180px;border-radius:50% 15% 50% 20%;background:#d8ff62;position:absolute;right:-40px;bottom:-40px;animation:morph 8s ease-in-out infinite}.visual small{font:500 10px 'DM Mono';letter-spacing:.2em;text-transform:uppercase;color:#888}.form{padding:28px;display:flex;flex-direction:column;justify-content:center;gap:14px}.form input,.form textarea{border:0;border-bottom:1px solid #aaa;background:transparent;padding:12px 0;outline:0}.form textarea{resize:none}.form button{border:1px solid #111;background:#111;color:#fff;padding:14px;margin-top:8px}@keyframes morph{50%{border-radius:15% 50% 20% 50%;transform:rotate(30deg)}}@media(max-width:650px){.shell{grid-template-columns:1fr}.visual{min-height:190px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><section class="visual"><small>Open studio / 2026</small><h1>Make contact<br><i>matter.</i></h1><i class="shape"></i></section><form class="form"><input placeholder="Name"><input type="email" placeholder="Email"><textarea placeholder="Message"></textarea><button>Send proposal →</button></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
