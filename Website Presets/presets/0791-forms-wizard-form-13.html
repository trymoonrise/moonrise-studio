--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0791 — Wizard Form 13</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#101319;color:#fff;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(600px,94vw)}.map{display:flex;align-items:center;justify-content:center;margin-bottom:35px}.node{width:34px;height:34px;border-radius:50%;border:1px solid #555;display:grid;place-items:center;font:500 10px 'DM Mono';transition:.4s}.node.on{background:#7ee787;color:#111;border-color:#7ee787;transform:scale(1.12)}.link{width:55px;height:1px;background:#333}.panel{border:1px solid #2d3440;border-radius:28px;padding:28px;background:#151922;min-height:250px}.step{display:none;animation:show .5s cubic-bezier(.22,1,.36,1)}.step.on{display:block}.step small{font:500 10px 'DM Mono';letter-spacing:.2em;text-transform:uppercase;color:#7ee787}.step h2{font:400 43px/1 'Instrument Serif';margin:12px 0 26px}.step input,.step select{width:100%;border:0;border-bottom:1px solid #555;background:transparent;padding:13px 0;outline:0}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px}.actions button{border:1px solid #444;border-radius:999px;background:transparent;color:#fff;padding:11px 18px}.actions .next{background:#7ee787;color:#111;border-color:#7ee787}@keyframes show{from{opacity:0;transform:scale(.97) translateY(10px)}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><div class="map"><span class="node">1</span><i class="link"></i><span class="node">2</span><i class="link"></i><span class="node">3</span></div><form class="panel"><section class="step"><small>Origin</small><h2>Name the project.</h2><input placeholder="Project name"></section><section class="step"><small>Direction</small><h2>Choose a path.</h2><select><option>Launch fast</option><option>Explore deeply</option><option>Rebuild fully</option></select></section><section class="step"><small>Destination</small><h2>Ready to send.</h2><p>Everything can still change later.</p></section><div class="actions"><button type="button" id="back">Back</button><button type="button" class="next" id="next">Next</button></div></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));const s=[...document.querySelectorAll('.step')],n=[...document.querySelectorAll('.node')],back=document.getElementById('back'),next=document.getElementById('next');let i=0;function d(){s.forEach((x,k)=>x.classList.toggle('on',k===i));n.forEach((x,k)=>x.classList.toggle('on',k<=i));back.style.visibility=i?'visible':'hidden';next.textContent=i===2?'Restart':'Next';}back.onclick=()=>{i--;d()};next.onclick=()=>{i=i===2?0:i+1;d()};d();</script></body></html>
