<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1446
    slug: experimental-inertia-tilt-grid
    title: Inertia Tilt Grid
    category: experimental
    tags: experimental, tilt, inertia
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1446 — Inertia Tilt Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;perspective:1000px;padding:2rem}.grid{display:grid;grid-template-columns:repeat(3,80px);gap:10px}.cell{aspect-ratio:1;background:linear-gradient(135deg,#1a1a2e,#2a2a40);border-radius:10px;border:1px solid rgba(108,140,255,.2);transition:transform .15s ease-out}
  </style>
</head>
<body>
<div class="grid" id="g"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
<script>const g=document.getElementById('g');let tx=0,ty=0,cx=0,cy=0;document.addEventListener('mousemove',e=>{tx=(e.clientX/innerWidth-.5)*20;ty=(e.clientY/innerHeight-.5)*20;});function a(){cx+=(tx-cx)*.08;cy+=(ty-cy)*.08;g.style.transform='rotateY('+cx+'deg) rotateX('+(-cy)+'deg)';requestAnimationFrame(a);}a();</script>
</body>
</html>
