<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0104
    slug: split-screens-hover-reveal
    title: Hover Reveal Split
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0104 - Hover Reveal Split</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#0c0c0c;color:#fff}
    .stage{position:relative;min-height:100vh;cursor:none;overflow:hidden}
.base{position:absolute;inset:0;background:#1a1a1a;display:grid;place-items:center}
.base h1{font-size:clamp(3rem,14vw,9rem);font-weight:800;letter-spacing:-.08em;margin:0;color:rgba(255,255,255,.08)}
.reveal{position:absolute;inset:0;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;clip-path:circle(0 at 50% 50%);transition:clip-path .15s linear;display:grid;place-items:center}
.reveal h1{font-size:clamp(2.5rem,10vw,6rem);font-weight:800;letter-spacing:-.06em;margin:0;mix-blend-mode:difference}
.hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35);z-index:2}
.cursor{position:fixed;width:18px;height:18px;border:1.5px solid #fff;border-radius:50%;pointer-events:none;z-index:10;transform:translate(-50%,-50%);transition:width .2s,height .2s}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="base"><h1>HOLD</h1></div><div class="reveal" id="r"><h1>REVEAL</h1></div><p class="hint">Move to open the aperture</p></div><div class="cursor" id="c"></div>
<script>const s=document.getElementById('s'),r=document.getElementById('r'),c=document.getElementById('c');s.onmousemove=e=>{const x=(e.clientX/innerWidth)*100,y=(e.clientY/innerHeight)*100;r.style.clipPath='circle(28vmax at '+x+'% '+y+'%)';c.style.left=e.clientX+'px';c.style.top=e.clientY+'px'};s.onmouseleave=()=>{r.style.clipPath='circle(0 at 50% 50%)'};</script>
</body>
</html>
