<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0859
    slug: alerts-error-alert-03
    title: Critical Pulse Alert
    category: alerts
    tags: alerts, error
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0859 — Critical Pulse Alert</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background: #0a0808;
      font-family: 'Outfit', sans-serif;
      color: #f0e8e8;
    }

    .alert {
      position: relative;
      width: min(100%, 480px);
      padding: 1.3rem 1.4rem;
      background: #140c0c;
      border-radius: 10px;
      overflow: hidden;
    }

    .alert::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid #ef4444;
      border-radius: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.15); }
      50% { opacity: 0.5; box-shadow: inset 0 0 40px rgba(239, 68, 68, 0.3); }
    }

    .row {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #f87171;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .alert h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fca5a5;
      margin-bottom: 0.3rem;
    }

    .alert p {
      font-size: 0.82rem;
      color: rgba(240, 232, 232, 0.55);
      line-height: 1.55;
    }

    .meta {
      position: relative;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid rgba(239, 68, 68, 0.15);
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(248, 113, 113, 0.5);
    }

    @media (prefers-reduced-motion: reduce) {
      .alert::before { animation: none; }
    }
  </style>
</head>
<body>
  <div class="alert" role="alert" aria-live="assertive">
    <div class="row">
      <div class="icon" aria-hidden="true">!</div>
      <div>
        <h2>Authentication service down</h2>
        <p>Login and token refresh are unavailable. Our team has been notified and is investigating the outage.</p>
      </div>
    </div>
    <div class="meta">
      <span>Incident #8842</span>
      <span>Est. resolution · 45 min</span>
    </div>
  </div>
</body>
</html>
