<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 049
    slug: floating-particle-dots
    title: Floating Particle Dots
    category: backgrounds
    tags: particles, dots
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>049 — Floating Particle Dots</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;overflow:hidden;position:relative;background:#0a0a0a;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;display:grid;place-items:center}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    canvas{position:absolute;inset:0;width:100%;height:100%}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas><div class="label"><p class="kicker">Background</p><h1>Particles</h1><p class="sub">Dots float and connect.</p></div>
<script>const c=document.getElementById('c'),x=c.getContext('2d');let d=[],m={x:-999,y:-999};const N=70;function resize(){c.width=innerWidth;c.height=innerHeight;d=Array.from({length:N},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.8+.6}));}resize();addEventListener('resize',resize);addEventListener('mousemove',e=>{m.x=e.clientX;m.y=e.clientY;});function frame(){x.clearRect(0,0,c.width,c.height);for(let i=0;i<d.length;i++){const a=d[i];a.x+=a.vx;a.y+=a.vy;if(a.x<0||a.x>c.width)a.vx*=-1;if(a.y<0||a.y>c.height)a.vy*=-1;x.beginPath();x.arc(a.x,a.y,a.r,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.55)';x.fill();for(let j=i+1;j<d.length;j++){const b=d[j],dx=a.x-b.x,dy=a.y-b.y,dist=Math.hypot(dx,dy);if(dist<110){x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.strokeStyle='rgba(255,255,255,'+(0.18*(1-dist/110))+')';x.stroke();}}}requestAnimationFrame(frame);}frame();</script>
</body>
</html>
