<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1531
    slug: reveal-line-scan
    title: Line Scan Reveal
    category: reveals
    tags: reveal, scan, line
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1531 - Line Scan Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;overflow:hidden;background:#000}.scene{position:relative;height:100vh}.bg{position:absolute;inset:0;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;clip-path:inset(0 0 100% 0);animation:scan 2s cubic-bezier(.22,.61,.36,1) forwards}.scanline{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#6cffb8,transparent);box-shadow:0 0 20px #6cffb8;animation:move 2s cubic-bezier(.22,.61,.36,1) forwards;z-index:2}@keyframes scan{to{clip-path:inset(0)}}@keyframes move{to{top:100%}}.label{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:2.5rem;font-weight:800;z-index:1;opacity:0;animation:show .5s .8s forwards}@keyframes show{to{opacity:1}}
  </style>
</head>
<body>
<div class="scene"><div class="bg"></div><div class="scanline"></div><h1 class="label">Scanned</h1></div>

</body>
</html>
