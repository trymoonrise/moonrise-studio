<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1200
    slug: countdown-dark-countdown-06
    title: Dark Countdown 06
    category: countdown
    tags: countdown, dark
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1200 - Dark Countdown 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;background:#000;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.marq-track{animation:none!important}}
    .marq{overflow:hidden;padding:1rem 0;opacity:.25}
    .marq-track{display:flex;gap:3rem;width:max-content;animation:scroll 40s linear infinite;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2rem,6vw,4rem);font-weight:800;letter-spacing:-.06em;white-space:nowrap}
    .marq--2 .marq-track{animation-direction:reverse;animation-duration:50s;opacity:.5}
    @keyframes scroll{to{transform:translateX(-50%)}}
    .center{text-align:center;padding:2rem;position:relative;z-index:1}
    .center .kicker{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#555;margin-bottom:1rem}
    .center .time{font-family:"Syne",system-ui,sans-serif;font-size:clamp(3rem,12vw,6.5rem);font-weight:800;letter-spacing:-.08em;font-variant-numeric:tabular-nums}
  </style>
</head>
<body>
<div class="marq" aria-hidden="true"><div class="marq-track"><span>00:00:00 · DARK · VOID · 00:00:00 · DARK · VOID · </span><span>00:00:00 · DARK · VOID · 00:00:00 · DARK · VOID · </span></div></div>
    <div class="center"><p class="kicker">Until blackout</p><div class="time" id="t">48:00:00</div></div>
    <div class="marq marq--2" aria-hidden="true"><div class="marq-track"><span>COUNTING · DOWN · COUNTING · DOWN · </span><span>COUNTING · DOWN · COUNTING · DOWN · </span></div></div>
<script>let s=48*3600;const el=document.getElementById('t');function draw(){const h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),sec=String(s%60).padStart(2,'0');el.textContent=h+':'+m+':'+sec;}draw();setInterval(()=>{s=Math.max(0,s-1);draw();},1000);</script>
</body>
</html>
