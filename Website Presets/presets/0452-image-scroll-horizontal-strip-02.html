<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0452
    slug: image-scroll-horizontal-strip-02
    title: Horizontal Strip 02
    category: image-scroll
    tags: image-scroll, horizontal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0452 - Horizontal Strip 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#05070b;color:#e6f3ff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;overflow:hidden}.strip{display:flex;gap:16px;padding:0 12vw;transform:translateX(var(--x,0px));will-change:transform}.img{width:min(62vw,420px);aspect-ratio:9/12;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:#0b1220}.img img{width:100%;height:100%;object-fit:cover;filter:contrast(1.05) saturate(1.2)}.cap{position:fixed;left:22px;top:18px;color:rgba(230,243,255,.6);letter-spacing:.14em;text-transform:uppercase;font-size:.78rem}
  </style>
</head>
<body>
<div class="cap">Horizontal strip</div><div class="track" id="t"><div class="sticky"><div class="strip" id="s"><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="img"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const s=document.getElementById('s');addEventListener('scroll',()=>{const p=prog();const max=s.scrollWidth-innerWidth+innerWidth*.1;s.style.setProperty('--x',-p*max+'px');},{passive:true});</script>
</body>
</html>
