<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0175
    slug: selects-custom-dropdown
    title: Custom Dropdown
    category: selects
    tags: selects, custom
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0175 - Custom Dropdown</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.dd{position:relative;min-width:200px}.btn{width:100%;padding:12px 16px;background:#1a1a2e;border:1px solid #333;border-radius:8px;color:#fff;text-align:left;cursor:pointer;display:flex;justify-content:space-between}.menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1a2e;border:1px solid #333;border-radius:8px;display:none;overflow:hidden;z-index:5}.menu.open{display:block}.opt{padding:10px 16px;color:#ccc;cursor:pointer;font-size:.9rem}.opt:hover{background:#2a2a40;color:#fff}
  </style>
</head>
<body>
<div class="dd"><button class="btn" id="b">Select <span>▾</span></button><div class="menu" id="m"><div class="opt">Design</div><div class="opt">Dev</div><div class="opt">Marketing</div></div></div>
<script>const b=document.getElementById('b'),m=document.getElementById('m');b.onclick=e=>{e.stopPropagation();m.classList.toggle('open');};document.onclick=()=>m.classList.remove('open');m.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{b.childNodes[0].textContent=o.textContent+' ';m.classList.remove('open');});</script>
</body>
</html>
