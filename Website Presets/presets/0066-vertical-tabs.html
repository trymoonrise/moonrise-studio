<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0066
    slug: vertical-tabs
    title: Vertical Tabs
    category: tabs
    tags: vertical
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0066 - Vertical Tabs</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:flex;min-height:100vh;background:#f5f5f5;margin:0} .tabs{display:flex;flex-direction:column;width:180px;background:#fff;border-right:1px solid #eee;padding:1rem 0} .tab{padding:12px 24px;border:none;background:none;text-align:left;cursor:pointer;color:#666;font-size:.95rem;border-left:3px solid transparent} .tab.active{color:#111;font-weight:600;border-color:#6c8cff;background:#f8f9ff} .panel{flex:1;padding:3rem;font-size:1.2rem;color:#333}
  </style>
</head>
<body>
<div class="tabs"><button class="tab active" data-t="Overview">Overview</button><button class="tab" data-t="Analytics">Analytics</button><button class="tab" data-t="Settings">Settings</button></div><div class="panel" id="p">Overview content</div>
<script>document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('p').textContent=t.dataset.t+' content';});</script>
</body>
</html>
