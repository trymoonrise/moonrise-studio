<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1822
    slug: maps-circular-vignette
    title: Circular Vignette Map
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1822 — Circular Vignette Map</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#1c1917;color:#fafaf9;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(500px,92vw);text-align:center}
.lens{position:relative;aspect-ratio:1;border-radius:50%;overflow:hidden;box-shadow:inset 0 0 80px rgba(0,0,0,.65),0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1)}
.lens iframe{width:130%;height:130%;margin:-15%;filter:sepia(.25) contrast(1.05)}
.vignette{position:absolute;inset:0;background:radial-gradient(circle,transparent 42%,rgba(28,25,23,.92) 78%);pointer-events:none}
.cross{position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px;pointer-events:none}
.cross::before,.cross::after{content:'';position:absolute;background:rgba(250,250,249,.7)}
.cross::before{left:50%;top:0;width:1px;height:100%}.cross::after{top:50%;left:0;height:1px;width:100%}
h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:1.7rem;margin:1.1rem 0 .25rem}
p{margin:0;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;opacity:.4}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="lens"><iframe src="https://www.google.com/maps?q=Kyoto%2C%20Japan&hl=en&z=13&output=embed" title="Vignette map" loading="lazy"></iframe><div class="vignette"></div><div class="cross"></div></div><h1>Through the lens</h1><p>Circular vignette</p></div>

</body>
</html>
