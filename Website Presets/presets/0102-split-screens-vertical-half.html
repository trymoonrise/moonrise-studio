<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0102
    slug: split-screens-vertical-half
    title: Vertical Split
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0102 — Vertical Split</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#0a0a0a;color:#fff}
    .stage{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;position:relative}
.pane{position:relative;overflow:hidden;display:grid;place-items:center;padding:2rem}
.pane.a{background:#f5f1ea;color:#111;clip-path:polygon(0 0,100% 0,85% 100%,0 100%);animation:openL 1.2s cubic-bezier(.22,1,.36,1) both}
.pane.b{background:#0a0a0a;color:#fff;margin-left:-12%;clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);animation:openR 1.2s cubic-bezier(.22,1,.36,1) both}
.pane h1{font-size:clamp(2.5rem,8vw,5.5rem);font-weight:800;letter-spacing:-.07em;margin:0;line-height:.9}
.pane p{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;margin:1rem 0 0;opacity:.5}
.slash{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(#f5f1ea,transparent,#0a0a0a);transform:translateX(-50%) skewX(-8deg);z-index:3;animation:slash 1.4s ease both}
.orb{position:absolute;width:40vmax;height:40vmax;border-radius:50%;filter:blur(60px);opacity:.2;pointer-events:none}
.pane.a .orb{background:#ff6b4a;right:-20%;bottom:-20%;animation:drift 10s ease-in-out infinite alternate}
.pane.b .orb{background:#6c8cff;left:-20%;top:-20%;animation:drift 12s ease-in-out infinite alternate-reverse}
@keyframes openL{from{clip-path:polygon(0 0,0 0,0 100%,0 100%)}}
@keyframes openR{from{clip-path:polygon(100% 0,100% 0,100% 100%,100% 100%)}}
@keyframes slash{from{opacity:0;transform:translateX(-50%) skewX(-8deg) scaleY(0)}}
@keyframes drift{to{transform:translate(8%,-6%)}}
@media(max-width:700px){.stage{grid-template-columns:1fr}.pane.a,.pane.b{margin:0;clip-path:none}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage"><div class="pane a"><div class="orb"></div><div><h1>Left<br>field</h1><p>Vertical rupture</p></div></div><div class="slash" aria-hidden="true"></div><div class="pane b"><div class="orb"></div><div><h1>Right<br>field</h1><p>Split reality</p></div></div></div>

</body>
</html>
