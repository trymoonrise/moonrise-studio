<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1677
    slug: scroll-video-parallax-panels
    title: Video Parallax Panels
    category: scroll-animations
    tags: scroll, video, parallax, panels
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1677 - Video Parallax Panels</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;background:#111;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    .bg{position:fixed;inset:0;z-index:-1}
    .bg video{width:100%;height:100%;object-fit:cover;transform:scale(1.1) translateY(var(--vid-y,0px))}
    .bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.75))}
    .panel{min-height:85vh;display:flex;align-items:center;padding:clamp(2rem,6vw,5rem);opacity:var(--o,0);transform:translateY(var(--y,40px))}
    .panel:nth-child(odd){justify-content:flex-start}.panel:nth-child(even){justify-content:flex-end;text-align:right}
    .card{max-width:min(420px,90vw);padding:1.5rem 1.6rem;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px)}
    .card h2{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.45rem}
    .card p{font-size:.9rem;color:rgba(255,255,255,.72);line-height:1.55}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="bg" id="bg"><video src="../stock/media/heroes/forest-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video></div><section class="panel" style="--i:0"><div class="card"><h2>Scene one</h2><p>Fixed video drifts slowly while panels float over it.</p></div></section><section class="panel" style="--i:1"><div class="card"><h2>Scene two</h2><p>Each block fades and rises on its own scroll beat.</p></div></section><section class="panel" style="--i:2"><div class="card"><h2>Scene three</h2><p>Layered parallax without leaving the viewport.</p></div></section>
<script>const bg=document.getElementById('bg'),panels=[...document.querySelectorAll('.panel')],reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function tick(){const p=scrollY/(document.documentElement.scrollHeight-innerHeight||1);bg.style.setProperty('--vid-y',(reduced?0:-p*80).toFixed(1)+'px');panels.forEach((panel,i)=>{const r=panel.getBoundingClientRect();const t=1-Math.min(1,Math.max(0,(r.top-innerHeight*.55)/(innerHeight*.45)));const e=ease(t);panel.style.setProperty('--o',e.toFixed(3));panel.style.setProperty('--y',((1-e)*40).toFixed(1)+'px')})}let raf=false;addEventListener('scroll',()=>{if(raf)return;raf=true;requestAnimationFrame(()=>{raf=false;tick()})},{passive:true});addEventListener('resize',tick,{passive:true});tick();</script>
</body>
</html>
