<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0464
    slug: rotate-scroll-spin-wheel-01
    title: Spin Wheel 01
    category: rotate-scroll
    tags: rotate-scroll, spin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0464 — Spin Wheel 01</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0b0b10;color:#fff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center}.wheel{width:min(80vw,520px);aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.12);position:relative;transform:rotate(var(--r,0deg));background:radial-gradient(circle at 50% 50%,rgba(255,108,176,.12),transparent 60%),radial-gradient(circle at 30% 20%,rgba(108,140,255,.14),transparent 55%)}.spoke{position:absolute;left:50%;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;transform-origin:center center;box-shadow:0 0 0 6px rgba(255,255,255,.08)}.label{position:absolute;inset:0;display:grid;place-items:center;text-align:center}h1{font-size:clamp(2.1rem,6vw,3.4rem);letter-spacing:-.05em}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="wheel" id="w"><div class="spoke" style="transform:translate(-50%,-50%) rotate(0deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(45deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(90deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(135deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(180deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(225deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(270deg) translateY(-46%)"></div><div class="spoke" style="transform:translate(-50%,-50%) rotate(315deg) translateY(-46%)"></div><div class="label"><h1>Spin wheel</h1><p style="opacity:.7;margin-top:.6rem">Scroll rotates the ring</p></div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const w=document.getElementById('w');addEventListener('scroll',()=>w.style.setProperty('--r',prog()*1080+'deg'),{passive:true});</script>
</body>
</html>
