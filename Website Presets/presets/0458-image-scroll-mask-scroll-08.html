<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0458
    slug: image-scroll-mask-scroll-08
    title: Mask Scroll 08
    category: image-scroll
    tags: image-scroll, mask
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0458 — Mask Scroll 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0a1628;color:#b8d4f0;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center}.frame{width:min(90vw,700px);aspect-ratio:16/10;border-radius:20px;overflow:hidden;position:relative;-webkit-mask-image:linear-gradient(90deg,#000 calc(var(--w,0)*1%),transparent calc(var(--w,0)*1%));mask-image:linear-gradient(90deg,#000 calc(var(--w,0)*1%),transparent calc(var(--w,0)*1%))}.frame img{width:100%;height:100%;object-fit:cover}.label{margin-top:1.5rem;text-align:center;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(184,212,240,.6)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div><div class="frame" id="f"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="label">Mask wipe on scroll</div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const f=document.getElementById('f');addEventListener('scroll',()=>{f.style.setProperty('--w',String(prog()*100));},{passive:true});</script>
</body>
</html>
