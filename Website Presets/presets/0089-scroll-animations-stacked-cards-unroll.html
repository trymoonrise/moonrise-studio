<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0089
    slug: scroll-animations-stacked-cards-unroll
    title: Stacked Cards Unroll
    category: scroll-animations
    tags: scroll-animations, cards
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0089 — Stacked Cards Unroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#eee;padding:4rem 2rem} .card{max-width:400px;margin:0 auto 2rem;padding:2rem;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);opacity:0;transform:translateY(60px) scale(.95);transition:all .6s} .card.vis{opacity:1;transform:none}
  </style>
</head>
<body>
<div class="card">Card 1</div><div class="card">Card 2</div><div class="card">Card 3</div><div class="card">Card 4</div>
<script>new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('vis')),{threshold:.15}).observe.bind(null);document.querySelectorAll('.card').forEach(c=>new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('vis')),{threshold:.15}).observe(c));</script>
</body>
</html>
