<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1674
    slug: scroll-video-pinch-frame
    title: Video Pinch Frame
    category: scroll-animations
    tags: scroll, video, pinch, sticky
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1674 - Video Pinch Frame</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;background:#f4f5f8;color:#111;font-family:system-ui,-apple-system,sans-serif}
    .track{height:280vh}
    .stage{position:sticky;top:0;height:100vh;display:grid;place-items:center;padding:2rem}
    .frame{width:100%;height:100%;border-radius:var(--radius,0px);overflow:hidden;transform:scale(var(--scale,1));box-shadow:0 var(--shadow,0px) 80px rgba(15,23,42,var(--shadow-o,.08));transition:box-shadow .2s}
    video{width:100%;height:100%;object-fit:cover;display:block}
    .copy{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;opacity:var(--copy-o,0)}
    .copy h2{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;color:#fff;text-shadow:0 8px 32px rgba(0,0,0,.5)}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="track" id="track"><div class="stage"><div class="frame"><video src="../stock/media/heroes/spring-clip-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video><div class="copy"><h2>Pinch into focus</h2></div></div></div></div>
<script>function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function lerp(a,b,t){return a+(b-a)*t}function prog(track){const r=track.getBoundingClientRect();const h=r.height-innerHeight;return h>0?ease(Math.min(1,Math.max(0,-r.top/h))):0}function pageProg(){const max=document.documentElement.scrollHeight-innerHeight;return max>0?ease(Math.min(1,scrollY/max)):0};const track=document.getElementById('track'),frame=track.querySelector('.frame'),reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function tick(){const p=prog(track);if(reduced){frame.style.setProperty('--scale','1');frame.style.setProperty('--radius','18px');return}frame.style.setProperty('--scale',lerp(1,.72,p).toFixed(3));frame.style.setProperty('--radius',lerp(0,22,p).toFixed(1)+'px');frame.style.setProperty('--shadow',lerp(0,28,p).toFixed(0)+'px');frame.style.setProperty('--shadow-o',lerp(.08,.22,p).toFixed(3));frame.style.setProperty('--copy-o',Math.max(0,(p-.55)/.45).toFixed(3))}let raf=false;addEventListener('scroll',()=>{if(raf)return;raf=true;requestAnimationFrame(()=>{raf=false;tick()})},{passive:true});addEventListener('resize',tick,{passive:true});tick();</script>
</body>
</html>
