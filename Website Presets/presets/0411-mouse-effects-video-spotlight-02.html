<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0411
    slug: mouse-effects-video-spotlight-02
    title: Video Spotlight 02
    category: mouse-effects
    tags: mouse-effects, video
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0411 — Video Spotlight 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#000}.spot{position:fixed;inset:0;background:radial-gradient(circle 250px at var(--x,50%) var(--y,50%),transparent,#000 100%)}video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1}
  </style>
</head>
<body>
<video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video><div class="spot" id="s"></div>
<script>
    const s = document.getElementById('s');
    let tx = innerWidth / 2;
    let ty = innerHeight / 2;
    let cx = tx;
    let cy = ty;

    addEventListener('mousemove', (e) => {
      tx = e.clientX;
      ty = e.clientY;
    }, { passive: true });

    function tick() {
      cx += (tx - cx) * 0.12;
      cy += (ty - cy) * 0.12;
      s.style.setProperty('--x', cx + 'px');
      s.style.setProperty('--y', cy + 'px');
      requestAnimationFrame(tick);
    }

    s.style.setProperty('--x', cx + 'px');
    s.style.setProperty('--y', cy + 'px');
    tick();
  </script>
</body>
</html>
