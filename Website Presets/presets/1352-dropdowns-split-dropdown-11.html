  <style>

    body{display:grid;place-items:center;min-height:100vh;background:#100c18}.dd{position:relative}.btn{padding:10px 20px;border:1px solid #9080b0;border-radius:8px;background:#1a1424;color:#ede8ff;cursor:pointer}.menu{position:absolute;top:calc(100% + 4px);left:0;min-width:160px;background:#1a1424;border:1px solid #9080b044;border-radius:8px;display:none;overflow:hidden;z-index:5}.menu.open{display:block}.opt{padding:10px 16px;color:#ede8ff;cursor:pointer;font-size:.9rem}.opt:hover{background:#a78bfa22}

<body>
<div class="dd"><button class="btn" id="b">Split Dropdown 967 ▾</button><div class="menu" id="m"><div class="opt">One</div><div class="opt">Two</div><div class="opt">Three</div></div></div>
<script>const b=document.getElementById('b'),m=document.getElementById('m');b.onclick=e=>{e.stopPropagation();m.classList.toggle('open');};document.onclick=()=>m.classList.remove('open');</script>
</body>
