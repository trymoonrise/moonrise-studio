<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0805
    slug: popovers-click-popover-01
    title: Click Info Popover
    category: popovers
    tags: popovers, click
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0805 - Click Info Popover</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    .demo { text-align: center; }

    .trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #111827;
      color: #94a3b8;
      font-size: 0.9rem;
      transition: border-color 0.25s, color 0.25s;
    }

    .trigger:hover, .trigger[aria-expanded="true"] {
      border-color: #00d4aa;
      color: #00d4aa;
    }

    .wrap { position: relative; display: inline-block; }

    .popover {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      width: 260px;
      padding: 1rem;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 10;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.45);
    }

    .popover.open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.9); }
      to { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    .popover::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: #111827;
      border-right: 1px solid #334155;
      border-bottom: 1px solid #334155;
    }

    .popover h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: #00d4aa;
      margin-bottom: 0.35rem;
    }

    .popover p {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .popover a {
      display: inline-block;
      margin-top: 0.65rem;
      font-size: 0.75rem;
      color: #38bdf8;
      text-decoration: none;
      animation: linkFade 0.4s ease 0.15s backwards;
    }

    @keyframes linkFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .popover.open { animation: none; }
    }
  </style>
</head>
<body>
  <div class="demo">
    <div class="wrap">
      <button type="button" class="trigger" id="trigger" aria-expanded="false" aria-controls="pop">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        What is API rate limiting?
      </button>
      <div class="popover" id="pop" role="dialog">
        <h3>Rate limiting</h3>
        <p>Requests are capped at 1,000 per minute per API key. Exceeding the limit returns HTTP 429 with a Retry-After header.</p>
        <a href="#">Read documentation →</a>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('trigger');
    const pop = document.getElementById('pop');

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = !pop.classList.contains('open');
      pop.classList.toggle('open', open);
      trigger.setAttribute('aria-expanded', String(open));
    });

    document.addEventListener('click', () => {
      pop.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    });
  </script>
</body>
</html>
