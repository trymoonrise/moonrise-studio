<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1022
    slug: announcements-split-banner-10
    title: Split Banner 10
    category: announcements
    tags: announcements, split
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1022 — Split Banner 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#12141a;font-family:Manrope,sans-serif;perspective:1100px}
    .split{
      width:min(720px,calc(100% - 2rem));height:140px;position:relative;
      transform:rotateX(6deg);transform-style:preserve-3d;
      animation:open 1.1s cubic-bezier(.16,1,.3,1) both;
    }
    .half{
      position:absolute;top:0;bottom:0;width:50%;display:grid;place-items:center;padding:1rem;overflow:hidden;
      transform-style:preserve-3d;
    }
    .half--l{left:0;background:#7ee0c3;color:#0b1a16;border-radius:20px 0 0 20px;transform-origin:left center}
    .half--r{right:0;background:#1c2230;color:#fff;border-radius:0 20px 20px 0;transform-origin:right center}
    .k{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;opacity:.7;margin-bottom:.35rem}
    .t{font-family:Syne,sans-serif;font-size:clamp(1.2rem,3vw,1.6rem);font-weight:800;letter-spacing:-.03em;line-height:1}
    @keyframes open{from{opacity:0;transform:rotateX(16deg) scale(.96)}to{opacity:1;transform:rotateX(6deg) scale(1)}}
    .split .half--l{animation:slide-l 1s cubic-bezier(.16,1,.3,1) both}
    .split .half--r{animation:slide-r 1s cubic-bezier(.16,1,.3,1) both}
    @keyframes slide-l{from{transform:translateX(-24%) rotateY(12deg);opacity:0}to{transform:none;opacity:1}}
    @keyframes slide-r{from{transform:translateX(24%) rotateY(-12deg);opacity:0}to{transform:none;opacity:1}}
    @media (prefers-reduced-motion:reduce){.split,.half{animation:none;transform:none}}
  </style>
</head>
<body>
  <div class="split" role="status">
    <div class="half half--l">
      <div>
        <div class="k">Before</div>
        <div class="t">Manual handoff</div>
      </div>
    </div>
    <div class="half half--r">
      <div>
        <div class="k">After</div>
        <div class="t">Auto routing live</div>
      </div>
    </div>
  </div>
</body>
</html>
