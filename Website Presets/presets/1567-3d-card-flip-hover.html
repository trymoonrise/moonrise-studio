<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1567
    slug: 3d-card-flip-hover
    title: 3D Flip Card Hover
    category: 3d-effects
    tags: 3d, card, flip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1567 — 3D Flip Card Hover</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0e1018;perspective:1200px;font-family:Outfit,sans-serif;padding:2rem}
    .card{width:min(280px,80vw);height:380px;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.16,1,.3,1);cursor:pointer}
    .card:hover,.card:focus-within{transform:rotateY(180deg)}
    .face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem;border:1px solid rgba(255,255,255,.12)}
    .front{background:linear-gradient(160deg,#1a1f35,#0d101c);color:#fff}
    .front::before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 0deg,#6c8cff,#ff6bcb,#7ee0c3,#6c8cff);opacity:.35;filter:blur(30px);animation:spin 8s linear infinite}
    .back{background:linear-gradient(160deg,#6c8cff,#3d4fc8);color:#fff;transform:rotateY(180deg)}
    .eyebrow{position:relative;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;opacity:.7;margin:0 0 .4rem}
    h2{position:relative;margin:0;font-family:Syne,sans-serif;font-size:1.8rem;letter-spacing:-.03em}
    p{position:relative;margin:.6rem 0 0;font-size:.9rem;line-height:1.5;opacity:.85}
    .mark{position:absolute;top:1.4rem;right:1.4rem;width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.35);display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:800}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.card{transition:none}.front::before{animation:none}}
  </style>
</head>
<body>
  <div class="card" tabindex="0" role="button" aria-label="Flip card">
    <div class="face front">
      <div class="mark">A</div>
      <p class="eyebrow">Hover / focus</p>
      <h2>Obsidian</h2>
      <p>Flip into the other side of the idea.</p>
    </div>
    <div class="face back">
      <p class="eyebrow">Revealed</p>
      <h2>Depth</h2>
      <p>A full 180° rotateY with glass glare and a living conic wash.</p>
    </div>
  </div>
</body>
</html>
