<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1559
    slug: loader-stacked-cards
    title: Stacked Cards Loader
    category: loading
    tags: loading, stack, cards
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1559 - Stacked Cards Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f0f0f0}.deck{position:relative;width:80px;height:100px}.card{position:absolute;inset:0;border-radius:10px;background:#fff;border:1px solid #e5e5e5;box-shadow:0 4px 12px rgba(0,0,0,.08);animation:deck 1.4s ease-in-out infinite}.card:nth-child(1){animation-delay:0s;z-index:3}.card:nth-child(2){animation-delay:.15s;z-index:2}.card:nth-child(3){animation-delay:.3s;z-index:1}@keyframes deck{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(3deg)}}
  </style>
</head>
<body>
<div class="deck"><div class="card"></div><div class="card"></div><div class="card"></div></div>

</body>
</html>
