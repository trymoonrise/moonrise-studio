<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1591
    slug: 3d-loader-cube
    title: 3D Cube Loader
    category: 3d-effects
    tags: 3d, loader, cube
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1591 — 3D Cube Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#07090f;overflow:hidden;font-family:'JetBrains Mono',monospace}
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    .band{position:absolute;left:-20%;width:140%;overflow:hidden}
    .band:nth-child(1){top:10%}
    .band:nth-child(2){top:22%}
    .band:nth-child(3){top:70%}
    .band:nth-child(4){top:82%}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run var(--s,18s) linear infinite;font-size:clamp(1rem,3vw,1.6rem);letter-spacing:.35em;text-transform:uppercase;color:rgba(108,140,255,.2)}
    .band:nth-child(2) .track{animation-direction:reverse;--s:22s;color:rgba(255,108,176,.18)}
    .band:nth-child(3) .track{--s:20s;color:rgba(108,255,184,.16)}
    .band:nth-child(4) .track{animation-direction:reverse;--s:26s;color:rgba(245,158,11,.16)}
    .hex{position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,rgba(108,140,255,.2),transparent 35%),radial-gradient(circle at 80% 70%,rgba(255,108,176,.18),transparent 40%);animation:pulse 5s ease-in-out infinite}
    .bits{position:absolute;inset:0;overflow:hidden}
    .bits i{position:absolute;font-size:.7rem;color:rgba(108,140,255,.25);animation:fall linear infinite;white-space:nowrap}
    .stage{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;perspective:600px}
    .wrap{text-align:center}
    .cube{position:relative;width:40px;height:40px;transform-style:preserve-3d;animation:spin 1.2s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotateX(45deg) rotateY(360deg)}}
    .f{position:absolute;inset:0;background:#6c8cff;opacity:.9}
    .f1{transform:translateZ(20px)}
    .f2{transform:rotateY(180deg) translateZ(20px);background:#ff6cb0}
    .f3{transform:rotateY(90deg) translateZ(20px);background:#6cffb8}
    .f4{transform:rotateY(-90deg) translateZ(20px);background:#764ba2}
    p{font-size:.8rem;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase}
    @keyframes run{to{transform:translateX(-50%)}}
    @keyframes pulse{50%{opacity:.7}}
    @keyframes fall{to{transform:translateY(110vh)}}
    @media (prefers-reduced-motion:reduce){.track,.cube,.hex,.bits i{animation:none}}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="hex"></div>
    <div class="band"><div class="track"><span>LOADING · BUFFER · LOADING · BUFFER · </span><span>LOADING · BUFFER · LOADING · BUFFER · </span></div></div>
    <div class="band"><div class="track"><span>0xFF · WAIT · 0xFF · WAIT · </span><span>0xFF · WAIT · 0xFF · WAIT · </span></div></div>
    <div class="band"><div class="track"><span>CUBE / SPIN / CUBE / SPIN / </span><span>CUBE / SPIN / CUBE / SPIN / </span></div></div>
    <div class="band"><div class="track"><span>PLEASE HOLD · PLEASE HOLD · </span><span>PLEASE HOLD · PLEASE HOLD · </span></div></div>
    <div class="bits" id="bits"></div>
  </div>
  <div class="stage">
    <div class="wrap"><div class="cube"><div class="f f1"></div><div class="f f2"></div><div class="f f3"></div><div class="f f4"></div></div><p>Loading</p></div>
  </div>
  <script>
    const bits=document.getElementById('bits');
    for(let i=0;i<24;i++){
      const el=document.createElement('i');
      el.textContent=Math.random()>.5?'01':'10';
      el.style.left=Math.random()*100+'%';
      el.style.animationDuration=6+Math.random()*10+'s';
      el.style.animationDelay=-Math.random()*10+'s';
      bits.appendChild(el);
    }
  </script>
</body>
</html>
