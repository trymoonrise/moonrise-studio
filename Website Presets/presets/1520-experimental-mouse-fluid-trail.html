<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1520
    slug: experimental-mouse-fluid-trail
    title: Fluid Mouse Trail
    category: experimental
    tags: experimental, mouse, trail, fluid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1520 — Fluid Mouse Trail</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#000;overflow:hidden;cursor:none}canvas{display:block}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>const c=document.getElementById('c'),x=c.getContext('2d');let pts=[];function r(){c.width=innerWidth;c.height=innerHeight;}r();addEventListener('resize',r);addEventListener('mousemove',e=>pts.push({x:e.clientX,y:e.clientY,t:Date.now()}));function d(){x.fillStyle='rgba(0,0,0,.08)';x.fillRect(0,0,c.width,c.height);const now=Date.now();pts=pts.filter(p=>now-p.t<800);if(pts.length>1){x.strokeStyle='#6c8cff';x.lineWidth=3;x.lineCap='round';x.beginPath();pts.forEach((p,i)=>{if(i===0)x.moveTo(p.x,p.y);else x.lineTo(p.x,p.y);});x.stroke();}requestAnimationFrame(d);}d();</script>
</body>
</html>
