<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1437
    slug: backgrounds-rain-effect
    title: Rain Effect Background
    category: backgrounds
    tags: backgrounds, rain, canvas
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1437 - Rain Effect Background</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#0a0a0c;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    canvas{position:absolute;inset:0;width:100%;height:100%}
    .mist{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(10,10,12,.6));pointer-events:none}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<canvas id="rain" aria-hidden="true"></canvas><div class="mist" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Rain</h1><p class="sub">Vertical silence.</p></div>
<script>const c=document.getElementById('rain'),x=c.getContext('2d');let drops=[];function resize(){c.width=innerWidth;c.height=innerHeight;const n=Math.floor(c.width/8);drops=Array.from({length:n},()=>({x:Math.random()*c.width,y:Math.random()*c.height,l:Math.random()*18+8,s:Math.random()*6+4,o:Math.random()*.35+.1}));}resize();addEventListener('resize',resize);function frame(){x.clearRect(0,0,c.width,c.height);for(const d of drops){x.beginPath();x.moveTo(d.x,d.y);x.lineTo(d.x,d.y+d.l);x.strokeStyle='rgba(255,255,255,'+d.o+')';x.lineWidth=1;x.stroke();d.y+=d.s;if(d.y>c.height){d.y=-d.l;d.x=Math.random()*c.width;}}requestAnimationFrame(frame);}frame();</script>
</body>
</html>
