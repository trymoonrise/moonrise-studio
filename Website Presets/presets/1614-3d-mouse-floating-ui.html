<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1614
    slug: 3d-mouse-floating-ui
    title: 3D Floating UI Panel
    category: 3d-mouse
    tags: 3d, mouse, ui
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1614 — 3D Floating UI Panel</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08090f;perspective:1000px;font-family:Outfit,sans-serif;overflow:hidden}
    .panel{width:min(340px,90vw);padding:1.5rem;border-radius:22px;background:rgba(20,24,40,.75);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);color:#fff;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--z,20px));box-shadow:0 30px 60px rgba(0,0,0,.45)}
    .panel h2{margin:0;font-family:Syne,sans-serif;font-size:1.4rem}
    .panel p{margin:.5rem 0 1.2rem;opacity:.6;font-size:.88rem}
    .row{display:flex;gap:.5rem}
    .btn{flex:1;padding:.75rem;border:none;border-radius:12px;font:inherit;font-weight:600;cursor:pointer;transform:translateZ(20px)}
    .btn.p{background:#6c8cff;color:#fff}.btn.g{background:rgba(255,255,255,.08);color:#fff}
    .chip{display:inline-block;padding:.25rem .6rem;border-radius:999px;background:rgba(108,140,255,.2);color:#8aa4ff;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem;transform:translateZ(15px)}
    .shine{position:absolute;inset:0;border-radius:22px;background:radial-gradient(circle at var(--mx,50%) var(--my,30%),rgba(255,255,255,.18),transparent 40%);pointer-events:none;mix-blend-mode:soft-light}
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="shine"></div>
    <span class="chip">Live</span>
    <h2>Floating panel</h2>
    <p>Glass UI that lifts and tilts toward your pointer.</p>
    <div class="row"><button class="btn p" type="button">Confirm</button><button class="btn g" type="button">Cancel</button></div>
  </div>
  <script>
    const p=document.getElementById('panel');let rx=0,ry=0,z=20,trx=0,try_=0,tz=20,mx=50,my=30,cmx=50,cmy=30;
    p.addEventListener('pointermove',e=>{const r=p.getBoundingClientRect();const x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;try_=(x-.5)*18;trx=(.5-y)*14;tz=45;mx=x*100;my=y*100});
    p.addEventListener('pointerleave',()=>{trx=0;try_=0;tz=20});
    (function loop(){rx+=(trx-rx)*.12;ry+=(try_-ry)*.12;z+=(tz-z)*.12;cmx+=(mx-cmx)*.1;cmy+=(my-cmy)*.1;
      p.style.setProperty('--rx',rx+'deg');p.style.setProperty('--ry',ry+'deg');p.style.setProperty('--z',z+'px');
      p.style.setProperty('--mx',cmx+'%');p.style.setProperty('--my',cmy+'%');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
