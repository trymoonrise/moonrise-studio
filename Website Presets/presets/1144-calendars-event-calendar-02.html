<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1144
    slug: calendars-event-calendar-02
    title: Timeline Week Event Calendar
    category: calendars
    tags: calendars, event, timeline, week
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1144 — Timeline Week Event Calendar</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d12;color:#e2e6ed;font-family:Outfit,sans-serif;padding:2rem}
    .cal{width:min(640px,100%)}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .head h2{font-family:Syne,sans-serif;font-size:1.2rem;letter-spacing:-.03em;margin:0}
    .nav{display:flex;gap:.5rem}
    .nav button{width:32px;height:32px;border:1px solid rgba(255,255,255,.1);background:transparent;color:inherit;border-radius:6px;cursor:pointer;transition:border-color .3s}
    .nav button:hover{border-color:#38bdf8}
    .week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
    .day{text-align:center;padding:.5rem;font-size:.7rem;color:rgba(226,230,237,.4)}
    .day.today{color:#38bdf8;font-weight:500}
    .day .num{display:block;font-family:Syne,sans-serif;font-size:1.1rem;font-weight:700;color:#e2e6ed;margin-top:2px}
    .day.today .num{position:relative}
    .day.today .num::after{content:'';position:absolute;bottom:-4px;left:50%;width:4px;height:4px;border-radius:50%;background:#38bdf8;transform:translateX(-50%);animation:pulse-dot 2s ease infinite}
    .timeline{position:relative;padding-left:60px}
    .time{position:absolute;left:0;font-size:.65rem;color:rgba(226,230,237,.3);width:50px;text-align:right}
    .event{position:relative;padding:.75rem 1rem;margin-bottom:.5rem;border-radius:8px;border-left:3px solid;font-size:.8rem;animation:slide-event .5s ease backwards}
    .event:nth-child(2){animation-delay:.1s;border-color:#38bdf8;background:rgba(56,189,248,.08)}
    .event:nth-child(3){animation-delay:.2s;border-color:#22d3ee;background:rgba(34,211,238,.06);margin-left:60px}
    .event:nth-child(4){animation-delay:.3s;border-color:#64748b;background:rgba(100,116,139,.08)}
    .event strong{display:block;font-family:Syne,sans-serif;font-size:.85rem;margin-bottom:2px}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.5;transform:translateX(-50%) scale(1.5)}}
    @keyframes slide-event{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.day.today .num::after,.event{animation:none}}
  </style>
</head>
<body>
  <div class="cal">
    <div class="head"><h2>March 2026</h2><div class="nav"><button>‹</button><button>›</button></div></div>
    <div class="week">
      <div class="day">Mon<span class="num">16</span></div><div class="day">Tue<span class="num">17</span></div><div class="day today">Wed<span class="num">18</span></div><div class="day">Thu<span class="num">19</span></div><div class="day">Fri<span class="num">20</span></div><div class="day">Sat<span class="num">21</span></div><div class="day">Sun<span class="num">22</span></div>
    </div>
    <div class="timeline">
      <div class="event"><span class="time">09:00</span><strong>Standup</strong>Engineering sync · 15 min</div>
      <div class="event"><span class="time">11:00</span><strong>Design review</strong>Component library v2</div>
      <div class="event"><span class="time">14:30</span><strong>Client call</strong>Vertex Dynamics onboarding</div>
    </div>
  </div>
</body>
</html>
