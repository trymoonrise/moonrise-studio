<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0442
    slug: scroll-animations-scale-on-scroll-06
    title: Scale On Scroll 06
    category: scroll-animations
    tags: scroll-animations, scale
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0442 - Scale On Scroll 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0a0a0c;color:#fff;font-family:system-ui}.track{height:240vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}.frame{width:min(90vw,780px);aspect-ratio:16/10;border-radius:26px;overflow:hidden;border:1px solid rgba(255,255,255,.12);transform:scale(var(--s,1)) rotate(var(--r,0deg));filter:saturate(1.1) contrast(1.05)}.frame img{width:100%;height:100%;object-fit:cover;transform:scale(1.12)}.tag{position:fixed;left:22px;top:18px;color:rgba(255,255,255,.6);letter-spacing:.14em;text-transform:uppercase;font-size:.78rem}
  </style>
</head>
<body>
<div class="tag">Scale on scroll</div><div class="track" id="t"><div class="sticky"><div class="frame" id="f"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const f=document.getElementById('f');addEventListener('scroll',()=>{const p=prog();f.style.setProperty('--s',String(1+p*.45));f.style.setProperty('--r',-2+p*5+'deg');},{passive:true});</script>
</body>
</html>
