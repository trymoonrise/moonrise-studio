--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0788 — Card Form 10</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#edf6f1;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.card{width:min(470px,94vw);background:#fff;border-radius:28px;padding:26px;box-shadow:14px 14px 0 #b8ddc9,28px 28px 0 #d8eee2}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.head h1{font:400 34px 'Instrument Serif';margin:0}.mark{width:38px;height:38px;border:1px solid #163c2c;border-radius:50%;display:grid;place-items:center;animation:turn 9s linear infinite}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card input,.card textarea{width:100%;border:0;background:#f2f7f4;border-radius:12px;padding:13px;outline:0}.card textarea{min-height:100px;resize:none;margin-top:10px}.card input:focus,.card textarea:focus{box-shadow:0 0 0 2px #2d6c50}.go{margin-top:10px;border:0;border-radius:12px;background:#163c2c;color:#fff;padding:14px;width:100%}@keyframes turn{to{transform:rotate(360deg)}}@media(max-width:500px){.row{grid-template-columns:1fr}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><form class="card"><div class="head"><h1>Project card</h1><span class="mark">+</span></div><div class="row"><input placeholder="Name"><input placeholder="Company"></div><textarea placeholder="One sentence about the project"></textarea><button class="go">Create inquiry</button></form><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
