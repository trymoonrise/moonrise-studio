<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1137
    slug: ai-chat-voice-chat-08
    title: Voice Chat 08
    category: ai-chat
    tags: ai-chat, voice
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1137 — Voice Chat 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d0d0f;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#ececec}
    .stage{width:min(560px,100%);display:flex;flex-direction:column;align-items:center;gap:2rem}
    .viz{display:flex;align-items:center;justify-content:center;gap:5px;height:64px}
    .viz span{width:4px;border-radius:4px;background:#10a37f;animation:eq 1s ease-in-out infinite}
    .viz span:nth-child(1){height:16px;animation-delay:0s}
    .viz span:nth-child(2){height:28px;animation-delay:.08s}
    .viz span:nth-child(3){height:44px;animation-delay:.16s}
    .viz span:nth-child(4){height:56px;animation-delay:.04s}
    .viz span:nth-child(5){height:36px;animation-delay:.2s}
    .viz span:nth-child(6){height:48px;animation-delay:.12s}
    .viz span:nth-child(7){height:22px;animation-delay:.24s}
    .viz span:nth-child(8){height:40px;animation-delay:.06s}
    .viz span:nth-child(9){height:18px;animation-delay:.18s}
    .label{font-size:.9rem;color:#9a9aa0}
    .ask{width:100%;display:flex;align-items:center;gap:.5rem;padding:.6rem .6rem .6rem 1rem;background:#1a1a1e;border:1px solid #2e2e34;border-radius:28px;box-shadow:0 0 0 0 rgba(16,163,127,.2);animation:pulse-border 2.5s ease-in-out infinite}
    .ask input{flex:1;border:none;outline:none;background:transparent;color:#ececec;font:inherit;font-size:.95rem}
    .ask input::placeholder{color:#6a6a70}
    .mic{position:relative;width:42px;height:42px;border:none;border-radius:50%;background:#10a37f;color:#fff;cursor:pointer;display:grid;place-items:center;flex:none}
    .mic::before{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(16,163,127,.45);animation:ring 1.8s ease-out infinite}
    .mic svg{width:18px;height:18px;position:relative;z-index:1}
    @keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
    @keyframes ring{0%{transform:scale(.85);opacity:1}100%{transform:scale(1.35);opacity:0}}
    @keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(16,163,127,.15)}50%{box-shadow:0 0 0 6px rgba(16,163,127,.08)}}
    @media(prefers-reduced-motion:reduce){.viz span,.mic::before,.ask{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="viz" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="label">Listening…</div>
    <form class="ask">
      <input type="text" placeholder="Or type instead…" autocomplete="off" aria-label="Ask anything">
      <button class="mic" type="button" aria-label="Voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
    </form>
  </div>
</body>
</html>
