<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1692
    slug: scroll-reveal-liquid-mask
    title: Liquid Mask Reveal
    category: animation
    tags: scroll, reveal, mask, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1692 — Liquid Mask Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#06141a;color:#e7f6f2;font-family:Outfit,sans-serif}
    .hero{min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
    .hero h1{font-family:Syne,sans-serif;font-size:clamp(3rem,12vw,6.5rem);margin:0;letter-spacing:-.05em}
    .hero p{opacity:.5;margin-top:1rem}
    .rail{max-width:820px;margin:0 auto;padding:0 1.25rem 45vh;display:grid;gap:28vh}
    .panel{--p:0}
    .mask-frame{
      position:relative;aspect-ratio:16/9;border-radius:20px;overflow:hidden;
      background:#0c2430;
    }
    .mask-frame__img{
      position:absolute;inset:0;
      background:
        linear-gradient(135deg,rgba(46,200,170,.35),transparent 50%),
        url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;
      transform:scale(calc(1.2 - var(--p)*.2));
    }
    .mask-frame__blob{
      position:absolute;inset:-20%;
      background:radial-gradient(circle at 50% 50%,transparent 0%,transparent calc(18% + var(--p)*55%),#06141a calc(28% + var(--p)*55%));
      transition:none;
    }
    .mask-frame__ring{
      position:absolute;left:50%;top:50%;
      width:calc(40px + var(--p)*90%);
      height:calc(40px + var(--p)*90%);
      transform:translate(-50%,-50%);
      border:1px solid rgba(126,224,195,calc(.15 + var(--p)*.45));
      border-radius:50%;
      pointer-events:none;
    }
    .copy{margin-top:1.5rem}
    .copy h2{font-family:Syne,sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);margin:0;letter-spacing:-.03em;opacity:calc(.2 + var(--p)*.8);transform:translateY(calc((1 - var(--p))*24px))}
    .copy p{margin:.7rem 0 0;max-width:40ch;line-height:1.65;opacity:calc(var(--p)*.65)}
    @media (prefers-reduced-motion:reduce){.mask-frame__blob{background:none}.copy h2,.copy p,.mask-frame__img{opacity:1;transform:none}}
  </style>
</head>
<body>
  <header class="hero">
    <div>
      <h1>IRIS</h1>
      <p>A liquid aperture opens with scroll depth</p>
    </div>
  </header>
  <main class="rail">
    <section class="panel" data-panel>
      <div class="mask-frame">
        <div class="mask-frame__img"></div>
        <div class="mask-frame__blob" aria-hidden="true"></div>
        <div class="mask-frame__ring" aria-hidden="true"></div>
      </div>
      <div class="copy">
        <h2>Aperture unlock</h2>
        <p>The dark mask peels back as a growing radial hole — image and headline arrive through the same optical gesture.</p>
      </div>
    </section>
    <section class="panel" data-panel>
      <div class="mask-frame">
        <div class="mask-frame__img" style="filter:hue-rotate(40deg) saturate(1.2)"></div>
        <div class="mask-frame__blob" aria-hidden="true"></div>
        <div class="mask-frame__ring" aria-hidden="true"></div>
      </div>
      <div class="copy">
        <h2>Second chamber</h2>
        <p>Each panel carries its own iris. Scroll past and the hole closes — bidirectional liquid masking.</p>
      </div>
    </section>
  </main>
  <script>
    const panels=[...document.querySelectorAll('[data-panel]')];
    const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    function clamp(n,a,b){return Math.min(b,Math.max(a,n))}
    function tick(){
      panels.forEach(p=>{
        if(reduced){p.style.setProperty('--p','1');return}
        const r=p.getBoundingClientRect(),vh=innerHeight;
        p.style.setProperty('--p',clamp((vh*.9-r.top)/(vh*.6),0,1).toFixed(4));
      });
    }
    tick();
    addEventListener('scroll',tick,{passive:true});
    addEventListener('resize',tick,{passive:true});
  </script>
</body>
</html>
