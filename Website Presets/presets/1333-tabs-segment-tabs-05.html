<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1333 - Segment Tabs 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#060d14}.tabs{display:flex;gap:4px;background:#0c1824;padding:4px;border-radius:12px}.tab{padding:10px 20px;border:none;background:transparent;color:#6898b8;border-radius:8px;cursor:pointer;font-size:.9rem}.tab.on{background:#38bdf8;color:#060d14;font-weight:600}.panel{margin-top:1rem;color:#d8eeff}
  </style>
</head>
<body>
<div><div class="tabs"><button class="tab on">A</button><button class="tab">B</button><button class="tab">C</button></div><div class="panel" id="p">Tab A - Segment Tabs 942</div></div>
<script>document.querySelectorAll('.tab').forEach((t,i)=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('p').textContent='Tab '+t.textContent+' - Segment Tabs 942';});</script>
</body>
</html>
