<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0221 — Dismissible Notification</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:2rem}.notif{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);max-width:400px;font-size:.9rem}.notif button{margin-left:auto;background:none;border:none;color:#999;cursor:pointer;font-size:1.1rem}
  </style>
</head>
<body>
<div class="notif" id="n"><span>🎉 Welcome! Check out our new features.</span><button id="x">×</button></div>
<script>document.getElementById('x').onclick=()=>document.getElementById('n').style.display='none';</script>
</body>
