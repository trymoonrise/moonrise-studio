<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0131
    slug: scroll-areas-smooth-anchor
    title: Smooth Anchor Nav
    category: scroll-areas
    tags: scroll-areas, anchor
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0131 — Smooth Anchor Nav</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;scroll-behavior:smooth}.nav{position:fixed;top:1rem;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;background:#fff;padding:6px;border-radius:99px;box-shadow:0 4px 20px rgba(0,0,0,.1)}.nav a{padding:8px 16px;text-decoration:none;color:#333;font-size:.85rem;border-radius:99px}.sec{height:100vh;display:grid;place-items:center;font-size:2rem}
  </style>
</head>
<body>
<nav class="nav"><a href="#a">A</a><a href="#b">B</a><a href="#c">C</a></nav><section class="sec" id="a" style="background:#6c8cff;color:#fff">A</section><section class="sec" id="b" style="background:#ff6cb0;color:#fff">B</section><section class="sec" id="c" style="background:#6cffb8;color:#fff">C</section>

</body>
</html>
