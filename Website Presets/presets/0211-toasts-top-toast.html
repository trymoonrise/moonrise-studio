<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0211
    slug: toasts-top-toast
    title: Top Toast Stack
    category: toasts
    tags: toasts, top
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0211 — Top Toast Stack</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.btn{padding:10px 24px;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px;cursor:pointer}.toast{position:fixed;top:1rem;right:1rem;background:#6cffb8;color:#111;padding:12px 20px;border-radius:8px;font-size:.85rem;font-weight:600;transform:translateX(120%);transition:transform .3s;z-index:10}.toast.show{transform:none}
  </style>
</head>
<body>
<button class="btn" id="b">Notify</button><div class="toast" id="t">Saved successfully</div>
<script>document.getElementById('b').onclick=()=>{const t=document.getElementById('t');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};</script>
</body>
</html>
