<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0607
    slug: docks-icon-badge-dock-11
    title: Icon Badge Dock 11
    category: docks
    tags: docks, badge
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0607 — Icon Badge Dock 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:end center;background:#eef1f6;padding-bottom:2.5rem;font-family:Outfit,sans-serif}
    .dock{display:flex;gap:6px;padding:8px 10px;background:#fff;border-radius:20px;box-shadow:0 18px 40px rgba(20,30,50,.1);animation:up .65s cubic-bezier(.22,1,.36,1) both}
    .btn{position:relative;width:48px;height:48px;border:none;border-radius:14px;background:transparent;color:#666;cursor:pointer;display:grid;place-items:center;transition:background .3s,color .3s,transform .35s cubic-bezier(.22,1,.36,1)}
    .btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
    .btn:hover{transform:translateY(-3px);color:#111}
    .btn.active{background:#111;color:#fff}
    .badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:#ef4444;color:#fff;font-size:.55rem;font-weight:600;display:grid;place-items:center;border:2px solid #fff;animation:pop .5s cubic-bezier(.22,1.4,.36,1) both}
    .btn.active .badge{border-color:#111}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    @keyframes up{from{opacity:0;translate:0 14px}to{opacity:1;translate:0 0}}
  </style>
</head>
<body>
  <nav class="dock" aria-label="Badge dock">
    <button class="btn active" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M4 10.5L12 4l8 6.5V20h-5v-5H9v5H4z"/></svg></button>
    <button class="btn" aria-label="Messages"><svg viewBox="0 0 24 24"><path d="M21 15a3 3 0 0 1-3 3H8l-5 3V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z"/></svg><span class="badge">3</span></button>
    <button class="btn" aria-label="Alerts"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 7 3 7 3 7H3s3 0 3-7"/><path d="M10 19a2 2 0 0 0 4 0"/></svg><span class="badge">12</span></button>
    <button class="btn" aria-label="Profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></button>
  </nav>
  <script>
    const btns=[...document.querySelectorAll('.btn')];
    btns.forEach(b=>b.addEventListener('click',()=>{btns.forEach(x=>x.classList.remove('active'));b.classList.add('active')}));
  </script>
</body>
</html>
