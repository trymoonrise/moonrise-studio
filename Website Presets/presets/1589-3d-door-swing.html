<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1589
    slug: 3d-door-swing
    title: 3D Door Swing
    category: 3d-effects
    tags: 3d, door, swing
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1589 - 3D Door Swing</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050508;color:#fff;font-family:Syne,sans-serif;perspective:1400px;overflow:hidden}
    .room{position:relative;width:min(520px,90vw);height:min(640px,110vw);transform-style:preserve-3d;transform:rotateX(4deg)}
    .interior{position:absolute;inset:8% 12%;border-radius:8px;background:
      radial-gradient(circle at 50% 30%,#3a1a4a,#12081a 55%,#050308),
      linear-gradient(180deg,transparent 40%,rgba(255,100,200,.12));
      display:grid;place-items:center;text-align:center;padding:2rem;
      box-shadow:inset 0 0 80px rgba(0,0,0,.6);overflow:hidden}
    .interior::before{content:'';position:absolute;inset:-30%;background:conic-gradient(from 0deg,#ff2bd6,#6c8cff,#7ee0c3,#ff2bd6);opacity:.15;filter:blur(40px);animation:spin 8s linear infinite}
    .interior h1{position:relative;z-index:1;margin:0;font-size:clamp(2rem,8vw,3.8rem);letter-spacing:-.06em;line-height:.85}
    .interior p{position:relative;z-index:1;margin:1rem 0 0;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
    .frame{position:absolute;inset:0;border:14px solid #1a1410;border-radius:6px;box-shadow:0 40px 100px rgba(0,0,0,.6),inset 0 0 0 2px #3a2a1a;pointer-events:none;z-index:5}
    .door{position:absolute;inset:14px;transform-style:preserve-3d;transform-origin:left center;cursor:pointer;transition:transform 1.6s cubic-bezier(.16,1,.3,1);z-index:4}
    .door-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:2px}
    .door-front{background:linear-gradient(160deg,#2a1c12,#120c08 40%,#1a100a);border:1px solid rgba(255,200,120,.12);display:grid;place-items:center;box-shadow:inset 8px 0 30px rgba(0,0,0,.4)}
    .door-front::before{content:'';position:absolute;inset:12%;border:1px solid rgba(255,200,120,.1);border-radius:2px}
    .door-front::after{content:'';position:absolute;right:18%;top:50%;width:18px;height:18px;margin-top:-9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffd9a0,#8a5a20);box-shadow:0 0 20px rgba(255,180,80,.4)}
    .door-back{background:linear-gradient(160deg,#1a1018,#0a060c);transform:rotateY(180deg);border:1px solid rgba(255,100,180,.1)}
    .door-edge{position:absolute;top:0;bottom:0;left:0;width:10px;background:#0a0604;transform:rotateY(-90deg) translateZ(5px);transform-origin:left}
    .label{font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;opacity:.45}
    .room.open .door{transform:rotateY(-105deg)}
    .light{position:absolute;inset:14px;background:linear-gradient(90deg,rgba(255,200,255,.25),transparent 40%);opacity:0;pointer-events:none;z-index:3;transition:opacity 1.2s ease;mix-blend-mode:screen}
    .room.open .light{opacity:1}
    .hint{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;opacity:.4}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.door{transition:none}.interior::before{animation:none}.room.open .door{transform:rotateY(-90deg)}}
  </style>
</head>
<body>
  <div class="room" id="room">
    <div class="interior">
      <div>
        <h1>Other side</h1>
        <p>Reality continues here</p>
      </div>
    </div>
    <div class="light" aria-hidden="true"></div>
    <div class="door" id="door" role="button" tabindex="0" aria-label="Open door">
      <div class="door-face door-front"><span class="label">Enter</span></div>
      <div class="door-face door-back" aria-hidden="true"></div>
      <div class="door-edge" aria-hidden="true"></div>
    </div>
    <div class="frame" aria-hidden="true"></div>
  </div>
  <p class="hint">Click the door · swings into another dimension</p>
  <script>
    const room=document.getElementById('room');
    const door=document.getElementById('door');
    const toggle=()=>room.classList.toggle('open');
    door.addEventListener('click',toggle);
    door.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}});
  </script>
</body>
</html>
