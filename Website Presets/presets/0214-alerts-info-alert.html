<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0214
    slug: alerts-info-alert
    title: Info Alert
    category: alerts
    tags: alerts, info
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0214 - Info Alert</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --cyan: #4de1ff;
      --deep: #061019;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background:
        radial-gradient(ellipse 90% 70% at 50% 20%, #0b2130, var(--deep) 70%);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .field {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(77, 225, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77, 225, 255, 0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000, transparent 75%);
      animation: field-drift 14s linear infinite;
    }

    .alert {
      position: relative;
      width: min(100%, 460px);
      padding: 1.6rem 1.7rem;
      border-radius: 18px;
      overflow: hidden;
      color: #dff6ff;
      background: linear-gradient(150deg, rgba(16, 40, 56, 0.9), rgba(8, 20, 30, 0.85));
      border: 1px solid rgba(77, 225, 255, 0.3);
      box-shadow:
        0 0 0 1px rgba(77, 225, 255, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      transform: perspective(900px) rotateX(6deg);
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .alert::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: -60%;
      height: 60%;
      background: linear-gradient(180deg, transparent, rgba(77, 225, 255, 0.14), transparent);
      animation: scan 3.4s ease-in-out infinite;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border: 2px solid var(--cyan);
      opacity: 0.7;
    }
    .corner.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
    .corner.tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
    .corner.bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
    .corner.br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

    .head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
    }

    .orb {
      position: relative;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--deep);
      font-weight: 700;
      background: radial-gradient(circle at 35% 30%, #bff4ff, var(--cyan) 60%, #1b8fb8);
      box-shadow: 0 0 24px rgba(77, 225, 255, 0.6);
      animation: pulse 2.4s ease-in-out infinite;
      font-size: 1.3rem;
    }

    .orb::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(77, 225, 255, 0.5);
      animation: ring 2.4s ease-out infinite;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .title {
      display: block;
      margin: 0.15rem 0 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .msg {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.6;
      color: rgba(223, 246, 255, 0.66);
    }

    .stream {
      margin-top: 1.1rem;
      display: flex;
      gap: 3px;
      height: 26px;
      align-items: flex-end;
    }

    .stream i {
      flex: 1;
      background: linear-gradient(to top, transparent, var(--cyan));
      border-radius: 2px 2px 0 0;
      opacity: 0.5;
      animation: eq 1.1s ease-in-out infinite;
    }

    @keyframes rise {
      from { opacity: 0; transform: perspective(900px) rotateX(20deg) translateY(30px); }
      to { opacity: 1; transform: perspective(900px) rotateX(6deg) translateY(0); }
    }
    @keyframes scan { 0%, 100% { top: -60%; } 50% { top: 100%; } }
    @keyframes pulse { 50% { transform: scale(1.08); } }
    @keyframes ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
    @keyframes eq { 50% { transform: scaleY(0.3); } }
    @keyframes field-drift { to { background-position: 44px 44px; } }

    @media (prefers-reduced-motion: reduce) {
      .alert, .alert::before, .orb, .orb::after, .stream i, .field { animation: none; }
    }
  </style>
</head>
<body>
  <div class="field" aria-hidden="true"></div>
  <div class="alert" role="status" aria-live="polite">
    <span class="corner tl" aria-hidden="true"></span>
    <span class="corner tr" aria-hidden="true"></span>
    <span class="corner bl" aria-hidden="true"></span>
    <span class="corner br" aria-hidden="true"></span>
    <div class="head">
      <div class="orb" aria-hidden="true">i</div>
      <div>
        <span class="tag">System · Info</span>
        <strong class="title">Signal acquired</strong>
      </div>
    </div>
    <p class="msg">Dashboard filters and export streams are now live across all channels. Data is flowing.</p>
    <div class="stream" aria-hidden="true"></div>
  </div>

  <script>
    const stream = document.querySelector('.stream');
    for (let i = 0; i < 28; i++) {
      const bar = document.createElement('i');
      bar.style.animationDelay = (-Math.random() * 1.1) + 's';
      stream.appendChild(bar);
    }
  </script>
</body>
</html>
