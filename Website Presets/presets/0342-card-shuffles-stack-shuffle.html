<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0342
    slug: card-shuffles-stack-shuffle
    title: Stack Shuffle
    category: card-shuffles
    tags: card-shuffles, stack
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0342 - Stack Shuffle</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background:
        radial-gradient(circle at 20% 18%, rgba(108, 140, 255, 0.12), transparent 34%),
        radial-gradient(circle at 82% 82%, rgba(108, 255, 184, 0.1), transparent 36%),
        #0d0d0f;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #fff;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .stack {
      position: relative;
      width: 240px;
      height: 300px;
      cursor: pointer;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      background: #14141c;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
      transform-origin: center bottom;
      transition:
        transform 0.5s cubic-bezier(.22, .61, .36, 1),
        opacity 0.45s cubic-bezier(.22, .61, .36, 1);
      will-change: transform, opacity;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card__label {
      position: absolute;
      left: 0.85rem;
      bottom: 0.85rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.82);
      backdrop-filter: blur(8px);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card[data-pos="0"] {
      z-index: 3;
      transform: rotate(-2deg) translate(0, 0);
    }

    .card[data-pos="1"] {
      z-index: 2;
      transform: rotate(3deg) translate(6px, 10px) scale(0.98);
      opacity: 0.94;
    }

    .card[data-pos="2"] {
      z-index: 1;
      transform: rotate(-4deg) translate(-5px, 18px) scale(0.96);
      opacity: 0.88;
    }

    .card.is-exiting {
      z-index: 4;
      transform: translateX(-115%) rotate(-14deg) !important;
      opacity: 0;
    }

    .hint {
      margin-top: 1.35rem;
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .hint strong {
      color: #6c8cff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stack" id="stack" role="button" tabindex="0" aria-label="Shuffle card stack">
      <article class="card" data-pos="0">
        <img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Card one">
        <span class="card__label">One</span>
      </article>
      <article class="card" data-pos="1">
        <img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Card two">
        <span class="card__label">Two</span>
      </article>
      <article class="card" data-pos="2">
        <img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Card three">
        <span class="card__label">Three</span>
      </article>
    </div>
    <p class="hint"><strong>Click</strong> to shuffle the stack</p>
  </div>

  <script>
    const stack = document.getElementById('stack');
    let busy = false;

    function updatePositions() {
      [...stack.children].forEach((card, index) => {
        card.dataset.pos = String(index);
      });
    }

    function shuffle() {
      if (busy) return;
      busy = true;

      const top = stack.firstElementChild;
      top.classList.add('is-exiting');

      top.addEventListener('transitionend', () => {
        top.classList.remove('is-exiting');
        stack.appendChild(top);
        updatePositions();
        busy = false;
      }, { once: true });
    }

    stack.addEventListener('click', shuffle);
    stack.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        shuffle();
      }
    });

    updatePositions();
  </script>
</body>
</html>
