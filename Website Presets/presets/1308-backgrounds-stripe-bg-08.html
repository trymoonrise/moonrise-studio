  </style>
</head>
<body>
<div class="stripes" aria-hidden="true"></div><div class="veil" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Stripe field</h1><p class="sub">Diagonal bands in crawl.</p></div>
