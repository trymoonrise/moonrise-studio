<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1655
    slug: ease-in-quote-mark
    title: Quote Mark Ease
    category: ease-in
    tags: ease-in, quote, typography, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1655 — Quote Mark Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5;padding:3rem 2rem;font-family:Georgia,serif}.quote{max-width:520px;text-align:center}.mark{font-size:5rem;line-height:1;color:#6c8cff;opacity:0;transform:scale(.5);animation:pop .7s cubic-bezier(.22,.61,.36,1) forwards}blockquote{font-size:1.5rem;line-height:1.55;color:#333;margin:1rem 0;opacity:0;animation:fade .8s cubic-bezier(.22,.61,.36,1) .25s forwards}cite{font-size:.9rem;color:#888;font-style:normal;opacity:0;animation:fade .6s cubic-bezier(.22,.61,.36,1) .45s forwards}@keyframes pop{to{opacity:.3;transform:none}}@keyframes fade{to{opacity:1}}
  </style>
</head>
<body>
<div class="quote"><div class="mark">"</div><blockquote>Simplicity is the ultimate sophistication in motion design.</blockquote><cite>— Leonardo da Vinci</cite></div>

</body>
</html>
