<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0661
    slug: navigation-gradient-nav-13
    title: Gradient Nav 13
    category: navigation
    tags: navigation, gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0661 — Gradient Nav 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0a0a0a;color:#fff;font-family:Outfit,sans-serif}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem clamp(1.25rem,4vw,3rem);position:relative}
    nav::after{content:"";position:absolute;left:clamp(1.25rem,4vw,3rem);right:clamp(1.25rem,4vw,3rem);bottom:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);opacity:.4}
    .logo{font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em;background:linear-gradient(90deg,#fff,#888);-webkit-background-clip:text;background-clip:text;color:transparent}
    .links{display:flex;gap:2rem}
    .links a{text-decoration:none;font-size:.75rem;font-weight:300;letter-spacing:.14em;text-transform:uppercase;background:linear-gradient(90deg,rgba(255,255,255,.9),rgba(255,255,255,.35));-webkit-background-clip:text;background-clip:text;color:transparent;opacity:.55;transition:opacity .3s}
    .links a:hover{opacity:1}
    .hero{height:75vh;display:grid;place-items:center;text-align:center;padding:2rem}
    .hero h1{margin:0;font-family:Syne,sans-serif;font-size:clamp(2.8rem,10vw,6rem);letter-spacing:-.06em;line-height:.9;font-weight:800;background:linear-gradient(180deg,#fff 30%,#333);-webkit-background-clip:text;background-clip:text;color:transparent}
  </style>
</head>
<body>
  <nav>
    <div class="logo">FADE</div>
    <div class="links"><a href="#">Work</a><a href="#">About</a><a href="#">Contact</a></div>
  </nav>
  <section class="hero"><h1>Soft<br>edge</h1></section>
</body>
</html>
