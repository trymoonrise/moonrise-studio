<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1249
    slug: carousels-fade-carousel-02
    title: Fade Carousel 02
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1249 — Fade Carousel 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f5f0;font-family:'DM Sans',system-ui,sans-serif;color:#111;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(480px,90vw);text-align:center}.stage{position:relative;aspect-ratio:4/5;border-radius:28px;overflow:hidden;background:#ddd;box-shadow:0 24px 60px rgba(0,0,0,.12)}.slide{position:absolute;inset:0;opacity:0;transform:scale(1.06);transition:opacity .8s ease,transform 1s cubic-bezier(.22,1,.36,1);pointer-events:none}.slide.on{opacity:1;transform:scale(1);pointer-events:auto;z-index:1}.slide img{width:100%;height:100%;object-fit:cover}.meta{margin-top:18px;font-family:Syne,sans-serif;font-weight:700;font-size:1.2rem;letter-spacing:-.03em;min-height:1.4em}.dots{display:flex;justify-content:center;gap:10px;margin-top:14px}.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #111;transition:background .3s,transform .3s}.dot.on{background:#111;transform:scale(1.25)}.hint{margin-top:10px;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.4)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage" id="stage">
<div class="slide on"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""></div>
<div class="slide"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(70deg)"></div>
<div class="slide"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(160deg)"></div>
<div class="slide"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:grayscale(1)"></div>
</div><div class="meta" id="meta">Fade 01</div><div class="dots" id="dots"></div><p class="hint">Click dots or wait</p></div>
<script>
const slides=[...document.querySelectorAll('.slide')],meta=document.getElementById('meta'),dots=document.getElementById('dots'),labels=['Fade 01','Fade 02','Fade 03','Fade 04'];let i=0;slides.forEach((_,n)=>{const d=document.createElement('button');d.className='dot'+(n===0?' on':'');d.onclick=()=>go(n);dots.appendChild(d);});function go(n){i=(n+slides.length)%slides.length;slides.forEach((s,k)=>s.classList.toggle('on',k===i));[...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i));meta.textContent=labels[i];}setInterval(()=>go(i+1),3200);
</script>
</body>
</html>
