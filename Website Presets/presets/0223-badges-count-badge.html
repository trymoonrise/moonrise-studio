<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0223
    slug: badges-count-badge
    title: Count Badge
    category: badges
    tags: badges, count
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0223 - Count Badge</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');

    * { box-sizing: border-box; }
    body {
      display: grid; place-items: center; min-height: 100vh;
      background: #0d0d12; font-family: Syne, sans-serif; gap: 2rem;
      overflow: hidden;
    }

    .bell {
      position: relative;
      width: 72px; height: 72px;
      border-radius: 20px;
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.08);
      display: grid; place-items: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .bell:active { transform: scale(0.94); }

    .count {
      position: absolute;
      top: -10px; right: -10px;
      min-width: 28px; height: 28px;
      padding: 0 7px;
      border-radius: 999px;
      background: #ff2d55;
      color: #fff;
      font-size: 0.78rem; font-weight: 800;
      display: grid; place-items: center;
      box-shadow: 0 0 20px rgba(255, 45, 85, 0.6);
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .count.bump {
      animation: bump 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .hint {
      font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    @keyframes pop { from { transform: scale(0); } }
    @keyframes bump {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <button class="bell" id="bell" type="button" aria-label="Add notification">
    🔔
    <span class="count" id="count">1</span>
  </button>
  <p class="hint">Click to pile up</p>

  <script>
    const count = document.getElementById('count');
    const bell = document.getElementById('bell');
    let n = 1;
    bell.addEventListener('click', () => {
      n = Math.min(n + 1, 99);
      count.textContent = n > 9 ? n + '+' : n;
      count.classList.remove('bump');
      void count.offsetWidth;
      count.classList.add('bump');
    });
  </script>
</body>
</html>
