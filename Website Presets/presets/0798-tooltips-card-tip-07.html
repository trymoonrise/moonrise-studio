<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0798
    slug: tooltips-card-tip-07
    title: Card Tip 07
    category: tooltips
    tags: tooltips, card
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0798 — Card Tip 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f0f0f0;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .wrap{position:relative;display:inline-block}
    .btn{padding:12px 26px;border:1.5px solid #111;background:#fff;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:background .25s,color .25s}
    .btn:hover{background:#111;color:#fff}
    .tip{position:absolute;bottom:calc(100% + 14px);left:50%;translate:-50% 10px;width:240px;padding:0;background:#fff;border:1px solid #111;opacity:0;visibility:hidden;pointer-events:none;box-shadow:6px 6px 0 #111;transition:opacity .35s,translate .35s cubic-bezier(.22,1,.36,1),visibility .35s;text-align:left;overflow:hidden}
    .tip .bar{height:3px;background:#111;transform:scaleX(0);transform-origin:left;transition:transform .4s .1s cubic-bezier(.22,1,.36,1)}
    .tip .body{padding:1rem 1.1rem}
    .tip h4{margin:0 0 .35rem;font-family:"Syne",system-ui,sans-serif;font-size:.95rem;font-weight:800;letter-spacing:-.03em}
    .tip p{margin:0;font-size:.78rem;line-height:1.45;color:#555}
    .wrap:hover .tip{opacity:1;visibility:visible;translate:-50% 0}
    .wrap:hover .tip .bar{transform:scaleX(1)}
  </style>
</head>
<body>
<div class="wrap"><button class="btn" type="button">Plan details</button><div class="tip" role="tooltip"><div class="bar" aria-hidden="true"></div><div class="body"><h4>Pro workspace</h4><p>Unlimited projects, priority support, and shared libraries.</p></div></div></div>

</body>
</html>
