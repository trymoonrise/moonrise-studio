<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1040
    slug: cta-split-cta-02
    title: Diagonal Split CTA Panel
    category: cta
    tags: cta, split, diagonal, panel
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1040 - Diagonal Split CTA Panel</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0e12;color:#e6e9ef;font-family:Outfit,sans-serif;padding:2rem}
    .split{width:min(680px,100%);min-height:280px;display:grid;grid-template-columns:1fr 1fr;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08);position:relative}
    .split::after{content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;background:linear-gradient(180deg,transparent,#38bdf8,transparent);transform:translateX(-50%) skewX(-8deg);animation:line-glow 2s ease infinite}
    .left{padding:2.5rem;background:#111318;display:flex;flex-direction:column;justify-content:center;clip-path:polygon(0 0,100% 0,85% 100%,0 100%)}
    .right{padding:2.5rem;background:#161a22;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;text-align:right;clip-path:polygon(15% 0,100% 0,100% 100%,0 100%)}
    h2{font-family:Syne,sans-serif;font-size:1.6rem;letter-spacing:-.04em;margin-bottom:.5rem}
    .left p{font-size:.85rem;color:rgba(230,233,239,.5);line-height:1.5}
    .stat{font-family:Syne,sans-serif;font-size:3rem;font-weight:800;color:#38bdf8;letter-spacing:-.06em;line-height:1}
    .stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(230,233,239,.4);margin-top:.5rem}
    .btn{margin-top:1.5rem;padding:.7rem 1.5rem;background:transparent;border:1px solid rgba(56,189,248,.5);color:#38bdf8;border-radius:6px;font-family:Syne,sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:background .3s,transform .3s}
    .btn:hover{background:rgba(56,189,248,.1);transform:translateX(-4px)}
    @keyframes line-glow{0%,100%{opacity:.4}50%{opacity:1}}
    @media(max-width:560px){.split{grid-template-columns:1fr}.left,.right{clip-path:none;text-align:left;align-items:flex-start}.split::after{display:none}}
    @media(prefers-reduced-motion:reduce){.split::after{animation:none}}
  </style>
</head>
<body>
  <div class="split">
    <div class="left">
      <h2>Scale your workflow</h2>
      <p>Enterprise-grade infrastructure with developer-first tooling.</p>
      <button class="btn">View pricing →</button>
    </div>
    <div class="right">
      <div class="stat">99.9%</div>
      <div class="stat-label">Uptime SLA</div>
    </div>
  </div>
</body>
</html>
