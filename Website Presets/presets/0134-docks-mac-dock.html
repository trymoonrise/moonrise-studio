<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0134
    slug: docks-mac-dock
    title: Mac Style Dock
    category: docks
    tags: docks, mac
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0134 - Mac Style Dock</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:end center;background:linear-gradient(180deg,#1a1c24,#0b0c10);padding-bottom:2.5rem;font-family:Outfit,sans-serif;overflow:hidden}
    .dock{display:flex;align-items:flex-end;gap:8px;padding:10px 14px 12px;background:rgba(255,255,255,.08);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.14);border-radius:22px;box-shadow:0 20px 50px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.12);animation:rise .7s cubic-bezier(.22,1,.36,1) both}
    .icon{width:52px;height:52px;border-radius:14px;border:none;cursor:pointer;position:relative;transform-origin:50% 100%;transition:width .2s cubic-bezier(.22,1,.36,1),height .2s cubic-bezier(.22,1,.36,1),margin .2s;box-shadow:0 6px 16px rgba(0,0,0,.25);background:linear-gradient(145deg,var(--a),var(--b))}
    .icon::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 10px);translate:-50% 0;padding:.3rem .55rem;border-radius:6px;background:rgba(0,0,0,.75);color:#fff;font-size:.65rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s,translate .2s}
    .icon:hover::after{opacity:1;translate:-50% -2px}
    .dot{position:absolute;left:50%;bottom:-7px;width:4px;height:4px;border-radius:50%;background:#fff;translate:-50% 0;opacity:0}
    .icon.active .dot{opacity:.8}
    @keyframes rise{from{opacity:0;translate:0 24px}to{opacity:1;translate:0 0}}
    @media(prefers-reduced-motion:reduce){.dock,.icon{transition:none;animation:none}}
  </style>
</head>
<body>
  <nav class="dock" id="dock" aria-label="Dock">
    <button class="icon active" style="--a:#5b8cff;--b:#3d5fd4" data-tip="Finder" aria-label="Finder"><span class="dot"></span></button>
    <button class="icon" style="--a:#34d399;--b:#059669" data-tip="Safari" aria-label="Safari"><span class="dot"></span></button>
    <button class="icon" style="--a:#f472b6;--b:#db2777" data-tip="Music" aria-label="Music"><span class="dot"></span></button>
    <button class="icon" style="--a:#fbbf24;--b:#d97706" data-tip="Mail" aria-label="Mail"><span class="dot"></span></button>
    <button class="icon" style="--a:#a78bfa;--b:#7c3aed" data-tip="Photos" aria-label="Photos"><span class="dot"></span></button>
    <button class="icon" style="--a:#22d3ee;--b:#0891b2" data-tip="Settings" aria-label="Settings"><span class="dot"></span></button>
  </nav>
  <script>
    const dock=document.getElementById('dock'),icons=[...dock.querySelectorAll('.icon')];
    const max=72,base=52,range=120;
    function scale(){
      icons.forEach(icon=>{
        const r=icon.getBoundingClientRect();
        const cx=r.left+r.width/2;
        const d=Math.abs(scale.mx-cx);
        const t=Math.max(0,1-d/range);
        const s=base+(max-base)*Math.pow(t,1.4);
        icon.style.width=icon.style.height=s+'px';
      });
    }
    scale.mx=-9999;
    dock.addEventListener('pointermove',e=>{scale.mx=e.clientX;scale()});
    dock.addEventListener('pointerleave',()=>{scale.mx=-9999;icons.forEach(i=>{i.style.width=i.style.height=base+'px'})});
    icons.forEach(i=>i.addEventListener('click',()=>{icons.forEach(x=>x.classList.remove('active'));i.classList.add('active')}));
  </script>
</body>
</html>
