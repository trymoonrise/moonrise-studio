<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0273
    slug: cta-minimal-cta
    title: Minimal Text CTA
    category: cta
    tags: cta, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0273 - Minimal Text CTA</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fafafa;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .cta{max-width:380px;text-align:left}
    p{margin:0 0 1.25rem;font-size:1.15rem;line-height:1.45;color:#222;font-family:"Syne",system-ui,sans-serif;font-weight:600;letter-spacing:-.02em;opacity:0;animation:fade .8s .15s forwards}
    @keyframes fade{to{opacity:1}}
    a{display:inline-flex;align-items:center;gap:.45rem;color:#111;font-weight:600;font-size:.92rem;text-decoration:none;border-bottom:1.5px solid #111;padding-bottom:2px;opacity:0;animation:fade .8s .4s forwards}
    a svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;transition:transform .3s cubic-bezier(.22,1,.36,1)}
    a:hover svg{transform:translateX(4px)}
  </style>
</head>
<body>
<div class="cta"><p>Questions about the platform?</p><a href="#">Talk to the team <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a></div>

</body>
</html>
