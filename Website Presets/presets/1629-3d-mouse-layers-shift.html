<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1629
    slug: 3d-mouse-layers-shift
    title: 3D Layers Shift Mouse
    category: 3d-mouse
    tags: 3d, mouse, layers
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1629 - 3D Layers Shift Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08090e;perspective:1000px;overflow:hidden;font-family:Syne,sans-serif}
    .stack{position:relative;width:240px;height:160px;transform-style:preserve-3d;transform:rotateX(18deg) rotateY(var(--ry,-16deg))}
    .layer{position:absolute;inset:0;border-radius:18px;border:1px solid rgba(255,255,255,.18);display:grid;place-items:center;color:#fff;font-size:1.2rem;font-weight:800;transform:translateZ(calc(var(--i)*40px)) translateX(calc(var(--i)*var(--sx,0px))) translateY(calc(var(--i)*var(--sy,0px)))}
    .l0{background:linear-gradient(145deg,#6c8cff,#3147c8);--i:2;z-index:3}
    .l1{background:linear-gradient(145deg,#ff6bcb,#a31f6e);--i:1;z-index:2;opacity:.92}
    .l2{background:linear-gradient(145deg,#7ee0c3,#1f8a6e);--i:0;z-index:1;opacity:.85}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="stack" id="stack">
    <div class="layer l2">L3</div>
    <div class="layer l1">L2</div>
    <div class="layer l0">L1</div>
  </div>
  <div class="hint">Shear the layers</div>
  <script>
    const stack=document.getElementById('stack');let ry=-16,sx=0,sy=0,try_=-16,tsx=0,tsy=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*-28;tsx=x*22;tsy=y*18});
    (function loop(){ry+=(try_-ry)*.1;sx+=(tsx-sx)*.1;sy+=(tsy-sy)*.1;
      stack.style.setProperty('--ry',ry+'deg');stack.style.setProperty('--sx',sx+'px');stack.style.setProperty('--sy',sy+'px');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
