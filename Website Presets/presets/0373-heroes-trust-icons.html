<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0373
    slug: heroes-trust-icons
    title: Trust Icons Hero
    category: heroes
    tags: heroes, landing, professional, healthcare
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0373 - Trust Icons Hero</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      min-height: 100vh;
      margin: 0;
      padding: clamp(3rem, 8vw, 5rem) clamp(1.5rem, 5vw, 3rem);
      background:
        radial-gradient(circle at 100% 0%, rgba(14, 165, 233, 0.14), transparent 42%),
        radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.1), transparent 40%),
        #f8fbff;
      color: #082f49;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .hero {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0284c7;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.04em;
      max-width: 12ch;
      margin-bottom: 1rem;
    }

    .sub {
      color: #0369a1;
      font-size: 1.08rem;
      line-height: 1.6;
      max-width: 42ch;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .card {
      padding: 1.5rem;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(8, 47, 73, 0.08);
      box-shadow: 0 18px 50px rgba(8, 47, 73, 0.08);
    }

    .icon-wrap {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      border-radius: 14px;
      background: linear-gradient(145deg, #0ea5e9, #0284c7);
      color: #fff;
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.28);
    }

    .icon-wrap svg {
      width: 22px;
      height: 22px;
    }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.9rem;
      line-height: 1.55;
      color: #64748b;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <span class="eyebrow">Healthcare platform</span>
    <h1>Care that puts patients first</h1>
    <p class="sub">Board-certified specialists, same-week appointments, and transparent pricing.</p>

    <div class="grid">
      <article class="card">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h3>Licensed experts</h3>
        <p>Verified credentials on every profile.</p>
      </article>

      <article class="card">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <h3>Fast scheduling</h3>
        <p>Book online in under two minutes.</p>
      </article>

      <article class="card">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h3>HIPAA secure</h3>
        <p>Your data stays private and protected.</p>
      </article>
    </div>
  </section>
</body>
</html>
