<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1598
    slug: 3d-mouse-page-tilt
    title: 3D Page Mouse Tilt
    category: 3d-mouse
    tags: 3d, mouse, page, tilt
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1598 — 3D Page Mouse Tilt</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#06070c;perspective:1400px;overflow:hidden;font-family:Outfit,sans-serif;color:#fff}
    .page{min-height:100vh;display:grid;place-items:center;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg))}
    .glow{position:fixed;inset:-20%;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(108,140,255,.25),transparent 42%);pointer-events:none;z-index:0}
    .content{position:relative;z-index:1;text-align:center;transform-style:preserve-3d}
    h1{margin:0;font-family:Syne,sans-serif;font-size:clamp(2.8rem,9vw,5.5rem);letter-spacing:-.05em;transform:translateZ(80px);text-shadow:0 20px 60px rgba(108,140,255,.4)}
    p{margin:1rem 0 0;color:rgba(255,255,255,.5);font-size:1rem;letter-spacing:.08em;text-transform:uppercase;transform:translateZ(40px)}
    .plane{position:absolute;width:280px;height:180px;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:rgba(255,255,255,.03);backdrop-filter:blur(8px);transform:translateZ(-60px) translate(-50%,-50%);left:50%;top:50%;pointer-events:none}
    @media(prefers-reduced-motion:reduce){.page{transform:none}}
  </style>
</head>
<body>
  <div class="glow" id="glow"></div>
  <div class="page" id="page">
    <div class="plane" aria-hidden="true"></div>
    <div class="content"><h1>Tilt Space</h1><p>Move to bend the page</p></div>
  </div>
  <script>
    const page=document.getElementById('page'),glow=document.getElementById('glow');
    let tx=0,ty=0,cx=0,cy=0,mx=.5,my=.5,cmx=.5,cmy=.5;
    addEventListener('pointermove',e=>{tx=(e.clientX/innerWidth-.5)*36;ty=-(e.clientY/innerHeight-.5)*26;mx=e.clientX/innerWidth;my=e.clientY/innerHeight});
    (function loop(){cx+=(tx-cx)*.1;cy+=(ty-cy)*.1;cmx+=(mx-cmx)*.08;cmy+=(my-cmy)*.08;page.style.setProperty('--rx',cy+'deg');page.style.setProperty('--ry',cx+'deg');glow.style.setProperty('--mx',cmx*100+'%');glow.style.setProperty('--my',cmy*100+'%');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
