<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1248
    slug: carousels-slide-carousel-01
    title: Parallax Film Strip
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1248 — Parallax Film Strip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08080c;color:#fff;font-family:Outfit,sans-serif;padding:24px;overflow:hidden}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .cinema{width:min(640px,94vw)}
    .sprocket{display:flex;gap:6px;margin-bottom:10px}
    .sprocket i{width:10px;height:10px;border:1px solid rgba(255,255,255,.2);border-radius:1px;animation:sprocket 1.2s ease-in-out infinite}
    .sprocket i:nth-child(odd){animation-delay:-.6s}
    .viewport{overflow:hidden;border:1px solid rgba(255,255,255,.12);border-radius:2px;position:relative;aspect-ratio:16/9}
    .strip{display:flex;height:100%;transition:transform .9s cubic-bezier(.16,1,.3,1);will-change:transform}
    .frame{min-width:100%;height:100%;position:relative;overflow:hidden}
    .frame img{width:110%;height:100%;object-fit:cover;display:block;transition:transform .9s cubic-bezier(.16,1,.3,1)}
    .frame.on img{transform:translateX(-5%)}
    .meta{position:absolute;left:20px;bottom:20px;z-index:2}
    .meta b{display:block;font-family:Syne,sans-serif;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:-.03em;transform:translateY(16px);opacity:0;transition:transform .6s .15s,opacity .6s .15s}
    .frame.on .meta b{transform:none;opacity:1}
    .meta span{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45)}
    .ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
    .dots{display:flex;gap:8px}
    .dots button{width:28px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;transition:background .3s,width .3s;padding:0}
    .dots button.on{background:#fff;width:40px}
    .arrows{display:flex;gap:8px}
    .arrows button{width:40px;height:40px;border:1px solid rgba(255,255,255,.15);border-radius:2px;transition:background .25s,border-color .25s}
    .arrows button:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.3)}
    @keyframes sprocket{0%,100%{opacity:.3}50%{opacity:1}}
    @media(prefers-reduced-motion:reduce){.sprocket i{animation:none}.strip,.frame img{transition:none}}
  </style>
</head>
<body>
<div class="cinema">
  <div class="sprocket"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  <div class="viewport"><div class="strip" id="strip">
    <div class="frame on"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><div class="meta"><span>Reel 01</span><b>Exposure</b></div></div>
    <div class="frame"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(80deg) saturate(1.2)"><div class="meta"><span>Reel 02</span><b>Contrast</b></div></div>
    <div class="frame"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(160deg)"><div class="meta"><span>Reel 03</span><b>Grain</b></div></div>
  </div></div>
  <div class="ctrl">
    <div class="dots" id="dots"></div>
    <div class="arrows"><button id="prev" aria-label="Previous">←</button><button id="next" aria-label="Next">→</button></div>
  </div>
</div>
<script>
const strip=document.getElementById('strip'),frames=[...strip.children],dotsEl=document.getElementById('dots');let i=0;
frames.forEach((_,k)=>{const b=document.createElement('button');b.addEventListener('click',()=>go(k));dotsEl.appendChild(b);});
function go(n){i=(n+frames.length)%frames.length;strip.style.transform=`translateX(${-i*100}%)`;frames.forEach((f,k)=>f.classList.toggle('on',k===i));[...dotsEl.children].forEach((d,k)=>d.classList.toggle('on',k===i));}
document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('next').onclick=()=>go(i+1);go(0);
</script>
</body>
</html>
