<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1516 — Spotlight Text Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#000;color:#fff;overflow:hidden;cursor:none}h1{font-size:clamp(3rem,9vw,6rem);font-weight:900;text-align:center;position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(#fff,#fff);-webkit-background-clip:text;background-clip:text;color:transparent}.spot{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,#fff 0%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:overlay}
  </style>
</head>
<body>
<h1>REVEAL</h1><div class="spot" id="s"></div>
<script>const s=document.getElementById('s');addEventListener('mousemove',e=>{s.style.left=e.clientX+'px';s.style.top=e.clientY+'px';});</script>
</body>
</html>
