<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1577
    slug: 3d-text-rotate-cylinder
    title: 3D Rotating Text Ring
    category: 3d-effects
    tags: 3d, text, ring
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1577 — 3D Rotating Text Ring</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07080d;perspective:900px;overflow:hidden;font-family:Syne,sans-serif}
    .stage{position:relative;width:280px;height:280px;transform-style:preserve-3d;transform:rotateX(-68deg)}
    .ring{position:absolute;inset:0;transform-style:preserve-3d;animation:spin 12s linear infinite}
    .ch{position:absolute;left:50%;top:50%;font-size:1.5rem;font-weight:800;color:#fff;transform-origin:0 0;text-shadow:0 0 18px rgba(108,140,255,.5)}
    .core{position:absolute;inset:70px;border-radius:50%;border:1px solid rgba(255,255,255,.15);transform:translateZ(0);box-shadow:0 0 40px rgba(108,140,255,.2),inset 0 0 30px rgba(108,140,255,.1)}
    @keyframes spin{to{transform:rotateZ(360deg)}}
    @media(prefers-reduced-motion:reduce){.ring{animation:none}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="core" aria-hidden="true"></div>
    <div class="ring" id="ring" aria-label="ROTATE FOREVER"></div>
  </div>
  <script>
    const text='ROTATE FOREVER · ';
    const ring=document.getElementById('ring');
    const radius=120;
    [...text].forEach((ch,i)=>{
      const el=document.createElement('span');
      el.className='ch';
      el.textContent=ch;
      const angle=(i/text.length)*360;
      el.style.transform=`rotateZ(${angle}deg) translateY(-${radius}px) rotateX(90deg)`;
      ring.appendChild(el);
    });
  </script>
</body>
</html>
