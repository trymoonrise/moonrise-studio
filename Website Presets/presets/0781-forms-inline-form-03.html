--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0781 - Inline Form 03</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#e8f4ee;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.strip{width:min(820px,96vw);display:flex;align-items:center;gap:18px;padding:14px;border:1px solid #173d2b;border-radius:999px}.badge{padding:12px 16px;border-radius:999px;background:#173d2b;color:#fff;font:500 10px 'DM Mono';letter-spacing:.12em;text-transform:uppercase}.strip input{flex:1;min-width:0;border:0;outline:0;background:transparent}.strip button{width:46px;height:46px;border:0;border-radius:50%;background:#d5ff72;font-size:20px;transition:.3s}.strip button:hover{transform:rotate(-20deg) scale(1.08)}.msg{text-align:center;font:500 10px 'DM Mono';margin-top:12px;color:#476b59}@media(max-width:600px){.strip{border-radius:24px;flex-wrap:wrap}.badge{width:100%;text-align:center}.strip input{padding-left:8px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><div><form class="strip" id="f"><span class="badge">Open call</span><input type="email" required placeholder="Your email, nothing else"><button>→</button></form><p class="msg" id="msg">One dispatch every four weeks.</p></div><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));const form=document.getElementById('f'),message=document.getElementById('msg');form.onsubmit=e=>{e.preventDefault();message.textContent=form.checkValidity()?'SUBSCRIBED - WELCOME IN':'CHECK YOUR EMAIL';};</script></body></htm
