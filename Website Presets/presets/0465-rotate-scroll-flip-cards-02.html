<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0465
    slug: rotate-scroll-flip-cards-02
    title: Flip Cards 02
    category: rotate-scroll
    tags: rotate-scroll, flip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0465 — Flip Cards 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#18181b;color:#fafafa;font-family:system-ui;perspective:1000px}.track{height:280vh}.sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;gap:clamp(12px,3vw,24px);padding:2rem;flex-wrap:wrap}.card{width:min(28vw,160px);aspect-ratio:3/4;position:relative;transform-style:preserve-3d;transform:rotateY(var(--ry,0deg))}.face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:grid;place-items:center;font-weight:800;font-size:1.2rem}.front{background:linear-gradient(145deg,#3f3f46,#27272a);border:1px solid #52525b}.back{transform:rotateY(180deg);background:linear-gradient(145deg,#ec4899,#8b5cf6)}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="card" style="--ry:0deg" data-i="0"><div class="face front">A</div><div class="face back">1</div></div><div class="card" style="--ry:0deg" data-i="1"><div class="face front">B</div><div class="face back">2</div></div><div class="card" style="--ry:0deg" data-i="2"><div class="face front">C</div><div class="face back">3</div></div><div class="card" style="--ry:0deg" data-i="3"><div class="face front">D</div><div class="face back">4</div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const cards=[...document.querySelectorAll('.card')];addEventListener('scroll',()=>{const p=prog();cards.forEach((c,i)=>{const t=Math.min(1,Math.max(0,(p*1.3)-i*.15));c.style.setProperty('--ry',t*180+'deg');});},{passive:true});</script>
</body>
</html>
