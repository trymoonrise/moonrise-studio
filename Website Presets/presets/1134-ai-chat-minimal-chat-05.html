<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1134
    slug: ai-chat-minimal-chat-05
    title: Minimal Chat 05
    category: ai-chat
    tags: ai-chat, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1134 — Minimal Chat 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#111}
    .stage{width:min(560px,100%);text-align:center}
    .logo{width:42px;height:42px;margin:0 auto 1.5rem;border-radius:50%;background:#111;position:relative;animation:breathe 3.5s ease-in-out infinite}
    .logo::after{content:"";position:absolute;inset:10px;border-radius:50%;border:2px solid #fff}
    h1{margin:0 0 2rem;font-size:1.5rem;font-weight:500;letter-spacing:-.03em;opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) .1s both}
    .ask{display:flex;align-items:center;border-bottom:1.5px solid #111;padding:.4rem 0;gap:.5rem;opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) .2s both}
    .ask input{flex:1;border:none;outline:none;font:inherit;font-size:1.05rem;padding:.5rem 0;background:transparent}
    .ask input::placeholder{color:#aaa}
    .send{border:none;background:transparent;color:#111;cursor:pointer;padding:.4rem;display:grid;place-items:center;transition:transform .2s}
    .send:hover{transform:translateX(3px)}
    .send svg{width:20px;height:20px}
    .line{height:2px;width:0;background:#10a37f;margin-top:-1.5px;animation:grow 1.2s cubic-bezier(.16,1,.3,1) .5s both}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes grow{to{width:100%}}
    @media(prefers-reduced-motion:reduce){.logo,h1,.ask,.line{animation:none}h1,.ask{opacity:1}.line{width:100%}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="logo" aria-hidden="true"></div>
    <h1>Where should we begin?</h1>
    <form class="ask">
      <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
      <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </form>
    <div class="line" aria-hidden="true"></div>
  </div>
</body>
</html>
