<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0355
    slug: backgrounds-dot-pattern
    title: Dot Pattern
    category: backgrounds
    tags: backgrounds, dots
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0355 - Dot Pattern</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#fafafa;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .dots{position:absolute;inset:0;background-image:radial-gradient(#bbb 1.2px,transparent 1.2px);background-size:22px 22px;animation:drift 30s linear infinite;mask-image:radial-gradient(ellipse at 50% 50%,#000 20%,transparent 70%)}
    @keyframes drift{to{background-position:22px 44px}}
    .panel{position:relative;z-index:2;padding:2rem 2.5rem;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,.06)}
    .panel .kicker,.panel h1,.panel .sub{opacity:1}
    .panel .kicker{opacity:.4}.panel .sub{opacity:.5}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="dots" aria-hidden="true"></div><div class="panel"><div class="label"><p class="kicker">Background</p><h1>Dot field</h1><p class="sub">Halftone drift beneath.</p></div></div>

</body>
</html>
