<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1442
    slug: experimental-tilt-glitch-hero
    title: Tilt Glitch Hero
    category: experimental
    tags: experimental, tilt, glitch
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1442 — Tilt Glitch Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#000;perspective:800px;padding:2rem}.hero{text-align:center;color:#fff;transition:transform .1s}h1{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;animation:gh 4s infinite}@keyframes gh{0%,94%,100%{text-shadow:none}95%{text-shadow:3px 0 #f0f,-3px 0 #0ff}97%{text-shadow:-3px 0 #f0f,3px 0 #0ff}}p{margin-top:1rem;color:#888}
  </style>
</head>
<body>
<div class="hero" id="h"><h1>CHAOS</h1><p>Tilt + glitch combined</p></div>
<script>const h=document.getElementById('h');h.onmousemove=e=>{const r=h.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5;const y=(e.clientY-r.top)/r.height-.5;h.style.transform='rotateY('+x*10+'deg) rotateX('+(-y*10)+'deg)';};h.onmouseleave=()=>h.style.transform='';</script>
</body>
</html>
