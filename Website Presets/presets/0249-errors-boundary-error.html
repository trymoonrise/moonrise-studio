<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0249
    slug: errors-boundary-error
    title: Error Boundary UI
    category: errors
    tags: errors, boundary
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0249 — Error Boundary UI</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#0e1016;font-family:'Space Grotesk',sans-serif;color:#e8eaf0}
    .app{width:min(560px,100%);position:relative}
    .chrome{display:flex;gap:6px;padding:.6rem 1rem;background:#1a1d27;border-radius:12px 12px 0 0;border:1px solid #2a2e3a;border-bottom:0}
    .dot{width:10px;height:10px;border-radius:50%}.dot:nth-child(1){background:#ff5f57}.dot:nth-child(2){background:#febc2e}.dot:nth-child(3){background:#28c840}
    .frame{background:#161922;border:1px solid #2a2e3a;border-radius:0 0 12px 12px;padding:1.5rem;min-height:280px;position:relative;overflow:hidden}
    .shard{
      position:absolute;background:rgba(255,60,80,.08);border:1px solid rgba(255,60,80,.35);
      animation:fall 2.5s ease-in infinite;pointer-events:none;
    }
    .shard:nth-child(1){width:60px;height:40px;left:10%;top:-20%;animation-delay:0s;transform:rotate(15deg)}
    .shard:nth-child(2){width:40px;height:70px;left:40%;top:-30%;animation-delay:.4s;transform:rotate(-20deg)}
    .shard:nth-child(3){width:80px;height:30px;left:70%;top:-25%;animation-delay:.8s;transform:rotate(35deg)}
    .shard:nth-child(4){width:50px;height:50px;left:25%;top:-40%;animation-delay:1.2s;transform:rotate(-10deg)}
    .boundary{
      position:relative;z-index:2;padding:1.5rem;border:2px dashed #ff3c50;border-radius:10px;
      background:rgba(255,60,80,.06);animation:boundary-pulse 1.5s ease-in-out infinite;
      transform-origin:center;animation:crack 3s ease-in-out infinite;
    }
    .tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#ff3c50;letter-spacing:.08em;margin-bottom:.75rem}
    h2{margin:0 0 .5rem;font-size:1.5rem;font-weight:700}
    .msg{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#ff8a96;margin:0 0 1.25rem;line-height:1.5}
    .tree{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:rgba(232,234,240,.4);line-height:1.8;margin-bottom:1.25rem}
    .tree .dead{color:#ff3c50;text-decoration:line-through;animation:blink .8s step-end infinite}
    button{appearance:none;border:0;background:#ff3c50;color:#fff;padding:.7rem 1.2rem;border-radius:8px;font:700 .8rem 'Space Grotesk',sans-serif;cursor:pointer}
    button:hover{filter:brightness(1.1)}
    @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:1}100%{transform:translateY(400px) rotate(180deg);opacity:0}}
    @keyframes crack{0%,100%{transform:rotate(0) scale(1)}30%{transform:rotate(-1.5deg) scale(1.01)}60%{transform:rotate(2deg) skewX(-1deg)}80%{transform:rotate(-.5deg)}}
    @keyframes blink{50%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.shard,.boundary,.tree .dead{animation:none}}
  </style>
</head>
<body>
  <div class="app">
    <div class="chrome"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="frame">
      <div class="shard"></div><div class="shard"></div><div class="shard"></div><div class="shard"></div>
      <div class="boundary" role="alert">
        <div class="tag">&lt;ErrorBoundary /&gt;</div>
        <h2>Component tree collapsed</h2>
        <p class="msg">Uncaught TypeError: Cannot read properties of undefined (reading 'soul')</p>
        <div class="tree">
          &lt;App&gt;<br>
          &nbsp;&nbsp;&lt;Layout&gt;<br>
          &nbsp;&nbsp;&nbsp;&nbsp;&lt;Dashboard&gt;<br>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="dead">&lt;WidgetThatHatesYou /&gt;</span><br>
          &nbsp;&nbsp;&nbsp;&nbsp;&lt;/Dashboard&gt;<br>
          &nbsp;&nbsp;&lt;/Layout&gt;<br>
          &lt;/App&gt;
        </div>
        <button type="button">Reset boundary</button>
      </div>
    </div>
  </div>
</body>
</html>
