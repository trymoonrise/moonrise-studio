<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1563
    slug: 3d-cube-auto-spin
    title: Auto Spin 3D Cube
    category: 3d-effects
    tags: 3d, cube, spin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1563 — Auto Spin 3D Cube</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#05060a;perspective:900px;overflow:hidden;font-family:Syne,sans-serif}
    .field{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#12162a,transparent 55%),radial-gradient(circle at 20% 80%,rgba(108,140,255,.18),transparent 40%),radial-gradient(circle at 80% 20%,rgba(255,107,203,.14),transparent 35%);pointer-events:none}
    .scene{position:relative;width:180px;height:180px;transform-style:preserve-3d;animation:orbit 14s linear infinite}
    .cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:tumble 9s cubic-bezier(.45,.05,.55,.95) infinite}
    .face{position:absolute;inset:0;display:grid;place-items:center;font-size:1.6rem;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(6px);box-shadow:inset 0 0 40px rgba(255,255,255,.08),0 0 30px rgba(0,0,0,.4)}
    .f0{background:linear-gradient(145deg,#6c8cffcc,#3d5cff88);transform:rotateY(0deg) translateZ(90px)}
    .f1{background:linear-gradient(145deg,#ff6bcbcc,#c43d8888);transform:rotateY(90deg) translateZ(90px)}
    .f2{background:linear-gradient(145deg,#7ee0c3cc,#2db89a88);transform:rotateY(180deg) translateZ(90px)}
    .f3{background:linear-gradient(145deg,#ffd16ccc,#e09a2a88);transform:rotateY(-90deg) translateZ(90px)}
    .f4{background:linear-gradient(145deg,#b06cffcc,#6c3dff88);transform:rotateX(90deg) translateZ(90px)}
    .f5{background:linear-gradient(145deg,#111,#333);transform:rotateX(-90deg) translateZ(90px)}
    .ring{position:absolute;inset:-40px;border:1px dashed rgba(255,255,255,.15);border-radius:50%;transform:rotateX(72deg);animation:spin 8s linear infinite}
    .ring2{inset:-70px;border-style:solid;border-color:rgba(108,140,255,.25);animation-direction:reverse;animation-duration:12s}
    @keyframes orbit{to{transform:rotateY(360deg)}}
    @keyframes tumble{0%{transform:rotateX(-20deg) rotateY(0) rotateZ(0)}50%{transform:rotateX(25deg) rotateY(180deg) rotateZ(12deg)}100%{transform:rotateX(-20deg) rotateY(360deg) rotateZ(0)}}
    @keyframes spin{to{transform:rotateX(72deg) rotateZ(360deg)}}
    @media(prefers-reduced-motion:reduce){.scene,.cube,.ring{animation:none}.scene{transform:rotateY(-24deg) rotateX(-16deg)}}
  </style>
</head>
<body>
  <div class="field" aria-hidden="true"></div>
  <div class="scene">
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <div class="cube">
      <div class="face f0">01</div>
      <div class="face f1">02</div>
      <div class="face f2">03</div>
      <div class="face f3">04</div>
      <div class="face f4">05</div>
      <div class="face f5">06</div>
    </div>
  </div>
</body>
</html>
