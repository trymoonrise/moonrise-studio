<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0905
    slug: avatars-gradient-avatar-10
    title: Gradient Avatar 10
    category: avatars
    tags: avatars, gradient, marquee, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0905 - Gradient Avatar 10</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Mono:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f8f7f3;overflow:hidden;font-family:'DM Mono',monospace}
    .wash{position:fixed;inset:0;background:linear-gradient(160deg,#e8e4dc 0%,#f8f7f3 45%,#d9d4c8 100%);opacity:.9;pointer-events:none}
    .band{position:fixed;bottom:12%;left:0;right:0;overflow:hidden;pointer-events:none}
    .track{display:flex;width:max-content;white-space:nowrap;animation:run 42s linear infinite;font-size:clamp(2rem,7vw,4.5rem);font-family:Syne,sans-serif;font-weight:700;letter-spacing:-.04em;text-transform:uppercase;color:rgba(0,0,0,.06)}
    .stage{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center}
    .av{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:700;font-size:1.2rem;color:#111;background:linear-gradient(145deg,#cfc9ba,#f5f3ed 50%,#9a9488);border:1px solid rgba(0,0,0,.12)}
    @keyframes run{to{transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.track{animation:none}}
  </style>
</head>
<body>
  <div class="wash" aria-hidden="true"></div>
  <div class="band" aria-hidden="true"><div class="track"><span>Tone · Fade · Tone · Fade · Tone · Fade · </span><span>Tone · Fade · Tone · Fade · Tone · Fade · </span></div></div>
  <div class="stage"><div class="av">GR</div></div>
</body>
</html>
