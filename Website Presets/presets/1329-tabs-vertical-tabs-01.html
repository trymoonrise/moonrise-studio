<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1329
    slug: tabs-vertical-tabs-01
    title: Rail Switch Tabs
    category: tabs
    tags: tabs, vertical
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1329 - Rail Switch Tabs</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#09090d;color:#ececf2;font-family:Outfit,sans-serif;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit;text-align:left}
    .tabs{display:flex;width:min(560px,96vw);border:1px solid rgba(255,255,255,.1);border-radius:4px;overflow:hidden;background:#0e0e14}
    .rail{display:flex;flex-direction:column;width:140px;border-right:1px solid rgba(255,255,255,.08);position:relative;padding:8px 0}
    .indicator{position:absolute;left:0;width:3px;height:44px;background:#00c896;border-radius:0 2px 2px 0;transition:transform .35s cubic-bezier(.16,1,.3,1)}
    .tab{padding:14px 18px;font:500 .78rem Outfit,sans-serif;letter-spacing:.06em;text-transform:uppercase;color:rgba(236,236,242,.4);transition:color .3s;position:relative;z-index:1}
    .tab.on{color:#fff}
    .panel{flex:1;padding:28px 24px;position:relative;min-height:200px}
    .pane{position:absolute;inset:28px 24px;opacity:0;transform:translateX(12px);transition:opacity .4s,transform .4s;pointer-events:none}
    .pane.on{opacity:1;transform:none;pointer-events:auto}
    .pane h3{font-family:Syne,sans-serif;font-size:1.3rem;margin:0 0 10px;letter-spacing:-.02em}
    .pane p{margin:0;font-size:.88rem;color:rgba(236,236,242,.45);line-height:1.55}
    @media(prefers-reduced-motion:reduce){.indicator,.pane{transition:none}}
  </style>
</head>
<body>
<div class="tabs">
  <nav class="rail" id="rail">
    <div class="indicator" id="ind"></div>
    <button class="tab on" data-i="0" type="button">Overview</button>
    <button class="tab" data-i="1" type="button">Metrics</button>
    <button class="tab" data-i="2" type="button">Config</button>
  </nav>
  <div class="panel">
    <div class="pane on"><h3>System overview</h3><p>Vertical rail tabs with sliding indicator and cross-fade panels.</p></div>
    <div class="pane"><h3>Live metrics</h3><p>Throughput, latency, and error rate at a glance.</p></div>
    <div class="pane"><h3>Configuration</h3><p>Environment variables and deployment settings.</p></div>
  </div>
</div>
<script>
const tabs=[...document.querySelectorAll('.tab')],panes=[...document.querySelectorAll('.pane')],ind=document.getElementById('ind');
function activate(i){tabs.forEach((t,k)=>t.classList.toggle('on',k===i));panes.forEach((p,k)=>p.classList.toggle('on',k===i));ind.style.transform=`translateY(${i*44+8}px)`;}
tabs.forEach(t=>t.onclick=()=>activate(+t.dataset.i));activate(0);
</script>
</body>
</html>
