<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1507
    slug: menu-fullscreen-split-reveal
    title: Split Reveal Menu
    category: navigation
    tags: menu, hamburger, fullscreen, split
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1507 — Split Reveal Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f7f7f5;color:#111;font-family:Outfit,sans-serif;overflow:hidden}
    .top{display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1.25rem,4vw,3rem);position:relative;z-index:40}
    .logo{font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .burger{width:28px;height:12px;border:0;background:transparent;cursor:pointer;padding:0;display:flex;flex-direction:column;justify-content:space-between;z-index:50}
    .burger i{display:block;height:1px;background:currentColor;transition:transform .5s cubic-bezier(.22,1,.36,1)}
    .burger.open{color:#fff}
    .burger.open i:first-child{transform:translateY(5.5px) rotate(45deg)}
    .burger.open i:last-child{transform:translateY(-5.5px) rotate(-45deg)}
    .overlay{position:fixed;inset:0;z-index:30;pointer-events:none}
    .pane{position:absolute;top:0;bottom:0;width:50%;transition:transform .7s cubic-bezier(.22,1,.36,1)}
    .pane--l{left:0;background:#111;transform:translateX(-100%)}
    .pane--r{right:0;background:#111;transform:translateX(100%)}
    .overlay.open{pointer-events:auto}
    .overlay.open .pane{transform:none}
    .nav{position:absolute;inset:0;display:grid;place-items:center;z-index:35;opacity:0;transition:opacity .4s .2s}
    .overlay.open .nav{opacity:1}
    .nav a{display:block;font-family:Syne,sans-serif;font-size:clamp(2.2rem,8vw,5rem);font-weight:800;letter-spacing:-.05em;color:#fff;text-decoration:none;line-height:1.05;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s cubic-bezier(.22,1,.36,1)}
    .overlay.open .nav a{opacity:1;transform:none}
    .overlay.open .nav a:nth-child(1){transition-delay:.25s}
    .overlay.open .nav a:nth-child(2){transition-delay:.32s}
    .overlay.open .nav a:nth-child(3){transition-delay:.39s}
    .overlay.open .nav a:nth-child(4){transition-delay:.46s}
    .nav a:hover{opacity:.4}
    .page{height:70vh;display:grid;place-items:center;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:300;color:#999}
    @media(prefers-reduced-motion:reduce){.pane,.nav,.nav a,.burger i{transition:none}}
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">SPLIT</div>
    <button class="burger" id="burger" aria-label="Menu" aria-expanded="false"><i></i><i></i></button>
  </div>
  <div class="overlay" id="overlay">
    <div class="pane pane--l"></div>
    <div class="pane pane--r"></div>
    <nav class="nav"><a href="#">Index</a><a href="#">Work</a><a href="#">Studio</a><a href="#">Contact</a></nav>
  </div>
  <div class="page">Two halves meet</div>
  <script>
    const b=document.getElementById('burger'),o=document.getElementById('overlay');
    b.addEventListener('click',()=>{const on=o.classList.toggle('open');b.classList.toggle('open',on);b.setAttribute('aria-expanded',String(on))});
  </script>
</body>
</html>
