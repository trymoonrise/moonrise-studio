<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0444
    slug: scroll-animations-sticky-counter-08
    title: Sticky Counter 08
    category: scroll-animations
    tags: scroll-animations, sticky
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0444 - Sticky Counter 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0c0c10;color:#fff;font-family:system-ui}.track{height:260vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center}.n{font-variant-numeric:tabular-nums;font-size:clamp(3.5rem,12vw,8rem);font-weight:950;letter-spacing:-.06em}.meter{width:min(70vw,520px);height:10px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden;margin:18px auto 0}.meter i{display:block;height:100%;width:calc(var(--p,0)*100%);background:linear-gradient(90deg,#ff6cb0,#6c8cff)}.lbl{color:rgba(255,255,255,.65);text-align:center;margin-top:.75rem}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div style="text-align:center"><div class="n" id="n">000</div><div class="meter"><i id="m"></i></div><div class="lbl">Sticky counter mapped to scroll</div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const n=document.getElementById('n'),m=document.getElementById('m');addEventListener('scroll',()=>{const p=prog();n.textContent=String(Math.round(p*987)).padStart(3,'0');m.style.setProperty('--p',String(p));},{passive:true});</script>
</body>
</html>
