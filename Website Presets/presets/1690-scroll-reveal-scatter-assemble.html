<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1690
    slug: scroll-reveal-scatter-assemble
    title: Scatter Assemble Scroll
    category: animation
    tags: scroll, reveal, scatter, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1690 — Scatter Assemble Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#0b1020;color:#eef2ff;font-family:Outfit,sans-serif;overflow-x:hidden}
    .hero{min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
    .hero h1{margin:0;font-size:clamp(3rem,12vw,6.5rem);font-weight:800;letter-spacing:-.05em}
    .hero p{opacity:.45;margin-top:1rem}
    .stage{max-width:900px;margin:0 auto;padding:10vh 1.25rem 50vh}
    .cluster{--p:0;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:35vh}
    .chip{
      aspect-ratio:1;border-radius:18px;display:grid;place-items:center;
      font-weight:800;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:-.03em;
      background:linear-gradient(145deg,var(--a),var(--b));
      color:#fff;position:relative;
      transform:
        translate(calc(var(--x)*(1 - var(--p))), calc(var(--y)*(1 - var(--p))))
        rotate(calc(var(--r)*(1 - var(--p))*1deg))
        scale(calc(0.55 + var(--p)*0.45));
      opacity:calc(0.2 + var(--p)*0.8);
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .chip:nth-child(1){--a:#ff5a3d;--b:#ff9a3d;--x:-180px;--y:120px;--r:-48}
    .chip:nth-child(2){--a:#3d7bff;--b:#6ad0ff;--x:40px;--y:-160px;--r:32}
    .chip:nth-child(3){--a:#21c58b;--b:#7dffb2;--x:200px;--y:80px;--r:56}
    .chip:nth-child(4){--a:#b44dff;--b:#ff6bd6;--x:-140px;--y:-100px;--r:-24}
    .chip:nth-child(5){--a:#ffd13d;--b:#ff8a3d;--x:20px;--y:180px;--r:18}
    .chip:nth-child(6){--a:#3de0ff;--b:#3d6bff;--x:160px;--y:-40px;--r:-36}
    .label{grid-column:1/-1;text-align:center;margin-top:.5rem;opacity:calc(var(--p)*.75);font-size:1.05rem}
    @media (max-width:640px){.cluster{grid-template-columns:repeat(2,1fr)}.chip:nth-child(5),.chip:nth-child(6){display:none}}
    @media (prefers-reduced-motion:reduce){.chip{transform:none!important;opacity:1!important}}
  </style>
</head>
<body>
  <header class="hero">
    <div>
      <h1>ASSEMBLE</h1>
      <p>Fragments fly home as you scroll</p>
    </div>
  </header>
  <main class="stage">
    <div class="cluster" data-cluster>
      <div class="chip">A</div>
      <div class="chip">B</div>
      <div class="chip">C</div>
      <div class="chip">D</div>
      <div class="chip">E</div>
      <div class="chip">F</div>
      <p class="label">Scattered offsets collapse into a clean grid.</p>
    </div>
    <div class="cluster" data-cluster>
      <div class="chip">01</div>
      <div class="chip">02</div>
      <div class="chip">03</div>
      <div class="chip">04</div>
      <div class="chip">05</div>
      <div class="chip">06</div>
      <p class="label">Scroll back out and they explode apart again.</p>
    </div>
  </main>
  <script>
    const clusters=[...document.querySelectorAll('[data-cluster]')];
    const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    function clamp(n,a,b){return Math.min(b,Math.max(a,n))}
    function tick(){
      clusters.forEach(c=>{
        if(reduced){c.style.setProperty('--p','1');return}
        const r=c.getBoundingClientRect(),vh=innerHeight;
        c.style.setProperty('--p',clamp((vh*.9-r.top)/(vh*.65),0,1).toFixed(4));
      });
    }
    tick();
    addEventListener('scroll',tick,{passive:true});
    addEventListener('resize',tick,{passive:true});
  </script>
</body>
</html>
