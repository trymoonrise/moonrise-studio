<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0601
    slug: docks-glass-dock-05
    title: Glass Dock 05
    category: docks
    tags: docks, glass
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0601 - Glass Dock 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:end center;padding-bottom:2.5rem;overflow:hidden;background:#1a1520}
    .bg{position:fixed;inset:0;background:
      radial-gradient(circle at 20% 30%,rgba(108,140,255,.45),transparent 40%),
      radial-gradient(circle at 80% 60%,rgba(255,107,203,.35),transparent 35%),
      radial-gradient(circle at 50% 80%,rgba(126,224,195,.3),transparent 40%);filter:blur(40px);animation:drift 12s ease-in-out infinite alternate}
    .dock{position:relative;z-index:1;display:flex;gap:8px;padding:12px 14px;background:rgba(255,255,255,.12);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border:1px solid rgba(255,255,255,.28);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.35);animation:rise .7s cubic-bezier(.22,1,.36,1) both}
    .btn{width:48px;height:48px;border:none;border-radius:14px;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:grid;place-items:center;transition:transform .35s cubic-bezier(.22,1,.36,1),background .3s,box-shadow .3s}
    .btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
    .btn:hover{transform:translateY(-6px) scale(1.06);background:rgba(255,255,255,.22)}
    .btn.active{background:#fff;color:#111;box-shadow:0 8px 24px rgba(255,255,255,.25)}
    @keyframes drift{to{transform:scale(1.08) translate(2%,-1%)}}
    @keyframes rise{from{opacity:0;translate:0 20px}to{opacity:1;translate:0 0}}
    @media(prefers-reduced-motion:reduce){.bg,.dock{animation:none}}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <nav class="dock" aria-label="Glass dock">
    <button class="btn active" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M4 10.5L12 4l8 6.5V20h-5v-5H9v5H4z"/></svg></button>
    <button class="btn" aria-label="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg></button>
    <button class="btn" aria-label="Heart"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.5-7 10-7 10z"/></svg></button>
    <button class="btn" aria-label="User"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></button>
  </nav>
  <script>
    const btns=[...document.querySelectorAll('.btn')];
    btns.forEach(b=>b.addEventListener('click',()=>{btns.forEach(x=>x.classList.remove('active'));b.classList.add('active')}));
  </script>
</body>
</html>
