<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1803
    slug: staggered-grid-zero-gravity
    title: Zero Gravity Grid
    category: animation
    tags: grid, stagger, float, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1803 — Zero Gravity Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#070707;color:#fff;font-family:"DM Sans",system-ui,sans-serif;padding:2rem;display:grid;place-items:center;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tile,.cell,.brick,.module,.card,.panel{opacity:1!important;transform:none!important;clip-path:none!important;filter:none!important}}
    .wrap{width:min(900px,100%)}
    h1{margin:0 0 1.5rem;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2.2rem,6vw,4rem);font-weight:800;letter-spacing:-.07em}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .float{min-height:170px;padding:1.25rem;background:#101010;border:1px solid #1e1e1e;opacity:0;
      transform:translate(var(--fx),var(--fy)) rotate(var(--fr)) scale(.85);
      animation:land 1.1s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*100ms)}
    .float b{font-family:"Syne",system-ui,sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-.03em}
    .float span{display:block;margin-top:.4rem;font-size:.75rem;color:#555}
    @keyframes land{0%{opacity:0}40%{opacity:1}100%{opacity:1;transform:none}}
    @media(max-width:560px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap"><h1>Zero gravity</h1>
    <section class="grid">
      <article class="float" style="--i:1;--fx:-40px;--fy:-60px;--fr:-8deg"><b>Drift</b><span>Free float entry</span></article>
      <article class="float" style="--i:2;--fx:50px;--fy:-30px;--fr:6deg"><b>Orbit</b><span>Soft settle</span></article>
      <article class="float" style="--i:3;--fx:20px;--fy:50px;--fr:-4deg"><b>Mass</b><span>Gravity returns</span></article>
      <article class="float" style="--i:4;--fx:-55px;--fy:20px;--fr:10deg"><b>Pull</b><span>Alignment lock</span></article>
      <article class="float" style="--i:5;--fx:35px;--fy:-45px;--fr:-12deg"><b>Dock</b><span>Final position</span></article>
      <article class="float" style="--i:6;--fx:-15px;--fy:40px;--fr:5deg"><b>Rest</b><span>Stillness</span></article>
    </section></main>

</body>
</html>
