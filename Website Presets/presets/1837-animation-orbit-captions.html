<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1837
    slug: animation-orbit-captions
    title: Orbiting Caption Rings
    category: animation
    tags: animation, orbit, type, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1837 — Orbiting Caption Rings</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#080808;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
      .sys{position:relative;width:min(80vw,340px);aspect-ratio:1}
      .hub{position:absolute;inset:32%;border:1px solid #222;display:grid;place-items:center;font-family:"Syne",system-ui,sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:-.03em}
      .ring{position:absolute;inset:0;animation:spin 18s linear infinite}
      .ring--2{inset:12%;animation-duration:12s;animation-direction:reverse}
      .ring span{position:absolute;left:50%;top:0;translate:-50% -50%;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#666;white-space:nowrap}
      .ring--2 span{color:#999;font-size:.58rem}
      @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="sys"><div class="ring" aria-hidden="true"><span>experimental · orbit · caption</span></div><div class="ring ring--2" aria-hidden="true"><span>professional · motion</span></div><div class="hub">CORE</div></div>

</body>
</html>
