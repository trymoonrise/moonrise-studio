<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1133
    slug: ai-chat-sidebar-chat-04
    title: Sidebar Chat 04
    category: ai-chat
    tags: ai-chat, sidebar
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1133 — Sidebar Chat 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef1f5;font-family:Inter,system-ui,sans-serif;padding:1.5rem;color:#111}
    .shell{display:grid;grid-template-columns:72px 1fr;width:min(780px,100%);height:min(480px,78vh);background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 24px 60px rgba(20,30,50,.12);animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .rail{background:#0f1117;display:flex;flex-direction:column;align-items:center;padding:1rem .5rem;gap:.75rem}
    .dot{width:40px;height:40px;border-radius:14px;border:none;background:#1c2030;color:#fff;cursor:pointer;display:grid;place-items:center;transition:transform .25s,background .2s}
    .dot:hover,.dot.active{background:#10a37f;transform:translateY(-2px)}
    .dot svg{width:18px;height:18px}
    .main{display:flex;flex-direction:column;min-width:0}
    .top{padding:1rem 1.25rem;border-bottom:1px solid #eee;font-weight:600;font-size:.95rem}
    .feed{flex:1;padding:1.25rem;overflow:auto;display:flex;flex-direction:column;gap:.85rem}
    .msg{max-width:80%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.45}
    .msg.user{align-self:flex-end;background:#111;color:#fff}
    .msg.bot{align-self:flex-start;background:#f3f4f6}
    .composer{padding:0 1rem 1rem}
    .ask{display:flex;align-items:center;gap:.45rem;padding:.55rem .55rem .55rem .95rem;border:1px solid #e2e5ea;border-radius:26px;background:#fafafa;transition:box-shadow .25s,border-color .25s}
    .ask:focus-within{border-color:#c8ccd4;box-shadow:0 0 0 4px rgba(16,163,127,.12);background:#fff}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.9rem}
    .send{width:34px;height:34px;border:none;border-radius:50%;background:#10a37f;color:#fff;cursor:pointer;display:grid;place-items:center}
    .send svg{width:15px;height:15px}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.shell{animation:none}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <button class="dot active" type="button" aria-label="Chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg></button>
      <button class="dot" type="button" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg></button>
      <button class="dot" type="button" aria-label="Library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></button>
    </aside>
    <div class="main">
      <div class="top">Compact rail · Ask bar</div>
      <div class="feed">
        <div class="msg user">Give me three headline options.</div>
        <div class="msg bot">1. Ask boldly. 2. Shape the answer. 3. Start with one question.</div>
      </div>
      <div class="composer">
        <form class="ask">
          <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
          <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
