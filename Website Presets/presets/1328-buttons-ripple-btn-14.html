<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1328 — Ripple Btn 14</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0a0a0c}.btn{position:relative;padding:14px 32px;border:none;border-radius:8px;background:#ff6cb0;color:#0a0a0c;font-weight:600;cursor:pointer;overflow:hidden}
  </style>
</head>
<body>
<button class="btn" id="b">Ripple Btn 946</button>
<script>document.getElementById('b').onclick=function(e){const r=document.createElement('span');r.style.cssText='position:absolute;border-radius:50%;background:rgba(255,255,255,.4);width:20px;height:20px;left:'+(e.offsetX-10)+'px;top:'+(e.offsetY-10)+'px;animation:rip .6s forwards';this.appendChild(r);setTimeout(()=>r.remove(),600);};const s=document.createElement('style');s.textContent='@keyframes rip{to{transform:scale(8);opacity:0}}';document.head.appendChild(s);</script>
</body>
</html>
