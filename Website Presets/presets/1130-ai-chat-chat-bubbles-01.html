<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1130
    slug: ai-chat-chat-bubbles-01
    title: Stream Chat Bubble Thread
    category: ai-chat
    tags: ai-chat, bubbles, stream, thread
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1130 - Stream Chat Bubble Thread</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0b0e;color:#e2e5eb;font-family:Outfit,sans-serif;padding:2rem}
    .chat{width:min(400px,100%);display:flex;flex-direction:column;gap:1rem}
    .bubble{max-width:85%;padding:.85rem 1.1rem;border-radius:16px;font-size:.88rem;line-height:1.5;opacity:0;animation:appear .5s ease forwards}
    .user{align-self:flex-end;background:#1e2430;border:1px solid rgba(255,255,255,.08);border-bottom-right-radius:4px;animation-delay:.2s}
    .ai{align-self:flex-start;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);border-bottom-left-radius:4px;animation-delay:.8s}
    .ai:nth-child(3){animation-delay:1.4s}
    .label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(226,229,235,.35);margin-bottom:.25rem;font-weight:500}
    .user .label{text-align:right;color:rgba(226,229,235,.25)}
    .ai .label{color:rgba(56,189,248,.5)}
    .cursor{display:inline-block;width:2px;height:14px;background:#38bdf8;margin-left:2px;vertical-align:text-bottom;animation:blink 1s step-end infinite}
    @keyframes appear{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @keyframes blink{50%{opacity:0}}
    @media(prefers-reduced-motion:reduce){.bubble{opacity:1;animation:none}.cursor{animation:none}}
  </style>
</head>
<body>
  <div class="chat">
    <div class="bubble user"><div class="label">You</div>Explain how edge caching reduces latency for global users.</div>
    <div class="bubble ai"><div class="label">Assistant</div>Edge caching stores content on servers closer to users, cutting round-trip time from ~200ms to under 20ms.</div>
    <div class="bubble ai"><div class="label">Assistant</div>It works by replicating static assets and API responses at PoPs worldwide<span class="cursor"></span></div>
  </div>
</body>
</html>
