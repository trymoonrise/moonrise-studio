<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1582
    slug: 3d-parallax-layers-scene
    title: 3D Parallax Layers
    category: 3d-effects
    tags: 3d, parallax, layers
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1582 - 3D Parallax Layers</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#06070c;perspective:900px;overflow:hidden;font-family:Outfit,sans-serif;cursor:crosshair}
    .scene{position:relative;width:min(520px,92vw);height:360px;transform-style:preserve-3d;transform:rotateX(var(--rx,8deg)) rotateY(var(--ry,-12deg));transition:transform .1s linear}
    .layer{position:absolute;inset:0;transform-style:preserve-3d;border-radius:24px;pointer-events:none}
    .sky{background:radial-gradient(ellipse at 50% 20%,#1a2250,#06070c 70%);transform:translateZ(-80px) scale(1.15)}
    .mid{display:flex;gap:1rem;align-items:flex-end;justify-content:center;padding:2rem;transform:translateZ(0)}
    .mid i{display:block;width:70px;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#6c8cff88,#6c8cff22);border:1px solid rgba(255,255,255,.12)}
    .mid i:nth-child(1){height:120px}.mid i:nth-child(2){height:180px;background:linear-gradient(180deg,#ff6bcb88,#ff6bcb22)}.mid i:nth-child(3){height:140px;background:linear-gradient(180deg,#7ee0c388,#7ee0c322)}.mid i:nth-child(4){height:200px;background:linear-gradient(180deg,#ffd16c88,#ffd16c22)}.mid i:nth-child(5){height:110px;background:linear-gradient(180deg,#b06cff88,#b06cff22)}
    .fore{transform:translateZ(80px);display:grid;place-items:center;color:#fff;text-align:center;padding:2rem}
    .fore h2{margin:0;font-family:Syne,sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);letter-spacing:-.03em;text-shadow:0 10px 40px rgba(0,0,0,.6)}
    .fore p{margin:.5rem 0 0;opacity:.7;font-size:.9rem}
    .orb{position:absolute;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#6c8cff 40%,transparent 70%);transform:translateZ(40px) translate(40%,-60%);filter:blur(1px);opacity:.85;animation:drift 7s ease-in-out infinite}
    .hint{position:fixed;bottom:1.5rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);font-family:Syne,sans-serif}
    @keyframes drift{0%,100%{transform:translateZ(40px) translate(40%,-60%)}50%{transform:translateZ(55px) translate(48%,-68%)}}
    @media(prefers-reduced-motion:reduce){.scene,.orb{transition:none;animation:none}}
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="layer sky"></div>
    <div class="layer mid" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
    <div class="orb" aria-hidden="true"></div>
    <div class="layer fore">
      <div>
        <h2>Parallax city</h2>
        <p>Move - layers slide at different depths.</p>
      </div>
    </div>
  </div>
  <div class="hint">Pointer parallax</div>
  <script>
    const scene=document.getElementById('scene');
    addEventListener('pointermove',(e)=>{
      const x=(e.clientX/innerWidth-.5)*2;
      const y=(e.clientY/innerHeight-.5)*2;
      scene.style.setProperty('--ry',(x*22)+'deg');
      scene.style.setProperty('--rx',(8+y*-12)+'deg');
    });
  </script>
</body>
</html>
