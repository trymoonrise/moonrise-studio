<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1723
    slug: staggered-grid-neon-panels
    title: Neon Panels Grid
    category: animation
    tags: grid, stagger, neon, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1723 — Neon Panels Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#05020a;color:#fff;font-family:Inter,system-ui,sans-serif;padding:2rem;display:grid;place-items:center}.wrap{width:min(960px,100%)}h1{font-size:clamp(2.4rem,7vw,5.5rem);letter-spacing:-.08em;line-height:.85;margin:0 0 1.5rem}.grid{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:100px;gap:.75rem}.panel{grid-column:span var(--c);grid-row:span var(--r);border-radius:18px;background:#0f0a18;border:1px solid color-mix(in srgb,var(--n),transparent 55%);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 0 34px color-mix(in srgb,var(--n),transparent 82%);position:relative;overflow:hidden;opacity:0;transform:scale(.88) translateY(30px);animation:neon .7s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*70ms)}.panel:before{content:'';position:absolute;inset:-30%;background:radial-gradient(circle at 50% 50%,var(--n),transparent 55%);opacity:.18}.panel b{position:absolute;left:1rem;bottom:1rem;color:var(--n);font-size:clamp(1.4rem,3vw,2.2rem);letter-spacing:-.06em;text-shadow:0 0 18px var(--n)}.panel:hover{filter:brightness(1.2)}@keyframes neon{to{opacity:1;transform:none}}@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:120px}.panel{grid-column:span 1!important;grid-row:span 1!important}}@media(prefers-reduced-motion:reduce){.panel{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Neon control room</h1>
    <section class="grid">
      <div class="panel" style="--i:1;--c:3;--r:2;--n:#00f5ff"><b>Pulse</b></div>
      <div class="panel" style="--i:2;--c:3;--r:1;--n:#ff2bd6"><b>Trace</b></div>
      <div class="panel" style="--i:3;--c:2;--r:2;--n:#78ff6b"><b>Flow</b></div>
      <div class="panel" style="--i:4;--c:2;--r:1;--n:#ffd36b"><b>Sync</b></div>
      <div class="panel" style="--i:5;--c:2;--r:2;--n:#8b6bff"><b>Core</b></div>
      <div class="panel" style="--i:6;--c:4;--r:1;--n:#ff6b6b"><b>Online</b></div>
    </section>
  </main>
</body>
</html>
