<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1650
    slug: ease-in-toast-slide
    title: Toast Slide Ease
    category: ease-in
    tags: ease-in, toast, notification, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1650 - Toast Slide Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#f8fafc;font-family:system-ui,sans-serif}.toast{position:fixed;top:1.5rem;right:1.5rem;max-width:320px;padding:14px 18px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 8px 30px rgba(15,23,42,.1);display:flex;align-items:center;gap:12px;opacity:0;transform:translateX(40px);animation:slide .7s cubic-bezier(.22,.61,.36,1) .2s forwards}.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}.text{font-size:.88rem;color:#334155;font-weight:500}@keyframes slide{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="toast"><div class="dot"></div><span class="text">Changes saved successfully</span></div>

</body>
</html>
