--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0780 - Multi Step 02</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#f4f0e8;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(520px,94vw)}.rail{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:35px}.rail i{height:6px;border-radius:99px;background:#ddd2c2;transition:.4s}.rail i.on{background:#111}.page{display:none;animation:in .5s cubic-bezier(.22,1,.36,1)}.page.on{display:block}.page small{font:500 10px 'DM Mono';letter-spacing:.18em;text-transform:uppercase;color:#8b7c68}.page h2{font:400 46px/1 'Instrument Serif';margin:12px 0 28px}.page input,.page select{width:100%;border:0;border-bottom:1px solid #8d8172;background:transparent;padding:14px 0;outline:0;font-size:18px}.nav{display:flex;justify-content:space-between;margin-top:28px}.nav button{border:1px solid #111;border-radius:999px;padding:11px 18px;background:transparent}.nav .next{background:#111;color:#fff}@keyframes in{from{opacity:0;transform:translateY(14px)}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><div class="rail"><i></i><i></i><i></i><i></i></div><form><section class="page"><small>Identity</small><h2>Who are you?</h2><input placeholder="Full name"></section><section class="page"><small>Practice</small><h2>What do you make?</h2><select><option>Products</option><option>Brands</option><option>Experiences</option></select></section><section class="page"><small>Scale</small><h2>How large is the team?</h2><input type="number" value="4"></section><section class="page"><small>Complete</small><h2>Ready to begin?</h2><p>Your project profile is prepared.</p></section><div class="nav"><button type="button" id="back">Back</button><button type="button" class="next" id="next">Continue</button></div></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));const pages=[...document.querySelectorAll('.page')],bars=[...document.querySelectorAll('.rail i')],back=document.getElementById('back'),next=document.getElementById('next');let i=0;function d(){pages.forEach((p,n)=>p.classList.toggle('on',n===i));bars.forEach((b,n)=>b.classList.toggle('on',n<=i));back.style.visibility=i?'visible':'hidden';next.textContent=i===3?'Restart':'Continue';}back.onclick=()=>{i--;d()};next.onclick=()=>{i=i===3?0:i+1;d()};d();</script></body></html>
