<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1451
    slug: scrollbar-dual-tone
    title: Dual Tone Scrollbar
    category: scrollbar
    tags: scrollbar, dual, contrast
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1451 - Dual Tone Scrollbar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#1e1e2e;color:#fff}.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}.side{padding:2rem;overflow-y:auto;scrollbar-width:thin}.side--a{background:#6c8cff;scrollbar-color:#fff rgba(255,255,255,.2)}.side--a::-webkit-scrollbar{width:8px}.side--a::-webkit-scrollbar-thumb{background:#fff;border-radius:99px}.side--b{background:#ff6cb0;scrollbar-color:#111 rgba(0,0,0,.15)}.side--b::-webkit-scrollbar{width:8px}.side--b::-webkit-scrollbar-thumb{background:#111;border-radius:99px}.card{height:100px;margin-bottom:12px;border-radius:10px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-weight:700}
  </style>
</head>
<body>
<div class="split"><div class="side side--a"><div class="card">A1</div><div class="card">A2</div><div class="card">A3</div><div class="card">A4</div><div class="card">A5</div><div class="card">A6</div><div class="card">A7</div><div class="card">A8</div><div class="card">A9</div><div class="card">A10</div></div><div class="side side--b"><div class="card">B1</div><div class="card">B2</div><div class="card">B3</div><div class="card">B4</div><div class="card">B5</div><div class="card">B6</div><div class="card">B7</div><div class="card">B8</div><div class="card">B9</div><div class="card">B10</div></div></div>

</body>
</html>
