<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1604
    slug: 3d-mouse-layer-parallax
    title: 3D Layer Mouse Parallax
    category: 3d-mouse
    tags: 3d, mouse, parallax
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1604 — 3D Layer Mouse Parallax</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#06070c;perspective:1000px;overflow:hidden;font-family:Outfit,sans-serif}
    .scene{position:relative;width:min(520px,92vw);height:340px;transform-style:preserve-3d;transform:rotateX(var(--rx,8deg)) rotateY(var(--ry,-10deg))}
    .l{position:absolute;inset:0;transform-style:preserve-3d;border-radius:24px;pointer-events:none}
    .sky{background:radial-gradient(ellipse at 50% 20%,#1a2250,#06070c 70%);transform:translateZ(-90px) scale(1.2)}
    .mid{display:flex;gap:1rem;align-items:flex-end;justify-content:center;padding:2rem;transform:translateZ(0)}
    .mid i{display:block;width:64px;border-radius:12px 12px 0 0;border:1px solid rgba(255,255,255,.12)}
    .mid i:nth-child(1){height:110px;background:linear-gradient(180deg,#6c8cff88,#6c8cff18)}
    .mid i:nth-child(2){height:170px;background:linear-gradient(180deg,#ff6bcb88,#ff6bcb18)}
    .mid i:nth-child(3){height:130px;background:linear-gradient(180deg,#7ee0c388,#7ee0c318)}
    .mid i:nth-child(4){height:190px;background:linear-gradient(180deg,#ffd16c88,#ffd16c18)}
    .mid i:nth-child(5){height:100px;background:linear-gradient(180deg,#b06cff88,#b06cff18)}
    .fore{transform:translateZ(90px);display:grid;place-items:center;color:#fff;text-align:center}
    .fore h2{margin:0;font-family:Syne,sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);letter-spacing:-.03em;text-shadow:0 12px 40px rgba(0,0,0,.6)}
    .fore p{margin:.4rem 0 0;opacity:.65}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);font-family:Syne,sans-serif}
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="l sky"></div>
    <div class="l mid" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
    <div class="l fore"><div><h2>Layer city</h2><p>Parallax depth follows the pointer</p></div></div>
  </div>
  <div class="hint">Move to shift planes</div>
  <script>
    const s=document.getElementById('scene');let tx=8,ty=-10,cx=8,cy=-10;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;ty=x*24;tx=8+y*-14});
    (function loop(){cx+=(tx-cx)*.1;cy+=(ty-cy)*.1;s.style.setProperty('--rx',cx+'deg');s.style.setProperty('--ry',cy+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
