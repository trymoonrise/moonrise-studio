<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1475
    slug: scroll-progress-chapters
    title: Chapter Progress Rail
    category: scroll-progress
    tags: scroll, chapters, progress
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1475 — Chapter Progress Rail</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#fafafa;color:#111}.chapters{position:fixed;left:1.5rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:5}.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:background .3s,transform .3s}.dot.on{background:#6c8cff;transform:scale(1.3)}.dot.done{background:#6c8cff;opacity:.4}section{min-height:100vh;display:grid;place-items:center;font-size:2rem;font-weight:700;padding-left:4rem}
  </style>
</head>
<body>
<div class="chapters" id="ch"><div class="dot" data-i="0"></div><div class="dot" data-i="1"></div><div class="dot" data-i="2"></div><div class="dot" data-i="3"></div><div class="dot" data-i="4"></div><div class="dot" data-i="5"></div></div><section>Chapter 1</section><section>Chapter 2</section><section>Chapter 3</section><section>Chapter 4</section><section>Chapter 5</section><section>Chapter 6</section>
<script>const dots=[...document.querySelectorAll('.dot')];const secs=[...document.querySelectorAll('section')];const obs=new IntersectionObserver(es=>es.forEach(e=>{const i=+e.target.dataset.i;dots[i].classList.toggle('on',e.isIntersecting);dots[i].classList.toggle('done',!e.isIntersecting&&e.boundingClientRect.top<0);}),{threshold:.5});secs.forEach((s,i)=>{s.dataset.i=i;obs.observe(s);});</script>
</body>
</html>
