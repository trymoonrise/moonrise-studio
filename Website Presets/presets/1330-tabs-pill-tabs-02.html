  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1330 — Pill Tabs 02</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.tabs{display:flex;gap:4px;background:#16161a;padding:4px;border-radius:12px}.tab{padding:10px 20px;border:none;background:transparent;color:#8888a0;border-radius:8px;cursor:pointer;font-size:.9rem}.tab.on{background:#6c8cff;color:#0d0d0f;font-weight:600}.panel{margin-top:1rem;color:#e8e8ed}
  </style>
</head>
<body>
<div><div class="tabs"><button class="tab on">A</button><button class="tab">B</button><button class="tab">C</button></div><div class="panel" id="p">Tab A — Pill Tabs 936</div></div>
<script>document.querySelectorAll('.tab').forEach((t,i)=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('p').textContent='Tab '+t.textContent+' — Pill Tabs 936';});</script>
</body>
</html>
