<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0637
    slug: menus-context-menu-02
    title: Terminal Context Menu
    category: menus
    tags: menus, context
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0637 - Terminal Context Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #94a3b8;
      padding: 1.5rem;
    }

    .canvas {
      width: min(480px, 92vw);
      height: 280px;
      background: #0f1419;
      border: 1px solid #1e293b;
      border-radius: 12px;
      display: grid;
      place-items: center;
      position: relative;
      cursor: context-menu;
      user-select: none;
    }

    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, #00d4aa08 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .hint {
      text-align: center;
      z-index: 1;
    }

    .hint strong {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      color: #e2e8f0;
      margin-bottom: 0.35rem;
    }

    .hint span { font-size: 0.85rem; }

    .ctx {
      position: fixed;
      min-width: 200px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.35rem;
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.55);
    }

    .ctx.open {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
      animation: ctxPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes ctxPop {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .ctx-head {
      padding: 0.4rem 0.65rem 0.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #00d4aa;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 0.25rem;
    }

    .ctx button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.5rem 0.65rem;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.85rem;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .ctx button:hover { background: #00d4aa18; color: #00d4aa; }
    .ctx button.danger:hover { background: #f8717118; color: #f87171; }

    .ctx kbd {
      font-size: 0.65rem;
      color: #475569;
      font-family: inherit;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 0.6rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #e2e8f0;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 101;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .canvas::before { animation: none; }
      .ctx.open { animation: none; }
    }
  </style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="hint">
      <strong>Right-click anywhere</strong>
      <span>Context menu with keyboard shortcuts</span>
    </div>
  </div>

  <menu class="ctx" id="ctx" hidden>
    <div class="ctx-head">Actions</div>
    <button type="button" data-action="Copy"><span>Copy</span><kbd>⌘C</kbd></button>
    <button type="button" data-action="Duplicate"><span>Duplicate</span><kbd>⌘D</kbd></button>
    <button type="button" data-action="Rename"><span>Rename</span><kbd>F2</kbd></button>
    <button type="button" class="danger" data-action="Delete"><span>Delete</span><kbd>⌫</kbd></button>
  </menu>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = document.getElementById('ctx');
    const toast = document.getElementById('toast');
    let toastTimer;

    function hideCtx() {
      ctx.classList.remove('open');
      ctx.hidden = true;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      hideCtx();
      ctx.hidden = false;
      const x = Math.min(e.clientX, window.innerWidth - 220);
      const y = Math.min(e.clientY, window.innerHeight - 180);
      ctx.style.left = x + 'px';
      ctx.style.top = y + 'px';
      requestAnimationFrame(() => ctx.classList.add('open'));
    });

    document.addEventListener('click', hideCtx);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideCtx(); });

    ctx.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        showToast(btn.dataset.action + ' triggered');
        hideCtx();
      });
    });
  </script>
</body>
</html>
