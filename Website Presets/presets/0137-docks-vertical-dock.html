<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0137
    slug: docks-vertical-dock
    title: Vertical Side Dock
    category: docks
    tags: docks, vertical
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0137 - Vertical Side Dock</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0e1016;font-family:Outfit,sans-serif;display:flex;align-items:center}
    .rail{margin-left:1.25rem;display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;backdrop-filter:blur(16px);animation:slide .7s cubic-bezier(.22,1,.36,1) both}
    .rail a{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;color:rgba(255,255,255,.4);text-decoration:none;position:relative;transition:background .3s,color .3s,transform .35s cubic-bezier(.22,1,.36,1)}
    .rail a svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
    .rail a:hover{color:#fff;transform:translateX(3px)}
    .rail a.active{background:#6c8cff;color:#fff;box-shadow:0 8px 20px rgba(108,140,255,.35)}
    .rail a::after{content:attr(data-tip);position:absolute;left:calc(100% + 12px);top:50%;translate:0 -50%;padding:.3rem .55rem;background:#fff;color:#111;font-size:.68rem;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s,translate .2s}
    .rail a:hover::after{opacity:1;translate:4px -50%}
    .div{width:22px;height:1px;background:rgba(255,255,255,.12);margin:4px 0}
    .stage{flex:1;display:grid;place-items:center;color:rgba(255,255,255,.25);letter-spacing:.14em;text-transform:uppercase;font-size:.75rem}
    @keyframes slide{from{opacity:0;translate:-16px 0}to{opacity:1;translate:0 0}}
  </style>
</head>
<body>
  <nav class="rail" aria-label="Side dock">
    <a class="active" href="#" data-tip="Home" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-5H10v5H5a1 1 0 0 1-1-1z"/></svg></a>
    <a href="#" data-tip="Projects" aria-label="Projects"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg></a>
    <a href="#" data-tip="Messages" aria-label="Messages"><svg viewBox="0 0 24 24"><path d="M21 15a3 3 0 0 1-3 3H8l-5 3V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z"/></svg></a>
    <div class="div" aria-hidden="true"></div>
    <a href="#" data-tip="Settings" aria-label="Settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg></a>
  </nav>
  <div class="stage">Vertical rail</div>
  <script>
    const links=[...document.querySelectorAll('.rail a')];
    links.forEach(a=>a.addEventListener('click',e=>{e.preventDefault();links.forEach(l=>l.classList.remove('active'));a.classList.add('active')}));
  </script>
</body>
</html>
