<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1622
    slug: 3d-mouse-tunnel-depth
    title: 3D Tunnel Depth Mouse
    category: 3d-mouse
    tags: 3d, mouse, tunnel
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1622 — 3D Tunnel Depth Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#03040a;perspective:700px;overflow:hidden}
    .tunnel{position:relative;width:280px;height:280px;transform-style:preserve-3d;transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg))}
    .ring{position:absolute;inset:0;border:2px solid;border-radius:24px;transform:translateZ(calc(var(--i)*-80px)) scale(calc(1 + var(--i)*.15));opacity:calc(1 - var(--i)*.08)}
    .ring:nth-child(odd){border-color:#6c8cff;box-shadow:0 0 20px rgba(108,140,255,.3)}
    .ring:nth-child(even){border-color:#ff6bcb;box-shadow:0 0 20px rgba(255,107,203,.25)}
    .core{position:absolute;inset:42%;border-radius:50%;background:radial-gradient(circle,#fff,#6c8cff);box-shadow:0 0 40px #6c8cff;transform:translateZ(-640px)}
    .hint{position:fixed;bottom:1.4rem;font:700 .7rem Syne,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="tunnel" id="tunnel">
    <div class="core"></div>
  </div>
  <div class="hint">Steer into the tunnel</div>
  <script>
    const tunnel=document.getElementById('tunnel');
    for(let i=0;i<10;i++){const r=document.createElement('div');r.className='ring';r.style.setProperty('--i',i);tunnel.appendChild(r)}
    let rx=0,ry=0,trx=0,try_=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*28;trx=y*-22});
    (function loop(){rx+=(trx-rx)*.1;ry+=(try_-ry)*.1;tunnel.style.setProperty('--rx',rx+'deg');tunnel.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
