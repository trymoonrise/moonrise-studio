    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Outfit,sans-serif;background:#1a1528;overflow:hidden}.orb{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,#5eead4,#3b82f6);filter:blur(40px);opacity:.55;animation:drift 8s ease-in-out infinite alternate}.card{position:relative;z-index:1;width:min(320px,90vw);padding:1.5rem;border-radius:24px;background:rgba(255,255,255,.1);backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(255,255,255,.28);color:#fff;box-shadow:0 20px 50px rgba(0,0,0,.3)}.card h3{font-family:Syne,sans-serif;margin:0 0 .4rem}.card p{margin:0;color:rgba(255,255,255,.7);font-size:.9rem;line-height:1.5}@keyframes drift{to{transform:translate(30px,-20px) scale(1.1)}}
