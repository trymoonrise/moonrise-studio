<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0367
    slug: heroes-saas-nav
    title: SaaS Nav Hero
    category: heroes
    tags: heroes, landing, professional, saas
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0367 — SaaS Nav Hero</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(99, 102, 241, 0.08), transparent 42%),
        #fafafa;
      color: #111827;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 1.25rem clamp(1.25rem, 4vw, 2rem) 4rem;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    .logo {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .nav-cta {
      padding: 0.55rem 1rem;
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1.05fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.1);
      color: #4f46e5;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.4rem, 4.8vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 11ch;
      margin-bottom: 1rem;
    }

    .sub {
      color: #6b7280;
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 36ch;
      margin-bottom: 1.75rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 1.35rem;
      border: none;
      border-radius: 999px;
      background: #4f46e5;
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(79, 70, 229, 0.22);
    }

    .link {
      color: #374151;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
    }

    .shot {
      margin: 0;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        0 1px 0 rgba(17, 24, 39, 0.04),
        0 24px 60px rgba(17, 24, 39, 0.1);
      border: 1px solid rgba(17, 24, 39, 0.06);
    }

    .shot img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    @media (max-width: 900px) {
      .nav-links {
        display: none;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <div class="logo">Flowbase</div>
      <nav class="nav-links" aria-label="Primary">
        <span>Product</span>
        <span>Pricing</span>
      </nav>
      <button class="nav-cta" type="button">Get started</button>
    </header>

    <section class="hero">
      <div>
        <span class="eyebrow">Product workspace</span>
        <h1>Ship products your team is proud of</h1>
        <p class="sub">One workspace for roadmaps, docs, and delivery — built for fast-moving teams.</p>
        <div class="actions">
          <button class="btn" type="button">Start free trial</button>
          <a class="link" href="#">Book demo →</a>
        </div>
      </div>

      <figure class="shot">
        <img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Product preview">
      </figure>
    </section>
  </div>
</body>
</html>
