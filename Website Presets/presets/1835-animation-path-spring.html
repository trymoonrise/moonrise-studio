<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1835
    slug: animation-path-spring
    title: Elastic Path Draw
    category: animation
    tags: animation, svg, path, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1835 - Elastic Path Draw</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
      .wrap{width:min(100%,480px);text-align:center}
      h1{margin:0 0 1.5rem;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-.04em}
      svg{width:100%;height:auto;overflow:visible}
      .path{fill:none;stroke:#111;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:900;stroke-dashoffset:900;animation:draw 2.2s cubic-bezier(.22,1,.36,1) forwards,.pulse 2s 2.2s ease-in-out infinite}
      @keyframes draw{to{stroke-dashoffset:0}}
      @keyframes pulse{0%,100%{stroke-width:2.5}50%{stroke-width:3.5}}
      p{margin:1.25rem 0 0;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#999}
  </style>
</head>
<body>
<div class="wrap"><h1>Elastic path</h1><svg viewBox="0 0 400 160" aria-hidden="true"><path class="path" d="M20,80 C60,20 100,140 140,80 S220,20 260,80 S340,140 380,80"/></svg><p>Spring draw · live stroke</p></div>

</body>
</html>
