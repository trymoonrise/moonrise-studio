<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1843
    slug: hero-video-cursor-wipe
    title: Cursor Wipe Video Hero
    category: hero
    tags: hero, video, interactive, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1843 — Cursor Wipe Video Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Syne,sans-serif}
    video{display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .stage{position:relative;min-height:100vh;overflow:hidden}
.layer{position:absolute;inset:0}
.layer video{width:100%;height:100%;object-fit:cover}
.a{z-index:1;filter:grayscale(1) brightness(.7)}
.b{z-index:2;clip-path:inset(0 50% 0 0)}
.copy{position:relative;z-index:3;min-height:100vh;display:flex;align-items:flex-end;padding:clamp(2rem,5vw,4rem);pointer-events:none}
h1{font-size:clamp(2.5rem,8vw,5.5rem);font-weight:800;letter-spacing:-.07em;margin:0;max-width:10ch;line-height:.9}
.edge{position:absolute;top:0;bottom:0;width:2px;background:#fff;z-index:4;left:50%;box-shadow:0 0 20px rgba(255,255,255,.5);pointer-events:none}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="layer a"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline></video></div><div class="layer b" id="b"><video src="../stock/media/16-9 Aspect Ratio(video).mp4" autoplay muted loop playsinline style="filter:hue-rotate(160deg) saturate(1.3)"></video></div><div class="edge" id="e"></div><div class="copy"><h1>Split realities</h1></div></div>
<script>const s=document.getElementById('s'),b=document.getElementById('b'),e=document.getElementById('e');s.onmousemove=ev=>{const p=Math.min(95,Math.max(5,(ev.clientX/innerWidth)*100));b.style.clipPath='inset(0 '+(100-p)+'% 0 0)';e.style.left=p+'%'};</script>
</body>
</html>
