<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1651
    slug: ease-in-avatar-group
    title: Avatar Group Ease
    category: ease-in
    tags: ease-in, avatars, stagger, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1651 — Avatar Group Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff;padding:2rem;font-family:system-ui,sans-serif}.group{display:flex}.av{width:44px;height:44px;border-radius:50%;border:3px solid #fff;margin-left:-12px;background:linear-gradient(135deg,var(--c),color-mix(in srgb,var(--c),#000 20%));opacity:0;transform:scale(.5);animation:pop .55s cubic-bezier(.22,.61,.36,1) forwards}.av:first-child{margin-left:0}.av:nth-child(1){--c:#6c8cff;animation-delay:.05s}.av:nth-child(2){--c:#ff6cb0;animation-delay:.12s}.av:nth-child(3){--c:#6cffb8;animation-delay:.19s}.av:nth-child(4){--c:#f59e0b;animation-delay:.26s}.av:nth-child(5){--c:#764ba2;animation-delay:.33s}p{margin-top:1.25rem;font-size:.85rem;color:#888;text-align:center;opacity:0;animation:fade .5s cubic-bezier(.22,.61,.36,1) .45s forwards}@keyframes pop{to{opacity:1;transform:none}}@keyframes fade{to{opacity:1}}
  </style>
</head>
<body>
<div><div class="group"><div class="av"></div><div class="av"></div><div class="av"></div><div class="av"></div><div class="av"></div></div><p>2,400+ teams trust us</p></div>

</body>
</html>
