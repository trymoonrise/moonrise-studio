<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#000}.layer{position:sticky;top:0;min-height:100vh;display:grid;place-items:center;font-size:clamp(2.5rem,8vw,5rem);font-weight:900;color:#fff;z-index:var(--z)}.layer:nth-child(1){--z:1;background:linear-gradient(160deg,#6c8cff,#4a5fd4)}.layer:nth-child(2){--z:2;background:linear-gradient(160deg,#ff6cb0,#d44a8a);top:40px;min-height:calc(100vh - 40px);border-radius:24px 24px 0 0}.layer:nth-child(3){--z:3;background:linear-gradient(160deg,#6cffb8,#3ad4a0);color:#111;top:80px;min-height:calc(100vh - 80px);border-radius:24px 24px 0 0}.layer:nth-child(4){--z:4;background:#111;top:120px;min-height:calc(100vh - 120px);border-radius:24px 24px 0 0}
  </style>
