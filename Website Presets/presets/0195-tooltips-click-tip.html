<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0195
    slug: tooltips-click-tip
    title: Click Tooltip
    category: tooltips
    tags: tooltips, click
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0195 — Click Tooltip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0a0a;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .stage{text-align:center}
    .kicker{margin:0 0 1.75rem;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#555}
    .wrap{position:relative;display:inline-block}
    .btn{padding:12px 28px;border:1px solid #333;background:transparent;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:border-color .25s,background .25s}
    .btn:hover,.btn[aria-expanded=true]{border-color:#fff;background:#111}
    .tip{position:absolute;bottom:calc(100% + 12px);left:50%;translate:-50% 8px;min-width:160px;padding:10px 14px;background:#fff;color:#111;font-size:.8rem;font-weight:500;text-align:left;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .3s cubic-bezier(.22,1,.36,1),translate .3s cubic-bezier(.22,1,.36,1),visibility .3s}
    .tip.show{opacity:1;visibility:visible;translate:-50% 0;pointer-events:auto}
    .tip strong{display:block;font-family:"Syne",system-ui,sans-serif;font-size:.82rem;font-weight:700;margin-bottom:.2rem}
  </style>
</head>
<body>
<div class="stage"><p class="kicker">Click tooltip</p><div class="wrap"><button class="btn" type="button" id="b" aria-expanded="false">Click for tip</button><div class="tip" id="t" role="tooltip"><strong>Pinned note</strong>Click outside to dismiss.</div></div></div>
<script>const b=document.getElementById('b'),t=document.getElementById('t');
b.addEventListener('click',e=>{e.stopPropagation();const on=!t.classList.contains('show');t.classList.toggle('show',on);b.setAttribute('aria-expanded',on);});
document.addEventListener('click',()=>{t.classList.remove('show');b.setAttribute('aria-expanded','false');});</script>
</body>
</html>
