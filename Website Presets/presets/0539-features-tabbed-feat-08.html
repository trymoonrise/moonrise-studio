<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0539
    slug: features-tabbed-feat-08
    title: Tabbed Feat 08
    category: features
    tags: features, tabbed
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0539 — Tabbed Feat 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#fff;font-family:Outfit,sans-serif;padding:2rem}
    .wrap{width:min(640px,100%)}
    .tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.12);position:relative;margin-bottom:2rem}
    .tabs button{border:none;background:transparent;color:rgba(255,255,255,.35);font:inherit;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:300;padding:.9rem 1.1rem;cursor:pointer;transition:color .3s}
    .tabs button.active,.tabs button:hover{color:#fff}
    .ink{position:absolute;bottom:-1px;left:0;height:1px;width:var(--w,80px);background:#fff;transform:translateX(var(--x,0px));transition:transform .4s cubic-bezier(.22,1,.36,1),width .4s cubic-bezier(.22,1,.36,1)}
    .panel{display:none;animation:up .45s cubic-bezier(.22,1,.36,1)}
    .panel.active{display:block}
    h2{margin:0;font-family:Syne,sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.04em;font-weight:800;line-height:1}
    p{margin:1rem 0 0;font-size:.95rem;opacity:.5;font-weight:300;line-height:1.65;max-width:40ch}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.panel,.ink{animation:none;transition:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs" id="tabs" role="tablist">
      <div class="ink" id="ink"></div>
      <button class="active" role="tab" aria-selected="true" data-tab="0">Design</button>
      <button role="tab" aria-selected="false" data-tab="1">Build</button>
      <button role="tab" aria-selected="false" data-tab="2">Ship</button>
    </div>
    <div class="panel active" id="p0" role="tabpanel"><h2>Design the<br>constraint.</h2><p>Tabs swap ideas without swapping layouts. One ink line does the talking.</p></div>
    <div class="panel" id="p1" role="tabpanel"><h2>Build for<br>the edge.</h2><p>Code that respects motion budgets and empty space.</p></div>
    <div class="panel" id="p2" role="tabpanel"><h2>Ship the<br>quiet cut.</h2><p>If it still feels special without decoration, it's ready.</p></div>
  </div>
  <script>
    const tabs=document.getElementById('tabs'),ink=document.getElementById('ink'),btns=[...tabs.querySelectorAll('button')];
    function move(btn){const r=tabs.getBoundingClientRect(),a=btn.getBoundingClientRect();ink.style.setProperty('--x',(a.left-r.left)+'px');ink.style.setProperty('--w',a.width+'px')}
    move(btns[0]);
    btns.forEach(btn=>btn.addEventListener('click',()=>{
      btns.forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false')});
      btn.classList.add('active');btn.setAttribute('aria-selected','true');move(btn);
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.getElementById('p'+btn.dataset.tab).classList.add('active');
    }));
  </script>
</body>
</html>
