<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0300
    slug: ai-chat-typing-indicator
    title: Typing Indicator
    category: ai-chat
    tags: ai-chat, typing
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0300 - Typing Indicator</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f8;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#0d0d0d}
    .stage{width:min(620px,100%);display:flex;flex-direction:column;gap:1.5rem}
    .status{display:flex;align-items:center;gap:.75rem;padding:.9rem 1.1rem;background:#fff;border:1px solid #e5e5e5;border-radius:22px;width:fit-content;box-shadow:0 1px 2px rgba(0,0,0,.04);animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .orb{width:28px;height:28px;border-radius:50%;background:conic-gradient(from 0deg,#10a37f,#6c8cff,#10a37f);animation:spin 1.4s linear infinite;position:relative}
    .orb::after{content:"";position:absolute;inset:3px;border-radius:50%;background:#fff}
    .dots{display:flex;gap:5px;align-items:center}
    .dots i{width:7px;height:7px;border-radius:50%;background:#8e8e8e;animation:bounce 1.1s ease-in-out infinite}
    .dots i:nth-child(2){animation-delay:.15s}.dots i:nth-child(3){animation-delay:.3s}
    .label{font-size:.88rem;color:#5d5d5d}
    .ask{display:flex;align-items:center;gap:.55rem;padding:.65rem .7rem .65rem 1.05rem;background:#fff;border:1px solid #e5e5e5;border-radius:28px;box-shadow:0 8px 28px rgba(0,0,0,.06);animation:up .7s cubic-bezier(.16,1,.3,1) .15s both}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.95rem}
    .ask input::placeholder{color:#8e8e8e}
    .wave{display:flex;gap:3px;align-items:flex-end;height:18px;padding:0 .4rem}
    .wave span{width:3px;border-radius:2px;background:#10a37f;animation:eq 1s ease-in-out infinite}
    .wave span:nth-child(1){height:6px;animation-delay:0s}
    .wave span:nth-child(2){height:12px;animation-delay:.12s}
    .wave span:nth-child(3){height:8px;animation-delay:.24s}
    .wave span:nth-child(4){height:14px;animation-delay:.08s}
    .stop{width:36px;height:36px;border:none;border-radius:50%;background:#0d0d0d;color:#fff;cursor:pointer;display:grid;place-items:center}
    .stop svg{width:12px;height:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}
    @keyframes eq{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.orb,.dots i,.wave span,.status,.ask{animation:none}.status,.ask{opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="status">
      <div class="orb" aria-hidden="true"></div>
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <span class="label">Thinking…</span>
    </div>
    <form class="ask">
      <input type="text" value="Explain quantum entanglement simply" readonly aria-label="Ask anything">
      <div class="wave" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <button class="stop" type="button" aria-label="Stop"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
    </form>
  </div>
</body>
</html>
