<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0455
    slug: image-scroll-zoom-pan-05
    title: Zoom Pan 05
    category: image-scroll
    tags: image-scroll, zoom
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0455 — Zoom Pan 05</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#000;color:#fff;font-family:system-ui}.track{height:280vh}.sticky{position:sticky;top:0;height:100vh;overflow:hidden}.viewport{width:100%;height:100%;overflow:hidden}.img{width:120%;height:120%;object-fit:cover;transform:scale(var(--s,1.2)) translate(var(--x,0),var(--y,0));will-change:transform}.hud{position:fixed;right:22px;top:22px;font-family:monospace;font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.08em}
  </style>
</head>
<body>
<div class="hud" id="hud">ZOOM 1.0</div><div class="track" id="t"><div class="sticky"><div class="viewport"><img class="img" id="img" src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const img=document.getElementById('img'),hud=document.getElementById('hud');addEventListener('scroll',()=>{const p=prog();const s=1.2+p*.8;img.style.setProperty('--s',String(s));img.style.setProperty('--x',-p*8+'%');img.style.setProperty('--y',-p*5+'%');hud.textContent='ZOOM '+s.toFixed(2);},{passive:true});</script>
</body>
</html>
