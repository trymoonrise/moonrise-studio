<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0246
    slug: errors-404-page
    title: 404 Error Page
    category: errors
    tags: errors, 404
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0246 - 404 Error Page</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono:wght@700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;background:#050508;color:#fff;font-family:Syne,sans-serif;cursor:crosshair}
    .noise{position:fixed;inset:0;pointer-events:none;opacity:.12;z-index:5;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain .12s steps(2) infinite}
    .scan{position:fixed;inset:0;pointer-events:none;z-index:4;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);animation:flicker 3s infinite}
    .stage{position:relative;text-align:center;perspective:900px;z-index:2}
    .code{font-size:clamp(8rem,28vw,16rem);font-weight:800;line-height:0.8;letter-spacing:-.08em;position:relative;display:inline-block;transform-style:preserve-3d;animation:shatter 4s ease-in-out infinite}
    .code span{display:inline-block;position:relative}
    .code span:nth-child(1){animation:fly1 2.4s ease-in-out infinite;color:#ff2d55}
    .code span:nth-child(2){animation:fly2 2.4s ease-in-out infinite .1s;color:#fff}
    .code span:nth-child(3){animation:fly3 2.4s ease-in-out infinite .2s;color:#2dff9a}
    .ghost{position:absolute;inset:0;font-size:inherit;font-weight:inherit;letter-spacing:inherit;pointer-events:none;mix-blend-mode:screen}
    .ghost--r{color:#ff0040;animation:glitch-r .3s steps(2) infinite;transform:translate(4px,0)}
    .ghost--c{color:#00fff0;animation:glitch-c .25s steps(2) infinite;transform:translate(-4px,0)}
    h1{margin:1.5rem 0 .5rem;font-size:clamp(1.4rem,4vw,2.2rem);animation:jitter .15s infinite}
    p{font-family:'Space Mono',monospace;opacity:.55;max-width:32ch;margin:0 auto 2rem;font-size:.85rem}
    .btn{appearance:none;border:2px solid #fff;background:transparent;color:#fff;padding:1rem 2rem;font:800 .85rem Syne,sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .2s}
    .btn::before{content:'';position:absolute;inset:0;background:#ff2d55;transform:translateY(101%);transition:transform .35s cubic-bezier(.16,1,.3,1);z-index:-1}
    .btn:hover{color:#050508}.btn:hover::before{transform:none}
    @keyframes shatter{0%,100%{transform:rotateX(0) rotateY(0) scale(1)}40%{transform:rotateX(18deg) rotateY(-12deg) scale(1.08)}70%{transform:rotateX(-8deg) rotateY(20deg) scale(.92)}}
    @keyframes fly1{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(-30px,-40px) rotate(-18deg)}}
    @keyframes fly2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(0,25px) scale(1.15)}}
    @keyframes fly3{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(35px,-20px) rotate(22deg)}}
    @keyframes glitch-r{0%,100%{clip-path:inset(0 0 60% 0)}50%{clip-path:inset(40% 0 0 0)}}
    @keyframes glitch-c{0%,100%{clip-path:inset(20% 0 30% 0)}50%{clip-path:inset(0 0 50% 0)}}
    @keyframes jitter{0%,100%{transform:translate(0)}25%{transform:translate(-2px,1px)}75%{transform:translate(2px,-1px)}}
    @keyframes grain{to{transform:translate(2%,-2%)}}
    @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.7}94%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.code,.code span,.ghost,.noise,.scan,h1{animation:none}}
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>
  <div class="stage">
    <div class="code" aria-label="404">
      <span>4</span><span>0</span><span>4</span>
      <div class="ghost ghost--r" aria-hidden="true">404</div>
      <div class="ghost ghost--c" aria-hidden="true">404</div>
    </div>
    <h1>THIS PAGE HAS LEFT THE BUILDING</h1>
    <p>Coordinates corrupted. Reality checksum failed. Please exit the simulation.</p>
    <button class="btn" type="button">ESCAPE TO SAFETY</button>
  </div>
</body>
</html>
