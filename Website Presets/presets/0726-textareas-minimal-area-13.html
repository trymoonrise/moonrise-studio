<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0726
    slug: textareas-minimal-area-13
    title: Minimal Area 13
    category: textareas
    tags: textareas, modern, experimental, exaggerated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0726 - Minimal Area 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#ffffff;font-family:Inter,system-ui,sans-serif;overflow:hidden;padding:24px;color:#111}
    textarea{font:inherit;border:0;outline:0;resize:none;background:transparent;color:inherit;width:100%}
    button{font:inherit;border:0;cursor:pointer}
    .scene{position:relative;width:min(520px,92vw)}
    .minimal{position:relative}.ghost{position:absolute;inset:auto 0 100% 0;font-size:clamp(70px,18vw,130px);font-weight:800;letter-spacing:-.1em;color:#f1f1f1;line-height:.75;z-index:0;pointer-events:none}.field{position:relative;z-index:1;border-bottom:2px solid #111;padding:0 0 18px;background:#fff}.area{min-height:130px;font-size:clamp(30px,7vw,54px);line-height:1.02;font-weight:800;letter-spacing:-.075em;color:#111}.area::placeholder{color:#d6d6d6}.meta{display:flex;justify-content:space-between;margin-top:14px;font:700 11px 'JetBrains Mono';letter-spacing:.2em;text-transform:uppercase;color:#8a8a8a}.field:focus-within{border-bottom-width:6px}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="scene minimal"><div class="ghost">TYPE</div><section class="field"><textarea class="area" placeholder="Say less.">Say less, but make it land.</textarea></section><div class="meta"><span>Minimal area</span><span>13</span></div></div>
</body>
</html>
