<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0437
    slug: scroll-animations-reveal-on-scroll-01
    title: Cipher Line Reveal
    category: scroll-animations
    tags: scroll-animations, reveal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0437 — Cipher Line Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#08080c;color:#d4d4dc;font-family:Outfit,sans-serif}
    .scroll{height:300vh}
    .pin{position:sticky;top:0;height:100vh;display:grid;place-items:center;padding:24px}
    .panel{width:min(640px,92vw)}
    .eyebrow{font:500 .65rem Outfit,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#00c896;margin-bottom:16px;opacity:0;transform:translateY(12px);transition:opacity .6s,transform .6s}
    .line{font-family:Syne,sans-serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:800;line-height:1.05;letter-spacing:-.04em;margin:0 0 12px;overflow:hidden}
    .line span{display:inline-block;transform:translateY(110%);transition:transform .7s cubic-bezier(.16,1,.3,1)}
    .sub{font-size:1rem;color:rgba(212,212,220,.55);max-width:42ch;line-height:1.6;opacity:0;transform:translateY(16px);transition:opacity .7s .3s,transform .7s .3s}
    .bar{height:2px;background:rgba(255,255,255,.08);margin-top:28px;overflow:hidden;border-radius:2px}
    .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#00c896,transparent);transition:width .1s linear}
    .panel.revealed .eyebrow,.panel.revealed .sub{opacity:1;transform:none}
    .panel.revealed .line span{transform:none}
    .panel.revealed .line span:nth-child(2){transition-delay:.08s}
    .panel.revealed .line span:nth-child(3){transition-delay:.16s}
    @media(prefers-reduced-motion:reduce){.line span,.eyebrow,.sub{transform:none;opacity:1;transition:none}}
  </style>
</head>
<body>
<div class="scroll">
  <section class="pin">
    <article class="panel" id="panel">
      <p class="eyebrow">Scroll reveal</p>
      <h1 class="line"><span>Decode</span> <span>the</span> <span>signal</span></h1>
      <p class="sub">Each scroll increment unlocks another layer of editorial type — staggered, measured, and precise.</p>
      <div class="bar"><i id="bar"></i></div>
    </article>
  </section>
</div>
<script>
const panel=document.getElementById('panel'),bar=document.getElementById('bar');
function onScroll(){const p=Math.min(1,window.scrollY/(document.body.scrollHeight-window.innerHeight));bar.style.width=(p*100)+'%';if(p>.15)panel.classList.add('revealed');}
window.addEventListener('scroll',onScroll,{passive:true});onScroll();
</script>
</body>
</html>
