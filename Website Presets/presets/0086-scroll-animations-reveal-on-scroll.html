<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0086
    slug: scroll-animations-reveal-on-scroll
    title: Reveal On Scroll
    category: scroll-animations
    tags: scroll-animations, reveal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0086 - Reveal On Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#f5f5f5} .sp{height:50vh;display:grid;place-items:center;color:#888} .box{max-width:500px;margin:0 auto 50vh;padding:2rem;background:#fff;border-radius:12px;opacity:0;transform:translateY(40px);transition:all .7s} .box.vis{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>
<div class="sp">Scroll</div><div class="box">Section 1</div><div class="box">Section 2</div><div class="box">Section 3</div>
<script>const obs=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('vis')),{threshold:.2});document.querySelectorAll('.box').forEach(b=>obs.observe(b));</script>
</body>
</html>
