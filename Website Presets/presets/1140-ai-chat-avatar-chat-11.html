<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1140
    slug: ai-chat-avatar-chat-11
    title: Avatar Chat 11
    category: ai-chat
    tags: ai-chat, avatar
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1140 - Avatar Chat 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f2ec;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#111}
    .stage{width:min(560px,100%);display:flex;flex-direction:column;align-items:center;gap:1.5rem}
    .face{position:relative;width:88px;height:88px}
    .face .blob{position:absolute;inset:0;border-radius:42% 58% 50% 50%/48% 42% 58% 52%;background:linear-gradient(145deg,#10a37f,#6c8cff);animation:morph 6s ease-in-out infinite}
    .face .eye{position:absolute;top:34%;width:10px;height:10px;border-radius:50%;background:#fff;animation:blink 4s ease-in-out infinite}
    .face .eye.l{left:28%}.face .eye.r{right:28%}
    .face .mouth{position:absolute;bottom:28%;left:50%;width:18px;height:8px;margin-left:-9px;border:2px solid #fff;border-top:none;border-radius:0 0 12px 12px}
    .status{font-size:.85rem;color:#6a6558}
    .ask{width:100%;display:flex;align-items:center;gap:.5rem;padding:.65rem .65rem .65rem 1rem;background:#fff;border:1px solid #e4e0d6;border-radius:28px;box-shadow:0 10px 30px rgba(30,25,15,.08);animation:up .7s cubic-bezier(.16,1,.3,1) .15s both}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.95rem}
    .ask input::placeholder{color:#a29c8c}
    .send{width:36px;height:36px;border:none;border-radius:50%;background:#111;color:#fff;cursor:pointer;display:grid;place-items:center}
    .send svg{width:16px;height:16px}
    @keyframes morph{0%,100%{border-radius:42% 58% 50% 50%/48% 42% 58% 52%}50%{border-radius:58% 42% 46% 54%/42% 56% 44% 58%}}
    @keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.face .blob,.face .eye,.ask{animation:none}.ask{opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="face" aria-hidden="true">
      <div class="blob"></div>
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div class="mouth"></div>
    </div>
    <div class="status">Ready when you are</div>
    <form class="ask">
      <input type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
      <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </form>
  </div>
</body>
</html>
