<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0720
    slug: textareas-card-textarea-07
    title: Card Textarea 07
    category: textareas
    tags: textareas, modern, experimental, exaggerated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0720 — Card Textarea 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff1f2;font-family:Inter,system-ui,sans-serif;overflow:hidden;padding:24px;color:#111}
    textarea{font:inherit;border:0;outline:0;resize:none;background:transparent;color:inherit;width:100%}
    button{font:inherit;border:0;cursor:pointer}
    .scene{position:relative;width:min(520px,92vw)}
    .card{position:relative;padding:24px;border-radius:34px;background:#fff;border:1px solid rgba(127,29,29,.12);box-shadow:0 30px 90px rgba(190,18,60,.16);overflow:hidden}.card::before{content:'';position:absolute;width:160px;height:160px;right:-60px;top:-60px;background:#fb7185;border-radius:42% 58%;opacity:.25;animation:morph 6s ease-in-out infinite}.head{position:relative;display:flex;align-items:center;gap:12px;margin-bottom:18px}.avatar{width:42px;height:42px;border-radius:16px;background:#be123c;color:#fff;display:grid;place-items:center;font-weight:800}.head b{display:block}.head span{font-size:12px;color:#9f1239}.area{position:relative;min-height:170px;font-size:20px;line-height:1.45;color:#3f121f}.area::placeholder{color:#e4a3af}@keyframes morph{50%{border-radius:60% 40%;transform:translate(-10px,8px)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="scene"><section class="card"><div class="head"><div class="avatar">M</div><div><b>Message card</b><span>Exaggerated soft surface</span></div></div><textarea class="area">This card textarea feels like a social composer from the future.</textarea></section></div>
</body>
</html>
