<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1499
    slug: timeline-card-milestones
    title: Card Milestone Timeline
    category: timeline
    tags: timeline, cards, milestones
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1499 - Card Milestone Timeline</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0e1016;color:#fff;padding:3.5rem 1.5rem;font-family:Outfit,sans-serif}
    .wrap{max-width:640px;margin:0 auto}
    .wrap h2{font-family:Syne,sans-serif;font-size:clamp(1.5rem,4vw,1.9rem);font-weight:700;text-align:center;margin:0 0 2.5rem;letter-spacing:-.02em;opacity:0;animation:in .65s both}
    .list{display:flex;flex-direction:column;gap:.85rem;position:relative}
    .list::before{content:"";position:absolute;left:32px;top:24px;bottom:24px;width:2px;background:#1e2030;z-index:0}
    .card{display:grid;grid-template-columns:auto 1fr;gap:1.15rem;padding:1.15rem 1.35rem;background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.08);align-items:start;position:relative;z-index:1;opacity:0;transform:translateX(-16px);animation:slide .65s cubic-bezier(.22,1,.36,1) both;transition:border-color .3s,background .3s,transform .35s}
    .card:nth-child(1){animation-delay:.1s}
    .card:nth-child(2){animation-delay:.22s}
    .card:nth-child(3){animation-delay:.34s}
    .card:nth-child(4){animation-delay:.46s}
    .card:hover{border-color:rgba(126,224,195,.35);background:rgba(255,255,255,.05);transform:translateX(4px)}
    .badge{width:48px;height:48px;border-radius:14px;background:linear-gradient(145deg,#1a3d36,#0f2a24);color:#7ee0c3;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.04em;border:1px solid rgba(126,224,195,.25);box-shadow:0 0 20px rgba(126,224,195,.08)}
    .date{font-size:.7rem;color:#7ee0c3;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem}
    .card h4{font-size:1rem;font-weight:600;margin:0 0 .3rem}
    .card p{font-size:.88rem;color:#8a8a96;line-height:1.55;margin:0}
    @keyframes in{to{opacity:1}}
    @keyframes slide{to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.card,.wrap h2{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Delivery timeline</h2>
    <div class="list">
      <div class="card"><div class="badge">WK1</div><div><div class="date">Mar 3</div><h4>Kickoff</h4><p>Align on goals and success metrics</p></div></div>
      <div class="card"><div class="badge">WK4</div><div><div class="date">Mar 24</div><h4>Alpha</h4><p>Internal testing with core flows</p></div></div>
      <div class="card"><div class="badge">WK8</div><div><div class="date">Apr 21</div><h4>Beta</h4><p>Invite-only release to early users</p></div></div>
      <div class="card"><div class="badge">WK12</div><div><div class="date">May 19</div><h4>Launch</h4><p>Public release with marketing push</p></div></div>
    </div>
  </div>
</body>
</html>
