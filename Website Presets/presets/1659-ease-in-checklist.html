<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1659
    slug: ease-in-checklist
    title: Checklist Stagger Ease
    category: ease-in
    tags: ease-in, checklist, stagger, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1659 — Checklist Stagger Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fff;padding:2rem;font-family:system-ui,sans-serif}.list{max-width:320px}.item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;opacity:0;transform:translateX(-14px);animation:slide .55s cubic-bezier(.22,.61,.36,1) forwards}.item:nth-child(1){animation-delay:.06s}.item:nth-child(2){animation-delay:.14s}.item:nth-child(3){animation-delay:.22s}.item:nth-child(4){animation-delay:.3s}.item:nth-child(5){animation-delay:.38s}.check{width:20px;height:20px;border-radius:50%;background:#6c8cff;color:#fff;display:grid;place-items:center;font-size:.65rem;font-weight:700;flex-shrink:0}span{font-size:.9rem;color:#334155}@keyframes slide{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<ul class="list"><li class="item"><span class="check">✓</span><span>Setup complete</span></li><li class="item"><span class="check">✓</span><span>Team invited</span></li><li class="item"><span class="check">✓</span><span>Integrations connected</span></li><li class="item"><span class="check">✓</span><span>First project created</span></li><li class="item"><span class="check">✓</span><span>Go live</span></li></ul>

</body>
</html>
