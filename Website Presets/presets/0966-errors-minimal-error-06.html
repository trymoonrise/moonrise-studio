<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0966
    slug: errors-minimal-error-06
    title: Minimal Error 06
    category: errors
    tags: errors, minimal
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0966 — Minimal Error 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;overflow:hidden;cursor:pointer}
    .word{
      font-family:Inter,sans-serif;font-weight:900;font-size:clamp(2rem,8vw,4rem);
      letter-spacing:-.06em;color:#000;margin:0;line-height:1;
      animation:explode-text 2.5s cubic-bezier(.16,1,.3,1) infinite;
      transform-origin:center;
      user-select:none;
    }
    .sub{position:fixed;bottom:2rem;left:0;right:0;text-align:center;font-family:Inter,sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;opacity:.3;animation:fade-sub 2.5s ease-in-out infinite}
    @keyframes explode-text{
      0%{font-size:clamp(2rem,8vw,4rem);transform:scale(1);color:#000;letter-spacing:-.06em}
      40%{font-size:clamp(8rem,40vw,28rem);transform:scale(1);color:#ff0000;letter-spacing:-.08em;filter:blur(0)}
      55%{font-size:clamp(10rem,50vw,32rem);transform:scale(1.1) rotate(-3deg);color:#ff0000;filter:blur(2px)}
      70%{font-size:clamp(2rem,8vw,4rem);transform:scale(1) rotate(0);color:#000;filter:none}
      100%{font-size:clamp(2rem,8vw,4rem);transform:scale(1);color:#000}
    }
    @keyframes fade-sub{0%,60%,100%{opacity:.3}40%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.word,.sub{animation:none}.word{color:#c00;font-size:4rem}}
  </style>
</head>
<body>
  <h1 class="word" role="alert">Error</h1>
  <p class="sub">Ironically not minimal</p>
</body>
</html>
