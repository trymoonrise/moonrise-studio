<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1410
    slug: ease-in-stagger-list
    title: Stagger List Ease
    category: ease-in
    tags: ease-in, stagger, list
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1410 - Stagger List Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f;padding:2rem}.list{display:flex;flex-direction:column;gap:10px}.item{padding:12px 20px;background:#1a1a2e;border-radius:8px;color:#fff;font-size:.9rem;opacity:0;transform:translateX(-24px);animation:sl .5s cubic-bezier(.16,1,.3,1) forwards}.item:nth-child(1){animation-delay:.05s}.item:nth-child(2){animation-delay:.12s}.item:nth-child(3){animation-delay:.19s}.item:nth-child(4){animation-delay:.26s}.item:nth-child(5){animation-delay:.33s}@keyframes sl{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="list"><div class="item">First item</div><div class="item">Second item</div><div class="item">Third item</div><div class="item">Fourth item</div><div class="item">Fifth item</div></div>

</body>
</html>
