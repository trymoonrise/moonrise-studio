<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1802
    slug: staggered-grid-kinetic-type
    title: Kinetic Type Matrix
    category: animation
    tags: grid, stagger, type, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1802 - Kinetic Type Matrix</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0a0a0a;color:#fff;font-family:"DM Sans",system-ui,sans-serif;padding:2rem;display:grid;place-items:center;overflow:hidden}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tile,.cell,.brick,.module,.card,.panel{opacity:1!important;transform:none!important;clip-path:none!important;filter:none!important}}
    .wrap{width:min(960px,100%)}
    .eyebrow{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#555;margin-bottom:1rem}
    .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
    .letter{aspect-ratio:.75;background:#111;border:1px solid #1c1c1c;display:grid;place-items:center;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.4rem,4vw,2.8rem);font-weight:800;letter-spacing:-.04em;
      opacity:0;transform:translateY(100%) rotateX(-90deg);transform-origin:bottom;animation:rise .65s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*55ms)}
    .letter.space{background:transparent;border:none}
    .letter.accent{background:#fff;color:#111}
    @keyframes rise{to{opacity:1;transform:none}}
    @media(max-width:560px){.grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<main class="wrap"><p class="eyebrow">Kinetic type matrix</p>
    <section class="grid" id="g"></section></main>
<script>const word='EXTREME GRID';const g=document.getElementById('g');
    [...word].forEach((ch,i)=>{const el=document.createElement('div');el.className='letter'+(ch===' '?' space':'')+(i%5===0&&ch!==' '?' accent':'');
      el.textContent=ch===' '?'·':ch;el.style.setProperty('--i',i+1);g.appendChild(el);});</script>
</body>
</html>
