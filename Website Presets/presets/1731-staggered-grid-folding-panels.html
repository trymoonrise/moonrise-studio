<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1761
    slug: staggered-grid-folding-panels
    title: Folding Panels Grid
    category: animation
    tags: grid, stagger, folding, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1761 - Folding Panels Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#e9e3d8;color:#15110d;font-family:Inter,system-ui,sans-serif;padding:2rem;display:grid;place-items:center;perspective:1300px}.wrap{width:min(1060px,100%)}h1{margin:0 0 1.4rem;font-size:clamp(2.4rem,7vw,5.6rem);letter-spacing:-.08em;line-height:.86}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;transform-style:preserve-3d}.panel{height:220px;border-radius:18px;position:relative;transform-style:preserve-3d;opacity:0;animation:show .1s forwards;animation-delay:calc(var(--i)*80ms)}.face{position:absolute;inset:0;border-radius:inherit;background:linear-gradient(145deg,var(--a),var(--b));display:flex;align-items:end;padding:1rem;color:#fff;font-weight:800;font-size:1.35rem;letter-spacing:-.05em;box-shadow:0 18px 44px rgba(0,0,0,.18);transform-origin:left center;transform:rotateY(-90deg);animation:fold .75s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*80ms)}.panel:nth-child(even) .face{transform-origin:right center;transform:rotateY(90deg)}.panel.tall{height:360px}.panel:hover .face{transform:rotateY(-8deg);transition:transform .3s ease}@keyframes show{to{opacity:1}}@keyframes fold{to{transform:rotateY(0)}}@media(max-width:720px){.grid{grid-template-columns:1fr}.panel,.panel.tall{height:180px}}@media(prefers-reduced-motion:reduce){.panel{opacity:1;animation:none}.face{animation:none;transform:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Folding panels</h1>
    <section class="grid">
      <div class="panel tall" style="--i:1"><div class="face" style="--a:#1b1b1b;--b:#555">Fold 01</div></div>
      <div class="panel" style="--i:2"><div class="face" style="--a:#6c8cff;--b:#25346f">Fold 02</div></div>
      <div class="panel tall" style="--i:3"><div class="face" style="--a:#ff6b3d;--b:#7d2c1c">Fold 03</div></div>
      <div class="panel" style="--i:4"><div class="face" style="--a:#7ee0c3;--b:#285d50">Fold 04</div></div>
      <div class="panel" style="--i:5"><div class="face" style="--a:#ff6bcb;--b:#5f2450">Fold 05</div></div>
      <div class="panel tall" style="--i:6"><div class="face" style="--a:#d8c5a2;--b:#8e6c3e">Fold 06</div></div>
    </section>
  </main>
</body>
</html>
