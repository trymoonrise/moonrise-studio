<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0895
    slug: badges-notification-badge-13
    title: Notification Badge 13
    category: badges
    tags: badges, notification
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0895 — Notification Badge 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

    * { box-sizing: border-box; }
    body {
      display: grid; place-items: center; min-height: 100vh;
      background: #0a0b12; font-family: Inter, sans-serif; overflow: hidden;
    }

    .tray {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 18px;
      background: #161822;
      border: 1px solid rgba(255,255,255,0.08);
      display: grid; place-items: center;
      font-size: 1.7rem;
      cursor: pointer;
    }

    .toast {
      position: absolute;
      left: calc(100% + 14px);
      top: 50%;
      transform: translateY(-50%) translateX(12px) scale(0.9);
      opacity: 0;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.9rem;
      width: max-content;
      max-width: 260px;
      border-radius: 14px;
      background: rgba(24, 26, 36, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eef0f6;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      pointer-events: none;
      transition: opacity 0.35s, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tray:hover .toast,
    .tray:focus-visible .toast,
    .tray.show .toast {
      opacity: 1;
      transform: translateY(-50%) translateX(0) scale(1);
      pointer-events: auto;
    }

    .pip {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #ff2d55;
      border: 2px solid #0a0b12;
      animation: bounce 1s ease-in-out infinite;
      box-shadow: 0 0 14px rgba(255, 45, 85, 0.6);
    }

    .toast strong { display: block; font-size: 0.82rem; }
    .toast span { font-size: 0.72rem; color: rgba(238,240,246,0.5); }

    .hint {
      position: fixed; bottom: 1.5rem;
      font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-4px) scale(1.1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .pip { animation: none; }
      .toast { transition: none; }
    }
  </style>
</head>
<body>
  <button class="tray" id="tray" type="button" aria-label="Notifications">
    🔔
    <span class="pip" aria-hidden="true"></span>
    <div class="toast" role="status">
      <div>
        <strong>3 new alerts</strong>
        <span>Hover to peek · click to pin</span>
      </div>
    </div>
  </button>
  <p class="hint">Hover / click</p>

  <script>
    const tray = document.getElementById('tray');
    tray.addEventListener('click', () => tray.classList.toggle('show'));
  </script>
</body>
</html>
