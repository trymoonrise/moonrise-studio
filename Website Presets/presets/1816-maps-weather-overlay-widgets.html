<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1816
    slug: maps-weather-overlay-widgets
    title: Weather Overlay Widgets
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1816 — Weather Overlay Widgets</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#e8f4ff;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(560px,94vw)}.stage{position:relative;aspect-ratio:16/10;border-radius:28px;overflow:hidden;border:1px solid rgba(30,80,140,.12);box-shadow:0 28px 70px rgba(30,80,140,.12)}
.rain{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(110deg,transparent 0 8px,rgba(255,255,255,.08) 8px 9px);animation:rain 1.2s linear infinite;mix-blend-mode:soft-light}
.card{position:absolute;top:16px;right:16px;width:150px;padding:1rem;border-radius:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);box-shadow:0 12px 30px rgba(0,0,0,.1)}
.card .temp{font-size:2.2rem;font-weight:800;letter-spacing:-.05em;line-height:1}
.card .cond{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.45);margin-top:.4rem}
.row{display:flex;gap:8px;margin-top:.8rem}.row span{flex:1;text-align:center;font-size:.65rem;padding:.35rem;border-radius:8px;background:#eef6ff;font-family:'DM Mono',monospace}
@keyframes rain{to{background-position:24px 40px}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe src="https://www.google.com/maps?q=Vancouver%2C%20Canada&hl=en&z=12&output=embed" title="Weather map" loading="lazy"></iframe><div class="rain"></div>
<div class="card"><div class="temp" id="temp">11°</div><div class="cond">Light rain</div><div class="row"><span>UV 2</span><span>WIND</span><span>92%</span></div></div>
</div></div>
<script>const t=document.getElementById('temp');setInterval(()=>{t.textContent=(10+Math.round(Math.random()*3))+'°'},2800);</script>
</body>
</html>
