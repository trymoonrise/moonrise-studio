<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0652
    slug: navigation-breadcrumb-nav-04
    title: Breadcrumb Nav 04
    category: navigation
    tags: navigation, breadcrumb
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0652 — Breadcrumb Nav 04</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f5;color:#111;font-family:Outfit,sans-serif;padding:2rem}
    .path{display:flex;flex-wrap:wrap;align-items:baseline;gap:.65rem;font-size:clamp(1.4rem,4vw,2.2rem);font-family:Syne,sans-serif;font-weight:700;letter-spacing:-.04em}
    .path a{color:inherit;text-decoration:none;opacity:.25;transition:opacity .3s}
    .path a:hover{opacity:.6}
    .path .slash{opacity:.15;font-weight:300;font-family:Outfit,sans-serif}
    .path .now{opacity:1}
    .sub{margin-top:1.5rem;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:300;color:#999}
  </style>
</head>
<body>
  <div>
    <nav class="path" aria-label="Breadcrumb">
      <a href="#">root</a><span class="slash">/</span>
      <a href="#">space</a><span class="slash">/</span>
      <a href="#">quiet</a><span class="slash">/</span>
      <span class="now" aria-current="page">here</span>
    </nav>
    <div class="sub">Path as typography</div>
  </div>
</body>
</html>
