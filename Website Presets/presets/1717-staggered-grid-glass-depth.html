<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1717
    slug: staggered-grid-glass-depth
    title: Glass Depth Grid
    category: animation
    tags: grid, stagger, glass, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1717 - Glass Depth Grid</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:2rem;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#3e66ff55,transparent 32rem),radial-gradient(circle at 80% 80%,#ff6bcb44,transparent 28rem),#07080d;color:#fff;font-family:Inter,system-ui,sans-serif;perspective:1300px}.shell{width:min(980px,100%);transform-style:preserve-3d}.top{margin-bottom:1.25rem;display:flex;justify-content:space-between;gap:1rem;align-items:end}.top h1{margin:0;font-size:clamp(2.3rem,6vw,4.8rem);letter-spacing:-.07em;line-height:.9}.top p{margin:0;opacity:.48;font-size:.8rem;text-transform:uppercase;letter-spacing:.14em}.grid{display:grid;grid-template-columns:repeat(10,1fr);grid-auto-rows:88px;gap:.75rem}.pane{grid-column:span var(--c);grid-row:span var(--r);border-radius:20px;background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.25);opacity:0;transform:translateZ(calc(var(--z)*-1px)) translateY(30px) rotateX(18deg);animation:glass .9s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*70ms);position:relative;overflow:hidden}.pane:before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-120%);animation:shine .9s ease-out forwards;animation-delay:calc(var(--i)*90ms + .25s)}.pane b{position:absolute;left:1rem;bottom:1rem;font-size:clamp(1.1rem,2.4vw,2rem);letter-spacing:-.05em}.pane:hover{transform:translateY(-6px) translateZ(40px);transition:transform .25s ease;z-index:5}@keyframes glass{to{opacity:1;transform:none}}@keyframes shine{to{transform:translateX(120%)}}@media(max-width:720px){.top{display:block}.grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:120px}.pane{grid-column:span 1!important;grid-row:span 1!important}}@media(prefers-reduced-motion:reduce){.pane,.pane:before{animation:none;opacity:1;transform:none}}
  </style>
</head>
<body>
  <section class="shell">
    <div class="top"><h1>Glass layers</h1><p>Depth sorted reveal</p></div>
    <div class="grid">
      <div class="pane" style="--i:1;--c:4;--r:2;--z:220"><b>Alpha</b></div>
      <div class="pane" style="--i:2;--c:3;--r:1;--z:160"><b>Beta</b></div>
      <div class="pane" style="--i:3;--c:3;--r:2;--z:260"><b>Gamma</b></div>
      <div class="pane" style="--i:4;--c:2;--r:2;--z:120"><b>Delta</b></div>
      <div class="pane" style="--i:5;--c:4;--r:1;--z:80"><b>Epsilon</b></div>
      <div class="pane" style="--i:6;--c:4;--r:2;--z:320"><b>Zeta</b></div>
      <div class="pane" style="--i:7;--c:5;--r:1;--z:180"><b>Release</b></div>
      <div class="pane" style="--i:8;--c:5;--r:1;--z:240"><b>Stable</b></div>
    </div>
  </section>
</body>
</html>
