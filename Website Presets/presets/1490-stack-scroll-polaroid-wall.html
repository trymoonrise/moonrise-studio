<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1490
    slug: stack-scroll-polaroid-wall
    title: Polaroid Scroll Wall
    category: stack-gallery
    tags: stack, polaroid, scroll, images
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1490 — Polaroid Scroll Wall</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#e8e4dc;padding:20vh 2rem 80vh;font-family:Georgia,serif}.wall{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}.pol{position:sticky;top:calc(15vh + var(--i)*12px);background:#fff;padding:12px 12px 40px;box-shadow:0 8px 30px rgba(0,0,0,.12);transform:rotate(var(--r));transition:transform .4s}.pol img{width:100%;aspect-ratio:1;object-fit:cover;display:block}.pol span{display:block;text-align:center;margin-top:10px;font-size:.85rem;color:#666}
  </style>
</head>
<body>
<div class="wall"><div class="pol" style="--i:0;--r:-4deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>Venice</span></div><div class="pol" style="--i:1;--r:0deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>Tokyo</span></div><div class="pol" style="--i:2;--r:4deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>Paris</span></div><div class="pol" style="--i:3;--r:-4deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>NYC</span></div><div class="pol" style="--i:4;--r:0deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>London</span></div><div class="pol" style="--i:5;--r:4deg"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span>Sydney</span></div></div>

</body>
</html>
