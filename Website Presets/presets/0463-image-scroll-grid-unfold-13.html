<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0463
    slug: image-scroll-grid-unfold-13
    title: Grid Unfold 13
    category: image-scroll
    tags: image-scroll, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0463 - Grid Unfold 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0c0c0e;color:#fff;font-family:system-ui}.track{height:260vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center;padding:2rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:min(92vw,720px)}.cell{aspect-ratio:1;border-radius:12px;overflow:hidden;opacity:var(--o,0);transform:scale(var(--s,.6)) rotate(var(--r,-8deg));transition:opacity .4s,transform .5s cubic-bezier(.2,.8,.2,1)}.cell img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>
<div class="track" id="t"><div class="sticky"><div class="grid" id="g"><div class="cell" data-i="0"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="1"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="2"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="3"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="4"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="5"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="6"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="7"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div><div class="cell" data-i="8"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div></div></div></div>
<script>const _el=document.querySelector('#t');function prog(){const r=_el.getBoundingClientRect();return Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));}const cells=[...document.querySelectorAll('.cell')];addEventListener('scroll',()=>{const p=prog();cells.forEach((c,i)=>{const t=Math.min(1,Math.max(0,(p*1.4)-i*.08));c.style.setProperty('--o',String(t));c.style.setProperty('--s',String(.6+t*.4));c.style.setProperty('--r',(-8+t*8)+'deg');});},{passive:true});</script>
</body>
</html>
