<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0869
    slug: alerts-toast-alert-13
    title: Toast Alert 13
    category: alerts
    tags: alerts, toast
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0869 — Toast Alert 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 80% 20%, #1a1d2b, #0a0b12 70%);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .toasts {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: min(90vw, 340px);
      z-index: 20;
    }

    .toast {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.95rem 1rem;
      border-radius: 14px;
      background: rgba(24, 26, 36, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #eef0f6;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      overflow: hidden;
      transform: translateX(120%);
      animation: slide-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .toast.out { animation: slide-out 0.4s ease forwards; }

    .icon {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 9px;
      display: grid; place-items: center;
      font-size: 1rem;
    }
    .toast--ok .icon { background: rgba(34, 197, 94, 0.18); color: #4ade80; }
    .toast--info .icon { background: rgba(56, 189, 248, 0.18); color: #38bdf8; }
    .toast--warn .icon { background: rgba(250, 204, 21, 0.18); color: #facc15; }

    .txt strong { display: block; font-size: 0.86rem; font-weight: 700; }
    .txt span { font-size: 0.78rem; color: rgba(238, 240, 246, 0.55); }

    .x {
      margin-left: auto;
      appearance: none; border: 0; background: transparent;
      color: rgba(255, 255, 255, 0.4); cursor: pointer; font-size: 1rem;
      width: 24px; height: 24px; border-radius: 6px;
    }
    .x:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }

    .life {
      position: absolute;
      left: 0; bottom: 0;
      height: 3px;
      width: 100%;
      transform-origin: left;
      animation: drain 5s linear forwards;
    }
    .toast--ok .life { background: #4ade80; }
    .toast--info .life { background: #38bdf8; }
    .toast--warn .life { background: #facc15; }

    @keyframes slide-in { to { transform: translateX(0); } }
    @keyframes slide-out { to { transform: translateX(120%); opacity: 0; } }
    @keyframes drain { to { transform: scaleX(0); } }

    @media (prefers-reduced-motion: reduce) {
      .toast { animation: none; transform: none; }
      .life { animation: none; }
    }
  </style>
</head>
<body>
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script>
    const data = [
      { type: 'ok', icon: '✓', title: 'File uploaded', msg: 'report-q3.pdf is ready to share.' },
      { type: 'info', icon: 'i', title: 'New comment', msg: 'Alex mentioned you in Design.' },
      { type: 'warn', icon: '!', title: 'Low balance', msg: 'Add credits to keep rendering.' }
    ];
    const box = document.getElementById('toasts');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    function make(d, i) {
      const t = document.createElement('div');
      t.className = 'toast toast--' + d.type;
      t.style.animationDelay = (i * 0.18) + 's';
      t.innerHTML =
        '<div class="icon" aria-hidden="true">' + d.icon + '</div>' +
        '<div class="txt"><strong>' + d.title + '</strong><span>' + d.msg + '</span></div>' +
        '<button class="x" aria-label="Dismiss">×</button>' +
        '<span class="life" style="animation-delay:' + (0.6 + i * 0.18) + 's"></span>';
      const remove = () => {
        t.classList.add('out');
        t.addEventListener('animationend', () => t.remove(), { once: true });
      };
      t.querySelector('.x').addEventListener('click', remove);
      if (!reduced) setTimeout(remove, 5600 + i * 180);
      box.appendChild(t);
    }

    data.forEach(make);
  </script>
</body>
</html>
