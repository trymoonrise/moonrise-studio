<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0354
    slug: backgrounds-mesh-gradient
    title: Mesh Gradient
    category: backgrounds
    tags: backgrounds, mesh
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0354 - Mesh Gradient</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#f4f4f4;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .mesh{position:absolute;inset:0;background:
      radial-gradient(ellipse 60% 50% at 15% 20%,rgba(0,0,0,.12),transparent),
      radial-gradient(ellipse 50% 60% at 85% 15%,rgba(0,0,0,.08),transparent),
      radial-gradient(ellipse 55% 45% at 70% 80%,rgba(0,0,0,.1),transparent),
      radial-gradient(ellipse 40% 40% at 25% 75%,rgba(0,0,0,.06),transparent),
      #f4f4f4;animation:mesh 18s ease-in-out infinite alternate}
    @keyframes mesh{to{background:
      radial-gradient(ellipse 55% 55% at 25% 30%,rgba(0,0,0,.14),transparent),
      radial-gradient(ellipse 45% 50% at 75% 25%,rgba(0,0,0,.09),transparent),
      radial-gradient(ellipse 60% 40% at 60% 70%,rgba(0,0,0,.11),transparent),
      radial-gradient(ellipse 35% 45% at 20% 65%,rgba(0,0,0,.07),transparent),
      #f4f4f4}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="mesh" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Mesh gradient</h1><p class="sub">Ink blooms on paper.</p></div>

</body>
</html>
