--><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0193 - Fieldset Form</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#e9eee8;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.shell{width:min(620px,94vw)}fieldset{border:1px solid #173d2b;border-radius:28px;padding:24px;margin:0;position:relative}legend{padding:0 14px;font:500 10px 'DM Mono';letter-spacing:.22em;text-transform:uppercase;color:#356c51}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.field{display:grid;gap:7px}.field.wide{grid-column:1/-1}.field label{font:500 10px 'DM Mono';text-transform:uppercase;letter-spacing:.14em;color:#557565}.field input,.field textarea{border:0;border-bottom:1px solid #789586;background:transparent;padding:10px 0;outline:0}.field textarea{resize:none;min-height:80px}.field input:focus,.field textarea:focus{border-color:#0a2d1d}.send{float:right;margin-top:18px;border:0;background:#173d2b;color:#fff;border-radius:999px;padding:13px 22px;transition:.3s}.send:hover{border-radius:6px;transform:translateY(-2px)}.shape{position:absolute;width:18px;height:18px;right:20px;top:-9px;background:#e9eee8;border:1px solid #173d2b;transform:rotate(45deg);animation:turn 8s linear infinite}@keyframes turn{to{transform:rotate(405deg)}}@media(max-width:560px){.grid{grid-template-columns:1fr}.field.wide{grid-column:auto}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><main class="shell"><form><fieldset><legend>Project coordinates</legend><i class="shape"></i><div class="grid"><div class="field"><label>Name</label><input required placeholder="Ari Lane"></div><div class="field"><label>Studio</label><input placeholder="Independent"></div><div class="field wide"><label>Direction</label><textarea placeholder="Describe the shape of the project"></textarea></div></div></fieldset><button class="send">Send inquiry →</button></form></main><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
