<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0196
    slug: tooltips-arrow-tip
    title: Arrow Tooltip
    category: tooltips
    tags: tooltips, arrow
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0196 - Arrow Tooltip</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.tip,.pop{opacity:1!important;transform:none!important;visibility:visible!important}}
    .stage{text-align:center}
    .kicker{margin:0 0 2rem;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888}
    .wrap{position:relative;display:inline-block}
    .btn{padding:11px 26px;border:1.5px solid #111;background:transparent;color:#111;font-family:"DM Sans",system-ui,-apple-system,sans-serif;font-size:.86rem;font-weight:600;cursor:pointer}
    .tip{position:absolute;bottom:calc(100% + 14px);left:50%;translate:-50% 4px;padding:9px 16px;background:#111;color:#fff;font-size:.8rem;font-weight:500;white-space:nowrap;opacity:0;visibility:hidden;transition:opacity .28s,translate .28s cubic-bezier(.22,1,.36,1),visibility .28s}
    .tip::after{content:'';position:absolute;top:100%;left:50%;translate:-50% 0;border:7px solid transparent;border-top-color:#111}
    .wrap:hover .tip{opacity:1;visibility:visible;translate:-50% 0}
  </style>
</head>
<body>
<div class="stage"><p class="kicker">Arrow tooltip</p><div class="wrap"><button class="btn" type="button">Details</button><div class="tip" role="tooltip">Pointed edge · top</div></div></div>

</body>
</html>
