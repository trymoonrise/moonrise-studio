<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0247
    slug: errors-inline-error
    title: Inline Form Error
    category: errors
    tags: errors, form
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0247 — Inline Form Error</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#f4efe6;font-family:'IBM Plex Mono',monospace}
    .card{width:min(420px,100%);background:#fff;border:3px solid #111;padding:2rem;box-shadow:8px 8px 0 #111;position:relative}
    label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;font-weight:700}
    .field{position:relative;margin-bottom:1.75rem}
    input{width:100%;padding:.9rem 1rem;border:3px solid #111;font:inherit;font-size:1rem;background:#fff;outline:none}
    input.bad{border-color:#ff0033;background:#fff0f3;animation:quake .4s ease-in-out infinite;box-shadow:0 0 0 4px rgba(255,0,51,.2),inset 0 0 20px rgba(255,0,51,.08)}
    .err{
      margin-top:.65rem;font-family:'Archivo Black',sans-serif;font-size:clamp(1.1rem,4vw,1.6rem);
      color:#ff0033;line-height:1;letter-spacing:-.02em;text-transform:uppercase;
      animation:scream 1.2s ease-in-out infinite;transform-origin:left center;
    }
    .err::before{content:'⚠ ';animation:spin-warn .6s linear infinite;display:inline-block}
    .siren{position:absolute;top:-14px;right:-14px;width:48px;height:48px;border-radius:50%;background:#ff0033;border:3px solid #111;animation:siren .5s ease-in-out infinite;display:grid;place-items:center;font-size:1.4rem}
    button{width:100%;padding:1rem;border:3px solid #111;background:#111;color:#fff;font:700 .85rem 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
    button:hover{background:#ff0033}
    @keyframes quake{0%,100%{transform:translate(0)}20%{transform:translate(-6px,2px) rotate(-1deg)}40%{transform:translate(7px,-2px) rotate(1deg)}60%{transform:translate(-4px,3px)}80%{transform:translate(5px,-1px)}}
    @keyframes scream{0%,100%{transform:scale(1) skewX(0);filter:none}50%{transform:scale(1.12) skewX(-4deg);filter:drop-shadow(0 0 8px rgba(255,0,51,.6))}}
    @keyframes siren{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,0,51,.5)}50%{transform:scale(1.15);box-shadow:0 0 0 12px rgba(255,0,51,0)}}
    @keyframes spin-warn{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){input.bad,.err,.siren,.err::before{animation:none}}
  </style>
</head>
<body>
  <form class="card" onsubmit="return false">
    <div class="siren" aria-hidden="true">!</div>
    <div class="field">
      <label for="email">Email address</label>
      <input id="email" class="bad" type="email" value="not-an-email@@@" aria-invalid="true" aria-describedby="err">
      <div class="err" id="err" role="alert">THIS IS NOT AN EMAIL. THIS IS CHAOS.</div>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" value="123" placeholder="••••••••">
    </div>
    <button type="submit">Submit anyway</button>
  </form>
</body>
</html>
