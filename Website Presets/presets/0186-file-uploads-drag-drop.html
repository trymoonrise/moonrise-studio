<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0186
    slug: file-uploads-drag-drop

    tags: file-uploads, drag
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0186 — Drag Drop Zone</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem}.zone{width:300px;height:180px;border:2px dashed #ccc;border-radius:16px;display:grid;place-items:center;text-align:center;color:#999;transition:all .2s;cursor:pointer}.zone.over{border-color:#6c8cff;background:#f0f4ff;color:#6c8cff}.zone p{font-size:.9rem;margin-top:8px}
  </style>
</head>
<body>
<div class="zone" id="z"><div>📁<p>Drop files here</p></div></div>
<script>const z=document.getElementById('z');['dragenter','dragover'].forEach(e=>z.addEventListener(e,ev=>{ev.preventDefault();z.classList.add('over');}));['dragleave','drop'].forEach(e=>z.addEventListener(e,ev=>{ev.preventDefault();z.classList.remove('over');if(e==='drop')z.querySelector('p').textContent='File received!';}));</script>
</body>
</html>
