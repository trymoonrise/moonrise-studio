<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1019
    slug: announcements-dark-banner-07
    title: Dark Banner 07
    category: announcements
    tags: announcements, dark
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1019 - Dark Banner 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:start center;padding:2rem 1rem;background:#050507;font-family:Manrope,sans-serif}
    .foil{
      width:min(700px,100%);padding:1.2rem 1.4rem;border-radius:18px;position:relative;overflow:hidden;color:#fff;
      background:#0c0c10;border:1px solid rgba(255,255,255,.08);
      box-shadow:0 28px 60px rgba(0,0,0,.5);
      opacity:0;transform:rotateX(8deg) translateY(12px);
      animation:enter .85s cubic-bezier(.16,1,.3,1) forwards;
    }
    .foil::before{
      content:'';position:absolute;inset:-30%;
      background:conic-gradient(from 210deg,#ff6b9d,#6c8cff,#6bffd3,#ffd16c,#ff6b9d);
      opacity:.18;filter:blur(32px);pointer-events:none;
    }
    .inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    h2{margin:0;font-family:Syne,sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-.03em}
    p{margin:.35rem 0 0;font-size:.8rem;color:rgba(255,255,255,.6)}
    .btn{appearance:none;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:.55rem 1rem;font:700 .75rem Manrope,sans-serif;cursor:pointer;transition:background .2s}
    .btn:hover{background:rgba(255,255,255,.14)}
    @keyframes enter{to{transform:rotateX(4deg) translateY(0);opacity:1}}
    @media (prefers-reduced-motion:reduce){.foil{animation:none;transform:none}}
  </style>
</head>
<body>
  <div class="foil" role="status">
    <div class="inner">
      <div>
        <h2>Holographic release notes</h2>
        <p>Dark foil announcement with a stable iridescent field.</p>
      </div>
      <button class="btn" type="button">Read notes</button>
    </div>
  </div>
</body>
</html>
