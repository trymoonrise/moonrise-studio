<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1138
    slug: ai-chat-suggestion-chat-09
    title: Suggestion Chat 09
    category: ai-chat
    tags: ai-chat, suggestion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1138 - Suggestion Chat 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f8;font-family:Inter,system-ui,sans-serif;padding:2rem;color:#111}
    .stage{width:min(640px,100%);display:flex;flex-direction:column;align-items:center;gap:1.5rem}
    h1{margin:0;font-size:1.5rem;font-weight:600;letter-spacing:-.03em;animation:up .7s cubic-bezier(.16,1,.3,1) both}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%}
    .chip{text-align:left;padding:1rem;border-radius:16px;border:1px solid #e5e5e5;background:#fff;font:inherit;font-size:.85rem;line-height:1.4;color:#333;cursor:pointer;transition:border-color .2s,transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;opacity:0;animation:up .6s cubic-bezier(.16,1,.3,1) forwards}
    .chip:nth-child(1){animation-delay:.1s}.chip:nth-child(2){animation-delay:.18s}
    .chip:nth-child(3){animation-delay:.26s}.chip:nth-child(4){animation-delay:.34s}
    .chip:hover{border-color:#10a37f;transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.06)}
    .chip strong{display:block;font-size:.78rem;color:#888;font-weight:500;margin-bottom:.25rem}
    .ask{width:100%;display:flex;align-items:center;gap:.5rem;padding:.65rem .65rem .65rem 1.05rem;background:#fff;border:1px solid #e5e5e5;border-radius:28px;box-shadow:0 8px 28px rgba(0,0,0,.06);animation:up .7s cubic-bezier(.16,1,.3,1) .4s both}
    .ask input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:.95rem}
    .ask input::placeholder{color:#999}
    .send{width:36px;height:36px;border:none;border-radius:50%;background:#111;color:#fff;cursor:pointer;display:grid;place-items:center}
    .send svg{width:16px;height:16px}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
    @media(prefers-reduced-motion:reduce){h1,.chip,.ask{animation:none;opacity:1}}
  </style>
</head>
<body>
  <div class="stage">
    <h1>What are you working on?</h1>
    <div class="grid">
      <button class="chip" type="button"><strong>Write</strong>A launch announcement</button>
      <button class="chip" type="button"><strong>Learn</strong>Explain RAG simply</button>
      <button class="chip" type="button"><strong>Code</strong>Fix a React hook bug</button>
      <button class="chip" type="button"><strong>Plan</strong>Week of deep work</button>
    </div>
    <form class="ask" id="ask">
      <input id="i" type="text" placeholder="Ask anything…" autocomplete="off" aria-label="Ask anything">
      <button class="send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </form>
  </div>
  <script>
    const i=document.getElementById('i');
    document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{i.value=c.textContent.replace(/\s+/g,' ').trim();i.focus()}));
  </script>
</body>
</html>
