<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1023
    slug: announcements-card-banner-11
    title: Card Banner 11
    category: announcements
    tags: announcements, card
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1023 - Card Banner 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&display=swap');
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;font-family:Manrope,sans-serif;perspective:1000px;
      background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;
    }
    body::before{content:'';position:fixed;inset:0;background:rgba(10,12,18,.55);backdrop-filter:blur(8px)}
    .card{
      position:relative;z-index:1;width:min(420px,calc(100% - 2rem));padding:1.5rem;border-radius:24px;color:#fff;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(18px);
      box-shadow:0 30px 70px rgba(0,0,0,.35);
      transform:rotateX(8deg) translateY(16px);
      animation:enter .9s cubic-bezier(.16,1,.3,1) forwards;
    }
    .badge{display:inline-block;padding:.25rem .55rem;border-radius:999px;background:rgba(126,224,195,.2);color:#7ee0c3;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    h2{margin:.85rem 0 .4rem;font-family:Syne,sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-.03em}
    p{margin:0;font-size:.9rem;line-height:1.55;color:rgba(255,255,255,.72)}
    .row{display:flex;gap:.6rem;margin-top:1.2rem}
    .btn{appearance:none;border:0;border-radius:12px;padding:.7rem 1rem;font:700 .78rem Manrope,sans-serif;cursor:pointer}
    .btn--p{background:#fff;color:#111}
    .btn--g{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.15)}
    @keyframes enter{to{transform:rotateX(4deg) translateY(0)}}
    @media (prefers-reduced-motion:reduce){.card{animation:none;transform:none}}
  </style>
</head>
<body>
  <div class="card" role="status">
    <span class="badge">Announcement</span>
    <h2>Office hours tonight</h2>
    <p>Drop in for live demos and Q&A with the product team from 5–6pm PT.</p>
    <div class="row">
      <button class="btn btn--p" type="button">Add to calendar</button>
      <button class="btn btn--g" type="button">Details</button>
    </div>
  </div>
</body>
</html>
