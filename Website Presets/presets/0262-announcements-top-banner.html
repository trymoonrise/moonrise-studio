<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0262
    slug: announcements-top-banner
    title: Top Announcement Banner
    category: announcements
    tags: announcements, banner
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0262 — Top Announcement Banner</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0e1016;font-family:Manrope,sans-serif;perspective:1200px;overflow-x:hidden}
    .page{padding:7rem 1.5rem 2rem;color:rgba(255,255,255,.4);text-align:center;font-size:.85rem}
    .banner{
      position:fixed;top:1rem;left:50%;z-index:20;width:min(920px,calc(100% - 2rem));
      transform:translateX(-50%) rotateX(8deg) translateY(-120%);
      animation:drop-in 1s cubic-bezier(.16,1,.3,1) .2s forwards;
      will-change:transform;
    }
    .banner__tilt{
      transform-style:preserve-3d;
      animation:settle 1.2s cubic-bezier(.16,1,.3,1) 1s forwards;
    }
    .banner__face{
      position:relative;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;
      padding:0.95rem 1.25rem;border-radius:16px;color:#fff;text-align:center;
      background:linear-gradient(135deg,#1b2238 0%,#27335a 45%,#1a2744 100%);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 25px 60px rgba(0,0,0,.45),0 0 0 1px rgba(120,160,255,.08) inset;
      overflow:hidden;
    }
    .banner__face::before{
      content:'';position:absolute;inset:-40% -20%;background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 60%);
      transform:translateX(-120%);
      animation:shine 1.4s ease-out 1.4s forwards;
    }
    .banner__edge{
      position:absolute;left:8%;right:8%;bottom:-10px;height:14px;border-radius:0 0 14px 14px;
      background:#0b1020;transform:rotateX(90deg);transform-origin:top;opacity:.7;
    }
    .tag{position:relative;padding:.25rem .55rem;border-radius:999px;background:rgba(126,180,255,.18);color:#9ec5ff;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .msg{position:relative;font-size:.92rem;font-weight:600}
    .cta{position:relative;appearance:none;border:0;border-radius:999px;padding:.45rem .9rem;background:#fff;color:#15203a;font:700 .78rem Manrope,sans-serif;cursor:pointer;transition:transform .2s ease}
    .cta:hover{transform:translateZ(20px) scale(1.04)}
    @keyframes drop-in{to{transform:translateX(-50%) rotateX(8deg) translateY(0)}}
    @keyframes settle{from{transform:rotateY(-3deg)}to{transform:none}}
    @keyframes shine{to{transform:translateX(120%)}}
    @media (prefers-reduced-motion:reduce){.banner,.banner__tilt,.banner__face::before{animation:none}.banner{transform:translateX(-50%) rotateX(6deg) translateY(0)}}
  </style>
</head>
<body>
  <div class="banner" role="status">
    <div class="banner__tilt">
    <div class="banner__edge" aria-hidden="true"></div>
    <div class="banner__face">
      <span class="tag">Live</span>
      <span class="msg">Spring release is here — new workflows, same calm UI.</span>
      <button class="cta" type="button">Explore update</button>
    </div>
    </div>
  </div>
  <p class="page">Page content sits beneath the floating announcement plane.</p>
</body>
</html>
