<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1256
    slug: carousels-dot-carousel-09
    title: Dot Carousel 09
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1256 - Dot Carousel 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff5f5;font-family:'DM Sans',system-ui,sans-serif;color:#111;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(480px,90vw)}.stage{position:relative;aspect-ratio:16/10;border-radius:26px;overflow:hidden;background:#fecaca;box-shadow:0 24px 60px rgba(190,50,50,.15)}.slide{position:absolute;inset:0;opacity:0;transform:translateY(16px);transition:opacity .55s,transform .65s cubic-bezier(.22,1,.36,1)}.slide.on{opacity:1;transform:none}.slide img{width:100%;height:100%;object-fit:cover}.dots{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px}.dot{position:relative;width:14px;height:14px;border-radius:50%;background:rgba(127,29,29,.2);transition:transform .35s,background .35s}.dot.on{background:#7f1d1d;transform:scale(1.2)}.dot.on::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid #7f1d1d;animation:ping 1.2s ease-out infinite}.label{text-align:center;margin-top:12px;font-family:Syne,sans-serif;font-weight:700;color:#7f1d1d}@keyframes ping{to{transform:scale(1.5);opacity:0}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage">
<div class="slide on"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(20deg) saturate(1.3)"></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(320deg)"></div>
<div class="slide"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="" style="filter:sepia(.4)"></div>
</div><div class="dots" id="dots"></div><div class="label" id="label">Slide 1</div></div>
<script>
const slides=[...document.querySelectorAll('.slide')],dots=document.getElementById('dots'),label=document.getElementById('label');let i=0;slides.forEach((_,n)=>{const b=document.createElement('button');b.className='dot'+(n===0?' on':'');b.onclick=()=>go(n);dots.appendChild(b);});function go(n){i=(n+slides.length)%slides.length;slides.forEach((s,k)=>s.classList.toggle('on',k===i));[...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i));label.textContent='Slide '+(i+1);}setInterval(()=>go(i+1),3000);
</script>
</body>
</html>
