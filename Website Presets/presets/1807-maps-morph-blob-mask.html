<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1807
    slug: maps-morph-blob-mask
    title: Morph Blob Mask
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1807 — Morph Blob Mask</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#0a0a0a;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(480px,90vw);position:relative;display:grid;place-items:center}
.blob{width:100%;aspect-ratio:1;overflow:hidden;border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;animation:morph 8s ease-in-out infinite;box-shadow:0 40px 100px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12)}
.blob iframe{width:130%;height:130%;margin:-15%;filter:saturate(1.2)}
.halo{position:absolute;width:110%;aspect-ratio:1;border-radius:50%;background:conic-gradient(from 90deg,#22d3ee,#a78bfa,#fb7185,#22d3ee);filter:blur(40px);opacity:.35;z-index:-1;animation:spin 12s linear infinite}
.label{margin-top:1.25rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;opacity:.45}
@keyframes morph{0%,100%{border-radius:60% 40% 55% 45%/45% 55% 40% 60%}50%{border-radius:40% 60% 40% 60%/60% 40% 60% 40%}}
@keyframes spin{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="halo"></div><div class="blob"><iframe src="https://www.google.com/maps?q=Reykjavik%2C%20Iceland&hl=en&z=11&output=embed" title="Blob map" loading="lazy"></iframe></div><p class="label">Living mask</p></div>

</body>
</html>
