<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1492
    slug: stack-scroll-horizontal-strip
    title: Stack to Horizontal Strip
    category: stack-gallery
    tags: stack, horizontal, scroll, images
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1492 — Stack to Horizontal Strip</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#000}.pin{height:350vh}.sticky{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}.track{display:flex;gap:20px;align-items:center;will-change:transform;padding:0 10vw}.card{flex:0 0 min(220px,40vw);aspect-ratio:4/5;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}.card img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>
<div class="pin"><div class="sticky"><div class="track" id="t"><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 1"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 2"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 3"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 4"></div><div class="card"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="Photo 5"></div></div></div></div>
<script>const pin=document.querySelector('.pin'),t=document.getElementById('t');function u(){const r=pin.getBoundingClientRect();const p=Math.min(1,Math.max(0,-r.top/(r.height-innerHeight)));const max=t.scrollWidth-innerWidth*.5;t.style.transform='translateX('+(-p*max)+'px)';}addEventListener('scroll',u,{passive:true});u();</script>
</body>
</html>
