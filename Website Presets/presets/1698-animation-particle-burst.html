<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1698
    slug: animation-particle-burst
    title: Particle Burst Click
    category: animation
    tags: animation, particles, burst, click
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1688 - Particle Burst Click</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050507;
      overflow: hidden;
      cursor: crosshair;
      font-family: Syne, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .label {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 2;
      text-align: center;
    }

    .label h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #f4f1ea;
      text-shadow: 0 0 40px rgba(255, 80, 120, 0.35);
    }

    .label p {
      margin: 0.7rem 0 0;
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(244, 241, 234, 0.4);
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">
    <div>
      <h1>Detonate</h1>
      <p>Click anywhere</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const colors = ['#ff3d6e', '#ffc53d', '#4de1ff', '#d6ff3f', '#ff7a3d', '#a78bfa'];
    let particles = [];
    let w = 0, h = 0;

    function resize() {
      w = canvas.width = innerWidth * devicePixelRatio;
      h = canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function burst(x, y) {
      const count = reduced ? 20 : 90;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 14;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.02,
          size: 2 + Math.random() * 5,
          color: colors[(Math.random() * colors.length) | 0],
          spin: (Math.random() - 0.5) * 0.4,
          rot: Math.random() * Math.PI * 2,
          shape: Math.random() > 0.5 ? 'circle' : 'square'
        });
      }
    }

    function tick() {
      ctx.fillStyle = 'rgba(5, 5, 7, 0.22)';
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      particles = particles.filter((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.18;
        p.vx *= 0.985;
        p.vy *= 0.985;
        p.life -= p.decay;
        p.rot += p.spin;
        if (p.life <= 0) return false;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
        }
        ctx.restore();
        return true;
      });

      requestAnimationFrame(tick);
    }

    resize();
    addEventListener('resize', resize);
    addEventListener('pointerdown', (e) => burst(e.clientX, e.clientY));
    burst(innerWidth / 2, innerHeight / 2);
    tick();
  </script>
</body>
</html>
