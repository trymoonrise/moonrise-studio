<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1236
    slug: galleries-horizontal-scroll-03
    title: Parallax Snap Scroll Gallery
    category: galleries
    tags: galleries, horizontal, parallax, scroll
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1236 - Parallax Snap Scroll Gallery</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0b0d11;color:#e4e7ed;font-family:Outfit,sans-serif;overflow:hidden}
    .head{padding:2rem 2rem 1rem;display:flex;justify-content:space-between;align-items:baseline}
    .head h1{font-family:Syne,sans-serif;font-size:1.3rem;letter-spacing:-.03em;margin:0}
    .head span{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(228,231,237,.35)}
    .scroll{display:flex;gap:16px;padding:1rem 2rem 2rem;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    .scroll::-webkit-scrollbar{height:4px}
    .scroll::-webkit-scrollbar-thumb{background:rgba(56,189,248,.3);border-radius:2px}
    .slide{flex:0 0 min(320px,75vw);scroll-snap-align:start;border-radius:12px;overflow:hidden;position:relative;transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .slide img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.16,1,.3,1)}
    .slide:hover img{transform:scale(1.06)}
    .slide::after{content:attr(data-label);position:absolute;bottom:0;left:0;right:0;padding:1rem;background:linear-gradient(transparent,rgba(0,0,0,.7));font-family:Syne,sans-serif;font-size:.85rem;font-weight:700;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .slide:hover::after{transform:translateY(0)}
    .slide:hover{transform:translateY(-4px)}
    .hint{text-align:center;font-size:.65rem;color:rgba(228,231,237,.3);letter-spacing:.15em;text-transform:uppercase;padding-bottom:1.5rem;animation:hint-fade 3s ease infinite}
    @keyframes hint-fade{0%,100%{opacity:.3}50%{opacity:.7}}
    @media(prefers-reduced-motion:reduce){.slide,.slide img,.slide::after,.hint{transition:none;animation:none}}
  </style>
</head>
<body>
  <div class="head"><h1>Scroll collection</h1><span>04 items</span></div>
  <div class="scroll">
    <div class="slide" data-label="01 · Structure"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="slide" data-label="02 · Form"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="slide" data-label="03 · Surface"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
    <div class="slide" data-label="04 · Detail"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
  </div>
  <p class="hint">Scroll horizontally →</p>
</body>
</html>
