<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0145 - Nested Folder Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f5f5f5}.menu{background:#fff;border-radius:8px;padding:8px 0;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,.08)}.item{padding:8px 16px;font-size:.9rem;cursor:pointer;position:relative;color:#333}.item:hover{background:#f0f4ff}.sub{position:absolute;left:100%;top:0;background:#fff;border-radius:8px;padding:8px 0;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}.item:hover .sub{display:block}
  </style>
</head>
<body>
<div class="menu"><div class="item">Documents</div><div class="item">Work<div class="sub"><div class="item">Reports</div><div class="item">Presentations</div></div></div><div class="item">Downloads</div></div>

</body>
