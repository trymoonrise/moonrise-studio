  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1331 - Card Tabs 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0a0a0c}.tabs{display:flex;gap:4px;background:#111118;padding:4px;border-radius:12px}.tab{padding:10px 20px;border:none;background:transparent;color:#a0a0b8;border-radius:8px;cursor:pointer;font-size:.9rem}.tab.on{background:#ff6cb0;color:#0a0a0c;font-weight:600}.panel{margin-top:1rem;color:#ffffff}
  </style>
</head>
<body>
<div><div class="tabs"><button class="tab on">A</button><button class="tab">B</button><button class="tab">C</button></div><div class="panel" id="p">Tab A - Card Tabs 938</div></div>
<script>document.querySelectorAll('.tab').forEach((t,i)=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('p').textContent='Tab '+t.textContent+' - Card Tabs 938';});</script>
</body>
