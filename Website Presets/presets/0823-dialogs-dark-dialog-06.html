<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0823 — Dark Dialog 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f4f4f5}.btn{padding:10px 24px;background:#3b5ccc;color:#f4f4f5;border:none;border-radius:8px;cursor:pointer}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;place-items:center;z-index:10}.overlay.open{display:grid}.dlg{background:#ffffff;color:#18181b;border-radius:16px;padding:2rem;width:min(90vw,360px);border:1px solid #3b5ccc}
  </style>
</head>
<body>
<button class="btn" id="o">Open</button><div class="overlay" id="ov"><div class="dlg"><h3>Dark Dialog 433</h3><p style="color:#71717a;margin:1rem 0;font-size:.9rem">Dialog content here</p><button class="btn" id="c">Close</button></div></div>
<script>document.getElementById('o').onclick=()=>document.getElementById('ov').classList.add('open');document.getElementById('c').onclick=()=>document.getElementById('ov').classList.remove('open');</script>
</body>
</html>
