<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1621
    slug: 3d-mouse-photo-stack
    title: 3D Photo Stack Mouse
    category: 3d-mouse
    tags: 3d, mouse, photo
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1621 - 3D Photo Stack Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0d14;perspective:1000px;overflow:hidden;font-family:Syne,sans-serif}
    .stack{position:relative;width:220px;height:280px;transform-style:preserve-3d;transform:rotateX(12deg) rotateY(var(--ry,-10deg))}
    .photo{position:absolute;inset:0;border-radius:14px;border:6px solid #fff;box-shadow:0 20px 40px rgba(0,0,0,.4);transform-origin:50% 110%;display:grid;place-items:end start;padding:1rem;color:#fff;font-size:.9rem;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.4)}
    .p0{background:linear-gradient(145deg,#6c8cff,#1a2a6c);z-index:4}
    .p1{background:linear-gradient(145deg,#ff6bcb,#5a1038);z-index:3}
    .p2{background:linear-gradient(145deg,#7ee0c3,#0e4a3a);z-index:2}
    .p3{background:linear-gradient(145deg,#ffd16c,#7a4a08);z-index:1}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="stack" id="stack">
    <div class="photo p3">04</div><div class="photo p2">03</div>
    <div class="photo p1">02</div><div class="photo p0">01</div>
  </div>
  <div class="hint">Shuffle the stack</div>
  <script>
    const photos=[...document.querySelectorAll('.photo')],stack=document.getElementById('stack');
    let mx=0,ry=-10,try_=-10;
    addEventListener('pointermove',e=>{mx=(e.clientX/innerWidth-.5)*2;try_=mx*-24});
    (function loop(){ry+=(try_-ry)*.1;stack.style.setProperty('--ry',ry+'deg');
      photos.forEach((p,i)=>{const t=i;const rot=(-8+t*-6)+mx*(10+t*14);const z=t*-30;const x=t*10+mx*t*18;
        p.style.transform=`translateZ(${z}px) translateX(${x}px) rotateZ(${rot}deg)`});
      requestAnimationFrame(loop)})();
  </script>
</body>
</html>
