<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1501
    slug: dots-pulse-loader
    title: Pulse Dot Loader
    category: dots
    tags: dots, loader, pulse
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1501 - Pulse Dot Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.loader{display:flex;gap:10px}.dot{width:12px;height:12px;border-radius:50%;background:#6c8cff;animation:pulse 1.2s ease-in-out infinite}.dot:nth-child(2){animation-delay:.15s;background:#ff6cb0}.dot:nth-child(3){animation-delay:.3s;background:#6cffb8}@keyframes pulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

</body>
</html>
