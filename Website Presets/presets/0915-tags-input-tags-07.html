<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0915
    slug: tags-input-tags-07
    title: Typeahead Tag Field
    category: tags
    tags: tags, input, typeahead
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0915 — Typeahead Tag Field</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Outfit:wght@400;500;600&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f3ee;font-family:Outfit,sans-serif}.field{width:min(360px,90vw);min-height:48px;padding:.4rem .55rem;border:1px solid #ccc8bc;border-radius:12px;background:#fff;display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}.chip{padding:.25rem .55rem;border-radius:6px;background:#111;color:#fff;font-size:.75rem;font-weight:600}.field input{border:0;outline:0;flex:1;min-width:80px;font:500 .9rem Outfit,sans-serif;background:transparent;padding:.35rem}
  </style>
</head>
<body>
<div class="field" id="f"><span class="chip">react</span><input id="i" placeholder="Add tag…" aria-label="Add tag"></div>
<script>const f=document.getElementById('f'),i=document.getElementById('i');
i.addEventListener('keydown',e=>{if(e.key==='Enter'&&i.value.trim()){e.preventDefault();const c=document.createElement('span');c.className='chip';c.textContent=i.value.trim();f.insertBefore(c,i);i.value=''}});</script>
</body>
</html>
