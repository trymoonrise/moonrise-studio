<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1811
    slug: maps-glass-stack-panels
    title: Glass Stack Panels
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1811 — Glass Stack Panels</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#1a1025;color:#fff;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(420px,90vw);height:460px;position:relative;perspective:900px}
.panel{position:absolute;inset:40px 20px;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.15);box-shadow:0 30px 60px rgba(0,0,0,.4);transition:transform .7s cubic-bezier(.22,1,.36,1);background:#111}
.panel iframe{width:100%;height:100%;filter:saturate(1.15)}
.p1{transform:translateY(-28px) scale(.9) rotate(-4deg);z-index:1;opacity:.55}
.p2{transform:translateY(-10px) scale(.96) rotate(2deg);z-index:2;opacity:.8}
.p3{transform:none;z-index:3}
.wrap:hover .p1{transform:translate(-70px,-40px) rotate(-10deg) scale(.88)}
.wrap:hover .p2{transform:translate(70px,-20px) rotate(8deg) scale(.94)}
.tag{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;opacity:.45}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap">
<div class="panel p1"><iframe src="https://www.google.com/maps?q=Oslo%2C%20Norway&hl=en&z=11&output=embed" title="Stack 1" loading="lazy"></iframe></div>
<div class="panel p2"><iframe src="https://www.google.com/maps?q=Vienna%2C%20Austria&hl=en&z=12&output=embed" title="Stack 2" loading="lazy"></iframe></div>
<div class="panel p3"><iframe src="https://www.google.com/maps?q=Prague%2C%20Czechia&hl=en&z=12&output=embed" title="Stack 3" loading="lazy"></iframe></div>
<span class="tag">Hover to fan</span></div>

</body>
</html>
