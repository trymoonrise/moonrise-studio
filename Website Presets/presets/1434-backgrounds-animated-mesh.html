<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1434
    slug: backgrounds-animated-mesh
    title: Animated Mesh Background
    category: backgrounds
    tags: backgrounds, mesh, animate
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1434 - Animated Mesh Background</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#101010;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .node{position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);animation:orbit 12s ease-in-out infinite}
    .node:nth-child(1){left:10%;top:20%;animation-duration:14s}
    .node:nth-child(2){right:15%;top:30%;animation-duration:16s;animation-delay:-3s}
    .node:nth-child(3){left:30%;bottom:15%;animation-duration:18s;animation-delay:-6s}
    .node:nth-child(4){right:25%;bottom:25%;animation-duration:13s;animation-delay:-2s}
    @keyframes orbit{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-24px) scale(1.15)}}
    .lines{position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="lines" aria-hidden="true"></div><div class="node" aria-hidden="true"></div><div class="node" aria-hidden="true"></div><div class="node" aria-hidden="true"></div><div class="node" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Animated mesh</h1><p class="sub">Nodes drift on a lattice.</p></div>

</body>
</html>
