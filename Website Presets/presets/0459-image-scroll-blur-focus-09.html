<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0459
    slug: image-scroll-blur-focus-09
    title: Blur Focus 09
    category: image-scroll
    tags: image-scroll, blur
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0459 — Blur Focus 09</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#111;color:#fff;font-family:system-ui;padding-bottom:40vh}.gallery{max-width:900px;margin:0 auto;padding:20vh 1.5rem;display:flex;flex-direction:column;gap:30vh}.item{opacity:.4;filter:blur(8px);transform:scale(.94);transition:opacity .6s,filter .6s,transform .6s}.item.focus{opacity:1;filter:none;transform:none}.item img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.4)}.item figcaption{margin-top:1rem;font-size:.85rem;color:rgba(255,255,255,.5);letter-spacing:.06em}
  </style>
</head>
<body>
<div class="gallery"><figure class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><figcaption>Dawn</figcaption></figure><figure class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><figcaption>Noon</figcaption></figure><figure class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><figcaption>Dusk</figcaption></figure><figure class="item"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""><figcaption>Night</figcaption></figure></div>
<script>const items=[...document.querySelectorAll('.item')];const obs=new IntersectionObserver(es=>es.forEach(e=>e.target.classList.toggle('focus',e.isIntersecting)),{rootMargin:'-35% 0px -35% 0px',threshold:0});items.forEach(el=>obs.observe(el));</script>
</body>
</html>
