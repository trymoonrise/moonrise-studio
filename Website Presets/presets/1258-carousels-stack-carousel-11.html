<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1258
    slug: carousels-stack-carousel-11
    title: Stack Carousel 11
    category: carousels
    tags: carousels, animated, modern, interactive
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1258 - Stack Carousel 11</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fef3c7;font-family:'DM Sans',system-ui,sans-serif;color:#111;overflow:hidden;padding:24px}
    button{font:inherit;border:0;cursor:pointer;background:transparent;color:inherit}
    .wrap{width:min(300px,80vw);height:380px;position:relative}.card{position:absolute;inset:0;border-radius:28px;overflow:hidden;background:#fff;box-shadow:0 20px 50px rgba(120,80,20,.2);transition:transform .7s cubic-bezier(.22,1,.36,1),opacity .7s;cursor:pointer}.card img{width:100%;height:100%;object-fit:cover}.card .tag{position:absolute;left:16px;bottom:16px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.9);font-family:Syne,sans-serif;font-weight:700;font-size:.8rem}.hint{position:absolute;left:50%;bottom:-40px;transform:translateX(-50%);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.4);white-space:nowrap}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap" id="stack">
<div class="card" data-i="0"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt=""><span class="tag">Layer A</span></div>
<div class="card" data-i="1"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(40deg)"><span class="tag">Layer B</span></div>
<div class="card" data-i="2"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(120deg)"><span class="tag">Layer C</span></div>
<div class="card" data-i="3"><img src="../stock/media/4-5 Aspect Ratio(image).png" alt="" style="filter:hue-rotate(200deg)"><span class="tag">Layer D</span></div>
<span class="hint">Click to cycle</span>
</div>
<script>
const cards=[...document.querySelectorAll('.card')];let order=cards.map((_,i)=>i);function layout(){order.forEach((id,depth)=>{const c=cards[id];const d=order.length-1-depth;c.style.zIndex=String(depth+1);c.style.transform='translateY('+(d*-14)+'px) scale('+(1-d*.05)+') rotate('+(d*2-2)+'deg)';c.style.opacity=d>2?0:1;});}document.getElementById('stack').onclick=()=>{order.push(order.shift());layout();};layout();
</script>
</body>
</html>
