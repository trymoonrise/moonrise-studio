<body>
<article class="card"><p class="num" id="n">0</p><p class="label">Active teams</p></article>
<script>const el=document.getElementById('n');let v=0;const target=1284;const t=setInterval(()=>{v+=Math.ceil((target-v)/12);el.textContent=v.toLocaleString();if(v>=target)clearInterval(t)},30);</script>
