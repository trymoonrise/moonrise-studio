<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0534
    slug: features-bento-grid-03
    title: Bento Grid 03
    category: features
    tags: features, bento
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0534 — Bento Grid 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f5;color:#111;font-family:Outfit,sans-serif;padding:2rem}
    .wrap{width:min(820px,100%)}
    h1{margin:0 0 1.25rem;font-family:Syne,sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.04em;font-weight:800}
    .bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:110px;gap:10px}
    .c{background:#fff;border:1px solid #e8e8e8;padding:1.1rem;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s}
    .c:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.06)}
    .c1{grid-column:span 2;grid-row:span 2;background:#111;color:#fff;border-color:#111}
    .c2{grid-column:span 2}.c3{grid-row:span 2}.c6{grid-column:span 2}
    .n{position:absolute;top:.9rem;right:1rem;font-family:Syne,sans-serif;font-size:2rem;font-weight:800;opacity:.12;letter-spacing:-.06em;line-height:1}
    .c1 .n{opacity:.2;color:#fff}
    h3{margin:0;font-family:Syne,sans-serif;font-size:1rem;letter-spacing:-.02em}
    p{margin:.3rem 0 0;font-size:.78rem;opacity:.5;font-weight:300;line-height:1.4}
    .bar{height:3px;width:0;background:currentColor;margin-top:.7rem;transition:width .5s cubic-bezier(.22,1,.36,1);opacity:.35}
    .c:hover .bar{width:40%}
    @media(max-width:640px){.bento{grid-template-columns:1fr 1fr}.c1,.c2,.c6{grid-column:span 2}.c3{grid-row:span 1}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Light bento</h1>
    <div class="bento">
      <div class="c c1"><span class="n">01</span><h3>Lead block</h3><p>Owns the corner. Sets the tone.</p><div class="bar"></div></div>
      <div class="c c2"><span class="n">02</span><h3>Wide note</h3><p>Horizontal breath.</p><div class="bar"></div></div>
      <div class="c c3"><span class="n">03</span><h3>Tall</h3><p>Vertical accent.</p><div class="bar"></div></div>
      <div class="c"><span class="n">04</span><h3>Snap</h3><div class="bar"></div></div>
      <div class="c"><span class="n">05</span><h3>Cut</h3><div class="bar"></div></div>
      <div class="c c6"><span class="n">06</span><h3>Footer span</h3><p>Closes the composition.</p><div class="bar"></div></div>
    </div>
  </div>
</body>
</html>
