<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0624
    slug: folder-dropdown-accordion-folders-02
    title: Vault Accordion Folders
    category: folder-dropdown
    tags: folder-dropdown, accordion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0624 - Vault Accordion Folders</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #cbd5e1;
      padding: 1.5rem;
    }

    .panel {
      width: min(340px, 92vw);
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
    }

    .panel-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-head h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fbbf24;
    }

    .count {
      font-size: 0.75rem;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    .tree { padding: 0.5rem 0; }

    details {
      border-bottom: 1px solid #1e293b22;
    }

    details:last-child { border-bottom: 0; }

    summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    summary::-webkit-details-marker { display: none; }

    summary:hover { background: #1e293b44; }

    .chev {
      width: 16px;
      height: 16px;
      color: #64748b;
      transition: transform 0.3s, color 0.2s;
    }

    details[open] > summary .chev {
      transform: rotate(90deg);
      color: #fbbf24;
    }

    .folder-icon {
      width: 18px;
      height: 18px;
      color: #fbbf24;
      animation: folderPulse 3s ease-in-out infinite;
    }

    @keyframes folderPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    details[open] .folder-icon { animation: none; opacity: 1; }

    .folder-name {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .children {
      overflow: hidden;
      animation: expand 0.35s ease;
    }

    @keyframes expand {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 200px; }
    }

    .file {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.25rem 0.55rem 3rem;
      font-size: 0.85rem;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.2s, padding-left 0.2s;
    }

    .file:hover {
      color: #00d4aa;
      padding-left: 3.25rem;
    }

    .file::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #334155;
    }

    .file:hover::before { background: #00d4aa; }

    @media (prefers-reduced-motion: reduce) {
      .folder-icon { animation: none; }
      .children { animation: none; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-head">
      <h2>Project Vault</h2>
      <span class="count" id="count">3 folders</span>
    </div>
    <div class="tree">
      <details open>
        <summary>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span class="folder-name">Design System</span>
        </summary>
        <div class="children">
          <div class="file">tokens.json</div>
          <div class="file">components.fig</div>
        </div>
      </details>
      <details>
        <summary>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span class="folder-name">Marketing</span>
        </summary>
        <div class="children">
          <div class="file">campaign-q3.pdf</div>
          <div class="file">brand-assets.zip</div>
        </div>
      </details>
      <details>
        <summary>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span class="folder-name">Engineering</span>
        </summary>
        <div class="children">
          <div class="file">api-spec.yaml</div>
          <div class="file">deploy-notes.md</div>
        </div>
      </details>
    </div>
  </div>
  <script>
    document.querySelectorAll('.file').forEach((f) => {
      f.addEventListener('click', () => {
        document.querySelectorAll('.file').forEach((x) => x.style.color = '');
        f.style.color = '#00d4aa';
      });
    });
  </script>
</body>
</html>
