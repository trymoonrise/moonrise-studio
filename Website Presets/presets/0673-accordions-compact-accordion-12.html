  <style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;padding:2rem;font-family:Inter,sans-serif}.acc{width:min(460px,100%);border:1px solid #e8e5de;border-radius:18px;overflow:hidden}.item+.item{border-top:1px solid #ece9e2}.trigger{width:100%;padding:.85rem 1rem;border:0;background:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font:600 .86rem Inter,sans-serif;text-align:left;color:#111}.micro{font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:#949084}.panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.22,1,.36,1)}.panel>div{overflow:hidden}.panel p{margin:0;padding:0 1rem .9rem;color:#6a655a;font-size:.8rem;line-height:1.6}.item.open .panel{grid-template-rows:1fr}@media(prefers-reduced-motion:reduce){.panel{transition:none}}</style>
</head><body><div class="acc"><div class="item open"><button class="trigger"><span>Compact spacing</span><span class="micro">Open</span></button><div class="panel"><div><p>A compressed vertical rhythm makes this variant ideal for sidebars and smaller utility layouts.</p></div></div></div><div class="item"><button class="trigger"><span>Still fully readable</span><span class="micro">More</span></button><div class="panel"><div><p>Tighter padding does not mean cramped typography — the line height stays generous enough to breathe.</p></div></div></div><div class="item"><button class="trigger"><span>Useful for dense settings</span><span class="micro">More</span></button><div class="panel"><div><p>Try this style for filters, account settings, or compact support drawers.</p></div></div></div></div><script>document.querySelectorAll('.item .trigger').forEach((button)=>button.addEventListener('click',()=>button.parentElement.classList.toggle('open')));</script></body></html>
