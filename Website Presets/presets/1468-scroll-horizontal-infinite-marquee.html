<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1468
    slug: scroll-horizontal-infinite-marquee
    title: Infinite Marquee Scroll
    category: scroll-horizontal
    tags: horizontal, marquee, infinite
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1468 — Infinite Marquee Scroll</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050508;
      color: #fff;
      font-family: Syne, sans-serif;
      overflow-x: hidden;
    }

    .pin {
      height: 400vh;
      position: relative;
    }

    .stage {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      perspective: 1200px;
    }

    .hint {
      position: absolute;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      z-index: 5;
    }

    .progress {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(200px, 40vw);
      height: 2px;
      background: rgba(255, 255, 255, 0.12);
      z-index: 5;
    }

    .progress__fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff2d55, #5e5ce6, #30d158);
    }

    .rail {
      display: flex;
      gap: clamp(1.5rem, 4vw, 3rem);
      align-items: center;
      transform-style: preserve-3d;
      will-change: transform;
      padding: 0 10vw;
    }

    .card {
      flex: 0 0 clamp(220px, 32vw, 340px);
      height: clamp(280px, 50vh, 420px);
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      transform-style: preserve-3d;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .card__media {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.15);
      transition: transform 0.6s ease;
    }

    .card:nth-child(1) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(0deg); }
    .card:nth-child(2) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(40deg) saturate(1.3); }
    .card:nth-child(3) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(120deg) saturate(1.2); }
    .card:nth-child(4) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(200deg); }
    .card:nth-child(5) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(280deg) saturate(1.4); }
    .card:nth-child(6) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(320deg); }
    .card:nth-child(7) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(60deg) contrast(1.2); }
    .card:nth-child(8) .card__media { background-image: url('../stock/media/16-9 Aspect Ratio(image).png'); filter: hue-rotate(160deg); }

    .card__shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.85));
    }

    .card__label {
      position: absolute;
      left: 1.25rem;
      right: 1.25rem;
      bottom: 1.25rem;
      z-index: 2;
    }

    .card__num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 0.35rem;
    }

    .card__title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .card.is-hot {
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 45, 85, 0.3);
    }

    .card.is-hot .card__media {
      transform: scale(1.05);
    }

    .fx {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, transparent 40%, rgba(5, 5, 8, 0.7));
      z-index: 4;
    }

    @media (prefers-reduced-motion: reduce) {
      .pin { height: auto; }
      .stage { position: relative; height: auto; padding: 4rem 0; }
      .rail { flex-wrap: wrap; justify-content: center; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="pin" id="pin">
    <div class="stage">
      <p class="hint">Scroll to warp through</p>
      <div class="fx" aria-hidden="true"></div>
      <div class="rail" id="rail">
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">01 / AXIS</div><div class="card__title">Neon Drift</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">02 / AXIS</div><div class="card__title">Void Bloom</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">03 / AXIS</div><div class="card__title">Chrome Tide</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">04 / AXIS</div><div class="card__title">Glass Fire</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">05 / AXIS</div><div class="card__title">Plasma Arc</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">06 / AXIS</div><div class="card__title">Orbit Dust</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">07 / AXIS</div><div class="card__title">Signal Rush</div></div></article>
        <article class="card"><div class="card__media"></div><div class="card__shade"></div><div class="card__label"><div class="card__num">08 / AXIS</div><div class="card__title">Afterlight</div></div></article>
      </div>
      <div class="progress"><div class="progress__fill" id="fill"></div></div>
    </div>
  </div>

  <script>
    const pin = document.getElementById('pin');
    const rail = document.getElementById('rail');
    const fill = document.getElementById('fill');
    const cards = [...document.querySelectorAll('.card')];
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    function clamp(n, a, b) { return Math.min(Math.max(n, a), b); }

    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function update() {
      if (reduced) return;
      const r = pin.getBoundingClientRect();
      const max = pin.offsetHeight - innerHeight;
      const p = clamp(-r.top / max, 0, 1);
      const e = ease(p);

      const travel = rail.scrollWidth - innerWidth * 0.55;
      const x = -e * travel;
      const rotY = (e - 0.5) * 28;
      const rotX = Math.sin(e * Math.PI) * 8;
      const z = Math.sin(e * Math.PI) * 80;

      rail.style.transform =
        'translate3d(' + x + 'px,0,' + z + 'px) rotateY(' + rotY + 'deg) rotateX(' + rotX + 'deg)';

      fill.style.width = (e * 100) + '%';

      const mid = innerWidth * 0.5;
      cards.forEach((card) => {
        const cr = card.getBoundingClientRect();
        const dist = Math.abs((cr.left + cr.width / 2) - mid) / (innerWidth * 0.55);
        const w = clamp(1 - dist, 0, 1);
        const twist = (0.5 - dist) * 18;
        card.style.transform =
          'rotateY(' + (twist) + 'deg) translateZ(' + (w * 60) + 'px) scale(' + (0.85 + w * 0.2) + ')';
        card.style.opacity = String(0.35 + w * 0.65);
        card.classList.toggle('is-hot', w > 0.72);
      });
    }

    let ticking = false;
    addEventListener('scroll', () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => { ticking = false; update(); });
    }, { passive: true });
    addEventListener('resize', update, { passive: true });
    update();
  </script>
</body>
</html>
