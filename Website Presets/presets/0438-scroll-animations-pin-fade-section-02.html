<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0438
    slug: scroll-animations-pin-fade-section-02
    title: Pinned Ghost Layers
    category: scroll-animations
    tags: scroll-animations, pin
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0438 - Pinned Ghost Layers</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#0a0a0e;color:#ececf0;font-family:Outfit,sans-serif}
    .spacer{height:40vh;display:grid;place-items:center;color:rgba(255,255,255,.25);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase}
    .track{height:250vh;position:relative}
    .pin{position:sticky;top:0;height:100vh;display:grid;place-items:center}
    .stack{position:relative;width:min(480px,88vw);aspect-ratio:3/4}
    .layer{position:absolute;inset:0;border-radius:2px;border:1px solid rgba(255,255,255,.1);background:#12121a;display:grid;place-items:center;padding:32px;transition:opacity .05s linear,transform .05s linear}
    .layer:nth-child(1){transform:translate(-18px,-18px) rotate(-3deg);z-index:1}
    .layer:nth-child(2){transform:translate(0,0);z-index:2}
    .layer:nth-child(3){transform:translate(18px,18px) rotate(3deg);z-index:3}
    .layer h2{font-family:Syne,sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-.03em;margin:0 0 8px}
    .layer p{margin:0;font-size:.9rem;color:rgba(236,236,240,.5);line-height:1.5}
    .layer .idx{font:500 .6rem Outfit,sans-serif;letter-spacing:.25em;color:#ff4d6a;margin-bottom:12px}
    @media(prefers-reduced-motion:reduce){.layer{transform:none!important;opacity:1!important}}
  </style>
</head>
<body>
<div class="spacer">Scroll down</div>
<div class="track" id="track">
  <div class="pin">
    <div class="stack" id="stack">
      <div class="layer" data-i="0"><span class="idx">01 - Archive</span><h2>Static record</h2><p>Baseline layer pinned while siblings dissolve.</p></div>
      <div class="layer" data-i="1"><span class="idx">02 - Process</span><h2>Active state</h2><p>Mid-scroll focus with ghost fade.</p></div>
      <div class="layer" data-i="2"><span class="idx">03 - Output</span><h2>Final frame</h2><p>Last layer holds as others vanish.</p></div>
    </div>
  </div>
</div>
<div class="spacer">End</div>
<script>
const track=document.getElementById('track'),layers=[...document.querySelectorAll('.layer')];
function update(){const rect=track.getBoundingClientRect();const p=Math.min(1,Math.max(0,-rect.top/(rect.height-window.innerHeight)));layers.forEach((el,i)=>{const t=(p*2)-i*.45;el.style.opacity=Math.min(1,Math.max(0,1-Math.abs(t)*1.2));el.style.transform=`translate(${(i-1)*18*(1-p)}px,${(i-1)*18*(1-p)}px) rotate(${(i-1)*3*(1-p)}deg)`;});}
window.addEventListener('scroll',update,{passive:true});update();
</script>
</body>
</html>
