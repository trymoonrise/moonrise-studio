<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0093
    slug: image-scroll-fade-sequence
    title: Fade Image Sequence
    category: image-scroll
    tags: image-scroll, fade
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0093 — Fade Image Sequence</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a0c;
      color: #fff;
    }

    .pin { height: 360vh; }

    .stage {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }

    .viewer {
      width: min(92vw, 640px);
    }

    .frame {
      position: relative;
      aspect-ratio: 16 / 10;
      border-radius: 18px;
      overflow: hidden;
      background: #141418;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06) inset,
        0 32px 80px rgba(0, 0, 0, 0.55);
    }

    .slide {
      position: absolute;
      inset: 0;
      margin: 0;
      opacity: 0;
      will-change: opacity, transform;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(var(--scale, 1.06));
      transform-origin: center;
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--tint, transparent);
      pointer-events: none;
    }

    .slide--1 img { object-position: 48% 28%; }
    .slide--2 img { object-position: 72% 52%; }
    .slide--3 img { object-position: 28% 58%; }
    .slide--4 img { object-position: 50% 78%; }

    .slide--1 { --tint: linear-gradient(180deg, transparent 55%, rgba(0, 0, 0, 0.35)); }
    .slide--2 { --tint: linear-gradient(135deg, rgba(108, 140, 255, 0.18), transparent 55%); }
    .slide--3 { --tint: linear-gradient(225deg, rgba(255, 108, 176, 0.14), transparent 50%); }
    .slide--4 { --tint: radial-gradient(ellipse at 50% 100%, rgba(0, 0, 0, 0.45), transparent 65%); }

    .chrome {
      margin-top: 1.35rem;
      display: grid;
      gap: 0.85rem;
    }

    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .counter {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      font-variant-numeric: tabular-nums;
    }

    .counter strong {
      color: #fff;
      font-weight: 600;
    }

    .caption {
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.88);
      transition: opacity 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .progress {
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c8cff, #ff6cb0);
      border-radius: inherit;
      transform-origin: left;
    }

    .hint {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
    }

    @media (prefers-reduced-motion: reduce) {
      .pin { height: 100vh; }
      .slide { opacity: 0; }
      .slide--1 { opacity: 1; }
      .slide img { transform: none; }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="pin" id="pin">
    <div class="stage">
      <div class="viewer">
        <div class="frame" id="frame">
          <figure class="slide slide--1"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure>
          <figure class="slide slide--2"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure>
          <figure class="slide slide--3"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure>
          <figure class="slide slide--4"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></figure>
        </div>
        <div class="chrome">
          <div class="meta">
            <p class="caption" id="caption">Establish the scene</p>
            <p class="counter"><strong id="cur">01</strong> / 04</p>
          </div>
          <div class="progress" aria-hidden="true"><div class="progress-fill" id="fill"></div></div>
        </div>
        <p class="hint">Scroll to crossfade</p>
      </div>
    </div>
  </div>

  <script>
    const pin = document.getElementById('pin');
    const slides = [...document.querySelectorAll('.slide')];
    const caption = document.getElementById('caption');
    const cur = document.getElementById('cur');
    const fill = document.getElementById('fill');
    const captions = [
      'Establish the scene',
      'Guide the eye inward',
      'Layer depth and texture',
      'Land the final frame',
    ];

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function update() {
      const r = pin.getBoundingClientRect();
      const raw = Math.min(1, Math.max(0, -r.top / (r.height - innerHeight)));
      const p = easeInOutQuad(raw);
      const pos = p * (slides.length - 1);
      const active = Math.round(pos);

      slides.forEach((slide, i) => {
        const weight = Math.max(0, 1 - Math.abs(pos - i));
        const scale = 1.04 + (1 - weight) * 0.05;
        slide.style.opacity = weight;
        slide.style.setProperty('--scale', scale);
      });

      caption.textContent = captions[active];
      caption.style.opacity = 0.72 + Math.max(0, 1 - Math.abs(pos - active)) * 0.28;
      cur.textContent = String(active + 1).padStart(2, '0');
      fill.style.width = (p * 100) + '%';
    }

    let ticking = false;
    addEventListener('scroll', () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        ticking = false;
        update();
      });
    }, { passive: true });

    update();
  </script>
</body>
</html>
