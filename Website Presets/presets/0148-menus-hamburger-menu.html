<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0148
    slug: menus-hamburger-menu
    title: Hamburger Menu
    category: menus
    tags: menus, mobile
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0148 — Hamburger Menu</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#0d0d0f}.burger{width:32px;height:24px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;position:fixed;top:1.5rem;right:1.5rem;z-index:20}.burger span{height:3px;background:#fff;border-radius:2px;transition:all .3s}.burger.open span:nth-child(1){transform:rotate(45deg) translate(8px,8px)}.burger.open span:nth-child(2){opacity:0}.burger.open span:nth-child(3){transform:rotate(-45deg) translate(8px,-8px)}.panel{position:fixed;inset:0;background:#111;display:grid;place-items:center;transform:translateX(100%);transition:transform .3s}.panel.open{transform:none}.panel a{color:#fff;font-size:1.5rem;text-decoration:none;margin:1rem}
  </style>
</head>
<body>
<div class="burger" id="b"><span></span><span></span><span></span></div><nav class="panel" id="p"><div><a href="#">Home</a><br><a href="#">About</a></div></nav>
<script>const b=document.getElementById('b'),p=document.getElementById('p');b.onclick=()=>{b.classList.toggle('open');p.classList.toggle('open');};</script>
</body>
</html>
