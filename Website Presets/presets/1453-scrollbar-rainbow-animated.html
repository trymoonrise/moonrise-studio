<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1453
    slug: scrollbar-rainbow-animated
    title: Rainbow Animated Scrollbar
    category: scrollbar
    tags: scrollbar, rainbow, animated
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1453 - Rainbow Animated Scrollbar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0d0d0f;color:#fff}.panel{margin:2rem auto;width:min(420px,90vw);max-height:70vh;overflow-y:auto;padding:1rem;scrollbar-width:thin;scrollbar-color:#6c8cff #1a1a22}.panel::-webkit-scrollbar{width:12px}.panel::-webkit-scrollbar-track{background:#1a1a22;border-radius:99px}.panel::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ff6cb0,#6c8cff,#6cffb8,#ff6cb0);background-size:100% 200%;border-radius:99px;animation:rainbow 3s linear infinite}@keyframes rainbow{to{background-position:0 200%}}.cell{height:80px;margin-bottom:8px;border-radius:10px;background:#1a1a2e;display:grid;place-items:center}
  </style>
</head>
<body>
<div class="panel"><div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div><div class="cell">5</div><div class="cell">6</div><div class="cell">7</div><div class="cell">8</div><div class="cell">9</div><div class="cell">10</div><div class="cell">11</div><div class="cell">12</div><div class="cell">13</div><div class="cell">14</div><div class="cell">15</div><div class="cell">16</div></div>

</body>
</html>
