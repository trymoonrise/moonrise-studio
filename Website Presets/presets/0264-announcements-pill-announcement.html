<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0264
    slug: announcements-pill-announcement
    title: Pill Announcement
    category: announcements
    tags: announcements, pill
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0264 - Pill Announcement</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c12;font-family:Manrope,sans-serif;perspective:900px}
    .pill{
      position:relative;display:inline-flex;align-items:center;gap:.85rem;padding:.7rem .7rem .7rem 1.1rem;
      border-radius:999px;color:#fff;
      background:linear-gradient(90deg,#121826,#1c2740);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 20px 50px rgba(0,0,0,.4),0 8px 0 #070a12;
      transform:rotateX(6deg) translateY(8px);
      animation:enter .9s cubic-bezier(.16,1,.3,1) forwards;
      will-change:transform;
    }
    .pill::before{
      content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.14),transparent 45%);
      pointer-events:none;
    }
    .pulse{width:8px;height:8px;border-radius:50%;background:#3dff9a;flex-shrink:0}
    .text{font-size:.88rem;font-weight:600;letter-spacing:.01em}
    .go{appearance:none;border:0;border-radius:999px;padding:.55rem .95rem;background:#fff;color:#101522;font:700 .75rem Manrope,sans-serif;cursor:pointer}
    @keyframes enter{to{transform:rotateX(4deg) translateY(0)}}
    @media (prefers-reduced-motion:reduce){.pill{animation:none;transform:none}}
  </style>
</head>
<body>
  <div class="pill" role="status">
    <span class="pulse" aria-hidden="true"></span>
    <span class="text">Beta seats opening this week</span>
    <button class="go" type="button">Join waitlist</button>
  </div>
</body>
</html>
