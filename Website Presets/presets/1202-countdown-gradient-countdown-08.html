<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1202
    slug: countdown-gradient-countdown-08
    title: Gradient Countdown 08
    category: countdown
    tags: countdown, gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1202 - Gradient Countdown 08</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0c0c;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif;padding:2rem;overflow:hidden;position:relative}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.marq-track{animation:none!important}}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:drift 16s ease-in-out infinite}
    .orb--1{width:50vmax;height:50vmax;background:#3a3a3a;top:-20%;left:-10%}
    .orb--2{width:40vmax;height:40vmax;background:#1a1a1a;bottom:-25%;right:-10%;animation-direction:reverse}
    @keyframes drift{50%{transform:translate(6%,-4%)}}
    .stage{position:relative;z-index:1;text-align:center}
    .stage h2{margin:0 0 1.25rem;font-family:"Syne",system-ui,sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:-.03em;opacity:.6}
    .nums{display:flex;gap:1rem;justify-content:center}
    .n{min-width:70px}
    .n .v{display:block;font-family:"Syne",system-ui,sans-serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:800;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
    .n .l{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:#666}
  </style>
</head>
<body>
<div class="orb orb--1" aria-hidden="true"></div><div class="orb orb--2" aria-hidden="true"></div>
    <div class="stage"><h2>Gradient field</h2><div class="nums">
      <div class="n"><span class="v" id="d">03</span><span class="l">Days</span></div>
      <div class="n"><span class="v" id="h">14</span><span class="l">Hrs</span></div>
      <div class="n"><span class="v" id="m">22</span><span class="l">Min</span></div>
      <div class="n"><span class="v" id="s">08</span><span class="l">Sec</span></div>
    </div></div>
<script>const end=Date.now()+3*864e5+12*36e5+34*6e4+56e3;const $=id=>document.getElementById(id);function tick(){let t=Math.max(0,end-Date.now());const D=String(Math.floor(t/864e5)).padStart(2,'0'),H=String(Math.floor(t/36e5%24)).padStart(2,'0'),M=String(Math.floor(t/6e4%60)).padStart(2,'0'),S=String(Math.floor(t/1e3%60)).padStart(2,'0');$('d')&&($('d').textContent=D);$('h')&&($('h').textContent=H);$('m')&&($('m').textContent=M);$('s')&&($('s').textContent=S);}tick();setInterval(tick,1000);</script>
</body>
</html>
