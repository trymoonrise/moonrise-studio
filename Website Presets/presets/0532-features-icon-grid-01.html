<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0532
    slug: features-icon-grid-01
    title: Pulse Feature Matrix
    category: features
    tags: features, icon, grid
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0532 - Pulse Feature Matrix</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#09090d;color:#ececf2;font-family:Outfit,sans-serif;padding:32px 20px}
    .wrap{width:min(680px,96vw)}
    .head{margin-bottom:28px}
    .head h2{font-family:Syne,sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-.03em;margin:0 0 6px}
    .head p{margin:0;font-size:.9rem;color:rgba(236,236,242,.45)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
    .feat{border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:22px 18px;background:#111116;position:relative;overflow:hidden;cursor:default;transition:border-color .3s,transform .3s}
    .feat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent,#00d4aa);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .feat:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.18)}.feat:hover::after{transform:scaleX(1)}
    .icon{width:36px;height:36px;border:1px solid rgba(255,255,255,.15);border-radius:4px;display:grid;place-items:center;font-family:Syne,sans-serif;font-size:.75rem;margin-bottom:14px;animation:iconPulse 3s ease-in-out infinite}
    .feat:nth-child(2){--accent:#64b5ff}.feat:nth-child(2) .icon{animation-delay:-1s}
    .feat:nth-child(3){--accent:#ff6b8a}.feat:nth-child(3) .icon{animation-delay:-2s}
    .feat:nth-child(4){--accent:#c4f042}.feat:nth-child(4) .icon{animation-delay:-.5s}
    .feat b{display:block;font-family:Syne,sans-serif;font-size:1rem;margin-bottom:6px;letter-spacing:-.01em}
    .feat span{font-size:.78rem;color:rgba(236,236,242,.45);line-height:1.45}
    @keyframes iconPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0)}50%{box-shadow:0 0 0 6px rgba(0,212,170,.08)}}
    @media(prefers-reduced-motion:reduce){.icon{animation:none}.feat{transition:none}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="head"><h2>Core capabilities</h2><p>Hover each module to activate its signal trace.</p></header>
  <div class="grid">
    <article class="feat"><div class="icon">01</div><b>Telemetry</b><span>Real-time metrics with sub-second latency.</span></article>
    <article class="feat"><div class="icon">02</div><b>Pipeline</b><span>Automated deploy with rollback safety.</span></article>
    <article class="feat"><div class="icon">03</div><b>Security</b><span>Zero-trust access at every layer.</span></article>
    <article class="feat"><div class="icon">04</div><b>Scale</b><span>Elastic compute across regions.</span></article>
  </div>
</div>
</body>
</html>
