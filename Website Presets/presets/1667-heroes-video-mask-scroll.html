<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1667
    slug: heroes-video-mask-scroll
    title: Video Mask Scroll Hero
    category: heroes
    tags: heroes, landing, video, experimental, scroll
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1667 — Video Mask Scroll Hero</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;min-height:260vh;background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    .stage{position:sticky;top:0;height:100vh;display:grid;place-content:center;gap:.12em;text-align:center;overflow:hidden}
    video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.22;transform:scale(var(--bg-scale,1.08))}
    .line{margin:0;padding:0 1rem;font-size:clamp(3rem,11vw,8rem);font-weight:900;text-transform:uppercase;line-height:.9;position:relative;z-index:1}
    .line--fill{background-image:linear-gradient(rgba(255,255,255,.15),rgba(255,255,255,.15));-webkit-background-clip:text;background-clip:text;color:transparent;transform:scale(var(--one-scale,.94));opacity:var(--one-opacity,.85)}
    .line--mask{background-image:url('../stock/media/heroes/city-16x9.mp4');background-size:cover;background-position:var(--mask-x,50%) var(--mask-y,50%);-webkit-background-clip:text;background-clip:text;color:transparent;clip-path:inset(var(--clip-top,100%) 0 0 0);transform:translateY(var(--two-y,16px))}
    .hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);opacity:var(--hint-opacity,0)}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}video{animation:none!important}}
  </style>
</head>
<body>
<div class="stage" id="stage"><video class="bg" src="../stock/media/heroes/city-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video><h1 class="line line--fill">Move</h1><h1 class="line line--mask">Forward</h1><p class="hint">Scroll to reveal</p></div>
<script>const stage=document.getElementById('stage'),reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function lerp(a,b,t){return a+(b-a)*t}function update(){if(reduced){stage.style.setProperty('--clip-top','0%');stage.style.setProperty('--hint-opacity','.7');return}const max=document.documentElement.scrollHeight-innerHeight,p=max>0?ease(Math.min(1,scrollY/max)):0,reveal=Math.min(1,Math.max(0,(p-.12)/.68));stage.style.setProperty('--one-scale',lerp(.94,1,p).toFixed(3));stage.style.setProperty('--one-opacity',lerp(.85,1,p).toFixed(3));stage.style.setProperty('--clip-top',lerp(100,0,reveal).toFixed(1)+'%');stage.style.setProperty('--two-y',lerp(16,0,reveal).toFixed(1)+'px');stage.style.setProperty('--mask-x',lerp(40,60,p).toFixed(1)+'%');stage.style.setProperty('--mask-y',lerp(35,65,p).toFixed(1)+'%');stage.style.setProperty('--bg-scale',lerp(1.08,1,p).toFixed(3));stage.style.setProperty('--hint-opacity',Math.max(0,(p-.45)/.55).toFixed(3))}let ticking=false;addEventListener('scroll',()=>{if(ticking)return;ticking=true;requestAnimationFrame(()=>{ticking=false;update()})},{passive:true});addEventListener('resize',update,{passive:true});update();</script>
</body>
</html>
