<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1676
    slug: scroll-video-blur-focus
    title: Video Blur To Focus
    category: scroll-animations
    tags: scroll, video, blur, focus
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1676 - Video Blur To Focus</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;min-height:220vh;background:#0a0a0c;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    .stage{position:sticky;top:0;height:100vh;overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(var(--blur,18px)) brightness(var(--bright,.55));transform:scale(1.08)}
    .shade{position:absolute;inset:0;background:rgba(0,0,0,var(--shade,.45))}
    .copy{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(2rem,5vw,4rem);opacity:var(--copy-o,0);transform:translateY(var(--copy-y,28px))}
    h1{font-size:clamp(2.2rem,6vw,3.8rem);font-weight:900;letter-spacing:-.04em;max-width:12ch}
    p{margin-top:.75rem;color:rgba(255,255,255,.72);max-width:36ch;line-height:1.55}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="stage"><video src="../stock/media/heroes/sintel-clip-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video><div class="shade" aria-hidden="true"></div><div class="copy"><h1>Pull into focus</h1><p>Scroll sharpens the frame as the story comes into view.</p></div></div>
<script>function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function lerp(a,b,t){return a+(b-a)*t}function prog(track){const r=track.getBoundingClientRect();const h=r.height-innerHeight;return h>0?ease(Math.min(1,Math.max(0,-r.top/h))):0}function pageProg(){const max=document.documentElement.scrollHeight-innerHeight;return max>0?ease(Math.min(1,scrollY/max)):0};const stage=document.getElementById('stage'),reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function tick(){const p=pageProg();if(reduced){stage.style.setProperty('--blur','0px');stage.style.setProperty('--copy-o','1');return}stage.style.setProperty('--blur',lerp(18,0,p).toFixed(1)+'px');stage.style.setProperty('--bright',lerp(.55,.92,p).toFixed(3));stage.style.setProperty('--shade',lerp(.45,.15,p).toFixed(3));stage.style.setProperty('--copy-o',Math.max(0,(p-.25)/.75).toFixed(3));stage.style.setProperty('--copy-y',lerp(28,0,p).toFixed(1)+'px')}let raf=false;addEventListener('scroll',()=>{if(raf)return;raf=true;requestAnimationFrame(()=>{raf=false;tick()})},{passive:true});addEventListener('resize',tick,{passive:true});tick();</script>
</body>
</html>
