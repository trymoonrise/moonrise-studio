<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0369
    slug: heroes-clean-left
    title: Clean Left Hero
    category: heroes
    tags: heroes, landing, simple, light
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0369 - Clean Left Hero</title>
  <style>
    @import url('../shared/preset-reset.css');

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      align-items: center;
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.5rem, 6vw, 4rem);
      background:
        radial-gradient(circle at 0% 0%, rgba(17, 24, 39, 0.04), transparent 45%),
        #fafafa;
      color: #111827;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .hero {
      width: min(640px, 100%);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1.25rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
    }

    h1 {
      font-size: clamp(2.5rem, 5.5vw, 4rem);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.04em;
      max-width: 11ch;
      margin-bottom: 1.1rem;
    }

    p {
      font-size: 1.08rem;
      line-height: 1.65;
      color: #6b7280;
      max-width: 40ch;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.35rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 1.4rem;
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.14);
      transition: transform 0.2s cubic-bezier(.22, .61, .36, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .link {
      color: #374151;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
    }

    .link:hover {
      color: #111827;
    }
  </style>
</head>
<body>
  <section class="hero">
    <span class="eyebrow">Landing kits</span>
    <h1>Build better landing pages</h1>
    <p>Start with polished hero sections. Customize copy, swap media, and ship in minutes.</p>
    <div class="actions">
      <button class="btn" type="button">Get started</button>
      <a class="link" href="#">See examples →</a>
    </div>
  </section>
</body>
</html>
