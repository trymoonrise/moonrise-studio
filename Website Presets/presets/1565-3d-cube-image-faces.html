<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1565
    slug: 3d-cube-image-faces
    title: Image Face 3D Cube
    category: 3d-effects
    tags: 3d, cube, image
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1565 - Image Face 3D Cube</title>
  <style>
    @import url('../shared/preset-reset.css');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0b10;perspective:1100px;overflow:hidden}
    .scene{width:220px;height:220px;transform-style:preserve-3d;animation:spin 18s linear infinite}
    .cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:rotateX(-18deg)}
    .face{position:absolute;inset:0;overflow:hidden;border:1px solid rgba(255,255,255,.2);box-shadow:inset 0 0 40px rgba(0,0,0,.35)}
    .face i{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.08);animation: ken 10s ease-in-out infinite alternate}
    .f0{transform:translateZ(110px)}.f0 i{background-image:linear-gradient(135deg,#6c8cff,#1a2a6c)}
    .f1{transform:rotateY(90deg) translateZ(110px)}.f1 i{background-image:linear-gradient(135deg,#ff6bcb,#5a1038);animation-delay:-2s}
    .f2{transform:rotateY(180deg) translateZ(110px)}.f2 i{background-image:linear-gradient(135deg,#7ee0c3,#0e4a3a);animation-delay:-4s}
    .f3{transform:rotateY(-90deg) translateZ(110px)}.f3 i{background-image:linear-gradient(135deg,#ffd16c,#7a4a08);animation-delay:-6s}
    .f4{transform:rotateX(90deg) translateZ(110px)}.f4 i{background-image:linear-gradient(135deg,#b06cff,#2a1060)}
    .f5{transform:rotateX(-90deg) translateZ(110px)}.f5 i{background-image:linear-gradient(135deg,#333,#111)}
    .label{position:absolute;inset:0;display:grid;place-items:end start;padding:1rem;color:#fff;font:800 1.1rem Syne,system-ui,sans-serif;text-shadow:0 2px 12px rgba(0,0,0,.5);pointer-events:none}
    .glow{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(108,140,255,.35),transparent 70%);filter:blur(30px);pointer-events:none;animation:pulse 4s ease-in-out infinite}
    @keyframes spin{to{transform:rotateY(360deg)}}
    @keyframes ken{to{transform:scale(1.2) translate(4%,-3%)}}
    @keyframes pulse{50%{transform:scale(1.15);opacity:.7}}
    @media(prefers-reduced-motion:reduce){.scene,.face i,.glow{animation:none}.scene{transform:rotateY(-30deg)}}
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="scene">
    <div class="cube">
      <div class="face f0"><i></i><span class="label">NORD</span></div>
      <div class="face f1"><i></i><span class="label">ROSE</span></div>
      <div class="face f2"><i></i><span class="label">MINT</span></div>
      <div class="face f3"><i></i><span class="label">GOLD</span></div>
      <div class="face f4"><i></i><span class="label">VIOLET</span></div>
      <div class="face f5"><i></i><span class="label">VOID</span></div>
    </div>
  </div>
</body>
</html>
