<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0782
    slug: forms-fieldset-form-04
    title: Sectioned Fieldset Form
    category: forms
    tags: forms, fieldset
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0782 — Sectioned Fieldset Form</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Syne:wght@600;700;800&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0a0c10;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      padding: 1.5rem;
    }

    form {
      width: min(440px, 94vw);
    }

    fieldset {
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      background: #111827;
      transition: border-color 0.3s;
      animation: fieldsetIn 0.5s ease backwards;
    }

    fieldset:nth-child(1) { animation-delay: 0.05s; }
    fieldset:nth-child(2) { animation-delay: 0.15s; }

    @keyframes fieldsetIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    fieldset:focus-within { border-color: #38bdf8; }

    legend {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #38bdf8;
      padding: 0 0.5rem;
    }

    .row { margin-bottom: 0.85rem; }
    .row:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: #0f1419;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
    }

    input:focus, select:focus { border-color: #38bdf8; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .submit {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #080a0e;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      transition: transform 0.2s;
      animation: fieldsetIn 0.5s ease 0.25s backwards;
    }

    .submit:hover { transform: translateY(-2px); }

    @media (prefers-reduced-motion: reduce) {
      fieldset, .submit { animation: none; }
    }
  </style>
</head>
<body>
  <form id="form">
    <fieldset>
      <legend>Personal</legend>
      <div class="grid-2">
        <div class="row">
          <label for="fn">First name</label>
          <input type="text" id="fn" value="Alex">
        </div>
        <div class="row">
          <label for="ln">Last name</label>
          <input type="text" id="ln" value="Chen">
        </div>
      </div>
      <div class="row">
        <label for="email">Email</label>
        <input type="email" id="email" value="alex@studio.io">
      </div>
    </fieldset>
    <fieldset>
      <legend>Preferences</legend>
      <div class="row">
        <label for="tz">Timezone</label>
        <select id="tz">
          <option>UTC−8 (Pacific)</option>
          <option>UTC−5 (Eastern)</option>
          <option>UTC+0 (London)</option>
        </select>
      </div>
      <div class="row">
        <label for="lang">Language</label>
        <select id="lang">
          <option>English</option>
          <option>Spanish</option>
          <option>Japanese</option>
        </select>
      </div>
    </fieldset>
    <button type="submit" class="submit">Save profile</button>
  </form>

  <script>
    document.getElementById('form').addEventListener('submit', (e) => e.preventDefault());
  </script>
</body>
</html>
