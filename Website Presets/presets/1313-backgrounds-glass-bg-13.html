<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1313
    slug: backgrounds-glass-bg-13
    title: Glass Bg 13
    category: backgrounds
    tags: backgrounds, glass
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1313 - Glass Bg 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#121212;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .blob{position:absolute;width:40vmax;height:40vmax;border-radius:50%;filter:blur(60px);animation:move 15s ease-in-out infinite}
    .blob--a{background:#444;top:-10%;left:-5%}.blob--b{background:#222;bottom:-15%;right:-8%;animation-duration:18s;animation-direction:reverse}
    @keyframes move{0%,100%{transform:translate(0,0)}50%{transform:translate(12%,8%)}}
    .glass{position:relative;z-index:2;padding:2.5rem 3rem;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .glass .kicker{opacity:.5}.glass .sub{opacity:.55}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="blob blob--a" aria-hidden="true"></div><div class="blob blob--b" aria-hidden="true"></div><div class="glass"><div class="label"><p class="kicker">Background</p><h1>Glass</h1><p class="sub">Frost over soft motion.</p></div></div>

</body>
</html>
