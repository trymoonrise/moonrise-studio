<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1648
    slug: ease-in-sidebar-panel
    title: Sidebar Panel Ease
    category: ease-in
    tags: ease-in, sidebar, panel, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1648 - Sidebar Panel Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#e8ecf4;font-family:system-ui,sans-serif}.panel{position:fixed;top:0;left:0;bottom:0;width:min(280px,80vw);background:#fff;border-right:1px solid #e2e8f0;padding:2rem 1.5rem;box-shadow:4px 0 24px rgba(15,23,42,.06);transform:translateX(-100%);animation:slide .8s cubic-bezier(.22,.61,.36,1) forwards}h3{font-size:1rem;font-weight:700;color:#111;margin-bottom:1.5rem}.item{padding:10px 12px;border-radius:8px;color:#64748b;font-size:.9rem;margin-bottom:4px;opacity:0;transform:translateX(-12px);animation:item .5s cubic-bezier(.22,.61,.36,1) forwards}.item:nth-child(2){animation-delay:.2s}.item:nth-child(3){animation-delay:.3s}.item:nth-child(4){animation-delay:.4s}.item:nth-child(5){animation-delay:.5s}@keyframes slide{to{transform:none}}@keyframes item{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<aside class="panel"><h3>Dashboard</h3><div class="item">Overview</div><div class="item">Analytics</div><div class="item">Projects</div><div class="item">Settings</div></aside>

</body>
</html>
