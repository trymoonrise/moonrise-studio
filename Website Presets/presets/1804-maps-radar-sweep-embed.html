<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1804
    slug: maps-radar-sweep-embed
    title: Radar Sweep Embed
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1804 - Radar Sweep Embed</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#05080c;color:#d7ffe8;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{width:min(560px,94vw)}.stage{position:relative;aspect-ratio:1;border-radius:50%;overflow:hidden;border:1px solid rgba(110,255,170,.25);box-shadow:0 0 0 12px rgba(110,255,170,.04),0 30px 80px rgba(0,0,0,.5)}
.stage iframe{position:absolute;inset:-8%;width:116%;height:116%;filter:grayscale(1) contrast(1.15) brightness(.75) sepia(.4) hue-rotate(90deg)}
.radar{position:absolute;inset:0;pointer-events:none;background:conic-gradient(from 0deg,transparent 0 70%,rgba(110,255,170,.35) 85%,transparent 100%);animation:spin 3.5s linear infinite;mix-blend-mode:screen}
.ring{position:absolute;inset:12%;border:1px dashed rgba(110,255,170,.3);border-radius:50%;pointer-events:none}
.ring2{inset:28%}
.hud{display:flex;justify-content:space-between;margin-top:1rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:#6effaa}
.blip{position:absolute;width:10px;height:10px;border-radius:50%;background:#6effaa;box-shadow:0 0 16px #6effaa;top:38%;left:62%;animation:blink 1.6s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes blink{50%{opacity:.3;transform:scale(.7)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="stage"><iframe src="https://www.google.com/maps?q=Tokyo%2C%20Japan&hl=en&z=11&output=embed" title="Radar map" loading="lazy"></iframe><div class="radar"></div><div class="ring"></div><div class="ring ring2"></div><span class="blip"></span></div><div class="hud"><span>Radar lock</span><span id="t">SCAN</span></div></div>
<script>const t=document.getElementById('t');setInterval(()=>{t.textContent=new Date().toLocaleTimeString()},1000);</script>
</body>
</html>
