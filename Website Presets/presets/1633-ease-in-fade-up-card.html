<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1633

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1633 - Fade Up Card Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#f4f6fb;padding:2rem;font-family:system-ui,sans-serif}.card{max-width:400px;padding:2rem 2.25rem;background:#fff;border-radius:16px;border:1px solid #e8ecf4;box-shadow:0 4px 24px rgba(15,23,42,.06);opacity:0;transform:translateY(32px);animation:up .85s cubic-bezier(.22,.61,.36,1) forwards}.label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#6c8cff;margin-bottom:.75rem}h3{font-size:1.35rem;font-weight:700;color:#0f172a;margin-bottom:.5rem}p{color:#64748b;font-size:.95rem;line-height:1.65}@keyframes up{to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="card"><div class="label">Feature</div><h3>Seamless onboarding</h3><p>Guide users from signup to first value with calm, confident motion.</p></div>

</body>
