<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1678
    slug: scroll-video-mask-type
    title: Video Mask Typography
    category: scroll-animations
    tags: scroll, video, mask, typography
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1678 — Video Mask Typography</title>
  <style>
    @import url('../shared/preset-reset.css');
    
    body{margin:0;min-height:260vh;background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    .stage{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}
    video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.25;transform:scale(var(--bg-s,1.12))}
    h1{margin:0;font-size:clamp(3.5rem,14vw,10rem);font-weight:900;text-transform:uppercase;line-height:.88;text-align:center;background-image:url('../stock/media/heroes/city-16x9.mp4');background-size:cover;background-position:var(--pos,50% 50%);-webkit-background-clip:text;background-clip:text;color:transparent;transform:scale(var(--t-s,.9));letter-spacing:var(--track,.06em)}
    .hint{position:absolute;bottom:2.5rem;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);opacity:var(--hint-o,1)}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="stage"><video class="bg" src="../stock/media/heroes/city-16x9.mp4" autoplay muted loop playsinline aria-hidden="true"></video><h1>Motion</h1><span class="hint">Scroll</span></div>
<script>function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}function lerp(a,b,t){return a+(b-a)*t}function prog(track){const r=track.getBoundingClientRect();const h=r.height-innerHeight;return h>0?ease(Math.min(1,Math.max(0,-r.top/h))):0}function pageProg(){const max=document.documentElement.scrollHeight-innerHeight;return max>0?ease(Math.min(1,scrollY/max)):0};const stage=document.getElementById('stage'),reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;function tick(){const p=pageProg();if(reduced)return;stage.style.setProperty('--t-s',lerp(.9,1,p).toFixed(3));stage.style.setProperty('--bg-s',lerp(1.12,1,p).toFixed(3));stage.style.setProperty('--pos',lerp(40,60,p).toFixed(1)+'% '+lerp(35,65,p).toFixed(1)+'%');stage.style.setProperty('--track',lerp(.06,-.01,p).toFixed(3)+'em');stage.style.setProperty('--hint-o',lerp(1,0,p).toFixed(3))}let raf=false;addEventListener('scroll',()=>{if(raf)return;raf=true;requestAnimationFrame(()=>{raf=false;tick()})},{passive:true});addEventListener('resize',tick,{passive:true});tick();</script>
</body>
</html>
