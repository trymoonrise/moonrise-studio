<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0603
    slug: docks-labeled-dock-07
    title: Labeled Dock 07
    category: docks
    tags: docks, labeled
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0603 - Labeled Dock 07</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:end center;background:#111;padding-bottom:2.5rem;font-family:Outfit,sans-serif}
    .dock{display:flex;gap:4px;padding:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;animation:up .65s cubic-bezier(.22,1,.36,1) both}
    .item{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.55rem .85rem;border-radius:14px;border:none;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;font:inherit;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;transition:background .3s,color .3s,transform .35s cubic-bezier(.22,1,.36,1)}
    .item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform .35s cubic-bezier(.22,1,.36,1)}
    .item:hover{color:#fff;transform:translateY(-3px)}
    .item.active{background:#fff;color:#111}
    .item.active svg{transform:scale(1.08)}
    @keyframes up{from{opacity:0;translate:0 16px}to{opacity:1;translate:0 0}}
  </style>
</head>
<body>
  <nav class="dock" aria-label="Labeled dock">
    <button class="item active"><svg viewBox="0 0 24 24"><path d="M4 10.5L12 4l8 6.5V20h-5v-5H9v5H4z"/></svg>Home</button>
    <button class="item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>Search</button>
    <button class="item"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New</button>
    <button class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>You</button>
  </nav>
  <script>
    const items=[...document.querySelectorAll('.item')];
    items.forEach(i=>i.addEventListener('click',()=>{items.forEach(x=>x.classList.remove('active'));i.classList.add('active')}));
  </script>
</body>
</html>
