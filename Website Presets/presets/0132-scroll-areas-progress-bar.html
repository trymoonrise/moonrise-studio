<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0132
    slug: scroll-areas-progress-bar
    title: Scroll Progress Bar
    category: scroll-areas
    tags: scroll-areas, progress
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0132 — Scroll Progress Bar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;background:#fafafa}.bar{position:fixed;top:0;left:0;height:3px;background:#6c8cff;width:var(--w,0%);z-index:99;transition:width .1s}.content{height:300vh;padding:4rem 2rem}h1{font-size:2rem}
  </style>
</head>
<body>
<div class="bar" id="bar"></div><div class="content"><h1>Scroll down</h1><p style="margin-top:2rem;color:#666">Progress bar tracks scroll position</p></div>
<script>addEventListener('scroll',()=>{const p=scrollY/(document.body.scrollHeight-innerHeight);document.getElementById('bar').style.setProperty('--w',p*100+'%');});</script>
</body>
</html>
