<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0868
    slug: alerts-gradient-alert-12
    title: Gradient Alert 12
    category: alerts
    tags: alerts, gradient
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0868 - Gradient Alert 12</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Clash+Grotesk:wght@500;600&family=Outfit:wght@400;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      background: #08060f;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    .alert {
      position: relative;
      width: min(100%, 460px);
      padding: 2.1rem 1.9rem;
      border-radius: 24px;
      overflow: hidden;
      color: #fff;
      box-shadow: 0 40px 90px rgba(120, 40, 200, 0.35);
      isolation: isolate;
    }

    .aurora {
      position: absolute;
      inset: -40%;
      z-index: -2;
      background:
        radial-gradient(circle at 20% 30%, #ff2d9b, transparent 40%),
        radial-gradient(circle at 80% 20%, #7c3aed, transparent 45%),
        radial-gradient(circle at 60% 80%, #06b6d4, transparent 40%),
        radial-gradient(circle at 30% 70%, #f59e0b, transparent 38%);
      filter: blur(20px);
      animation: swirl 12s linear infinite;
    }

    .alert::before {
      content: '';
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 23px;
      background: rgba(8, 6, 15, 0.35);
      backdrop-filter: blur(2px);
    }

    .tag {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 0.64rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .title {
      margin: 1rem 0 0.5rem;
      font-family: 'Clash Grotesk', 'Outfit', sans-serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    .msg {
      margin: 0 0 1.4rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }

    .cta {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 0.75rem 1.4rem;
      background: #fff;
      color: #1a1030;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .cta:active { transform: scale(0.96); }

    @keyframes swirl {
      to { transform: rotate(360deg) scale(1.1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora { animation: none; }
    }
  </style>
</head>
<body>
  <div class="alert" role="status" aria-live="polite">
    <div class="aurora" aria-hidden="true"></div>
    <span class="tag">✦ Limited time</span>
    <h2 class="title">Your upgrade is ready</h2>
    <p class="msg">Unlock unlimited projects, priority rendering, and the full effects library - 40% off for the next 24 hours.</p>
    <button class="cta" type="button">Claim offer →</button>
  </div>
</body>
</html>
