<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1786
    slug: minimal-3d-thin-rings
    title: Thin Rings Orbit
    category: 3d-effects
    tags: 3d, minimal, orbit, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1786 - Thin Rings Orbit</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f5;perspective:900px;overflow:hidden;font-family:Outfit,sans-serif;color:#111}
    .stage{width:260px;height:260px;position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx,-68deg)) rotateY(var(--ry,0deg))}
    .ring{position:absolute;inset:0;border:1px solid #111;border-radius:50%;transform:rotateZ(calc(var(--i)*24deg)) translateZ(calc(var(--i)*-8px))}
    .core{position:absolute;inset:48%;border-radius:50%;background:#111;transform:translateZ(0)}
    .title{position:fixed;top:1.5rem;font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
    .label{position:fixed;bottom:1.5rem;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;opacity:.4;font-weight:300}
  </style>
</head>
<body>
  <div class="title">Thin rings</div>
  <div class="stage" id="stage">
    <div class="core"></div>
  </div>
  <div class="label">Orbit with mouse</div>
  <script>
    const stage=document.getElementById('stage');
    for(let i=0;i<8;i++){const r=document.createElement('div');r.className='ring';r.style.setProperty('--i',i);stage.appendChild(r)}
    let rx=-68,ry=0,trx=-68,try_=0,spin=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*40;trx=-68+y*-12});
    (function loop(){spin+=.4;rx+=(trx-rx)*.1;ry+=(try_-ry)*.1;
      stage.style.setProperty('--rx',rx+'deg');stage.style.setProperty('--ry',(ry+spin)+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
