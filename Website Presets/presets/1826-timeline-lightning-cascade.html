<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1826
    slug: timeline-lightning-cascade
    title: Lightning Cascade Timeline
    category: timeline
    tags: timeline, lightning, neon, insane
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1826 - Lightning Cascade Timeline</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#030308;color:#fff;font-family:Outfit,sans-serif;display:grid;place-items:center;padding:2rem;overflow:hidden}
    .scene{position:relative;width:min(380px,92vw)}
    .bolt{position:absolute;left:50%;top:0;bottom:0;width:3px;translate:-50% 0;background:linear-gradient(180deg,transparent,#4de8ff 10%,#fff 50%,#4de8ff 90%,transparent);box-shadow:0 0 20px #4de8ff,0 0 60px rgba(77,232,255,.4);animation:flicker 2.8s ease-in-out infinite}
    .bolt::before,.bolt::after{content:"";position:absolute;width:40px;height:2px;background:#4de8ff;box-shadow:0 0 12px #4de8ff;opacity:.7}
    .bolt::before{top:22%;left:0;rotate:28deg;transform-origin:left}
    .bolt::after{top:58%;right:0;left:auto;rotate:-32deg;transform-origin:right;width:50px}
    .node{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.75rem;margin:2.2rem 0;opacity:0;animation:zap .7s cubic-bezier(.22,1,.36,1) both}
    .node:nth-child(2){animation-delay:.15s}
    .node:nth-child(3){animation-delay:.3s}
    .node:nth-child(4){animation-delay:.45s}
    .node:nth-child(5){animation-delay:.6s}
    .node:nth-child(odd) .txt{text-align:right;grid-column:1}
    .node:nth-child(even) .txt{grid-column:3;text-align:left}
    .node:nth-child(odd) .core{grid-column:2}
    .node:nth-child(even) .core{grid-column:2}
    .core{width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 0 16px #4de8ff,0 0 40px #4de8ff;z-index:2;animation:pulse 1.6s ease-in-out infinite}
    .txt h4{font-family:Syne,sans-serif;margin:0 0 .2rem;font-size:.95rem;color:#c8f7ff}
    .txt p{margin:0;font-size:.75rem;color:#5a7a88;line-height:1.4}
    .title{text-align:center;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:#3a5a68;margin-bottom:1rem}
    @keyframes flicker{0%,100%{opacity:.7;filter:brightness(1)}40%{opacity:1;filter:brightness(1.4)}42%{opacity:.5}44%{opacity:1}}
    @keyframes pulse{50%{transform:scale(1.3);box-shadow:0 0 24px #fff,0 0 50px #4de8ff}}
    @keyframes zap{from{opacity:0;filter:blur(4px);transform:scale(.9)}to{opacity:1;filter:none;transform:none}}
    @media(prefers-reduced-motion:reduce){.bolt,.core,.node{animation:none;opacity:1}}
  </style>
</head>
<body>
  <div class="scene">
    <div class="title">Voltage history</div>
    <div class="bolt" aria-hidden="true"></div>
    <div class="node"><div class="txt"><h4>Charge</h4><p>Potential builds in silence</p></div><div class="core"></div></div>
    <div class="node"><div class="txt"><h4>Arc</h4><p>First connection sparks</p></div><div class="core"></div></div>
    <div class="node"><div class="txt"><h4>Surge</h4><p>Adoption floods the grid</p></div><div class="core"></div></div>
    <div class="node"><div class="txt"><h4>Peak</h4><p>Maximum throughput hit</p></div><div class="core"></div></div>
    <div class="node"><div class="txt"><h4>Sustain</h4><p>Steady state power</p></div><div class="core"></div></div>
  </div>
</body>
</html>
