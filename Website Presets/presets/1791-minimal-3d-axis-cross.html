<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1791
    slug: minimal-3d-axis-cross
    title: Axis Cross Rotate
    category: 3d-effects
    tags: 3d, minimal, axis, experimental
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1791 — Axis Cross Rotate</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@300&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0a0a;perspective:900px;overflow:hidden;font-family:Outfit,sans-serif;color:#fff}
    .cross{position:relative;width:200px;height:200px;transform-style:preserve-3d;transform:rotateX(var(--rx,-22deg)) rotateY(var(--ry,28deg))}
    .arm{position:absolute;left:50%;top:50%;background:#fff;transform-origin:center}
    .x{width:180px;height:1px;margin:-.5px -90px;transform:rotateY(0)}
    .y{width:1px;height:180px;margin:-90px -.5px}
    .z{width:1px;height:180px;margin:-90px -.5px;transform:rotateX(90deg)}
    .tip{position:absolute;width:6px;height:6px;border-radius:50%;background:#fff;left:50%;top:50%;margin:-3px}
    .tx{transform:translateX(90px)}.ty{transform:translateY(-90px)}.tz{transform:rotateX(90deg) translateY(-90px)}
    .label{position:fixed;bottom:1.5rem;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;opacity:.35;font-weight:300}
    .title{position:fixed;top:1.5rem;font-family:Syne,sans-serif;font-weight:800;letter-spacing:-.04em}
  </style>
</head>
<body>
  <div class="title">Axis</div>
  <div class="cross" id="cross">
    <div class="arm x"></div><div class="arm y"></div><div class="arm z"></div>
    <div class="tip tx"></div><div class="tip ty"></div><div class="tip tz"></div>
  </div>
  <div class="label">Rotate space</div>
  <script>
    const c=document.getElementById('cross');let rx=-22,ry=28,trx=-22,try_=28;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;try_=x*55;trx=y*-40});
    (function loop(){rx+=(trx-rx)*.1;ry+=(try_-ry)*.1;c.style.setProperty('--rx',rx+'deg');c.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
