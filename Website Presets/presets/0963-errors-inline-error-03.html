<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0963
    slug: errors-inline-error-03
    title: Inline Error 03
    category: errors
    tags: errors, inline
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0963 — Inline Error 03</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,700;1,400&family=DM+Sans:wght@500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#f7f3eb;font-family:'DM Sans',sans-serif;color:#1a1510}
    .wrap{width:min(480px,100%)}
    h2{margin:0 0 1rem;font-family:'Libre Baskerville',serif;font-size:1.6rem}
    .line{height:1px;background:#ddd;margin:1.5rem 0}
    .bleed{
      position:relative;padding:1.25rem 1.25rem 1.25rem 1.5rem;
      font-family:'Libre Baskerville',serif;font-style:italic;font-size:clamp(1.2rem,3.5vw,1.6rem);
      color:#8b0000;line-height:1.35;border-left:4px solid #c00;
      animation:bleed-grow 2.5s ease-in-out infinite;
    }
    .bleed::before{
      content:'';position:absolute;left:-4px;top:0;bottom:0;width:4px;
      background:linear-gradient(180deg,#c00,#8b0000,#400);animation:drip 1.5s ease-in infinite;
    }
    .drip{position:absolute;left:-6px;width:8px;height:8px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:#8b0000;animation:drop 1.8s ease-in infinite;opacity:0}
    .drip:nth-child(1){animation-delay:0s}.drip:nth-child(2){animation-delay:.6s;left:20px;top:100%}.drip:nth-child(3){animation-delay:1.2s;left:60%}
    .meta{margin-top:1rem;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#999}
    @keyframes bleed-grow{0%,100%{transform:scale(1);letter-spacing:0}50%{transform:scale(1.06);letter-spacing:.02em;text-shadow:2px 2px 0 rgba(139,0,0,.15)}}
    @keyframes drip{0%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(3) translateY(20px)}}
    @keyframes drop{0%{opacity:0;transform:translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateY(60px)}}
    @media (prefers-reduced-motion:reduce){.bleed,.bleed::before,.drip{animation:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Account settings</h2>
    <p style="opacity:.55;margin:0;font-size:.95rem">Update your billing email below.</p>
    <div class="line"></div>
    <div class="bleed" role="alert">
      <span class="drip"></span><span class="drip"></span><span class="drip"></span>
      Your session has hemorrhaged. Please sign in again before the page bleeds out entirely.
    </div>
    <p class="meta">Error code · SESSION_EXSANGUINATED</p>
  </div>
</body>
</html>
