<!DOCTYPE html>

<head>

  <meta charset="UTF-8">

  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#111;color:#fff}h1{font-size:4rem;font-weight:900;position:relative}h1::before,h1::after{content:'SPLIT';position:absolute;inset:0}.r{color:#f55;transform:translateX(-3px);mix-blend-mode:screen;position:absolute;inset:0}.b{color:#55f;transform:translateX(3px);mix-blend-mode:screen;position:absolute;inset:0}
  </style>

<body>
<h1>SPLIT<span class="r" aria-hidden="true">SPLIT</span><span class="b" aria-hidden="true">SPLIT</span></h1>
