<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1278
    slug: puzzles-memory-match-04
    title: Neural Pair Match
    category: puzzles
    tags: puzzles, memory
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1278 — Neural Pair Match</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070709;color:#ececf0;font-family:Outfit,sans-serif;padding:24px}
    button{font:inherit;border:0;cursor:pointer}
    .game{text-align:center}
    .game h2{font-family:Syne,sans-serif;font-size:1.3rem;margin:0 0 4px}
    .stats{font-size:.75rem;color:rgba(236,236,240,.4);margin-bottom:18px;letter-spacing:.1em}
    .grid{display:grid;grid-template-columns:repeat(4,72px);gap:8px;margin:0 auto 18px;perspective:600px}
    .card{height:72px;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.16,1,.3,1);cursor:pointer}
    .card.flip{transform:rotateY(180deg)}
    .card.match{animation:matchGlow .6s ease}
    .face{position:absolute;inset:0;border-radius:4px;backface-visibility:hidden;display:grid;place-items:center;border:1px solid rgba(255,255,255,.1)}
    .back{background:#16161e;font-family:Syne,sans-serif;font-size:.9rem;color:rgba(255,255,255,.2)}
    .front{background:#1a1a24;transform:rotateY(180deg);font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800;color:#00c896}
    .reset{padding:10px 18px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;font:500 .68rem Outfit,sans-serif;letter-spacing:.1em;text-transform:uppercase}
    @keyframes matchGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,0)}50%{box-shadow:0 0 16px rgba(0,200,150,.5)}}
    @media(prefers-reduced-motion:reduce){.card{transition:none}.card.match{animation:none}}
  </style>
</head>
<body>
<div class="game">
  <h2>Neural pair match</h2>
  <p class="stats" id="stats">Moves: 0 · Pairs: 0/4</p>
  <div class="grid" id="grid"></div>
  <button class="reset" id="reset" type="button">New game</button>
</div>
<script>
const grid=document.getElementById('grid'),statsEl=document.getElementById('stats');
const symbols=['A','B','C','D'];let cards=[],flipped=[],moves=0,pairs=0,lock=false;
function init(){cards=[...symbols,...symbols].sort(()=>Math.random()-.5);flipped=[];moves=0;pairs=0;lock=false;render();}
function render(){grid.innerHTML='';cards.forEach((s,i)=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="face back">?</div><div class="face front">${s}</div>`;c.onclick=()=>flip(i,c);grid.appendChild(c);});updateStats();}
function flip(i,el){if(lock||el.classList.contains('flip')||flipped.length>=2)return;el.classList.add('flip');flipped.push({i,el,s:cards[i]});if(flipped.length===2){moves++;lock=true;setTimeout(()=>{if(flipped[0].s===flipped[1].s){flipped.forEach(f=>f.el.classList.add('match'));pairs++;}else{flipped.forEach(f=>f.el.classList.remove('flip'));}flipped=[];lock=false;updateStats();if(pairs===4)statsEl.textContent=`Complete in ${moves} moves`;},700);}}
function updateStats(){statsEl.textContent=`Moves: ${moves} · Pairs: ${pairs}/4`;}
document.getElementById('reset').onclick=init;init();
</script>
</body>
</html>
