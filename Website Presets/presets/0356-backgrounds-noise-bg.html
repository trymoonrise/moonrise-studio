<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0356
    slug: backgrounds-noise-bg
    title: Noise Texture
    category: backgrounds
    tags: backgrounds, noise
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0356 - Noise Texture</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@600;700;800&display=swap');body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;position:relative;background:#111;color:#fff;font-family:"DM Sans",system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    .base{position:absolute;inset:0;background:linear-gradient(160deg,#1a1a1a,#0d0d0d 50%,#181818)}
    .noise{position:absolute;inset:0;opacity:.18;mix-blend-mode:overlay;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:tick .5s steps(2) infinite}
    @keyframes tick{to{transform:translate(1px,-1px)}}
    
.label{position:relative;z-index:2;text-align:center;padding:2rem;pointer-events:none}
.kicker{margin:0 0 .75rem;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.45}
h1{margin:0;font-family:"Syne",system-ui,sans-serif;font-size:clamp(1.85rem,5vw,2.85rem);font-weight:800;letter-spacing:-.045em;line-height:1.05}
.sub{margin:.7rem 0 0;font-size:.9rem;opacity:.5;font-weight:400}
  </style>
</head>
<body>
<div class="base" aria-hidden="true"></div><div class="noise" aria-hidden="true"></div><div class="label"><p class="kicker">Background</p><h1>Noise texture</h1><p class="sub">Static as atmosphere.</p></div>

</body>
</html>
