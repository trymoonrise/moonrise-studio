<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1185
    slug: timers-interval-timer-04
    title: Round Interval Ring Timer
    category: timers
    tags: timers, interval, round, ring
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1185 - Round Interval Ring Timer</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#e4e7ed;font-family:Outfit,sans-serif;padding:2rem}
    .timer{text-align:center}
    .ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 1.5rem}
    .ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
    .ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6}
    .ring-fill{fill:none;stroke:#38bdf8;stroke-width:6;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .5s}
    .ring-fill.rest{stroke:#64748b}
    .time{position:absolute;inset:0;display:grid;place-items:center;font-family:Syne,sans-serif;font-size:2.8rem;font-weight:800;letter-spacing:-.04em}
    .phase{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(228,231,237,.4);margin-bottom:.5rem}
    .rounds{display:flex;gap:6px;justify-content:center;margin-bottom:1.5rem}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);transition:background .3s,transform .3s}
    .dot.done{background:#38bdf8}
    .dot.active{background:#38bdf8;transform:scale(1.3);animation:dot-pulse 1s ease infinite}
    .btn{padding:.7rem 2rem;background:transparent;border:1px solid rgba(56,189,248,.4);color:#38bdf8;border-radius:8px;font-family:Syne,sans-serif;font-weight:700;cursor:pointer;transition:background .3s}
    .btn:hover{background:rgba(56,189,248,.1)}
    @keyframes dot-pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.4)}50%{box-shadow:0 0 0 4px rgba(56,189,248,0)}}
    @media(prefers-reduced-motion:reduce){.dot.active{animation:none}}
  </style>
</head>
<body>
  <div class="timer">
    <p class="phase" id="phase">Work · Round 1/4</p>
    <div class="rounds"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="ring-wrap">
      <svg viewBox="0 0 200 200"><circle class="ring-bg" cx="100" cy="100" r="90"/><circle class="ring-fill" id="ring" cx="100" cy="100" r="90"/></svg>
      <div class="time" id="time">0:45</div>
    </div>
    <button class="btn" id="btn">Start interval</button>
  </div>
  <script>
    const work=45,rest=15,rounds=4;let sec=work,isWork=true,round=1,running=false,iv;
    const ring=document.getElementById('ring'),time=document.getElementById('time'),phase=document.getElementById('phase'),dots=document.querySelectorAll('.dot'),btn=document.getElementById('btn');
    const circ=2*Math.PI*90;
    function upd(){const total=isWork?work:rest;ring.style.strokeDashoffset=circ*(1-sec/total);time.textContent=`0:${String(sec).padStart(2,'0')}`;phase.textContent=`${isWork?'Work':'Rest'} · Round ${round}/${rounds}`;ring.classList.toggle('rest',!isWork)}
    btn.onclick=()=>{running=!running;btn.textContent=running?'Pause':'Start interval';if(running){iv=setInterval(()=>{sec--;if(sec<=0){if(isWork){isWork=false;sec=rest}else{isWork=true;sec=work;round++;dots[round-2]?.classList.add('done');dots[round-1]?.classList.add('active');if(round>rounds){clearInterval(iv);running=false;btn.textContent='Complete';return}}upd()}else upd()},1000)}else clearInterval(iv)};
    upd();
  </script>
</body>
</html>
