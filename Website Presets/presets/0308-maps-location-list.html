<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0308
    slug: maps-location-list
    title: Location List
    category: maps
    tags: maps, list
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0308 - Location List</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;margin:0;padding:2rem;background:#f4f5f8;font-family:system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}.embed{position:relative;width:100%;overflow:hidden;background:#0a0a0c}.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block} .embed--16x9{aspect-ratio:16/9} .embed--9x16{aspect-ratio:9/16} .embed--4x5{aspect-ratio:4/5} .map-embed{position:absolute;inset:0;width:100%;height:100%;max-width:none;border:0;display:block}.layout{display:grid;grid-template-columns:minmax(0,280px) minmax(0,1fr);width:min(100%,720px);min-height:360px;border-radius:20px;overflow:hidden;background:#fff;border:1px solid #e5e7eb;box-shadow:0 20px 50px rgba(15,23,42,.1)}.list-head{padding:1.1rem 1.15rem .85rem;border-bottom:1px solid #f0f2f5}.list-head h2{font-size:1.05rem;font-weight:800}.list{list-style:none;margin:0;padding:.35rem 0}.item{display:block;width:100%;padding:.85rem 1.15rem;border:none;border-left:3px solid transparent;background:transparent;text-align:left;font-family:inherit;cursor:pointer;font-size:.88rem;color:#374151}.item.is-active{background:#f0f4ff;border-left-color:#4f6ef7;font-weight:700}.map-stage{position:relative;min-height:280px;background:#e5e7eb}@media(max-width:640px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="layout"><div><header class="list-head"><h2>Our offices</h2></header><ul class="list" id="list"></ul></div><div class="map-stage"><iframe class="map-embed" src="https://www.google.com/maps?q=123%20Main%20Street%2C%20New%20York%2C%20NY%2010001&hl=en&z=14&output=embed" title="Selected office" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div></div>
<script>function embedUrl(q,z){return 'https://www.google.com/maps?q='+encodeURIComponent(q)+'&hl=en&z='+z+'&output=embed';}function mapsUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}const locations=[{title:'Headquarters',query:'123 Main Street, New York, NY 10001',z:14},{title:'West Office',query:'1 Market Street, San Francisco, CA 94105',z:14},{title:'EU Hub',query:'1 Canada Square, London E14 5AB, UK',z:14}];const list=document.getElementById('list'),map=document.querySelector('.map-embed');function select(i){const loc=locations[i];map.src=embedUrl(loc.query,loc.z);list.querySelectorAll('.item').forEach((b,j)=>b.classList.toggle('is-active',j===i));}locations.forEach((loc,i)=>{const b=document.createElement('button');b.type='button';b.className='item'+(i===0?' is-active':'');b.textContent=loc.title;b.onclick=()=>select(i);list.appendChild(b);});</script>
</body>
</html>
