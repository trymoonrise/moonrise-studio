<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0898
    slug: avatars-avatar-group-03
    title: Orbit Stack Avatar Cluster
    category: avatars
    tags: avatars, group, stack, hover
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0898 — Orbit Stack Avatar Cluster</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#e8ecf2;font-family:Outfit,sans-serif;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(56,189,248,.08),transparent 40%),radial-gradient(circle at 70% 80%,rgba(34,211,238,.06),transparent 45%);pointer-events:none;animation:drift 18s ease-in-out infinite alternate}
    .wrap{text-align:center;padding:2rem}
    .meta{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:rgba(232,236,242,.4);margin-bottom:2rem;font-weight:500}
    .cluster{position:relative;width:280px;height:120px;margin:0 auto;cursor:pointer}
    .av{position:absolute;width:64px;height:64px;border-radius:50%;border:2px solid #0a0c10;display:grid;place-items:center;font-family:Syne,sans-serif;font-weight:800;font-size:1.1rem;transition:transform .5s cubic-bezier(.16,1,.3,1),box-shadow .4s ease;box-shadow:0 8px 24px rgba(0,0,0,.45)}
    .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;filter:grayscale(.3) contrast(1.1)}
    .av:nth-child(1){left:0;top:28px;background:linear-gradient(135deg,#1e293b,#334155);z-index:1;animation:float 4s ease-in-out infinite}
    .av:nth-child(2){left:54px;top:12px;background:linear-gradient(135deg,#0f766e,#14b8a6);z-index:2;animation:float 4s ease-in-out infinite .5s}
    .av:nth-child(3){left:108px;top:0;background:#111827;z-index:3;animation:float 4s ease-in-out infinite 1s}
    .av:nth-child(4){left:162px;top:12px;background:linear-gradient(135deg,#1d4ed8,#38bdf8);z-index:2;animation:float 4s ease-in-out infinite 1.5s}
    .av:nth-child(5){left:216px;top:28px;background:linear-gradient(135deg,#374151,#6b7280);z-index:1;animation:float 4s ease-in-out infinite 2s}
    .cluster:hover .av:nth-child(1){transform:translate(-20px,-8px) scale(1.08)}
    .cluster:hover .av:nth-child(2){transform:translate(-10px,-16px) scale(1.08)}
    .cluster:hover .av:nth-child(3){transform:translateY(-20px) scale(1.12);box-shadow:0 16px 40px rgba(56,189,248,.25)}
    .cluster:hover .av:nth-child(4){transform:translate(10px,-16px) scale(1.08)}
    .cluster:hover .av:nth-child(5){transform:translate(20px,-8px) scale(1.08)}
    .count{margin-top:2rem;font-family:Syne,sans-serif;font-size:2.5rem;letter-spacing:-.04em}
    .count span{font-size:.9rem;color:rgba(232,236,242,.45);font-family:Outfit,sans-serif;font-weight:400;margin-left:.5rem}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes drift{to{background-position:60% 40%,40% 60%}}
    @media(prefers-reduced-motion:reduce){body::before,.av{animation:none}.cluster:hover .av{transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <p class="meta">Core team · 5 members</p>
    <div class="cluster" aria-label="Avatar group">
      <div class="av">MK</div>
      <div class="av">JL</div>
      <div class="av"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt="Team lead"></div>
      <div class="av">AR</div>
      <div class="av">+3</div>
    </div>
    <p class="count">8<span>collaborators online</span></p>
  </div>
</body>
</html>
