<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1548
    slug: loader-lines-wave
    title: Wave Lines Loader
    category: loading
    tags: loading, lines, wave
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1548 - Wave Lines Loader</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#111}.bars{display:flex;gap:4px;align-items:flex-end;height:40px}.bar{width:4px;background:#6c8cff;border-radius:99px;animation:wave 1s ease-in-out infinite}.bar:nth-child(1){animation-delay:0s;height:12px}.bar:nth-child(2){animation-delay:.1s;height:20px}.bar:nth-child(3){animation-delay:.2s;height:32px}.bar:nth-child(4){animation-delay:.3s;height:24px}.bar:nth-child(5){animation-delay:.4s;height:16px}@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  </style>
</head>
<body>
<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>

</body>
</html>
