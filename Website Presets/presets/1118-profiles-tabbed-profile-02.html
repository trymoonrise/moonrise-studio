<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1118
    slug: profiles-tabbed-profile-02
    title: Sliding Tab Profile Card
    category: profiles
    tags: profiles, tabbed, sliding, card
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1118 — Sliding Tab Profile Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#e4e7ed;font-family:Outfit,sans-serif;padding:2rem}
    .card{width:min(420px,100%);background:#12151c;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}
    .header{padding:2rem 2rem 1rem;display:flex;align-items:center;gap:1rem}
    .av{width:64px;height:64px;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.1)}
    .av img{width:100%;height:100%;object-fit:cover}
    .meta h1{font-family:Syne,sans-serif;font-size:1.3rem;letter-spacing:-.03em;margin:0}
    .meta p{font-size:.8rem;color:rgba(228,231,237,.45);margin-top:2px}
    .tabs{display:flex;position:relative;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
    .indicator{position:absolute;bottom:0;height:2px;background:#38bdf8;transition:left .35s cubic-bezier(.16,1,.3,1),width .35s cubic-bezier(.16,1,.3,1);animation:indicator-glow 2s ease infinite}
    .tab{flex:1;padding:.85rem;background:none;border:none;color:rgba(228,231,237,.45);font-family:Syne,sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .3s}
    .tab.on{color:#38bdf8}
    .panel{padding:1.5rem 2rem;min-height:120px}
    .panel p{font-size:.85rem;line-height:1.6;color:rgba(228,231,237,.6);animation:fade-in .4s ease}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;text-align:center}
    .stats div{font-family:Syne,sans-serif;font-size:1.4rem;font-weight:800;color:#38bdf8}
    .stats span{display:block;font-family:Outfit,sans-serif;font-size:.65rem;color:rgba(228,231,237,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
    @keyframes indicator-glow{0%,100%{box-shadow:0 0 8px rgba(56,189,248,.3)}50%{box-shadow:0 0 16px rgba(56,189,248,.5)}}
    @keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.indicator,.panel p{animation:none}}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="av"><img src="../stock/media/16-9 Aspect Ratio(image).png" alt=""></div>
      <div class="meta"><h1>Jordan Park</h1><p>Product Designer · Berlin</p></div>
    </div>
    <div class="tabs">
      <div class="indicator" id="ind"></div>
      <button class="tab on" data-i="0">About</button>
      <button class="tab" data-i="1">Work</button>
      <button class="tab" data-i="2">Stats</button>
    </div>
    <div class="panel" id="panel">
      <p>Building design systems for teams that ship fast. Previously at Linear and Stripe. Focused on developer experience and interface clarity.</p>
    </div>
  </div>
  <script>
    const tabs=document.querySelectorAll('.tab'),ind=document.getElementById('ind'),panel=document.getElementById('panel');
    const content=['Building design systems for teams that ship fast. Previously at Linear and Stripe. Focused on developer experience and interface clarity.','12 shipped products · 3 open-source libraries · Speaker at Config 2025.','<div class="stats"><div>847<span>Followers</span></div><div>142<span>Projects</span></div><div>6yr<span>Experience</span></div></div>'];
    function move(i){const t=tabs[i];ind.style.left=t.offsetLeft+'px';ind.style.width=t.offsetWidth+'px'}
    move(0);
    tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('on'));t.classList.add('on');move(+t.dataset.i);panel.innerHTML=+t.dataset.i===2?content[2]:`<p>${content[+t.dataset.i]}</p>`}));
  </script>
</body>
</html>
