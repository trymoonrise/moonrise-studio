<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1026
    slug: auth-login-card-01
    title: Terminal Login Gate
    category: auth
    tags: auth, login, terminal, gate
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1026 — Terminal Login Gate</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#080a0e;color:#c8cdd6;font-family:Outfit,sans-serif;padding:2rem}
    .card{width:min(400px,100%);background:#0f1218;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
    .top{display:flex;gap:6px;padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.06)}
    .top span{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1)}
    .top span:nth-child(1){background:#ef4444}.top span:nth-child(2){background:#eab308}.top span:nth-child(3){background:#22c55e}
    .body{padding:2rem}
    .prompt{font-size:.75rem;color:rgba(200,205,214,.4);margin-bottom:.5rem;font-family:monospace}
    .prompt span{color:#38bdf8;animation:cursor 1s step-end infinite}
    h1{font-family:Syne,sans-serif;font-size:1.5rem;letter-spacing:-.04em;margin:0 0 1.5rem;color:#eef1f6}
    label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,205,214,.45);margin-bottom:.4rem}
    input{width:100%;padding:.75rem 1rem;background:#080a0e;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#eef1f6;font-family:Outfit,sans-serif;font-size:.9rem;margin-bottom:1rem;transition:border-color .3s,box-shadow .3s}
    input:focus{outline:none;border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    button{width:100%;padding:.85rem;background:#38bdf8;border:none;border-radius:6px;color:#080a0e;font-family:Syne,sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.02em;cursor:pointer;transition:transform .3s,background .3s}
    button:hover{background:#0ea5e9;transform:translateY(-1px)}
    .foot{margin-top:1rem;text-align:center;font-size:.75rem;color:rgba(200,205,214,.35)}
    .foot a{color:#38bdf8;text-decoration:none}
    @keyframes cursor{50%{opacity:0}}
    @media(prefers-reduced-motion:reduce){.prompt span{animation:none}}
  </style>
</head>
<body>
  <div class="card">
    <div class="top"><span></span><span></span><span></span></div>
    <div class="body">
      <p class="prompt">auth@system:~$ login<span>_</span></p>
      <h1>Sign in</h1>
      <form>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com">
        <label for="pass">Password</label>
        <input id="pass" type="password" placeholder="••••••••">
        <button type="submit">Authenticate</button>
      </form>
      <p class="foot">No account? <a href="#">Request access</a></p>
    </div>
  </div>
</body>
</html>
