<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0139
    slug: sidebars-icon-rail
    title: Icon Rail Sidebar
    category: sidebars
    tags: sidebars, icons
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0139 — Icon Rail Sidebar</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;display:flex;background:#0d0d0f}.rail{width:64px;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:1rem 0;gap:1rem}.ico{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:#888;cursor:pointer;font-size:1.1rem}.ico.on{background:#6c8cff;color:#fff}.main{flex:1;color:#fff;padding:2rem}
  </style>
</head>
<body>
<nav class="rail"><div class="ico on">⌂</div><div class="ico">◎</div><div class="ico">⚙</div><div class="ico">✉</div></nav><main class="main">Main area</main>
<script>document.querySelectorAll('.ico').forEach(i=>i.onclick=()=>{document.querySelectorAll('.ico').forEach(x=>x.classList.remove('on'));i.classList.add('on');});</script>
</body>
</html>
