<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0238 — Basic Data Table</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem;align-items:flex-start}.tbl{width:100%;max-width:500px;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}.tbl th,.tbl td{padding:12px 16px;text-align:left;font-size:.9rem}.tbl th{background:#f5f5f5;font-weight:600;color:#666}.tbl tr{border-bottom:1px solid #eee}
  </style>
</head>
<body>
<table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead><tbody><tr><td>Alice</td><td>Designer</td><td>Active</td></tr><tr><td>Bob</td><td>Developer</td><td>Active</td></tr><tr><td>Carol</td><td>Manager</td><td>Away</td></tr></tbody></table>

</body>
</html>
