<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1168 — Sidebar Map 13</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;margin:0;padding:2rem;background:#f4f5f8;font-family:system-ui,-apple-system,sans-serif}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}.embed{position:relative;width:100%;overflow:hidden;background:#0a0a0c}.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block} .embed--16x9{aspect-ratio:16/9} .embed--9x16{aspect-ratio:9/16} .embed--4x5{aspect-ratio:4/5} .map-embed{position:absolute;inset:0;width:100%;height:100%;max-width:none;border:0;display:block}.layout{display:grid;grid-template-columns:220px minmax(0,1fr);width:min(100%,700px);min-height:340px;border-radius:20px;overflow:hidden;background:#fff;border:1px solid #e5e7eb;box-shadow:0 20px 50px rgba(15,23,42,.1)}.side{padding:1.1rem;border-right:1px solid #f0f2f5}.side h3{font-size:.95rem;font-weight:800;margin-bottom:.75rem}.item{display:block;width:100%;padding:.65rem .7rem;margin-bottom:.35rem;border:none;border-radius:10px;background:transparent;text-align:left;font-family:inherit;font-size:.82rem;color:#4b5563;cursor:pointer}.item.is-active{background:#f0f4ff;color:#4f6ef7;font-weight:700}.map-stage{position:relative;min-height:280px}@media(max-width:640px){.layout{grid-template-columns:1fr}.side{display:flex;gap:.35rem;overflow-x:auto;border-right:none;border-bottom:1px solid #f0f2f5}.item{white-space:nowrap}}
  </style>
</head>
<body>
<div class="layout"><aside class="side" id="side"><h3>Stores</h3></aside><div class="map-stage"><iframe class="map-embed" src="https://www.google.com/maps?q=123%20Main%20Street%2C%20New%20York%2C%20NY%2010001&hl=en&z=14&output=embed" title="Store map" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div></div>
<script>function embedUrl(q,z){return 'https://www.google.com/maps?q='+encodeURIComponent(q)+'&hl=en&z='+z+'&output=embed';}function mapsUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}const stores=[{name:'SoHo',query:'SoHo, New York, NY',z:15},{name:'Williamsburg',query:'Williamsburg, Brooklyn, NY',z:14},{name:'Midtown',query:'Midtown Manhattan, NY',z:14}];const side=document.getElementById('side'),map=document.querySelector('.map-embed');stores.forEach((s,i)=>{const b=document.createElement('button');b.type='button';b.className='item'+(i===0?' is-active':'');b.textContent=s.name;b.onclick=()=>{map.src=embedUrl(s.query,s.z);side.querySelectorAll('.item').forEach(x=>x.classList.remove('is-active'));b.classList.add('is-active');};side.appendChild(b);});</script>
</body>
</html>
