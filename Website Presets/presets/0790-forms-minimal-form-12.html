--><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>0790 — Minimal Form 12</title><style>@import url('../shared/preset-reset.css');@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;600;700&display=swap');*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;overflow:hidden;background:#fff;color:#111;font-family:Manrope,sans-serif}button,input,textarea,select{font:inherit;color:inherit}button{cursor:pointer}.form{width:min(620px,94vw)}.title{font:400 clamp(50px,12vw,90px)/.85 'Instrument Serif';letter-spacing:-.05em;margin:0 0 45px}.field{display:grid;grid-template-columns:110px 1fr;align-items:end;border-bottom:1px solid #111;padding:14px 0}.field label{font:500 9px 'DM Mono';letter-spacing:.18em;text-transform:uppercase;color:#777}.field input{border:0;outline:0;background:transparent;font-size:20px}.send{margin-top:22px;border:0;background:transparent;font:500 11px 'DM Mono';letter-spacing:.18em;text-transform:uppercase;padding:12px 0;transition:.3s}.send:hover{letter-spacing:.3em}@media(max-width:500px){.field{grid-template-columns:1fr;gap:8px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head><body><form class="form"><h1 class="title">Only what is<br><i>necessary.</i></h1><div class="field"><label>Name</label><input></div><div class="field"><label>Email</label><input type="email"></div><div class="field"><label>Message</label><input></div><button class="send">Submit —→</button></form><script>document.querySelectorAll('form').forEach(f=>f.addEventListener('submit',e=>e.preventDefault()));</script></body></html>
