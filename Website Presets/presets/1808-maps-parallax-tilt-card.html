<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1808
    slug: maps-parallax-tilt-card
    title: Parallax Tilt Card
    category: maps
    tags: maps, embed, experimental, widgets, motion
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1808 - Parallax Tilt Card</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:1.5rem;overflow:hidden;background:#e8ecef;color:#111;font-family:Syne,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block}
    button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
    .wrap{perspective:1000px;width:min(520px,92vw)}
.card{position:relative;aspect-ratio:16/11;border-radius:28px;overflow:hidden;transform-style:preserve-3d;transition:transform .12s ease-out;box-shadow:0 30px 70px rgba(20,30,40,.2);border:1px solid rgba(0,0,0,.08)}
.card iframe{transform:translateZ(0) scale(1.05)}
.plate{position:absolute;left:18px;bottom:18px;right:18px;padding:1rem 1.1rem;border-radius:18px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);transform:translateZ(40px);box-shadow:0 12px 30px rgba(0,0,0,.1)}
.plate b{display:block;font-size:1.15rem;letter-spacing:-.03em}
.plate span{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.45)}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="wrap"><div class="card" id="c"><iframe src="https://www.google.com/maps?q=Seoul%2C%20South%20Korea&hl=en&z=12&output=embed" title="Tilt map" loading="lazy"></iframe>
<div class="plate"><span>Destination</span><b>Seoul nights</b></div></div></div>
<script>const c=document.getElementById('c');c.onmousemove=e=>{const r=c.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5;const y=(e.clientY-r.top)/r.height-.5;c.style.transform='rotateY('+(x*10)+'deg) rotateX('+(-y*10)+'deg)'};c.onmouseleave=()=>c.style.transform='';</script>
</body>
</html>
