<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1474
    slug: scroll-progress-circular
    title: Circular Scroll Progress
    category: scroll-progress
    tags: scroll, progress, circular
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1474 — Circular Scroll Progress</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;background:#0d0d0f;color:#fff}.ring{position:fixed;top:1.5rem;right:1.5rem;width:48px;height:48px;z-index:10}.ring svg{transform:rotate(-90deg)}.ring circle{fill:none;stroke-width:3}.ring .bg{stroke:#222}.ring .fg{stroke:#6c8cff;stroke-linecap:round;stroke-dasharray:100;stroke-dashoffset:100;transition:stroke-dashoffset .1s}section{min-height:100vh;display:grid;place-items:center;font-size:2.5rem;font-weight:800;padding:2rem}
  </style>
</head>
<body>
<div class="ring"><svg viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="15.9"/><circle class="fg" id="fg" cx="18" cy="18" r="15.9"/></svg></div><section>1</section><section>2</section><section>3</section><section>4</section><section>5</section>
<script>const fg=document.getElementById('fg');addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-window.innerHeight;const p=window.scrollY/h;fg.style.strokeDashoffset=100-p*100;},{passive:true});</script>
</body>
</html>
