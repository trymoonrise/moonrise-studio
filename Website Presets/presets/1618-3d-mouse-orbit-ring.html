<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1618
    slug: 3d-mouse-orbit-ring
    title: 3D Orbit Ring Mouse
    category: 3d-mouse
    tags: 3d, mouse, orbit
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1618 - 3D Orbit Ring Mouse</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#06070c;perspective:1000px;overflow:hidden;font-family:Syne,sans-serif}
    .stage{width:260px;height:260px;position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx,-62deg)) rotateY(var(--ry,0deg))}
    .core{position:absolute;inset:90px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#6c8cff 40%,#1a2250);box-shadow:0 0 40px rgba(108,140,255,.5);transform:translateZ(0)}
    .ring{position:absolute;inset:0;transform-style:preserve-3d}
    .node{position:absolute;left:50%;top:50%;width:36px;height:36px;margin:-18px;border-radius:10px;display:grid;place-items:center;font-size:.7rem;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.25)}
    .hint{position:fixed;bottom:1.4rem;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="core"></div>
    <div class="ring" id="ring"></div>
  </div>
  <div class="hint">Orbit with mouse X</div>
  <script>
    const labels=['A','B','C','D','E','F','G','H'],colors=['#6c8cff','#ff6bcb','#7ee0c3','#ffd16c','#b06cff','#5eead4','#ff8a6c','#8aa4ff'];
    const ring=document.getElementById('ring'),stage=document.getElementById('stage'),R=110;
    labels.forEach((L,i)=>{const n=document.createElement('div');n.className='node';n.textContent=L;n.style.background=colors[i];n.dataset.a=(i/labels.length)*360;ring.appendChild(n)});
    let spin=0,tspin=0,rx=-62,ry=0,trx=-62,try_=0;
    addEventListener('pointermove',e=>{const x=(e.clientX/innerWidth-.5)*2;const y=(e.clientY/innerHeight-.5)*2;tspin=x*90;try_=x*20;trx=-62+y*-10});
    (function loop(){spin+=(tspin-spin)*.08;rx+=(trx-rx)*.1;ry+=(try_-ry)*.1;
      [...ring.children].forEach(n=>{const a=+n.dataset.a+spin;n.style.transform=`rotateZ(${a}deg) translateY(-${R}px) rotateX(90deg)`});
      stage.style.setProperty('--rx',rx+'deg');stage.style.setProperty('--ry',ry+'deg');requestAnimationFrame(loop)})();
  </script>
</body>
</html>
