<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1653
    slug: ease-in-tab-indicator
    title: Tab Indicator Ease
    category: ease-in
    tags: ease-in, tabs, indicator, professional
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1653 - Tab Indicator Ease</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{display:grid;place-items:center;min-height:100vh;background:#fafafa;padding:2rem;font-family:system-ui,sans-serif}.tabs{position:relative;display:flex;gap:2rem;border-bottom:1px solid #e5e5e5;padding-bottom:12px}.tab{font-size:.9rem;font-weight:500;color:#888;opacity:0;animation:fade .5s cubic-bezier(.22,.61,.36,1) forwards}.tab:nth-child(1){animation-delay:.1s}.tab:nth-child(2){animation-delay:.18s}.tab:nth-child(3){animation-delay:.26s}.tab.active{color:#111;font-weight:600}.indicator{position:absolute;bottom:-1px;left:0;height:2px;width:60px;background:#6c8cff;border-radius:99px;transform:scaleX(0);transform-origin:left;animation:draw .6s cubic-bezier(.22,.61,.36,1) .4s forwards}@keyframes fade{to{opacity:1}}@keyframes draw{to{transform:scaleX(1)}}
  </style>
</head>
<body>
<div class="tabs"><span class="tab active">Overview</span><span class="tab">Analytics</span><span class="tab">Settings</span><div class="indicator"></div></div>

</body>
</html>
