<!DOCTYPE html>
<html lang="en">
<head>
  <!--

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1534 — Slide Up Mask Reveal</title>
  <style>
    @import url('../shared/preset-reset.css');
    body{margin:0;min-height:100vh;overflow:hidden}.wrap{position:relative;height:100vh}.content{position:absolute;inset:0;background:url('../stock/media/16-9 Aspect Ratio(image).png') center/cover;display:grid;place-items:center}.content h1{color:#fff;font-size:3rem;font-weight:800;text-shadow:0 2px 20px rgba(0,0,0,.5)}.mask{position:absolute;inset:0;background:#6c8cff;transform:translateY(0);animation:up 1.2s cubic-bezier(.22,.61,.36,1) forwards}@keyframes up{to{transform:translateY(-100%)}}
  </style>
</head>
<body>
<div class="wrap"><div class="content"><h1>Hello</h1></div><div class="mask"></div></div>

</body>
