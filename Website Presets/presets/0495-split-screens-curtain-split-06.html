<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 0495
    slug: split-screens-curtain-split-06
    title: Curtain Split 06
    category: split-screens
    tags: split-screens, experimental, mask, shapes
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0495 - Curtain Split 06</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;overflow:hidden;font-family:Syne,sans-serif;background:#0a0a0a;color:#fff}
    .stage{position:relative;min-height:100vh;display:grid;place-items:center;overflow:hidden}
.center{text-align:center;z-index:1}
.center h1{font-size:clamp(2.5rem,10vw,6rem);font-weight:800;letter-spacing:-.07em;margin:0}
.center p{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;margin:1rem 0 0;opacity:.45}
.curtain{position:absolute;top:0;bottom:0;width:52%;background:#c1121f;transition:transform 1s cubic-bezier(.22,1,.36,1);z-index:2}
.curtain.l{left:0;clip-path:polygon(0 0,100% 0,88% 100%,0 100%);transform-origin:left}
.curtain.r{right:0;clip-path:polygon(12% 0,100% 0,100% 100%,0 100%);background:#780000;transform-origin:right}
.stage.open .curtain.l{transform:translateX(-105%)}
.stage.open .curtain.r{transform:translateX(105%)}
.btn{margin-top:1.5rem;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;padding:12px 22px;border-radius:999px;font-family:Syne,sans-serif;font-weight:700;cursor:pointer;position:relative;z-index:3}
.btn:hover{background:#fff;color:#111}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div class="stage" id="s"><div class="curtain l"></div><div class="curtain r"></div><div class="center"><h1>Open<br>sesame</h1><p>Curtain split</p><button class="btn" id="b">Draw curtains</button></div></div>
<script>const s=document.getElementById('s'),b=document.getElementById('b');b.onclick=()=>{s.classList.toggle('open');b.textContent=s.classList.contains('open')?'Close curtains':'Draw curtains'};</script>
</body>
</html>
