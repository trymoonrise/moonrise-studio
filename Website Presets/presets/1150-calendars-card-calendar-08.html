<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    @preset
    id: 1150
    slug: calendars-card-calendar-08
    title: Stack Flip Card Calendar
    category: calendars
    tags: calendars, card, stack, flip
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1150 — Stack Flip Card Calendar</title>
  <style>
    @import url('../shared/preset-reset.css');
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0e1016;color:#e4e8ef;font-family:Outfit,sans-serif;padding:2rem;perspective:800px}
    .stack{position:relative;width:280px;height:340px;cursor:pointer}
    .card{position:absolute;inset:0;background:#161a24;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .6s cubic-bezier(.16,1,.3,1),opacity .4s}
    .card.back{transform:translateY(12px) scale(.94);opacity:.4;z-index:1}
    .card.mid{transform:translateY(6px) scale(.97);opacity:.7;z-index:2}
    .card.front{z-index:3;animation:float-card 4s ease-in-out infinite}
    .month{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(228,232,239,.4);margin-bottom:.5rem}
    .day{font-family:Syne,sans-serif;font-size:6rem;font-weight:800;line-height:1;letter-spacing:-.06em;color:#38bdf8}
    .weekday{font-size:.85rem;color:rgba(228,232,239,.5);margin-top:.5rem}
    .events{margin-top:2rem;width:100%;font-size:.75rem;color:rgba(228,232,239,.45);text-align:center}
    .events span{display:block;padding:.4rem;border-top:1px solid rgba(255,255,255,.06)}
    .stack:hover .card.front{transform:rotateX(-8deg) translateY(-8px)}
    .stack:hover .card.mid{transform:translateY(2px) scale(.98)}
    @keyframes float-card{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @media(prefers-reduced-motion:reduce){.card.front{animation:none}.stack:hover .card.front{transform:none}}
  </style>
</head>
<body>
  <div class="stack">
    <div class="card back"><span class="month">Jul</span><span class="day" style="font-size:3rem;opacity:.3">15</span></div>
    <div class="card mid"><span class="month">Jul</span><span class="day" style="font-size:4rem;opacity:.5">15</span></div>
    <div class="card front">
      <span class="month">July</span>
      <span class="day">16</span>
      <span class="weekday">Thursday</span>
      <div class="events"><span>Design review · 11:00</span><span>Team sync · 15:30</span></div>
    </div>
  </div>
</body>
</html>
