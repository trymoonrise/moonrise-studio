# LeadFinder Cloud — optional hourly cron scraper only.
# Live Business Finder search (Playwright) is local-dev only: npm run search:server
# Do not deploy leadfinder-search on Render — Playwright exceeds practical memory limits.

services:
  - type: cron
    name: leadfinder-cloud
    runtime: docker
    rootDir: leadfinder-cloud
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "0 * * * *"
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HEADLESS
        value: "1"
      - key: QUERIES_PER_RUN
        value: "3"
      - key: DISCORD_BATCH_SIZE
        value: "1000"
      - key: SCRAPE_EVERY_TIME
        value: "1"
      - key: MAX_SCROLLS
        value: "220"
      - key: LEADFINDER_STATE_BUCKET
        value: "leadfinder-cloud"
      - key: LEADFINDER_STATE_OBJECT
        value: "cloud-state.json"
