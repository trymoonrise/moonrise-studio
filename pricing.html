<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing · Moonrise Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/studio.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="pricing">
  <div id="shell"></div>
  <div id="page-body" class="ms-settings-page ms-pricing-page">
    <header class="ms-page-head ms-pricing-head">
      <div class="ms-pricing-head-row">
        <h1>Pricing</h1>
        <button type="button" class="ms-pricing-manage" id="btn-billing-portal" hidden>Manage billing</button>
      </div>
    </header>

    <div class="ms-pricing-content">
      <div class="ms-pricing-list" id="pricing-plans"></div>
      <section class="ms-pricing-topup-custom" id="pricing-topup" aria-labelledby="pricing-topup-heading">
        <h2 class="ms-pricing-topup-heading" id="pricing-topup-heading">You need more credits?</h2>
        <div class="ms-pricing-topup-row">
          <label class="ms-pricing-topup-label" for="topup-amount">Amount</label>
          <div class="ms-pricing-topup-input-wrap">
            <span class="ms-pricing-topup-currency" aria-hidden="true">$</span>
            <input
              class="ms-pricing-topup-input"
              id="topup-amount"
              type="number"
              inputmode="decimal"
              min="5"
              max="1000"
              step="1"
              value="25"
              aria-describedby="topup-preview topup-amount-tooltip"
            >
            <span class="ms-pricing-topup-tooltip" id="topup-amount-tooltip" role="tooltip" hidden></span>
          </div>
          <p class="ms-pricing-topup-preview" id="topup-preview">= 100 credits</p>
          <button type="button" class="ms-btn ms-pricing-topup-buy" id="btn-topup-purchase">Purchase</button>
        </div>
        <div class="ms-pricing-dev-credits">
          <button type="button" class="ms-btn ms-btn-secondary ms-pricing-dev-credits-btn" id="btn-dev-credits">
            Developer credits
          </button>
          <p class="ms-pricing-dev-credits-note">Claim 50 free credits</p>
        </div>
      </section>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/site-branding.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/app.js?v=20260718-shell-fix"></script>
  <script src="js/pricing.js"></script>
</body>
</html>
